<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>بأسمائه نحيا - قارئ الكتاب</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:ital@0;1&family=Cairo:wght@400;600;700&family=Tajawal:wght@400;600;700&family=Noto+Naskh+Arabic:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-primary: #f8f4ef;
      --text-primary: #1c1007;
      --text-secondary: #6b5d4f;
      --accent: #d4a574;
      --border-color: #e8dfd6;
      --shadow: 0 2px 8px rgba(0,0,0,0.1);
      --font-size: 18px;
      --line-height: 2.0;
      --font-family: 'Amiri', serif;
      --transition: 0.3s ease;
    }
    body {
      background-color: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-family);
      font-size: var(--font-size);
      line-height: var(--line-height);
      overflow-x: hidden;
    }
    header {
      background: linear-gradient(135deg, var(--accent), #c9945d);
      color: white;
      padding: 1.5rem 2rem;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      transition: transform 0.3s ease-out;
    }
    header.hide { transform: translateY(-100%); }
    .header-title {
      font-size: 1.8rem;
      font-weight: 700;
      flex: 1;
      min-width: 200px;
    }
    .header-controls {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      align-items: center;
    }
    button {
      background: rgba(255,255,255,0.2);
      border: 2px solid white;
      color: white;
      padding: 0.6rem 1.2rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.95rem;
      font-family: var(--font-family);
      transition: var(--transition);
    }
    button:hover {
      background: rgba(255,255,255,0.3);
      transform: translateY(-2px);
    }
    #progress-bar {
      position: fixed;
      top: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #d4a574, #c9945d);
      width: 0%;
      transition: width 0.1s linear;
      z-index: 200;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 3rem 2rem;
    }
    #content {
      background: white;
      padding: 2rem;
      border-radius: 8px;
      box-shadow: var(--shadow);
      min-height: 60vh;
      text-align: justify;
    }
    #content h1 {
      font-size: 2rem;
      margin-bottom: 1.5rem;
      color: var(--accent);
      text-align: center;
    }
    #content h2 {
      font-size: 1.5rem;
      margin-top: 2rem;
      margin-bottom: 1rem;
      color: #8b7355;
    }
    #content p {
      margin-bottom: 1.5rem;
      color: var(--text-primary);
    }
    #content ul {
      margin: 1.5rem 2rem;
      color: var(--text-primary);
    }
    #content li {
      margin-bottom: 0.8rem;
    }
    .sidebar {
      position: fixed;
      right: -300px;
      top: 0;
      width: 300px;
      height: 100vh;
      background: white;
      overflow-y: auto;
      z-index: 90;
      box-shadow: -2px 0 8px rgba(0,0,0,0.2);
      transition: right var(--transition);
      padding-top: 80px;
    }
    .sidebar.active { right: 0; }
    .sidebar h3 {
      padding: 1rem 1.5rem;
      color: var(--accent);
      border-bottom: 2px solid var(--border-color);
      font-size: 1.1rem;
    }
    .sidebar ul { list-style: none; }
    .sidebar li { border-bottom: 1px solid var(--border-color); }
    .sidebar a {
      display: block;
      padding: 1rem 1.5rem;
      color: var(--text-primary);
      text-decoration: none;
      transition: var(--transition);
      cursor: pointer;
    }
    .sidebar a:hover,
    .sidebar a.active {
      background: var(--bg-primary);
      color: var(--accent);
      padding-right: 2rem;
    }
    .settings-panel {
      position: fixed;
      left: -350px;
      top: 0;
      width: 350px;
      height: 100vh;
      background: white;
      overflow-y: auto;
      z-index: 90;
      box-shadow: 2px 0 8px rgba(0,0,0,0.2);
      transition: left var(--transition);
      padding: 80px 1.5rem 2rem;
    }
    .settings-panel.active { left: 0; }
    .setting-group {
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border-color);
    }
    .setting-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.8rem;
      color: var(--accent);
    }
    .theme-swatches {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.8rem;
    }
    .swatch {
      width: 100%;
      padding: 0.8rem;
      border: 3px solid transparent;
      border-radius: 4px;
      cursor: pointer;
      transition: var(--transition);
      font-size: 0.9rem;
      text-align: center;
      font-weight: 600;
    }
    .swatch.light { background: #f8f4ef; color: #1c1007; }
    .swatch.dark { background: #222; color: #f8f4ef; }
    .swatch.sepia { background: #faf5ed; color: #5a4a42; }
    .swatch.sand { background: #e8daa5; color: #4a4a4a; }
    .swatch.active {
      border-color: var(--accent);
      transform: scale(1.05);
    }
    .font-controls {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      justify-content: space-between;
    }
    .font-controls button { padding: 0.5rem 1rem; font-size: 1rem; }
    .controls-row {
      display: flex;
      gap: 0.8rem;
      align-items: center;
      margin-bottom: 1rem;
    }
    .controls-row input[type="range"] { flex: 1; cursor: pointer; }
    select {
      width: 100%;
      padding: 0.6rem;
      border: 1px solid var(--border-color);
      border-radius: 4px;
      font-family: var(--font-family);
      font-size: 0.95rem;
      cursor: pointer;
      background: white;
      color: var(--text-primary);
    }
    .color-picker-group {
      display: flex;
      gap: 1rem;
    }
    input[type="color"] {
      width: 50px;
      height: 40px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .reset-btn {
      width: 100%;
      background: #e74c3c;
      border-color: #e74c3c;
      padding: 0.8rem;
    }
    .reset-btn:hover { background: #c0392b; }
    .toast {
      position: fixed;
      bottom: -100px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--accent);
      color: white;
      padding: 1rem 2rem;
      border-radius: 6px;
      box-shadow: var(--shadow);
      z-index: 200;
      transition: bottom var(--transition);
      max-width: 90%;
      text-align: center;
    }
    .toast.show { bottom: 2rem; }
    .autosave-indicator {
      position: fixed;
      bottom: 2rem;
      left: 2rem;
      font-size: 0.8rem;
      color: var(--text-secondary);
      opacity: 0;
      transition: opacity var(--transition);
    }
    .autosave-indicator.active { opacity: 1; }
    @media (max-width: 768px) {
      .container { padding: 2rem 1rem; }
      #content { padding: 1.5rem 1rem; }
      header { flex-direction: column; text-align: center; }
      .header-title { width: 100%; }
      .header-controls { width: 100%; justify-content: center; }
      .sidebar, .settings-panel { width: 280px; }
    }
    body.dark {
      --bg-primary: #1a1a1a;
      --text-primary: #e0e0e0;
      --text-secondary: #b0b0b0;
      --border-color: #333;
    }
    body.dark #content,
    body.dark .sidebar,
    body.dark .settings-panel,
    body.dark select { background: #2a2a2a; }
    body.sepia {
      --bg-primary: #faf5ed;
      --text-primary: #5a4a42;
      --accent: #8b6f47;
    }
    body.sand {
      --bg-primary: #e8daa5;
      --text-primary: #4a4a4a;
      --accent: #a0826d;
    }
  </style>
</head>
<body>
  <div id="progress-bar"></div>
  <header>
    <div class="header-title">بأسمائه نحيا</div>
    <div class="header-controls">
      <button id="chapters-btn">📖 الفصول</button>
      <button id="settings-btn">⚙️ الإعدادات</button>
      <button id="continue-btn">▶️ استمرار</button>
    </div>
  </header>

  <sidebar class="sidebar" id="sidebar">
    <h3>📖 الفصول</h3>
    <ul id="chapters-list"></ul>
  </sidebar>

  <div class="settings-panel" id="settings">
    <h3>⚙️ الإعدادات</h3>
    <div class="setting-group">
      <label>المظهر</label>
      <div class="theme-swatches">
        <div class="swatch light active" data-theme="light">فاتح</div>
        <div class="swatch dark" data-theme="dark">غامق</div>
        <div class="swatch sepia" data-theme="sepia">سيبيا</div>
        <div class="swatch sand" data-theme="sand">رملي</div>
      </div>
    </div>
    <div class="setting-group">
      <label>الخط</label>
      <select id="font-select">
        <option value="Amiri, serif">Amiri (أميري)</option>
        <option value="Cairo, sans-serif">Cairo (قاهرة)</option>
        <option value="Tajawal, sans-serif">Tajawal (تجوال)</option>
        <option value="Noto Naskh Arabic, serif">Noto Naskh (نسخ)</option>
      </select>
    </div>
    <div class="setting-group">
      <label>حجم الخط</label>
      <div class="font-controls">
        <button id="font-decrease">−</button>
        <span id="font-size-display">18px</span>
        <button id="font-increase">+</button>
      </div>
    </div>
    <div class="setting-group">
      <label>ارتفاع السطر</label>
      <div class="controls-row">
        <input type="range" id="line-height-slider" min="1.5" max="3" step="0.1" value="2.0">
        <span id="line-height-display">2.0</span>
      </div>
    </div>
    <div class="setting-group">
      <label>الألوان</label>
      <div class="color-picker-group">
        <div>
          <label style="font-size: 0.8rem;">النص</label>
          <input type="color" id="text-color" value="#1c1007">
        </div>
        <div>
          <label style="font-size: 0.8rem;">الخلفية</label>
          <input type="color" id="bg-color" value="#f8f4ef">
        </div>
      </div>
    </div>
    <button class="reset-btn" id="reset-btn">إعادة تعيين</button>
  </div>

  <div class="container">
    <div id="content"></div>
  </div>

  <div class="toast" id="toast"></div>
  <div class="autosave-indicator" id="autosave-indicator">✓ تم الحفظ</div>

  <script>
    const chapters = [
      { id: 'chapter-1', title: 'المقدمة' },
      { id: 'chapter-2', title: 'منهجية العمل' },
      { id: 'chapter-3', title: 'لماذا نعرف الله بأسمائه' },
      { id: 'chapter-4', title: 'لماذا هذا الكتاب' },
      { id: 'chapter-5', title: 'تنبيه وإخلاء حق' }
    ];

    const content = {
      'chapter-1': '<h1>المقدمة</h1><h2>بسم الله الرحمن الرحيم</h2><p>كيف تبدأ الحديث عن من لا بداية له…؟ وكيف تصف من لا يُدرك كُنهه عقل، ولا يُحيط بجماله خيال…؟</p><p>لكنّ الله… هو الذي أمرنا أن ندعوه بأسمائه، وأخبرنا أن له الأسماء الحسنى، وأنها ليست زينة لغوية، ولا صفات نظرية، بل هي أبواب القرب، ومفاتيح الفهم، وجسور العبور إليه سبحانه.</p><p>ولأني – كغيري – تعبتُ كثيرًا من جفاف المعلومة، ومن الخطاب الذي يشرح أسماء الله كما تُشرح المصطلحات، كتبت هذا الكتاب… كتبتُه للقلب… قبل العقل، وللخلوة… قبل الدرس، وللمناجاة… قبل الدراسة.</p><p>في كل مرةٍ يضيق فيها صدري، كنتُ أبحث عن اسمٍ من أسمائه… فإذا ضاقت الأرض، ناديتُه بـ الواسع، وإذا ضللت الطريق، ناديتُه بـ الهادي، وإذا أثقلني الذنب، لجأتُ إلى الغفور، الستّير، التواب.</p><p>بأسمائه نحيا… لا نحيا فقط بالجسد، ولا بالتخطيط، ولا بالعلاقات… بل نحيا حين نعرف من هو الله… ونعرفه كما وصف نفسه، لا كما تَصوّره الناس.</p>',
      'chapter-2': '<h1>منهجية العمل في هذا الكتاب</h1><p>هذا الكتاب ليس مجرد عرض لأسماء الله الحسنى، بل هو رحلة تربوية معرفية قلبية، تسير في ضوء الأسماء، لتربطك بالله معرفةً، ومحبةً، وعبادةً، وسلوكًا، ومناجاةً.</p><h2>البناء المعتمد لكل اسم</h2><p>كل اسم إلهي في هذا الكتاب تمت معالجته بمنهج متكامل يتضمن:</p><ul><li><strong>العنوان التأملي:</strong> يقدم الاسم بأسلوب وجداني أدبي</li><li><strong>المعنى اللغوي والشرعي:</strong> تحليل دقيق للأصل والمعنى</li><li><strong>وروده في القرآن الكريم:</strong> المواضع والسياقات</li><li><strong>الفرق بينه وبين الأسماء المشابهة:</strong> إبراز الفروق الدقيقة</li><li><strong>أثر الاسم في القلب والسلوك:</strong> التطبيق العملي</li><li><strong>مشهد من السيرة:</strong> موقف يجسد الاسم</li><li><strong>دعاء خاص:</strong> مستلهم من الاسم</li><li><strong>تصحيح المفاهيم:</strong> معالجة الانحرافات الشائعة</li></ul>',
      'chapter-3': '<h1>لماذا نعرف الله بأسمائه؟</h1><p>لأن أعظم علمٍ على وجه الأرض هو العلم بالله، قال ابن القيم رحمه الله: "أفضل ما اكتسبته القلوب، وتنافس فيه المتنافسون، هو معرفة الله بأسمائه وصفاته."</p><p>فمن عرفه… أحبه، ومن أحبه… خافه، ورجاه، وتوكّل عليه، ولم يُعرض عنه طرفة عين.</p><h2>أهمية المعرفة</h2><p><strong>الإيمان بالله:</strong> الإيمان بالله هو أول أركان الإيمان، وأعظم ما يُعرف به الله: أسماؤه وصفاته.</p><p><strong>النجاة والفلاح:</strong> قال النبي ﷺ: "إن لله تسعةً وتسعين اسمًا، مَن أحصاها دخل الجنة" رواه البخاري ومسلم.</p><p><strong>طريق المحبة:</strong> معرفة أسمائه هي الطريق الحقيقي إلى محبة الله وخشيته.</p><p><strong>التوازن النفسي:</strong> من عرف أن الله الرحيم الودود القريب لم ييأس، ومن عرف أنه العليم الحكيم الرقيب استقام على طاعته.</p>',
      'chapter-4': '<h1>لماذا هذا الكتاب؟</h1><p>كُتب هذا الكتاب بدافع حبٍ وخشية وأمل، حب للقرآن وأسماء الله، وخشية من أن يمرّ القارئ على هذه الأسماء دون أن يعيش بها، وأمل في أن يعود الناس إلى التأمل العميق.</p><h2>المشكلة التي واجهتنا</h2><p>لقد لاحظت أن معظم كتب الأسماء الحسنى تركز على الجانب العلمي والنظري فقط، فتقدم الاسم كمعلومة تُحفظ، وليس كباب حب وقرب من الله.</p><h2>رؤيتي للحل</h2><p>جاء هذا الكتاب كمحاولة جادة لتقديم أسماء الله بطريقة مختلفة:</p><ul><li>تخاطب القلب قبل العقل</li><li>تجمع بين العلم والعمل</li><li>تربط بين التأمل والسلوك</li><li>تفتح باب الدعاء والمناجاة</li><li>تُغني الحياة، لا تُثقلها بالمعلومات</li></ul>',
      'chapter-5': '<h1>تنبيه وإخلاء حق</h1><h2>انتقاء الأسماء</h2><p>هذا الجزء الأول من الكتاب يركز على أسماء الله التي يغلب عليها طابع الجمال والرحمة. هذا الاختيار قصدي وليس شاملاً لكل الأسماء الحسنى.</p><h2>عدم ادعاء العصمة</h2><p>كاتب هذا الكتاب كتبه بنية خالصة، محاولاً بكل صدق تقديم أسماء الله بطريقة تقرب القارئ من ربه. لكن لا أدعي العصمة، ولا أدعي أنني أفهم أسماء الله أفضل من سلفنا الصالح.</p><h2>الأمانة العلمية</h2><p>من اقتبس أو استفاد من محتويات هذا الكتاب، فليشر إلى المصدر، احترامًا للأمانة العلمية، وحقوق المؤلف.</p><p style="text-align: center; margin-top: 2rem;">✍ دريد إبراهيم الموصلي</p>'
    };

    const storage = {
      set: (key, data) => { try { localStorage.setItem('almasa_' + key, JSON.stringify(data)); } catch (e) {} },
      get: (key) => { try { const item = localStorage.getItem('almasa_' + key); return item ? JSON.parse(item) : null; } catch (e) { return null; } }
    };

    let currentChapter = 'chapter-1';
    let scrollTimeout;
    let lastRestoreSignature = '';

    const getBlocks = () =>
      Array.from(document.querySelectorAll('#content p, #content h1, #content h2, #content h3, #content li, #content blockquote, #content td'))
        .filter(el => el.textContent.trim().length > 3);

    const indexBlocks = () => {
      getBlocks().forEach((el, i) => el.setAttribute('data-reading-block', i));
    };

    const findCurrentBlock = () => {
      const blocks = getBlocks();
      if (!blocks.length) return -1;
      const viewMid = window.innerHeight * 0.35;
      let best = null, bestDist = Infinity;
      blocks.forEach(el => {
        const rect = el.getBoundingClientRect();
        if (rect.bottom < 0 || rect.top > window.innerHeight) return;
        const dist = Math.abs(rect.top - viewMid);
        if (dist < bestDist) {
          best = el;
          bestDist = dist;
        }
      });
      return best ? parseInt(best.getAttribute('data-reading-block') || '0', 10) : 0;
    };

    const saveReadingPosition = () => {
      const block = findCurrentBlock();
      const payload = { block, y: window.scrollY || 0, ts: Date.now() };
      storage.set('pos_' + currentChapter, payload);
      const ind = document.getElementById('autosave-indicator');
      if (ind) {
        ind.classList.add('active');
        setTimeout(() => ind.classList.remove('active'), 1500);
      }
    };

    const restoreReadingPosition = (id, force = false) => {
      const saved = storage.get('pos_' + id);
      if (!saved) return;
      const signature = `${saved.block ?? ''}:${saved.y ?? 0}`;
      if (!force && signature === lastRestoreSignature) return;
      lastRestoreSignature = signature;

      const blocks = getBlocks();
      const target = typeof saved.block === 'number' ? blocks[saved.block] : null;
      if (target) {
        const top = target.getBoundingClientRect().top + window.scrollY - 100;
        window.scrollTo(0, Math.max(0, top));
        return;
      }
      if (typeof saved.y === 'number') {
        window.scrollTo(0, Math.max(0, saved.y));
      }
    };

    const restoreReadingPositionRepeatedly = (id) => {
      [0, 100, 300, 700, 1200, 2000, 3500].forEach(delay => {
        setTimeout(() => restoreReadingPosition(id, delay === 0), delay);
      });
      requestAnimationFrame(() => requestAnimationFrame(() => restoreReadingPosition(id, true)));
    };

    const loadChapter = (id) => {
      currentChapter = id;
      document.getElementById('content').innerHTML = content[id] || 'خطأ في التحميل';
      indexBlocks();
      restoreReadingPositionRepeatedly(id);
      document.querySelectorAll('#chapters-list a').forEach(a => a.classList.toggle('active', a.dataset.chapter === id));
      document.getElementById('sidebar').classList.remove('active');
      storage.set('lastChapter', id);
    };

    const renderChapters = () => {
      const list = document.getElementById('chapters-list');
      list.innerHTML = chapters.map((ch, idx) => 
        `<li><a href="#" data-chapter="${ch.id}" class="chapter-link">${idx + 1}. ${ch.title}</a></li>`
      ).join('');
      list.addEventListener('click', (e) => {
        if (e.target.classList.contains('chapter-link')) {
          e.preventDefault();
          loadChapter(e.target.dataset.chapter);
        }
      });
    };

    const applySettings = (settings) => {
      const root = document.documentElement;
      root.style.setProperty('--font-family', settings.font);
      root.style.setProperty('--font-size', settings.fontSize + 'px');
      root.style.setProperty('--line-height', settings.lineHeight);
      root.style.setProperty('--text-primary', settings.textColor);
      root.style.setProperty('--bg-primary', settings.bgColor);
      document.body.className = settings.theme;
      document.getElementById('font-select').value = settings.font;
      document.getElementById('font-size-display').textContent = settings.fontSize + 'px';
      document.getElementById('line-height-display').textContent = settings.lineHeight.toFixed(1);
      document.getElementById('line-height-slider').value = settings.lineHeight;
      document.getElementById('text-color').value = settings.textColor;
      document.getElementById('bg-color').value = settings.bgColor;
      document.querySelectorAll('.swatch').forEach(s => s.classList.toggle('active', s.dataset.theme === settings.theme));
    };

    window.addEventListener('DOMContentLoaded', () => {
      renderChapters();
      const saved = storage.get('settings') || {};
      const settings = { theme: 'light', font: 'Amiri, serif', fontSize: 18, lineHeight: 2.0, textColor: '#1c1007', bgColor: '#f8f4ef', ...saved };
      applySettings(settings);

      document.getElementById('chapters-btn').addEventListener('click', () => document.getElementById('sidebar').classList.toggle('active'));
      document.getElementById('settings-btn').addEventListener('click', () => document.getElementById('settings').classList.toggle('active'));
      document.getElementById('continue-btn').addEventListener('click', () => {
        const last = storage.get('lastChapter') || 'chapter-1';
        loadChapter(last);
      });

      document.querySelectorAll('.swatch').forEach(s => {
        s.addEventListener('click', () => {
          document.body.className = s.dataset.theme;
          document.querySelectorAll('.swatch').forEach(x => x.classList.remove('active'));
          s.classList.add('active');
          settings.theme = s.dataset.theme;
          storage.set('settings', settings);
        });
      });

      document.getElementById('font-select').addEventListener('change', (e) => {
        document.documentElement.style.setProperty('--font-family', e.target.value);
        settings.font = e.target.value;
        storage.set('settings', settings);
      });

      document.getElementById('font-increase').addEventListener('click', () => {
        const cur = parseInt(document.getElementById('font-size-display').textContent);
        const newSize = Math.min(cur + 2, 32);
        document.getElementById('font-size-display').textContent = newSize + 'px';
        document.documentElement.style.setProperty('--font-size', newSize + 'px');
        settings.fontSize = newSize;
        storage.set('settings', settings);
      });

      document.getElementById('font-decrease').addEventListener('click', () => {
        const cur = parseInt(document.getElementById('font-size-display').textContent);
        const newSize = Math.max(cur - 2, 12);
        document.getElementById('font-size-display').textContent = newSize + 'px';
        document.documentElement.style.setProperty('--font-size', newSize + 'px');
        settings.fontSize = newSize;
        storage.set('settings', settings);
      });

      document.getElementById('line-height-slider').addEventListener('input', (e) => {
        document.getElementById('line-height-display').textContent = parseFloat(e.target.value).toFixed(1);
        document.documentElement.style.setProperty('--line-height', e.target.value);
        settings.lineHeight = parseFloat(e.target.value);
        storage.set('settings', settings);
      });

      document.getElementById('text-color').addEventListener('change', (e) => {
        document.documentElement.style.setProperty('--text-primary', e.target.value);
        settings.textColor = e.target.value;
        storage.set('settings', settings);
      });

      document.getElementById('bg-color').addEventListener('change', (e) => {
        document.documentElement.style.setProperty('--bg-primary', e.target.value);
        settings.bgColor = e.target.value;
        storage.set('settings', settings);
      });

      document.getElementById('reset-btn').addEventListener('click', () => {
        localStorage.clear();
        location.reload();
      });

      loadChapter('chapter-1');

      window.addEventListener('scroll', () => {
        const st = window.scrollY;
        const dh = document.documentElement.scrollHeight - window.innerHeight;
        document.getElementById('progress-bar').style.width = (dh > 0 ? (st / dh) * 100 : 0) + '%';

        clearTimeout(scrollTimeout);
        scrollTimeout = setTimeout(() => {
          saveReadingPosition();
        }, 2000);
      });

      window.addEventListener('beforeunload', saveReadingPosition);
      window.addEventListener('pagehide', saveReadingPosition);
      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'hidden') saveReadingPosition();
      });

      let lastScrollTop = 0;
      const header = document.querySelector('header');
      window.addEventListener('scroll', () => {
        const scrollTop = window.scrollY;
        if (scrollTop > lastScrollTop + 50) {
          header.classList.add('hide');
        } else if (scrollTop < lastScrollTop - 50) {
          header.classList.remove('hide');
        }
        if (scrollTop < 100) {
          header.classList.remove('hide');
        }
        lastScrollTop = scrollTop;
      });
    });
  </script>
</body>
</html>
