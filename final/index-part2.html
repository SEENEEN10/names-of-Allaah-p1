<p dir="rtl" class="p1"><b>النتيجة:</b></p>
<p dir="rtl" class="p1">من عاش مع اسم <span class="s8"><b>ٱلْعَزِيزُ</b></span>، صار عزيز النفس، عفيف القلب، قوي الهمة<br>
ومن عاش مع اسم <span class="s8"><b>ٱلْجَبَّارُ</b></span>، صار ثابتًا عند المصائب، واثقًا في الجبر، لا تكسره الحياة</p>
<p dir="rtl" class="p19"><br></p>
<p dir="rtl" class="p24"><b>مشهد الهجرة النبوية... حين نام عليٌّ رضي الله عنه في فراش النبي ﷺ</b></p>
<p dir="rtl" class="p1"><b>الرواية الصحيحة:</b></p>
<p dir="rtl" class="p1">ثبت في كتب السيرة (ابن هشام وابن سعد) والسُّنن والصِّحاح، أنَّ النبي ﷺ حين اشتد أذى قريش، أذن له الله بالهجرة، وكانت قريش قد اجتمعت لقتل النبي في فراشه ليلًا، فنزل عليه جبريل عليه السلام يأمره بالخروج فورًا، وأمر النبي ﷺ عليًّا أن يبيت مكانه ليردّ الأمانات، ثم خرج ﷺ من بينهم وهو يقرأ:<span class="s15"> ﴿وَجَعَلۡنَا مِنۢ بَيۡنِ أَيۡدِيهِمۡ سَدّٗا وَمِنۡ خَلۡفِهِمۡ سَدّٗا فَأَغۡشَيۡنَٰهُمۡ فَهُمۡ لَا يُبۡصِرُونَ﴾</span><span class="s13"> </span><span class="s12">يس: ٩ </span>وخرج أمام أعينهم، فلم يروه!..</p>
<p dir="rtl" class="p1"><b>تجلي اسم </b><span class="s8"><b>ٱلْعَزِيزُ</b></span><b>:</b></p>
<p dir="rtl" class="p1">كانت قريش في عِزّها وسُلطانها وجبروتها، تنتظر لحظة الانتقام من رجلٍ واحد! لكن <span class="s8"><b>ٱلْعَزِيز </b></span>سبحانه أذلّهم جميعًا بلحظة، وأخفى نبيَّه من أعين أربعين فارسًا مُدجّجًا بالسلاح.</p>
<p dir="rtl" class="p1">لا يغلب العزيزُ أحد… بل يغلب الجمعَ القوي بعبدٍ مؤمن خرج وحده في الظلام.</p>
<p dir="rtl" class="p46"><span class="s9"><b>تجلي اسم </b></span><b>ٱلْجَبَّارُ</b><span class="s9"><b>:</b></span></p>
<p dir="rtl" class="p1">الجبّار هو الذي يجبر الخائف… ويرفع المكسور، والنبي ﷺ خرج خائفًا حذرًا، بين الحياة والموت، لكنه خرج بأمر الجبّار… فكان الجبر في كل خطوة:</p>
<p dir="rtl" class="p36">أنام أعينهم فخرج ولم يروه.</p>
<p dir="rtl" class="p36">دلّهم سراقة على أثره… فأغرق فرسه في الرمال.</p>
<p dir="rtl" class="p36">ووصله أهل المدينة بالحب والأنصار بعد الوحشة والخذلان.</p>
<p dir="rtl" class="p1">هذا هو الجبّار… يهيّئ لك جبرًا في كل عثرة، وسندًا في كل انكسار.</p>
<p dir="rtl" class="p1"><b>الخلاصة التربوية:</b></p>
<p dir="rtl" class="p1">حين تُظلم، ويجتمع عليك الناس… ثق أن <span class="s8"><b>ٱلْعَزِيزُ</b></span> لا يُقهَر، و<span class="s8"><b>ٱلْجَبَّارُ</b></span> لا يترك من احتمى به.</p>
<p dir="rtl" class="p1">وقد تخرج خائفًا، بلا أحد… لكنك إن خرجت لله، خرجت بالعزيز والجبار معك.</p>
<p dir="rtl" class="p14"><b>خاطرة: حين نام عليٌّ… وسار محمد</b> ﷺ<b>، كان العزيز والجبار معهما</b></p>
<p dir="rtl" class="p1">في تلك الليلة… كانت قريش تبيت على الغدر، تُحكم قبضتها، وتُراهن على أن لا مفرّ.</p>
<p dir="rtl" class="p1">أربعون فارسًا، وسيوف تنتظر الإشارة… وبيت صغير في مكة، يرقد فيه فتى، ويخرج منه نبيٌّ… وحده، دون سلاح، إلا سلاح القلب: الثقة في الله.</p>
<p dir="rtl" class="p1">لكنّهم نسوا من هو ربّه… نسوا أنَّ العزيز إذا أراد، أعمى أبصار الجبابرة، وأن الجبّار إذا شاء، جعل الرمل يُمسك بخيولهم، والأرض تُضلّ آثار أقدامهم، النبي ﷺ لم يهرب… بل خرج بأمر العزيز، خرج مطمئنًا في طريقٍ يُظلّه لطف الله… وإن اشتدّت الشمس، وكل خطوة كانت جبرًا… وكل عثرة، كان الجبّار قد سبقها بلُطفٍ خفي.</p>
<p dir="rtl" class="p1">يا قلب… إن كنتَ يومًا في ضيق لا يُحتمل، وفي خوف لا يُوصَف،<br>
فاذكر من نام على فراش الموت مطمئنًا، ومن خرج وحده، ليسنده العزيز… ويجبره الجبّار.</p>
<p dir="rtl" class="p24"><b>أدعية باسم الله </b><span class="s8"><b>ٱلْعَزِيزُ</b></span><b>:</b></p>
<p dir="rtl" class="p25"><b>دعاء مأثور:</b> " اللَّهُمَّ إِنِّي أَعُوذُ بِعِزَّتِكَ، لَا إِلَهَ إِلَّا أَنْتَ، أَنْ تُضِلَّنِي، أَنْتَ الْحَيُّ الَّذِي لَا يَمُوتُ، وَالْجِنُّ وَالْإِنْسُ يَمُوتُونَ " رواه مسلم عن أبي هريرة رضي الله عنه<b>.</b></p>
<p dir="rtl" class="p1">ما أجمل هذا الدعاء النبوي، وما أعمق المعاني التي تنبعث منه…<br>
تعالوا نتأمله معًا بنَفَسٍ روحيٍّ وتربوي، لنفهم لماذا قال النبي ﷺ: "اللَّهُمَّ إِنِّي أَعُوذُ بِعِزَّتِكَ…"؟</p>
<p dir="rtl" class="p1"><b>الرسالة التأملية العميقة والتربوية لهذا الدعاء</b></p>
<p dir="rtl" class="p1">حين يقول العبد: "اللَّهُمَّ إِنِّي أَعُوذُ بِعِزَّتِكَ…" فهو لا يلتجئ إلى شيء من مخلوقات الله، ولا إلى قوّة في نفسه، بل يرتمي بكليّته في عزّة الله… العزّة التي لا يغلبها أحد، ولا يقترب منها الخلل، ولا تضعف أبدًا.</p>
<p dir="rtl" class="p1">إنها استعاذة بصفته العُظمى لا بذاته فقط، كأنه يقول: يا من لا يُغلب، ولا يُذلّ، ولا يُدنى جنابه… أعِذْ عبدًا ضعيفًا، قد تُغويه شهوة، أو تُعميه فتنة، أو تلتبس عليه الطريق… وليس له مفرّ إلا إلى عزّتك.</p>
<p dir="rtl" class="p1">ثم يقول: "أَنْ تضلّني…" وهذا هو جوهر الخوف عند أهل الإيمان: ليس الفقر، ولا المرض، بل أن يُسلَب القلب هدايته بعد أن ذاق النور.</p>
<p dir="rtl" class="p1">فالعبد يخاف أن يضلّ لا لضعف حيلته، بل لأن الهداية بيد الله،<br>
لذا، استعاذ بالله بعزّته، لأن من تمسك بها لا يضلّ أبدًا.</p>
<p dir="rtl" class="p1">ثم يختم بعبارة تهزّ القلب: "أَنْتَ الْحَيُّ الَّذِي لَا يَمُوتُ، وَالْجِنُّ وَالْإِنْسُ يَمُوتُونَ" هنا يتجلى التوحيد الكامل… الخلق كلهم فانٍ، زائل، عاجز… لا يُرجى منهم نفعٌ دائم، ولا تُطلب منهم نجاة، لأنهم ببساطة: يموتون.</p>
<p dir="rtl" class="p1">فإذا كنتَ تريد من يُرشدك، من يُبقيك على الطريق، فلا تلجأ إلى بشر، بل إلى الحيّ الذي لا يموت… الذي لا يغيب، ولا ينسى، ولا يتبدّل.</p>
<p dir="rtl" class="p1"><b>الرسالة التربوية:</b></p>
<p dir="rtl" class="p36">الالتجاء الحقيقي لا يكون إلَّا لله… بصفاته العُليا، لا بمكانة العبد.</p>
<p dir="rtl" class="p36">أعظم ما يُخاف في الحياة: الضلال بعد الهداية، لا الخسارة بعد المال.</p>
<p dir="rtl" class="p36">كل من تستند إليهم من الخلق… سيموتون، أو يتغيرون… إلَّا الله.</p>
<p dir="rtl" class="p36">الدعاء ليس فقط طلب نجاة، بل إعلان فقر… وخضوع تام للحيّ العزيز.</p>
<p dir="rtl" class="p1"><b>ماذا نتعلم منه في سلوكنا اليومي؟</b></p>
<p dir="rtl" class="p36">لا تثق بنفسك في مواجهة الفتنة… بل ثق بعزة ربّك.</p>
<p dir="rtl" class="p36">لا تغتر بعلمك أو التزامك… بل خف على قلبك من الضَّلال.</p>
<p dir="rtl" class="p36">إذا خذلك الناس… فتذكّر أنهم يموتون، لكن الله لا يموت.</p>
<p dir="rtl" class="p36">اجعل هذا الدعاء سلاحك عند ضعفك، وعند قوتك… ففي كلتا الحالتين، أنت في حاجة إلى عزة الله.</p>
<p dir="rtl" class="p25"><b>دعاء تأملي:</b> " ٱللَّهُمَّ يَا عَزِيزُ… أَعِزَّنِي بِطَاعَتِكَ، وَلَا تُذِلَّنِي بِمَعْصِيَتِكَ، وَاجْعَلْنِي مِمَّنْ يَرْفَعُهُمُ ٱلْإِيمَانُ، وَلَا تُسْقِطُهُمُ ٱلدُّنْيَا، ٱللَّهُمَّ يَا عَزِيزُ… ٱجْعَلْنِي عَزِيزًا بَيْنَ يَدَيْكَ، وَلَوْ ذَلَّنِي ٱلْخَلْقُ كُلُّهُمْ، وَكُنْ لِي وَلَا تَكُنْ عَلَيَّ، فَإِنَّ مَنْ تَوَلَّاهُ ٱلْعَزِيزُ لَمْ يَذِلَّ أَبَدًا ".</p>
<p dir="rtl" class="p1">هذا الدعاء برغم قِصره يفتح لك بابًا عظيمًا من معرفة الله، ومعرفة النفس، ومعرفة طريق العزة الحقيقي، فتعال نتأمله معًا بنداء القلب والعقل:</p>
<p dir="rtl" class="p1"><b>الرسالة التأملية العميقة لهذا الدعاء</b></p>
<p dir="rtl" class="p1">" ٱللَّهُمَّ يَا عَزِيزُ… أَعِزَّنِي بِطَاعَتِكَ، وَلَا تُذِلَّنِي بِمَعْصِيَتِكَ…" في هذا الموضع، يعترف العبد ضِمنًا أنَّ أعظم أسباب الذلّ… ليست فقر المال، ولا قهر الناس، بل ذنبه هو، فالمعصية تُسقط هيبة النفس، وتُضعف الروح، وتُطفئ نور العزّة في القلب.</p>
<p dir="rtl" class="p1">أما الطاعة… فهي التي تُقيمك بين يدي العزيز عزيزًا، فأنت تطلب هنا عزةً ربانية، لا يراها الناس في مظاهرك، لكن تراها روحك حين تصلي… ووجهك حين تسجد… وضميرك حين تُبتلى.</p>
<p dir="rtl" class="p1">" ٱجْعَلْنِي مِمَّنْ يَرْفَعُهُمُ ٱلْإِيمَانُ، وَلَا تُسْقِطُهُمُ ٱلدُّنْيَا " يا الله… ما أصدق هذا الرجاء! كم من إنسانٍ رفعته الدنيا… ثم أسقطه ضعف الإيمان، وكم من عبدٍ لا يملك شيئًا… لكن في قلبه من العزّة ما يهزّ الجبال، لأنه يعرف الله.</p>
<p dir="rtl" class="p1">أنت لا تطلب هنا رفعة المال، ولا جاه السَّلاطين، بل تسأل أن يكون الإيمان هو الذي يرفعك، لأن من رفعه الإيمان… لم تُسقطه الدنيا حتى لو اجتمعت عليه.</p>
<p dir="rtl" class="p1">" ٱجْعَلْنِي عَزِيزًا بَيْنَ يَدَيْكَ، وَلَوْ ذَلَّنِي ٱلْخَلْقُ كُلُّهُمْ …" هنا يظهر صدق التوحيد… أنت لا تطلب أن تكون عزيزًا في أعين الناس، بل في عين العزيز سبحانه، لأنك تعلم:</p>
<p dir="rtl" class="p36">أن رضا الناس لا يُغني عن ذلّ المعصية.</p>
<p dir="rtl" class="p36">وأن رضا الله يجعلك عزيزًا ولو شتموك، وخذلوك، وتخلّوا عنك.</p>
<p dir="rtl" class="p1">هذه هي العزة الحقيقية… أن تشعر أنك محفوظ عند الله، مقبول، كريم.</p>
<p dir="rtl" class="p1">" وَكُنْ لِي وَلَا تَكُنْ عَلَيَّ، فَإِنَّ مَنْ تَوَلَّاهُ ٱلْعَزِيزُ لَمْ يَذِلَّ أَبَدًا" ، كم من دعاء يُساوي هذا المعنى؟ أن تقول لله: يا رب… كن في صفي، لا تجعلني من الفريق الآخر… أنا لا أحتمل أن أكون خصمًا لك… ولو للحظة، ثم تأتي الجملة الخاتمة… وكأنها خُلاصة حياة كاملة: "فَإِنَّ مَنْ تَوَلَّاهُ ٱلْعَزِيزُ لَمْ يَذِلَّ أَبَدًا."</p>
<p dir="rtl" class="p36">أيُّ قلبٍ يذلّ… وعزيز السماوات والأرض وليّه؟.</p>
<p dir="rtl" class="p36">أيّ طريقٍ يُغلق… ومن بيده مفاتيح العزّة معه؟.</p>
<p dir="rtl" class="p36">أيُّ عبدٍ يُقهر… وربّه هو العزيز الذي لا يُغلب؟.</p>
<p dir="rtl" class="p1"><b>الرسالة التربوية:</b></p>
<p dir="rtl" class="p36">العزّة لا تُطلب من الناس… بل من الله، عبر الطاعة لا عبر الظهور.</p>
<p dir="rtl" class="p36">المعصية تُذلّك ولو لم يرك أحد… والطاعة تُعزّك ولو لم يقدّرك أحد.</p>
<p dir="rtl" class="p36">من رضي أن يذلّ لله… أعزّه الله بين خلقه.</p>
<p dir="rtl" class="p36">تولّي العزيز لك… يكفيك كل ما خذلك، وأسقطك، وخانك.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p24"><b>أدعية باسم الله </b><span class="s8"><b>ٱلْجَبَّارُ</b></span><b>:</b></p>
<p dir="rtl" class="p25"><b>دعاء تأملي:</b> " يَا جَبَّارُ ٱلسَّمَاوَاتِ وَٱلْأَرْضِ… ٱجْبُرْ كَسْرَ قَلْبِي، وَلَا تَكِلْنِي لِعَجْزِي، وَأَقِمْنِي بِلُطْفِكَ فِي مَوَاطِنِ ٱلضَّعْفِ.</p>
<p dir="rtl" class="p1">ٱللَّهُمَّ يَا جَبَّارُ… إِذَا ضَاقَتْ بِيَ ٱلْأَرْضُ، وَانْقَطَعَتِ ٱلْأَسْبَابُ، فَسُقْنِي إِلَيْكَ سَوْقًا جَمِيلًا، وَٱجْبُرْنِي جَبْرًا يَلِيقُ بِجَبَرُوتِكَ وَرَحْمَتِكَ.</p>
<p dir="rtl" class="p1">يَا جَبَّارُ… لَا تُبْقِ فِي قَلْبِي كَسْرًا إِلَّا جَبَرْتَهُ، وَلَا وُجُوعًا إِلَّا رَحِمْتَهُ، وَلَا شَتَاتًا إِلَّا لَمَمْتَهُ.</p>
<p dir="rtl" class="p1">ما أعذب هذا الدعاء، وما أعمق ما فيه من افتقار صادق، وانكسارٍ نبيل، ورجاءٍ فيمن لا يُخيّب من لجأ إليه.</p>
<p dir="rtl" class="p1">تعالوا نتأمله سطرًا سطرًا، لنتذوق معًا الرسالة التأملية العميقة والتربوية التي يحملها هذا الدعاء من اسم الله <span class="s8"><b>ٱلْجَبَّارُ</b></span>:</p>
<p dir="rtl" class="p1"><b>الرسالة التأملية العميقة لدعاء: "</b><span class="s8"><b>يَا جَبَّارُ</b></span><b>..."</b></p>
<p dir="rtl" class="p1"> "يَا جَبَّارُ ٱلسَّمَاوَاتِ وَٱلْأَرْضِ… ٱجْبُرْ كَسْرَ قَلْبِي، وَلَا تَكِلْنِي لِعَجْزِي، وَأَقِمْنِي بِلُطْفِكَ فِي مَوَاطِنِ ٱلضَّعْفِ ."</p>
<p dir="rtl" class="p1">في أول النداء… لا يطلب العبد نصرًا، ولا مالًا، ولا تغييرًا في الظروف… بل يطلب شيئًا لا يراه أحد إلا الله: جبر القلب، لأنك قد تمشي بين الناس بثيابٍ جميلة، وتُخفي قلبًا منكسرًا لا يراه إلَّا الجبّار.</p>
<p dir="rtl" class="p1">ثم تأتي الاستعاذة من النفس: "ولا تكلني لعجزي…" فهو يعلم أن الكسر الحقيقي ليس في الأحداث، بل عند العجز عن مواجهتها، ولذا يسأل الله ألَّا يُسلِّمه إلى نفسه، ويختم هذا السطر بنداء رقيق: " وأقمني بلطفك في مواطن الضعف" فهو لا يطلب أن يكون قويًا دائمًا، بل أن يظل ثابتًا، مرفوعًا بلطف الله حين تضعفه نفسه.</p>
<p dir="rtl" class="p1"> "ٱللَّهُمَّ يَا جَبَّارُ… إِذَا ضَاقَتْ بِيَ ٱلْأَرْضُ، وَانْقَطَعَتِ ٱلْأَسْبَابُ، فَسُقْنِي إِلَيْكَ سَوْقًا جَمِيلًا، وَٱجْبُرْنِي جَبْرًا يَلِيقُ بِجَبَرُوتِكَ وَرَحْمَتِكَ." </p>
<p dir="rtl" class="p1">ما أروع هذا التصوير! حين لا يبقى للعبد سبب… ولا حيلة… ولا مخرج… فهو لا يطلب المعونة فقط، بل أن يُساق إلى الله سوقًا جميلًا، لا إهانة فيه، بل هداية برحمة، إنه رجاء من يعرف ربه، لا يخاف أن يُساق إليه، بل يرجو أن يُؤخذ من يده، ويُرفع إليه في ستر وجلال.</p>
<p dir="rtl" class="p1"><b>ثم تأتي الجملة التي تختصر جوهر اسم "</b><span class="s8"><b>ٱلْجَبَّار</b></span><b>":</b></p>
<p dir="rtl" class="p1">"ٱجْبُرْنِي جَبْرًا يَلِيقُ بِجَبَرُوتِكَ وَرَحْمَتِكَ"، جبر ليس كجبر الناس… جبرٌ لا يُظهرك ضعيفًا، بل يُقيمك قويًّا، جبرٌ لا يُذكّرك بما أعطاك، بل ينسيك ما كسرك.</p>
<p dir="rtl" class="p1"> "يَا جَبَّارُ… لَا تُبْقِ فِي قَلْبِي كَسْرًا إِلَّا جَبَرْتَهُ، وَلَا وُجُوعًا إِلَّا رَحِمْتَهُ، وَلَا شَتَاتًا إِلَّا لَمَمْتَهُ "، هنا تتجلّى أعمق معاني الإنسان: نحن مخلوقات مكسورة بطبيعتها، لا نكتمل إلا بجبر الله، ولا نهدأ إلا برحمته، ولا نلتمّ إلا إذا جمعنا على حبه.</p>
<p dir="rtl" class="p1">"لا تُبقِ كسرًا…" يعني: أنا لا أملك شيئًا أصلحه… فافعل أنت، يا من لا يُعجزه شيء.</p>
<p dir="rtl" class="p1">"ولا وجعًا…" يعني: يا من رحمته أوسع من أوجاعي… داوني برحمتك لا باستحقاقي.</p>
<p dir="rtl" class="p1">"ولا شتاتًا…" يعني: اجمع قلبي، همّي، دعائي، روحي… فيك، لا في الناس.</p>
<p dir="rtl" class="p1"><b>الرسالة التربوية من الدعاء:</b></p>
<p dir="rtl" class="p36">الله تعالى لا يجبر فقط العظم… بل القلوب، والأرواح، واللحظات المنهارة.</p>
<p dir="rtl" class="p36">الجبر الإلهي لا يكون بقوة فظة، بل بلُطفٍ يليق بجلاله.</p>
<p dir="rtl" class="p36">كلما اشتدّ كسرك… اقترب الجبر، لكن لا تطلبه إلَّا ممن يُجبر بلا مَنّ.</p>
<p dir="rtl" class="p36">لا تَخف من أن تنكسر… خَف أن تنكسر بعيدًا عن الجبّار.</p>
<p dir="rtl" class="p36">ليست المشكلة أن تضيق بك الأرض… المشكلة أن تنسى أن لك ربًّا يُجبرك.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p24"><b>دعاء جامع بين الاسمين:</b></p>
<p dir="rtl" class="p1">" ٱللَّهُمَّ يَا عَزِيزُ يَا جَبَّارُ… أَعِذْنِي بِعِزَّتِكَ مِنَ ٱلضَّعْفِ، وَاجْبُرْنِي بِلُطْفِ جَبَرُوتِكَ، وَارْفَعْنِي إِلَيْكَ رَفْعَةً تُغْنِينِي بِكَ، وَتُغْنِيَنِي عَمَّا سِوَاكَ.</p>
<p dir="rtl" class="p1">يَا عَزِيزُ… لَا عِزَّ لِي إِلَّا بِكَ، وَيَا جَبَّارُ… لَا جَبْرَ لِي إِلَّا مِنْكَ، فَكُنْ لِي كَمَا أَنْتَ لِأَوْلِيَائِكَ، وَاجْعَلْنِي فِي حِمَاكَ وَرِضَاكَ ".</p>
<p dir="rtl" class="p1">ما أبهى هذا الدعاء… وما أصدق النَّفَس التوحيدي الذي يسري في كلماته! إنه دعاء من عبد فقير، منكسر، يعلم أن عِزّته لا تُستمد من اسمه، ولا جبره من نَفسه، بل من الله وحده: العزيز الجبار، فلنتأمله معًا، جملةً جملة، في رسالة وجدانية تأملية تربوية:</p>
<p dir="rtl" class="p1"><b>الرسالة التأملية العميقة لدعاء:</b></p>
<p dir="rtl" class="p1">" ٱللَّهُمَّ يَا عَزِيزُ يَا جَبَّارُ… أَعِذْنِي بِعِزَّتِكَ مِنَ ٱلضَّعْفِ، وَاجْبُرْنِي بِلُطْفِ جَبَرُوتِكَ، وَارْفَعْنِي إِلَيْكَ رَفْعَةً تُغْنِينِي بِكَ، وَتُغْنِيَنِي عَمَّا سِوَاكَ ".</p>
<p dir="rtl" class="p1"> "أَعِذْنِي بِعِزَّتِكَ مِنَ ٱلضَّعْفِ…" كأنَّ العبد يقول: يا رب، لا تحرمني العزّة التي تمنعني من الانهيار، من الذنب، من التخاذل… ليس المقصود ضعف الجسد، بل ضعف الإيمان، ضعف العزيمة، ضعف النفس أمام الفتنة.</p>
<p dir="rtl" class="p1">في قلب هذا الدعاء وعي دقيق بأنَّ "الضعف الحقيقي" ليس في اليدين… بل في القلب إذا غفل، وفي الروح إذا خافت.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p1"> "وَٱجْبُرْنِي بِلُطْفِ جَبَرُوتِكَ…" الجمع بين اللُّطف والجبروت هنا إعجازٌ روحيّ: فالله جبّارٌ بقوته، لكنه لا يجبر القلوب بلُغة السَّلاسل، بل بلُغة الرَّحمة.</p>
<p dir="rtl" class="p1"> أنت لا تطلب مجرد جبر… بل جبرًا يليق بمَن هو جبّارٌ لا يُقهر، ومع ذلك لا يكسر قلبًا جاءه باكيًا.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p1"> "وَارْفَعْنِي إِلَيْكَ رَفْعَةً تُغْنِينِي بِكَ …" هذا هو قمّة العزّة والكرامة… أن تطلب الرفعة إليه، لا على الناس، وأن تستغني به، لا بشيء من سواه، من وُفِّق لأن يرضى بالله غِنى… لن يُذله فقد، ولن يُغنيه مال.</p>
<p dir="rtl" class="p1"> "وَتُغْنِيَنِي عَمَّا سِوَاكَ …" ليس المقصود المال فقط، بل الغنى القلبي، والاكتفاء الوجداني، والثقة الإيمانية… أن تقول: يا رب، اجعل حاجتي إليك تُغنيني عن كل تشوّف لعين أحد، أو يد أحد، أو رضا أحد.</p>
<p dir="rtl" class="p1"> "يَا عَزِيزُ… لَا عِزَّ لِي إِلَّا بِكَ، وَيَا جَبَّارُ… لَا جَبْرَ لِي إِلَّا مِنْكَ " هذا اعتراف كامل بالعجز والافتقار، ونفيٌ لكل حول وقوّة من النفس.</p>
<p dir="rtl" class="p1">ما أجمل أن تقولها بقلب صادق: يا رب… ما عدتُّ أبحث عن عِزّة من لقب أو مركز، ولا عن جبرٍ من علاقاتٍ أو وعود… أنت وحدك عِزّتي إن أُهنت، وجبري إن انكسرت.</p>
<p dir="rtl" class="p1"> "فَكُنْ لِي كَمَا أَنْتَ لِأَوْلِيَائِكَ، وَاجْعَلْنِي فِي حِمَاكَ وَرِضَاكَ "... هنا القمّة في التوسل: أن تقول: يا رب، لا أستحق، لكني أطمع أن تعاملني كما تعامل أحبابك، المقرّبين إليك…</p>
<p dir="rtl" class="p1">فلا تُخرجني من حماك… ولا تحرمني من ظلال رضاك… فأنا في رحابك أجد نفسي، وأستعيد قلبي، وأرتفع حتى لو سقطت الدنيا كلّها من حولي.</p>
<p dir="rtl" class="p1"><b>الرسالة التربوية:</b></p>
<p dir="rtl" class="p36">العزّة ليست رفعة ظاهرة، بل قوة قلب يعرف قدر ربّه.</p>
<p dir="rtl" class="p36">الجبر الإلهي لا يكون بالقهر، بل بلُطفٍ عجيب يليق بجلال الجبّار.</p>
<p dir="rtl" class="p36">أغنى الناس… من استغنى بالله، لا بمنصب، ولا بشهرة، ولا بمخلوق.</p>
<p dir="rtl" class="p36">من عرف أنَّ العزيز والجبار هو وليه… عاش مُطمئنًا، كريمًا، عزيزًا، ولو تخلّى عنه الجميع.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p24"><b>الإنحرافات العقدية مع التصحيح</b></p>
<p dir="rtl" class="p1"><b>أولًا: الانحرافات حول اسم الله "ٱلْعَزِيزُ"</b></p>
<p dir="rtl" class="p52"><b>الانحرافات العقدية:</b></p>
<p dir="rtl" class="p36">ظنّ أن العِزّة لله فقط في مقام القهر والتعذيب وكأنَّ اسم "العزيز" يُستخدم فقط للتخويف.</p>
<p dir="rtl" class="p1"><b>الانحراف</b>: تصوير اسم الله من زاوية واحدة فقط… يُخلّ بجمال معناه وكماله</p>
<p dir="rtl" class="p1"><b>التصحيح</b>: العزّة الإلهية تشمل:</p>
<p dir="rtl" class="p25">قهر الأعداء.</p>
<p dir="rtl" class="p25">حفظ الأولياء.</p>
<p dir="rtl" class="p25">منع الضرر.</p>
<p dir="rtl" class="p25">رفع أهل الطاعة.</p>
<p dir="rtl" class="p34"><span class="s1">قال الله تعالى: </span>﴿يَقُولُونَ لَئِن رَّجَعۡنَآ إِلَى ٱلۡمَدِينَةِ لَيُخۡرِجَنَّ ٱلۡأَعَزُّ مِنۡهَا ٱلۡأَذَلَّۚ وَلِلَّهِ ٱلۡعِزَّةُ وَلِرَسُولِهِۦ وَلِلۡمُؤۡمِنِينَ وَلَٰكِنَّ ٱلۡمُنَٰفِقِينَ لَا يَعۡلَمُونَ﴾<span class="s13"> </span><span class="s14">المنافقون: ٨</span><span class="s1">.</span></p>
<p dir="rtl" class="p36">الخلط بين عزة الله وعزة المخلوق: البعض يظن أن "العزيز" مثل البشر: يتكبر، لا يُسأل، لا يرحم.</p>
<p dir="rtl" class="p1"><b>التصحيح</b>: عزّة الله كمال وجلال ورحمة، وهي لا تُشبه عزّة المخلوقين المتكبّرين.</p>
<p dir="rtl" class="p25">عزيز لكنه رحيم.</p>
<p dir="rtl" class="p25">قوي لكنه لطيف.</p>
<p dir="rtl" class="p25">رفيع لكنه قريب.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p52"><b>الانحرافات السُّلوكية:</b></p>
<p dir="rtl" class="p36">طلب العزّة من غير الله: كمن يذلّ نفسه لشهرة أو مال أو مخلوق، يظن أن العزّة تأتي من الناس.</p>
<p dir="rtl" class="p1"><b>التصحيح</b>: قال تعالى: <span class="s15">﴿مَن كَانَ يُرِيدُ ٱلۡعِزَّةَ فَلِلَّهِ ٱلۡعِزَّةُ جَمِيعًاۚ إِلَيۡهِ يَصۡعَدُ ٱلۡكَلِمُ ٱلطَّيِّبُ وَٱلۡعَمَلُ ٱلصَّٰلِحُ يَرۡفَعُهُۥۚ وَٱلَّذِينَ يَمۡكُرُونَ ٱلسَّيِّـَٔاتِ لَهُمۡ عَذَابٞ شَدِيدٞۖ وَمَكۡرُ أُوْلَٰٓئِكَ هُوَ يَبُورُ﴾</span><span class="s13"> </span><span class="s12">فاطر: ١٠</span>، ومن طلب العزّة من غير الله، أذلّه الله.</p>
<p dir="rtl" class="p36">التكبّر باسم "العزّة الإيمانية": فيظن العبد أنه عزيز لأنه "ملتزم"، فينظر باحتقار لغيره.</p>
<p dir="rtl" class="p1"><b>التصحيح</b>: العزّة لا تُجيز الغرور… بل تورث تواضعًا أكبر وشكرًا أعمق، لأن الله هو من أعزّك.</p>
<p dir="rtl" class="p1"><br>
<b>ثانيًا: الانحرافات حول اسم الله "</b><span class="s8"><b>ٱلْجَبَّارُ</b></span><b>":</b></p>
<p dir="rtl" class="p52"><b>الانحرافات العقدية:</b></p>
<p dir="rtl" class="p36">حصر "ٱلْجَبَّار" في معنى القهر فقط: يظن البعض أن الجبّار هو: "المنتقم، أو المدمّر، القاسي... الخ استغفر الله …"فقط.</p>
<p dir="rtl" class="p1"><b>التصحيح</b>: الجبّار في أسماء الله يختلف عن "الجبّار" في صفات البشر، هو الذي:</p>
<p dir="rtl" class="p25">يجبر المنكسرين</p>
<p dir="rtl" class="p25">يقهر الظالمين</p>
<p dir="rtl" class="p25">يرفع المظلومين</p>
<p dir="rtl" class="p1">قال ابن القيم: "هو جابر كسير، قاهر كلّ جبّار عنيد."</p>
<p dir="rtl" class="p36">رفض صفة "الجَبْر" لأن فيها "إكراه": بعض المتكلّمين والفلاسفة يرفضون "الجبّار" لأنهم يظنونها تتعارض مع حرية الإنسان.</p>
<p dir="rtl" class="p1"><b>التصحيح</b>: جَبْر الله لا يُلغي مسؤولية العبد، بل يُجري مشيئته بعلمه، ويُبقي للعبد اختياره ضمن حدود إرادته الكونية، هو جَبْر بحكمة، لا بإجبارٍ قسري لا رحمة فيه.</p>
<p dir="rtl" class="p52"><b>الانحرافات السلوكية:</b></p>
<p dir="rtl" class="p36">الفرار من الله عند الانكسار: البعض إذا انكسر قلبه أو فشل، يظن أن الله تركه، أو أن الجبار يقسو عليه.</p>
<p dir="rtl" class="p1"><b>التصحيح</b>: الجبّار هو الملاذ الأول عند الكسر، لا مصدر الكسر، هو من يجبرك حين يعجز الناس، لا من يزيدك انكسارًا.</p>
<p dir="rtl" class="p36">الاعتداء على الناس باسم "الجَبَرُوت:" بعض أصحاب السلطة أو العلم يُعامِلون الناس بجفاء وكِبر، كأنهم "جبابرة باسم الدين".</p>
<p dir="rtl" class="p1"><b>التصحيح</b>: من عرف الجبّار… تواضع، ومن أحب الجبّار… جبر غيره<br>
ومن خاف الجبّار… رقّت روحه للضعفاء</p>
<p dir="rtl" class="p1"><b>الخلاصة التربوية:</b></p>
