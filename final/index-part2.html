<p dir="rtl" class="p1"><b>دعاء تصحيحي تربوي:</b></p>
<p dir="rtl" class="p1">" ٱللَّهُمَّ يَا مُتَكَبِّرُ… أَنْتَ أَهْلُ الْكِبْرِيَاءِ وَالْعَظَمَةِ، فَنَزِّهْ قَلْبِي مِنْ مُنَازَعَتِكَ فِي مَا لَا يَلِيقُ إِلَّا بِكَ، وَطَهِّرْ نَفْسِي مِنَ الْكِبْرِ وَالْعُجْبِ، وَاجْعَلْنِي فِي عَيْنِ نَفْسِي صَغِيرًا، وَفِي عَيْنِكَ كَرِيمًا، وَفِي عُيُونِ خَلْقِكَ مُتَوَاضِعًا، رَحِيمًا ". </p>
<p dir="rtl" class="p1">هذا الدعاء يحتوي على رسالة روحية وتأملية عميقة تتعلق بـ التواضع والاعتراف بعظمة الله، ويعكس النية الطيبة في التطهر من الكبرياء والعجب، وإليك تحليل دقيق لهذه الرسائل:</p>
<p dir="rtl" class="p1"><b>الرسالة التأملية:</b></p>
<p dir="rtl" class="p36">إدراك عظمة الله: في بداية الدعاء، الله سبحانه وتعالى يُذكر بأنه أهل الكبرياء والعظمة، وهذا دعوة للتأمل في عظمة الله التي لا يرقى إليها شيء في هذا الكون، فإذا كان الله هو المالك الوحيد للكبرياء والعظمة، فإنَّ الإنسان أحق بأن يتواضع ويعترف بنقصه أمام عظمة الله.</p>
<p dir="rtl" class="p36">التحرر من الكبرياء الداخلي: الدعاء يطلب أن يُنزه قلب الإنسان من منازعة الله فيما لا يليق إلَّا به، وهي دعوة للتفكر في كيف أن الكبرياء يتسلل إلى قلب الإنسان في شكل منافسة لله أو رغبة في التفوق على الآخرين، ينبغي للإنسان أن يدرك أنَّ الكل في قبضة الله، وبالتالي لا مجال للكبر.</p>
<p dir="rtl" class="p1"><b>الرسالة التربوية:</b></p>
<p dir="rtl" class="p36">تربية النفس على التواضع: التطهير من الكبرياء والعجب يعد أمرًا تربويًا بالغ الأهمية في الارتقاء الروحي للإنسان، الكبرياء يعني أن يشعر الإنسان بتفوقه على الآخرين، بينما العجب هو أن يظن الإنسان أنه كامل أو فوق الخطأ، والدعاء هنا يُطلب من الله أن يُطهر النفس من هذه العيوب وأن يزرع فيها التواضع الذي يعكس حقيقة الإنسان أمام الله.</p>
<p dir="rtl" class="p36">التوازن في رؤية الذات: "واجعلني في عينِ نفسي صغيرًا" هو توجيه تربوي مهم يقصد به أن يرى الإنسان نفسه في حجمه الطبيعي: صغيرًا أمام عظمة الله، لا يتفاخر على خلقه أو يتكبر عليهم، وفي ذات الوقت، الدعاء يطلب من الله أن يجعل الإنسان عند الله كريمًا، وهذه دعوة للتوازن بين الاعتراف بنقص الإنسان مع الاستحقاق الكامل للرحمة والكرم الإلهي.</p>
<p dir="rtl" class="p1"><b>الرسالة الروحية:</b></p>
<p dir="rtl" class="p36">التواضع أمام الناس: الدعاء يُطلب فيه أن يتواضع الإنسان في أعين الآخرين، فيُظهر الرحمة والرفق مع الناس، ويكون مخلصًا في تعامله معهم دون تكبر أو استعلاء، فالإنسان الذي يعترف بعجزه أمام الله يصبح رحيمًا مع خلق الله، وهذا ما يظهر في تأثير التواضع على التعامل مع الناس.</p>
<p dir="rtl" class="p36">القيمة الروحية للتواضع: التواضع ليس مجرد فعل ظاهر، بل هو حالة روحية عميقة في القلب تجعل الإنسان يشعر بذل العبادة لله ويجعل كل تصرفاته مع الآخرين قائمة على الرحمة والاحترام، الشخص المتواضع هو الذي يعرف حدوده ويحترم الآخرين دون أن يرفع نفسه عليهم، التواضع يفتح للقلب أبواب الرَّحمة ويزيل منه الغرور.</p>
<p dir="rtl" class="p1"><b>الختام:</b></p>
<p dir="rtl" class="p1">هذا الدعاء يدعونا إلى النظر إلى أنفسنا بعينٍ مختلفة: فبينما نحن قد نرى أنفسنا في بعض الأحيان كبارًا أو أفضل من الآخرين، يعلمنا الدعاء أن نضع كبرياء النفس جانبًا، ومتواضعًا عند الله تعالى، فالله هو المتكبر عن كل عيب، وهو الذي يمنح الكرامة، لذلك لا يجب أن نُنافسه في شيء من عظمته، التواضع هو الطريق إلى القلب الطَّاهر الذي يُستحق أن يكون محط رحمة الله ورعايته.</p>
<p dir="rtl" class="p1">أسأل الله أن يوفقنا جميعًا للتحلي بهذا الدعاء والعمل به في حياتنا اليومية، وأن يجعلنا من المتواضعين في القول والعمل، وأن يُطهر قلوبنا من كل كبرياء وعجب.</p>
<p dir="rtl" class="p19"><br></p>
<p dir="rtl" class="p24"><b>خاتمة وجدانية حول اسم الله </b><span class="s8"><b>ٱلْمُتَكَبِّرُ</b><b></b></span></p>
<p dir="rtl" class="p1">حين تسمع اسم <span class="s8"><b>ٱلْمُتَكَبِّرُ</b></span>… لا تتصوره كما تتصور كبرياء البشر… فالله لا يتكبر هروبًا من نقص، ولا يتعالى تعويضًا عن ضعف، ولا يتجبر لأنَّه خائف(حاشاه).</p>
<p dir="rtl" class="p1">بل يتكبر… لأنه الكامل في ذاته، العليّ في صفاته، الذي لا يشاركه أحد في مُلكه، ولا في قُدرته، ولا في حُكمه.</p>
<p dir="rtl" class="p1">إنَّ الله هو <span class="s8"><b>ٱلْمُتَكَبِّرُ</b></span>… فلا يليق لمخلوق أن يرفع رأسه على من خلقه من تراب، ولا أن يتعالى على الناس وهو يحمل قلبًا قد يموت بلحظة،<br>
ولا أن يقول "أنا" بصوت نرجسيّ، وهو لا يملك غدًا واحدًا من حياته.</p>
<p dir="rtl" class="p1">إن اسم <span class="s8"><b>ٱلْمُتَكَبِّرُ</b></span>… ليس ليُرعبك، بل ليُرجِعك، ليس ليُقسيك، بل ليُلينك.</p>
<p dir="rtl" class="p1">لأنك حين تعرف أنَّ الكبرياء لله وحده… تسقط من قلبك كل الأصنام: الغرور، والتفاخر، والعلوّ الزائف، والتسلّط باسم الدين أو القوة.</p>
<p dir="rtl" class="p1">حين تتأمل هذا الاسم… تُدرك كم أنت صغير، وكم هو كبير، وكلما شعرت بذرة كِبر في قلبك، ذكّرت نفسك: " <span class="s8"><b>ٱلْمُتَكَبِّرُ</b></span> الحقيقي… لا يُظلم عنده أحد،<br>
فلا تكن متكبرًا على من خلقهم المتكبر العادل ."</p>
<p dir="rtl" class="p1">اسم <span class="s8"><b>ٱلْمُتَكَبِّرُ</b></span>… يُربّيك على أن تكون متواضعًا في كل شيء، خاشعًا في كل لحظة، وجلًا إذا ارتفعت… أن لا يقصمك الله بكبريائه.</p>
<p dir="rtl" class="p1">وإذا ضاق قلبك من طغيان الظالمين… فتذكّر: أن الكبرياء ليس في أيديهم، وأنهم لا يمشون فوق الأرض بقوتهم، بل يمشون عليها بإمهال من المتكبر… الذي إن شاء، طمسهم في لحظة، ورفع الضعفاء على أكتاف دعائهم.</p>
<p dir="rtl" class="p1"> "<span class="s8"><b>ٱلْمُتَكَبِّرُ</b></span>… ليس اسمه ليُخيف العبد الصادق، بل ليُحذّر كل متعجرف أن فوقه من يرى، ويسمع، ويقضي بعدلٍ لا يُجارى ."</p>
<p dir="rtl" class="p1"><b>فاختم دعاءك بهذا التضرّع:</b></p>
<p dir="rtl" class="p1">"اللَّهُمَّ يا مَن تفرّدتَ بالكبرياءِ عظمةً وعدلًا، لا تجعل في قلبي كِبرًا على أحدٍ من خلقك، ولا تجعلني ممن ينازعونك ما لا يليق إلَّا بك، واغرس في قلبي هيبتك… حتى لا أُفتن بمدح، ولا أغترّ بمنصب، ولا أتكبر على عبدٍ أنت خلقته<span class="s41"><b>.</b></span><span class="s42"><b>"</b><b></b></span></p>
<p dir="rtl" class="p1">هذا الدعاء يحمل رسالة روحية وتأملية عميقة تتعلق بـ التواضع والاعتراف بعظمة الله، ويُظهر النية الطيبة في التخلص من الكبرياء والعجب، إليك الرسالة التأملية والتربوية والروحية التي يحملها هذا الدعاء:</p>
<p dir="rtl" class="p1">الرسالة التأملية:</p>
<p dir="rtl" class="p36">التفرد بالكبرياء: الدعاء يبدأ بالإقرار بأنَّ الله هو الوحيد الذي يتفرد بالكبرياء، وأن عظمته وعدله لا شريك له فيهما، وهذا تذكير لنا أن كل تصرفاتنا يجب أن تكون في ظل هذه العظمة، فالله تعالى هو الأحق بالتفاخر على خلقه، هذا يعزز في قلب المؤمن الفهم الكامل أن الكبرياء ليس من خصائص الإنسان، بل هو من صفات الله سبحانه وتعالى.</p>
<p dir="rtl" class="p36">عدم التكبر على خلق الله: الدعاء يطلب من الله أن لا يجعل في قلبه كبرياء أو استعلاء على أحد من خلقه، فالإنسان الذي يعرف أن الله هو المتكبر عن كل شيء، يجب أن يتواضع في معاملاته مع الآخرين، ويعلم أن من تكبر على الناس فقد تنازع الله في صفة لا تليق إلَّا به.</p>
<p dir="rtl" class="p13"><b></b><br></p>
<p dir="rtl" class="p1"><b><br>
الرسالة التربوية:</b></p>
<p dir="rtl" class="p36">التربية على التواضع في القول والعمل: الدعاء يعكس التربية الروحية على أنَّ التواضع هو أساس التعامل مع الناس، حتى لو كان الشخص في منصبٍ عالٍ أو في موقع يُمكّنه من التفاخر، فالتواضع في الإسلام لا يعني الانخفاض أو الذُّل، بل هو رفعة عند الله، يقول الدعاء:"لا تجعلني ممن ينازعونك ما لا يليق إلَّا بك<span class="s21">"</span>، وهذا يشير إلى أن التكبر ليس فقط في المظاهر، بل يمكن أن يتسلل إلى النية والقلب.</p>
<p dir="rtl" class="p36">غرس هيبة الله في القلب: الدعاء يطلب أن يغرس الله هيبته في قلبه، وهذه الهيبة هي التي تحفظ النفس من الغرور والتفاخر، فهيبة الله تجعل العبد دائمًا في حالة من التواضع والاعتراف بعجزه أمام خالقه، وتُجنبه الوقوع في الفتن التي قد تنشأ من المدح الزائد أو المنصب، هذه الهيبة هي الدرع الواقي ضد الكبرياء.</p>
<p dir="rtl" class="p1"><b>الرسالة الروحية:</b></p>
<p dir="rtl" class="p36">التعالي عن فتنة المدح والتفاخر: الدعاء يُظهر أن الفتنة تأتي من المدح، ومن الغرور بالمنصب أو المكانة الاجتماعية، ويطلب من الله أن يقيه من الوقوع في هذه الفتن، في عالم مليء بالمدح والتقدير من الآخرين، يظل المؤمن بحاجة إلى أن يُذكَّر بأنَّ الكرامة الحقيقية هي في التواضع لله وفي عدم الاستعلاء على الخلق.</p>
<p dir="rtl" class="p36">التواضع هو الطريق إلى القرب من الله: الإنسان الذي يُعظم الله في قلبه، ويشعر بهذا الوعي الداخلي بعظمته، سيظل متواضعًا ولا ينفصل عن هذا الشعور، لذا، الدعاء يطلب من الله أن يغرس في قلبه هيبة الله، التي تجعل الشخص يحترم كل مخلوق، ويُدرك أن التفاخر هو إهانة للإنسان نفسه.</p>
<p dir="rtl" class="p1"><b>الختام:</b></p>
<p dir="rtl" class="p1">هذا الدعاء هو دعوة لتطهير القلوب من الكِبر، وغرس التواضع فيها، والتأكيد على أنَّ العظمة والـكبرياء هي من صفات الله وحده، من خلاله، نُعلم أنفسنا أن الكبرياء على الناس هو تنازع مع صفة إلهية لا يليق للإنسان أن يحملها، فالتواضع يُعلي مكانة المؤمن ويجعله قريبًا من الله، فيصبح أكثر سكينة وأكثر طهارة في قلبه.</p>
<p dir="rtl" class="p19"><br></p>
<p dir="rtl" class="p19"><br></p>
<p dir="rtl" class="p24"><b>نصيحة من نور اسم الله</b><span class="s9"><b> </b></span><span class="s8"><b>ٱلْمُتَكَبِّرُ</b><b></b></span></p>
<p dir="rtl" class="p1">احذر أن ترفع نفسك في أرضٍ يسودها المتكبر الحق بنوره، فإنها لا تحتمل سوى التواضع أمام عظمته، وأن تتعالى على خلقٍ نفخ الله فيهم من روحه،<br>
ثم سَوّاهم… وأسجَدَ لهم ملائكته… وأنت تزدريهم!..</p>
<p dir="rtl" class="p1">إنَّ الله <span class="s8"><b>ٱلْمُتَكَبِّرُ</b></span>… فلا يليق بك – وأنت عبد فقير – أن تُنازعه صفته، لا في كلامك، ولا في مظهرك، ولا في دعوتك، ولا في حكمك على الناس.</p>
<p dir="rtl" class="p1">من علِم أنَّ الله هو <span class="s8"><b>ٱلْمُتَكَبِّرُ</b></span>، خاف أن يقول: "أنا أعلم"، "أنا خير"، "أنا فوق"، "أنا الأفضل"… فكل من قالها… سقط... من إبليس… إلى فرعون… إلى قارون… لا أحد نازع الله كبرياءه، إلَّا ومُزّق… مهما بدا عزيزًا في لحظته.</p>
<p dir="rtl" class="p1">"تعلَّم أن تكون صغيرًا في عين نفسك، لتكون عزيزًا عند الله."</p>
<p dir="rtl" class="p1">"تعلَّم أن تنكسر لله، فالله لا يُحب أن يرى عبدًا مكسورًا لأحدٍ سواه."</p>
<p dir="rtl" class="p1">فإذا أردتَ رفعةً… فابكِ تحت أقدام سجادتك، وإذا أردت مقامًا… فاختفِ عن الناس واذكر الله في صمت.</p>
<p dir="rtl" class="p1">وإن خُيّرتَ بين أن تظهر… أو أن تَنزوي لله، فاختر الانزواء، ففي الخفاء… تكبر عند المتكبر جلّ جلاله.</p>
<p dir="rtl" class="p24"><b>ماذا أتعلم من اسم الله "</b><span class="s8"><b>ٱلْمُتَكَبِّر</b></span><b>":</b></p>
<p dir="rtl" class="p36">أن أُسقِط الكبرياء من قلبي… قبل أن أُقدّم الخير للناس: فإنَّ الله ٱلْمُتَكَبِّرُ وحده، وأنا عبدٌ فقير… وإذا قدّمتُ خيرًا للناس، فلا أرفعه فوقهم… بل أقول: "هذا فضل الله… أن استخدمني، لا أنني أستحق"، لأن الكبر في العمل الخيري… يُفسده، والمنّ في النصيحة… يُفسدها، والتعالي في الدعوة… يُنفر القلوب منها.</p>
<p dir="rtl" class="p36">أن أُنزّه قلبي عن المقارنة واحتقار الناس: فمن يعرف أنَّ الله هو الكبير الـمُتعالي، لا يطمع أن يكون أكبر من أحد، ولا يُقارن نفسه بمن هو دونه أو فوقه، بل يرى الناس كما خلقهم الله: كلهم فقراء… كلهم محتاجون… كلهم يحملون شيئًا من النور.</p>
<p dir="rtl" class="p36">أن أخدم الخلق من "تحت" لا من "فوق": فلا أقول: " أنا أعلم، وهم لا يفقهون<span class="s21">"</span>، "أنا الداعية، وهم الجهلة" ، "أنا صاحب الرسالة، وهم العوام"، بل أقول: "اللهم استخدمني بلُطف، واجعلني عبدًا صغيرًا… يخدم عبادك، ويحبّهم، ويخشى منك أن يعلو عليهم.<span class="s21">"</span></p>
<p dir="rtl" class="p36">أن أنفع الناس بنور التواضع… لا بصوت التعالي: فأجمل ما يفتح قلوب الناس لك، ليس قوّتك، بل أنك لا تراهم دونك… بل إخوةً في الخلق، وشركاء في الرحلة، وأن كل فضلٍ فيك… هو ابتلاء وفضل، لا امتياز واستعلاء.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p24"><b>دعاء خاص مستلهم من اسم الله "</b><span class="s8"><b>ٱلْمُتَكَبِّرُ</b></span><b>":</b><b></b></p>
<p dir="rtl" class="p1">" اللَّهُمَّ يَا مُتَكَبِّرٌ بِجَلَالِكَ، مُتَعَالٍ عَنْ كُلِّ نَقْصٍ، عَظِيمٌ فِي كِبْرِيَائِكَ… أَنْزِلْ عَلَى قَلْبِي نُورَ التَّوَاضُعِ، وَجَمَالَ الْخُفُوتِ، وَهَيْبَةَ الْخُشُوعِ.</p>
<p dir="rtl" class="p1">اللَّهُمَّ طَهِّرْ نِيَّتِي إِذَا نَصَحْتُ، وَأَخْفِ عَمَلِي إِذَا أَحْسَنْتُ، وَاحْجُبْ عَنِّي مَرَائِيَ النُّفُوسِ.</p>
<p dir="rtl" class="p1">اللَّهُمَّ اجْعَلْنِي سَبَبًا لِهِدَايَةِ النَّاسِ، لا فَخْرًا عَلَيْهِمْ، وَسَبَبًا لِرَحْمَتِكَ، لا مَنًّا بِاسْمِكَ.</p>
<p dir="rtl" class="p1">وَاجْعَلْنِي فِي خِدْمَةِ عِبَادِكَ كَمَا تُحِبُّ، لَا كَمَا أُحِبُّ… وَكُنْ أَنْتَ الكَبِيرَ فِي قَلْبِي، وَفِي كُلِّ خَطْوَةٍ مِنِّي ."</p>
<p dir="rtl" class="p19"><br></p>
<p dir="rtl" class="p1">هذا الدعاء يحمل في طياته رسالة روحية عميقة حول التواضع، النية الصافية، وخدمة الآخرين في سبيل الله، دعوني أشرح لكم الرسالة التأملية، التربوية، والروحية التي يحملها هذا الدعاء:</p>
<p dir="rtl" class="p1">الرسالة التأملية:</p>
<p dir="rtl" class="p36">إدراك عظمة الله: الدعاء يبدأ بإقرار عظمة الله وكبريائه في جلاله وتفرده، وهو تذكير للإنسان بضرورة التواضع أمام عظمة الله، التي لا تُقارن بأي شيء آخر في الكون، "اللَّهُمَّ يَا مُتَكَبِّرٌ بِجَلَالِكَ، مُتَعَالٍ عَنْ كُلِّ نَقْصٍ..." هذا الافتتاح يعكس التأمل في أنَّ الله هو المتكبر بكل عظمته وكماله، ومن هذا الفهم، يجب على العبد أن يعترف بنقصه وأن يتواضع أمام خالقه.</p>
<p dir="rtl" class="p36">التفكير في النية والعمل الصالح: الدعاء يطلب من الله أن يُنير قلب العبد بنور التواضع، وهو دعوة للتفكير في كيفية التأثير الإيجابي على الآخرين بحسن نية وأعمال خفية، بعيدًا عن التفاخر أو السَّعي للظهور أمام الناس،" أَنْزِلْ عَلَى قَلْبِي نُورَ التَّوَاضُعِ، وَجَمَالَ الْخُفُوتِ ..."<br>
هذه العبارة تذكرنا بأهمية أن تكون أعمالنا لله وحده، وأن التواضع ليس مجرد فعل خارجي بل هو حالة قلبية تُنير سلوكنا وتُجمل تعاملاتنا مع الآخرين.</p>
<p dir="rtl" class="p1"><b>الرسالة التربوية:</b></p>
<p dir="rtl" class="p36">نقاء النية: الدعاء يطلب من الله أن يطهر النية عندما نقدم النصيحة أو العمل الصالح، يُظهر لنا التربية على النية الطيبة وأننا يجب أن نخلص في أعمالنا لله وأن لا نتوقع مدحًا أو شهرة: "اللَّهُمَّ طَهِّرْ نِيَّتِي إِذَا نَصَحْتُ..." فالنصيحة الحقيقية تكون عندما يُخلص العبد نيته لله، ولا يسعى لأن يكون محط الأنظار أو يتفاخر على الناس.</p>
<p dir="rtl" class="p36">التحرر من الرياء: الدعاء يطلب أن يُبعد عن العبد الرياء، أي أن يعمل الإنسان بما يرضي الله دون انتظار مكافأة من أحد سوى الله: "وَأَخْفِ عَمَلِي إِذَا أَحْسَنْتُ..." هذه دعوة لتعلم كيف نخدم الناس ونقدم لهم الخير دون أن نتوقع أن يمدحونا أو يعترفوا بفضلنا.</p>
<p dir="rtl" class="p36">خدمة العباد بصدق: الدعاء يطلب من الله أن يُعيننا في خدمة عباده من دون فخر أو تكبر، بل بتواضع وتقدير لما يحتاجه الناس، وأن تكون خدمتنا لوجه الله: "وَاجْعَلْنِي فِي خِدْمَةِ عِبَادِكَ كَمَا تُحِبُّ..." هنا يذكر الدعاء أن خدمة الناس يجب أن تكون على أساس رضا الله، وليس من أجل الحصول على شهرة أو تقدير شخصي.</p>
<p dir="rtl" class="p1"><b>الرسالة الروحية:</b></p>
<p dir="rtl" class="p36">الطريق إلى الله بالتواضع: الدعاء يُعلمنا أنَّ التواضع هو الطريق الأقرب إلى الله، وكلما كانت النفس متواضعة ومخلصة في عملها، كلما قربت من الله عز وجل،" وَكُونْ أَنْتَ الكَبِيرَ فِي قَلْبِي ...<span class="s21">"</span> هذه العبارة تعكس التوجه الروحي العميق الذي يطلب فيه العبد من الله أن يكون هو الأعظم في قلبه، وأن يُعظم الله في كل ما يُقدم من أعمال، وأن يُغني القلب عن البحث عن التقدير من البشر.</p>
<p dir="rtl" class="p36">التأكيد على التفوق الروحي: النهاية تدعو إلى أن يكون الله هو الأعظم في حياة الإنسان، في جميع أعماله، وكل خطوة يخطوها في حياته يجب أن تكون في سبيل الله: "وَفِي كُلِّ خَطْوَةٍ مِنِّي...<span class="s21">"</span> هذه دعوة لاستحضار عظمة الله في كل لحظة، والابتعاد عن أي تفاخر أو كبرياء.</p>
<p dir="rtl" class="p1"><b>الختام:</b></p>
<p dir="rtl" class="p1">هذا الدعاء هو دعوة عميقة للتواضع والإخلاص في العمل، فيه تربية للنفس على ضرورة طهر النية في العمل الصالح، والابتعاد عن الرياء أو التفاخر، إنه دعاء يوجه قلب العبد ليتخلى عن الكبرياء والغرور ويعود إلى التواضع الحقيقي الذي يعزز العلاقة بالله وبالناس، ويُبقي الإنسان في حالة من الخشوع والرضا أمام عظمة الله.</p>
<p dir="rtl" class="p1">أسأل الله أن يوفقنا لتحقيق هذه المعاني في حياتنا، وأن يجعل أعمالنا خالصة لوجهه الكريم، وأن يجعلنا من الذين يتواضعون لله ويخلصون في كل عملٍ يقدّمونه.</p>
<p dir="rtl" class="p19"><br></p>
<p dir="rtl" class="p56">حين عرفتُ أن الله هو ٱلْمُتَكَبِّرُ،<br>
توقّفتُ عن رفع صوتي في النُّصح…<br>
وخَفَتَ وجهي في كل مجلس…<br>
وشعرت أن كل خطوة أخطوها وأنا أظنّني "أفضل من غيري"…<br>
هي خطوة تُبعدني عن الله،<br>
لا تقرّبني إليه.</p>
<p dir="rtl" class="p57"><br></p>
<p dir="rtl" class="p56">علمتُ أن الكبرياء لا يليق بي،<br>
لأني عبدٌ… لا أملك حتى قلبي.</p>
<p dir="rtl" class="p56">وعلمتُ أن أعظم من نفع الناس،<br>
هو من مشى بينهم خفيفًا،<br>
ينصحهم من قلبٍ منكسِر،<br>
ويبذل لهم من يدٍ لا ترى نفسها أعلى من أحد.</p>
<p dir="rtl" class="p56">فيا رب… اجعلني أختفي كلما نفعتُ أحدًا،<br>
وأبكي كلما خفتُ أن أُعجب بعملي،<br>
وأراك "الكبير" في قلبي…<br>
حتى لا أرفع نفسي على أحدٍ من عبادك أبدًا.</p>
<p dir="rtl" class="p19"><br></p>
<p dir="rtl" class="p24"><b>المقاصد العقدية العظيمة لاسم الله</b><span class="s9"><b> </b></span><span class="s8"><b>ٱلْمُتَكَبِّرُ</b><b></b></span></p>
<p dir="rtl" class="p36">إثبات الكبرياء المطلق لله وحده: اسم الله <span class="s8"><b>ٱلْمُتَكَبِّرُ</b></span> يُثبت أن الله وحده هو المستحقّ للكبرياء والعظمة، لأنَّ الكبرياء في أصلها صفة كمال إذا كانت بحقّ الله، وذمّ إذا نُسبت إلى المخلوقين، قال النبي ﷺ في الحديث القدسي: " الكبرياء ردائي، والعظمة إزاري، فمن نازعني واحدًا منهما، قذفته في النار <span class="s21">"</span> رواه مسلم، وهذا يحقق توحيد الأسماء والصفات، ويُقرّ أنَّ الله متفرّد بعظمةٍ لا يُشاركه فيها أحد، ولا يليق بأحدٍ غيره أن يطلبها لنفسه.</p>
<p dir="rtl" class="p36">تنزيه الله عن كل ما لا يليق بجلاله: من معاني "<span class="s8"><b>ٱلْمُتَكَبِّرُ</b></span>": أنه متعالٍ عن النقائص، متنزّه عن صفات الخلق، مُستعلٍ على الظلم والجهل والعجز، فهو متكبّر:</p>
<p dir="rtl" class="p47">عن أن يُدركه وهم.</p>
<p dir="rtl" class="p47">عن أن يُشبهه أحد.</p>
<p dir="rtl" class="p47">عن أن تُنسب إليه صفات النقص.</p>
<p dir="rtl" class="p1">وهذا المقصد أساسي في العقيدة السليمة، وهو ما يسمّيه العلماء:"تنزيه الله عن صفات المخلوقين".</p>
<p dir="rtl" class="p36">أنَّ الكبرياء لله ذاتيّة، غير مُكتسبة: البشر إذا تكبّروا… فبما لا يملكونه حقًا، أما الله سبحانه وتعالى… فكبرياؤه ذاتيّ، أزلي، قائم بذاته، لا يكتسبه، ولا تُنتزع منه، وهذا يُرَسّخ في القلب أنَّ: الكبرياء حقٌّ خالصٌ لله، فمن ادّعاه من البشر، فقد نافس الله في صفته، وهو هالك.</p>
<p dir="rtl" class="p36">أنَّ الله لا يُنازَع في أمره، ولا يُسأل عن فعله: من معاني "<span class="s8"><b>ٱلْمُتَكَبِّرُ</b></span>":<br>
أنه المتفرّد بالحكم، الـمُطاع أمرُه، الذي لا يُعقَّب على فعله، قال الله تعالى:<span class="s15"> ﴿لَا يُسۡـَٔلُ عَمَّا يَفۡعَلُ وَهُمۡ يُسۡـَٔلُونَ﴾</span><span class="s13"> </span><span class="s12">الأنبياء: ٢٣</span>، فهذا الاسم يُربي العبد على الاستسلام التام لحكمة الله وأمره، بلا تردد ولا اعتراض ولا سوء أدب.</p>
<p dir="rtl" class="p36">كسر غرور النفس، وتعظيم شأن التواضع: من عرف أن الله هو المتكبّر وحده، كُسرت فيه بذور الكِبْر والعُجب والرياء، لأنَّ الكبرياء ثوب لا يليق إلَّا بالله، ومن لبسه من البشر هلك، وهذا يحقّق مقصدًا عمليًّا في العقيدة: أن التوحيد الخالص يهدم الكِبْر من القلب، ويزرع التواضع والهيبة والخشوع.</p>
<p dir="rtl" class="p1"><b>خلاصة المقاصد العقدية:</b></p>

<p dir="rtl" class="p14"><b>دعاء على ضوء هذه المقاصد:</b></p>
<p dir="rtl" class="p1">" ٱللَّهُمَّ يَا مُتَكَبِّرُ… اجْعَلْنِي عَبْدًا يُجِلُّ كِبْرِيَاءَكَ، وَيَسْتَحْقِرُ كِبْرَهُ،<br>
وَيَتَوَاضَعُ فِي رِفْعَتِهِ، كَمَا يَتَعَظَّمُ بِعِبَادَتِكَ، وَيَسْتَسْلِمُ لِقَضَائِكَ، كَمَا يَفْهَمُ أَنَّهُ لَا يُنَازِعُكَ فِي صِفَاتِكَ أَحَدٌ، وَلَا تَجْعَلْ لِكِبْرِيَاءِ الدُّنْيَا فِي قَلْبِي سَبِيلًا ". </p>
<p dir="rtl" class="p1">هذا الدعاء يحمل رسالة روحية عميقة تتمحور حول التواضع والاعتراف بعظمة الله تعالى، وهو دعاء يعكس الطلب الحقيقي من الله لتطهير القلب من الكبرياء والغرور، دعوني أشرح لكم الرسالة التأملية والتربوية والروحية التي يحملها هذا الدعاء:</p>
<p dir="rtl" class="p1"><b>الرسالة التأملية:</b></p>
<p dir="rtl" class="p36">إجلال الكبرياء الإلهي: الدعاء يبدأ بإعلان إجلال الكبرياء الإلهي:"اجعلني عبدًا يُجِلُّ كِبْرِيَاءَكَ"، هذا التذكير يحمل معانٍ عميقة تدعونا للتأمل في عظمة الله التي لا يمكن لأي مخلوق أن ينازعها، الله سبحانه وتعالى هو المتكبر عن كل نقص، ولا يحق للإنسان أن يرفع نفسه أمام عظمة الله.</p>
<p dir="rtl" class="p36">التواضع في الرفعة: "ويتواضع في رفعته" هذه العبارة تذكرنا بأنَّ التواضع لا يتناقض مع العظمة، الإنسان قد يكون في منصب رفيع أو في مكانة عالية، ولكن يجب أن يكون متواضعًا في سلوكه، لأنه لا يعظم إلَّا الله، فمن يُعظم نفسه يذلها، أما من يعظم الله فهو يُرفع.</p>
<p dir="rtl" class="p1"><b>الرسالة التربوية:</b></p>
<p dir="rtl" class="p36">التربية على الانكسار أمام الله: الدعاء يدعو الإنسان أن يكون منكسراً أمام عظمة الله، ليعيش حياة خالية من الكبرياء <span class="s21">"</span>ويستحقر كبره " هو دعوة للمؤمن إلى الاعتراف بأنَّ الغرور والتفاخر لا مكان له في قلب المؤمن، المؤمن الذي يعبد الله بتواضع، ويعيش في العالم بمعرفة حدوده أمام الله.</p>
<p dir="rtl" class="p36">الإيمان بالقضاء والقدر: "ويستسلم لقضائك" في هذه الجملة دعوة عظيمة للسلام الداخلي، الشخص الذي يستسلم لقضاء الله ويسلم راضيًا بحكمه يظل صافي القلب، لا يتألم ولا يتذمر من الأحداث لأنَّ إيمانه بالله يُعلِّمَه أنَّ كل ما يأتي هو من عند الله وهو الأفضل له.</p>
<p dir="rtl" class="p1"><b>الرسالة الروحية:</b></p>
<p dir="rtl" class="p36">الإيمان بعظمة الله وحده: الدعاء يعكس التوجه الروحي العميق الذي يُذَكِّر المؤمن بأنَّ صفات الله لا يمكن لأي مخلوق أن ينازعها أو يتصور أن لديه شيء من تلك العظمة، "كما يفهم أنه لا ينازعك في صفاتك أحدٌ" – دعوة للإيمان بأنَّ كل عظمة في الكون هي من الله وحده، فلا مجال للتفاخر أو التعالي على الآخرين.</p>
<p dir="rtl" class="p36">الابتعاد عن الكبرياء الدنيوي: "ولا تجعل لكبرياء الدنيا في قلبي سبيلًا " هذه الجملة دعوة روحانية عظيمة للتخلص من الغرور الدنيوي الذي يتسلل إلى القلب عندما يرفع الإنسان نفسه في الدنيا بسبب المكانة الاجتماعية أو المال أو السلطة، الحديث عن الدنيا وحطامها في هذا الدعاء يوجه المؤمن إلى البحث عن عظمة الله بدلاً من التفاخر بأمور زائلة.</p>
<p dir="rtl" class="p1"><b>الختام:</b></p>
<p dir="rtl" class="p1">هذا الدعاء يعبر عن طلب عميق لتطهير النفس من الكبرياء الذي يُنمي الغرور ويُعمي القلب عن عظمة الله، من خلال التواضع الحقيقي والإيمان الراسخ بالقضاء والقدر، يدعو المسلم إلى التجرد من أي فكر يرفع نفسه فوق الآخرين، بل يجب أن يتعلم الاستسلام لله والتواضع الكامل أمامه.</p>
<p dir="rtl" class="p1">أسأل الله أن يُطهر قلوبنا من كل كبرياء، وأن يجعلنا من المتواضعين الذين يرون عظمة الله في كل شيء، ويتواضعون في طاعته وعبادته.</p>
<p dir="rtl" class="p44">( ٱلْقَاهِرُ – ٱلْقَهَّارُ )</p>
<p dir="rtl" class="p46"><b>ٱلْقَاهِرُ</b><span class="s9">… </span></p>
<p dir="rtl" class="p1">هو الذي إذا شاء أخضع الملوك، وذلّل الجبابرة، وأسقط ما حسبه الناس لا يُقهر، هو الذي قهر كل قلبٍ أحبّ سواه، وقهر كل ظالمٍ تمادى، وقهر كل غافلٍ بألم أو فقد… فأفاق.</p>
<p dir="rtl" class="p1">ليس القهر في اسم الله قسوةً بلا رحمة، ولا عُنفًا بلا حكمة… بل هو قهرُ تأديب، لا قهرُ تشفٍّ، وقهرُ هداية، لا قهرُ إذلال.</p>
<p dir="rtl" class="p1"><span class="s8"><b>ٱلْقَاهِرُ</b></span>… هو الذي يكسرك ليطهّرك…، ويهزمك لتعود…، ويُخضعك لتقف في حضرته، لا في حضرة هواك.</p>
<p dir="rtl" class="p1">هو الذي يُخضع النجوم في مداراتها، ويُسقط المتكبّرين من فوق عروشهم،ويُسَكِّنك بالصَّمت حين تُخاطَب بقضائه، فلا تملك إلا أن تقول: <span class="s21">"</span>رضيتُ، وأسلمتُ… يا قاهر، أنت أرحمُ بي من نفسي.<span class="s21">"</span></p>
<p dir="rtl" class="p45"><b>ٱلْقَهَّارُ</b><span class="s1"> </span><span class="s11">…</span><span class="s1"> </span></p>
<p dir="rtl" class="p1">هو الذي يُسخّر كل شيء في الكون لحكمته وعظمته، هو الذي يُخضع كل شيء في الوجود لإرادته، فلا شيء في الأرض أو السماء يستطيع أن يُقاومه أو يتحداه.</p>
<p dir="rtl" class="p1"><span class="s37"><b>ٱلْقَهَّارُ</b></span><span class="s8">…</span> هو الذي يُقهِر الأعداء، ويُذل المتكبرين، ويجعل من جميع الأشياء تحت سطوته، ويقهر الطغاة والظالمين بقدرة مطلقة لا يعادلها شيء، لكن قهره ليس قهرًا ظالـمًا، بل هو قهر عدل، وقهر حكمة، حيث يُقهر كل شيء لحكمته المبدعة في الكون، ويُذل كل شيء في سبيل تحقق العدالة الإلهية.</p>
<p dir="rtl" class="p1"><span class="s37"><b>ٱلْقَهَّارُ</b></span><span class="s8">…</span> هو الذي يُخضع القلوب التي تميل إلى الفتنة أو الكِبر، ويُذلها بلطفه وحكمته، فيُعيد لها التوازن الصحيح ويعيدها إلى الطاعة، هو الذي يقهر كل الأوهام، ويُسقط ما يظن الناس أنه مستحيل، ويُظهر لهم كيف أنَّ القدرة الإلهية تقهر كل المستحيلات، عندما تشعر بالعجز أو بأنك في موقف لا مفر منه، تذكر أنَّ الله هو <span class="s37"><b>ٱلْقَهَّارُ</b></span> <span class="s8">…</span>الذي لا يعجزه شيء.</p>
<p dir="rtl" class="p1"><span class="s37"><b>ٱلْقَهَّارُ</b></span> <span class="s8">…</span>هو الذي يُعيد كل شيء إلى موضعه الصحيح، ويقهر العوائق التي تمنعك من التقدم، ويُحطم كل قيد يعيقك عن الحياة الكريمة، عندما تصادفك صعوبات، تذكر أنَّ الله هو القهار الذي سيفتح لك الطرق المغلقة ويُدبر لك الأمور كما يشاء، ويُظهر لك كيف أنَّ القدرة الإلهية قادرة على قهر كل الصعاب.</p>
<p dir="rtl" class="p1"><span class="s37"><b>ٱلْقَهَّارُ</b></span> <span class="s8">…</span>هو الذي يُذل أعداء الحق ويُبين لهم أن لا قدرة لهم إلَّا بتدبيره. هو الذي يُسَير الكون كما يريد، ولا يجرؤ أحد على الاعتراض على حكمه، فكل شيء يتم وفق مشيئته، وكل شيء يخضع له.</p>
<p dir="rtl" class="p1">إذا شعرت بالعجز أمام الظروف أو إذا كنت محاطًا بالعوائق، تذكر أن الله هو <span class="s37"><b>ٱلْقَهَّارُ</b></span> <span class="s8">…</span>الذي يقهر كل شيء ويُذل كل ما يعارض إرادته، ثق تمامًا في أن الله قادر على قهر أي عقبة في طريقك، وأنَّه سيُذل كل الصعاب ويجعل لك الفرج من حيث لا تحتسب.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p14"><b>الفرق الدقيق بين "</b><span class="s8"><b>ٱلْقَاهِرُ</b></span><b>" و"</b><span class="s8"><b>ٱلْقَهَّارُ</b></span><b>"</b></p>

<p dir="rtl" class="p1">"<span class="s8"><b>ٱلْقَاهِرُ</b></span>" <b>= اسم الصفة</b>.</p>
<p dir="rtl" class="p1">"<span class="s8"><b>ٱلْقَهَّارُ</b></span>" <b>= اسم الفعل المتجدد القوي المتعدّد</b>.</p>
<p dir="rtl" class="p1">اسم الله "<span class="s8"><b>ٱلْقَاهِرُ</b></span>" و"<span class="s8"><b>ٱلْقَهَّارُ</b></span>" هما اسمان مشتقان من الجذر العربي "قهر" الذي يعني القوة، السيطرة، والغلبة.</p>
<p dir="rtl" class="p36"><span class="s8"><b>ٱلْقَاهِرُ</b></span><b> (الاسم من الصفة(:</b> المعنى: <span class="s21">"</span><span class="s8"><b>ٱلْقَاهِرُ</b></span>" يشير إلى صفة الله سبحانه وتعالى التي تعني "الذي يقهر كل شيء" أو "الذي يسيطر على كل شيء" وهذه الصفة تدل على القوة المطلقة لله في قهره لكل المخلوقات.</p>
<p dir="rtl" class="p37"><b>التأثير</b>:لا يوجد شيء في الكون يعصيه أو يخرج عن إرادته، سواء كان ذلك في طبيعته أو في تصرفات مخلوقاته، فإنَّ الله قاهر للخلق جميعهم، ولا يستطيع أحد أن يتجاوز سلطته أو إرادته.</p>
<p dir="rtl" class="p37">التركيب: هذا الاسم يأتي من اسم الصفة، أي أنه يشير إلى خاصية دائمة لله تُعبر عن القوة والقدرة في السيطرة، وهذا يشمل كل شيء في الكون.</p>
<p dir="rtl" class="p36"><span class="s8"><b>ٱلْقَهَّارُ</b></span><b> (اسم الفعل المتجدد والقوي المتعدد):</b> المعنى:"<span class="s8"><b>ٱلْقَهَّارُ</b></span>" هو صيغة مبالغة من الاسم الفعلي (اسم الفعل المتجدد)، وتدل على التكرار والاستمرار في القهر والسيطرة، يُظهر هذا الاسم قوة الله في قهر الأشياء على وجه الدوام والتعدد.</p>
<p dir="rtl" class="p37"><b>التأثير</b>: هو الذي يقهر أعداءه ويهزمهم مرارًا وتكرارًا، وليس مرة واحدة فقط، بل على مدار الزمان، إنه أشد في قهره من مجرد اسم الصفة "<span class="s8"><b>ٱلْقَاهِرُ</b></span>" لأنه يأتي بمعنى تكرار القهر بشكل متواصل ومستمر، لذا فهو يعبر عن القوة المتجددة التي لا تتوقف أبدًا في كل وقت وكل حين.</p>
<p dir="rtl" class="p37"><b>التركيب</b>: يُظهر هذا الاسم الصفة المستمرة والمتجددة في القهر، ويُستخدم للإشارة إلى أن القدرة الإلهية على القهر لا تتوقف في أي لحظة، بل هي مستمرة في كل وقت.</p>
<p dir="rtl" class="p1"><b>التفسير العام:</b></p>
<p dir="rtl" class="p1"><span class="s8"><b>ٱلْقَاهِرُ</b></span>: هو القادر على قهر كل شيء بالهيمنة والسيطرة المطلقة.</p>
<p dir="rtl" class="p1"><span class="s8"><b>ٱلْقَهَّارُ</b></span>: هو القاهر المستمر والمتكرر الذي لا يتوقف عن قهر جميع المخلوقات في أي زمان أو مكان.</p>
<p dir="rtl" class="p1"><b>الفرق الجوهري بين الاسمين:</b></p>
<p dir="rtl" class="p1"><span class="s8"><b>ٱلْقَاهِرُ</b></span>: يشير إلى الصفة الثابتة لله في السيطرة والقهر.</p>
<p dir="rtl" class="p1"><span class="s8"><b>ٱلْقَهَّارُ</b></span>: يُعبر عن التكرار والاستمرار في قهر جميع الأشياء، مما يدل على أن هذه القوة لا تنتهي ولا تتوقف، هذا التفصيل يعكس تجليّين لقوة الله:</p>
<p dir="rtl" class="p36">ثبات القوة. </p>
<p dir="rtl" class="p36">واستمرارها.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p1"><b>دعاء:</b></p>
<p dir="rtl" class="p1">" ٱللَّهُمَّ يَا قَاهِرَ كُلِّ جَبَّار، وَيَا مُذِلَّ كُلِّ مُتَكَبِّر، ٱقْهَرْ فِي قَلْبِي كُلَّ مَا يُبْعِدُنِي عَنْكَ، وَٱكْسِرْ نَفْسِي إِذَا طَغَتْ، وَهَوَايَ إِذَا سَادَ، وَغُرُورِي إِذَا ظَنَنْتُ أَنِّي أَقْوَى.<br>
وَٱجْعَلْنِي مِنْ عِبَادِكَ ٱلْمُنْكَسِرِينَ بَيْنَ يَدَيْكَ، ٱلَّذِينَ قَهَرْتَهُمْ فَرَفَعْتَهُمْ، وَخَضَعُوا فَعَزَّزْتَهُمْ، وَتَابُوا فَقَبِلْتَهُمْ ".</p>
<p dir="rtl" class="p1"><b>الرسالة التأملية والتربوية والروحية العميقة لهذا الدعاء:</b></p>
<p dir="rtl" class="p1">هذا الدعاء يعكس أعظم معاني التواضع والانكسار لله تعالى، ويظهر عمق الاستغاثة به في أوقات الطغيان النفسي والغرور البشري.</p>
<p dir="rtl" class="p1"><b>التأمل الروحي:</b></p>
<p dir="rtl" class="p1">"ٱللَّهُمَّ يَا قَاهِرَ كُلِّ جَبَّار، وَيَا مُذِلَّ كُلِّ مُتَكَبِّر" يبدأ الدعاء بتوسل إلى الله باسمه العظيم: "<span class="s8"><b>ٱلْقَاهِرُ</b></span>" وفي هذا النداء، يتوجه العبد إلى الله طالبًا منه أن يقهر كل ما في قلبه من الكبرياء والغرور، وكل ما قد يعز عليه ويظن فيه القوة أو الرفعة، هذا الافتقار إلى الله هو أول خطوة نحو التوبة والعودة.</p>
<p dir="rtl" class="p1">"ٱقْهَرْ فِي قَلْبِي كُلَّ مَا يُبْعِدُنِي عَنْكَ" هذا الجزء من الدعاء يتحدث عن الدعاء لله ليقهر كل ما يعترض الطريق بين العبد وربه، فالقلب أحيانًا تغلبه شهوات الدنيا وتشتته الهموم، وهذا يجعل العبد يبتعد عن الله، العبد يطلب من الله أن يقهر هذا البُعد وأن يعود به إلى الله.</p>
<p dir="rtl" class="p1">"وَٱكْسِرْ نَفْسِي إِذَا طَغَتْ" في هذه العبارة، يطلب العبد من الله أن يكسر نفسه إذا تغلبت عليه رغباته وطباعه المتكبرة، فالنفس البشرية تميل إلى التمرد على توجيه الله، وعندئذ يجب على العبد أن يتوجه إلى الله ليدله على الطريق السوي ويهديه إلى الحق.</p>
<p dir="rtl" class="p1">"وَهَوَايَ إِذَا سَادَ، وَغُرُورِي إِذَا ظَنَنْتُ أَنِّي أَقْوَى" هذا جزء من الدعاء يظهر الاعتراف الكامل بضعف الإنسان أمام الله، عندما يظن الإنسان في نفسه القوة أو القدرة على العيش بلا حاجة لله، فإنه يكون قد وقع في فخ الغرور، ومن خلال هذه الكلمات، يتوسل العبد إلى الله أن ينقذه من هذا الظن الباطل.</p>
<p dir="rtl" class="p1"><b>التربية الروحية:</b></p>
<p dir="rtl" class="p1">"وَٱجْعَلْنِي مِنْ عِبَادِكَ ٱلْمُنْكَسِرِينَ بَيْنَ يَدَيْكَ" هذا الطلب يمثل التوجه الكامل لله في تواضع، الانكسار بين يدي الله ليس ضعفًا بل قوة حقيقية، هي الاعتراف بأننا لا شيء أمام الله تعالى، التوبة والندم على ما بدر من الإنسان في حق الله من تقصير يجعل من هذا الانكسار نقطة تحول حقيقية نحو القرب من الله.</p>
<p dir="rtl" class="p1">"ٱلَّذِينَ قَهَرْتَهُمْ فَرَفَعْتَهُمْ، وَخَضَعُوا فَعَزَّزْتَهُمْ، وَتَابُوا فَقَبِلْتَهُمْ" هذا الجزء من الدعاء يسلط الضوء على دورة النصر الروحي، عندما يذل العبد نفسه ويطلب القرب من الله، فإن الله سبحانه وتعالى يَرفعه ويُعزّه، والعباد الذين يذلون في طاعة الله يتلقون من الله العزة والكرامة، الله يقبل التوبة بعد انكسار النفس، ويمنحها قوة روحية تفوق أي قوة دنيوية.</p>
<p dir="rtl" class="p1"><b>الدروس التربوية:</b></p>
<p dir="rtl" class="p36">التواضع في قلب المؤمن: الدعاء يعلمنا كيف نتواضع لله ونطلب منه أن يقهر كل ما في أنفسنا من شهوات وأهواء تقودنا للبعد عن الله، هذا التواضع هو السبيل الحقيقي للقرب من الله.</p>
<p dir="rtl" class="p36">الانكسار الحقيقي: الدعاء يعلمنا أنه لا يوجد عزَّة ولا رفعة بغير تواضع لله، العزة الحقيقية هي في الانكسار بين يدي الله تعالى، فإنَّ كل تواضع لله يعيد الإنسان إلى مركزه الصحيح في الحياة.</p>
<p dir="rtl" class="p36">ضرورة التوبة: يبين هذا الدعاء ضرورة التوبة والرجوع إلى الله عندما يزداد الكبرياء أو يظن الإنسان في نفسه القوة، والتوبة تقود إلى قبول الله وتطهير النفس.</p>
<p dir="rtl" class="p36">الدعاء دافع للتغيير: الدعاء هنا ليس مجرد طلب، بل هو دافع للتغيير الداخلي، كل جزء من الدعاء هو دعوة للمؤمن لأن يراقب نفسه، ويعترف بنواقصه، ويسعى نحو تحقيق تقوى الله.</p>
<p dir="rtl" class="p1"><b>الخاتمة</b>: يُعتبر هذا الدعاء دعوةً عظيمة للمؤمنين للانكسار أمام الله تعالى، فيُظهر فيه العبد ضعف نفسه وعجزه، ويطلب أن يكون من عباد الله المنكسرين الذين يُعزّهم الله.</p>
<p dir="rtl" class="p19"><br></p>
<p dir="rtl" class="p19"><br></p>
<p dir="rtl" class="p24"><b>عناوين تأملية راقية لاسم الله </b><span class="s8"><b>ٱلْقَاهِرُ</b></span><b> - </b><span class="s8"><b>ٱلْقَهَّارُ</b></span><b>، مع دلالة موجزة لكل عنوان: </b></p>
<p dir="rtl" class="p36">إذا قَهَرَ… فلا قيام لأحد: <b>دلالة</b>: يُفني من يشاء، ويُضعف من شاء، فلا عاصم من قهره، ولا قائم أمام أمره.</p>
<p dir="rtl" class="p36">القلوب لا تَخِرُّ إلَّا أمام القَهَّار: <b>دلالة</b>: أقسى القلوب تلين تحت قهره، وأعتى النفوس تخرّ ساجدة إذا شاء.</p>
<p dir="rtl" class="p36">قهرُه رحمة… قبل أن يكون نقمة: <b>دلالة</b>: يقهرك لتعود، ويكسرك لتلين، فلا قهره عبث، بل هداية خفيّة.</p>
<p dir="rtl" class="p36">حين يُغلق كل باب… افتح باب "القَهَّار": <b>دلالة</b>: إذا استعصى كل شيء، تذكّر أن الله القهّار قادر أن يُخضع لك المستحيل.</p>
<p dir="rtl" class="p36">يا قهّار… اقهَر في قلبي كلَّ شهوةٍ تقهرني: <b>دلالة</b>: دعاء تربوي، يدل على أنَّ القهر الإلهي ليس فقط ضد الظلمة، بل أيضًا نجدة لعباده من أنفسهم.</p>
<p dir="rtl" class="p36">قهره لا يُرى… ولكن يُوجِع: <b>دلالة</b>: ليس بالضرورة أن ترى جنود الله… ولكنك تحسّ أثر قهره في الكون، والأحداث، والضمائر.</p>
<p dir="rtl" class="p36">القهّار… الذي يقهرك حبًّا… ويُربّيك وجعًا: <b>دلالة</b>: القهر ليس دائمًا عذابًا، بل أحيانًا هو أسلوب الله في التربية وإعادة التشكيل.</p>
<p dir="rtl" class="p36">قهر الله… لا يُجابه، بل يُلجأ إليه: <b>دلالة</b>: الفرق بين من يهرب من قهره، ومن يتوجّه إليه مستسلمًا طالبًا النجاة.</p>
<p dir="rtl" class="p36">يا قَهَّار… اقهر الظلم في العالم… وفيّ: <b>دلالة</b>: دعاء شامل يربط بين الواقع والذات… نطلب من الله أن يقهر الظالمين، لكن أيضًا شهواتنا الظالمة.</p>
<p dir="rtl" class="p19"><br></p>
<p dir="rtl" class="p24"><b>التمهيد الوجداني الراقي لاسم الله: </b><span class="s8"><b>ٱلْقَاهِرُ</b></span><b> - </b><span class="s8"><b>ٱلْقَهَّارُ</b><b></b></span></p>
<p dir="rtl" class="p1">يا مَن قَهَرَ كل شيء... وما قُهِرَ هو قط! يا مَن إذا قال كُن، انطفأت نيران الطُّغاة، وانكسرت سيوف الظَّالمين، وخرّت أعناق الجبابرة صاغرة!..</p>
<p dir="rtl" class="p1">يا مَن تخشع الجبال من صوته، وتخرُّ السماوات من هيبة أمره، وترتعد القلوب لمجرد ذكر اسمه… <span class="s8"><b>ٱلْقَهَّارُ</b></span>!..</p>
<p dir="rtl" class="p1">هو <span class="s8"><b>ٱلْقَهَّارُ</b></span>... الذي لا يعجزه شيء، ولا يثبت في وجه أمره سلطان، ولا يتقدّم أمام مشيئته شيء… فهو <span class="s8"><b>ٱلْقَاهِرُ</b></span><span class="s2"><b> </b></span>بقوته، <span class="s8"><b>ٱلْقَاهِرُ</b></span><span class="s2"><b> </b></span>بحكمته، <span class="s8"><b>ٱلْقَاهِرُ</b></span><span class="s2"><b> </b></span>برحمته، <span class="s8"><b>ٱلْقَاهِرُ</b></span><span class="s2"><b> </b></span>بعدله.</p>
<p dir="rtl" class="p1">إنّه الذي يَصُبُّ القهرَ على الجبابرة فيُصبحون عبرة، ويُنزِله على المتكبرين فينحنون صَغارًا، ثم يقهر قلبك… لا ليُذِلّك، بل ليُعيد ترتيبك، ويغسل غفلتك، ويُحضِّرك للقرب منه.</p>
<p dir="rtl" class="p1">قهره ليس كقهر البشر… فالبشر إذا قهروا أهانوا… وإذا غلبوا داسوا… وإذا انتصروا تكبروا. </p>
<p dir="rtl" class="p1">أما <span class="s8"><b>ٱلْقَهَّارُ</b></span>… فإذا قهرك، أغاثك.</p>
<p dir="rtl" class="p1">وإذا هزمك، احتواك.</p>
<p dir="rtl" class="p1">وإذا أوقعك، رفعك إليه.</p>
<p dir="rtl" class="p1">وإذا كسرك، أعادك أنظف مما كنت.</p>
<p dir="rtl" class="p1">هو الذي يقهر المرض حين يعجز الطِّب،...</p>
<p dir="rtl" class="p1">ويقهر الخوف حين تذبل الروح،...</p>
<p dir="rtl" class="p1">ويقهر الباطل حين يظن أنه انتصر،...</p>
<p dir="rtl" class="p1">ويقهر الشيطان حين يُوسوس،...</p>
<p dir="rtl" class="p1">ويقهر الحزن حين يتغلغل،...</p>
<p dir="rtl" class="p1">ويقهر الغفلة حين تستوطن القلب،...</p>
<p dir="rtl" class="p1">ويقهرك… إذا أحبك!...</p>
<p dir="rtl" class="p1">لأنه يريدك له وحده… فيقهر تعلقك بغيره، ويكسر قلبك ممن ظننته سندك، ويُبعد عنك ما شغلك عنه، ليرفعك… وهو يقهرك، ويهذّبك… وهو يوجعك، حتى لا يبقى في قلبك سواه، يقهرك… ليطهّرك، ويقسو عليك… ليقرّبك، لأنه يُحبك أكثر مما تحب نفسك.</p>
<p dir="rtl" class="p1">هو <span class="s8"><b>ٱلْقَاهِرُ</b></span><span class="s2"><b> </b></span>فوق عباده… لكن ما رفعه علوّ القهر… إلَّا لأنه قريب عند الحاجة، لطيف وقت الانكسار، حكيم حين يُسلّط الألم، وأرحم بك من نفسك.</p>
<p dir="rtl" class="p1">فلا تخف من قهر الله… فقهره أمان، وهزيمته خلاص، وقوّته مخرج من ضعفك الذي لا يُطاق.</p>
<p dir="rtl" class="p1">وإنك حين تُهزَم أمامه، وحين تبكي بين يديه، وحين تتخلى عن قوتك لتسجد لقوته… فأنت في الحقيقة ما سقطت، بل صعدت وارتقيت وارتفعت.</p>
<p dir="rtl" class="p1">لأن القهر في حضرة <span class="s8"><b>القَهَّار</b></span>… هو أول سلّم العودة، وأول مرآة ترى فيها نفسك كما أرادها الله، وأعظم باب يُفتح لك… لتدخل إليه مُطهَّرًا، صادقًا، خاضعًا، مُحبًّا.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p33"><b>حين يتجلّى اسم الله "</b><span class="s10"><b> ٱلْقَاهِرُ</b></span><span class="s11"><b> </b></span><b>" – "</b><span class="s10"><b> القَهَّار</b></span><b> " في قلبك…</b></p>
<p dir="rtl" class="p1">حين يتجلّى في قلبك اسم "<span class="s8"><b> ٱلْقَاهِرُ</b></span><span class="s2"><b> </b></span>" تفهم أن لا أحد فوق إرادة الله، وأن كل جبروت في الأرض… إلى زوال، وأنَّ كل من طغى، وتكبّر، واستكبر… مهما علا، فهو تحت القهر الإلهي، وتحت عينٍ لا تغفل، وفي قبضَةٍ لا تُردّ.</p>
<p dir="rtl" class="p1">"<span class="s8"><b> ٱلْقَاهِرُ</b></span><span class="s2"><b> </b></span>" لا يُقهر، يُدبّر الأمر في السماوات والأرض، ويُذلّ من تجبّر، ويُحني رقابًا ظنّت أنها لا تنحني، ويقلب الموازين حين يشاء… فيُصبح المنتصر مهزومًا، والمظلوم منصورًا.</p>
<p dir="rtl" class="p1">وحين يتجلّى في قلبك اسم "<span class="s8"><b> القَهَّار</b></span>" ترى كل قوةٍ بشرية مجرّد وهم، وتدرك أنَّ الطغيان لا يدوم، وأنَّ الله لا يُنازَع في ملكه، فهو القهّار الذي يقهر القلوب فتخشع، ويقهر النفوس فتخضع، ويقهر الظالمين بكلمة… فينهار ما بنوه في سنين.</p>
<p dir="rtl" class="p1">"<span class="s8"><b> القَهَّار</b></span>" هو الذي إن أحبّك… قَهَر فيك غرورك، وقَهَر شهوتك، وقهر ذنوبك… حتى ترجع إليه، وإن شاء أن يُظهِر سُلطانه… قَهَر أعداءه بلا سلاح، وبلا جند، وبلا سبب يُرى.</p>
<p dir="rtl" class="p1">وحين يجتمع في قلبك الخوف من القهّار، والرجاء في العادل الرَّحيم، تسير على الأرض بقلب خاشع… تتوقى الظلم، وتتجنّب التجبّر، وتحتمي بعدل من لا يُنازَع، وترتجف من أن تُنازع الله في صفة من صفاته، ولو بنظرة استعلاء.</p>
<p dir="rtl" class="p1">يا قهّار… اقهر فينا كل ما يُبعدنا عنك، واقهر في قلوبنا حبّ الذنب، والتعلق بغيرك، واقهر من ظلم، وبغى، وأفسد… فإنهم لا يعجزونك.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p24"><b>المعنى التبديري العميق:</b></p>
<p dir="rtl" class="p1"><b>حين ينهار جَبروت الدُّنيا تحت سُلطان</b> <span class="s8"><b>ٱلْقَاهِرُ</b></span> – <span class="s8"><b>ٱلْقَهَّارُ</b></span>… </p>
<p dir="rtl" class="p1">" <span class="s8"><b>ٱلْقَاهِرُ</b></span>" هو الذي يقهر جميع الخلائق بقوّته، وسلطانه، وإرادته التي لا تُرد.<br>
و"<span class="s8"><b>ٱلْقَهَّارُ</b></span>" هو الذي لا يُستثنى من قهره أحد… يُذلّ الجبابرة، ويُخضع الكائنات، ويطوي السماوات بيده يوم القيامة.</p>
<p dir="rtl" class="p1">هذان الاسمان… لا يُقرأان فقط، بل يُزلزلان الداخل زلزلة الحق.</p>
<p dir="rtl" class="p1">أن ترى أن كل شيء تحت قهر الله: قلوب العباد، وجبابرة الطغيان، وأنفاسك، ودمك، ورزقك، وموتك، وقيامك.</p>
<p dir="rtl" class="p1">أن تعلم أن لا حركة ولا سكون، إلَّا وقهر الله يسوقها حيث يشاء، حتى الشيطان… لا يُغويك إلَّا بإذنٍ من القهّار، لحكمةٍ يعلمها، وحتى نفسك… لا تتمرّد إلَّا إذا أذن الله أن يُختبر صدقك.</p>
<p dir="rtl" class="p1">أن توقن أن قهر الله لا يعني الظُّلم… بل عدلًا يقيم ميزان الحياة، ويمنعك أن تُؤلّه نفسك أو غيرك.</p>
<p dir="rtl" class="p1">"<span class="s8"><b>ٱلْقَهَّارُ</b></span>" <b>في قلب المؤمن:</b><b></b></p>
<p dir="rtl" class="p1">"<span class="s8"><b>ٱلْقَهَّارُ</b></span>" في قلب المؤمن ليس صورة مرعبة… بل أمانٌ من فتنة القوة والهيمنة، لأنَّه كلما ظنّ نفسه قادرًا… تذكّر أنَّ الله إذا شاء، نزعه من قدرته في لحظة.</p>
<p dir="rtl" class="p1">"<span class="s8"><b>ٱلْقَهَّارُ</b></span>" يطهّر النفس من أوهام السيطرة… ويجعل المؤمن يقول: "لستُ قويًا… إنما الله أمضى إرادته فيّ، ولولا ذلك… ما قهرتُ شيئًا، ولا انتصرتُ في شيء."</p>
<p dir="rtl" class="p1"><b>لماذا قهره رحمة؟</b></p>
<p dir="rtl" class="p47">لأنه يقهر النفس لتخضع… فتسجد.</p>
<p dir="rtl" class="p47">ويقهر الشهوات لتنكسر… فتنضبط.</p>
<p dir="rtl" class="p47">ويقهر الظالمين… لتنعم الأرض بعدله.</p>
<p dir="rtl" class="p47">ويقهر القلوب القاسية… ليُربيها على الرِقّة.</p>
<p dir="rtl" class="p1">فقهره ليس إذلالًا… بل تقويم، وليس ظُلمًا… بل حماية للتوحيد من أن يُدنّسه الغرور.</p>
<p dir="rtl" class="p1"><b>وقفة تدبّرية:</b></p>
<p dir="rtl" class="p64">حين ترى ظالـمًا طغى، فتظن أنه أفلت… اذكر: <span class="s8"><b>ٱلْقَهَّار</b></span>.</p>
<p dir="rtl" class="p64">وحين ترى قلبك يعلو، ونفسك تعجب… اذكر: <span class="s8"><b>ٱلْقَهَّار</b></span>.</p>
<p dir="rtl" class="p64">وحين تُصاب بمصيبة… قل: قهرني برحمته، لا بعقوبته… فلعله يُعيدني إليه.</p>
<p dir="rtl" class="p1"><b>خلاصة:</b></p>
<p dir="rtl" class="p1">اسم "<span class="s8"><b>ٱلْقَاهِرُ</b></span> – <span class="s8"><b>ٱلْقَهَّارُ</b></span>" لا يُعلّمك فقط من هو الله، بل يُعلّمك من أنت… وإلى من ترجع كل قدرة فيك.</p>
<p dir="rtl" class="p1">هو الاسم الذي يُربّي فيك التواضع والخضوع، ويهدم صنم الاستغناء، ويُعيدك عبدًا صغيرًا… في حضرة قهرٍ لا يُقصد به إلَّا الإصلاح.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p24"><b>المعنى اللغوي والشرعي الدقيق لاسم الله: </b><span class="s8"><b>ٱلْقَاهِرُ</b></span><b> - </b><span class="s8"><b>ٱلْقَهَّارُ</b><b></b></span></p>
<p dir="rtl" class="p25"><b>أولًا: المعنى اللغوي: " </b>قَهَرَ " في اللغة: من مادة (ق هـ ر)، وهي تدلّ على الغلبة والتذليل والإخضاع مع القدرة، قال ابن فارس":القاف والهاء والراء أصلٌ يدلُّ على الغلبة"<b>.</b></p>
<p dir="rtl" class="p1">وقيل: قَهَره قَهْرًا أي: غلبه وأخضعه وذلّله قسرًا وعُنوةً، من غير أن يكون له قدرة على المقاومة.</p>
<p dir="rtl" class="p14"><b>إذًا:</b></p>
<p dir="rtl" class="p1"><span class="s8"><b>ٱلْقَاهِر</b></span>: من أسماء الفاعل، يدل على الفعل الثابت.</p>
<p dir="rtl" class="p1"><span class="s8"><b>ٱلْقَهَّار</b></span>: صيغة مبالغة، تفيد التكرار، والشدة، والدوام، والسعة.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p25"><b>ثانيًا :المعنى الشرعي:</b> </p>
<p dir="rtl" class="p1">" <span class="s8"><b>ٱلْقَاهِرُ</b></span> ": هو الذي قهر جميع مخلوقاته بقدرته، وأخضعهم لإرادته، فلا يخرج شيء عن سلطانه ولا يعجزه شيء.</p>
<p dir="rtl" class="p1">كل الكائنات ذليلة أمامه، خاضعة لحكمه، تابعة لأمره… أذلّ أعناق الجبابرة، وسَخَّر المجرّات، وأخضع الشياطين والأنفس والملائكة لخَلقِه وتقديره.</p>
<p dir="rtl" class="p1">" <span class="s8"><b>ٱلْقَهَّارُ</b></span> ": هو الذي لا يغلبه شيء، ولا يقوم في وجه قهره أحد، وقهرُه شاملٌ دائمٌ متكرّر، لا يفلت منه أحد، ولا يخرج عن سلطانه أحد، ولا يستطيع أحد أن يهرب من قهره أو ينجو من أمره، وهو الذي يُخضع المخلوقات كلّ مرة، وفي كل لحظة، ويصرّفها كيف يشاء، فيذلّ من يشاء، ويرفع من يشاء.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p14"><b>أدق المعاني:</b></p>
<p dir="rtl" class="p1">قهر الله لعباده لا يعني الظُّلم، بل هو قهر عدل وحكمة ورحمة، فيه تهذيب، وتربية، وإعادة، وهداية.</p>
<p dir="rtl" class="p1">قهر الله يشمل قهر الأسباب، فحين يُراد شيء ولا يحصل، فذاك قهر رباني للسبب ذاته.</p>
<p dir="rtl" class="p1">قهره ليس بالضرورة بالبأس والقوة، بل قد يقهر العبد بهمٍّ، أو مرضٍ، أو خيبة، أو لحظة حيرة… ليرجعه إليه.</p>
<p dir="rtl" class="p1"><b>خلاصة تأملية:</b></p>
<p dir="rtl" class="p1"><span class="s8"><b>ٱلْقَاهِرُ</b></span> هو الذي يقلب الموازين متى شاء… <span class="s8"><b>ٱلْقَهَّارُ</b></span> هو الذي إذا قال لا... فلا رادّ لقضائه، قهره يُنقذك… كما يُهلك غيرك، فخُذ قهره باب رجوع لا باب فزع.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p24"><b>أولًا: أدلة اسم الله "</b><span class="s8"><b>ٱلْقَاهِرُ</b></span><b>" من القرآن الكريم</b></p>
<p dir="rtl" class="p35"><span class="s1">قوله تعالى:</span> ﴿وَهُوَ ٱلۡقَاهِرُ فَوۡقَ عِبَادِهِۦۚ وَهُوَ ٱلۡحَكِيمُ ٱلۡخَبِيرُ﴾<span class="s13"> </span><span class="s14">الأنعام: ١٨</span><span class="s1">.</span></p>
<p dir="rtl" class="p1"><b>الدلالة</b>: الآية ذكرت اسمه ٱلْقَاهِرُ مقترنًا بالحكمة والخبرة، لتدل أن قهره ليس عشوائيًا، بل قهرٌ بحكمةٍ دقيقة، وخبرةٍ بأحوال العباد، وغايةُ القهر الإصلاحُ لا الإهلاك.</p>
<p dir="rtl" class="p35"><span class="s1">قوله تعالى: </span>﴿وَهُوَ ٱلۡقَاهِرُ فَوۡقَ عِبَادِهِۦۖ وَيُرۡسِلُ عَلَيۡكُمۡ حَفَظَةً حَتَّىٰٓ إِذَا جَآءَ أَحَدَكُمُ ٱلۡمَوۡتُ تَوَفَّتۡهُ رُسُلُنَا وَهُمۡ لَا يُفَرِّطُونَ﴾<span class="s13"> </span><span class="s14">الأنعام: ٦١</span></p>
<p dir="rtl" class="p1"><b>الدلالة</b>: بيان عظمة سلطانه، وهيبته فوق عباده، وأن قهره مطلق يشمل رقابةً مستمرة عبر الحفظة، مع أنه فوقهم قهرًا، لكنه أيضًا قريب رقابةً ورحمة.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p24"><b>ثانيًا: أدلة اسم الله "</b><span class="s8"><b>ٱلْقَهَّارُ</b></span><b>" من القرآن الكريم</b></p>
<p dir="rtl" class="p35"><span class="s1">قوله تعالى:</span> ﴿قُلۡ مَن رَّبُّ ٱلسَّمَٰوَٰتِ وَٱلۡأَرۡضِ قُلِ ٱللَّهُۚ قُلۡ أَفَٱتَّخَذۡتُم مِّن دُونِهِۦٓ أَوۡلِيَآءَ لَا يَمۡلِكُونَ لِأَنفُسِهِمۡ نَفۡعٗا وَلَا ضَرّٗاۚ قُلۡ هَلۡ يَسۡتَوِي ٱلۡأَعۡمَىٰ وَٱلۡبَصِيرُ أَمۡ هَلۡ تَسۡتَوِي ٱلظُّلُمَٰتُ وَٱلنُّورُۗ أَمۡ جَعَلُواْ لِلَّهِ شُرَكَآءَ خَلَقُواْ كَخَلۡقِهِۦ فَتَشَٰبَهَ ٱلۡخَلۡقُ عَلَيۡهِمۡۚ قُلِ ٱللَّهُ خَٰلِقُ كُلِّ شَيۡءٖ وَهُوَ ٱلۡوَٰحِدُ ٱلۡقَهَّٰرُ﴾ ﴿قُلۡ مَن رَّبُّ ٱلسَّمَٰوَٰتِ وَٱلۡأَرۡضِ قُلِ ٱللَّهُۚ قُلۡ أَفَٱتَّخَذۡتُم مِّن دُونِهِۦٓ أَوۡلِيَآءَ لَا يَمۡلِكُونَ لِأَنفُسِهِمۡ نَفۡعٗا وَلَا ضَرّٗاۚ قُلۡ هَلۡ يَسۡتَوِي ٱلۡأَعۡمَىٰ وَٱلۡبَصِيرُ أَمۡ هَلۡ تَسۡتَوِي ٱلظُّلُمَٰتُ وَٱلنُّورُۗ أَمۡ جَعَلُواْ لِلَّهِ شُرَكَآءَ خَلَقُواْ كَخَلۡقِهِۦ فَتَشَٰبَهَ ٱلۡخَلۡقُ عَلَيۡهِمۡۚ قُلِ ٱللَّهُ خَٰلِقُ كُلِّ شَيۡءٖ وَهُوَ ٱلۡوَٰحِدُ ٱلۡقَهَّٰرُ﴾<span class="s13"> </span><span class="s14">الرعد: ١٦</span><span class="s1">.</span></p>
<p dir="rtl" class="p1"><b>الدلالة</b>: بيان أنَّ الله لا شريك له في الخلق، وأنَّ قهره مطلق وعام لكل المخلوقات، وأن قهره مرتبط بوحدانيته، فلا منافس له في السماء ولا في الأرض.</p>
<p dir="rtl" class="p35"><span class="s1">قوله تعالى:</span> ﴿يَوۡمَ هُم بَٰرِزُونَۖ لَا يَخۡفَىٰ عَلَى ٱللَّهِ مِنۡهُمۡ شَيۡءٞۚ لِّمَنِ ٱلۡمُلۡكُ ٱلۡيَوۡمَۖ لِلَّهِ ٱلۡوَٰحِدِ ٱلۡقَهَّارِ﴾<span class="s13"> </span><span class="s14">غافر: ١٦</span><span class="s1">.</span></p>
<p dir="rtl" class="p1"><b>الدلالة</b>: في مشهد يوم القيامة، حين تسقط جميع الممالك والجبابرة، ينطق الكون بالحقيقة المطلقة: لا قهّار إلا الله، اسم ٱلْقَهَّار هنا يظهر في ذروة العظمة والهيبة والتجريد من كل طاغية.</p>
<p dir="rtl" class="p35"><span class="s1">قوله تعالى:</span> ﴿قُلۡ إِنَّمَآ أَنَا۠ مُنذِرٞۖ وَمَا مِنۡ إِلَٰهٍ إِلَّا ٱللَّهُ ٱلۡوَٰحِدُ ٱلۡقَهَّارُ﴾<span class="s13"> </span><span class="s14">ص: ٦٥</span><span class="s1">.</span></p>
<p dir="rtl" class="p1"><b>الدلالة</b>: ردٌّ على من عبد غير الله، لأن الذي يُعبَد بحق هو الذي يملك القهر والسيطرة الكاملة على الوجود، وهذا لا يكون إلا لله وحده.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p24"><b>ثالثًا: هل ورد اسما "</b><span class="s8"><b>ٱلْقَاهِر</b></span><b>" و"</b><span class="s8"><b>ٱلْقَهَّار</b></span><b>" في السُّنة؟</b></p>
<p dir="rtl" class="p1">لا يوجد حديث صحيح مرفوع إلى النبي ﷺ يُثبت اسم "<span class="s8"><b>ٱلْقَاهِر</b></span>" أو "<span class="s8"><b>ٱلْقَهَّار</b></span>" نصًّا في الأدعية المأثورة، لكن جميع علماء العقيدة والأسماء الحسنى أقروا بهما ضمن الأسماء الثابتة بالقرآن الكريم، وهما من أسماء الله التوقيفية القطعية الثبوت.</p>
<p dir="rtl" class="p1">وقد وردت المعاني والصفات المقاربة في أحاديث مثل: " اللَّهُمَّ أَنْتَ القَوِيُّ فَقَوِّنِي، وَأَنْتَ القَاهِرُ فَاقْهَرْ هَوَايَ <span class="s21">"</span> وارد من دعاء السلف، لا عن النبي، ويُستأنس به من باب الأدعية المشروعة.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p24"><b>وإليكم الآن الشرح التدبري العميق لاسمَي الله:</b><span class="s9"> </span><span class="s8"><b>ٱلْقَاهِرُ</b></span><span class="s9"> – </span><span class="s8"><b>ٱلْقَهَّارُ</b></span><span class="s9">:</span></p>
<p dir="rtl" class="p25"><span class="s2"><b>أولًا</b></span><b>: الفرق التدبري بين “</b><span class="s8"><b>ٱلْقَاهِر</b></span><b>” و“</b><span class="s8"><b>ٱلْقَهَّار</b></span><b>”:</b></p>
<p dir="rtl" class="p1"><span class="s8"><b>ٱلْقَاهِر</b></span>: يدل على الثبوت والجلال والقُدرة المطلقة التي تَعلُو ولا تُغلب، هو قهر "الوضع"، أي أنَّ الله قَهَر كل شيء أن يكون دونه، وفي قبضته.</p>
<p dir="rtl" class="p1"><span class="s8"><b>ٱلْقَهَّار</b></span>: صيغة مبالغة، تدل على الاستمرار، والشمول، والهيمنة على الدوام، قهر "الفعل"، أي أن الله يُمارس قهره باستمرار على كل من حاول العلو أو الانفلات، وكما مرَّ معنا فكأنَّ:</p>
<p dir="rtl" class="p1"><span class="s8"><b>ٱلْقَاهِرُ</b></span><b> = اسم الصفة العظمى الثابتة.</b></p>
<p dir="rtl" class="p1"><span class="s8"><b>ٱلْقَهَّارُ</b></span><b> = اسم الفعل المستمر المتجدّد.</b></p>
<p dir="rtl" class="p25"><span class="s2"><b>ثانيًا</b></span><b>: التدبر في عظمة القهر الإلهي:</b></p>
<p dir="rtl" class="p36"><span class="s2">قهر الجوارح</span>: لا أحد يُحرّك طرفةَ عين إلَّا بأمره، قلبك ينبض، رئتك تتنفّس، عينيك تطرف… بأمر <span class="s8"><b>ٱلْقَاهِرُ</b></span>.</p>
<p dir="rtl" class="p36"><span class="s2">قهر الأنفس</span>: هل تظن أن طاعتك بيدك فقط؟ كم مرة أردت الطاعة، فلم تُوفق؟ كم مرة تمنيت الإنابة، فما استطعت؟ فإن لم يقهرك الله على التوبة، فلن تملك سبيلها: <span class="s15">﴿وَٱعۡلَمُوٓاْ أَنَّ فِيكُمۡ رَسُولَ ٱللَّهِۚ لَوۡ يُطِيعُكُمۡ فِي كَثِيرٖ مِّنَ ٱلۡأَمۡرِ لَعَنِتُّمۡ وَلَٰكِنَّ ٱللَّهَ حَبَّبَ إِلَيۡكُمُ ٱلۡإِيمَٰنَ وَزَيَّنَهُۥ فِي قُلُوبِكُمۡ وَكَرَّهَ إِلَيۡكُمُ ٱلۡكُفۡرَ وَٱلۡفُسُوقَ وَٱلۡعِصۡيَانَۚ أُوْلَٰٓئِكَ هُمُ ٱلرَّٰشِدُونَ﴾</span><span class="s20">﴿وَٱعۡلَمُوٓاْ أَنَّ فِيكُمۡ رَسُولَ ٱللَّهِۚ لَوۡ يُطِيعُكُمۡ فِي كَثِيرٖ مِّنَ ٱلۡأَمۡرِ لَعَنِتُّمۡ وَلَٰكِنَّ ٱللَّهَ حَبَّبَ إِلَيۡكُمُ ٱلۡإِيمَٰنَ وَزَيَّنَهُۥ فِي قُلُوبِكُمۡ وَكَرَّهَ إِلَيۡكُمُ ٱلۡكُفۡرَ وَٱلۡفُسُوقَ وَٱلۡعِصۡيَانَۚ أُوْلَٰٓئِكَ هُمُ ٱلرَّٰشِدُونَ﴾</span><span class="s13"> </span><span class="s12">الحجرات: ٧</span>، قهرٌ محبّب، لا مهين.</p>
<p dir="rtl" class="p36"><span class="s2">قهر العقول</span>: أحيانًا تشعر أنك عاجز عن الفهم، مشتّت الذهن، مشلول الإرادة… ليس لأنَّك ضعيف، بل لأنَّ <span class="s8"><b>ٱلْقَاهِرُ</b></span> أراد أن يُعلّمك أنك لا تفكر إلَّا بإذنه.</p>
<p dir="rtl" class="p36"><span class="s2">قهر الأكوان</span>: قوانين الفيزياء كلها خاضعة له، الشمس لا تشرق بذاتها، والرياح لا تهب إلَّا بأمره، وكل جاذبية، ومدار، وجريان… كلها تابعة لقهره الأزلي الأبدي.</p>
<p dir="rtl" class="p25"><span class="s2"><b>ثالثًا</b></span><b>: حين يكون القهر رحمة لا غضبًا:</b></p>
<p dir="rtl" class="p1">ليس كل قهرٍ بلاء... بل أحيانًا يقهر الله عبدَه ليُنقذه من نفسه.</p>
<p dir="rtl" class="p1">يقهره بالفشل ليكسر كبرياءه..</p>
<p dir="rtl" class="p1">يقهره بالمرض ليلين قلبه...</p>
<p dir="rtl" class="p1">يقهره بالخذلان ليعرف من هو الأوفى...</p>
<p dir="rtl" class="p1">فإذا قهرك الله، فلا تنظر إلى ما أُخذ منك، بل إلى ما سَيُعاد تشكيلك به.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p25"><span class="s2"><b>رابعًا</b></span><b>: القهر طريق التوحيد الحقيقي:</b></p>
<p dir="rtl" class="p1">اسم ٱلْقَهَّار في القرآن كثيرًا ما يأتي مقترنًا بتوحيد الله ووحدانيته، مثال:<span class="s15"> ﴿قُلۡ مَن رَّبُّ ٱلسَّمَٰوَٰتِ وَٱلۡأَرۡضِ قُلِ ٱللَّهُۚ قُلۡ أَفَٱتَّخَذۡتُم مِّن دُونِهِۦٓ أَوۡلِيَآءَ لَا يَمۡلِكُونَ لِأَنفُسِهِمۡ نَفۡعٗا وَلَا ضَرّٗاۚ قُلۡ هَلۡ يَسۡتَوِي ٱلۡأَعۡمَىٰ وَٱلۡبَصِيرُ أَمۡ هَلۡ تَسۡتَوِي ٱلظُّلُمَٰتُ وَٱلنُّورُۗ أَمۡ جَعَلُواْ لِلَّهِ شُرَكَآءَ خَلَقُواْ كَخَلۡقِهِۦ فَتَشَٰبَهَ ٱلۡخَلۡقُ عَلَيۡهِمۡۚ قُلِ ٱللَّهُ خَٰلِقُ كُلِّ شَيۡءٖ وَهُوَ ٱلۡوَٰحِدُ ٱلۡقَهَّٰرُ﴾</span><span class="s13"> </span><span class="s12">الرعد: ١٦</span>، لأنه لا يُمكنك أن تُوحِّد الله حقًا… حتى تُسلِّم أن كل ما في حياتك تحت قهره.</p>
<p dir="rtl" class="p1">كل ما يخرج عن يدك، كل ما لا تفهمه، كل ما لا تسيطر عليه… هو صدى لهذا الاسم:<span class="s8"><b> ٱلْقَهَّار</b></span>.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p25"><span class="s2"><b>خامسًا</b></span><b>: القهر الإلهي يُربّي النفس على أربعة أشياء:</b></p>
<p dir="rtl" class="p36"><span class="s2">التواضع الحقيقي</span>: حين تعلم أنَّ الله يقهرك متى شاء… لن تتعالى على أحد.</p>
<p dir="rtl" class="p36"><span class="s2">السَّكينة عند العجز</span>: إذا علمت أن القاهر يُدبّر الأمر… لا تحزن إن فشلت، ولا تُنهك إن عُطّلت.</p>
<p dir="rtl" class="p36"><span class="s2">اللُّجوء الدائم إليه</span>: لا تظن أن قوتك كافية… فالذي قهرك وأنت قوي، يستطيع أن يُحييك وأنت في قاع الضعف.</p>
<p dir="rtl" class="p36"><span class="s2">حبّ الانكسار بين يديه</span>: فهو لا يقبل مَن دخل عليه متكبّرًا، لكنه يُغدق على من قهرته الحياة… وجاءه مكسورًا.</p>
<p dir="rtl" class="p25"><span class="s2"><b>سادسًا</b></span><b>: الفرق بين قهر الناس وقهر الله</b></p>
