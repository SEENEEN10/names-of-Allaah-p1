  <script>
    (() => {
      const CHAPTERS = [
        { id: 'chapter-full', title: 'النص الكامل للكتاب - الجزء الثاني' }
      ];

      const STORAGE_PREFIX = 'asma_v2_part2_';

      const defaults = {
        theme: 'light',
        font: '"Amiri", serif',
        fontSize: 18,
        lineHeight: 2
      };

      const state = {
        currentChapter: 'chapter-full',
        saveTimer: null,
        resizeTimer: null,
        lastScrollY: 0
      };

      const dom = {
        content: document.getElementById('content'),
        chaptersList: document.getElementById('chapters-list'),
        chaptersPanel: document.getElementById('chapters-panel'),
        settingsPanel: document.getElementById('settings-panel'),
        overlay: document.getElementById('overlay'),
        progressFill: document.getElementById('progress-fill'),
        autosave: document.getElementById('autosave-indicator'),
        topbar: document.querySelector('.topbar'),
        chaptersBtn: document.getElementById('chapters-btn'),
        settingsBtn: document.getElementById('settings-btn'),
        continueBtn: document.getElementById('continue-btn'),
        fontSelect: document.getElementById('font-select'),
        fontIncrease: document.getElementById('font-increase'),
        fontDecrease: document.getElementById('font-decrease'),
        fontSizeDisplay: document.getElementById('font-size-display'),
        lineHeightSlider: document.getElementById('line-height-slider'),
        lineHeightDisplay: document.getElementById('line-height-display'),
        resetBtn: document.getElementById('reset-btn')
      };

      function storageSet(key, value) {
        try {
          localStorage.setItem(STORAGE_PREFIX + key, JSON.stringify(value));
        } catch (error) {
          console.warn('Storage write failed:', error);
        }
      }

      function storageGet(key, fallback = null) {
        try {
          const raw = localStorage.getItem(STORAGE_PREFIX + key);
          return raw ? JSON.parse(raw) : fallback;
        } catch {
          return fallback;
        }
      }

      function storageRemove(key) {
        try {
          localStorage.removeItem(STORAGE_PREFIX + key);
        } catch {
          // no-op
        }
      }

      function getCurrentSettings() {
        return {
          theme: document.body.dataset.theme || 'light',
          font: dom.fontSelect.value,
          fontSize: parseInt(dom.fontSizeDisplay.textContent, 10),
          lineHeight: parseFloat(dom.lineHeightDisplay.textContent)
        };
      }

      function setTheme(theme) {
        document.body.dataset.theme = theme;
        document.body.classList.remove('theme-dark', 'theme-sepia', 'theme-sand');
        if (theme !== 'light') {
          document.body.classList.add('theme-' + theme);
        }

        document.querySelectorAll('.swatch').forEach((swatch) => {
          swatch.classList.toggle('active', swatch.dataset.theme === theme);
        });
      }

      function applySettings(settings) {
        const safe = { ...defaults, ...settings };

        setTheme(safe.theme);
        document.documentElement.style.setProperty('--font-family', safe.font);
        document.documentElement.style.setProperty('--font-size', safe.fontSize + 'px');
        document.documentElement.style.setProperty('--line-height', safe.lineHeight);

        dom.fontSelect.value = safe.font;
        dom.fontSizeDisplay.textContent = safe.fontSize + 'px';
        dom.lineHeightSlider.value = safe.lineHeight;
        dom.lineHeightDisplay.textContent = safe.lineHeight.toFixed(1);
      }

      function persistSettings() {
        storageSet('settings', getCurrentSettings());
      }

      function setPanelState(isOpen) {
        document.body.classList.toggle('panel-open', isOpen);
        dom.overlay.classList.toggle('active', isOpen);
      }

      function openPanel(panel) {
        const isChapterPanel = panel === dom.chaptersPanel;
        dom.chaptersPanel.classList.toggle('active', isChapterPanel);
        dom.settingsPanel.classList.toggle('active', !isChapterPanel);
        setPanelState(true);
      }

      function closePanels() {
        dom.chaptersPanel.classList.remove('active');
        dom.settingsPanel.classList.remove('active');
        setPanelState(false);
      }

      function renderChapters() {
        dom.chaptersList.innerHTML = CHAPTERS.map((chapter, index) => {
          return `<li><a href="#${chapter.id}" class="chapter-link" data-chapter="${chapter.id}">${index + 1}. ${chapter.title}</a></li>`;
        }).join('');

        dom.chaptersList.addEventListener('click', (event) => {
          const link = event.target.closest('.chapter-link');
          if (!link) {
            return;
          }

          event.preventDefault();
          loadChapter(link.dataset.chapter);
          closePanels();
        });
      }

      function getInlineChapterHtml(chapterId) {
        const template = document.getElementById(`chapter-template-${chapterId}`);
        if (!template) {
          return '';
        }
        return template.innerHTML.trim();
      }

      function normalizeFullChapterLayout() {
        // Remove hidden Word field artifacts and empty spacer paragraphs.
        dom.content.querySelectorAll(
          'span[style*="mso-hide:screen"], span[style*="display:none"], [style*="mso-element:field-begin"], [style*="mso-element:field-separator"], [style*="mso-element:field-end"]'
        ).forEach((el) => el.remove());

        // Remove stray marker text carried from the DOC export.
        dom.content.querySelectorAll('p').forEach((p) => {
          const compactText = (p.textContent || '').replace(/\u00a0/g, ' ').replace(/\s+/g, ' ').trim();
          if (
            /^ض\s*-\+\s*$/.test(compactText) ||
            /^(TOC\s+\\o|HYPERLINK\s+\\l|PAGEREF\s+_Toc|PAGE\s+\\\*\s+MERGEFORMAT)/i.test(compactText)
          ) {
            p.remove();
          }
        });

        const paragraphs = dom.content.querySelectorAll('p');
        paragraphs.forEach((p, index) => {
          // Focus on the opening pages where the imported spacing is usually broken.
          if (index > 1200) {
            return;
          }
          const text = (p.textContent || '').replace(/\u00a0/g, '').trim();
          if (!text) {
            p.remove();
            return;
          }
          p.style.width = 'auto';
          p.style.maxWidth = '100%';
          p.style.marginLeft = '0';
          p.style.marginRight = '0';
          p.style.textIndent = '0';
          p.style.paddingRight = '0';
          if (!p.hasAttribute('align')) {
            p.style.textAlign = 'justify';
          }
        });

        // Tighten oversized imported Word styling on small screens.
        if (window.matchMedia('(max-width: 820px)').matches) {
          const openingBlocks = Array.from(dom.content.querySelectorAll('p, h1, h2, h3')).slice(0, 220);
          openingBlocks.forEach((block) => {
            const inlineSized = [block, ...block.querySelectorAll('[style*="font-size"]')];
            inlineSized.forEach((el) => {
              const styleText = (el.getAttribute('style') || '');
              const match = styleText.match(/font-size:\s*([0-9.]+)pt/i);
              if (!match) {
                return;
              }
              const pt = parseFloat(match[1]);
              if (pt >= 30) {
                el.style.fontSize = '1.9rem';
              } else if (pt >= 24) {
                el.style.fontSize = '1.5rem';
              } else if (pt >= 20) {
                el.style.fontSize = '1.25rem';
              }
            });
          });

          Array.from(dom.content.querySelectorAll('span[style*="position:absolute"], div[style*="position:absolute"]'))
            .slice(0, 120)
            .forEach((el) => {
              el.style.left = 'auto';
              el.style.right = 'auto';
              el.style.maxWidth = '100%';
            });
        }

        // Keep list/TOC numbering inside the page boundaries.
        dom.content.querySelectorAll('.MsoToc1, .MsoToc2, ul, ol, li').forEach((el) => {
          el.style.maxWidth = '100%';
          el.style.marginLeft = '0';
          el.style.marginRight = '0';
          el.style.textIndent = '0';
          if (el.tagName === 'UL' || el.tagName === 'OL') {
            el.style.paddingRight = '1rem';
            el.style.listStylePosition = 'inside';
          }
        });

        // Opening pages from Word sometimes force LTR-ish alignment by inline styles.
        dom.content.querySelectorAll('p[align="left"][dir="RTL"]').forEach((p) => {
          p.style.textAlign = 'right';
        });

        // Normalize table reading direction so Arabic comparison tables keep "الاسم" on the right edge.
        dom.content.querySelectorAll('table').forEach((table) => {
          const firstRow = table.querySelector('tr');
          if (!firstRow) {
            return;
          }

          const rowCells = Array.from(firstRow.children).filter((cell) =>
            cell.tagName === 'TD' || cell.tagName === 'TH'
          );
          if (!rowCells.length) {
            return;
          }

          const cleanText = (text) => (text || '').replace(/\u00a0/g, ' ').replace(/\s+/g, ' ').trim();
          const firstText = cleanText(rowCells[0].textContent);
          const lastText = cleanText(rowCells[rowCells.length - 1].textContent);

          const firstIsName = firstText.includes('الاسم');
          const lastIsName = lastText.includes('الاسم');
          const tableDir = lastIsName && !firstIsName ? 'ltr' : 'rtl';

          table.setAttribute('dir', tableDir);
          table.style.direction = tableDir;
          table.style.unicodeBidi = 'isolate';

          table.querySelectorAll('td, th').forEach((cell) => {
            cell.style.direction = 'rtl';
            cell.style.unicodeBidi = 'plaintext';
            cell.querySelectorAll('p').forEach((p) => {
              if (!p.getAttribute('dir')) {
                p.setAttribute('dir', 'rtl');
              }
            });
          });
        });

        // Center the dedication block and neutralize absolute wrappers around it.
        const dedicationHeading = Array.from(dom.content.querySelectorAll('p, h1, h2, h3'))
          .find((el) => (el.textContent || '').includes('الإهداء'));

        if (!dedicationHeading) {
          return;
        }

        let ancestor = dedicationHeading.parentElement;
        while (ancestor && ancestor !== dom.content) {
          const styleText = (ancestor.getAttribute('style') || '').toLowerCase();
          if (
            styleText.includes('position:absolute') ||
            styleText.includes('left:-48px') ||
            styleText.includes('top:-536px')
          ) {
            ancestor.style.position = 'static';
            ancestor.style.left = 'auto';
            ancestor.style.top = 'auto';
            ancestor.style.width = 'auto';
            ancestor.style.height = 'auto';
            ancestor.style.transform = 'none';
            ancestor.style.margin = '0 auto';
          }
          ancestor = ancestor.parentElement;
        }

        const dedicationBlock = dedicationHeading.closest('.shape') || dedicationHeading.parentElement;
        if (!dedicationBlock) {
          return;
        }

        dedicationBlock.style.maxWidth = '46rem';
        dedicationBlock.style.margin = '0 auto';
        dedicationBlock.style.textAlign = 'center';
        dedicationBlock.querySelectorAll('p').forEach((p) => {
          p.style.textAlign = 'center';
          p.style.marginRight = '0';
          p.style.marginLeft = '0';
        });
      }

      function decorateQuranContent() {
        const candidates = dom.content.querySelectorAll('p, li, blockquote, h1, h2, h3, h4, h5, h6, td, th, div');
        candidates.forEach((el) => {
          const text = (el.textContent || '').replace(/\u00a0/g, ' ').trim();
          const hasQuranQuotes = text.includes('﴿') && text.includes('﴾');
          const isBasmala = text === '﷽' || text === 'بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ';
          el.classList.toggle('quran-quote', hasQuranQuotes || isBasmala);
        });
      }

      function updateTopbarAutoHide() {
        if (!dom.topbar) {
          return;
        }
        const currentY = window.scrollY || 0;
        const delta = currentY - state.lastScrollY;

        if (currentY <= 24) {
          dom.topbar.classList.remove('is-hidden');
          state.lastScrollY = currentY;
          return;
        }

        if (delta > 8) {
          dom.topbar.classList.add('is-hidden');
        } else if (delta < -8) {
          dom.topbar.classList.remove('is-hidden');
        }

        state.lastScrollY = currentY;
      }

      function markActiveChapter(chapterId) {
        document.querySelectorAll('.chapter-link').forEach((link) => {
          link.classList.toggle('active', link.dataset.chapter === chapterId);
        });
      }

      function showAutosaveIndicator() {
        dom.autosave.classList.add('show');
        setTimeout(() => {
          dom.autosave.classList.remove('show');
        }, 1200);
      }

      function updateProgressBar() {
        const top = window.scrollY;
        const height = document.documentElement.scrollHeight - window.innerHeight;
        const progress = height > 0 ? (top / height) * 100 : 0;
        dom.progressFill.style.width = `${Math.max(0, Math.min(100, progress))}%`;
      }

      function savePositionDebounced() {
        clearTimeout(state.saveTimer);
        state.saveTimer = setTimeout(() => {
          storageSet(`pos_${state.currentChapter}`, window.scrollY);
          showAutosaveIndicator();
        }, 500);
      }

      function loadChapter(chapterId) {
        if (!CHAPTERS.some((chapter) => chapter.id === chapterId)) {
          chapterId = CHAPTERS[0].id;
        }
        state.currentChapter = chapterId;
        storageSet('lastChapter', chapterId);
        markActiveChapter(chapterId);

        dom.content.innerHTML = '<div class="placeholder"><p>جاري تحميل الفصل...</p></div>';
        const chapterHtml = getInlineChapterHtml(chapterId);
        if (!chapterHtml) {
          dom.content.innerHTML = `
            <div class="error">
              لا يوجد محتوى لهذا الفصل داخل ملف الصفحة.<br>
              تأكد من وجود القالب: <code>chapter-template-${chapterId}</code>
            </div>
          `;
          return;
        }

        dom.content.innerHTML = chapterHtml;
        dom.content.classList.toggle('full-book', chapterId === 'chapter-full');
        if (chapterId === 'chapter-full') {
          normalizeFullChapterLayout();
          decorateQuranContent();
        }
        if (dom.topbar) {
          dom.topbar.classList.remove('is-hidden');
        }
        const savedPosition = storageGet(`pos_${chapterId}`, 0);
        setTimeout(() => {
          window.scrollTo({ top: savedPosition, behavior: 'auto' });
          updateProgressBar();
        }, 60);
      }

      function continueReading() {
        const lastChapter = storageGet('lastChapter', CHAPTERS[0].id);
        if (!CHAPTERS.some((chapter) => chapter.id === lastChapter)) {
          loadChapter(CHAPTERS[0].id);
          return;
        }
        loadChapter(lastChapter);
      }

      function resetSettings() {
        storageRemove('settings');
        applySettings(defaults);
        persistSettings();
      }

      function wireEvents() {
        dom.chaptersBtn.addEventListener('click', () => openPanel(dom.chaptersPanel));
        dom.settingsBtn.addEventListener('click', () => openPanel(dom.settingsPanel));
        dom.continueBtn.addEventListener('click', continueReading);

        dom.overlay.addEventListener('click', closePanels);
        document.addEventListener('keydown', (event) => {
          if (event.key === 'Escape') {
            closePanels();
          }
        });

        document.querySelectorAll('.swatch').forEach((swatch) => {
          swatch.addEventListener('click', () => {
            setTheme(swatch.dataset.theme);
            persistSettings();
          });
        });

        dom.fontSelect.addEventListener('change', () => {
          document.documentElement.style.setProperty('--font-family', dom.fontSelect.value);
          persistSettings();
        });

        dom.fontIncrease.addEventListener('click', () => {
          const current = parseInt(dom.fontSizeDisplay.textContent, 10);
          const next = Math.min(32, current + 1);
          dom.fontSizeDisplay.textContent = `${next}px`;
          document.documentElement.style.setProperty('--font-size', `${next}px`);
          persistSettings();
        });

        dom.fontDecrease.addEventListener('click', () => {
          const current = parseInt(dom.fontSizeDisplay.textContent, 10);
          const next = Math.max(12, current - 1);
          dom.fontSizeDisplay.textContent = `${next}px`;
          document.documentElement.style.setProperty('--font-size', `${next}px`);
          persistSettings();
        });

        dom.lineHeightSlider.addEventListener('input', () => {
          const value = parseFloat(dom.lineHeightSlider.value);
          dom.lineHeightDisplay.textContent = value.toFixed(1);
          document.documentElement.style.setProperty('--line-height', value);
          persistSettings();
        });

        dom.resetBtn.addEventListener('click', resetSettings);

        window.addEventListener('scroll', () => {
          updateProgressBar();
          savePositionDebounced();
          updateTopbarAutoHide();
        }, { passive: true });

        window.addEventListener('resize', () => {
          clearTimeout(state.resizeTimer);
          state.resizeTimer = setTimeout(() => {
            updateProgressBar();
            if (state.currentChapter === 'chapter-full') {
              normalizeFullChapterLayout();
            }
            if (window.innerWidth > 820) {
              closePanels();
            }
          }, 160);
        }, { passive: true });
      }

      function init() {
        renderChapters();

        const savedSettings = storageGet('settings', defaults);
        applySettings(savedSettings);
        wireEvents();
        state.lastScrollY = window.scrollY || 0;

        const chapterFromHash = location.hash.replace('#', '');
        const validHash = CHAPTERS.some((chapter) => chapter.id === chapterFromHash);
        const savedChapter = storageGet('lastChapter', CHAPTERS[0].id);
        const validSavedChapter = CHAPTERS.some((chapter) => chapter.id === savedChapter)
          ? savedChapter
          : CHAPTERS[0].id;
        const initialChapter = validHash
          ? chapterFromHash
          : validSavedChapter;

        loadChapter(initialChapter);
      }

      init();
    })();
  </script>
</body>
</html>
