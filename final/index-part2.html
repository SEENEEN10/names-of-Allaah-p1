<p dir="rtl" class="p44">( ذُو ٱلْجَلَالِ وَٱلْإِكْرَامِ )</p>
<p dir="rtl" class="p45"><b>ذُو ٱلْجَلَالِ وَٱلْإِكْرَامِ…</b></p>
<p dir="rtl" class="p1">هو الذي يملك الجلال في عظمته، الذي تتجلى فيه أعلى درجات الهيبة والكمال، هو الذي لا يُضاهيه أحد في جلاله، ولا يُمكن لأي شيء أن يقارن بجمال ملكه وعظمته، ذو الجلال هو الذي يجعل الكون كله ينحني أمامه إجلالًا، ويجعل الحياة مليئة بالهيبة والاحترام، هو الذي يرى كل شيء في هذا الكون ويُقدره بعظمة وحكمة.</p>
<p dir="rtl" class="p1">أما الإكرام فهو الذي يُكرم عباده برحمته، ويُظهر لهم فضل الله في كل شيء، فيمنحهم النعمة والبركة التي لا تُحصى، ويُكرمهم برزق واسع، وصحة، وأمل.</p>
<p dir="rtl" class="p1"> هو الذي يُكرم من يشاء بما هو أفضل له، فيجعل قلبه مليئًا بالطمأنينة ويشعره بعزة النفس والرفعة.</p>
<p dir="rtl" class="p1"><span class="s37"><b>ذُو ٱلْجَلَالِ وَٱلْإِكْرَامِ…</b></span> هو الذي يجمع بين العظمة واللطف، بين القوة والرحمة، فيُظهر لك كيف أن الرحمة يمكن أن تكون في غاية العظمة.</p>
<p dir="rtl" class="p1"><span class="s37"><b>ذُو ٱلْجَلَالِ وَٱلْإِكْرَامِ…</b></span> هو الذي يمنحك من الكرامة ما لم تتوقعه، ويُظهر لك كيف أنَّ الجلال لا يعني القسوة، بل هو العدل والحكمة التي تمنح كل شيء في الحياة مكانه الطبيعي. </p>
<p dir="rtl" class="p1">هو الذي إذا رفعت يدك بالدعاء، فإنه يكرمك بما هو خير لك ويمنحك من فضله ورحمته.</p>
<p dir="rtl" class="p1"><span class="s37"><b>ذُو ٱلْجَلَالِ وَٱلْإِكْرَامِ…</b></span> هو الذي يُكرم أهل التقوى والإيمان، ويمنحهم رفعة في الدنيا وفي الآخرة، هو الذي يُظهر لك جمال الإيمان ويجعلك تشعر بالعزة في قربه، ويُبارك لك في جميع أمورك.</p>
<p dir="rtl" class="p1"><br>
هو الذي يرفع من أراد رفعه ويضع من أراد وضعه، وكل شيء في حكمته وبقدرته.</p>
<p dir="rtl" class="p1">إذا شعرت أنك في حاجة إلى الرفعة أو الكرامة، تذكر أن الله هو <span class="s37"><b>ذُو ٱلْجَلَالِ وَٱلْإِكْرَامِ…</b></span> الذي يرفعك عن كل ضيق، ويمنحك الكرامة الحقيقية من فضله ورحمته. ثق في أن الجلال والإكرام بين يديه وحده، وأنه قادر على أن يرفعك إلى أعلى درجات العز والكرامة.</p>
<p dir="rtl" class="p1"><span class="s37"><b>ذُو ٱلْجَلَالِ وَٱلْإِكْرَامِ…</b></span> هو الذي يجمع في نفسه القوة والرحمة، ويمنحك من الفضائل ما يحقق لك سعادة الدنيا والآخرة.</p>
<p dir="rtl" class="p19"><br></p>
<p dir="rtl" class="p24"><b>عناوين تأملية لاسم الله "</b><span class="s8"><b>ذُو ٱلْجَلَالِ وَٱلْإِكْرَامِ</b></span><b>" مع دلالاتها:</b></p>
<p dir="rtl" class="p36">وجهٌ لا يُطلب سواه… وجلال لا يُحتمل إلا بالحبّ: أن هذا الاسم يجمع بين الهيبة العظمى والرَّحمة القصوى.</p>
<p dir="rtl" class="p36">إذا خِفتَ من جلاله… ففرّ إلى إكرامه: فهو المهيب الـمُكرِم، الذي لا يطرد من خافه… بل يأوي إليه.</p>
<p dir="rtl" class="p36">جلاله يُسقِطُ كبرياءك… وإكرامه يرفع روحك: لأنَّ من عرفه سجد لعظمته، ثم بكى من كرمه.</p>
<p dir="rtl" class="p36">تعبدك له ليس إذلالًا… بل ارتقاء لجلالٍ لا يُشبِه أحدًا: فأنت لا تُذلّ نفسك، بل ترفعها إلى مقام من لا يَظلم ولا يُهين.</p>
<p dir="rtl" class="p36">ذو الجلال… فلا يُدانى، ذو الإكرام… فلا يُنسى: فلا قلب يُجافيه، ولا عقل يُدرك مداه.</p>
<p dir="rtl" class="p36">جلاله يحيي المهابة… وإكرامه يُحيي الطمأنينة: فهو وحده من إذا خفتَه… سَكَن قلبك.</p>
<p dir="rtl" class="p36">إذا أردتَ الله في أجمل ما يكون… فاذكره بـ"ذُو ٱلْجَلَالِ وَٱلْإِكْرَامِ": لأنه الاسم الذي أمرنا أن نُلِح به في الدعاء بعد التسبيح.</p>
<p dir="rtl" class="p36">اسمٌ تُرعِدُ له القلوب… وتُزهر له الأرواح: لأنه ليس فقط اسم هيبة… بل هو اسم ودّ وكرامة ومقام.</p>
<p dir="rtl" class="p36">هو الجليل… فلا يُنازع، وهو الـمُكرِم… فلا يُخاف منه الفقر: فإذا خشيت الله، اغتنيت، وإذا عرفته، أحببته.</p>
<p dir="rtl" class="p36">ذُو ٱلْجَلَالِ… فاسجد هيبةً، وَٱلْإِكْرَامِ… فقم محبوبًا: فهو الإله الذي يجمع بين التجلي والتفضل، وبين العظمة واللطف.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p14"><b>المعنى التدبري العميق:</b></p>
<p dir="rtl" class="p1">أن تعيش في حضرة الله تعالى بين مهابةٍ تُسكِت اللسان، وكرمٍ يبعث الأمل، أن تعرف أنَّ الله لا يُدانى في جلاله، ولا يُجارى في إكرامه.</p>
<p dir="rtl" class="p1">أن تُربّي قلبك على أنَّه لا يستحق التعظيم إلا مَن جمع الجلال والإكرام معًا،<br>
فكم من عظيمٍ بلا رحمة، وكم من كريمٍ بلا مهابة… لكن الله وحده هو الذي إذا جَلَّ… هِبتَه، وإذا أكرم… أدهشك.</p>
<p dir="rtl" class="p1"><b>وإذا استقر هذا الاسم في قلبك:</b></p>
<p dir="rtl" class="p25">لن تتعلّق بعظمة أحد… لأن كل عظمة سوى الله ناقصة.</p>
<p dir="rtl" class="p25">ولن تذلّ لأحدٍ طمعًا… لأنَّ الكرم الحقيقي من عند الله وحده.</p>
<p dir="rtl" class="p25">ستُحب الله حبًّا يخلطه خضوع وافتقار، لا غرور ولا أمان كاذب.</p>
<p dir="rtl" class="p25">وسترجع إلى الله حين تُقصِّر… لأنك توقن أنَّه الجليل الـمُكرِم، لا الجبّار الغاضب فقط.</p>
<p dir="rtl" class="p1"><b>خلاصة التدبّر:</b></p>
<p dir="rtl" class="p1">"<span class="s8"><b>ذُو ٱلْجَلَالِ وَٱلْإِكْرَامِ</b></span>" هو الاسم الذي تسجد له مهابةً… وتبكي له محبةً.<br>
هو الاسم الذي يرفعك إلى مقامات العبودية الكاملة، لأنك لا تعبد الله فقط رجاءً في عطائه، ولا خوفًا من عقابه… بل لأنك عرفت أنه هو الجليل الكريم… الذي لا يُعبد إلَّا حبًّا وهيبة.</p>
<p dir="rtl" class="p52"><span class="s2"><b>التمهيد الوجداني لاسم "</b></span><b>ذُو ٱلْجَلَالِ وَٱلْإِكْرَامِ</b><span class="s2"><b>":</b></span></p>
<p dir="rtl" class="p1">حين تُرهقك الحياة بأسئلتها… وتُثقلك الذنوب بأوجاعها… وتقف على باب الله لا تدري، هل تُقبَل رغم نقصك؟ أم تُقصى لعجزك؟.</p>
<p dir="rtl" class="p1">حينها… اذكر اسمه الذي تجتمع فيه المهابة والحنان، والعظمة واللطف، والقُرب والعلوّ: "<span class="s8"><b> ذُو ٱلْجَلَالِ وَٱلْإِكْرَامِ</b></span> ".</p>
<p dir="rtl" class="p1">"<span class="s8"><b>ذُو ٱلْجَلَالِ</b></span>" أي مالك العظمة التي لا يُدركها خيال، ولا يُحيط بها عقل، هو الذي إذا تجلّى على شيء، هابه كل شيء، وإذا نظر بقهره، تزلزل الوجود، هو الذي إذا ذكره العارفون… انخفضت أصواتهم، وخشعت جوارحهم، وانخلعت قلوبهم.</p>
<p dir="rtl" class="p1">"<span class="s8"><b>وَٱلْإِكْرَامِ</b></span>" أي مالك الكرم المطلق، والعطاء الذي لا يُقابل، والتفضل الذي لا يُشترى.</p>
<p dir="rtl" class="p1">هو الذي لا يُخزي من رجاه، ولا يُردّ من دعاه، ولا يُهين من طرق بابه… مهما بلغت ذنوبه.</p>
<p dir="rtl" class="p1">هذا الاسم وحده… يجمع المهابة التي تسجد لها الجباه، والرحمة التي تبكي لها القلوب.</p>
<p dir="rtl" class="p1">هو الاسم الذي لا يُدخلك فقط في عظمة الله… بل في أمانه.<br>
ولا يُشعرك فقط بالخوف من جلاله… بل بالحياء من إكرامه.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p14"><b>ولماذا هو اسم فريد؟</b></p>
<p dir="rtl" class="p1">لأنه الاسم الذي علّمنا النبي ﷺ أن نلِحّ به في الدعاء: "ألظّوا بياذا الجلال والإكرام" رواه الترمذي، أي الزموا هذا الاسم، وتشبثوا به، لأنَّه يفتح لك باب الجمال في أحلك ضعف، وباب الأمان في قمة الخشية. </p>
<p dir="rtl" class="p1"><b>خلاصة التمهيد:</b></p>
<p dir="rtl" class="p1">"<span class="s8"><b>ذُو ٱلْجَلَالِ وَٱلْإِكْرَامِ</b></span>" ليس مجرد وصف… بل هو بابٌ تدخل منه على الله إذا خفت… وإذا طمعت، إذا عظّمتَ… وإذا افتقرت، إذا سجدتَ من المهابة… وإذا بَكيتَ من الرجاء.</p>
<p dir="rtl" class="p1">هو الاسم الذي لا يترك في قلبك شيئًا إلَّا نقّاه… ولا في نفسك كبرياء إلَّا سحقه… ولا في فؤادك خواء إلَّا ملأه بنور السجود والحياء.</p>
<p dir="rtl" class="p19"><br></p>
<p dir="rtl" class="p24"><b>المعنى اللغوي والشرعي الدقيق "</b><span class="s8"><b>ذُو ٱلْجَلَالِ وَٱلْإِكْرَامِ</b></span><b>":</b></p>
<p dir="rtl" class="p1"><b>المعنى اللغوي:</b></p>
<p dir="rtl" class="p1"><span class="s8"><b>ذُو</b></span>: اسم موصول يُفيد الملكيّة والثبوت والاختصاص.</p>
<p dir="rtl" class="p1">أي: صاحبُ، أو مالكُ، أو المتّصف بـ...</p>
<p dir="rtl" class="p1"><span class="s8"><b>ٱلْجَلَالِ</b></span>: من الجذر (جَلَّ): أي عَظُم، وعلا، وتقدّس.</p>
<p dir="rtl" class="p1">و"الجلال" في اللغة: الهيبة، العظمة، السموّ، والتنزُّه عن كل نقص.</p>
<p dir="rtl" class="p1">يقال: "رجلٌ جليل" أي عظيم الشأن، فكيف بـ"ذُو الجلال"؟!</p>
<p dir="rtl" class="p1"><span class="s8"><b>ٱلْإِكْرَامِ</b></span><b>:</b> من (كَرُمَ): وهو ضد الهوان، يدل على الشرف والفضل والرفعة.</p>
<p dir="rtl" class="p1">والإكرام: هو فعل الكرم، والتفضّل، والتكريم، والرفق مع الجود.</p>
<p dir="rtl" class="p1"><b>المعنى الشرعي الدقيق:</b></p>
<p dir="rtl" class="p1">"<span class="s8"><b>ذُو ٱلْجَلَالِ وَٱلْإِكْرَامِ</b></span>" هو: الله المتفرِّد بجلال العظمة، وكمال الكبرياء، وسُمُوّ الذات والصفات، والمتفرّد كذلك بإكرام عباده برحمته، وفضله، وإنعامه، وستره، ومغفرته، وإحسانه الذي لا يُقابَل.</p>
<p dir="rtl" class="p1"><span class="s8"><b>الجلال</b></span>: يدل على ما يوجب الهيبة والخشوع والخضوع.</p>
<p dir="rtl" class="p1"><span class="s8"><b>الإكرام</b></span>: يدل على ما يوجب المحبة والرجاء والانجذاب إليه.</p>
<p dir="rtl" class="p1">فهو الجليلُ في ذاته، الكريمُ في فعله، العزيزُ في مقامه، الرؤوفُ في عطائه.</p>
<p dir="rtl" class="p14"><b>هل هما صفتان متقابلتان؟ أم متكاملتان؟</b></p>
<p dir="rtl" class="p1">بل هما متكاملتان في كمالٍ فريد لا يُوصف:</p>

  <p dir="rtl" class="p15"><b>الإكرام</b></p>
</td>
<td valign="middle" class="td483">
  <p dir="rtl" class="p15"><b>الجلال</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td484">
  <p dir="rtl" class="p16"><b>كرم لا يُقابَل</b></p>
</td>
<td valign="middle" class="td485">
  <p dir="rtl" class="p17"><b>عظمة لا تُدرك</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td486">
  <p dir="rtl" class="p16"><b>يوقظ الرجاء</b></p>
</td>
<td valign="middle" class="td487">
  <p dir="rtl" class="p17"><b>يوجب الخشية</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td484">
  <p dir="rtl" class="p16"><b>يرفعه إلى السماء رحمةً</b></p>
</td>
<td valign="middle" class="td485">
  <p dir="rtl" class="p17"><b>يُنزل العبد إلى الأرض هيبةً</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td488">
  <p dir="rtl" class="p16"><b>فضلٌ وإنعام</b></p>
</td>
<td valign="middle" class="td487">
  <p dir="rtl" class="p17"><b>سموٌّ وتنزيه</b></p>
</td>
</tr>

</table>
<p dir="rtl" class="p1">وهذا من أسرار عظمة الاسم: أن يجمع بين الرهبة والرغبة، الخشية والأنس، المهابة والمحبة.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p52"><span class="s2"><b>المعنى التدبري العميق "</b></span><b>ذُو ٱلْجَلَالِ وَٱلْإِكْرَامِ</b><span class="s2"><b>":</b></span></p>
<p dir="rtl" class="p1">الاسم العظيم "<span class="s8"><b>ذُو ٱلْجَلَالِ وَٱلْإِكْرَامِ</b></span>" هو من الأسماء التي تهتزّ لها الأرواح… فهو ليس فقط وصفًا لله، بل بابًا يُفتَح على عظمة تُخيف، وإكرام يُحيي.</p>
<p dir="rtl" class="p1">"<span class="s8"><b>ذُو ٱلْجَلَالِ وَٱلْإِكْرَامِ</b></span>" الاسم الذي تُطوى عنده الأصوات، وتنكسر عنده النفوس، وترتجف عند ذكره الأرواح… هو الاسم الذي إذا ناديت به… أقبل الله عليك بعظمته وهيبته، ثم قرّبك بإكرامه ولطفه.</p>
<p dir="rtl" class="p1">"<span class="s8"><b>ذُو ٱلْجَلَالِ</b></span>": أي صاحب الجلال المطلق الذي لا يُدرك كنهه:</p>
<p dir="rtl" class="p55">جلاله يُرهب… لكنه لا يُنفر.</p>
<p dir="rtl" class="p55">جلاله يُخيف… لكنه يُربي.</p>
<p dir="rtl" class="p55">جلاله ليس كجلال الملوك… بل جلالٌ مقدّسٌ، لا ظلم فيه، ولا طغيان، بل هيبة نابعة من الكمال.</p>
<p dir="rtl" class="p1"><span class="s8">❖</span>حين تقول: "<span class="s8"><b>ذو الجلال</b></span>"… فأنت تعلن خضوعك الكامل، وتسلّم له القيّوميّة، والسيادة، والعلوّ.</p>
<p dir="rtl" class="p1">هو الجليل الذي:</p>
<p dir="rtl" class="p55">له الكبرياء في السماوات والأرض.</p>
<p dir="rtl" class="p55">إذا أراد شيئًا قال له: "كن".</p>
<p dir="rtl" class="p55">كل شيء دونه ضئيل، مهما بدا عظيمًا.</p>
<p dir="rtl" class="p1">"<span class="s8"><b>وَٱلْإِكْرَامِ</b></span>": أي صاحب الفضل والإنعام… الذي يُكرم عباده لا لحاجة، بل لكرمه:</p>
<p dir="rtl" class="p55">هو الذي يكرم التائب… ولو أسرف.</p>
<p dir="rtl" class="p55">ويكرم الضعيف… ولو لم يُعرف.</p>
<p dir="rtl" class="p55">ويكرم من أطاعه… ويستر من عصاه.</p>
<p dir="rtl" class="p1"><span class="s8">❖</span>إذا قلت: "<span class="s8"><b>ذو الإكرام</b></span>" فأنت تُعلن رجاءك، وتستدعي كرمه، وتُذكّر نفسك أن الله يُعطي أكثر مما تتوقع.</p>
<p dir="rtl" class="p1">هو الكريم الذي إن أكرم… أدهشك وإن أعطى… أذهلك وإن عفا… نسي الذنب كله.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p14"><b>لماذا اقترن الجلال بالإكرام؟</b></p>
<p dir="rtl" class="p1">لأنَّ البعض إذا سمع <span class="s8"><b>بالجلال</b></span>… خاف، وظن أن القرب مستحيل فجاء <span class="s8"><b>الإكرام</b></span>… ليقول لك: هذا الجليل نفسه… هو الذي يُكرمك، ويحنو عليك، ويقربك، ويقبلك.</p>
<p dir="rtl" class="p1">فلا يقطعك خوفك… ولا يمنعك ذنبك لأنَّ <span class="s8"><b>الجلال</b></span> من صفاته… لكن <span class="s8"><b>الإكرام</b></span> من أفعاله معك.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p70"><b>تدبّرك لهذا الاسم يجب أن يُثمر:</b></p>
<p dir="rtl" class="p36">خشية صادقة من عظمة الله</p>
<p dir="rtl" class="p36">رجاء عميق في كرمه وإنعامه</p>
<p dir="rtl" class="p36">انكسار أمام جلاله</p>
<p dir="rtl" class="p36">سؤال دائم لإكرامه، كما كان النبي ﷺ يقول:</p>
<p dir="rtl" class="p1">"اللهم إني أسألك بأنك أنت الله، لا إله إلا أنت، الحي القيوم، ذو الجلال والإكرام".</p>
<p dir="rtl" class="p1"><b>خلاصة المعنى:</b></p>
<p dir="rtl" class="p1">اسم "<span class="s8"><b>ذُو ٱلْجَلَالِ وَٱلْإِكْرَامِ</b></span>" هو اسم يضم قمة الجبروت مع قمة الرحمة، فـإذا خشيتَ جلاله… ركنتَ إلى إكرامه، وإذا رجوتَ كرمه… عظّمتَ مقامه.</p>
<p dir="rtl" class="p19"><br></p>
<p dir="rtl" class="p24"><b>أدلة ورود اسم الله "</b><span class="s8"><b>ذُو ٱلْجَلَالِ وَٱلْإِكْرَامِ</b></span><b>" في القرآن الكريم والسنة النبوية:</b></p>
<p dir="rtl" class="p25"><b>أولًا: في القرآن الكريم</b></p>
<p dir="rtl" class="p36">سورة الرحمن – منتصف السورة: <span class="s15">﴿وَيَبۡقَىٰ وَجۡهُ رَبِّكَ ذُو ٱلۡجَلَٰلِ وَٱلۡإِكۡرَامِ﴾</span><span class="s13"> </span><span class="s12">الرحمن: ٢٧</span><span class="s21">.</span><span class="s55"> </span></p>
<p dir="rtl" class="p1"> <b>السياق</b>: بعد ذكر فناء كل شيء، وزوال ما في الأرض والسماء، يبقى وجه ربك فقط، "<span class="s8"><b>ذُو ٱلْجَلَالِ وَٱلْإِكْرَامِ</b></span>".</p>
<p dir="rtl" class="p1"><b>الدلالة</b>: أنَّ اسم الله هذا هو الاسم الباقي بعد فناء الخلق كلهم، لأن من صفاته الجلال الذي لا يُغلب، والإكرام الذي لا ينقطع، فالآية تبين دوام العظمة، ودوام النعمة، وتجعل المؤمن يتعلّق بالباقي لا بالزائل.</p>
<p dir="rtl" class="p36">سورة الرحمن – منتصف السورة: <span class="s15">﴿وَيَبۡقَىٰ وَجۡهُ رَبِّكَ ذُو ٱلۡجَلَٰلِ وَٱلۡإِكۡرَامِ﴾</span><span class="s13"> </span><span class="s12">الرحمن: ٢٧</span><span class="s21">.</span><span class="s55"> </span></p>
<p dir="rtl" class="p1"> <b>السياق</b>: بعد ذكر فناء كل شيء، وزوال ما في الأرض والسماء، يبقى وجه ربك فقط، "<span class="s8"><b>ذُو ٱلْجَلَالِ وَٱلْإِكْرَامِ</b></span>".</p>
<p dir="rtl" class="p1"><b>الدلالة</b>: أنَّ اسم الله هذا هو الاسم الباقي بعد فناء الخلق كلهم، لأن من صفاته الجلال الذي لا يُغلب، والإكرام الذي لا ينقطع، فالآية تبين دوام العظمة، ودوام النعمة، وتجعل المؤمن يتعلّق بالباقي لا بالزائل.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p25"><b>ثانيًا: في السُّنة النبوية الصحيحة</b></p>
<p dir="rtl" class="p36">حديث الإلحاح في الدعاء بهذا الاسم: قال ﷺ: "ألظّوا بـ"يا ذا الجلال والإكرام" رواه الترمذي، وحسنه الألباني.</p>
<p dir="rtl" class="p1"><span class="s8"><b>ألظّوا</b></span>: أي الزموا، وداوموا، وألحّوا، والحديث يدل على أن هذا الاسم من مفاتيح الإجابة، ومن أعظم ما يُدعى به الله تعالى.</p>
<p dir="rtl" class="p36">من دعاء النبي ﷺ في قيام الليل: عن أُمِّنا السيدة عائشة رضي الله عنها أنَّ النبي ﷺ كان إذا ركع أو سجد قال: " سُبُّوحٌ قُدُّوسٌ، رَبُّ الْمَلَائِكَةِ وَالرُّوحِ، اللَّهُمَّ اغْفِرْ لِي، فَإِنَّكَ أَنْتَ ذُو الْجَلَالِ وَالْإِكْرَامِ " رواه مسلم.</p>
<p dir="rtl" class="p1"><b>الدلالة</b>: هذا الذكر كان في أشرف مقامات القرب: السجود، وفيه يظهر أن النبي ﷺ كان يربط بين طلب المغفرة وبين الاعتراف بجلال الله وكرمه.</p>
<p dir="rtl" class="p36">دعاء النبي ﷺ بعد الصلاة: عن عبد الله بن عمر رضي الله عنه قال: كان النبي ﷺ إذا سلّم من صلاته يقول: " اللَّهُمَّ أَنْتَ السَّلَامُ، وَمِنْكَ السَّلَامُ، تَبَارَكْتَ يَا ذَا الْجَلَالِ وَالْإِكْرَامِ " رواه مسلم.</p>
<p dir="rtl" class="p1"><b>الدلالة</b>: هذا الدعاء يأتي في ختام الصَّلاة، أي بعد أن نكون أقرب ما نكون من الله، فيُختم بالاعتراف بأنه "<span class="s8"><b>ذُو ٱلْجَلَالِ وَٱلْإِكْرَامِ</b></span>"، أي أن َّكل ما قُمنا به من سجود وركوع وتضرّع… لا يليق إلَّا به.</p>
<p dir="rtl" class="p1"><b><br>
خلاصة الأدلة:</b></p>
<table cellspacing="0" cellpadding="0" class="t1">
<tbody>
<tr>
<td valign="middle" class="td157">
  <p dir="rtl" class="p15"><b>الدلالة</b></p>
</td>
<td valign="middle" class="td489">

</td>
<td valign="middle" class="td494">
  <p dir="rtl" class="p17"><b> "تباركت يا ذا الجلال" </b></p>
</td>

<p dir="rtl" class="p1">اسم "<span class="s8"><b>ذُو ٱلْجَلَالِ وَٱلْإِكْرَامِ</b></span>" ليس مجرد تجلٍ لله في عليائه، بل هو اسم يُعيد تشكيل نظرة العبد إلى نفسه، وسلوكه، وطموحه، وحتى ملامح قلبه.<br>
وإليك الآن تفصيلًا وجدانيًا وسلوكيًا دقيقًا حول هذا الأثر العظيم:</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p24"><b>أثر اسم الله "</b><span class="s8"><b>ذُو ٱلْجَلَالِ وَٱلْإِكْرَامِ</b></span><b>"</b><span class="s9"> </span><b>في السلوك وهمّة العبد:</b><b></b></p>
<p dir="rtl" class="p25"><b>أولًا: كيف يُؤثّر هذا الاسم في سلوك العبد؟</b></p>
<p dir="rtl" class="p36">يزرع في قلبه هيبةً مقدّسة: من يوقن أن الله هو "ذُو ٱلْجَلَالِ"، يعيش بخشوع حقيقي، لا يُجاهر بالذنب، ولا يتجرأ على المعصية، لأن في قلبه جلالًا لا يسمح له أن يتجاوز، الجلال يُربّي سلوكك قبل أن يُقيّمك الناس، فإذا أردت أن تُرى مستقيمًا أمام الله، فاستشعر جلاله، وستستقيم خُطاك من الداخل.</p>
<p dir="rtl" class="p36">يحرّك سلوكه ليكون انعكاسًا لـ "الإكرام": لأن الله "ذُو ٱلْإِكْرَامِ"، فالعبد يتخلّق بالكرم، والرفق، والإحسان، وستْر العيوب، وبذل الخير، لا يرضى لنفسه أن يُهين، أو يُقصي، أو يُغلّظ القول… لأن ربه يُكرم، وهو عبد لهذا الكريم، فإذا عاملت الناس بإكرام… فأنت تعكس في سلوكك اسم "مولاك الـمُكرِم".</p>
<p dir="rtl" class="p36">يضبط أقواله وأفعاله على ميزان الجلال: فلا يتكلم بلا توقير، ولا يُفتي بلا علم، ولا يُمازح فيما يُنقِص من قدر الدين… لأنَّ من عاش في ظلال اسم "ذُو ٱلْجَلَال"… لا يُسيء إلى ما جَلَّ، ولا يستهين بما عَظُم.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p25"><b>ثانيًا: كيف يُؤثّر هذا الاسم في هِمّة العبد؟</b></p>
<p dir="rtl" class="p36">يرتفع به عن سفاسف الأمور: لأن من عرف أن الله ذو الجلال، لا يليق به أن يعيش لدنيا تافهة، بل يطلب الرفيع، الشريف، النقي، العظيم،<br>
لأن من يتوجّه إلى "ذو الجلال" لا يُرضيه إلَّا عمل يُقرّبه من وجهه، جلال الله يرفعك… فوق الغرائز، والركض، والتفاهة، والهوس بالقبول.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p36">يمنحه دافعًا ليكون كريمًا لا تافهًا: "ذُو ٱلْإِكْرَامِ" يعني أن العبد لا يرضى إلَّا بأن يُكرم نفسه بطاعة، ويُكرم غيره بعدل، ويُكرم وقته بما ينفع، ويُكرم قلبه بأن لا يُسكن فيه إلَّا من يستحق، الكرامة في القلب لا تُمنَح… بل تُسقى من "ذو الإكرام".</p>
<p dir="rtl" class="p1"><br>
<b>ثالثًا: كيف يُؤثّر في نظرة العبد لنفسه؟</b></p>
<p dir="rtl" class="p36">يعرف قدره الحقيقي: عبدٌ أمام الجليل: من يعيش بهذا الاسم لا يتكبّر… ولا يتصاغر، بل يعلم أن الجلال كله لله… وأنه كلما ازداد شعورًا بعظمة الله، ازداد فقرًا، وانكسارًا، وحياءً من نفسه، يرى نفسه صغيرة… لكن في كنف عظيم.</p>
<p dir="rtl" class="p36">يرى نفسه مُكرّمًا من الله… رغم ضعفه: لأن الله "ذو الإكرام"، فالمغفرة تُكرِم، والرزق يُكرم، والهداية تُكرم، والستر يُكرم، فيرى العبد أن بقاؤه قائم على كرم، لا على استحقاق، وإذا رأيت إكرام الله لك… حييتَ بخشوع، لا بغرور.</p>
<p dir="rtl" class="p1"><b>تلخيص وجداني:</b></p>

<td valign="middle" class="td504">
  <p dir="rtl" class="p17"><b>النظرة إلى النفس</b></p>

<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p1"><b>دعاء عميق مستلهم:</b></p>
<p dir="rtl" class="p1">ٱللَّهُمَّ… اجعل جلالك سُكونًا في قلبي، فلا أُخطئك عمدًا، ولا أتجرّأ عليك جهلاً، واجعل إكرامك سببًا في رقّتي، وخُلقي، وعفوي عن الناس، واجعلني عبدًا يُجَلِّكَ كما تُحب، ويُكرم عبادك كما تكرمهم، فأنت ذُو ٱلْجَلَالِ وَٱلْإِكْرَامِ… وأنا عبدٌ فقير لا يليق به إلا الحياء والرجاء".</p>
<p dir="rtl" class="p19"><br></p>
<p dir="rtl" class="p1">"ٱللَّهُمَّ… اجعل جلالك سُكونًا في قلبي، فلا أُخطئك عمدًا، ولا أتجرّأ عليك جهلاً…"</p>
<p dir="rtl" class="p1"><b>الرسالة الأولى: إذا سكن جلال الله في قلبك… سكنت نفسك</b></p>
<p dir="rtl" class="p1">ليس المقصود بجلال الله مجرد الخوف، بل الهيبة المهيمنة التي تُربّيك من الداخل… حين تستقر هذه الهيبة في قلبك، لن تجرؤ على النظر في معصية، ولا التفريط في طاعة، لأنَّك تعيش بشعور مراقبة المهيمن الجليل، لا بمجرد الالتزام الظاهري.</p>
<p dir="rtl" class="p1">إنّ أعظم العقوبات أن تفعل الذنب… ولا تهتز، وأعظم العطايا… أن ترتجف من لمحة التفريط.</p>
<p dir="rtl" class="p1">فحين تدعو"اجعل جلالك سكونًا في قلبي" أنت تطلب من الله أن يملأك بهيبته، أن يؤدّبك بحب، أن يجعل "وجل القلب" مقامًا دائمًا… لا رجفة مؤقتة.</p>
<p dir="rtl" class="p1">"واجعل إكرامك سببًا في رقّتي، وخلقي، وعفوي عن الناس…"</p>
<p dir="rtl" class="p1"><b>الرسالة الثانية: من ذاق كرم الله… استحى أن يسيء</b></p>
<p dir="rtl" class="p1">من أحسّ أنه مُكرَّم من الله… لا يذلّ عباد الله، ومن فهِم أن كل نعمة بين يديه هي فضل لا استحقاق… يُصبح رقيقًا لا متكبّرًا، رؤوفًا لا قاسيًا، عافيًا لا منتقمًا.</p>
<p dir="rtl" class="p1"><b>هذا الدعاء هو تربية قلبية عظيمة:</b></p>
<p dir="rtl" class="p1">"يا رب… كما تكرمتَ عليَّ دون استحقاق، علّمني أن أُكرم عبادك… دون انتظار ردّ الجميل"، لأنَّ العبد الذي لا يتعلم من "كرم الله" أن يكون كريمًا… لم يفهم النعمة أصلًا.</p>
<p dir="rtl" class="p1">"واجعلني عبدًا يُجَلِّكَ كما تُحب، ويُكرم عبادك كما تكرمهم…"</p>
<p dir="rtl" class="p1"><b>الرسالة الثالثة: التوازن بين جلال الله… وإكرام الخَلق</b></p>
<p dir="rtl" class="p1">أنت لا تطلب هنا فقط حسن العبادة، بل حسن التمثيل لله في سلوكك.<br>
تقول له: "يا رب، إن كنتَ أنتَ "ذُو ٱلْجَلَالِ وَٱلْإِكْرَامِ"، فاجعلني عبدًا يُظهِر صفاتك في تعامله، لا في لسانه فقط."</p>
<p dir="rtl" class="p1">أن تُجِلّ الله: يعني أن لا تجعل له ندًّا… ولا تؤخّره خلف هواك… ولا ترضى أن يُهان دينه أمامك وأنت ساكت، وأن تُكرم عباد الله: يعني أن لا تُذلّ أحدًا مهما كان… ولا تحتقر قلبًا كسيرًا… ولا تستعلي على عبدٍ أكرمه الله بتوبته.</p>
<p dir="rtl" class="p1"><b>الخاتمة الوجدانية:</b></p>
<p dir="rtl" class="p1">"ذُو ٱلْجَلَالِ وَٱلْإِكْرَامِ"… ليس فقط اسما نحفظه، بل ميزان حياة:</p>
<p dir="rtl" class="p48">فمن عظّمه… عظّمه الله</p>
<p dir="rtl" class="p48">ومن أحسن بكرمه… كفاه الله</p>
<p dir="rtl" class="p48">ومن تخلّق باسمه… عاش محمودًا في الأرض، مكرَّمًا في السماء</p>
<p dir="rtl" class="p1">يا رب…</p>
<p dir="rtl" class="p1"> إن نسينا جلالك… فذكّرنا برهبتك</p>
<p dir="rtl" class="p1">وإن نسينا إكرامك… فذكّرنا بنعمك</p>
<p dir="rtl" class="p1">وإن نسينا أنفسنا… فخذ بأيدينا إليك، كما يأخذ الكريم بيد عبده الـمُقصر</p>
<p dir="rtl" class="p1">واجعلنا عبادًا يُجِلّونك بحب، ويُكرمون عبادك بود، فنكون في الأرض "رُسُل رحمتك"، وفي السماء "أهل ودّك"، فأنت… "ذُو ٱلْجَلَالِ وَٱلْإِكْرَامِ".</p>
<p dir="rtl" class="p19"><br></p>
<p dir="rtl" class="p24"><b>مشهد من السيرة النبوية يتجلي اسم الله: "</b><span class="s8"><b>ذُو ٱلْجَلَالِ وَٱلْإِكْرَامِ</b></span><b>":</b><b></b></p>
<p dir="rtl" class="p1"><b>المشهد: موت ابن النبي محمد ﷺ إبراهيم … والبكاء بين الجلال والإكرام:</b></p>
<p dir="rtl" class="p31">رواه البخاري (1284)، ومسلم (2315)</p>
<p dir="rtl" class="p1">مشهد يهزّ القلب لأنه جمع بين مهابة الخوف من الله… وإكرام الرحمة الفجائية في لحظة لا تُنسى.</p>
<p dir="rtl" class="p1">عن أنس بن مالك رضي الله عنه قال: دخلنا مع رسول الله ﷺ على إبراهيم (ابنه) وهو يجود بنفسه، فجعلت عينا رسول الله ﷺ تذرفان، فقال له عبد الرحمن بن عوف: وأنت يا رسول الله تبكي؟ قال: يا ابن عوف، إنها رحمة، ثم قال ﷺ: "إِنَّ الْعَيْنَ تَدْمَعُ، وَالْقَلْبَ يَحْزَنُ، وَلَا نَقُولُ إِلَّا مَا يُرْضِي رَبَّنَا، وَإِنَّا بِفِرَاقِكَ يَا إِبْرَاهِيمُ لَمَحْزُونُونَ."</p>
<p dir="rtl" class="p1"><b>كيف يتجلّى اسم "</b><span class="s8"><b>ذُو ٱلْجَلَالِ وَٱلْإِكْرَامِ</b></span><b>" في هذا المشهد؟</b></p>
<p dir="rtl" class="p1"><span class="s8"><b>ذُو ٱلْجَلَالِ…</b></span> يتجلّى في الاعتراف العميق برضى الله رغم الحزن: "ولا نقول إلا ما يُرضي ربنا…" هذا انكسار أمام جلال الله، وتعظيماً لإرادته، وتسليماً لهيبته رغم الفقد.</p>
<p dir="rtl" class="p1">ويظهر الجلال أيضًا في الخشية التي تُهيمن على النبي ﷺ حتى في لحظة الحزن، فلا ينطق إلَّا بما يُرضي الله، ولا يسمح لعاطفته أن تُفلت من سلطان الجلال.</p>
<p dir="rtl" class="p1"><span class="s8"><b>وَٱلْإِكْرَامِ…</b></span> يتجلّى في رحمة الله التي أودعها في قلب نبيه ﷺ: "إنها رحمة"<br>
أي أن بكاءه لم يكن اعتراضًا، بل كان مظهرًا من مظاهر الإكرام الإلهي لقلوب البشر… وإكرام الله لعبده أن يُسمح له بالحزن، والدمعة، والحنين… دون أن يُنزع منه مقام الرِّضا والأنس بالله.</p>
<p dir="rtl" class="p1"><b>لماذا هذا المشهد عظيم؟</b></p>
<p dir="rtl" class="p1">لأنه ليس مشهد نصر أو معجزة، بل مشهد "ضعف بشري" في حضرة الجلال، ومع ذلك… لا يُقابل بالزجر، بل بالإكرام، فيه يُعان العبد على أن يحزن دون أن يسقط، ويبكي دون أن يعترض، ويشتاق دون أن يُفسد تسليمه.</p>
<p dir="rtl" class="p1"><b>الرسالة التي يحملها هذا المشهد:</b></p>
<p dir="rtl" class="p1">إن كنت في لحظة ألم، فاذكر أن الله "<span class="s8"><b>ذُو ٱلْجَلَالِ</b></span>" يستحق أن تُرضيه،<br>
وإن كنت في لحظة دمعة، فاعلم أن الله "<span class="s8"><b>ذُو ٱلْإِكْرَامِ</b></span>" لا يمنعك منها، بل يُكرمك بأن يُربّت على قلبك وهو يرى دمعتك ويحبّ صدقك.</p>
<p dir="rtl" class="p70"><b>حين بكى النَّبي</b> ﷺ<b> … ولم يغضب الجلال</b></p>
<p dir="rtl" class="p1">كان الجوُّ ساكنًا… إلا من صوتٍ خافتٍ يَصدر من نَفَسٍ متقطّع، جسدٌ صغير يحتضر على حجر رسول الله ﷺ… إنه إبراهيم، فلذة كبده، آخر أولاده،<br>
يراه يُجاهد أنفاسه الأخيرة… وعينُ النبي تمتلئ دمعًا.</p>
<p dir="rtl" class="p1">دخل الصحابة، ورأوه ﷺ يمسح دمعة خفيفة على خدّه، فوقف عبد الرحمن بن عوف مدهوشًا… أهو رسول الله يبكي؟ فقال متعجبًا: "وأنت يا رسول الله تبكي؟!" فأجابه النبي ﷺ بصوت يملأه الإيمان والإنسان معًا:</p>
<p dir="rtl" class="p1">"يا ابن عوف… إنها رحمة."</p>
<p dir="rtl" class="p1">ثم رفع نظره إلى السَّماء… وقال وهو يُسلّم قلبه لصاحب الجلال:</p>
<p dir="rtl" class="p1">"إِنَّ الْعَيْنَ تَدْمَعُ، وَالْقَلْبَ يَحْزَنُ، وَلَا نَقُولُ إِلَّا مَا يُرْضِي رَبَّنَا…<br>
وَإِنَّا بِفِرَاقِكَ يَا إِبْرَاهِيمُ لَمَحْزُونُونَ."</p>
<p dir="rtl" class="p1">لم تكن هذه لحظة انهيار… بل كانت لحظة نبوّةٍ تبكي، وتَخشع، وتُقرّ بجلال الله، وتخضع لكرمه في آنٍ واحد.</p>
<p dir="rtl" class="p1">لم يمنعه مقام النبوّة من البكاء، ولم يمنعه الجلال من الرحمة، ولم تمنعه الرحمة من الأدب مع صاحب الجلال…</p>
<p dir="rtl" class="p1">كان مشهدًا يُجسّد اسمًا واحدًا، اسمًا يهزّ الأرض… ويُربّت على قلوب الضعفاء في الوقت ذاته:"<span class="s8"><b>ذُو ٱلْجَلَالِ وَٱلْإِكْرَامِ</b></span>".</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p1"><b>الرسالة العظيمة التي يُلقيها هذا المشهد في قلبك:</b></p>
<p dir="rtl" class="p36">أن تُبكيك الرحمة… لا يناقض أن تكون قويًا.</p>
<p dir="rtl" class="p36">وأن تحزن في حضور الجلال… لا يُسقط وقارك، بل يُظهر صدقك.</p>
<p dir="rtl" class="p36">وأن تقول ما يُرضي الله في لحظة الانكسار… هو أعظم صورة من صور العبودية الـمُكرّمة في حضرة الجلال.</p>
<p dir="rtl" class="p1">فلا تخجل من دمعك إن كان لله، ولا تحبس قلبك عن الحزن… ما دام لا يعترض، ولا تنسَ أبدًا… أن الإله الذي يهزّ السموات جلالًا، هو ذاته الإله الذي يُنزل على قلبك سكينة… حين تموت بين يديك الأشياء.</p>
<p dir="rtl" class="p1">"<span class="s8"><b>ذُو ٱلْجَلَالِ وَٱلْإِكْرَامِ</b></span>"… فابكِ كما بكى نبيّك، لكن قل دائمًا ما يُرضي ربك.</p>
<p dir="rtl" class="p19"><br></p>
<p dir="rtl" class="p52"><span class="s2"><b>أدعية باسم الله " </b></span><b>ذُو ٱلْجَلَالِ وَٱلْإِكْرَامِ</b><span class="s2"><b>" :</b></span></p>
<p dir="rtl" class="p1">اسم الله "<span class="s8"><b>ذُو ٱلْجَلَالِ وَٱلْإِكْرَامِ</b></span>" من أعظم الأسماء التي ورد فيها الأمر بالإلحاح، والارتباط بالدعاء، بل هو من الأسماء التي يُرجى بها الدعاء المستجاب، قال ﷺ: "ألظّوا بـيَا ذَا ٱلْجَلَالِ وَٱلْإِكْرَامِ" حسّنه الترمذي، وصححه الألباني، وإليك باقة منتقاة من الأدعية:</p>
<p dir="rtl" class="p25"><b>أولًا: أدعية مأثورة صحيحة</b></p>
<p dir="rtl" class="p36">دعاء بعد التسليم من الصلاة: " ٱللَّهُمَّ أَنْتَ ٱلسَّلَامُ، وَمِنْكَ ٱلسَّلَامُ،<br>
تَبَارَكْتَ يَا ذَا ٱلْجَلَالِ وَٱلْإِكْرَامِ" رواه مسلم.</p>
<p dir="rtl" class="p1">ما أروع هذا الدعاء، إنه ليس مجرد كلمات تُقال بعد السلام من الصلاة،<br>
بل هو تحيّة روحية تُختَم بها المناجاة، وتُعيد القلب إلى أصله… إلى منبع السلام، ومَظنّة الجلال، ومصدر الإكرام، وإليكم الرسالة التأملية العميقة التي تُستخرج من هذا الدعاء الجليل:</p>
<p dir="rtl" class="p1"><b>حين تُسلّم قلبك لذِي ٱلْجَلَالِ وَٱلْإِكْرَامِ بعد كل صلاة</b></p>
<p dir="rtl" class="p1">"ٱللَّهُمَّ أَنْتَ ٱلسَّلَامُ…" يا رب… أنت السلام الحقيقي الذي لا يعرف اضطرابًا، أنت الطمأنينة التي لا تُشبه سكينة النوم، أنت الذي يُسكن الفوضى في قلوبنا، ويُطفئ النيران في صدورنا، ويُرمم الكسور في دواخلنا.</p>
<p dir="rtl" class="p1">أنت السلام الذي لا يُمنح إلَّا إذا فُهِمت العبودية، ولا يُذَاق إلَّا إذا سكنتَ في ظلّ الجلال.</p>
<p dir="rtl" class="p1">"وَمِنْكَ ٱلسَّلَامُ…" أي أن كل سلامٍ في الدنيا هو في الحقيقة ظلٌ من ظلالك، وسلام الناس لا يُطمئن… إلَّا إذا كان منكَ، فلا السكون من حولي، ولا ابتسامة في وجهي، ولا يدٌ تُربّت… تُغنيني عن السلام الذي "منك وحدك".</p>
<p dir="rtl" class="p1">فالسلام الذي من الله… ليس راحةً في الجسد فقط، بل نورٌ في القلب، واستقامة في الطريق، ورجاءٌ لا يموت.</p>
<p dir="rtl" class="p1"> "تَبَارَكْتَ يَا ذَا ٱلْجَلَالِ وَٱلْإِكْرَامِ…" كأنك تقول بعد أن انتهيت من الصلاة: "كل ما قلته لك لا يليق بك، يا من تباركت وتعاليت، وكل عبادة عبدتك بها… ما بلغت بها قدرك، لكنني أرجوك… يا من جمعت بين الجلال والإكرام، أكرمني بقبول لا يُرد، ورِضى لا يزول، ونورٍ لا يُطفأ ."</p>
<p dir="rtl" class="p1"><b>مفتاح هذا الدعاء:</b></p>
<p dir="rtl" class="p1">هو أن تختم عبادتك بتعظيم الله… لا بتعظيم نفسك، وتعود إلى الدنيا وفي قلبك سلام… من الله، لا من صلاتك، وفي روحك هيبة… من "ذُو ٱلْجَلَالِ"، لا من طول قيامك، وفي وجهك نور… من "ذُو ٱلْإِكْرَامِ"، لا من صوت دعائك.</p>
<p dir="rtl" class="p36">حديث الإلحاح في الدعاء بهذا الاسم: قال ﷺ: "ألظّوا بـ"يا ذا الجلال والإكرام" رواه الترمذي، وحسنه الألباني.</p>
<p dir="rtl" class="p1">ما معنى "ألِظّوا"؟</p>
<p dir="rtl" class="p1">"ألِظّوا" تعني: الزَموا هذا الدعاء، وداوموا عليه، وكرّروه بلا فتور، إنها ليست دعوة للترديد فحسب، بل دعوة للإقامة القلبية عند هذا الاسم العظيم.</p>
<p dir="rtl" class="p1">لأنَّ من لَزِم "يا ذا الجلال والإكرام"… كأنّه وقف على بابٍ لا يُفتح إلَّا بهذا النداء، وكأنّه عَلِم أن كلَّ ما يريد… وراء هذا الاسم.</p>
<p dir="rtl" class="p1">"يا ذا الجلال" أي يا من لا يُشبهه شيء في عظمته، يا مَن إذا تجلّى… ارتعدت القلوب، وإذا ذُكر اسمه… خفقت الأرواح حياءً وخوفًا.</p>
<p dir="rtl" class="p1">"والإكرام" يا من إذا أعطى… أدهش، وإذا غفر… محا الأثر،<br>
وإذا رحم… وسِعت رحمته كل شيء.</p>
<p dir="rtl" class="p1"><b>لماذا نُلِحّ بهذا الاسم تحديدًا؟</b></p>
<p dir="rtl" class="p1">لأن فيه سرّ التوازن بين الجلال والكرم، بين الهيبة والعطاء،<br>
بين العدل والرحمة. </p>
<p dir="rtl" class="p1">فأنت إذ تنادي: "يا ذا الجلال والإكرام"، تقول بقلبك: "يا من أخشاه، وأرجوه… في آنٍ واحد، يا من عظمتك تُربّيني… وكرمك يُحييني."</p>
<p dir="rtl" class="p1"><b>تأمل هذا الدعاء يوم عرفة:</b></p>
<p dir="rtl" class="p1">في يومٍ تُفتح فيه السماء… وفي لحظةٍ تنكسر فيها القلوب… ما أكرم أن تكرّر: "يا ذا الجلال والإكرام… يا ذا الجلال والإكرام…" كررها وأنت تستحضر ذنوبك… كررها وأنت تخلع الكبرياء من قلبك، كررها وأنت تقول:<br>
"إن لم تكرمني أنت… فمن؟ وإن لم تفتح لي الباب… فمن؟"</p>
<p dir="rtl" class="p1"><b>خاتمة وجدانية:</b></p>
<p dir="rtl" class="p1">"يا ذا الجلال والإكرام… أرِنا جلالك في قلوبنا، فنرجع إليك… وأرِنا إكرامك في عفوك، فنذوب لك… وعلّمنا أنَّ من أدمن هذا الاسم… لم يُحرَم،<br>
ومن لزِمه… لم يُخيَّب."</p>
<p dir="rtl" class="p1">فألِظّوا به… كما أوصاكم الحبيب ﷺ وقولوه بدموع القلب لا فقط بلسان الورد.</p>
<p dir="rtl" class="p36">من دعاء النبي ﷺ في قيام الليل: عن أُمِّنا السيدة عائشة رضي الله عنها أنَّ النبي ﷺ كان إذا ركع أو سجد قال: " سُبُّوحٌ قُدُّوسٌ، رَبُّ الْمَلَائِكَةِ وَالرُّوحِ، اللَّهُمَّ اغْفِرْ لِي، فَإِنَّكَ أَنْتَ ذُو الْجَلَالِ وَالْإِكْرَامِ " رواه مسلم.</p>
<p dir="rtl" class="p1">"سُبُّوحٌ قُدُّوسٌ" هذه الكلمات ليست فقط تسبيحًا… بل إعلانٌ أنك تُنَزِّه الله عن كل نقص، وتُقدّسه عن كل عيب. </p>
<p dir="rtl" class="p1">"سُبُّوح" أي الذي تنزّه في ذاته وصفاته وأفعاله عن كل ما لا يليق بجلاله.<br>
"قُدُّوس" الطاهر المنزَّه عن كل نقص، الـمُنزَّه عن أن يُدرَك بكيف، أو يُشبَّه بخلق، أو يُحاط به وهم.</p>
<p dir="rtl" class="p1">حين تبدأ دعاءك بهما، فكأنك تقول: يا من لا يُشبهه شيء، ولا يعتريه نقص، ولا يخفى عليه خفاء… سبحانك وتعاليت.</p>
<p dir="rtl" class="p1">"رَبُّ الْمَلَائِكَةِ وَالرُّوحِ" نداء عظيم للسيّد المهيمن على أعظم خلقه…</p>
<p dir="rtl" class="p1">"رَبُّ الْمَلَائِكَةِ" من يُدبّر أمر السماء، ويأمر بالحق، ولا يعصي له أحدٌ أمرًا.<br>
"وَالرُّوح" المقصود به جبريل عليه السلام، سيد الملائكة، المُوكل بالوحي.</p>
<p dir="rtl" class="p1">وكأنك تقول: "يا من له العظمة فوق السماوات، وله الأمر بين مخلوقات الطهر، فأنا العبد الضعيف… أناديك من الأرض، كما يناديك الملأ الأعلى."</p>
<p dir="rtl" class="p1"> "اللَّهُمَّ اغْفِرْ لِي" وبعد هذا التمجيد… تبدأ التوسل: بعد أن قدّستَ الله… طلبت الغفران، فهذا هو الأدب: أن تُعرّف قلبك من تُناجيه، قبل أن تسأله.</p>
<p dir="rtl" class="p1">"اغفر لي" أي استر ذنبي، وامحُه، واصرف أثره، ولا تكلني إليه، ولا تُحاسبني عليه، وبدّله في صحيفتي توبةً ورحمة.</p>
<p dir="rtl" class="p1">"فَإِنَّكَ أَنْتَ ذُو الْجَلَالِ وَالْإِكْرَامِ" هذه هي الخاتمة المفتاحية… التي تُغلق بها الدعاء، وتفتح بها أبواب السماء.</p>
<p dir="rtl" class="p1">"ذُو الْجَلَالِ" الذي يُخيفك بعظمته، فتنكسر.</p>
<p dir="rtl" class="p1">"وَالْإِكْرَامِ" الذي يأسرك بجمال رحمته، فتهفو إليه.</p>
<p dir="rtl" class="p1">تقول: "اغفر لي… لأني لا أرجو سواك، لأني أعلم أنك العظيم الذي يُرهب… والرحيم الذي يُكرم."</p>
<p dir="rtl" class="p1"><b>ملخّص وجداني للدعاء:</b></p>
<p dir="rtl" class="p1">هذا الدعاء ليس تسبيحة فقط… بل سُلَّمٌ من التقديس… إلى التوسل… إلى الرجاء:</p>
<p dir="rtl" class="p26">" سُبُّوحٌ قُدُّوسٌ :" تطهير القلب من كل تصوّر خاطئ عن الله</p>
<p dir="rtl" class="p26"> "رَبُّ الْمَلَائِكَةِ وَالرُّوحِ :" استحضار هيبة السماء في قلبك</p>
<p dir="rtl" class="p26"> "اللهم اغفر لي :" الطلب الصادق بعد التهيئة</p>
<p dir="rtl" class="p26"> "فإنك أنت ذو الجلال والإكرام :"التوسل بالاسم الجامع للخوف والرجاء.</p>
<p dir="rtl" class="p1"><b>لحظة وجدانية:</b></p>
<p dir="rtl" class="p1">" يا ذا الجلال والإكرام… إن كنتَ أهلًا أن أُعظّمك، فأنت أهلٌ أن تغفر لي، وإن كان جلالك يهدّ ما في قلبي من تعلّق، فإكرامك يُعيدني إليك… بعد كل سقطة ."</p>
<p dir="rtl" class="p25"><b>ثانيًا: أدعية تأملية صحيحة المعنى مستلهمة من هذا الاسم الجليل:</b></p>
<p dir="rtl" class="p36">"<span class="s8"><b> </b></span>ٱللَّهُمَّ يَا ذَا ٱلْجَلَالِ وَٱلْإِكْرَامِ، ٱمْلَأْ قَلْبِي خَشْيَةً مِنْ جَلَالِكَ،<br>
وَٱرْزُقْنِي رَجَاءً فِي إِكْرَامِكَ، وَاجْعَلْنِي عَبْدًا لَا يَتَجَاوَزُ فِي ٱلْخَوْفِ، وَلَا يَتَجَرَّأُ فِي ٱلرَّجَاءِ".</p>
<p dir="rtl" class="p1">ما أعمق هذا الدعاء… إنه توازن العارفين، وميزان السالكين إلى الله، الذين فهموا أن السير إلى "<span class="s8"><b>ذُو ٱلْجَلَالِ وَٱلْإِكْرَامِ</b></span>" لا يكون إلَّا بخوف لا يُورث قنوطًا، ورجاء لا يُورث غرورًا، بل عبودية تفيض أدبًا في الحضرة، وإليك الرسالة التأملية العميقة لهذا الدعاء الرقيق:</p>
<p dir="rtl" class="p1">"ٱللَّهُمَّ يَا ذَا ٱلْجَلَالِ وَٱلْإِكْرَامِ…" يا من لا تُدركه العقول جلالًا، ولا يحدّه وصف كرمًا، يا من عظمتك تُسكن القلب وتُرعبه، وكرمك يُذيب القلب ويُحييه… أدعوك باسمك الجامع بين الهيبة والرحمة، بين مقام الكبرياء، ومقام اللِّين....</p>
<p dir="rtl" class="p1">"ٱمْلَأْ قَلْبِي خَشْيَةً مِنْ جَلَالِكَ…" لا أريد خوفًا يبعدني… بل خشية تُقربني، خشية تكسِر فيّ ما تكبّر، وتُطهر فيّ ما خالط النوايا، خشية توقِفني عن التجرؤ… وتذكّرني أنني عبدٌ لا يصلح له التسلل خلف الأوامر.</p>
<p dir="rtl" class="p1">"وَٱرْزُقْنِي رَجَاءً فِي إِكْرَامِكَ…" رجاءً لا يكون مبررًا للغفلة،<br>
ولا حبلًا للغرور، بل رجاءً يوقظني فجرًا… ويمنحني أملًا رغم سقطاتي.</p>
<p dir="rtl" class="p1">رجاءً يجعلني أحبك… وأنا موقن أني لا أستحق، لكنني أُحبك لأنك أنت، لا لأنني أنا.</p>
<p dir="rtl" class="p1">"وَاجْعَلْنِي عَبْدًا لَا يَتَجَاوَزُ فِي ٱلْخَوْفِ، وَلَا يَتَجَرَّأُ فِي ٱلرَّجَاءِ…" اجعلني عبدًا أدّبته أسماءك، لا تقلباته، وثبّته جلالك، لا فزع المصائب، وسقته كرامتك، لا وعود الناس.</p>
<p dir="rtl" class="p1">اجعلني أخاف فلا أقطع الأمل، وأرجو فلا أنسى أنني عبد، ولا أجعل رحمتك ذريعة للتمادي، ولا هيبتك سببًا في اليأس…</p>
<p dir="rtl" class="p1"><b>الجوهر:</b></p>
<p dir="rtl" class="p1">أن تعرف أن الطريق إلى "<span class="s8"><b>ذُو ٱلْجَلَالِ وَٱلْإِكْرَامِ</b></span>" محفوفٌ بالخوف من نفسك،<br>
لكن مفروشٌ برجاءٍ لا يزول، وأن أجمل ما في العبادة… أن توازن بين “يا رب... أُخافك” و“يا رب... أرجوك”.</p>
<p dir="rtl" class="p36">" يَا ذَا ٱلْجَلَالِ وَٱلْإِكْرَامِ، ٱجْعَلْنِي فِي هَيْبَتِكَ خَاشِعًا، وَفِي كَرَمِكَ آمِنًا، وَفِي ذِكْرِكَ حَيًّا، وَلَا تَحْجُبْنِي عَنْ نُورِ ٱسْمِكَ أَبَدًا ".</p>
<p dir="rtl" class="p1">هذا الدعاء يُشبه سجدةً داخليّة، لا تراها العيون، لكنّ الأرواح تُصلّي فيها بكل خلية، دعاء يخاطب "<span class="s8"><b>ذَا ٱلْجَلَالِ وَٱلْإِكْرَامِ</b></span>" كما يليق به:<br>
بعينٍ تدمع هيبة… وقلبٍ يبتسم أمانًا… وروحٍ لا تحيا إلا بذكره، وإليك الآن الرسالة التأملية العميقة لهذا الدعاء المذهل:</p>
<p dir="rtl" class="p1">"يَا ذَا ٱلْجَلَالِ وَٱلْإِكْرَامِ…" أنت الذي تُرهب الأرواح بجلالك، وتُحييها بإكرامك، لا يُدانى سُلطانك، ولا يُشبِه عطاؤك شيء، أنت الذي إن خافتك القلوب… طابت، وإن رَجَتك الأرواح… اطمأنّت، وإن ذَكرتك الألسن… أحياها النور.</p>
<p dir="rtl" class="p1">"ٱجْعَلْنِي فِي هَيْبَتِكَ خَاشِعًا…" يا رب… لا تُعطِني قسوة من يرى جلالك ولا يخشع، اجعلني أنحني لك حتى وأنا قائم، وأخافك حتى وأنا مُحب، اجعل جلالك نورًا يُربّي قلبي، لا يُرهبه… يُهذّب طبعي، لا يُسحقني.</p>
<p dir="rtl" class="p1">"وَفِي كَرَمِكَ آمِنًا…" امنحني طمأنينة العارفين… الذين إذا تاهوا… رجعوا إليك دون خوف، وإذا سقطوا… قالوا: لا يخذل من عرف الكرم، يا كريم… لا تجعلني أخاف من سعة كرمك… ولا أسيء الظَّنّ بعفو من قال: "وَرَحْمَتِي وَسِعَتْ كُلَّ شَيْءٍ."</p>
<p dir="rtl" class="p1">"وَفِي ذِكْرِكَ حَيًّا…" يا رب، لا تجعل حياتي في المال، أو الشهرة، أو الإنجاز… بل اجعل روحي تتغذّى على ذكرك… اجعلني إذا نسيتك، شعرت أني ميت، وإذا ذكرتك، عاد كل شيء فيّ إلى الحياة.</p>
<p dir="rtl" class="p1">"اجعل ذكرك هو النَّفَس الثاني لروحي… الذي إن انقطع، اختنقتُ."</p>
<p dir="rtl" class="p1">"وَلَا تَحْجُبْنِي عَنْ نُورِ ٱسْمِكَ أَبَدًا" يا رب… إن نسيت كل شيء، لا تجعلني أنسى أنك أنت، وإن اختلطت الأسماء، لا تحجب عني اسمك الذي يُنقّي قلبي، وإن سقطتُ… فدعني أراك باسمك "ٱلْمُكْرِم"، لا "ٱلْمُؤَاخِذ".</p>
<p dir="rtl" class="p1">اجعلني أراك دائمًا… بعين من يحب، ويخاف، ويرجو، ويعرفك حقًا.</p>
<p dir="rtl" class="p1"><b>الجوهر: </b></p>
<p dir="rtl" class="p1">أن لا تعيش خائفًا من الله… ولا مُطمئنًا لنفسك… بل حيًّا باسمه، راكعًا في محرابه، آمِنًا بكرمه، خاشعًا من جلاله، متشوقًا ألَّا يُغلق دونك بابه أبدًا..</p>
<p dir="rtl" class="p1"><br>
" ٱللَّهُمَّ يَا ذَا ٱلْجَلَالِ وَٱلْإِكْرَامِ، ٱنْظُرْ إِلَيَّ بِنَظْرَةٍ تُحْيِي قَلْبِي، وَتَرْفَعُ ذُنُوبِي، وَتُقَرِّبُنِي إِلَيْكَ، فَلَا حَيَاةَ إِلَّا فِي ظِلِّ جَلَالِكَ، وَلَا سَعَادَةَ إِلَّا بِرِضَاكَ وَإِكْرَامِكَ ".</p>
<p dir="rtl" class="p1">هذا الدعاء، يُشبه بابًا يُفتح بين العبد وربه، لا بكثرة الكلمات… بل بصدق الحاجة.</p>
<p dir="rtl" class="p1">دعاءٌ يخاطب جلال الله بنظرة واحدة… تكفي لتقلب الموت حياة،<br>
والذنوب طهارة، والقلب المنطفئ شعلة.</p>
<p dir="rtl" class="p1">وإليك الآن الرسالة التأملية العميقة لهذا الدعاء، بكل ما يحمله من شوق ومهابة:</p>
<p dir="rtl" class="p1">"ٱللَّهُمَّ يَا ذَا ٱلْجَلَالِ وَٱلْإِكْرَامِ…" يا من يخشاه أهل السَّماء قبل أهل الأرض، وتتزلزل لجلاله الأكوان… ثم تذوب تحت رحمته القلوب، يا من لا يُجاري كبرياءه شيء، ولا يُضاهي إكرامه أحد… إني لا أطلب إلَّا نظرة… لكن منك، فهي ليست كأي نظرة، بل نظرة إله يحيي ما مات، ويقرب من كان بعيدًا، ويُطهّر من ظن أنه لن يُطهَّر أبدًا.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p1">"ٱنْظُرْ إِلَيَّ بِنَظْرَةٍ تُحْيِي قَلْبِي…" كم من قلبٍ يتحرّك لكنه لا يعيش،<br>
ينبض بالأمنيات… لكنه فارغ من الحياة، فلا تُحييه شمس، ولا يُوقظه صوت،<br>
إلَّا نظرة من "ذُو ٱلْجَلَالِ وَٱلْإِكْرَامِ"… نظرةٌ تُنزل الطُّمأنينة، وتنفخ النور، وتزرع اليقظة من جديد.</p>
<p dir="rtl" class="p1">نظرةٌ لا تُشبهها نظرة بشر، لأنها من ربّ لا ينظر بعين الإدراك فقط… بل بعين الرحمة.</p>
<p dir="rtl" class="p1">"وَتَرْفَعُ ذُنُوبِي…" لا أُبرّئ نفسي… ولا أُجيد تعداد ما اقترفت، لكنني أعلم أنك تُكرم من لا يستحق، وتصفح عن من عاد، وإن عاد ألف مرة،<br>
فأنت "ذُو ٱلْإِكْرَامِ"…</p>
<p dir="rtl" class="p1">والإكرام ليس أن تعطيني ما أستحق… بل أن تُطهّرني مما لا أستحق أن أُغفر به.</p>
<p dir="rtl" class="p1">"وَتُقَرِّبُنِي إِلَيْكَ…" ما نفع الحياة إن كنت بعيدًا عنك؟...</p>
<p dir="rtl" class="p1">وما قيمة الإنجاز إن لم يكن في ظلك؟...</p>
<p dir="rtl" class="p1">وما لذّة العبادة إن لم تكن قربًا لا عادة؟...</p>
<p dir="rtl" class="p1">يا رب… اجعلني أقرب إليك من أفكاري، ومن دعواتي التي لا أُحسن قولها، ومن قلبي الذي لا يعرف الحياة إلَّا إذا شعر أنه معك.</p>
<p dir="rtl" class="p1">"فَلَا حَيَاةَ إِلَّا فِي ظِلِّ جَلَالِكَ، وَلَا سَعَادَةَ إِلَّا بِرِضَاكَ وَإِكْرَامِكَ…" جلالك يا الله… هو سقف الأمان، لا أخاف من الناس إذا كنتُ في ظلك، ولا أتوه إن سكنتُ في حضرة جلالك.</p>
<p dir="rtl" class="p1">وإكرامك… هو وحده السعادة، فلا تغرّني المظاهر… ولا تُبهرني الدنيا، فكل شيء دون رضاك… متاع زائل، وكل شيء في رضاك… نعيمٌ يُشبِه الجنّة.</p>
<p dir="rtl" class="p1"><b>الجوهر:</b></p>
<p dir="rtl" class="p1">إن هذا الدعاء ليس أمنية… بل صرخة قلب تائهٍ وجد الطريق، ويقول: "يا رب… لا أُريد الدنيا كلها، أُريد فقط أن تراني… بنظرةٍ تُصلح كل شيء."</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p36">" يَا ذَا ٱلْجَلَالِ وَٱلْإِكْرَامِ… لَا أَطْمَعُ فِي عَطَائِكَ وَأَنَا غَافِل، وَلَا أَسْتَحِقُّ رِضَاكَ وَأَنَا مُقَصِّر، فَٱرْزُقْنِي تَوْبَةً تَلِيقُ بِجَلَالِكَ، وَمَغْفِرَةً تَلِيقُ بِإِكْرَامِكَ ".</p>
<p dir="rtl" class="p1">هذا الدعاء يحمل في طياته خجل التائب، وحُرقة المقصّر، ورجاء من عرف من يخاطب، دعاء لا يطلب العطاء بعينٍ جريئة، بل يطرقه بقلبٍ مكسور يعرف أنه لا يستحق… لكنه يعلم أنَّ الله هو "ذُو ٱلْجَلَالِ وَٱلْإِكْرَامِ"، فلا يعود بخُفي حُنين... وإليك الآن الرسالة التأملية العميقة لهذا الدعاء الجليل:</p>
<p dir="rtl" class="p1">"يَا ذَا ٱلْجَلَالِ وَٱلْإِكْرَامِ…" يا مَن لا يُرهب جلالُك إلَّا القلوب الحيّة،<br>
ولا يُرجى إكرامُك إلا الأرواح التي جاعت إليك… أنا لا أُجيد الوقوف طويلاً، ولا أحسن التجمُّل في المناجاة، لكنني أعرف أنك تُحب العبد إذا صدق، ولو بكلمة واحدة.</p>
<p dir="rtl" class="p1">"لَا أَطْمَعُ فِي عَطَائِكَ وَأَنَا غَافِل…" أنا أعلم أنَّ يدي ممدودة… لكن قلبي في غفلة، أطلب… ثم أرجع، ثم أضعف، وأتذكرك حين أحتاج، وأنساك حين أرتاح، فكيف أطمع؟! لكنّك تُعطي… لا لأننا نستحق، بل لأنك أنت.</p>
<p dir="rtl" class="p1">تُعطي لأنك كريم، لا لأننا أوفياء... فإن أعطيتني… فقد غلب كرمُك خوفي، وإن منعت… فقد عدلت، وما ظلمت.</p>
<p dir="rtl" class="p1">"وَلَا أَسْتَحِقُّ رِضَاكَ وَأَنَا مُقَصِّر…" أيّ وجه أرفعه إليك، وأنا أعلم كم تكرّرت زلاتي؟ وكم وعدتك، ثم خنت؟ وكم بكيت، ثم نسيت؟ لكنني أقولها بصراحة قلب العبد: لا أستحق… لكنك تستحق أن أرجوك.</p>
<p dir="rtl" class="p1">"فَٱرْزُقْنِي تَوْبَةً تَلِيقُ بِجَلَالِكَ…" توبة لا تزول بعد أسبوع، ولا تهتز أمام رغبة، توبة لا تقول: “سأُجرب” بل تقول: “سأعود إلى الله بحق”. <br>
توبة تليق بجلالك… أي لا تليق بأي أحدٍ سواك، لأنها نابعة من خشيتك، لا من تأنيب النفس فقط.</p>
<p dir="rtl" class="p1">"وَمَغْفِرَةً تَلِيقُ بِإِكْرَامِكَ.".. يا رب لا تُعاملني بما يُناسب فعلي، بل اغفر لي بما يُناسب سعة كرمك، بما يُناسب رحمتك العظيمة… لا قلبي الملتوي،<br>
بما يليق باسمك "ٱلْمُكْرِم"، لا بحالي "الـمُقصّر"</p>
<p dir="rtl" class="p1">فأنا لا أُريد غفرانًا يُشبه البشر… بل غفرانًا من "ذُو ٱلْإِكْرَامِ"…<br>
غفرانًا حين تراه، تقول لنفسك: لن أعود أبدًا.</p>
<p dir="rtl" class="p1"><b>الجوهر:</b></p>
<p dir="rtl" class="p1">لا بأس أن تشعر أنك لا تستحق… ما دمتَ توقن أن الله يُعطي من لا يستحق، إذا وقف على بابه، وبكى باسمه، وقال: "يا ذا الجلال والإكرام… لا تردّني."</p>
<p dir="rtl" class="p1"><br>
</p>
<p dir="rtl" class="p36">" يَا ذَا ٱلْجَلَالِ وَٱلْإِكْرَامِ، أَنْزِلْ عَلَى قَلْبِي هَيْبَةً مِنْ جَلَالِكَ، تَكْسِرُ كِبْرَهُ، وَتُقَوِّي ضَعْفَهُ، وَتُقَدِّسُ نَظْرَتَهُ، فَإِنَّ ٱلْعَيْنَ تَغْفَلُ، وَلَا يُقَوِّمُهَا إِلَّا نُورُ مَنْ يَهَابُكَ ".</p>
<p dir="rtl" class="p1">ما أعظم هذا الدعاء … كأنه صوت من قلبٍ يريد أن يتطهّر لا فقط من المعصية، بل من الغفلة، ومن الكِبر الخفي، ومن نظرةٍ لا تُشبه نظرة الذاكرين.</p>
<p dir="rtl" class="p1">دعاء فيه رجاء لا يُقال بصوت… بل يُهمَس بين الجلال والإكرام، حيث لا شيء يربي القلب أعظم من هيبةٍ من الله تُصلحُ ما أفسده الغرور، وتُقوّي ما أضعفه الهوى... وإليك الآن الرسالة التأملية العميقة لهذا الدعاء الجليل:</p>
<p dir="rtl" class="p1">"يَا ذَا ٱلْجَلَالِ وَٱلْإِكْرَامِ…" ما دعوتك باسمك هذا إلَّا وأنا أعلم أنني بين العظمة والرحمة، بين الخوف الذي يُطهّر، والرجاء الذي يُنعش....</p>
<p dir="rtl" class="p1">فإذا أردتُ إصلاح قلبي، فلن أذهب إلى علمٍ فقط… بل إلى جلالك، ولن أهرب من ضعفي إلى نفسي… بل إلى إكرامك.</p>
<p dir="rtl" class="p1">"أَنْزِلْ عَلَى قَلْبِي هَيْبَةً مِنْ جَلَالِكَ…" ليس أي خشوع يُرضيني، أُريد خشية تُشبه الرجفة، خشية لا تترك مجالًا للنظر الفارغ، ولا للكلمة الزائدة، خشية تُشبه المطر في صيف الغفلة… تُطهر القلب… لا تُتعبه، وتُعيد ترتيب روحه… لا تكسره.</p>
<p dir="rtl" class="p1">"تَكْسِرُ كِبْرَهُ…" أكبر فتنة في القلب: أن يرى نفسه أكبر من أن تُقال له الحقيقة، أو أن يظن أنه لا يحتاج أن يُربّى بعد الآن… يا رب اكسر كِبري كسراً لا يُهينني… بل يرفعني إليك... فلا تجعلني أغترّ بنعمة، ولا بعلم، ولا بعبادة…<br>
واجعلني كلما ازددتُ قُربًا… ازددتُ تواضعًا.</p>
<p dir="rtl" class="p1">"وَتُقَوِّي ضَعْفَهُ…" ضعفي لا يُقوّيه عناد، ولا تقوّيه نصيحة الناس، بل يقوّيه نورٌ منك، ومهابةٌ تُنبت العزّة الخفية التي لا يُراها إلَّا أنت... اجعلني قويًا… لا صلبًا، واجعلني ثابتًا… لا متعاليًا.</p>
<p dir="rtl" class="p1">"وَتُقَدِّسُ نَظْرَتَهُ…" قد يرى الإنسان بعينيه… لكن لا يرى بعين قلبه، قد ينظر… لكن لا يُبصر ما يُرضيك.</p>
<p dir="rtl" class="p1">يا رب، لا تُبقِ في عيني التِفاتًا لدنيا تُذهلني، ولا نظرةً تُرضي الناس وتُغضبك، ولا غفلة تُبعِدني عن مقصدك.</p>
<p dir="rtl" class="p1">اجعلني لا أرى إلَّا بعين من يهابك، ويشتاقك، ويخاف أن يفوته رضاك… حتى بالنظرة.</p>
<p dir="rtl" class="p1">"فَإِنَّ ٱلْعَيْنَ تَغْفَلُ، وَلَا يُقَوِّمُهَا إِلَّا نُورُ مَنْ يَهَابُكَ" يا الله… نحن لا نقاوم الغفلة بقوةٍ منّا، بل بنورٍ منك… نورٍ لا يُشبه وعظًا، بل يُشبه مسًّا من السكينة، يقيم النظر، ويهذّب القلب، ويعيد ترتيب البوصلة.</p>
<p dir="rtl" class="p1"><b>الجوهر:</b></p>
<p dir="rtl" class="p1">هذا الدعاء ليس مجرد طلب خشوع… بل طلب تربية قلب يُريد أن يعيش بنظرةٍ يراها الله، ويحيا بخشيةٍ تليق بمن خلقه، ويخجل من كِبرٍ لم يُظهره، لكنه يعرف أنه ما زال هناك… ينتظر لحظة غفلة.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p24"><b>الانحرافات العقدية والسلوكية الشائعة حول هذا الاسم الجليل:</b></p>
<p dir="rtl" class="p1">لأن اسم "<span class="s8">ذُو ٱلْجَلَالِ وَٱلْإِكْرَامِ</span>" يُمثل قمة التوازن بين الهيبة والحنان، والجلال والرحمة، والعظمة والتودّد، وأي انحراف في فهمه يُفضي إلى خلل خطير في العقيدة والسلوك.</p>
<p dir="rtl" class="p1">إليك الآن الانحرافات العقدية والسلوكية الشائعة حول هذا الاسم الجليل، مع التصحيح المنهجي لها:</p>
<p dir="rtl" class="p25"><b>أولًا: الانحرافات العقدية</b></p>
<p dir="rtl" class="p36">الانحراف نحو "تعظيم الجلال فقط" على حساب الإكرام: البعض يربّي نفسه أو غيره على الخوف المفرط من الله، وكأنَّ الله جلال فقط،<br>
فينشأ تصور مُشوَّه لإلهٍ يُرهب، يُعاقب، ويُقصي، دون أن يُكرم أو يُقرب.</p>
<p dir="rtl" class="p1"><b>التصحيح</b>:</p>
<p dir="rtl" class="p1">اسم الله ذُو ٱلْجَلَالِ مقرون دومًا بـ وَٱلْإِكْرَامِ، لا يُفصل بينهما، والتوازن بين الخوف والرجاء أصلٌ في العقيدة، قال تعالى:</p>
<p dir="rtl" class="p34">﴿۞ نَبِّئۡ عِبَادِيٓ أَنِّيٓ أَنَا ٱلۡغَفُورُ ٱلرَّحِيمُ وَأَنَّ عَذَابِي هُوَ ٱلۡعَذَابُ ٱلۡأَلِيمُ﴾<span class="s13"> </span><span class="s14">الحجر: ٤٩ - ٥٠</span></p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p36">الانحراف نحو "الرجاء المفرط" دون وقار الجلال: يظن البعض أن إكرام الله يعني أنه سيتجاوز عن كل شيء، مهما كانت الحال، دون توبة أو حياء أو تهيّب.</p>
<p dir="rtl" class="p1"><b>التصحيح:</b></p>
<p dir="rtl" class="p1">الإكرام الإلهي لا يعني التراخي في الطاعة، بل هو يُمنَح لمن يعترف بعجزه، ويقوم على قدم الأدب.</p>
<p dir="rtl" class="p1">قال الحسن البصري:"رجاءٌ لا يُتبع بالعمل غرور، وخوفٌ لا يُتبع بالأمل يأس."</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p36">تصوّر أنَّ الجلال يعني التشبّه به بالتجبّر أو العلو على الناس: فيظن بعض المتدينين أنَّ عليهم أن يظهروا بصورة صارمة، أو متكبرة، أو قاسية… ظنًّا أن ذلك من تعظيم الجلال.</p>
<p dir="rtl" class="p1"><b>التصحيح</b>:</p>
<p dir="rtl" class="p1">الجلال لله وحده، والنبي ﷺ كان أهيب الناس، وألطفهم… وكان يُبكي من يسمع صوته، ويُحبّه من يراه.</p>
<p dir="rtl" class="p25"><b>ثانيًا: الانحرافات السلوكية</b></p>
<p dir="rtl" class="p36">إسقاط معنى "الجلال" عن العبادة: مثل: أداء العبادات ببرود، بلا وقار، ولا خضوع، ولا مهابة.</p>
<p dir="rtl" class="p1"><b>التصحيح</b>:</p>
<p dir="rtl" class="p1">من علم أن الله "ذُو ٱلْجَلَالِ"، صلّى وكأنه بين يديه، وسجد وكأن قلبه بين يدي عظمته، قال تعالى:<span class="s15">﴿حَٰفِظُواْ عَلَى ٱلصَّلَوَٰتِ وَٱلصَّلَوٰةِ ٱلۡوُسۡطَىٰ وَقُومُواْ لِلَّهِ قَٰنِتِينَ﴾</span><span class="s13"> </span><span class="s12">البقرة: ٢٣٨</span>، أي: خاشعين بوقار.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p36">إسقاط معنى "الإكرام" عن معاملة الناس: حين يتحول المتديّن إلى فظّ، قاسٍ، لا يُكرم الناس، ولا يرفق، ولا يُسامح.</p>
<p dir="rtl" class="p1"><b>التصحيح</b>:</p>
<p dir="rtl" class="p1">من أحب الله "ذُو ٱلْإِكْرَامِ"… تخلّق بكرمه، ورقّته، وجوده، فالدين لا يُجسّد الجلال على حساب الرحمة… بل يُعطي لكل مقام لونه.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p36">الاستحياء من الرجاء في المغفرة بدعوى الجلال: فيظن العبد أن كثرة ذنوبه تمنعه من طلب الإكرام، فيستحي أن يسأل الله الرحمة!.</p>
<p dir="rtl" class="p1"><b>التصحيح</b>:</p>
<p dir="rtl" class="p1">بل أعظم الناس ذنوبًا… هم أحق الناس بإكرام الله، إن صدقوا التوبة، وقد قال النبي ﷺ عن أعظم من قتل مئة نفس: "قد غفر الله له، لأنه تاب"، وما ذلك إلَّا لإكرام الله الذي لا يُقابل بالاستحقاق، بل بالرجوع.</p>

<p dir="rtl" class="p24"><b>الخاتمة الوجدانية العميقة:</b></p>
<p dir="rtl" class="p1">يا الله... يا ذَا ٱلْجَلَالِ وَٱلْإِكْرَامِ… من عرفك بهذا الاسم، لم يعد يراك كما يرى الملوك، بل رآك جلالًا فوق كل جلال، وإكرامًا لا تُدركه العقول، وهيبةً تُسكن القلب، دون أن تُرعبه، ورحمةً تُذيب القلب، دون أن تُدلّله.</p>
<p dir="rtl" class="p1">من عرفك بهذا الاسم، صار يخشاك… وهو يُحبّك، ويهابك… وهو يرجوك، ويُناديك من بعيد… لكن قلبه يسجد بين يديك من شدّة القرب.</p>
<p dir="rtl" class="p1">أنت ذُو ٱلْجَلَالِ… فلا يليق بك أن تُعصى، ولا أن يُقدَّم على أمرك شيء، ولا أن يُسكن القلب غيرك.</p>
<p dir="rtl" class="p1">وأنت ذُو ٱلْإِكْرَامِ… فلا يليق بك أن تظلم عبدًا لجأ إليك، ولا أن تردّ يدًا ارتجفت حين رفعتها إليك، ولا أن تغلق بابك في وجه من طرقه دامعًا مكسورًا.</p>
<p dir="rtl" class="p1">يا رب… ما أعظم جلالك حين نخرُّ ساجدين، وما أحنّ إكرامك حين نعود إليك تائبين.</p>
<p dir="rtl" class="p1">أنت من إذا نظرتَ إلى عبدك بنور هذا الاسم، أصلحتَ فؤاده، وكشفتَ زيفه، وغسلتَ ذنوبه، وعُدتَّ به كما يعود اليتيم إلى ملاذٍ لا يُخيّب.</p>
<p dir="rtl" class="p1">فيا ذَا ٱلْجَلَالِ وَٱلْإِكْرَامِ… علّمني كيف أهابُك دون أن أخافك، وأُحبّك دون أن أتجرأ، وأخدمك وأنا شاعر أنني في حضرةٍ لا تُشبِه شيئًا في الوجود.</p>
<p dir="rtl" class="p1">خذ بيدي إذا غفلت، ولا تحرمني نور هيبتك، ولا تحجبني عن حنان إكرامك، فإنَّ عبدك هذا… ما عرفك حقًا إلَّا بهذا الَّاسم الذي يسجد له القلب قبل الجبين.</p>
<p dir="rtl" class="p1">إن كنت تائهًا… فابكِ باسم "ذُو ٱلْإِكْرَامِ"، وإن كنت مغرورًا… فاخشَ باسم "ذُو ٱلْجَلَالِ"، وإن أردت أن تعود عبدًا نقيًّا… فقلها من قلبك: "يَا ذَا ٱلْجَلَالِ وَٱلْإِكْرَامِ، لَا تُغْلِقْ بَابَكَ فِي وَجْهِي أَبَدًا."</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p24"><b>نصيحة من خلال هذا الاسم:</b></p>
<p dir="rtl" class="p1">إيّاك أن تنظر إلى الله سبحانه وتعالى كما ينظر العابدون الضعفاء فقط… بل انظر إليه كما ينظر العارفون الوجِلون.</p>
<p dir="rtl" class="p1">إيّاك أن تطمع في إكرامه وأنت غافلٌ عن جلاله، وإيّاك أن تتهيب جلاله حتى تيأس من إكرامه.</p>
<p dir="rtl" class="p1">"<span class="s8">ذُو ٱلْجَلَالِ وَٱلْإِكْرَامِ</span>" ليس اسمًا للتسبيح فقط، بل ميزانٌ تُوزَن به روحك… فإن كنت مغرورًا… سَحَقَكَ الجلال... وإن كنت مكسورًا… جَبَرَكَ الإكرام.</p>
<p dir="rtl" class="p1">إذا أردت أن تعرف من أنت… فانظر: كيف تتعامل مع هذا الاسم؟ هل تذكره بقلبٍ ينام بعده؟ أم بقلبٍ لا يستطيع أن ينام إلّا بعد أن يُرضيه؟!.</p>
<p dir="rtl" class="p1">من خاف الجلال… أصلح سريرته، ومن طمع في الإكرام… لم ييأس من توبته، ومن جمع بينهما… صار عبدًا لا تُغيّره الدُّنيا، ولا يُطفئه الذنب، ولا تُغريه زينة الغافلين.</p>
<p dir="rtl" class="p1">اجعل بينك وبين الله وقارًا… يشبه سجودًا دائمًا في القلب، فإنه "ذُو ٱلْجَلَالِ" لا يُدنى منه إلَّا بخشوع، و"ذُو ٱلْإِكْرَامِ" لا يُفارق من صدق في الرجوع.</p>
<p dir="rtl" class="p24"><b>ما الذي أتعلمه من هذا الاسم؟</b></p>
<p dir="rtl" class="p36">أن أجمع في شخصيتي بين الهيبة والرحمة: أن أكون مهيبًا بأخلاقي لا بصوتي، حازمًا في الحق، رحيمًا في التعامل، لا أُسقط وَقاري حين أرفق، ولا أُفقد دفئي حين أُهيب، لأن الله "ذُو ٱلْجَلَالِ"… فلا أُذلّ نفسي في الباطل، ولأنه "ذُو ٱلْإِكْرَامِ"… فلا أُقصي الناس عن الخير بغلظة.</p>
<p dir="rtl" class="p36">أن أُظهر للناس أثر الجلال في سلوكي: فلا أتجرأ على المعصية، ولا أتساهل في الغيبة، ولا أضحك على أوامر الله، لأن من عرَف الجلال… احترم كل ما يمتّ له بصلة، الناس تُؤمن بما تراه… فإن رأوني أتعامل مع الله تعالى بجلال، خجلوا من التهاون، دون أن أتكلم.</p>
<p dir="rtl" class="p36">أن أكون بابًا لإكرام الناس: أن أُكرمهم بالكلمة، والوقت، والدعاء، واللطف، والستر، أن أُقابل أخطاءهم بالهداية لا بالإدانة، أن أحتمل ضعفهم، وأستقبل من يُقبل برحمةٍ لا تُرد… ولا أُطيل النظر إلى ماضيهم، لأنني لا أمثّل الله… ولكنني أُريد أن أكون خادمًا لجمال أسمائه في الأرض.</p>
<p dir="rtl" class="p14"><b>كيف أنفع الناس باسم "ذُو ٱلْجَلَالِ وَٱلْإِكْرَامِ"؟</b></p>

<p dir="rtl" class="p24"><b>الدعاء الخاص بهذا المعنى:</b></p>
<p dir="rtl" class="p1">" ٱللَّهُمَّ يَا ذَا ٱلْجَلَالِ وَٱلْإِكْرَامِ، ٱجْعَلْنِي عَبْدًا يَعْكِسُ جَمَالَ أَسْمَائِكَ فِي سُلُوكِهِ، وَيَنْقُلُ هَيْبَتَكَ إِلَى قُلُوبِ ٱلنَّاسِ بِخُلُقِهِ، وَيُذَكِّرُهُمْ بِكَرَمِكَ فِي كُلِّ تَصَرُّفٍ وَكَلِمَةٍ.</p>
<p dir="rtl" class="p1">ٱللَّهُمَّ… اجْعَلْنِي سَبَبًا لِمَنْ خَافَكَ فَٱسْتَقَامَ، وَلِمَنْ رَجَاكَ فَأَقْبَلَ،<br>
وَلِمَنْ رَآنِي… فَٱشْتَاقَ أَنْ يَكُونَ عَبْدًا لَكَ حَقًّا ".</p>
<p dir="rtl" class="p1">ما أعذب هذا الدعاء، وما أصفاه، إنه دعاء الدعاة الربّانيين، ودعاء من لا يريد فقط النجاة… بل يريد أن يكون سببًا لنجاة غيره.</p>
<p dir="rtl" class="p1">دعاء من لا يكتفي بأن يعرف أسماء الله… بل يرجو أن يكون مرآةً لها في الأرض، ينقل جلالها… ويُجسّد كرمها… ويُعيد القلوب إلى أصلها: إلى الله سبحانه وتعالى... وإليك الآن الرسالة التأملية العميقة التي يفيض بها هذا الدعاء الراقي: أن تكون جسرًا بين القلوب و"ذُو ٱلْجَلَالِ وَٱلْإِكْرَامِ"</p>
<p dir="rtl" class="p1">"ٱللَّهُمَّ يَا ذَا ٱلْجَلَالِ وَٱلْإِكْرَامِ…" يا من إذا ذُكرتَ خَشعت القلوب، وإذا تُليت أسماؤك رقّت الأرواح، يا من لا يُماثلك عظيم، ولا يُدانيك كريم، اجعل حياتي طريقًا يُرى فيه ظلّ جلالك، وسلوكي أثرًا من آثار إكرامك، واجعلني من عبادك الذين إذا عجزوا عن الحديث… تكلّم عنهم خُلُقُهم.</p>
<p dir="rtl" class="p1">"ٱجْعَلْنِي عَبْدًا يَعْكِسُ جَمَالَ أَسْمَائِكَ فِي سُلُوكِهِ…" يا رب… لا أريد أن أُدرّس أسماءك… ثم أُناقضها بأفعالي، ولا أن أشرحها… ثم لا تُرى في وجهي، ولا تُسمع في صوتي، اجعلني كالمرآة التي تُضيء بنورك، فإذا رآني عبدٌ بعيد… شعر أنك لست بعيدًا عنه، وإذا لمس مني لُطفًا… تذكّر رحمتك، وإذا خاف من سطوتي… تذكّر جلالك، فاستقام حياءً منك، لا خوفًا مني.</p>
<p dir="rtl" class="p1">"وَيَنْقُلُ هَيْبَتَكَ إِلَى قُلُوبِ ٱلنَّاسِ بِخُلُقِهِ…" ما أريد أن أُرهبهم، ولا أن أصرخ فيهم، بل أريد أن تنبض في قلبي مهابتك، فتخرج عبر عينيّ نظرة توقظ قلوبهم، وعبر كلماتي حروفٌ تسري إلى أرواحهم، فيعلموا أن فوقهم إلهًا لا يُهان، ولا يُتجاهل، ولا يُنسى.</p>
<p dir="rtl" class="p1">" وَيُذَكِّرُهُمْ بِكَرَمِكَ فِي كُلِّ تَصَرُّفٍ وَكَلِمَةٍ…" كل ابتسامة، كل ستر، كل حلم، كل عفو عن ضعيف، كل نصيحة بلين، كل مرة أُكرم فيها عبدًا… اجعلها رسالة صامتة تقول لهم: "هذا من فيض كرم الله… لا منّي."</p>
<p dir="rtl" class="p1">"ٱللَّهُمَّ… اجْعَلْنِي سَبَبًا لِمَنْ خَافَكَ فَٱسْتَقَامَ…" يا رب… ليس لي إلَّا أن أكون بابًا من نور، يدخل منه من ضَلَّ، لا ليبقى معي… بل ليصل إليك.</p>
<p dir="rtl" class="p1">اجعلني لا أُرشدهم إلى طريقتي… بل أضع أيديهم بين يديك، ثم أختفي من المشهد، فأنت المقصود… لا أنا.</p>
<p dir="rtl" class="p1">"وَلِمَنْ رَجَاكَ فَأَقْبَلَ…" إذا أقبلوا بسبب كلمة، أو خُلق، أو دمعة رأوها في صدري… فاجعل إقبالهم عليك دائمًا، لا على طيفي، ولا على أثري، واجعلني سببًا لا يُفصل عنك… بل يدلُّـهُم فيك.</p>
<p dir="rtl" class="p1">"وَلِمَنْ رَآنِي… فَٱشْتَاقَ أَنْ يَكُونَ عَبْدًا لَكَ حَقًّا"... أجمل ما يمكن أن أكون: شخصًا لا يدلّ على نفسه، بل يدلّ عليك، شخصًا إذا ذُكِر… رُفعت قلوبٌ إليك، وإذا غاب… بقي أثره طريقًا يمشي عليه العائدون.</p>
<p dir="rtl" class="p1"><b>الجوهر لهذا الدعاء:</b></p>
<p dir="rtl" class="p1">أن تكون "عبدًا" لله… لا يعني أن تُغلق عليك بابك وتكتفي، بل أن تكون سَبَبًا… نداءً… طريقًا… أثرًا، أن تكون عبدًا لله في صمتك وكلامك، في رفعتك وتواضعك، حتى إذا نسي الناس الله تعالى… ذكّرتهم بحياتك وأخلاقك وسلوكك أنه ما زال هناك "<span class="s8"><b>ذُو ٱلْجَلَالِ وَٱلْإِكْرَامِ</b></span>".</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p24"><b>المقاصد العقدية العظيمة لهذا الاسم الجليل</b></p>
<p dir="rtl" class="p36">تقرير عظمة الله المطلقة وتنزّهه عن كل نقص: اسم "ذُو ٱلْجَلَالِ" يُعلن أن الله جليلٌ في ذاته، عظيمٌ في صفاته، متعالٍ عن كل عيب، منزَّه عن كل نقص، جلاله يقتضي التقديس التام، والحياء منه، وعدم التقدّم على أمره أو كلامه، فهو الجليل الذي لا يُدرك كنهه، ولا يُحيط العبد بشيء من جلاله إلَّا بما شاء.</p>
<p dir="rtl" class="p37"><b>المقصد</b>: تصحيح تصوّر العبد عن ربه، فلا يتعامل مع الله تعالى وكأنه "صورة منصفة" بين الرحمة والعقوبة، بل هو الإله المتفرّد بالجلال، الذي لا يُقارن، ولا يُعارَض، ولا يُتجاهَل.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p36">أنَّ الله تعالى لا يُطاع عن ضعفٍ منه، بل عن جلالٍ يُورث الخضوع: لا يُعبد الله لأنَّه محتاج لعبادتنا، ولا نخشاه لأنه قاسٍ… بل نعبده لأنه "ذُو ٱلْجَلَالِ"، وكل ما سواه فانٍ صغير.</p>
<p dir="rtl" class="p37"><b>المقصد</b>: تثبيت أصل العبودية التي تقوم على الإكبار والتوقير، لا على المجرد الرغبة في الثواب أو النجاة من العقوبة، قال تعالى:<span class="s15">﴿وَمَا قَدَرُواْ ٱللَّهَ حَقَّ قَدۡرِهِۦٓ إِذۡ قَالُواْ مَآ أَنزَلَ ٱللَّهُ عَلَىٰ بَشَرٖ مِّن شَيۡءٖۗ قُلۡ مَنۡ أَنزَلَ ٱلۡكِتَٰبَ ٱلَّذِي جَآءَ بِهِۦ مُوسَىٰ نُورٗا وَهُدٗى لِّلنَّاسِۖ تَجۡعَلُونَهُۥ قَرَاطِيسَ تُبۡدُونَهَا وَتُخۡفُونَ كَثِيرٗاۖ وَعُلِّمۡتُم مَّا لَمۡ تَعۡلَمُوٓاْ أَنتُمۡ وَلَآ ءَابَآؤُكُمۡۖ قُلِ ٱللَّهُۖ ثُمَّ ذَرۡهُمۡ فِي خَوۡضِهِمۡ يَلۡعَبُونَ﴾</span><span class="s13"> </span><span class="s12">الأنعام: ٩١</span>، أي: ما عظّموه حقّ تعظيمه.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p36">بيان كمال غنى الله وعظمة عطائه الذي لا يُقابَل: "ذُو ٱلْإِكْرَامِ" أي الذي يُكرم دون مقابل، ويُفيض من رحمته وجُوده وستره على من لا يستحق… فيغفر للعاصي، ويستر الفاجر، ويجبر الضعيف… لأنه كريم، لا لأنهم أهل لذلك.</p>
<p dir="rtl" class="p37"><b>المقصد</b>: غرس التوحيد الحقيقي في النفوس، فالله لا يُكرمنا على قدر أعمالنا، بل على قدر كرمه، فمن ظنَّ أنه نجا بعمله… فقد جهل الإكرام، ومن ظنَّ أن ذنبه أكبر من رحمة الله… فقد جهل الجلال.</p>
<p dir="rtl" class="p1"><br>
</p>
<p dir="rtl" class="p36">تحقيق التوازن العقدي بين الخوف والرجاء: اسم الله "ذُو ٱلْجَلَالِ وَٱلْإِكْرَامِ" يجمع بين:</p>
<p dir="rtl" class="p47">هيبة الخشية التي تدفع للطاعة والانضباط.</p>
<p dir="rtl" class="p47">وحنان الرجاء الذي يمنع من القنوط والتكلف واليأس.</p>
<p dir="rtl" class="p37"><b>المقصد</b>: تحقيق الميزان الذهبي في العقيدة:</p>
<p dir="rtl" class="p1">لا تطرف في الخوف الذي يُورث العجز، ولا إفراط في الرجاء الذي يُنتج التساهل، بل: "<span class="s39">ارجُه رجاءً لا يُجرّئك، وخَفْه خوفًا لا يُقنّطك</span>."</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p36">تحقيق الخضوع الكامل والانكسار القلبي: لا أحد يُذلّ نفسه لله إلَّا من عرف جلاله، ولا أحد يثق في عطاء الله دون خجل… إلَّا من عرف إكرامه، فالجلال يولد الخضوع… والإكرام يولد الحياء…</p>
<p dir="rtl" class="p37"><b>المقصد</b>: أنَّ عبودية المؤمن ليست حركات فقط، بل حضور قلبي خاشع، لا يُؤتى إلَّا من معرفة هذا الاسم، إذا سجدتَ لله وأنت تجهل جلاله… فلن تسجد روحك، وإن سجد جسدك.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p36">التأسيس لفهم عميق للتوحيد في الربوبية والألوهية: من عرف أن الله هو وحده "ذُو ٱلْجَلَالِ وَٱلْإِكْرَامِ"، لم يُعظّم سواه، ولم يرجُ سواه، ولم يتعلّق قلبه بسواه، ولم يُجعل الإكرام للمخلوق أعظم من الإكرام للخالق.</p>
<p dir="rtl" class="p37"><b>المقصد</b>: تحطيم الشرك الخفي، وهدم مقامات التعلّق الزائف، لأنَّ من امتلأ قلبه بجلال الله… لا يركع لهيبة بشر، ومن ارتوى من إكرامه… لا يُذلّ نفسه لطمعٍ في مخلوق.</p>
<p dir="rtl" class="p1"><br>
أنَّ أعظم منازل المعرفة بالله تبدأ من هذا الاسم: سئل النبي ﷺ عن الدعاء المفضل، فقال: "<span class="s39">ألظّوا بياذا الجلال والإكرام</span>"، أي: الزموا هذا الاسم في الدعاء والتوجّه والطلب، لأنه الاسم الذي يجمع بين غاية الحب وغاية الخوف، فمن عاش فيهما… وصل.</p>
<p dir="rtl" class="p37"><b>المقصد</b>: تأسيس يقين العبد بأنَّ الطريق إلى الله لا يمر فقط عبر العلم أو العمل، بل عبر الهيبة والرجاء الصادق، وذلك لا يبلغه إلَّا من عرف "<span class="s8"><b>ذُو ٱلْجَلَالِ وَٱلْإِكْرَامِ</b></span>".</p>
<p dir="rtl" class="p13"><br></p>
