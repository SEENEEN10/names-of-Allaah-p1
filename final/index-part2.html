<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p25"><span class="s2"><b>سابعًا</b></span><b>: من أعظم تدبرات هذا الاسم:</b></p>
<p dir="rtl" class="p48">الله تعالى يقهرك... لتسجد، لا لتنكسر.</p>
<p dir="rtl" class="p48">الله تعالى يقهرك... ليُطهّرك من علل التعلّق بغيره.</p>
<p dir="rtl" class="p48">الله تعالى يقهرك... لا ليسلبك، بل ليخلع عنك ثياب الكِبر، ويُلبسك ثوب القرب.</p>
<p dir="rtl" class="p48">الله تعالى يقهرك... لتعود إليه خاشعًا، وتدخل عليه ذليلًا، فتخرج من عنده عزيزًا. </p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p24"><b>أولًا: أثر اسم </b><span class="s8"><b>ٱلْقَاهِر</b></span><b> - </b><span class="s8"><b>ٱلْقَهَّار</b></span><b> على سلوك العبد</b></p>
<p dir="rtl" class="p36">يجعل العبد خاضعًا لله وحده، متجردًا من الكبر: من أيقن أن الله هو القهّار، خضع له وحده، وترك التسلط على الناس، ولا يُمارس القهر على غيره، لأنه يعلم أنَّ القهّار الحقيقي لا يُنافس، وينهى نفسه عن الاستعلاء، ويتذكّر دومًا: " أنا عبد مقهور بإرادة الله… فكيف أتكبّر على عبدٍ آخر؟".</p>
<p dir="rtl" class="p36">يجعل العبد رحيمًا بالضُّعفاء: لأنه يرى نفسه كل يوم في موقف ضعف أمام قهر الله، فيترفّق بالمقهورين، ويحتوي المكسورين، ويُعين المنكسرين، لأنه ذَاقَ القهر من الكريم... فصار كريمًا على أهل البلاء. </p>
<p dir="rtl" class="p36">يُربّي على الرضا عند الانكسار: حين يفشل، لا يثور على الأقدار، بل يقول: قهرني القهّار لحكمة، فيسكن قلبه، ويرضى بقدره، ولا يحقد على الناس أو الظروف، يدرك أن الانكسار ليس ضعفًا، بل تأديب إلهي يقوده إلى النور.</p>
<p dir="rtl" class="p24"><b>ثانيًا</b><span class="s9"><b>: </b></span><b>أثر الاسم على هِمّة العبد وطموحه:</b><b></b></p>
<p dir="rtl" class="p65">ينفخ في قلبه الرَّجاء: </p>
<p dir="rtl" class="p55">من أيقن أنَّ الله يقهر الظَّالمين، لم ييأس من نصرٍ ولو تأخر.</p>
<p dir="rtl" class="p55">من عرف أن الله يقهر المرض، لم يضعف إن طالت الشدة.</p>
<p dir="rtl" class="p55">من فهم أنَّ الله يقهر الأسباب، لم يركن لها، بل رجا الله فوقها.</p>
<p dir="rtl" class="p1"><span class="s7">←</span> فيصير العبد عالي الهمة، لأنَّ ربه القهّار قادر على تيسير المستحيل.</p>
<p dir="rtl" class="p65">يحميه من عبادة الأسباب:</p>
<p dir="rtl" class="p55">لا يقول: "لن أنجح لأنني ضعيف"، بل يقول: "ربّي القهّار يُذلّ الصَّعب، ويكسر القوي، ويرفع الضعيف".</p>
<p dir="rtl" class="p55">لا يعلّق قلبه بأحد… لأنه يعلم أنَّ القهّار هو من يُهيئ الأسباب ويقهرها إن شاء.</p>
<p dir="rtl" class="p36">يعلّمه الاستمرار بعد الهزيمة: لا تنهار همّته إذا سقط، بل يقف وهو يقول:</p>
<p dir="rtl" class="p1">"إن كانت الحياة قد قهرتني، فربي أقهر منها… وسيرفعني إذا انكسرت."</p>
<p dir="rtl" class="p24"><b>ثالثًا: أثر الاسم على نظرة العبد إلى نفسه:</b><b></b></p>
<p dir="rtl" class="p36">يُعلّمه أنَّه لا يملك شيئًا بذاته: لا يفتخر بنفسه ولا بطاقته، لأنَّه كلما نظَر في قوّته، تذكّر: "أنا أقف الآن لأنَّ القهّار لم يسلبني… وليس لأنني أستحق."</p>
<p dir="rtl" class="p36">يعالج الغرور الخفي: الذي يرى نفسه مستغنيًا عن الله، أو يظن أنه يتحكم في مصيره… يحتاج أن يتدبّر هذا الاسم كل صباح.</p>
<p dir="rtl" class="p36">يجعله متوازنًا: قويًّا بالله، متواضعًا لنفسه: لأنه يعرف أن الله إذا أراد، قهر عزه في لحظة، لكنه أيضًا يعرف أنَّ الله إذا شاء، قهر عجزه وأقامه من رماده.</p>
<p dir="rtl" class="p1"><span class="s7">←</span>  فتُصبح نفسيته متوازنة بين: تواضع الانكسار، وثقة الانتصار.</p>
<p dir="rtl" class="p1"><b>خلاصة جامعة:</b></p>
<p dir="rtl" class="p25">اسم " <span class="s8"><b>ٱلْقَهَّار</b></span>" لا يجعل منك عبدًا مذعورًا… بل عبدًا قويًّا بالله، خاشعًا له وحده.</p>
<p dir="rtl" class="p25">يجعلك ترى كل قوةٍ في الكون مقيّدةً بقيدٍ من نورٍ في يد القهّار.</p>
<p dir="rtl" class="p25">ويجعلك إن سقطت، تعلم أنَّ " <span class="s8"><b>ٱلْقَهَّار</b></span>" قهرك... لا ليُهينك، بل ليَهديك الطريق من جديد.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p11"><b> "إذا قَهَرَكَ الله… فاعلم أن قلبك يهمّه!" </b></p>
<p dir="rtl" class="p46"><span class="s9"><b>أتعرف من هو</b></span><b> ٱلْقَهَّارُ؟</b></p>
<p dir="rtl" class="p1">إنه ليس ذاك الذي يُخيفنا… بل هو الذي يُوقفك حين تهرول بعيدًا… ليقول لك بلُطف: إلى أين؟! ارجع إليّ.</p>
<p dir="rtl" class="p1"><span class="s8"><b>ٱلْقَهَّارُ</b></span> هو الذي يُسقِط بعض خططك، لا لأنه يكره أحلامك… بل لأنه يحبك أكثر مما تحبها.</p>
<p dir="rtl" class="p1">هو الذي إذا رآك تتعلّق بشيء يؤذيك… قَهَرك عنه… لتبقى حيًّا بقلبٍ نقيّ.</p>
<p dir="rtl" class="p1">كم مرة خطّطت وفشلت؟..</p>
<p dir="rtl" class="p1">كم مرة تمنّيت وخاب ظنّك؟..</p>
<p dir="rtl" class="p1">كم مرة سعيت ولم تُوفّق؟..</p>
<p dir="rtl" class="p1">ربما لم يكن ذنبك… ربما كان القهّار يُهذّب روحك، ويُصفّي قلبك، ويُعدّك لأفضل مما أردت.</p>
<p dir="rtl" class="p1"><span class="s7">⟵</span> لا تحزن إن قهرك الله… بل خَفْ إن تركك لنفسك دون أن يوقفك لحظة، لأنَّ من أحبك… لن يتركك ترك الهوان، بل يقهرك قهر الأمان.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p1">توقف لحظة… واسأل نفسك:</p>
<p dir="rtl" class="p1">هل غضبت حين تأخرت أمانيك؟</p>
<p dir="rtl" class="p1">هل تساءلت: لماذا يفشل البعض وأنا منهم؟</p>
<p dir="rtl" class="p1">هل شعرت أن الله لا يريد لك الخير؟</p>
<p dir="rtl" class="p1">توقف!</p>
<p dir="rtl" class="p1">ربّك <span class="s8"><b>ٱلْقَهَّارُ</b></span>… إنه يُحبك بطريقة مختلفة.</p>
<p dir="rtl" class="p1">هو لا يُدلّلك بالدُّنيا دائمًا… بل يُربّيك… حتى تكون قويًّا بحق.<br>
يُريك كيف تنهار خططك، لتعرف كيف تنهض بها من جديد… على كتف التوكل، لا على وهم السيطرة.</p>
<p dir="rtl" class="p1">وهمسة صغيرة في أذنك:</p>
<p dir="rtl" class="p1">إذا قَهَرك الله عن شيء… فلا تبكِه كثيرًا، لأن ما عنده خيرٌ ألف مرة مما كنت تتمسك به.</p>
<p dir="rtl" class="p1">واجبك مع هذا الاسم:</p>
<p dir="rtl" class="p1">إذا حزنت من خيبة… قُل: يا قهّار، اجعل هذا القهر طريقًا إليك.</p>
<p dir="rtl" class="p1">إذا نجحت… تذكّر أنَّ القهّار لم يقهرك في تلك اللحظة، فاشكره.</p>
<p dir="rtl" class="p1">إذا ظلمك أحد… فارفع عينيك للسَّماء، وقُل: يا قهّار، أرِني عدلك في وقتك، لا في وقتي.</p>
<p dir="rtl" class="p1">وأخيرًا… القهر من الناس… يكسِرنا، لكن القهر من الله… يُصلِحنا، ويُطهّرنا، ويُحبّبنا إليه أكثر.</p>
<p dir="rtl" class="p1">فلا تخف من القهّار… بل خَفْ أن تعيش عمرًا كاملًا… دون أن يَقهرك لتعود إليه.</p>
<p dir="rtl" class="p19"><br></p>
<p dir="rtl" class="p24"><b>مشهد من السيرة النبوية:</b></p>
<p dir="rtl" class="p1"><b>المشهد: سقوط يهود بني النضير… من مناعة الحصون إلى ذلّ الخروج:</b></p>
<p dir="rtl" class="p1">بعد خيانتهم العظمى، ومؤامرتهم لاغتيال النبي ﷺ، جاء أمر الله بأنَّ وقت العقوبة قد حان.</p>
<p dir="rtl" class="p1">فحاصرهم رسول الله ﷺ في حصونهم المنيعة، تلك التي طالما تباهوا بها، وظنّوا أنها "تحصنهم من الله"، لكن الله تعالى قصّ المشهد العظيم في سورة الحشر بكلمات مهيبة:<span class="s15"> ﴿هُوَ ٱلَّذِيٓ أَخۡرَجَ ٱلَّذِينَ كَفَرُواْ مِنۡ أَهۡلِ ٱلۡكِتَٰبِ مِن دِيَٰرِهِمۡ لِأَوَّلِ ٱلۡحَشۡرِۚ مَا ظَنَنتُمۡ أَن يَخۡرُجُواْۖ وَظَنُّوٓاْ أَنَّهُم مَّانِعَتُهُمۡ حُصُونُهُم مِّنَ ٱللَّهِ فَأَتَىٰهُمُ ٱللَّهُ مِنۡ حَيۡثُ لَمۡ يَحۡتَسِبُواْۖ وَقَذَفَ فِي قُلُوبِهِمُ ٱلرُّعۡبَۚ يُخۡرِبُونَ بُيُوتَهُم بِأَيۡدِيهِمۡ وَأَيۡدِي ٱلۡمُؤۡمِنِينَ فَٱعۡتَبِرُواْ يَٰٓأُوْلِي ٱلۡأَبۡصَٰرِ﴾</span><span class="s13"> </span><span class="s12">الحشر: ٢</span>.</p>
<p dir="rtl" class="p1"><b>كيف تجلّى اسم الله </b><span class="s8"><b>ٱلْقَهَّارُ</b></span><b> في هذا المشهد؟</b></p>
<p dir="rtl" class="p36">قهر الغرور الجماعي: يهود بني النضير كانوا يظنون أنَّ حصونهم تمنعهم من الله! فأسقط الله في قلوبهم الرُّعب دون قتال يُذكر، فقهرهم نفسيًا قبل أن يُقهروا عسكريًا.</p>
<p dir="rtl" class="p36">قهر الأسباب والماديات: الحصون، السلاح، العدد، المال… كلها لم تصمد، لأنَّ القهّار لا يُهزم أمام تحصينات المخلوق.</p>
<p dir="rtl" class="p36">قهرهم من حيث لم يُتوقع: ما كان أحد يظن أن يُجبر هؤلاء على الخروج… بل بأيديهم يُخرّبون بيوتهم! وهنا قمة القهر: أن تُهزَم نفسك بنفسك، حين يسلبك الله الطمأنينة.</p>
<p dir="rtl" class="p36">قهر بلا سيوف… بل بالخوف: لم يقتحم المسلمون الحصون قتالًا… بل قذف الله في قلوبهم الرُّعب، فانهاروا داخليًا قبل أن يُمسّوا خارجيًا.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p1"><b>تدبّر:</b></p>
<p dir="rtl" class="p1">هذا هو قهر الله يا صاحبي… ليس شرطًا أن يأتيك بالضرب، أو بالدم، أو بالعقاب المباشر… بل يأتيك من حيث لا تحتسب، ينزع منك اليقين، ويقذف الرُّعب، فيسقط الكيان كله… بأمرٍ واحد من <span class="s8"><b>القَهَّار</b></span>.</p>
<p dir="rtl" class="p19"><br></p>
<p dir="rtl" class="p1"><b>"حين سقطت الحصون بأمرٍ لا يُرى…"</b></p>
<p dir="rtl" class="p1">المدينة المنوّرة... سنة أربع للهجرة، هدوءٌ مشوب بالتوتّر يخيّم على أطرافها...<br>
لكن هناك في الجنوب الشرقي، في ديار بني النضير… عُيونٌ تمتلئ بالغرور، وجدران ترتفع في كِبرياء، وقلوبٌ تهمس: "من يجرؤ أن يُخرجنا من حصوننا؟!" داخل القلعة، وقف حُيَيّ بن أخطب يتمشّى مزهوًّا: " محمد؟! ليأتِ!<br>
والله إن رأى حجارتنا، لسقط قلبه قبل أن يطرق بابنا." </p>
<p dir="rtl" class="p1">حوله رجالٌ يضحكون، ونساءٌ يطَّلعن من نوافذ الحُجر، وأطفالٌ يُقلّدون الكبار في لهجة التحدّي... كأنّهم لا يعلمون أن الله القَهَّار إذا قرر... فستخونهم الحجارة، وتخذلهم القلاع، وستتخلّى عنهم شجاعتهم.</p>
<p dir="rtl" class="p1">وفي الجهة المقابلة، كان النبي ﷺ قد أُمر… ليس بإعلان حرب… بل بمحاصرة الصَّمت، وانتظار أمر الله.</p>
<p dir="rtl" class="p1">لا صوت للقتال… لا معارك طاحنة… لكن في الخفاء، كان شيءٌ يتكسّر داخل قلوب القوم.</p>
<p dir="rtl" class="p1">شيء لا يُرى… ولا يُقاوَم… قال الله: ﴿ <span class="s15">ﯗ  ﯘ ﯙ ﯚ</span><span class="s20"> </span>﴾...</p>
<p dir="rtl" class="p1">شعروا فجأة أنَّ جدرانهم صارت هشة… أنّ الظلال تُطاردهم… أنّ الليل أطول من المعتاد… أنّ السماء تنظر إليهم بغضب، وبدأ أعظم مشهد قهر نفسي في تاريخ المدينة: رجال يُخرّبون بيوتهم بأيديهم، خوفًا من أن يُؤخذوا فيها…</p>
<p dir="rtl" class="p1">نساء يملأن الأكياس بما خفّ، ويُخفضن رؤوسهنّ بعد أن كانت تتيه… أطفال يُخرَجون من بين الحجارة التي وُلدوا داخلها…</p>
<p dir="rtl" class="p1">خرجوا… لكن ما خرجوا به سوى الذلّ، والهزيمة، والعَبرة.</p>
<p dir="rtl" class="p1">خرجوا وهم يعلمون يقينًا أنَّ الحجارة لم تكن مَلاذًا، ولا الحصون كانت درعًا، بل كانت وَهْمًا عظيما… دمّره <span class="s8"><b>القَهَّارُ</b></span> بأمرٍ لا يُرى.</p>
<p dir="rtl" class="p1"><b>الخاتمة الروحية:</b></p>
<p dir="rtl" class="p1">لا أحد ينجو من قهر الله… فإن لم يقهرك بسيفٍ، قَهَرَك بالخوف، وإن لم يُسقِطك بجيش، أسقطك بقلقٍ لا يُطفأ… حتى تعلم أنَّ الحماية… لا تكون في الحصون، بل في الطاعة.</p>
<p dir="rtl" class="p19"><br></p>
<p dir="rtl" class="p1"><b>فاصل تأملي بعنوان: "</b><span class="s2"><b>ليس في الحصون أمان</b></span><b>…"</b></p>
<p dir="rtl" class="p1">أغمض عينيك لحظة… وتخيّل أنَّ بيتك، الذي بنيته لبنة لبنة، صار فجأة بلا معنى… لأنَّ الله سلب عنه الشعور بالأمان.</p>
<p dir="rtl" class="p1">تخيّل أن قُدرتك على الصمود… ليست من جدرانك، ولا من حساباتك، ولا من حلفائك… بل من نظرة رحمة واحدة من القهّار إليك.</p>
<p dir="rtl" class="p1"><b>تأمّل</b>: لم تُفتح حصون بني النضير بالسيوف… بل بأمرٍ خفي من الله... قذفَ به الرُّعبَ في قلوبهم.</p>
<p dir="rtl" class="p1">أشدّ ما يقهر الإنسان… ليس السقوط، بل أن يسقط من داخله أولًا.<br>
وهذا ما فعله القهّار.</p>
<p dir="rtl" class="p1">إنَّ الله تعالى إذا أراد أن يُذلّ قومًا… لا يحتاج أن يُرسل عليهم طوفانًا، ولا جيوشًا لا تُقهر، بل يكفيه أن ينزع من قلوبهم الثقة الزائفة، وأن يجعلهم يهدمون بيوتهم بأيديهم… كما فعلوا.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p1">فلا تطمئن لشيءٍ تملكه… <span class="s8"><b>فٱلْقَهَّارُ</b></span> قادر على أن يجعلك تُسقطه من يدك، وأنت تظن أنك تحمله بقوة، ولا تيأس من شيءٍ فُقِد منك…<span class="s8"><b> فٱلْقَهَّارُ</b></span> وحده قادر أن يردّه إليك.... </p>
<p dir="rtl" class="p19"><br></p>
<p dir="rtl" class="p24"><b>أدعية مأثورة أو مُستنبطة عن السَّلف </b></p>
<p dir="rtl" class="p36">من دعاء الإمام ابن القيم رحمه الله: " اللَّهُمَّ أَنْتَ ٱلْقَوِيُّ فَقَوِّنِي، وَأَنْتَ ٱلْقَاهِرُ فَاقْهَرْ هَوَايَ ."</p>
<p dir="rtl" class="p1">دعاء عظيم يجمع بين طلب القوة في الطاعة، وقهر النفس الأمّارة بالسوء… إنه ليس مجرد جملة… بل صرخة قلبٍ يعرف أين يكمن ضعفه، وأين يجد نجاته.</p>
<p dir="rtl" class="p1">وإليكم الرسالة التأملية العميقة المستلهمة من هذا الدعاء الجليل:</p>
<p dir="rtl" class="p1"><span class="s2"><b>رسالة بعنوان:</b></span><b> "اقهَرْ هَواي… قبل أن يقهرني"</b></p>
<p dir="rtl" class="p1">اللَّهُمَّ… أنتَ القويُّ الذي لا يُغلَب… وأنا الضعيفُ الذي لا يكفّ عن السقوط.</p>
<p dir="rtl" class="p1">أنتَ القاهرُ الذي لا يُردُّ أمرُه… وأنا الذي لا أُحسن ردّ نفسي عن معصية، ولا أملك كبح شهوتي… ولا أقدر على قهر رغبتي، ولا أقوى على التخلّص من شهواتٍ قد سكنت فيّ حتى ظننتُ أنها أنا!.</p>
<p dir="rtl" class="p1">يا رب… إنني لا أخشى أن يقهرني عدوّ… بل أخشى أن يقهرني هواي.<br>
أن أعيش مكسورًا أمام نفسي، أن أسقط كل مرة أمام رغبتي، أن أكون عبدًا لها… وأنا أظن أنني عبدك.</p>
<p dir="rtl" class="p1">يا قاهِرَ الجبابرة… إن أعظم جبّارٍ في طريقي ليس طاغيةً في الأرض،<br>
بل هو نفسي إن تُركت على هواها.</p>
<p dir="rtl" class="p1">فـاقهَرْ هَوايَ برحمتك… ولا تتركني أُهزَم من داخلي، وأنا أطلب النصر من خارج نفسي.</p>
<p dir="rtl" class="p1">ٱللَّهُمَّ… اقهَرْ هَواي حتى يستقيم قلبي، واكسر شهوتي حتى تلين عيني،<br>
واجعل في قلبي من سلطانك ما يُطفئ نار النفس، ومن هيبتك ما يغلِق عليّ أبواب الغفلة.</p>
<p dir="rtl" class="p1">يا رب… لستُ أطلبك قوّةً أُواجه بها الناس… بل أطلبك قوةً أواجه بها نفسي حين تخونني، وتُجامل ضعفي، وتُغري قلبي، وتُزيّن لي درب السوء.</p>
<p dir="rtl" class="p1">اللَّهُمَّ أَنْتَ ٱلْقَوِيُّ فَقَوِّنِي… وَأَنْتَ ٱلْقَاهِرُ فَاقْهَرْ هَوَايَ…<br>
وَاجْعَلْنِي مِنَ ٱلَّذِينَ قَهَرْتَهُمْ… فَأَحْبَبْتَهُمْ.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p36">دعاء لبعض العارفين: " يَا قَهَّارُ… اقْهَرْ شَهْوَتِي، وَاكْسِرْ نَفْسِي، وَرُدَّنِي إِلَيْكَ رَدًّا جَمِيلًا." </p>
<p dir="rtl" class="p1">فيه اعتراف بالضعف، وطلب اللجوء إلى القاهر ليُعيد ترتيب الداخل، ما أعمق هذا الدعاء... وما أصدق مَن يقوله من قلبٍ يعرف أين تكمن أزمته!.</p>
<p dir="rtl" class="p1">إليكم الرسالة التأملية العميقة التي تنبض من بين حروف هذا الدعاء، بأسلوب وجداني يلامس أعماق القلب، ويُفجّر نبع الرجوع:</p>
<p dir="rtl" class="p1">يا قهّار... لقد تعبتُ من نفسي، تعبتُ من شهوتي التي تَستدرجني…<br>
ثم تَخذلني… ثم تُغرقني في مستنقع الندم، وتتركني هناك، أبحث عن غفرانك.</p>
<p dir="rtl" class="p1">تعبتُ من رغبةٍ تُلبسني ثوبَ القوة… ثم تنزع عني كل شيء حين أضعف.</p>
<p dir="rtl" class="p1">تعبتُ من قناعٍ أرتديه أمام الناس… فيبدو كل شيء بخير، بينما داخلي يُحطّم قطعةً قطعة.</p>
<p dir="rtl" class="p1">يا قهّار... إن شهوتي أقوى مني… فهلّا قهرتَها بقوتك؟ إن نفسي تعاندني… فهلّا كسرتها بلُطفك؟ إنني لا أرجو أن تُهلكني…<br>
بل أرجو أن تُعيدني إليك منكسرًا… لكن محبوبًا.</p>
<p dir="rtl" class="p1">يا قهّار... اقهر شهوتي… لا لتُحرمني، بل لتُطهّرني، واكسر نفسي… لا لتُذلّني، بل لتُعيدني عبدًا لا يرى في نفسه شيئًا، ولا يرى في غيرك ملاذًا.</p>
<p dir="rtl" class="p1">يا قهّار... رُدّني إليك ردًّا جميلًا… ردًّا يُنسي قلبي ما سكنه من سِواك،<br>
ويربّي داخلي على أن اللذّة الحقيقية… هي أن أُرضيك، لا أن أُرضي جسدي.</p>
<p dir="rtl" class="p1">يَا قَهَّارُ… اقْهَرْ شَهْوَتِي، وَاكْسِرْ نَفْسِي، وَرُدَّنِي إِلَيْكَ… وَلَا تَكِلْنِي لِنَفْسِي، وَلَوْ لَحْظَة.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p36"><b>أدعية تأملية مهيبة:</b></p>
<p dir="rtl" class="p1">" ٱللَّهُمَّ يَا قَاهِرَ كُلِّ جَبَّارٍ… وَيَا قَهَّارَ كُلِّ مُتَكَبِّرٍ… اقْهَرْ فِي نَفْسِي كُلَّ عُجْبٍ، وَٱكْسِرْ فِي قَلْبِي كُلَّ تَكَبُّرٍ، وَٱجْعَلْنِي عَبْدًا لَا يَسْجُدُ إِلَّا لَكَ ".</p>
<p dir="rtl" class="p1">كلماتٌ تُشبه سهامًا من نور، تخترق حجب النفس، وتكسر أوهام الكِبر التي كثيرًا ما تتسلل خفية إلى القلوب الطيّبة.</p>
<p dir="rtl" class="p1">وإليكم الآن الرسالة التأملية العميقة التي تُجسّد روح هذا الدعاء، وتُوقظ بها قلوب الفتيان والفتيات، وكل من يريد أن يُطهّر نفسه من داء العجب والكِبر، في حضرة اسم الله ٱلْقَهَّارُ:</p>
<p dir="rtl" class="p1"><span class="s2"><b>رسالة بعنوان:</b></span><b> "اكسرني يا قهّار… لأراك وحدك فوق كل شيء"</b></p>
<p dir="rtl" class="p1">يا ربّ… كلما ظننت أنني بخير، تسلّل إليّ عُجبي خلسة… وقال لي: "أنت لست كغيرك"، وما كنتُ أدري أنني في تلك اللحظة، أبعدُ ما أكون عنك.</p>
<p dir="rtl" class="p1">يا قهّار كل متكبر… اكسر في داخلي وهم الامتياز… وامسح من قلبي آثار نظرة الاستعلاء، واجعلني أرى عبادك بعين الرِّقّة، لا بعين المقارنة والمفاخرة.</p>
<p dir="rtl" class="p1">يا قاهِر الجبابرة… إنك لم تهدم القصور… بل هدمت الغرور، لم تُهلك الأجساد… بل قَهَرت الأرواح المتكبرة.</p>
<p dir="rtl" class="p1">فاجعلني من أولئك الذين إذا لمحوا في أنفسهم علوا… سجدوا سريعًا، وذرفوا خوفًا، وعادوا إلى عبوديتهم قبل أن تقهرهم أنت قهرًا.</p>
<p dir="rtl" class="p1">يا رب… إن العُجب مرض لا يظهر في الوجه… بل في النوايا، يتخفّى تحت الألفاظ المهذّبة، ويتزيّن بثوب الطاعة أحيانًا…</p>
<p dir="rtl" class="p1">فلا تتركني أعجب بنفسي وأنا أراك، ولا أُعظّم عملي وأنا أعلم أنك صاحب الفضل فيه.</p>
<p dir="rtl" class="p1">ٱللَّهُمَّ يَا قَاهِرَ كُلِّ جَبَّارٍ… وَيَا قَهَّارَ كُلِّ مُتَكَبِّرٍ… ٱقْهَرْ فِي نَفْسِي كُلَّ عُجْبٍ، وَٱكْسِرْ فِي قَلْبِي كُلَّ تَكَبُّرٍ، وَٱجْعَلْنِي عَبْدًا لَا يَسْجُدُ إِلَّا لَكَ،<br>
وَلَا يَنْظُرُ إِلَى نَفْسِهِ… إِلَّا كَمَا تَنْظُرُ ٱلْمُذْنِبِينَ لِعَفْوِكَ.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p36">" ٱللَّهُمَّ يَا مَنْ قَهَرْتَ ٱلْمُتَجَبِّرِينَ، وَأَنْقَذْتَ ٱلْمُنْكَسِرِينَ… قَوِّنِي بِكَ إِذَا ضَعُفْتُ، وَاقْهَرْ خَوْفِي إِذَا ٱرْتَجَفْتُ، وَٱمْلَأْ قَلْبِي بِرَهْبَتِكَ حَتَّى أَغْفُلَ عَمَّنْ سِوَاكَ ".</p>
<p dir="rtl" class="p1"><span class="s2"><b>رسالة بعنوان:</b></span><b> "حين أرتجف… لا أريد إلَّا قوتك"</b></p>
<p dir="rtl" class="p1">يا رب... أنا لا أطلب أن أكون قويًا لأنتصر، ولا شديدًا لأُبهر، ولا ظاهرًا لأغلب… بل أطلب القوّة فقط… لأبقى واقفًا حين تتزلزل قدماي من شدة الطريق.</p>
<p dir="rtl" class="p1">يا من قهرت المتجبّرين… اجعلني لا أُفتن إذا رُفعتُ، ولا أضعف إذا وُضعتُ، ولا أتكبر إن نَجَحت، ولا أتهاوى إن سقطت.</p>
<p dir="rtl" class="p1">ويا من أنقذتَ المنكسرين… إني لا أهرب من الضعف… بل أهرب به إليك، فإذا سقطتُ… فلا تَحرمني من أن أراك في سقوطي، وإذا ارتجف قلبي…<br>
فلا تَسلبني يقيني بك.</p>
<p dir="rtl" class="p1">وإذا خفت… فاقهر خوفي بطُمأنينة اسمك، وبرودة رحمتك، وهيبة قربك.</p>
<p dir="rtl" class="p1">يا رب... املأ قلبي برهبتك… رهبة تُبعدني عن كل مخلوق، وتقربني إليك وحدك… رهبة لا تُطفئها الجموع، ولا تُنسيها الكلمات، ولا تضعفها الأيام… رهبة تبنيني في حضرتك، وتُنهيني عن التعلّق بغيرك.</p>
<p dir="rtl" class="p1">ٱللَّهُمَّ يَا مَنْ قَهَرْتَ ٱلْمُتَجَبِّرِينَ، وَأَنْقَذْتَ ٱلْمُنْكَسِرِينَ… قَوِّنِي بِكَ إِذَا ضَعُفْتُ، وَٱقْهَرْ خَوْفِي إِذَا ٱرْتَجَفْتُ، وَٱمْلَأْ قَلْبِي بِرَهْبَتِكَ، حَتَّى لَا أَرَى فِي ٱلْكَوْنِ إِلَّا أَنْتَ.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p36">" يَا قَهَّارُ… اقْهَرْ دَاخِلِي قَبْلَ أَنْ تَقْهَرَ ظَاهِرِي، وَٱكْسِرْ مَا بَيْنِي وَبَيْنَ غَفْلَتِي، وَلَا تَكِلْنِي إِلَى نَفْسِي طَرْفَةَ عَيْنٍ ".</p>
<p dir="rtl" class="p1">ما أعمق هذا الدعاء، وما أرهف نبضه! كأنّه صوتُ قلبٍ يخشى من نفسه أكثر مما يخشى من أعدائه، ويعرف أن الخطر الحقيقي ليس خارج الإنسان، بل في داخله… حيث الغفلة، والهوى، والفتور.</p>
<p dir="rtl" class="p1">وإليكم الرسالة التأملية العميقة المستوحاة من هذا الدعاء، بلغة وجدانية تهزّ القلب وتُبكي العين:</p>
<p dir="rtl" class="p1"><span class="s2"><b>رسالة بعنوان:</b></span><b> "اقهَرْ داخلي… قبل أن ينقلب عليّ"</b></p>
<p dir="rtl" class="p1">يا قهّار... كثيرًا ما نظن أن البلاء في الخارج، وأن القهر الحقيقي هو ما يأتي من الظروف، من الأعداء، من الفقد، من الوجع…</p>
<p dir="rtl" class="p1">لكنني تعلّمت منك شيئًا آخر… أن أعظم قهرٍ يمكن أن يُصيب العبد… هو أن يُسلَّط عليه داخلُه.</p>
<p dir="rtl" class="p1">هوى لا يُرد. </p>
<p dir="rtl" class="p1">غفلة لا تُكسر.</p>
<p dir="rtl" class="p1">نفس تعانده وهو يبتسم.</p>
<p dir="rtl" class="p1">وداخلٌ يخذله… كلما أراد أن يرجع إليك.</p>
<p dir="rtl" class="p1">يا قهّار… اقهر داخلي قبل أن يدمّرني.</p>
<p dir="rtl" class="p1">اقهر نفسي إذا طغت، وشهوتي إذا علت، ورغبتي إذا زاغت عن طريقك.</p>
<p dir="rtl" class="p1">لا تُسلّط عليّ عدوًا من خارج… حتى تهزمني نفسي من داخل.</p>
<p dir="rtl" class="p1">يا رب... إن الكارثة ليست أن تُظهرني ضعيفًا، بل أن تتركني أظن أنني بخير… وأنا بعيد عنك.</p>
<p dir="rtl" class="p1">فإن قهرتَ ظاهري… سأسجد، لكن إن لم تقهر داخلي… سأمشي إليك، وأنا مشغولٌ عنك!.</p>
<p dir="rtl" class="p1">يا الله… اكسر ما بيني وبين غفلتي، ذلك الحجاب الرقيق الذي يُغشي البصيرة، ويُثقّل الروح، ويُبهت الطريق.</p>
<p dir="rtl" class="p1">ذلك الستار الذي يجعلني أصلي… دون حضور، وأذكرك… دون حب.<br>
وأعيش… دون حياة!.</p>
<p dir="rtl" class="p1">يَا قَهَّارُ… ٱقْهَرْ دَاخِلِي قَبْلَ أَنْ تَقْهَرَ ظَاهِرِي، وَٱكْسِرْ مَا بَيْنِي وَبَيْنَ غَفْلَتِي،<br>
وَلَا تَكِلْنِي إِلَى نَفْسِي طَرْفَةَ عَيْنٍ… فَإِنِّي لَا أَقْدِرُ عَلَيْهَا… إِلَّا بِكَ.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p36">" ٱللَّهُمَّ اقْهَرْ فِي قَلْبِي حُبَّ مَا لَا يُرْضِيكَ، وَٱجْعَلْنِي أَخْشَاكَ كَأَنِّي أَرَاكَ، وَإِذَا قَهَرْتَ مَطْلَبِي… فَلَا تَحْرِمْنِي مِنْكَ ".</p>
<p dir="rtl" class="p1">ما أجمل هذا الدعاء ... إنه من تلك الأدعية التي لا تُقال من الفم، بل من عمق القلب… يختصر رحلة الإنسان مع التعلّق، والخذلان، والرجاء، والرجوع إلى الله، في سطر واحد، وإليكم الرسالة التأملية العميقة التي تنبع من هذا الدعاء الرقيق، لتكون خاشعة، حيّة، صادقة:</p>
<p dir="rtl" class="p1"><span class="s2"><b>رسالة بعنوان:</b></span><b> "إذا قهرتَ مطلبي… فلا تحرمني منك"</b></p>
<p dir="rtl" class="p1">يا الله… أحيانًا لا يكون الخطر في المعصية، بل في شيء أحبه… وأظنه خيرًا… وأتعلّق به، ثم أنسى… أن الخير كله منك، وما سواك ظلٌّ لا يبقى.</p>
<p dir="rtl" class="p1">يا قهّار… إنني لا أطلبك لتُحقق لي كل ما أريد، بل لأفهم أن ما لا يُرضيك… لا يُرضيني حقًا، وإن زَيّنته الدنيا.</p>
<p dir="rtl" class="p1">فاقهر في قلبي حبّ ما لا يُرضيك، حتى لو بدا جميلاً… حتى لو كان أمنيةً قديمة… حتى لو قال الناس إنه "من حقي"…</p>
<p dir="rtl" class="p1">يا رب… اجعلني أخشاك كأني أراك، وأغار على قلبي من أن يسكن فيه غيرك.</p>
<p dir="rtl" class="p1">علّمني كيف أحبك بصدق، وكيف أقدّم رضاك على رغباتي، وكيف أقول "يا رب… خِر لي" ثم أقبل خِيرتك… ولو قهرتَ مطلبي بها.</p>
<p dir="rtl" class="p1">وإذا قهرتَ مطلبي… إذا حرمتني ما دعوتك به طويلًا… إذا أخّرتَ ما ظننته قريبًا… فلا تحرمني منك، فوجودك في قلبي… أعظم من كل ما يُفنى.</p>
<p dir="rtl" class="p1">ٱللَّهُمَّ اقْهَرْ فِي قَلْبِي حُبَّ مَا لَا يُرْضِيكَ، وَٱجْعَلْنِي أَخْشَاكَ كَأَنِّي أَرَاكَ،<br>
وَإِذَا قَهَرْتَ مَطْلَبِي… فَلَا تَحْرِمْنِي مِنْكَ.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p36">" يَا قَاهِرَ ٱلْأَعْدَاءِ… وَيَا نَاصِرَ ٱلْمَظْلُومِينَ… أَرِنِي فِي ظَالِمِي عَجَائِبَ قُدْرَتِكَ، وَٱجْعَلْ قَهْرَكَ لَهُ سَبَبًا فِي نُصْرَتِي وَرَفْعَةِ دِينِكَ ".</p>
<p dir="rtl" class="p1">هذا دعاء من قلبٍ مظلوم، لا يطلب الانتقام لنفسه فقط، بل يطلب أن يكون قهر الظالم طريقًا لرفع راية الله، لا لشفاء غليل النفس، دعاء فيه عدالة القلب، وغيرة الحق، وأدب العبودية في لحظة الألم.</p>
<p dir="rtl" class="p1"><span class="s2"><b>رسالة بعنوان:</b></span><b> "حين يشتدّ الظلم… فأرِني يا قهّار!"</b></p>
<p dir="rtl" class="p1">يا قاهرَ الجبابرة… ويا مَن لا يقف أمام غضبك أحد… لقد ظُلِمت… لكنني لا أطلب أن تُسقط الظالم لأجلي أنا فقط، بل لأجل الحق الذي داسوه، والعدل الذي قتلوه، والأمان الذي خنقوه…</p>
<p dir="rtl" class="p1">يا قهّار… أرِني في ظالمي عجائب قدرتك… لا شماتةً… بل عبرة.<br>
لا انتقامًا… بل إصلاحًا، وردعًا، وبيانًا.</p>
<p dir="rtl" class="p1">أرِني كيف تُطفئ نار الظلم بريح قدرتك، كيف تجعل مَن علا… ينهار،<br>
ومن بطش… يندم، ومن تكبّر… يسجد باكيًا، أو يُؤخذ بذنبه أخذًا عزيزًا مقتدرًا.</p>
<p dir="rtl" class="p1">يا ناصرَ المظلومين… لا تُبقني في مشهد الألم طويلًا، لكن إن قدّرتَ أن ألبث فيه… فاجعلني أراك فيه، اجعل قهرك لظالمي بابًا لظهور الحق، ورفع المظلومين، وتعزيز راية دينك.</p>
<p dir="rtl" class="p1">يا رب… إذا أنزلت بأسك، فاجعله كقَطر الرحمة في قلوب الشاهدين… ليعودوا إليك وقد علموا أن الظلم لا يدوم، وأن القهّار لا يغفل.</p>
<p dir="rtl" class="p1">يَا قَاهِرَ ٱلْأَعْدَاءِ… وَيَا نَاصِرَ ٱلْمَظْلُومِينَ… أَرِنِي فِي ظَالِمِي عَجَائِبَ قُدْرَتِكَ، وَٱجْعَلْ قَهْرَكَ لَهُ سَبَبًا فِي نُصْرَتِي، وَرَفْعَةِ دِينِكَ،<br>
وَلَا تَجْعَلِ ٱلْقَهْرَ خَالِيًا مِنَ ٱلْحِكْمَةِ، وَلَا ٱلِٱنْتِصَارَ خَالِيًا مِنَ ٱلتَّقْوَى.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p36">" ٱللَّهُمَّ إِنْ قَهَرْتَنِي… فَٱقْهَرْنِي إِلَيْكَ، وَإِنْ كَسَرْتَنِي… فَٱكْسِرْنِي عَلَى بَابِكَ، وَإِنْ أَذْلَلْتَنِي… فَٱجْعَلْ ذُلِّي لَكَ رِفْعَةً ".</p>
<p dir="rtl" class="p1">ما أرهف هذا الدعاء، وما أعمق شعوره! إنه دعاء العبد الذي لا يهرب من قهر الله، بل يتوسّله… يريد أن يُكسر، نعم… لكن في الطريق إلى الله، لا بعيدًا عنه.</p>
<p dir="rtl" class="p1">وإليكم الرسالة التأملية العميقة لهذا الدعاء النوراني، بلغة تنبض بالحب والانكسار معًا:</p>
<p dir="rtl" class="p1"><span class="s2"><b>رسالة بعنوان:</b></span><b> "قَهِّرني إليك… ولا تتركني بعيدًا عنك"</b></p>
<p dir="rtl" class="p1">يا قهّار… إن قهرتني، فلا تُسقطني بعيدًا… بل اجعل سقوطي عند بابك،<br>
فأكون مكسورًا… لكن أقرب إليك من كل مَن ظنّ نفسه قائمًا.</p>
<p dir="rtl" class="p1">يا رب… إني لا أطلب النجاة من القهر… بل أطلب أن يكون قهري إليك، لا عنك.</p>
<p dir="rtl" class="p1">لا أطلب أن لا أنكسر… بل أرجوك أن تكسرني على أعتابك، لا في طريق الغفلة.</p>
<p dir="rtl" class="p1">إن قهرتني… فـاجعل في القهر يقظةً تردّني إليك، اجعلني أفقد شيئًا،<br>
لأكتشف أنني كنت غافلًا عنك.</p>
<p dir="rtl" class="p1">وإن كسرتني… فاجعل كسري سببًا لأن أرى الحقيقة بوضوح، أن كل ما دونك كسرٌ لا يُجبر، وأن كل ما عندك شفاءٌ لا يُفقد.</p>
<p dir="rtl" class="p1">وإن أذللتني… فلا تجعل ذلي بين يدي الناس، ولا في مزالق الشهوة،<br>
ولا في هزيمة الهوى…</p>
<p dir="rtl" class="p1">بل اجعل ذلي في محرابك، وفي دمعي، وفي سجودي، وفي صوتي حين أقول: "يا رب… ما لي سواك."</p>
<p dir="rtl" class="p1">ٱللَّهُمَّ إِنْ قَهَرْتَنِي… فَٱقْهَرْنِي إِلَيْكَ، وَإِنْ كَسَرْتَنِي… فَٱكْسِرْنِي عَلَى بَابِكَ، وَإِنْ أَذْلَلْتَنِي… فَٱجْعَلْ ذُلِّي لَكَ رِفْعَةً، فَإِنَّ أَجْمَلَ مَا فِي ٱلْكُسُورِينَ… أَنَّهُمْ يُرْفَعُونَ إِذَا خَرُّوا لَكَ.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p36">" ٱللَّهُمَّ لَا تَجْعَلْ لِكَبْرِي نَصِيبًا فِي قَلْبِي، وَٱجْعَلْنِي أَرَاكَ فِي كُلِّ خَوْفٍ، وَتَحْتَ كُلِّ قَهْرٍ، وَفَوْقَ كُلِّ سُلْطَةٍ، وَخَلْفَ كُلِّ قَدَرٍ." </p>
<p dir="rtl" class="p1">آهٍ… ما أصدق هذا الدعاء! إنه صوت عبدٍ عرف أن أكبر أعدائه… ليس عدوًا خارجيًّا، بل كِبرًا صغيرًا يتخفّى في زوايا القلب، عبدٌ لا يريد القوة ليعلو… بل يريد التواضع ليرى الله في كل شيء! وإليكم الرسالة التأملية العميقة، التي تنبض من قلب هذا الدعاء العظيم، بلغة وجدانية متأملة، تربوية، خاشعة:</p>
<p dir="rtl" class="p1"><span class="s2"><b>رسالة بعنوان:</b></span><b> "علّمني أن أراك خلف كل شيء…"</b></p>
<p dir="rtl" class="p1">يا الله… علّمني أن أفتّش عنك لا في اللحظات السهلة فقط، بل في كل شيء يُخيفني، وكل قهرٍ يُثقل صدري، وكل سلطانٍ يُرعبني، وكل قدرٍ لا أفهمه.</p>
<p dir="rtl" class="p1">يا رب… إن الكِبر لا يلبس تاجًا أبدًا… بل يتخفّى أحيانًا في نظرة، أو في رضا عن النفس، أو في شعور بالاستحقاق… فلا تجعل له نصيبًا في قلبي، ولو بحجم ذرّة.</p>
<p dir="rtl" class="p1">اجعلني أراك في كل خوف… حتى لا أرتبك، بل أستسلم لك، واجعلني أراك تحت كل قهر… حتى لا أتمرد، بل أنكسر لك.</p>
<p dir="rtl" class="p1">واجعلني أراك فوق كل سلطة… حتى لا أُعظّم بشرًا، ولا أستقوي إلا بك.<br>
واجعلني أراك خلف كل قدر… حتى لا أسيء الظن، بل أقبل في كل ما قضيت.</p>
<p dir="rtl" class="p1">ٱللَّهُمَّ لَا تَجْعَلْ لِكَبْرِي نَصِيبًا فِي قَلْبِي، وَٱجْعَلْنِي أَرَاكَ فِي كُلِّ خَوْفٍ،<br>
وَتَحْتَ كُلِّ قَهْرٍ، وَفَوْقَ كُلِّ سُلْطَةٍ، وَخَلْفَ كُلِّ قَدَرٍ، فَإِنَّ ٱلَّذِي يَرَاكَ… لَا يَضِلُّ، وَلَا يَخَافُ، وَلَا يَتَكَبَّر.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p36">" يَا قَهَّارُ… سَيِّرْنِي فِي طَرِيقِكَ وَلَوْ قَهْرًا، وَلَا تَتْرُكْنِي أَخْتَارُ ضَيَاعِي، فَإِنَّكَ تَعْلَمُ أَنِّي أَضَعَفُ مِمَّا أُظْهِرُ ".</p>
<p dir="rtl" class="p19"><br></p>
<p dir="rtl" class="p1">هذا الدعاء يقطر صدقًا وافتقارًا، وكأنه نَفَسٌ من قلب عبدٍ يعرف نفسه جيدًا: يعرف ضعفه، يعرف تردده، يعرف أنه قد يختار بقدمه ما يُهلكه…<br>
فيسأل الله أن يأخذه عنوةً إلى النجاة، إن لم يستطع أن يذهب إليها اختيارًا.</p>
<p dir="rtl" class="p1">وإليكم الرسالة التأملية العميقة المستوحاة من هذا الدعاء العظيم، بلغةٍ حانية مَهيبة، تخاطب بها القلوب الضائعة، الصادقة، الباحثة عن النجاة:</p>
<p dir="rtl" class="p1"><span class="s2"><b>رسالة بعنوان:</b></span><b> "خُذني إليك… ولو قهرًا"</b></p>
<p dir="rtl" class="p1">يا قهّار… أنا لا أثق كثيرًا بخطاي… فقد مضت بي مرارًا إلى ما أظنه خيرًا، فإذا هو ضياع.</p>
<p dir="rtl" class="p1">ولا أثق كثيرًا بعقلي… فقد زين لي ما ظننته صوابًا، ثم تركني في ظلمة الشكّ.</p>
<p dir="rtl" class="p1">ولا أثق بقلبي دومًا… فقد أحبّ ما أوجعني، وتعلّق بما لا يُرضيك، ثم عاد إليك مكسورًا.</p>
<p dir="rtl" class="p1">فيا قهّار… إن كنتَ لا تهديني برفق، فاهدني قهرًا.</p>
<p dir="rtl" class="p1">سُقْني إليك ولو بألم، وخذني إليك ولو على غير إرادتي، ولا تتركني أختار ضياعي بيدي… ثم أبكيك وأنا الغارق فيه.</p>
<p dir="rtl" class="p1">يا رب… أحيانًا لا أملك إلَّا التظاهر بالقوة، والحقيقة أنني ضعيف… أضعف مما أُظهر، وأكثر خوفًا مما أقول، وأقرب إلى السقوط مما يبدو للناس.</p>
<p dir="rtl" class="p1">سَيِّرْنِي فِي طَرِيقِكَ وَلَوْ قَهْرًا، وإن لم أستطع أن أقول "لبّيك" بفرح، فخذ بيدي وأنت تقولها عني.</p>
<p dir="rtl" class="p1">وإن كنتُ ممن لا يعرف كيف يهرب من نفسه… فاحملني إليك، ولو على كتف القهر.</p>
<p dir="rtl" class="p1">يَا قَهَّارُ… سَيِّرْنِي فِي طَرِيقِكَ وَلَوْ قَهْرًا، وَلَا تَتْرُكْنِي أَخْتَارُ ضَيَاعِي، فَإِنَّكَ تَعْلَمُ أَنِّي أَضْعَفُ مِمَّا أُظْهِرُ… وَأَحْوَجُ إِلَيْكَ مِمَّا أُصَرِّحُ، وَأَقْرَبُ إِلَى ٱلْفِتْنَةِ مِمَّا أَظُنّ.</p>
<p dir="rtl" class="p19"><br></p>
<p dir="rtl" class="p19"><br></p>
<p dir="rtl" class="p24"><b>الانحرافات حول اسم </b><span class="s8"><b>ٱلْقَاهِر</b></span><b> - </b><span class="s8"><b>ٱلْقَهَّار</b><b></b></span></p>
<p dir="rtl" class="p25"><b>أولًا: الانحرافات العقدية حول اسم </b><span class="s8"><b>ٱلْقَاهِر</b></span><b> - </b><span class="s8"><b>ٱلْقَهَّار</b><b></b></span></p>
<p dir="rtl" class="p36">الاعتقاد بأنَّ الله يقهر عباده ظلمًا أو عبثًا: بعض الناس يظن أن قهر الله لعباده نوعٌ من الجبروت غير الـمُبرّر، أو القسوة التي لا حكمة فيها.</p>
<p dir="rtl" class="p1"><b>التصحيح</b>: قهر الله عدلٌ مطلق وحكمةٌ مطلقة، وهو لا يكون ظلمًا أبدًا، لأن الله قال:<span class="s15"> ﴿مَّنۡ عَمِلَ صَٰلِحٗا فَلِنَفۡسِهِۦۖ وَمَنۡ أَسَآءَ فَعَلَيۡهَاۗ وَمَا رَبُّكَ بِظَلَّٰمٖ لِّلۡعَبِيدِ﴾</span><span class="s13"> </span><span class="s12">فصلت: ٤٦</span>، وقهره دواء لا عقوبة، وهو من مظاهر رحمته إن أعقب انكسارًا وعودة.</p>
<p dir="rtl" class="p36">الخوف الـمَرضي من الله لدرجة الهلع أو اليأس: البعض حين يسمع اسم "<span class="s8"><b>ٱلْقَهَّار</b></span>" يظن أن الله "منتقِم دائمًا" ولا يُرجى منه لطف ولا رحمة.</p>
<p dir="rtl" class="p1"><b>التصحيح</b>: القهر الإلهي جزء من صفات الجلال، لكنه لا ينفصل عن الرحمة والحكمة.</p>
<p dir="rtl" class="p1">الله قهّار… لكنّه أيضًا غفور، ودود، لطيف، ستّير، حكيم، والرُعب من الله إذا فَقَدَ الاتزان انقلب إلى يأس وتجرئة الشيطان.</p>
<p dir="rtl" class="p36">اعتقاد أنَّ القهر لا يكون إلا بالهلاك أو العقوبة: من الناس مَن لا يرى في "قهر الله" إلا الهلاك الجسدي أو سقوط الظالم!.</p>
<p dir="rtl" class="p1"> <b>التصحيح</b>: قهر الله أوسع من أن يُحصر في صور العقاب.</p>
<p dir="rtl" class="p48">يقهر الشهوة،</p>
<p dir="rtl" class="p48">يقهر العُجب،</p>
<p dir="rtl" class="p48">يقهر حبّ الدنيا،</p>
<p dir="rtl" class="p48">يقهر العناد الداخلي…</p>
<p dir="rtl" class="p1">وكل ذلك من صور لطف القهر… لا قهر الانتقام.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p36"><b>ثانيًا: الانحرافات السلوكية حول اسم </b><span class="s8"><b>ٱلْقَهَّار</b><b></b></span></p>
<p dir="rtl" class="p36">استخدام "قهر الله" كمبرر للقسوة على الناس: بعض المتدينين يُبرّر القسوة أو التعنيف أو إذلال الناس قائلًا: "الله قهّار ونحن مأمورون بالغيرة للدين!".</p>
<p dir="rtl" class="p1"><b>التصحيح</b>: قهر الله صفة إلهية لا يملكها البشر، ولا يجوز شرعًا أن نُسقط القهر على عباد الله دون عدل، ولا أن نُلبس العنف ثوب الغيرة، النبي ﷺ كان أشد الناس تمثلًا بجمال التواضع، وهو الذي قال: اللَّهُمَّ اهْدِ قَوْمِي، فَإِنَّهُمْ لَا يَعْلَمُونَ"، حتى وهم يُؤذونه.</p>
<p dir="rtl" class="p36">الاعتقاد أن كل ألم هو قهر إلهي غاضب: البعض يرى أن كل مرض أو فقر أو خسارة = "غضب من القهّار".</p>
<p dir="rtl" class="p1"><b>التصحيح</b>: ليس كل قهرٍ إلهي هو "عقوبة"، بل قد يكون رحمة خفيّة وهداية مغلّفة بالألم، قال يوسف عليه السلام:<span class="s15"> ﴿قَالَ رَبِّ ٱلسِّجۡنُ أَحَبُّ إِلَيَّ مِمَّا يَدۡعُونَنِيٓ إِلَيۡهِۖ وَإِلَّا تَصۡرِفۡ عَنِّي كَيۡدَهُنَّ أَصۡبُ إِلَيۡهِنَّ وَأَكُن مِّنَ ٱلۡجَٰهِلِينَ﴾ ﴿قَالَ رَبِّ ٱلسِّجۡنُ أَحَبُّ إِلَيَّ مِمَّا يَدۡعُونَنِيٓ إِلَيۡهِۖ وَإِلَّا تَصۡرِفۡ عَنِّي كَيۡدَهُنَّ أَصۡبُ إِلَيۡهِنَّ وَأَكُن مِّنَ ٱلۡجَٰهِلِينَ﴾</span><span class="s13"> </span><span class="s12">يوسف: ٣٣</span>، السجن هنا قهر ظرفي… لكنه كان طريقًا إلى الملك، والعز، والتمكين.</p>
<p dir="rtl" class="p36">التسلّط الروحي أو الديني على الناس باسم التوحيد: بعض الدعاة قد يُقحم اسم "<span class="s8"><b>ٱلْقَهَّار</b></span>" في خطابه ليُخيف الناس أكثر من أن يُحببهم، فيُربّي عبيدًا خائفين… لا عبادًا مُحبين.</p>
<p dir="rtl" class="p1"><b>التصحيح</b>: اسم "<span class="s8"><b>ٱلْقَهَّار</b></span>" يُعلّمنا أن القهر الحقيقي هو ما يُعيد العبد إلى الله… لا ما يدفعه بعيدًا عنه، فإن قهرت قلوب الناس بخطابك… فلا تجعلهم يهربون من الله، بل يهرعون إليه.</p>
<p dir="rtl" class="p1"><b>قاعدة تصحيحية جامعة</b></p>
<p dir="rtl" class="p1">"<span class="s8"><b>ٱلْقَهَّارُ</b></span>" ليس اسمًا يدفعك إلى الذعر… بل إلى الخضوع، والتواضع، والانكسار المحبّ، والثقة المطلقة بأنَّ الله لا يُقهر، ولا يُعجزه شيء، وأنك لن تنجو إلَّا إذا خضعت له بحبّ، لا برُعب.</p>
<p dir="rtl" class="p19"><br></p>
<p dir="rtl" class="p66"><span class="s2"><b>خاتمة وجدانية بعنوان: "</b></span><b>قهر الله… ليس نهاية، بل بداية الرجوع</b><span class="s2"><b>"</b></span></p>
<p dir="rtl" class="p1"><span class="s8"><b>ٱلْقَهَّارُ</b></span>… ليس اسمًا يُراد به إخافتك لتفرّ، بل لتُفرغ قلبك مما سواه… وتفرّ إليه وحده.</p>
<p dir="rtl" class="p1">إنه الاسم الذي يوقظك من سبات الغفلة، ويكسر جبال الكِبر فيك، ويهزّك لتستقيم، لا لتنهار، <span class="s8"><b>ٱلْقَهَّارُ</b></span>… يسحبك من قاع نفسك… حين لا تعود تستجيب للرفق.</p>
<p dir="rtl" class="p67"><span class="s41"><b>" </b></span><span class="s43"><b>ٱلْقَهَّارُ</b></span> هو الذي يُسقط المتكبرين ليعلمهم أن الرفعة ليست بيدهم، ويُضعف الأقوياء ليُدركوا أن الحماية ليست في قوتهم أو حولهم، ويغلق الأبواب ليجعلهم يدخلون من باب واحد فقط:<span class="s41"><b> بابه </b></span>."</p>
<p dir="rtl" class="p1">يا عبد الله… حين يُقهر جسدك، أو مالك، أو وجاهتك… انظر أعمق من ذلك… هل قُهِر قلبك؟ هل انتبهت؟ هل انكسرت له؟ هل عدت إليه؟..</p>
<p dir="rtl" class="p1">فإن لم يحدث هذا… فما عرفت القهّار بعد.</p>
<p dir="rtl" class="p1">القهر من الناس يُذلّك… لكن القهر من الله يُطهّرك.</p>
<p dir="rtl" class="p1">الناس إذا قهروك… ألقوك بعيدًا.</p>
<p dir="rtl" class="p1">أما الله إذا قهرك… اقتربت منه أكثر مما كنت حين كنت بخير!.</p>
<p dir="rtl" class="p1">لذلك، لا تخف من القهر إذا أتى من الله… بل خف أن يُترك قلبك دون قهر، فتعلو، وتغفل، وتُستدرج… وأنت تظن أنك بخير.</p>
<p dir="rtl" class="p1">إنك حين تُكسر بين يديه… فأنت تُبنى من جديد، وحين تضعف بين يديه… فأنت في أقوى حالاتك، وحين تَسقُط على عتبة "يا رب"…<br>
فأنت ترتفع على سُلّم النجاة.</p>
<p dir="rtl" class="p1">ٱللَّهُمَّ ٱقْهَرْنِي إِلَيْكَ، وَلَا تَتْرُكْنِي أَهِيمُ فِي طُرُقِي، وَإِنْ كَانَ لِلْخُشُوعِ بَابٌ… فَٱكْسِرْنِي عَلَى عَتَبَتِهِ، حَتَّى لَا يَبْقَى فِي قَلْبِي سِوَاكَ.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p24"><b>نصيحة من تحت اسم "</b><span class="s8"><b>ٱلْقَهَّارُ</b></span><b>":</b></p>
<p dir="rtl" class="p1">لا تنتظر أن يقهرك الله… حتى تعود إليه، بل قِف اليوم خاشعًا، وانكسر باختيارك… قبل أن تُكسَر بقَدَره.</p>
<p dir="rtl" class="p1"><span class="s8"><b>ٱلْقَهَّارُ</b></span> ليس فقط اسمًا يُقال في المحاريب، بل هو حقيقة تجري في قلب الحياة كل يوم… في لحظة فشل، في خذلان صديق، في مرضٍ مفاجئ، في خوفٍ لا تعرف مصدره.</p>
<p dir="rtl" class="p1">كل ذلك قد يكون رسالة… أنك صعدت أكثر مما ينبغي… فآنَ لك أن تنزل ساجدًا.</p>
<p dir="rtl" class="p1">انكسر لله باختيارك… قبل أن يُسقطك لتنكسر، فالقهر الذي يأتي من الحب… أنفع لك من الانتصار الذي يغريك بالنسيان.</p>
<p dir="rtl" class="p1">إذا رأيت حياتك تُقلب فجأة، أبوابك تُغلق، خططك تتهاوى… لا تَجزع، بل قُل في أدب: " <span class="s8"><b>ٱلْقَهَّارُ</b></span> يكتب لي رجعةً لم أكن سأعودها وحدي."</p>
<p dir="rtl" class="p1">لا تقف أمام الله مُتدرّعًا بما تملك… قف أمامه عارٍ من كل شيء… إلَّا حاجتك إليه، لأنّ الذي يقف بين يدي القهّار منكسِرًا… لن يحتاج أن يُكسَر مرة أخرى ليفهم الدرس.</p>
<p dir="rtl" class="p19"><br></p>
<p dir="rtl" class="p24"><b>ماذا أتعلم من اسم الله </b><span class="s8"><b>ٱلْقَاهِرُ</b></span><b> - </b><span class="s8"><b>ٱلْقَهَّارُ</b></span><b>؟</b> <b>كي أكون عبدًا نافعًا للناس</b></p>
<p dir="rtl" class="p36">أن أكون رقيقًا مع الضعيف… لأنني عرفت من قهَرني بلطف: حين ذُقت قهر الله لنفسي، لشهوتي، لهواي… علِمتُ أنَّ الإنسان لا يُنتشل بالعنف، بل بالرحمة والوعي، فأصير يدًا تمتدّ للمكسور… لا قدمًا تدوسه.</p>
<p dir="rtl" class="p36">أن لا أتعامل مع الناس من علُوّ… لأني أعرف من يُسقِط كل متكبّر: من عرف أن الله يُسقط الكِبر في لحظة… لا يُعطي نفسه فضلاً على أحد، ولا يحتقر عاصيًا، ولا يطعن في ضعيف، بل يُعينه ويستر عليه.</p>
<p dir="rtl" class="p36">أن أنفع الناس بما ذُقتُه من ألم… لا أن أحتكر تجربتي: القهر الإلهي يُربّيني على أن أنقل الدرس للناس، لا التفاخر بالنجاة، فكل ما مررتُ به… هو رسالة يجب أن أُترجمها إلى نفع للناس، لا تعالٍ عليهم.</p>
<p dir="rtl" class="p36">أن أكون مُصلحًا لا مُجرّحًا… لأنني أعلم أنَّ القهر لا يُقصد به إذلال، بل إصلاح: فأنا لا أقسو في دعوتي، ولا أصرخ في نصحي، بل أُجري قهر الله الذي أصلحني… برحمةٍ على من حولي.</p>
<p dir="rtl" class="p36">أن أكون متواضعًا دائمًا… لأني أعلم أن الله إن شاء قهرني في ثانية: فلا أفتخر بعلم، ولا بأتباع، ولا بنجاح، بل أقول في قلبي دومًا: هذا فضل من القهّار… لا فضل لي.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p24"><b>دعاء خاص بهذا المعنى:</b></p>
<p dir="rtl" class="p1">" ٱللَّهُمَّ يَا قَهَّارُ… لَا تَجْعَلْنِي سَيْفًا يُؤْلِمُ عِبَادَكَ، بَلِ ٱجْعَلْنِي يَدًا تَجْبُرُ ٱلْمَكْسُورِينَ، وَٱجْعَلْ قَهْرَكَ لِي سَبَبًا فِي رَحْمَتِي لِلنَّاس، وَفَهْمِي لِضَعْفِهِم،<br>
وَصِدْقِي فِي نُصْرَتِهِم، وَتَوَاضُعِي فِي كُلِّ نَفْسٍ أَخْدَمُهَا... ٱللَّهُمَّ اجْعَلْنِي نَافِعًا… بِقَلْبٍ انْقَهَرَ لَكَ، فَلَمْ يَعُدْ يُرِيدُ إِلَّا أَنْ يَكُونَ سَبَبًا فِي هِدَايَةِ ٱلْخَلْقِ إِلَيْكَ ".</p>
<p dir="rtl" class="p1"><span class="s2"><b>رسالة بعنوان:</b></span><b> "حين يُربّيك القَهّار… لتكون رحمة لغيرك" </b></p>
<p dir="rtl" class="p1">يا رب… قد قهرتَني يومًا حين كنت أظن أنني قوي، وكسرتَني وأنا أظن أنني ثابت، وأخذت مني ما أحبّ، حتى عرفت… أنك تُنقّي قلبي لأمرٍ أعظم مما أردت.</p>
<p dir="rtl" class="p1">علّمتني يا قهّار… أنَّ من ذاق القهر في يديك… يصير ألين الناس على من كُسِرَ مثلما كُسِر، يصير قلبه بيتًا لمن ضاع، وصوته دفئًا لمن ارتجف،<br>
وعنايته رحمةً لمن لم يجد في الدنيا أحدًا يراه.</p>
<p dir="rtl" class="p1">يا الله… لا تجعلني سيفًا يؤلم عبادك، ولو ظننت أنني أذبّ عن دينك.</p>
<p dir="rtl" class="p1">ولا تجعلني لسانًا يجلد، ولو ظننت أنني أنصح.</p>
<p dir="rtl" class="p1">ولا تجعلني يدًا تدفع الناس عنك، وأنا أظن أنني أقربهم إليك.</p>
<p dir="rtl" class="p1">اجعلني ممن فهموا القهر لا كعقوبة… بل كإعادة تشكيل، فهموا أن الألم يصنع عبدًا جديدًا، وأن الانكسار هو الباب الذي تدخل منه الرحمة.</p>
<p dir="rtl" class="p1">يا قهّار… إن قهرتني، فاجعل قهرك لي جسرًا أعبُر به إلى قلوب الناس، علّمني كيف أرفق، وكيف أستحيي من نصحي، وكيف أرى في الناس نفسي يوم كنتُ غافلًا، وأُعينهم لا لأني خير منهم… بل لأني كنتُ ذات يوم واحدًا منهم.</p>
<p dir="rtl" class="p1">ٱللَّهُمَّ اجْعَلْنِي نَافِعًا… بِقَلْبٍ انْقَهَرَ لَكَ، فَلَمْ يَعُدْ يُرِيدُ إِلَّا أَنْ يَكُونَ سَبَبًا فِي هِدَايَةِ ٱلْخَلْقِ إِلَيْكَ… رَحْمَةً مَمْشِيَّة، وَصَمْتًا نَاصِحًا، وَوَجْهًا لَا يُرْهِبُ، وَلَا يُؤَلِّمُ، بَلْ يُطَمْئِن..</p>
<p dir="rtl" class="p14"><span class="s9"><br>
</span><b>المقاصد العقدية العظيمة لاسم الله: </b><span class="s8"><b>ٱلْقَاهِرُ</b></span><b> – </b><span class="s8"><b>ٱلْقَهَّارُ</b><b></b></span></p>
<p dir="rtl" class="p36">تقرير كمال سلطان الله وقهره المطلق على كل شيء: أنَّ الله هو القاهر فوق عباده، لا يعلوه شيء، ولا يُمانع أمره ممانع، ولا يخرج عن سلطانه شيء في الوجود، وهو الذي يُصرّف الخلق كيف يشاء، ويدبّرهم بحكمته، ويقهرهم بقدرته، ويجري فيهم مشيئته التي لا تُرد:<span class="s15">﴿وَهُوَ ٱلۡقَاهِرُ فَوۡقَ عِبَادِهِۦۚ وَهُوَ ٱلۡحَكِيمُ ٱلۡخَبِيرُ﴾</span><span class="s13"> </span><span class="s12">الأنعام: ١٨</span>.</p>
<p dir="rtl" class="p37"><b>التربية الإيمانية</b>: يغرس هذا في القلب الخضوع التام لله، ويُسقط من القلب كل تعظيم باطل لمخلوق.</p>
<p dir="rtl" class="p36">ترسيخ توحيد الربوبية ومطلق التصرف: أنَّ الله وحده هو المالك الحقيقي لكل شيء، وما من قوة ولا سلطة إلا هي خاضعة له، ذليلة تحت أمره، كل ملكٍ، وكل طاغية، وكل متكبّر… إلى زوال، ويبقى القهّار الواحد: <span class="s15">﴿يَوۡمَ هُم بَٰرِزُونَۖ لَا يَخۡفَىٰ عَلَى ٱللَّهِ مِنۡهُمۡ شَيۡءٞۚ لِّمَنِ ٱلۡمُلۡكُ ٱلۡيَوۡمَۖ لِلَّهِ ٱلۡوَٰحِدِ ٱلۡقَهَّارِ﴾</span><span class="s13"> </span><span class="s12">غافر: ١٦</span>.</p>
<p dir="rtl" class="p37"><b>التربية الإيمانية</b>: تجعل القلب لا يتعلّق بالملوك، ولا يرتعب من الأقوياء، بل يرى أنَّ القوّة ليست في يد أحد إلَّا بإذن القَهَّار.</p>
<p dir="rtl" class="p36">بيان أنَّ القهر الإلهي جزء من الرحمة واللطف والعدل: قهر الله لعباده ليس ظلمًا، بل إصلاح، وتهذيب، وتربية، وإرجاع للمسار الصحيح، فكم من عبد قهره الله بالفقر، أو المرض، أو الخذلان… فكان ذلك القهر سبب نجاته:<span class="s15"> ﴿هُوَ ٱلَّذِيٓ أَخۡرَجَ ٱلَّذِينَ كَفَرُواْ مِنۡ أَهۡلِ ٱلۡكِتَٰبِ مِن دِيَٰرِهِمۡ لِأَوَّلِ ٱلۡحَشۡرِۚ مَا ظَنَنتُمۡ أَن يَخۡرُجُواْۖ وَظَنُّوٓاْ أَنَّهُم مَّانِعَتُهُمۡ حُصُونُهُم مِّنَ ٱللَّهِ فَأَتَىٰهُمُ ٱللَّهُ مِنۡ حَيۡثُ لَمۡ يَحۡتَسِبُواْۖ وَقَذَفَ فِي قُلُوبِهِمُ ٱلرُّعۡبَۚ يُخۡرِبُونَ بُيُوتَهُم بِأَيۡدِيهِمۡ وَأَيۡدِي ٱلۡمُؤۡمِنِينَ فَٱعۡتَبِرُواْ يَٰٓأُوْلِي ٱلۡأَبۡصَٰرِ﴾</span><span class="s13"> </span><span class="s12">الحشر: ٢</span>.</p>
<p dir="rtl" class="p37"><b>التربية الإيمانية:</b> يفتح هذا المقصد أبواب الرضا، واليقين، وحُسن الظَّن بالله حتى في مواطن الانكسار.</p>
<p dir="rtl" class="p36">كشف عجز الإنسان وافتقاره المطلق: اسم "<span class="s8"><b>ٱلْقَهَّار</b></span>" يُظهر حدودك الحقيقية… فأنت لا تملك من أمرك شيئًا، نبض قلبك، حركة عينك، خطواتك، أفكارك… كلها قابلة أن تُقهر في أي لحظة.</p>
<p dir="rtl" class="p37"><b>التربية الإيمانية:</b> هذا يغرس التواضع الحقيقي، ويُعلّمك أن لا تغترّ بقوّتك، ولا تفتخر بما ليس لك فضل فيه.</p>
<p dir="rtl" class="p36">ردّ الشرك الخفيّ والعُجب والتعلق بالأسباب: من اعتقد أنَّ الأسباب تكفي، أو أن الناس تملك النفع والضر، أو أن سلطانه دائم… فقد جهل معنى "<span class="s8"><b>ٱلْقَهَّار</b></span>"، لا مال، ولا علم، ولا شهرة، ولا قوة… تستطيع أن تصمد لحظة أمام قَهْر الله.</p>
<p dir="rtl" class="p37"><b>التربية الإيمانية</b>: تُحيي في القلب التوكل الصادق، وتُطهّره من شوائب الرِّياء، والثقة الزائدة بالنفس، والتعلّق بالبشر.</p>
<p dir="rtl" class="p36">بيان أنَّ قهر الله سبب في نصرة عباده المستضعفين: الله تعالى لا يترك الظالم إلى الأبد… بل يُمهله، ثم يقهره قهرًا يراه الناس، فيُشفَون به ويعتبرون، وهذا من عدله ورحمته بالمظلومين: <span class="s15">﴿إِلَّا ٱلَّذِينَ ءَامَنُواْ وَعَمِلُواْ ٱلصَّٰلِحَٰتِ وَذَكَرُواْ ٱللَّهَ كَثِيرٗا وَٱنتَصَرُواْ مِنۢ بَعۡدِ مَا ظُلِمُواْۗ وَسَيَعۡلَمُ ٱلَّذِينَ ظَلَمُوٓاْ أَيَّ مُنقَلَبٖ يَنقَلِبُونَ﴾</span><span class="s13"> </span><span class="s12">الشعراء: ٢٢٧</span>.</p>
<p dir="rtl" class="p37"><b>التربية الإيمانية</b>: يغرس في القلب الطُّمأنينة والثقة بنصرة الله، ولو تأخرت ظاهريًا.</p>
<p dir="rtl" class="p36">أنَّ قهر الله لا يُرد، ولا ينجو منه أحد إلَّا برحمة منه: فلا مفرّ منه إلا إليه، ولا نجاة منه إلا بالانكسار له:<span class="s15"> ﴿وَمَا كَانَ لِنَفۡسٍ أَن تَمُوتَ إِلَّا بِإِذۡنِ ٱللَّهِ كِتَٰبٗا مُّؤَجَّلٗاۗ وَمَن يُرِدۡ ثَوَابَ ٱلدُّنۡيَا نُؤۡتِهِۦ مِنۡهَا وَمَن يُرِدۡ ثَوَابَ ٱلۡأٓخِرَةِ نُؤۡتِهِۦ مِنۡهَاۚ وَسَنَجۡزِي ٱلشَّٰكِرِينَ﴾</span><span class="s13"> </span><span class="s12">آل عمران: ١٤٥</span><span class="s21">.</span></p>
<p dir="rtl" class="p37">التربية الإيمانية: يغرس في القلب الافتقار الحقيقي، والدعاء الصادق، والانقياد الكامل.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p1"><b>خلاصة المقاصد العقدية في جملة واحدة:</b></p>
<p dir="rtl" class="p1">اسم "<span class="s8"><b>ٱلْقَهَّار</b></span>" يُربّيك على أن تَخضع لله في كل حال، وألَّا ترى في نفسك قوّة، وألا تخشى مخلوقًا، وأن تُحبّ الانكسار بين يدي الله، لأنَّه وحده القاهر الذي يُحسن القَهر… ليُعيدك إليه.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p44">( ٱلدَّيَّانُ )</p>
<p dir="rtl" class="p68"><span class="s8"><b>ٱلدَّيَّان</b></span><b>… حين يُنصِف الله تعالى كلّ شيء</b></p>
<p dir="rtl" class="p56">أنا لا أكتب الآن عن اسم من أسماء الله فقط…<br>
أنا أكتب عن الاسم الذي تهتزّ له مفاصل العدالة في السماوات والأرض<br>
عن الاسم الذي لا ينام عن جرحٍ نُسي، ولا عن دمعةٍ كُتمت، ولا عن خيانةٍ غُلّفت بالدين.</p>
<p dir="rtl" class="p56">أنا دريد إبراهيم الموصلي… وأكاد أقسم: قلبي الآن ليس في مكانه.<br>
جسدي يرتجف… أنفاسي مضطربة…<br>
كأنني أُساق إلى الحساب وأنا أكتب...<br>
كأنني أُعرض الآن على الله تعالى لا على الورق!</p>
<p dir="rtl" class="p56">كل حرفٍ في هذا الفصل يُشهِدني على نفسي..<br>
كل فكرةٍ عن "<span class="s8"><b>ٱلدَّيَّان</b></span>" كأنها صدى نداءٍ سماوي:</p>
<p dir="rtl" class="p56">وقفوهم… إنهم مسؤولون...</p>
<p dir="rtl" class="p56">ما عادت يدي تكتب… بل تئنّ<br>
وما عاد قلمي يشرح… بل يشهد عليّ</p>
<p dir="rtl" class="p56"><span class="s8"><b>ٱلدَّيَّان</b></span>… ليس اسمًا للترهيب فقط<br>
بل مرآة تُريك وجهك الحقيقي، لا الذي رتّبته للناس.<br>
هو العدالة حين تُبعث من تحت التراب..<br>
هو الحقّ حين ينتصر بعد صمت السنين..<br>
هو المظلوم حين يرفع رأسه، والظالم حين يُسحب من جبروته..</p>
<p dir="rtl" class="p56"><span class="s8">ٱلدَّيَّان</span>… هو الحُكم الذي لا يُستأنف..<br>
هو النطق الذي لا يُخطئ..<br>
هو العدل… الذي لا يُغادر صغيرة ولا كبيرة إلا أحصاها..</p>
<p class="p53"><br></p>
<p dir="rtl" class="p46"><b>ٱلدَّيَّانُ...</b></p>
<p dir="rtl" class="p1">هو الاسم الذي لا يُذكَر إلَّا وارتجف القلب، واتسعت العين، ووَجِلت النفس رجاءً وخوفًا… لأنَّك حين تنطقه… تشعر أنك واقف أمام ساحة العدل الإلهي، لا تُنسى فيها دمعة، ولا تُهمَل فيها خيانة، ولا تُؤجل فيها مظلمة.</p>
<p dir="rtl" class="p1"><span class="s8"><b>ٱلدَّيَّانُ…</b></span> هو الذي لا يضيع عنده شيء… كل ألم صبرتَ عليه، كل دمعة خبّأتها عن الناس، كل قهر لم تجد له نصيرًا، كل ظُلمٍ نسيَه العالم…<br>
عند الدَّيّان لا يُنسى.</p>
<p dir="rtl" class="p1">هو الذي يحفظ الحساب، ويؤجّل القصاص، لكن لا يُسقطه.</p>
<p dir="rtl" class="p1">يؤخّر العدل… ليُقيمه في لحظة لا تملك فيها حجة، ولا فرار، ولا وساطة.</p>
<p dir="rtl" class="p50"><span class="s9">حين تسمع: </span><span class="s18">﴿يَوۡمَ هُم بَٰرِزُونَۖ لَا يَخۡفَىٰ عَلَى ٱللَّهِ مِنۡهُمۡ شَيۡءٞۚ لِّمَنِ ٱلۡمُلۡكُ ٱلۡيَوۡمَۖ لِلَّهِ ٱلۡوَٰحِدِ ٱلۡقَهَّارِ﴾</span><span class="s13"> </span><span class="s12">غافر: ١٦</span><span class="s9">، ثم يُتبع ذلك بالموقف …</span></p>
<p dir="rtl" class="p1">حين تُجْلَى الصُّحف، وتُنصَب الموازين، ويُحضَر الشهود، ويُسأل الجميع… فأنت لا تقف أمام ملك، ولا جبّار، بل أمام: <span class="s8"><b>ٱلدَّيَّانُ…</b></span> الذي لا يُهمل، ولا ينسى، ولا يُسامح إلَّا من رحم.</p>
<p dir="rtl" class="p1">يا عبد الله... كُن واثقًا أنَّ حقّك لن يضيع، وأن دمعتك لن تُمحى، وأن مظلوميتك لن تُدفن، إن كانت لك عند <span class="s8"><b>ٱلدَّيَّانِ</b></span> دعوة واحدة فقط…<br>
فهي أعظم من كل جيش، وأقوى من كل سلطان.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p24"><b>الفرق الدقيق بين "</b><span class="s8"><b>ٱلدَّيَّانُ</b></span><b>" وغيره من أسماء الجلال</b></p>

<tr>
<td valign="middle" class="td8">
  <p dir="rtl" class="p15"><b>وجه الفرق</b></p>
</td>
<td valign="middle" class="td248">
  <p dir="rtl" class="p15"><b>المعنى الخاص</b></p>
</td>
<td valign="middle" class="td249">
  <p dir="rtl" class="p15"><b>الاسم</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td12">
  <p dir="rtl" class="p16"><b>يُركّز على الجزاء والمحاسبة بعد العلم والإحاطة</b></p>
</td>
<td valign="middle" class="td250">
  <p dir="rtl" class="p17"><b>من يُجَازِي الخلق على أعمالهم، صغيرها وكبيرها، في الدنيا والآخرة</b></p>
</td>
<td valign="middle" class="td251">
  <p dir="rtl" class="p17"><b>ٱلدَّيَّانُ</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td252">
  <p dir="rtl" class="p16"><b>يُركّز على إقامة الميزان وضبط الحقوق بدقة</b></p>
</td>
<td valign="middle" class="td253">
  <p dir="rtl" class="p17"><b>من يَضع كل شيء في موضعه ويقضي بالحق دون جور</b></p>
</td>
<td valign="middle" class="td254">
  <p dir="rtl" class="p17"><b>ٱلْعَدْلُ</b></p>
  <p dir="rtl" class="p29"><span class="s9"><b>(</b></span><b>صفة</b><span class="s9"><b>)</b></span></p>
</td>
</tr>
<tr>
<td valign="middle" class="td12">
  <p dir="rtl" class="p16"><b>يُركّز على الفصل في الخصومات بالحق</b></p>
</td>
<td valign="middle" class="td250">
  <p dir="rtl" class="p17"><b>الذي يفصل بين العباد فيما اختلفوا فيه ويقضي بينهم</b></p>
</td>
<td valign="middle" class="td251">
  <p dir="rtl" class="p17"><b>ٱلْحَكَمُ</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td255">
  <p dir="rtl" class="p16"><b>يُركّز على إظهار القوة والهيمنة والإذلال لمن عصاه</b></p>
</td>
<td valign="middle" class="td253">
  <p dir="rtl" class="p17"><b>من يقهر الخلق ويغلبهم بقدرته وسلطانه</b></p>
</td>

  <p dir="rtl" class="p17"><b>ٱلْقَهَّارُ</b></p>

<p dir="rtl" class="p46"><span class="s9">← </span><b>إذًا:</b><b></b></p>
<p dir="rtl" class="p36"><span class="s8"><b>ٱلْقَهَّارُ</b></span> <span class="s44">←</span> <b>قهرٌ للظالمين</b><b></b></p>
<p dir="rtl" class="p36"><span class="s8"><b>ٱلْعَدْلُ</b></span> <span class="s44">←</span> <b>إقامة للميزان</b><b></b></p>
<p dir="rtl" class="p36"><span class="s8"><b>ٱلْحَكَمُ</b></span>  <span class="s44">←</span><b>حسم للنزاع</b><b></b></p>
<p dir="rtl" class="p36"><span class="s8"><b>ٱلدَّيَّانُ</b></span> <span class="s44">←</span> <b>مُحاسبة ومجازاة لكل أحد… في السرّ والعلن، في الظاهر والباطن، ولا يُنسى شيء.</b><b></b></p>
<p dir="rtl" class="p1"><span class="s8"><b>ٱلدَّيَّانُ</b></span>… هو الذي سيقول لك يومًا: هذا ما فعلت… فهل أعددت للجواب؟ .</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p14"><b>تنويه مهم:</b></p>
<p dir="rtl" class="p1">سؤال يطرحه كثير من الباحثين: لماذا اسم "<span class="s8"><b>ٱلْعَدْل</b></span>" مع كونه صفة كمال عظيمة لله ليس من الأسماء الحسنى التي وردت في القرآن أو السنة الصحيحة؟.</p>
<p dir="rtl" class="p1"><b>الجواب يتطلب تفصيلًا لغويًا وشرعيًا وعقديًا، وسأقدّمه لكم على مراحل:</b></p>
<p dir="rtl" class="p24"><b>أولًا: هل "العدل" صفة لله؟</b></p>
<p dir="rtl" class="p1">نعم، بلا خلاف، الله تعالى موصوف بأنه العدل في أقضيته وأحكامه وشرعه وقدره، وهذا من صميم عقيدة أهل السُّنة والجماعة.</p>
<p dir="rtl" class="p1">وقد دلّت النصوص الشرعية على ذلك، ومنها قوله تعالى: <span class="s15">﴿إِنَّ ٱللَّهَ لَا يَظۡلِمُ مِثۡقَالَ ذَرَّةٖۖ وَإِن تَكُ حَسَنَةٗ يُضَٰعِفۡهَا وَيُؤۡتِ مِن لَّدُنۡهُ أَجۡرًا عَظِيمٗا﴾</span><span class="s13"> </span><span class="s12">النساء: ٤٠</span>، وقوله تعالى:<span class="s15"> ﴿مَّنۡ عَمِلَ صَٰلِحٗا فَلِنَفۡسِهِۦۖ وَمَنۡ أَسَآءَ فَعَلَيۡهَاۗ وَمَا رَبُّكَ بِظَلَّٰمٖ لِّلۡعَبِيدِ﴾</span><span class="s13"> </span><span class="s12">فصلت: ٤٦</span>، فكلها تدل على عدله المطلق، وهو صفة كمال ثابتة لله.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p24"><b>ثانيًا: هل ورد اسم "</b><span class="s8"><b>ٱلْعَدْل</b></span><b>" في القرآن أو السُّنة الصحيحة؟</b></p>
<p dir="rtl" class="p1"><b>في القرآن الكريم</b>: لم يرد اسم <span class="s8"><b>ٱلْعَدْل</b></span> نصًا صريحًا كاسمٍ لله، لا في سياق الأسماء الحسنى، ولا في أي موضع من القرآن مقرونًا بلفظ "اسم الله العدل" أو "إنه هو العدل".</p>
<p dir="rtl" class="p1"><b>في السنة النبوية</b>: لا يرد في الأحاديث الصحيحة عن النبي ﷺ أنه سمّى الله بـ ٱلْعَدْل ضمن الأسماء الحسنى، سواء في حديث الترمذي المعروف (وفيه ضعف من جهة السند والتلقين) أو في غيره.</p>
<p dir="rtl" class="p1">إذاً: لم يُثبت هذا الاسم كاسم لله لا نصًا قرآنيًا ولا حديثًا صحيحًا.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p24"><b>ثالثًا: ما الفرق بين "</b><span class="s8"><b>الصفات</b></span><b>" و"</b><span class="s8"><b>الأسماء</b></span><b>"؟</b></p>
<p dir="rtl" class="p1">هذا محور دقيق لفهم المسألة:</p>
<p dir="rtl" class="p13"><br></p>
<table cellspacing="0" cellpadding="0" class="t1">
<tbody>
<tr>
<td valign="middle" class="td256">
  <p dir="rtl" class="p15"><b>الصفات</b></p>
</td>
<td valign="middle" class="td257">
  <p dir="rtl" class="p15"><b>الأسماء</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td258">
  <p dir="rtl" class="p16"><b>ما دلّ على معاني الكمال الثابتة لله</b></p>
</td>
<td valign="middle" class="td259">
  <p dir="rtl" class="p17"><b>ما دلّ على ذات الله ومعناه</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td260">
  <p dir="rtl" class="p16"><b>قد تُستنبط من الأفعال أو الأوصاف</b></p>
</td>
<td valign="middle" class="td261">
  <p dir="rtl" class="p17"><b>يجب أن تكون توقيفية وأن تُشتق من النصوص</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td262">
  <p dir="rtl" class="p16"><b>مثال: العدل، النزول، الكلام</b></p>
</td>
<td valign="middle" class="td259">
  <p dir="rtl" class="p17"><b>مثال: الرحمن، الغفور، القدوس</b></p>
</td>
</tr>
</tbody>
</table>
<p dir="rtl" class="p1">فـ العدل صفة لله، لكن اسم " العدل" لم يُنقل إلينا بنصٍ شرعي ثابت، فليس من الأسماء التوقيفية، قال الإمام ابن القيم: " الأسماء الحسنى لا تُثبت إلَّا بنص شرعي، أما الصفات فقد تثبت بالعقل والفطرة والنقل" بدائع الفوائد.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p24"><b>رابعًا: لماذا لا يُعدّ "</b><span class="s8"><b>العَدْل</b></span><b>" اسمًا من أسماء الله الحسنى؟</b></p>
<p dir="rtl" class="p1"><b>لعدة أسباب شرعية:</b></p>
<p dir="rtl" class="p36">لأنه لم يرد به نص توقيفي، لا من القرآن ولا من السُّنة، والأسماء الحسنى توقيفية لا اجتهادية.</p>
<p dir="rtl" class="p36">عدم وروده في الأسماء المعتبرة لدى الأئمة المحققين، كالأسماء التي جمعها:</p>
<p dir="rtl" class="p47">الإمام ابن القيم</p>
<p dir="rtl" class="p47">الإمام البيهقي</p>
<p dir="rtl" class="p47">الحافظ ابن حجر</p>
<p dir="rtl" class="p1">وغيرهم وكلهم لم يُثبتوا اسم "<span class="s8"><b>ٱلْعَدْل</b></span>" كاسم من أسماء الله الحسنى، بل عدّوه من صفاته.</p>
<p dir="rtl" class="p36">لأنَّ العدل قد يُفهم على وجه ناقص عند البعض: العدل في البشر يعني إعطاء كل ذي حق حقه، أما الله تعالى فـ يعطي ما يشاء لمن يشاء، ولو لم يعذّب أحدًا أصلاً، لم يكن ظالـمًا، بل هذا من فضله، لذلك يُخشى أن يُساء فهم "<span class="s8"><b>ٱلْعَدْل</b></span>" خارج سياقه الإلهي الكامل.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p24"><b>خامسًا: ماذا نستفيد من معرفة أنَّ "</b><span class="s8"><b>العَدْل</b></span><b>" صفة لا اسم؟</b></p>
<p dir="rtl" class="p36">أنك تُؤمن بأنَّ الله عادلٌ في قضائه وقدره وحكمه.</p>
<p dir="rtl" class="p36">وتصفه بـ "<span class="s8"><b>العَدْل</b></span>" من حيث الخبر والصفة لا الاسم.</p>
<p dir="rtl" class="p36">ولا تُنشئ به دعاءً مبنيًا على "يا عدل" لأنه ليس من الأسماء الثابتة التي يُدعى بها.</p>
<p dir="rtl" class="p1">قال تعالى: <span class="s15">﴿وَلِلَّهِ ٱلۡأَسۡمَآءُ ٱلۡحُسۡنَىٰ فَٱدۡعُوهُ بِهَاۖ وَذَرُواْ ٱلَّذِينَ يُلۡحِدُونَ فِيٓ أَسۡمَٰٓئِهِۦۚ سَيُجۡزَوۡنَ مَا كَانُواْ يَعۡمَلُونَ﴾</span><span class="s13"> </span><span class="s12">الأعراف: ١٨٠</span>، والدعاء بالأسماء غير الثابتة مخالف لهذا الأصل.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p24"><b>سادسًا: هل يجوز أن نقول: "</b><span class="s8"><b>يا عدل</b></span><b>" في الدعاء؟</b></p>
<p dir="rtl" class="p1"><span class="s45"> ❌ </span>الأفضل أن لا يُقال: "يا عدل" لأنَّ أسماء الله توقيفية، والدعاء بها توقيفي أيضًا، وما لم يثبت اسمًا، فلا يُدعى به على أنه اسم.</p>
<p dir="rtl" class="p1">لكن يُمكن أن يُقال في الدعاء:</p>
<p dir="rtl" class="p1">"اللهم إنك لا تظلم أحدًا، وإنك الحكم العدل، فاحكم بيننا بعدلك ورحمتك"</p>
<p dir="rtl" class="p1">أو:</p>
<p dir="rtl" class="p1">"اللهم عاملنا بعدلك ورحمتك، ولا تؤاخذنا بما فعل السفهاء منا…"</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p13"><b></b><br></p>
<p dir="rtl" class="p13"><b></b><br></p>
<p dir="rtl" class="p13"><b></b><br></p>

  <p dir="rtl" class="p16"><span class="s23"><b> ✅ </b></span><b>نعم، وهو من أعظم صفاته الثابتة</b></p>

<td valign="middle" class="td266">
  <p dir="rtl" class="p17"><b>هل "العدل" من صفات الله؟</b></p>
</td>

<tr>
<td valign="middle" class="td267">
  <p dir="rtl" class="p16"><b> ❌ لا، لم يرد به نص شرعي ثابت</b></p>
</td>
<td valign="middle" class="td268">
  <p dir="rtl" class="p17"><b>هل "العدل" من أسماء الله الحسنى؟</b></p>
</td>

<td valign="middle" class="td265">
  <p dir="rtl" class="p16"><b> ❌ الأفضل اجتنابه، والدعاء بالثابت</b></p>
</td>
<td valign="middle" class="td266">
  <p dir="rtl" class="p17"><b>هل يجوز الدعاء بـ "يا عدل"؟</b></p>
</td>

<tr>
<td valign="middle" class="td269">
  <p dir="rtl" class="p16"><b>لأنه لم يرد في القرآن ولا في الحديث الصحيح</b></p>
</td>
<td valign="middle" class="td268">
  <p dir="rtl" class="p17"><b>لماذا لم يُثبت كاسم؟</b></p>
</td>

<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p14"><b>مناجاة خاشعة باسم الله </b><span class="s8"><b>ٱلدَّيَّانُ</b><b></b></span></p>
<p dir="rtl" class="p1">ٱللَّهُمَّ يَا دَيَّانَ السَّمَاوَاتِ وَالْأَرْضِ… يا من لا يغيب عنك شيء، ولا تُهمِل دَمعة، ولا تَنسى أنينًا في الظلام… إني عبدك الذي ظَلَم، ثم بكى… وظُلِم ثم سكت… وتَألّم ولم يعرف لمن يبوح، فلم يجد سِواك.</p>
<p dir="rtl" class="p1">يا دَيَّانُ… إن نسيني الناس، فلا تتركني، وإن أسقطوا حقي… فأقم ميزانك لي، وإن عجزتُ عن أن أقول "مظلوم" بصوتٍ عالٍ… فاجعل دُموعي هي شكواي إليك.</p>
<p dir="rtl" class="p1">يا دَيَّانُ… إن حاسبتني فبعدلك، وإن غفرتَ لي فبرحمتك وفضلك، وإن انتقمت لي، فاجعل قهرك هداية… وإن رفعتَني، فاجعل رفعتي بين يديك لا بين يدي الناس.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p1">يا دَيَّانُ… لا أُريد أن أقف أمامك وأنا غافل، ولا أن يُنادى باسمي في عرصات الحساب… وأنا لم أُطهّر قلبي بعد من كِبري، وغفلتي، وظلمي لنفسي.</p>
<p dir="rtl" class="p1">ٱللَّهُمَّ يَا دَيَّانَ… اجعلني أستحيي من صحيفتي قبل أن أراها،<br>
واجعلني أُصلح سري قبل أن يُكشف، واجعل قلبي يهتزّ كلما همَّ بظلم أو رياء… لأنك أنت الذي لا تغفل، ولا تُؤخِّر إلَّا لحكمة، ولا تُمهل إلَّا لتمام العدل.</p>
<p dir="rtl" class="p1">ٱللَّهُمَّ يَا دَيَّانُ… ٱجْعَلْنِي أَخْشَاكَ فِي ٱلْخَلْوَاتِ كَمَا أَخْشَاكَ فِي ٱلْجَلَوَات، وَأَرِنِي حَقِيقَةَ مَنْ أَنَا… قَبْلَ أَنْ تَكْشِفَهَا لِي فِي صَحِيفَتِي، وَلَا تَجْعَلْنِي أَظْهَرُ فِي ٱلنَّاسِ شَيْئًا… وَأَقِفُ بَيْنَ يَدَيْكَ شَيْئًا آخَر.</p>
<p dir="rtl" class="p19"><br></p>
<p dir="rtl" class="p24"><b>عناوين التأملية لاسم الله </b><span class="s8"><b>ٱلدَّيَّانُ</b></span><b>، مع دلالات موجزة لكل عنوان:</b></p>
<p dir="rtl" class="p36">ٱلدَّيَّانُ... الذي لا يَظلمُ أحدًا:</p>
<p dir="rtl" class="p1"><b>الدلالة:</b> لأنه الأعلم بالسرائر، والأعدل في الميزان، لا يُضيع مثقال ذرّة، ولا يُحاسب إلَّا بعد البيان.</p>
<p dir="rtl" class="p36">ٱلدَّيَّانُ... صاحبُ الحسابِ الذي لا يُخطئ:</p>
<p dir="rtl" class="p1"><b>الدلالة:</b> لا تُخفى عليه خافية، ولا تغيب عنه دمعة مظلوم، ولا تنهيدة تائب.</p>
<p dir="rtl" class="p36">ٱلدَّيَّانُ... الذي يؤجّلُ ويُمكّنُ ثم يُقيمُ العدل:</p>
<p dir="rtl" class="p1"><b>الدلالة:</b> يمهل العباد، ويستر الزلل، لكنه لا ينسى... فيُمهل ولا يُهمِل.</p>
<p dir="rtl" class="p36">ٱلدَّيَّانُ... الذي يُنصفُ المظلوم، ويقتصّ من الظالم:</p>
<p dir="rtl" class="p1"><b>الدلالة:</b> قد تُؤجَّل حقوق الدنيا، لكنها لا تسقط عند الديّان، بل تُردّ مضاعفة يوم الفصل.</p>
<p dir="rtl" class="p36">ٱلدَّيَّانُ... الذي لا تُنكرُ عندهُ الأنفاس:</p>
<p dir="rtl" class="p1"><b>الدلالة:</b> كل سرّ مكتوم، وكل خاطر دفين، سيُعرض أمامه وكأنَّك تراه مكتوبًا في صحيفة قلبك.</p>
<p dir="rtl" class="p36">ٱلدَّيَّانُ... الذي يُعطي كلّ ذي حقٍّ حقّه:</p>
<p dir="rtl" class="p1"><b>الدلالة:</b> لا تنسَ معروفًا قدّمته سرًّا… فٱلدَّيَّانُ يراه، وسيُثيبك عليه ولو نسيتَه أنت.</p>
<p dir="rtl" class="p36">ٱلدَّيَّانُ... لا تُرهبهُ المظاهر ولا تخدَعه الأقوال:</p>
<p dir="rtl" class="p1"><b>الدلالة:</b> الناس قد يخدعونك بمظهرهم… أما ٱلدَّيَّانُ فيزن القلوب، لا الصور.</p>
<p dir="rtl" class="p36">ٱلدَّيَّانُ... إذا حكم، أنصف حتى الشيطان من الإنسان:</p>
<p dir="rtl" class="p1"><b>الدلالة:</b> عدله مطلق، لا يطغى فيه شعور، ولا تميل فيه كفةٌ إلا بالحق، أي: أنَّ الله تعالى <span class="s41">يُنصف الشيطان</span> من الإنسان الذي حمّله المسؤولية كاملة رغم أنه استجاب له باختياره.</p>
<p dir="rtl" class="p36">ٱلدَّيَّانُ... الذي يراكَ إذا ظلمت، ويسمعك إذا ظُلمت:</p>
<p dir="rtl" class="p1"><b>الدلالة:</b> فلا تظلم، وإن قدرت… ولا تجزع، وإن قُهِرت… فإن الديّان لا ينام.</p>
<p dir="rtl" class="p36">ٱلدَّيَّانُ... الذي يُحيي الموتى ليُقيم العدل:</p>
<p dir="rtl" class="p1"><b>الدلالة:</b> حتى مَن أفلت من محكمة الأرض… لن يفلت من وقفة العرض.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p33"><b>حين يتجلّى اسم الله "</b><span class="s8"><b>الدَّيَّان</b></span><b>" في قلبك…</b></p>
<p dir="rtl" class="p61">حين يتجلّى في قلبك اسم "<span class="s8"><b> الدَّيَّان</b></span>"… تُضيء داخلك حقيقةٌ لا تقبل التزوير: أن لا شيء يضيع، لا ظُلم يُنسى، ولا دمع يُهمَل، ولا نِيّة تُخفى، ولا ذنب يُمحى بلا توبة، ولا معروف يُذهَب سُدى.</p>
<p dir="rtl" class="p61"><span class="s8"><b>الدَّيَّان</b></span>… هو مَن لا تَخفى عليه خافية، ولا ينسى حساب عبدٍ، وإن نامت الدنيا كلها.</p>
<p dir="rtl" class="p61">هو الذي يجازي العباد بما فعلوا… لا بما تمنّوا أن يكونوا عليه.</p>
<p dir="rtl" class="p61">"<span class="s8"><b>الدَّيَّان</b></span>"… هو من يُقيم الميزان، ويسأل عن النقير والقطمير، ويُحاسب على الكلمة، والنظرة، واللحظة. </p>
<p dir="rtl" class="p61">ليس في ملكه محسوبيات، ولا في حسابه مجاملة، ولا يُقرّ عين الظالم، ولو كان في الدنيا سُلطانًا مهابًا.</p>
<p dir="rtl" class="p61">حين يتجلّى في قلبك اسم "<span class="s8"><b>الدَّيَّان</b></span>"… تُراجع نفسك ألف مرة قبل أن تظلم، وقبل أن تغتاب، وقبل أن تتعدّى على أحد… لأنك ستقف بين يديه وحدك، وسيُسألك عن كل ما ظننت أن لا أحد رآه.</p>
<p dir="rtl" class="p61">لكن في هذا الاسم أيضًا… سكينة للمظلوم، وعزاءٌ للمنكسر، وأملٌ لكل من جفّت دموعه في الصبر، لأن "<span class="s8"><b>الدَّيَّان</b></span>" لا ينسى، وإن أَخّر… لا يُهمل.</p>
<p dir="rtl" class="p61">يا دَيَّان السماوات والأرض… اجعل ميزاني ثقيلاً بالخيرات، وخفّف عني ما تَعلمه من الزَّلّات، واجعلني ممن يخشون مقامك… قبل أن يقفوا بين يديك.</p>
<p dir="rtl" class="p19"><br></p>
<p dir="rtl" class="p69"><b>المعنى التدبري العميق لاسم الله"</b><span class="s46"> </span><span class="s8"><b>ٱلدَّيَّانُ</b></span><b> "</b></p>
<p dir="rtl" class="p1">إليكم المعنى التدبري العميق جدًا لاسم الله "ٱلدَّيَّان"، بأسلوب يفتح بابًا جديدًا للفهم ويُسقط الاسم على النفس، والوجدان، والبعث، والميزان:</p>
<p dir="rtl" class="p25"><span class="s8"><b>ٱلدَّيَّان</b></span><b>… الذي لا يُفوّت شيئًا… ولا يُفوّت أحدًا:</b></p>
<p dir="rtl" class="p1">"<span class="s8"><b>ٱلدَّيَّان</b></span>" ليس مجرد الحاكم الذي يحكم، هو من يضمن أن لا تموت القضايا، وإن ماتت الأجساد… وأن لا يُدفن الحق، وإن دفنه التاريخ، هو الذي لا تذوب عنده الجريمة بطول الزمان… ولا تُمحى المظالم بفعل النسيان…<br>
ولا تُمزّق الأوراق… ولا تُغلق القضايا بـ "سقوط الدعوى بالتقادم"!، بل كل شيء مسجّل… حتى نبرة الصوت في خصومةٍ قديمة، ونظرة ازدراءٍ في لحظة غضب.</p>
<p dir="rtl" class="p25"><span class="s8"><b>الديّان</b></span><b>… الذي يُعيدك إلى كل مشهد هربت منه:</b></p>
<p dir="rtl" class="p1">"<span class="s8"><b>ٱلدَّيَّان</b></span>" هو الذي يعيد ترتيب الفوضى التي خلفتها ثم هربت… ذلك الطفل الذي صرختَ في وجهه، وذلك الضعيف الذي احتقرتَه، وتلك الحقيقة التي أنكرتها أمام الناس، والمال الذي أكلته باسم الدين أو باسم الحاجة…</p>
<p dir="rtl" class="p1">"<span class="s8"><b>ٱلدَّيَّان</b></span>" يُعيدك لكل تفصيلة كنتَ تظن أنها انتهت.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p25"><span class="s8"><b>الديّان</b></span><b>… عدلُه ليس عقوبة… بل كشف:</b></p>
<p dir="rtl" class="p1">"<span class="s8"><b>ٱلدَّيَّان</b></span>" لا ينتقم غضبًا، بل يكشفك عدلًا، فهو لا يحكم بالعقوبة إلَّا بعد أن يُريك نفسك كما هي.</p>
<p dir="rtl" class="p1">فيكشف:</p>
<p dir="rtl" class="p36">كم كنتَ قادرًا على الكفّ… ومع ذلك ظلمت.</p>
<p dir="rtl" class="p36">وكم كنتَ حرًّا… ومع ذلك كذبت.</p>
<p dir="rtl" class="p36">وكم مرةً ضحك الناس على كلماتك… وكانت تسحق من حولك.</p>
<p dir="rtl" class="p1">في محكمة "<span class="s8">ٱلدَّيَّان</span>"، لا تُقدَّم الأدلة… بل تُبعث الأدلة حية:<span class="s15"> </span><span class="s21">قال تعالى:</span><span class="s15"> ﴿يَوۡمَ تُبۡلَى ٱلسَّرَآئِرُ﴾</span><span class="s13"> </span><span class="s12">الطارق: ٩</span>.</p>
<p dir="rtl" class="p25"><span class="s8"><b>ٱلدَّيَّان</b></span><b>… لا ينظر إلى ما فعلته فقط، بل ينظر إلى ما كان في قلبك حين فعلته:</b></p>
<p dir="rtl" class="p1">قد تُصلي أمام الناس… لكنّه يسألك: هل كنتَ تُصلّي لي حقًّا؟ أم كنتَ تُصلّي لنفسك، لترى صورتك في عيونهم؟..</p>
<p dir="rtl" class="p1">وقد تتصدّق بمال كثير… لكنّه يسألك: هل أردتَ بصَدقتك وجهي؟ أم كنتَ تشتري بها إعجاب الناس، وتنتظر ثناءهم، فبعْتَ قُربي من أجل كلمة مدحٍ منهم؟!.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p25"><span class="s8"><b>الدَّيّان</b></span><b>… لا أحد يهرب من حكمه، ولا أحد يُظلَم في حكمه:</b></p>
<p dir="rtl" class="p1">كل قاضٍ في هذه الدنيا يحتمل الخطأ، إلَّا <span class="s8"><b>الدَّيّان</b></span><b>… </b> فـ حكمه حقيقةٌ لا يُستأنف.</p>
<p dir="rtl" class="p47"><b>لا تزوير..</b></p>
<p dir="rtl" class="p47"><b>لا تلاعب بالمستندات..</b></p>
<p dir="rtl" class="p47"><b>لا شهود زور..</b></p>
<p dir="rtl" class="p47"><b>لا ظلم ولا محاباة ولا نسيان...</b></p>
<p dir="rtl" class="p47"><b>ولا استثناءات باسم القرب…</b></p>
<p dir="rtl" class="p47"><b>ولا محسوبيات...</b></p>
<p dir="rtl" class="p1">حتى الأنبياء يُسألون، وحتى الشهداء يُعرضون، وحتى أنت…!</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p25"><b>اسم "</b><span class="s8"><b>ٱلدَّيَّان</b></span><b>" ليس لترهيب العاصين فقط</b>،<b> بل هو راحة عظيمة لكل مظلوم:</b></p>
<p dir="rtl" class="p1">لأنَّ كل من أفلت في الدنيا… لم يُفلت حقًا، وكل من طُمس اسمه من الأوراق… لم يُطمس من كتاب "<span class="s8"><b>ٱلدَّيَّان</b></span>".</p>
<p dir="rtl" class="p1"><span class="s15">﴿فَأَمَّا مَنۡ أُوتِيَ كِتَٰبَهُۥ بِيَمِينِهِۦ فَيَقُولُ هَآؤُمُ ٱقۡرَءُواْ كِتَٰبِيَهۡ﴾</span><span class="s13"> </span><span class="s12">الحاقة: ١٩</span>، هو لا ينتقم لأجلك فقط… بل يعيد إليك كرامتك التي هدرها الناس، وثقتك التي داسها من أحببت، وسلامك الذي نهبه الخوف.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p25"><b>فحين تقول: "</b><span class="s8"><b>ٱلدَّيَّان</b></span><b>"… لا تقلها كمن ينطق اسمًا:</b></p>
<p dir="rtl" class="p1">بل قُلها كمن:</p>
<p dir="rtl" class="p47">يُعيد ترتيب الحياة بحسب النهاية، لا بحسب ضوضاء الحاضر.</p>
<p dir="rtl" class="p47">يتوقف عن الكذب، لا خوفًا من الناس، بل من العرض بين يديه.</p>
<p dir="rtl" class="p47">يرى وجه من ظلمه يطأطئ الرأس يوم لا يُنطق إلا بالحق.</p>
<p dir="rtl" class="p47">ويشعر أن كل معاملة في الدنيا… تُسجَّل في سجل "<span class="s8"><b>ٱلدَّيَّان</b></span>" ولو نسيها العالم</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p1"><b>المعنى التطبيقي العميق:</b></p>
<p dir="rtl" class="p47">إذا علمت أنَّ الله "<span class="s8"><b>ٱلدَّيَّان</b></span>"، فلن تنام ليلةً وقد جرحت قلبًا...</p>
<p dir="rtl" class="p47">وإذا ظلمت، فلن تبرّر ظلمك بحجج عاطفية، لأنَّ الديّان لا تغيب عنه نيتك.</p>
<p dir="rtl" class="p47">وإذا ظُلِمت، فلن تحتاج أن "تفضح" خصمك، لأنك واثق أن الديّان لا ينسى.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p1"><b>الخلاصة التدبرية:</b></p>
<p dir="rtl" class="p1"> "<span class="s8"><b>ٱلدَّيَّان</b></span>… ليس فقط من يُقيم الحساب… بل من يُقيمك أنت أمام حسابك، بلا رتوش… بلا تزييف… حتى ترى وجهك الحقيقي… قبل أن ترى جزاءك النهائي ."</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p24"><b>التمهيد الوجداني لاسم الله </b><span class="s8"><b>ٱلدَّيَّانُ</b></span><b>:</b></p>
<p dir="rtl" class="p1">إذا رأيتَ ظالـمًا ينامُ قريرَ العين… ومظلومًا يبكي على الوسادة كلّ ليلة… فلا تظنّ أن الله نسي… ولا أنَّ الحساب قد سقط بالتقادم…</p>
<p dir="rtl" class="p1">بل اطمئن… <span class="s8"><b>فـٱلدَّيَّانُ</b></span> يُمهل… لكنه لا يُهمِل، يؤجّلُ الحساب… حتى تكتمل الحجّة، ويمدّ في الأجل… حتى لا يُقال: ظلم.</p>
<p dir="rtl" class="p1"><span class="s8"><b>ٱلدَّيَّانُ</b></span>… هو الذي سَجّل كل شيء قبل أن يُخلق الزمان، وأحصى كل كلمة، وكل خفقة، وكل خيانة، وما كان ليرفع عبدًا دون عدل…<br>
ولا ليذلّ عبدًا بلا ذنب.</p>
<p dir="rtl" class="p1"><span class="s8"><b>ٱلدَّيَّانُ</b></span>… هو الذي يجمع الخلائق ليومٍ لا يُظلَم فيه أحد، تُقام فيه الأجساد من قبورها، لكن الميزان الحقيقي فيه ليس للأجسام… بل للقلوب.</p>
<p dir="rtl" class="p1">هو الاسم الذي تتساوى أمامه الملوك والرعية، وتسقط فيه الأقنعة، وتتكشف السرائر، ولا ينفع فيه مال ولا جاه، إلَّا قلبٌ سليم، وعملٌ خالص، وسجدةٌ لا يعلم بها أحد… إلَّا هو.</p>
<p dir="rtl" class="p1"><span class="s8"><b>ٱلدَّيَّانُ</b></span>… هو الذي يردّ لكلّ إنسان حقّه، ولو كان نفسًا زفرها في الضيق، فلا يغيبُ عنه أنينٌ في صدرك، ولا دمعة في خفاء عينك، ولا لحظة عدل مارستها وأنت قادر على الظلم…</p>
<p dir="rtl" class="p1"><span class="s8"><b>ٱلدَّيَّانُ</b></span>… هو الذي ينصرك دون أن تتكلم، ويأخذ لك حقّك دون أن تُطالب، ويرفعك يوم يُذلّك الناس… فلا تخف من ظُلم أحد، بل خف من ظُلمك لأحد.</p>
<p dir="rtl" class="p1">حين تسمع اسم <span class="s8"><b>ٱلدَّيَّانُ</b></span>… فلا تتخيله قاضيًا يُصدر حكمًا جافًا،<br>
بل تصوّره ربًّا يعلم السرّ وأخفى… يرى ما لم يُقَل، ويزن ما لم يُفعل، ويُجري عدله على نورٍ من رحمته.</p>
<p dir="rtl" class="p1"><span class="s8"><b>ٱلدَّيَّانُ</b></span>… ليس من يزن الأعمال فقط، بل من يزن النيات خلف الأعمال،<br>
يعرف من أطعم جائعًا ليُرضيه، ومن أطعم جائعًا ليُمدَح، ويجعل بينهما في الجزاء كما بين السماء والأرض…</p>
<p dir="rtl" class="p1"><span class="s8"><b>ٱلدَّيَّانُ</b></span>… يُحاسبك على الظلم… حتى لو كان نظرة استخفاف، وعلى العدل… حتى لو كان كلمة طيّبة قلتها لطفلٍ نسيك.</p>
<p dir="rtl" class="p1"><span class="s8"><b>ٱلدَّيَّانُ</b></span>… لا يُبهره مظهر، ولا تُخدعه عبارة، بل ينظر إلى عمق قلبك، وجوهر خُلقك، وخفايا خُطاك.</p>
<p dir="rtl" class="p1">تظن أنَّ دمعتك في لحظة ألمٍ ضاعت؟</p>
<p dir="rtl" class="p1">تظن أن سُجودك وحدك في جوف الليل نُسي؟</p>
<p dir="rtl" class="p1">تظن أن عفوك عن من ظلمك مرّ بلا أثر؟</p>
<p dir="rtl" class="p1">لا… كلّ ذلك عند الدَّيّان محفوظ، موثّق، محسوب…</p>
<p dir="rtl" class="p1">حتى الآهات التي خنقتها في صدرك… لئلا تظلم غيرك بالغضب… تُوزَن عنده… وتُجزى.</p>
<p dir="rtl" class="p1"><span class="s8"><b>ٱلدَّيَّانُ</b></span>… هو الذي إذا قام الناس لربّ العالمين… أظهر ما خفي، وبيّن ما وُئِد، فترى الظالم مُثقّلًا بما حسبه نصرًا، وترى المظلوم مُشرقًا بما ظنّه ضعفًا.</p>
<p dir="rtl" class="p1">تأمّل في قيامك بين يديه… ليس معك إلَّا صحيفة… وهو يعلم كل ما فيها قبل أن تُفتح…</p>
<p dir="rtl" class="p1">فهل أعددتَ للسؤال جوابًا؟ وهل جعلتَ كلَّ عملك لله خالصًا… كي لا تُفاجأ بالوزن؟.</p>
<p dir="rtl" class="p19"><br></p>
<p dir="rtl" class="p24"><b>المعنى اللغوي والشرعي الدقيق والصحيح لاسم الله </b><span class="s8"><b>ٱلدَّيَّانُ</b><b></b></span></p>
<p dir="rtl" class="p25"><b>المعنى اللغوي لاسم الله </b><span class="s8"><b>ٱلدَّيَّانُ</b></span><b>:</b></p>
<p dir="rtl" class="p1">اسم ٱلدَّيَّان مأخوذ من مادة: (د ي ن)، التي تدور حول معنى الحساب، الجزاء، الحكم، والسيادة.</p>
<p dir="rtl" class="p1">يقال: دِنته دِينًا أي: جازيته وحاسبته، ومنه: "كما تَدين تُدان".</p>
<p dir="rtl" class="p1">و"الدَّيَّان" على وزن فَعَّال، وهي صيغة مبالغة تدل على كثرة وشمول ودوام الفعل، أي أنه: كثير الحكم والجزاء والحساب بلا فتور، وعادل فيه بلا ميل.</p>
<p dir="rtl" class="p25"><b>المعنى الشرعي لاسم الله </b><span class="s8"><b>ٱلدَّيَّانُ</b></span><b>:</b></p>
<p dir="rtl" class="p1"><span class="s8"><b>ٱلدَّيَّانُ</b></span> هو: الذي يحكم بين عباده يوم القيامة بالعدل التام، ويجازي كل نفس بما كسبت، لا يُنقص أحدًا من حقه، ولا يَظلم مثقال ذرّة.</p>
<p dir="rtl" class="p1">وهو الذي: </p>
<p dir="rtl" class="p47">يُقيم الحُجّة على خلقه.</p>
<p dir="rtl" class="p47">ويعرف خفايا النيات وبواطن الأعمال.</p>
<p dir="rtl" class="p47">ويُصدر الحُكم النهائي الذي لا ردّ له، ولا نقض بعده.</p>
<p dir="rtl" class="p1">وإليكم الآن الفروقات الدقيقة بين اسم الله "<span class="s8"><b>ٱلدَّيَّانُ</b></span>" وبعض الأسماء الأخرى القريبة منه في المعنى، بأسلوب مقارن يبيّن الوظائف، والمجالات، ودلالات كل اسم:</p>
<p dir="rtl" class="p52"><span class="s9"><b>مقارنة بين "</b></span><b>ٱلدَّيَّانُ</b><span class="s9"><b>" و"</b></span><b>ٱلْحَكَمُ</b><span class="s9"><b>"</b></span></p>

<p dir="rtl" class="p1">كل ديّان لا بد أن يكون حكمًا، لكن ليس كل حكمٍ ديّانًا، لأن الحكم لا يشترط فيه الجزاء الكامل كما عند الدَّيَّان.</p>
<p dir="rtl" class="p13"><br></p>

</td>
<td valign="middle" class="td287">

</td>

<p dir="rtl" class="p13"><br></p>

<p dir="rtl" class="p1"><span class="s8"><b>الدَّيّان</b></span> يُفصّل، <span class="s8"><b>والمالِك</b></span> يُهيمن، وكلاهما يُظهر أنَّ ذلك اليوم ليس فيه ظُلم، ولا مجال للاعتراض.</p>
<p dir="rtl" class="p13"><br></p>

<p dir="rtl" class="p1">الله تعالى لا يكون ديانًا عادلًا إلَّا لأنه أولًا: خبير بكل شيء… فالديّان هو امتداد الخبير في ميزان العدل.</p>

<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p24"><b>الأدلة التفصيلية التي ورد فيها اسم الله "</b><span class="s8"><b>ٱلدَّيَّانُ</b></span><b>"، من القرآن الكريم والسُّنَّة النبوية الصحيحة:</b></p>
<p dir="rtl" class="p25"><b>أولًا: ورود اسم الله "</b><span class="s8"><b>ٱلدَّيَّانُ</b></span><b>" في القرآن</b></p>
<p dir="rtl" class="p1">اسم ٱلدَّيَّانُ لم يرد بلفظه الصريح ضمن أسماء الله الحسنى في نصوص القرآن،<br>
لكن معناه ورد مرارًا في سياقات متعددة تحت مفاهيم: يَوْمِ الدِّيْن: أي الحساب والجزاء، كما في قوله تعالى:<span class="s15"> </span><span class="s30">﴿مَٰلِكِ يَوۡمِ ٱلدِّينِ﴾</span><span class="s47"> </span><span class="s12">الفاتحة: ٤</span>،" يَوْمِ الدِّيْن " أي يوم الجزاء والحساب الكامل، ومن هنا جاء اشتقاق اسم الله <span class="s8"><b>ٱلدَّيَّانُ</b></span>، أي: الذي يُحاسب ويُجازي بدقّة مطلقة.</p>
<p dir="rtl" class="p1">وهنالك آيات أخرى، مثل:</p>
<p dir="rtl" class="p47"><span class="s15">﴿وَوُضِعَ ٱلۡكِتَٰبُ فَتَرَى ٱلۡمُجۡرِمِينَ مُشۡفِقِينَ مِمَّا فِيهِ وَيَقُولُونَ يَٰوَيۡلَتَنَا مَالِ هَٰذَا ٱلۡكِتَٰبِ لَا يُغَادِرُ صَغِيرَةٗ وَلَا كَبِيرَةً إِلَّآ أَحۡصَىٰهَاۚ وَوَجَدُواْ مَا عَمِلُواْ حَاضِرٗاۗ وَلَا يَظۡلِمُ رَبُّكَ أَحَدٗا﴾ ﴿وَوُضِعَ ٱلۡكِتَٰبُ فَتَرَى ٱلۡمُجۡرِمِينَ مُشۡفِقِينَ مِمَّا فِيهِ وَيَقُولُونَ يَٰوَيۡلَتَنَا مَالِ هَٰذَا ٱلۡكِتَٰبِ لَا يُغَادِرُ صَغِيرَةٗ وَلَا كَبِيرَةً إِلَّآ أَحۡصَىٰهَاۚ وَوَجَدُواْ مَا عَمِلُواْ حَاضِرٗاۗ وَلَا يَظۡلِمُ رَبُّكَ أَحَدٗا﴾</span><span class="s13"> </span><span class="s12">الكهف: ٤٩</span>، هذه الآية تُمثل مشهدًا من يوم الدِّين الذي يُمارس فيه الله صفة الديّان: الإنصاف المطلق، وكشف كل ما في الصحائف، ومنع الظلم ولو ذرة.</p>
<p dir="rtl" class="p47"><span class="s15">﴿إِنَّ رَبَّكَ يَقۡضِي بَيۡنَهُم بِحُكۡمِهِۦۚ وَهُوَ ٱلۡعَزِيزُ ٱلۡعَلِيمُ﴾</span><span class="s13"> </span><span class="s12">النمل: ٧٨</span>، القضاء بين الخلائق بالحكم والعدل… هو معنى من معاني "الديّان" الذي لا يُحابي، ولا يُخطئ، ولا يُؤخر.</p>
<p dir="rtl" class="p47"><span class="s15">﴿أَوَلَمۡ يَرَوۡاْ أَنَّا نَأۡتِي ٱلۡأَرۡضَ نَنقُصُهَا مِنۡ أَطۡرَافِهَاۚ وَٱللَّهُ يَحۡكُمُ لَا مُعَقِّبَ لِحُكۡمِهِۦۚ وَهُوَ سَرِيعُ ٱلۡحِسَابِ﴾</span><span class="s13"> </span><span class="s12">الرعد: ٤١</span>، الحكم وحده لله، ولا يُنقض، وهو الحساب السريع العادل… وهذا لبّ اسم ٱلدَّيَّان.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p25"><b>ثانيًا: ورود اسم الله "</b><span class="s8"><b>ٱلدَّيَّانُ</b></span><b>" في السنة النبوية</b></p>
<p dir="rtl" class="p1">ورد اسم "<span class="s8"><b>ٱلدَّيَّانُ</b></span>" نصًّا صريحًا في حديثٍ صحيح، رواه جمع من أهل السنن والمسانيد: الحديث: عن عبد الله بن أُنَيْس رضي الله عنه قال: سمعتُ النبيَّ ﷺ يقول:</p>
<p dir="rtl" class="p1">"يُحشَرُ العبادُ يومَ القيامةِ، أو قال: الناسُ، عُراةً بُهْمًا، قال: ثم يُناديهم صوتٌ بصوتٍ يسمعه مَن قرُبَ، كما يسمعه من بَعُدَ: أنا الملِكُ، أنا الدَّيَّانُ، لا ينبغي لأحدٍ من أهلِ النارِ أن يدخلَ النارَ وله عند أحدٍ من أهلِ الجنةِ مظلمةٌ حتى أقُصَّهُ منها" رواه: الإمام أحمد (العدد: 17791)، وابن ماجه (رقم: 2413)<br>
وصحّحه الألباني في "صحيح ابن ماجه".</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p1"><b><br>
ألفاظ مهمة في الحديث:</b></p>
<p dir="rtl" class="p1">"أنا الملك، أنا الدَّيَّان": نصّ صريح في تسمية الله تعالى بهذا الاسم الجليل.</p>
<p dir="rtl" class="p1">"حتى أقصّه منها": فيه إثبات القصاص العادل الكامل يوم القيامة حتى بين المؤمنين.</p>
<p dir="rtl" class="p1">وهذا يدل على أنَّ الله ليس فقط ديّانًا في محاسبة الكفار والمجرمين، بل حتى في تفصيل الحقوق بين أوليائه.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p1"><b>لماذا لم يُذكر اسم "</b><span class="s8"><b>ٱلدَّيَّان</b></span><b>" في القرآن نصًّا؟</b></p>
<p dir="rtl" class="p17">لأن أسماء الله ليست كلّها وردت في القرآن، فمنها ما ورد في السنة الصحيحة فقط، مثل:</p>

</td>

</td>
</tr>

</td>
