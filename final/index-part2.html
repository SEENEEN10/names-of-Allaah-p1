<p dir="rtl" class="p1"><b>الخاتمة التأملية:</b></p>
<p dir="rtl" class="p1">اسم "<span class="s8"><b>ٱللَّهُ</b></span>" هو الاسم الذي يملأ قلبك، وإن لم تعرف اللغة.</p>
<p dir="rtl" class="p1">واسم "<span class="s8"><b>ٱلْإِلَٰهُ</b></span>" هو الذي يُطهّر قلبك من كل ما سواه.</p>
<p dir="rtl" class="p1">ومن قال:"<span class="s8"><b>لا إله إلَّا الله</b></span>" بصدق… فقد عرف الاثنين معًا: الاسم، والحق… الذات، والمقام.</p>
<p dir="rtl" class="p19"><br></p>
<p dir="rtl" class="p24"><b>أثر اسم "</b><span class="s8"><b>ٱللَّهُ</b></span><b> – </b><span class="s8"><b>ٱلْإِلَٰهُ</b></span><b>" في العبد</b></p>
<p dir="rtl" class="p1">ولأنَّ أثر الأسماء الحسنى ليس علماً يُحفَظ، بل حياة تُعاش، وسلوك يُبنى، وهمّة تُستمدّ.</p>
<p dir="rtl" class="p1">واسم "<span class="s8"><b>ٱللَّهُ</b></span> – <span class="s8"><b>ٱلْإِلَٰهُ</b></span>" هو أصل الأثر، لأنَّه الاسم الذي يبني التوحيد العملي، ويعيد ترتيب القلب، والنية، والحركة، والمقصد.</p>
<p dir="rtl" class="p1">فدعني أقدّم لك الآن، بتفصيل دقيق وتأملي راقٍ، كيف يُعيد هذا الاسم الجليل تشكيل سلوك العبد، وهمّته، ونظرته لنفسه، إن هو آمن به كما ينبغي.</p>
<p dir="rtl" class="p25"><b>أولًا: كيف يُؤثر اسم "</b><span class="s8"><b>ٱللَّهُ</b></span><b> – </b><span class="s8"><b>ٱلْإِلَٰهُ</b></span><b>" في سلوك العبد؟</b></p>
<p dir="rtl" class="p36">يحرّره من عبودية الخلق: إذا أدرك أن "<span class="s8"><b>ٱللَّهُ</b></span>" وحده هو الإله الحقّ، لن يذلّ نفسه لأحد، ولن يُراوغ ليرضي أحدًا، ولن يُنفق عمره لطلب رضا الناس، لأنَّه عرف أن رضا "<span class="s8"><b>ٱلْإِلَٰه</b></span>" يكفيه، وأن سجدة في جوف الليل أعزّ من ألف تصفيق.</p>
<p dir="rtl" class="p37"><b>النتيجة:</b> يصبح العبد عزيزًا بعزة التوحيد، لا يُباع ولا يُشترى.</p>
<p dir="rtl" class="p36">ينظّم سلوك العبد في كل لحظة: حين يؤمن أن "<span class="s8"><b>ٱللَّهُ</b></span>" هو الـمُطّلع، الرقيب، المعبود… يستحي أن يعصيه، ولو خفيًا، ويخشاه في سره قبل علانيته، ويُراقب نواياه قبل أفعاله.</p>
<p dir="rtl" class="p37"><b>النتيجة:</b> يتحوّل السلوك من أداءٍ شكلي، إلى حركةٍ صادقة لله وحده.</p>
<p dir="rtl" class="p36">يدفعه إلى الصدق والإخلاص: اسم "<span class="s8"><b>ٱلْإِلَٰهُ</b></span>" يذكّره أنَّ كل عبادة، وكل دعاء، وكل عمل… لا يُقبل إلَّا إذا كان لله خالصًا، قال تعالى:<span class="s15"> ﴿وَمَآ أُمِرُوٓاْ إِلَّا لِيَعۡبُدُواْ ٱللَّهَ مُخۡلِصِينَ لَهُ ٱلدِّينَ حُنَفَآءَ وَيُقِيمُواْ ٱلصَّلَوٰةَ وَيُؤۡتُواْ ٱلزَّكَوٰةَۚ وَذَٰلِكَ دِينُ ٱلۡقَيِّمَةِ﴾</span><span class="s13"> </span><span class="s12">البينة: ٥</span>.</p>
<p dir="rtl" class="p37"><b>النتيجة:</b> يزول الرياء، وتختفي "الأنا"، ويبقى وجه الله وحده هو المقصود.</p>
<p dir="rtl" class="p25"><b>ثانيًا: كيف يؤثر في هِمّته؟</b></p>
<p dir="rtl" class="p36">يجعل هدفه الأسمى هو الله… لا الإنجاز: حين يوقن أن "<span class="s8"><b>ٱللَّهَ</b></span>" هو الغاية،<br>
لن يقف عند الشهرة، أو الإنتاج، أو الحضور… بل يسعى ليُرضي "<span class="s8"><b>ٱلْإِلَٰهَ</b></span>" وحده، حتى وإن لم يرَ ثمرة عمله في الدنيا.</p>
<p dir="rtl" class="p37"><b>النتيجة:</b> تتعلّق همّته بـ "وجه الله"، لا بـ "وجوه الناس".</p>
<p dir="rtl" class="p36">العبد إذا تعرّف على "<span class="s8"><b>ٱللَّهِ</b></span>" – الإله العظيم الذي لا يعجزه شيء –تحرّرت همّته من المستحيلات، وصار يسعى لأعلى الأهداف، لأنه يعلم أن من كان "<span class="s8"><b>ٱللَّهُ</b></span>" معه… فلا قيد، ولا حد، ولا حائل.</p>
<p dir="rtl" class="p37"><b>النتيجة:</b> لا يعمل ليبلغ قدره… بل ليُرضي من لا يُحدّ قدره.</p>
<p dir="rtl" class="p36">يصبح "عبده" لا "عبد الإنجاز": الهمّة تتطهّر من التعجّل، ومن البحث عن النتائج… ويصير شعاره:"أنا عبد، عليّ أن أعمل، والله يتولّى الثمار."</p>
<p dir="rtl" class="p25"><b>ثالثًا: كيف يُغيّر نظرته إلى نفسه؟</b></p>
<p dir="rtl" class="p36">يُعرّفه قدره الحقيقي: حين يعرف العبد "<span class="s8"><b>ٱلْإِلَٰهَ</b></span>" الحقّ، يعرف أنه عبدٌ فقير، لا يملك لنفسه ضرًّا ولا نفعًا، وأنَّ كل ما فيه من خير، أو نور، أو عطاء… فهو من الله، لا من ذاته، قال تعالى: <span class="s15">﴿۞ يَٰٓأَيُّهَا ٱلنَّاسُ أَنتُمُ ٱلۡفُقَرَآءُ إِلَى ٱللَّهِۖ وَٱللَّهُ هُوَ ٱلۡغَنِيُّ ٱلۡحَمِيدُ﴾</span><span class="s13"> </span><span class="s12">فاطر: ١٥</span>.</p>
<p dir="rtl" class="p37"><b>النتيجة:</b> يزول منه الغرور والعُجب، ويولد فيه الحياء والتواضع والخشية.</p>
<p dir="rtl" class="p36">يبني هويته على العلاقة مع الله لا مع الناس: لا يُعرّف نفسه بأنه مؤثر، أو مفكّر، أو عالم، أو صانع محتوى… بل يعرف نفسه بأنه: "عبدٌ لله… يسعى إليه، ويحبه، ويخافه، وينتظر قربه."</p>
<p dir="rtl" class="p37"><b>النتيجة:</b> تتغيّر نظرته لذاته، من "أنا مَن أنا" إلى: "أنا مَن أحبني الله، وسترني، وهداني… فالحمد له وحده."</p>
<p dir="rtl" class="p36">يُحيي فيه روح العبودية الصافية: وهي العبودية التي لا تبحث عن المكافآت، ولا التقدير، بل تبحث عن النظر من الله، والرضا من الله، والقرب من الله.</p>
<p dir="rtl" class="p1"><b>الخلاصة التأملية الجامعة:</b></p>
<p dir="rtl" class="p1">إذا دخل اسم "<span class="s8"><b>ٱللَّهُ</b></span> – <span class="s8"><b>ٱلْإِلَٰهُ</b></span>" قلبك كما يجب… تغيّر سلوكك، لأنك صرت عبدًا له وحده، وارتفعت همّتك، لأنَّك تعمل لأجله هو، لا لنفسك، وتطهّرت نظرتك لنفسك، لأنَّك عرفت أنك لا شيء بدونه، وكل شيء بفضله.</p>
<p dir="rtl" class="p19"><br></p>
<p dir="rtl" class="p24"><b>مشهد من السيرة النبوية يجسد</b><span class="s9"> </span><b>"</b><span class="s8"><b>ٱللَّهُ</b></span><b> – </b><span class="s8"><b>ٱلْإِلَٰهُ</b></span><b>"</b><b></b></p>
<p dir="rtl" class="p1">في غزوة أحد، عندما سقط النبي ﷺ في المعركة، واعتقد البعض أن الرسول قد قُتل، أصيب الصحابة بهزة كبيرة، وكان هذا الاختبار الأعظم لمؤمني الأمة، في تلك اللحظات العصيبة، كان النبي ﷺ قد سقط جريحًا، ولكن إيمان الصحابة كان متعلقًا بالله، ٱللَّهُ الذي يملك كل شيء.</p>
<p dir="rtl" class="p1">في تلك اللحظات، شعر الصحابة بأنهم أمام إله واحد، وأن النصر والهزيمة بيده وحده، وكان المؤمنون يرفعون أيديهم إلى السماء في دعاء خاشع، فكل شيء كان يتوقف على إرادة ٱللَّهُ، وعندما نهض النبي ﷺ، مستعيدًا قوته وعزيمته، قال للصحابة:"لن يُدْرِكَكم الفزع، فأنتم على الحق" هذا التصريح كان تجسيدًا لِما يمثل "الله – إله" الأرض والسماء- في قلوبهم، لأنهم اعتمدوا على الله وثقوا بأنه لا يُقدّر النصر والهزيمة إلا هو.</p>
<p dir="rtl" class="p1"><span class="s8"><b>ٱلْإِلَٰهُ</b></span> في تلك اللحظات هو الذي أعاد للصحابة يقينهم بالله، رغم الهزيمة الظاهرة، وأخذهم إلى حالة من الثبات الروحي والتوكل على الله في كل المحن.</p>
<p dir="rtl" class="p1">فقد أدركوا أنَّ الله هو الذي يقدر المصير وهو الذي يقرر ما هو الأفضل لعباده، مهما كانت المحن.</p>
<p dir="rtl" class="p1">بعد هذه الواقعة، تجدد إيمان الصحابة، وزادت عزيمتهم، وكان النبي ﷺ يشير إلى أن النصر والهزيمة ليسا مرهونيين بالظروف المادية، بل هي إرادة الله و تقديره المطلق.</p>
<p dir="rtl" class="p1">من هذا الموقف، نُدرك أن <span class="s8"><b>ٱللَّهُ</b></span> و <span class="s8"><b>ٱلْإِلَٰهُ</b></span> ليسا مجرد أسمين، بل هما حقيقة قلبية وروحية في حياة المسلم، حيث يتحقق التوكل على الله والإيمان المطلق بأنَّ الله هو الذي يدير كل شيء، في كل محنة، وفي كل اختبار، يتجلى اسم الله "<span class="s8"><b>ٱللَّهُ</b></span>" في حكمته و إرادته، بينما اسم "<span class="s8"><b>ٱلْإِلَٰهُ</b></span>" يوضح أن إيماننا به وتوكلنا عليه هو أساس نجاحنا وثباتنا في كل لحظة من حياتنا.</p>
<p dir="rtl" class="p1"><b>الدرس المستفاد:</b> في هذه اللحظات العصيبة، تجسد <span class="s8"><b>ٱللَّهُ</b></span> و <span class="s8"><b>ٱلْإِلَٰهُ</b></span> في قلوب الصحابة، حيث كانت الثقة بالله هي المبدأ الراسخ في مواجهة التحديات والمصاعب، فهم أدركوا أنَّ الله هو المدبر الوحيد للأمور، وأنه لا يمكن لأي مخلوق أن يقف أمام إرادته.</p>
<p dir="rtl" class="p19"><br></p>
<p dir="rtl" class="p24"><b>مجموعة منتقاة من الأدعية الخاصة باسم "</b><span class="s8"><b>ٱللَّهُ</b></span><b> – </b><span class="s8"><b>ٱلْإِلَٰهُ</b></span><b>":</b></p>
<p dir="rtl" class="p25"><b>أدعية مأثورة باسم "</b><span class="s8"><b>ٱللَّهُ</b></span><b> – </b><span class="s8"><b>ٱلْإِلَٰهُ</b></span><b>"</b></p>
<p dir="rtl" class="p36"><b>من القرآن الكريم:</b> <span class="s15">﴿وَذَا ٱلنُّونِ إِذ ذَّهَبَ مُغَٰضِبٗا فَظَنَّ أَن لَّن نَّقۡدِرَ عَلَيۡهِ فَنَادَىٰ فِي ٱلظُّلُمَٰتِ أَن لَّآ إِلَٰهَ إِلَّآ أَنتَ سُبۡحَٰنَكَ إِنِّي كُنتُ مِنَ ٱلظَّٰلِمِينَ﴾</span><span class="s13"> </span><span class="s12">الأنبياء: ٨٧</span>) <span class="s44">←</span> دعاء يونس، وهو من أنجح أدعية تفريج الكرب، نحن الآن أمام دعاء عظيم ليس مجرد كلمات، بل نداءٌ خرج من جوف الحوت، فصعد إلى عرش الرحمن، دعاء جمع التوحيد، والتسبيح، والاعتراف، والافتقار، والانكسار، فأجاب الله به، وأنقذ، ونجّى، وقال بعده: <span class="s15">﴿فَٱسۡتَجَبۡنَا لَهُۥ وَنَجَّيۡنَٰهُ مِنَ ٱلۡغَمِّۚ وَكَذَٰلِكَ نُـۨجِي ٱلۡمُؤۡمِنِينَ﴾</span><span class="s13"> </span><span class="s12">الأنبياء: ٨٨</span>، دعونا نتأمل هذا الدعاء الآن، في رسائل وجدانية تأملية عميقة تمسّ القلب، وتحمل النفس على جناح التوحيد.</p>
<p dir="rtl" class="p70"><b>الرسالة الأولى: التوحيد أول النجاة</b></p>
<p dir="rtl" class="p1">"لَآ إِلَٰهَ إِلَّآ أَنتَ" لم يقل: يا رب أنقذني، أو خلّصني، أو افتح لي… بل بدأ بتجديد توحيده، وكأنَّ أعظم النجاة تبدأ من تصحيح العقيدة داخل القلب.</p>
<p dir="rtl" class="p1">حين تغرق، لا تبدأ بطلب المخرج… ابدأ بإعادة ترتيب مركز قلبك: من تَعبد؟ من تُعظّم؟ من تفرّ إليه؟..</p>
<p dir="rtl" class="p70"><b>الرسالة الثانية: التنزيه يُطهّر القلب</b></p>
<p dir="rtl" class="p1">"سُبْحَٰنَكَ" أي: أنزّهك عن كل نقص، وعن كل ما نُسب إليك ظلمًا، أو جهلًا، أو اعتراضًا.</p>
<p dir="rtl" class="p1">في لحظة الألم… قد تشتكي، قد تعترض، قد تضعف… لكن يونس عليه السلام لم يفعل… بل نزّه الله، وهو في بطن الظلمة.</p>
<p dir="rtl" class="p1">ما أعظم عبدًا يُسبّح في الظلمات… وما أكرم ربًا يسمعه من أعماق البحار.</p>
<p dir="rtl" class="p70"><b>الرسالة الثالثة: الاعتراف أول باب للغفران</b></p>
<p dir="rtl" class="p1">"إِنِّي كُنتُ مِنَ ٱلظَّٰلِمِينَ" ما أروع هذا الأسلوب: لم يُلقِ اللوم على الناس، ولا على الظروف، ولا على الشيطان… بل قال:"كُنتُ أنا الظالم… أنا أخطأت…" ومع هذا… لم يُقنط نفسه من المغفرة.</p>
<p dir="rtl" class="p1">ما أجمل أن تعترف لله، لا بانكسار يائس… بل بانكسارِ عائدٍ لا يزال يرجو.</p>
<p dir="rtl" class="p70"><b>الرسالة الرابعة: ليس للدعاء طول… بل صدق</b></p>
<p dir="rtl" class="p1">هذا الدعاء لم يكن طويلًا… لم يكن مزخرفًا… كان سهمًا واحدًا… خرج من قلبٍ مضغوط بالحزن، فأصاب باب السماء.</p>
<p dir="rtl" class="p1">إذا ضاقت بك الكلمات… فقلها كما قالها يونس: "لَآ إِلَٰهَ إِلَّآ أَنتَ سُبْحَٰنَكَ إِنِّي كُنتُ مِنَ ٱلظَّٰلِمِينَ" وستفهم أنَّ الصدق لا يحتاج طقوسًا… بل خضوعًا.</p>
<p dir="rtl" class="p70"><b>الرسالة الخامسة: دعوة عُبِد بها الله، لا فقط لطلب الخلاص</b></p>
<p dir="rtl" class="p1">دعاء يونس عليه السلام لم يكن فقط وسيلة نجاة… بل عبادة خالصة، ولهذا خُلِّد في كتاب الله، وجُعل سُنّة للمؤمنين من بعده:</p>
<p dir="rtl" class="p34">﴿وَذَا ٱلنُّونِ إِذ ذَّهَبَ مُغَٰضِبٗا فَظَنَّ أَن لَّن نَّقۡدِرَ عَلَيۡهِ فَنَادَىٰ فِي ٱلظُّلُمَٰتِ أَن لَّآ إِلَٰهَ إِلَّآ أَنتَ سُبۡحَٰنَكَ إِنِّي كُنتُ مِنَ ٱلظَّٰلِمِينَ فَٱسۡتَجَبۡنَا لَهُۥ وَنَجَّيۡنَٰهُ مِنَ ٱلۡغَمِّۚ وَكَذَٰلِكَ نُـۨجِي ٱلۡمُؤۡمِنِينَ﴾<span class="s13"> </span><span class="s14">الأنبياء: ٨٧ – ٨٨</span><span class="s1">.</span></p>
<p dir="rtl" class="p1">﴿ <span class="s15">ﮦ ﮧ </span>﴾ وسُجِّلت بعدها الوعد للمؤمنين: ﴿ <span class="s15">ﮬ ﮭ ﮮ  </span>﴾ أي: هذه ليست قصة… إنها سُنّة إلهية باقية.</p>
<p dir="rtl" class="p1"><b>خاتمة وجدانية:</b></p>
<p dir="rtl" class="p1">هذا الدعاء هو بوابة التوبة، وبوابة الخلاص، وبوابة التوحيد، وبوابة الطمأنينة.</p>
<p dir="rtl" class="p1">فيه:</p>
<p dir="rtl" class="p1">"<span class="s8"><b>لَآ إِلَٰهَ إِلَّآ أَنتَ</b></span>": تهدم بها كل صنم داخلي.</p>
<p dir="rtl" class="p1">"<span class="s8"><b>سُبْحَٰنَكَ</b></span>": تُنقي بها ظنّك بربّك.</p>
<p dir="rtl" class="p46"><span class="s9">"</span><b>إِنِّي كُنتُ مِنَ ٱلظَّٰلِمِينَ</b><span class="s9">": تفتح بها باب العودة.</span></p>
<p dir="rtl" class="p1">فإذا اجتمعت هذه الثلاثة… دخلت في زمرة الذين يُنادى عليهم من السماء: ﴿ <span class="s15">ﮨ  ﮩ  ﮪ</span><span class="s20">ﮫ</span><span class="s15"> ﮬ ﮭ ﮮ</span> ﴾.</p>
<p dir="rtl" class="p36"><b>من السنّة النبوية الصحيحة:</b></p>
<p dir="rtl" class="p25">"اللَّهُمَّ إِنِّي أَسْأَلُكَ بِأَنَّكَ أَنْتَ ٱللَّهُ، لَا إِلَٰهَ إِلَّا أَنْتَ، ٱلْأَحَدُ ٱلصَّمَدُ، ٱلَّذِي لَمْ يَلِدْ وَلَمْ يُولَدْ، وَلَمْ يَكُن لَّهُ كُفُوًا أَحَدٌ" رواه أبو داود، وقال النبي ﷺ: "لقد سألتَ الله باسمه الأعظم الذي إذا دُعي به أجاب."</p>
<p dir="rtl" class="p1">هذا الدعاء ليس مجرد رجاء… بل هو أعظم صيغة عرفها الدعاء، وأبلغ ما وُصف به "<span class="s8"><b>ٱللَّهُ</b></span> – <span class="s8"><b>ٱلْإِلَٰهُ</b></span>" في مقام التوسّل، وهو الدعاء الذي قال عنه النبي ﷺ:</p>
<p dir="rtl" class="p1">"لقد سألتَ اللهَ باسمه الأعظم الذي إذا دُعي به أجاب، وإذا سُئل به أعطى" رواه أبو داود، وصححه ابن حبان والحاكم وغيرهم.</p>
<p dir="rtl" class="p1">دعوني أقدّم لكم الآن رسالة تأملية عظيمة مهيبة حول هذا الدعاء الشريف، تليق بمقامه:</p>
<p dir="rtl" class="p1">"اللَّهُمَّ إِنِّي أَسْأَلُكَ بِأَنَّكَ أَنْتَ ٱللَّهُ…" ليست مجرد مقدّمة، بل هذه الجملة وحدها تربطك بذات الله العليّ، الاسم الجامع، الذي تنحلّ عنده كل الشكوك،<br>
وتخرس عنده كل الأصوات، وتخشع له الأرواح.</p>
<p dir="rtl" class="p1">"ٱللَّهُ"… أي: يا من لا ألتجئ إلَّا إليه، ولا يُقصد غيره، ولا يُدعى سواه، ولا يُرجى أحدٌ إلَّا من خلاله.</p>
<p dir="rtl" class="p1">"لَا إِلَٰهَ إِلَّا أَنْتَ…" تُغلق كل الأبواب في وجه التعلق بغير الله، وتنفي كل وجهة إلَّا وجهته، وكل طمع إلَّا فيه، وكل أمل إلَّا منه.</p>
<p dir="rtl" class="p1">هنا يُسقط العبد كل الأصنام التي احتلّت قلبه: من الناس، من الخوف، من الشهرة، من الطموح، ويعترف أن لا شيء يستحق "العبودية"… إلا "<span class="s8"><b>ٱللَّهُ</b></span>" وحده.</p>
<p dir="rtl" class="p1">"ٱلْأَحَدُ…" ليس كمثله أحد، ولا في كماله شبيه، ولا في ذاته ندّ، فأنت لا تسأل إلهًا بين آلهة، ولا قويًّا بين أقوياء… بل تسأل الأحد… الذي كلّ ما عداه زوج، متغيّر، ناقص… وهو وحده لا يتجزأ، لا يتعدد، لا يُشبِه.</p>
<p dir="rtl" class="p1">"ٱلصَّمَدُ…" الذي تقصده القلوب كلها، وتفتقر إليه الخليقة كلها، ويغني ولا يُغنَى عنه، ويُستغاث به ولا يستغيث، ويُطلب منه ولا يطلب من أحد.</p>
<p dir="rtl" class="p1">الصمد… هو الذي تلجأ إليه حين ينقطع بك كل أحد، هو الذي "لا باب له يُغلق، ولا وقتٌ لا يُجاب فيه، ولا حاجةٌ يُعجِزُه قضاؤها."</p>
<p dir="rtl" class="p1">"ٱلَّذِي لَمْ يَلِدْ وَلَمْ يُولَدْ…" أي: تنزيهٌ كامل لله عن كل نقص البشر، عن الحدوث، عن الحاجة، عن الفناء، عن الوراثة، عن التشبيه، عن المحدودية…</p>
<p dir="rtl" class="p1">الله خالق الزمان، فلا يُولد، وخالق الأجساد، فلا يُحاط، وخالق الأسباب، فلا يخضع لها.</p>
<p dir="rtl" class="p1">"وَلَمْ يَكُن لَّهُ كُفُوًا أَحَدٌ…" لا يُكافئه أحد، لا يُماثله أحد، لا يوازيه أحد، لا يُقارَن به أحد… تُغلق بهذا التوسل كل طريق على قلبك أن يلتفت إلى غير الله، فمن لا كفءَ له، لا نِدّ له، لا شريك له، هو أحقّ من تسألُه… وأحقّ من تُسلِم له سرك وظاهرك.</p>
<p dir="rtl" class="p14"><b>والسؤال الآن: لماذا كان هذا هو "</b><span class="s8"><b>الاسم الأعظم</b></span><b>"؟</b></p>
<p dir="rtl" class="p1">لأنَّ هذا الدعاء:</p>
<p dir="rtl" class="p36">جمع التوحيد الكامل: (ٱللَّهُ – لَا إِلَٰهَ إِلَّا أَنْتَ)</p>
<p dir="rtl" class="p36">والتنزيه المطلق: (ٱلْأَحَدُ – ٱلصَّمَدُ – لَمْ يَلِدْ…)</p>
<p dir="rtl" class="p36">والافتقار الكامل، بلا أي طلبٍ مباشر… فقط "أسألك".</p>
<p dir="rtl" class="p36">ولأن العارفين بالله، لا يبدؤون بالسؤال… بل بالانكسار.</p>
<p dir="rtl" class="p36">ولا يلحّون في الطلب… إلَّا بعدما يُطهّرون نواياهم بمقام "من تسأل؟".</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p1"><b>خاتمة ودعاء جامع:</b></p>
<p dir="rtl" class="p1">ٱللَّهُمَّ… إنِّي أسألُكَ بأنك أنتَ ٱللَّهُ، لَا إِلَٰهَ إِلَّا أَنْتَ، ٱلْأَحَدُ ٱلصَّمَدُ، ٱلَّذِي لَمْ يَلِدْ وَلَمْ يُولَدْ، وَلَمْ يَكُن لَّهُ كُفُوًا أَحَدٌ… أن تجعل قلبي لا يفتقرُ إلَّا إليك، ولا يرجو إلَّا وجهك، ولا يعبدُ إلا سواك، وأن تُديم عليّ نعمة معرفتك، وأن لا تكلني إلى نفسي طرفة عين.</p>
<p dir="rtl" class="p25">﴿ لَا إِلَٰهَ إِلَّا ٱللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ، لَهُ ٱلْمُلْكُ وَلَهُ ٱلْحَمْدُ، وَهُوَ عَلَىٰ كُلِّ شَيْءٍ قَدِيرٌ ﴾.</p>
<p dir="rtl" class="p1">هذا دعاءٌ من نور… ليس مجرد ألفاظ نُكرّرها بعد كل صلاة، أو نرددها مئة مرة صباحًا… بل إعلان عظيم للتوحيد الكامل، والسيادة المطلقة لله، والثناء الخالص، والثقة التامة في قدرة الله على كل شيء.</p>
<p dir="rtl" class="p1">دعونا نتأمل هذا الذكر الآن… في رسائل وجدانية تمسّ القلب، وتُحيي الروح، وتُعيد ترتيب علاقتنا بالله.</p>
<p dir="rtl" class="p70"><b>الرسالة الأولى: لا إله إلا الله… إعلان انعتاقك من كل قيد</b></p>
<p dir="rtl" class="p1">حين تقول:"لا إله إلا الله" فأنت لا تذكر جملة محفوظة… بل تُعلن أنك لا تُؤلّه أحدًا… لا تخضع إلَّا لواحد، لا تركع لقوة، ولا تُعظم شيئًا في قلبك أكثر من الله، هذه الكلمة… تهدم بها كل وثن داخلي: كل هوى تألّه، كل بشر تعلّقت به، كل خوفٍ طغى، كل حُبٍّ نافس حبّ الله، هي كلمة… تُحررك.</p>
<p dir="rtl" class="p70"><b>الرسالة الثانية: وحده لا شريك له… هذا هو النقاء</b></p>
<p dir="rtl" class="p1">"وحده لا شريك له" ليست مجرد توكيد لغوي… بل هي تصفية قلبية شاملة… أن لا تجعل في قلبك خليطًا: ربًّا يُدبّر… وأسبابًا تملك، ربًّا يُعطي… وأنت تعتقد أن أحدًا آخر يرزق، إنه توحيدٌ خالص… لا يشوبه شرك ظاهر، ولا شرك خفي، وما أسهل أن تُردد هذه الجملة… وما أصعب أن تحياها فعلًا!.</p>
<p dir="rtl" class="p70"><b>الرسالة الثالثة: له الملك… فاسحب يدك من المقود</b></p>
<p dir="rtl" class="p1">"له الملك" أي أن كل ما تراه… ملكه، كل من تهابهم… عبيده<br>
كل من تُحاول السيطرة عليهم… ليسوا لك قلها وأنت تُفرّغ يدك من التملك… قلها وأنت تتذكّر أن القلب الذي تحاول امتلاكه… بيد الله وأن مستقبلك… ليس ملكك، بل في خزائن الملك.</p>
<p dir="rtl" class="p70"><b>الرسالة الرابعة: وله الحمد… حتى على ما لا تفهمه</b></p>
<p dir="rtl" class="p1">"وله الحمد" لا تعني أن تحمد الله فقط حين تُعطى، بل أن تحمده… حتى حين يُؤخّر عنك.. تحمده على الألم لأنه يكشفك.. وتحمده على المنع لأنه يُربّيك.. وتحمده على ما لا تفهمه لأنه يعلم وأنت لا تعلم... إنها عبادة التسليم: أن تقول بقلبك "الحمد لله"، قبل أن يفهم عقلك السبب.</p>
<p dir="rtl" class="p70"><b>الرسالة الخامسة: وهو على كل شيء قدير… إذًا لماذا تخاف؟</b></p>
<p dir="rtl" class="p1">"وهو على كل شيء قدير" هي قمة هذا الذكر… إن كنت تؤمن أنه يقدر على كل شيء فلماذا تخاف من الناس؟ ولماذا تيأس من التغيير؟ ولماذا تتعلق بضعيف، وتنسى القوي؟ إنه القادر… على أن يُبدّل حالك، ويُحيي قلبك، ويُخرجك مما أنت فيه، ويمنحك فوق ما تتمنى، قلها وأنت تستحضر أنَّ قدرة الله لا تُحدّها قوانين الواقع… بل تُغيّر الواقع.</p>
<p dir="rtl" class="p1"><b>خاتمة وجدانية:</b></p>
<p dir="rtl" class="p1">هذا الذكر… ليس فقط أجرًا يُكتب بل إيمانٌ يُبنى… كلمة كلمة، تعيد بناء قلبك على التوحيد، والتجريد، والتسليم، والثقة.</p>
<p dir="rtl" class="p25">" <span class="s8"><b>لا إله إلا الله</b></span> ": تُنقي بها التعلّق.</p>
<p dir="rtl" class="p25">" <span class="s8"><b>وحده لا شريك له</b></span> ": تُطهر بها التوحيد.</p>
<p dir="rtl" class="p25">" <span class="s8"><b>له الملك وله الحمد</b></span> ": تُسلّم بها للمالك الحكيم.</p>
<p dir="rtl" class="p25">" <span class="s8"><b>وهو على كل شيء قدير</b></span> ": تُعيد بها الأمل حين تظن أن لا شيء يتغير.</p>
<p dir="rtl" class="p1">فإن قلتها بقلبك… أدركت أنَّ هذا الذكر، هو أعظم شهادة تُكتب في صحيفتك… وأنها الكلمة التي تنجّي في الدنيا… وتُثبّت في القبر… وتُرفع بها إلى الجنة.</p>
<p dir="rtl" class="p36"><b>دعاء عظيم لقيام الليل:</b></p>
<p dir="rtl" class="p1"> "ٱللَّهُمَّ لَكَ ٱلْحَمْدُ، أَنْتَ نُورُ ٱلسَّمَاوَاتِ وَٱلْأَرْضِ، وَلَكَ ٱلْحَمْدُ، أَنْتَ قَيِّمُ ٱلسَّمَاوَاتِ وَٱلْأَرْضِ، وَلَكَ ٱلْحَمْدُ، أَنْتَ رَبُّ ٱلسَّمَاوَاتِ وَٱلْأَرْضِ وَمَنْ فِيهِنَّ..."<br>
📚 رواه البخاري ومسلم، وكان من أدعية النبي ﷺ في جوف الليل.</p>
<p dir="rtl" class="p1">نحن الآن أمام دعاء عظيم عظيم، قاله سيد الخاشعين محمد ﷺ في قيام الليل، وهو أحد الأدعية النبوية القليلة التي تتفتح فيها أبواب السماء، وتتشرب بها الأرواح من صفاء التوحيد وعظمة الربوبية.</p>
<p dir="rtl" class="p1">دعوني أكتب لكم الآن رسالة تأملية عميقة وبليغة جدًا حول هذا الدعاء النوراني، الذي قاله ﷺ وهو في ظلمة الليل، لكن قلبه كان يغمره نور "<span class="s8"><b>ٱللَّه</b></span>" وقيموميته.</p>
<p dir="rtl" class="p1">"ٱللَّهُمَّ لَكَ ٱلْحَمْدُ…" ليست فقط افتتاحية دعاء، بل هي إقرار علني، واعتراف وجداني، وإشهار عبودية، أنَّ كل حمد عرفته القلوب… وكل حمد جهلته النفوس… هو لك، وبك، ومنك، وإليك.</p>
<p dir="rtl" class="p1">ليس هناك حمدٌ حقيقي… إلَّا إذا وُجّه إلى "<span class="s8"><b>ٱللَّه</b></span>" تعالى لا إلى النفس، ولا للناس، ولا للكون.</p>
<p dir="rtl" class="p1">"أَنْتَ نُورُ ٱلسَّمَاوَاتِ وَٱلْأَرْضِ…" أي: أنت النور الحقيقي الذي منه كل نور، نور الوجود… ونور الهداية… ونور الفطرة… ونور الطمأنينة…</p>
<p dir="rtl" class="p47">إذا أظلمت الدروب… أنارها نورك.</p>
<p dir="rtl" class="p47">وإذا أظلم القلب… أحييته ببصيصٍ من نورك.</p>
<p dir="rtl" class="p47">وإذا تاه العقل… هداه اسمك الأعظم: <span class="s8"><b>ٱللَّهُ</b></span>.</p>
<p dir="rtl" class="p1">"نور السموات والأرض" أي: لا قيام لها إلَّا بك، ولا استمرار لها إلَّا بنور علمك، وعدلك، ورحمتك.</p>
<p dir="rtl" class="p1">"أَنْتَ قَيِّمُ ٱلسَّمَاوَاتِ وَٱلْأَرْضِ…" أي: أنت الذي تُقيمها وتُدبّرها وتُمسكها أن تزول.</p>
<p dir="rtl" class="p1">كل شيء من خلقك يحتاج إلى قيامك عليه… ليس فقط بالخلق، بل بالحفظ، والإمداد، والتدبير، والرحمة.</p>
<p dir="rtl" class="p1">كل نَفَسٍ يتردد… بإذنك، وكل قلب ينبض… بأمرك، وكل ورقة تسقط… بعلمك.</p>
<p dir="rtl" class="p1">هنا يتفتت وهم "الاستقلال الذاتي" للعبد، ويُولَد بداخله شعور مقدّس: أنني لا أعيش لأنني أتنفّس… بل لأنَّ "القيّوم" أقامني.</p>
<p dir="rtl" class="p1">"أَنْتَ رَبُّ ٱلسَّمَاوَاتِ وَٱلْأَرْضِ وَمَنْ فِيهِنَّ…" ليس فقط خالقهم… بل ربّهم، ورازقهم، ومصرف أمرهم، وعالم خفاياهم.</p>
<p dir="rtl" class="p36">من في السماء… لا يتحرك إلَّا بأمرك.</p>
<p dir="rtl" class="p36">ومن في الأرض… لا ينال نَفَسًا إلَّا بإذنك.</p>
<p dir="rtl" class="p36">ومن في باطن الأرض… تحت سمعك وبصرك.</p>
<p dir="rtl" class="p1">في هذه العبارة… يتسع قلب العبد ليرى عظمة الملكوت، ثم يقول في نفسه:</p>
<p dir="rtl" class="p1">"فإن كنت أنت ربّ كل هؤلاء… فكيف لا تكون كافيًا لي وحدي؟"..</p>
<p dir="rtl" class="p1"><b>الخاتمة الوجدانية:</b></p>
<p dir="rtl" class="p1">في هذا الدعاء… لا يسأل النبي ﷺ شيئًا… لا مالًا، ولا شفاء، ولا نصرًا، ولا عونًا… بل فقط يُعلن حمدًا، ويُسبّح كمالًا، ويُسلّم بربوبية مطلقة.</p>
<p dir="rtl" class="p1">دعاءٌ عجيب… لا يطلب… لكنه يحصل على كل شيء، لأن من قال هذا الدعاء… فقد وصل.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p1"><b>دعاء جامع مستلهم منه:</b></p>
<p dir="rtl" class="p1">"ٱللَّهُمَّ… يَا نُورَ ٱلسَّمَاوَاتِ وَٱلْأَرْضِ، وَيَا قَيُّومَهُمَا وَرَبَّهُمَا، اجْعَلْ نُورَكَ فِي قَلْبِي، وَقِيَامَكَ عَلَيَّ، وَرُبُوبِيَّتَكَ ظِلًّا لِي، وَلَا تَكِلْنِي إِلَى نَفْسِي، فَإِنِّي أَضِلُّ، وَاجْعَلْنِي أَعْرِفُكَ حَقًّا، وَأَحْمَدُكَ صِدْقًا، وَأُسَبِّحُكَ قُرْبًا، فَأَنْتَ ٱللَّهُ، وَلَا إِلَٰهَ غَيْرُكَ".</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p25"><b>أقوال وأدعية للسلف فيها اسم "</b><span class="s8"><b>ٱللَّهُ</b></span><b> – </b><span class="s8"><b>ٱلْإِلَٰهُ</b></span><b>"</b></p>
<p dir="rtl" class="p36"><b>من دعاء الفضيل بن عياض:</b></p>
<p dir="rtl" class="p1"> "ٱللَّهُمَّ إنِّي أَسْأَلُكَ أَنْ تَكون أَحَبَّ إِلَيَّ مِمَّا سِوَاكَ، وَأَخْشَاكَ فَوْقَ كُلِّ شَيْءٍ، وَأَنْ تَجْعَلَ رَجَائِي فِيكَ لَا فِي غَيْرِكَ، وَأَنْ تُنِيرَ قَلْبِي بِمَعْرِفَتِكَ، يَا إِلَٰهَ الْعَالَمِينَ." </p>
<p dir="rtl" class="p1">الله… ما أبلغ هذا الدعاء وما أصفاه من مناجاة! دعاءٌ تتجلى فيه حقيقة "<span class="s8"><b>ٱللَّه</b></span> – <span class="s8"><b>ٱلْإِلَٰهُ</b></span>" لا كأسماء تُتلى… بل كـ محور وجود، ومقصد روح، ومهوى فؤاد.</p>
<p dir="rtl" class="p1">دعاء يكشف أنَّ معرفة الله ليست فكرًا يُقرأ، بل نورًا يُسكب في القلب، وحبًّا يُفرغ العبد من كل أحدٍ سواه.</p>
<p dir="rtl" class="p1">وإليكم الآن رسالة تأملية عميقة جدًا حول هذا الدعاء:</p>
<p dir="rtl" class="p1">"اللَّهُمَّ إنِّي أَسْأَلُكَ أَنْ تَكونَ أَحَبَّ إِلَيَّ مِمَّا سِوَاكَ…" ما أعظم أن يكون الله أحبّ إليك من الناس، من الدنيا، من الطموحات، من النجاح، بل حتى من نفسك، أن تحب الله أكثر من كل شيء… فتصير عبدًا لا يُباع، ولا يُشترى، ولا يتعلّق، ولا ينكسر… إلا على بابٍ واحد.</p>
<p dir="rtl" class="p1">إذا صار الله أحبّ إليك من الدنيا… هانت عندك الدنيا.. وما عليها.</p>
<p dir="rtl" class="p1">"وأَخْشَاكَ فَوْقَ كُلِّ شَيْءٍ…" الخوف من الله هنا ليس خوف العقوبة، بل خوف الفقد، والخروج من دائرة القُرب، أن تخشى أن تُبعد عن رحمته، أن تُحجب عن نور وجهه، أن تُغلق عنك أبواب المعرفة... ليس أخطر من أن تخاف من الناس… إلَّا أن تفقد الخوف من الله.</p>
<p dir="rtl" class="p1">"وَأَنْ تَجْعَلَ رَجَائِي فِيكَ لَا فِي غَيْرِكَ…" يا رب… لا تجعل قلبي يُعلّق أمنياته على الأبواب الـمُغلقة، ولا يُراهن على الأوهام، ولا يُصدّق السراب.</p>
<p dir="rtl" class="p1">علّمني أن الرجاء لا يُصرف إلا لمن يقدر، وأنك أنت وحدك "<span class="s8"><b>ٱلْإِلَٰهُ</b></span>" الذي يُرجى في كل شيء، ويخاف منه كل شيء، ويطمأن إليه في كل شيء.</p>
<p dir="rtl" class="p1">"وَأَنْ تُنِيرَ قَلْبِي بِمَعْرِفَتِكَ…" معرفتك ليست علمًا نقرؤه، ولا معلومة نحفظها،<br>
بل نورٌ يُسكب في القلب فيحيا به، وينظر بنوره، ويسجد بسكينته.</p>
<p dir="rtl" class="p1">مَن عرفك بنور، استحيا، وتطهّر، وسكن، واطمأن، وامتلأ باليقين، وأصبح لا يُقارن بك أحد.</p>
<p dir="rtl" class="p1">"يَا إِلَٰهَ الْعَالَمِينَ…" خاتمة عظيمة لهذا الدعاء… فأنت لا تُناجي رب نفسك فقط، بل تعلن أنك تخاطب الإله الحقّ لكل شيء.</p>
<p dir="rtl" class="p1">من علِم أنه يناجي إله العالمين، لم يبقَ في قلبه خوف من العالمين.</p>
<p dir="rtl" class="p1">من ناجاه بهذا الاسم… أُلهم التوحيد، والسَّكينة، والعدل، والطهارة، والتسليم.</p>
<p dir="rtl" class="p1"><b>الجوهر الخالص لهذا الدعاء:</b></p>
<p dir="rtl" class="p1">هذا الدعاء ليس مجرد طلب… إنه ميثاق عبودية، وتجديد ولاء، وتخلّي عن كل إله خفي، وبناء قلبٍ لا يُحرّكه سوى الله، ولا يحكمه سوى الله، ولا يُضيئه سوى الله... هو دعاء من عرف أن <span class="s8"><b>ٱلْإِلَٰهَ</b></span> لا يكون إلهًا له حتى يتربّى على حبه، وخشيته، ورجائه، ومعرفته… دون غيره.</p>
<p dir="rtl" class="p36"><b>من دعاء ابن القيم في "مدارج السالكين":</b></p>
<p dir="rtl" class="p1"> "ٱللَّهُمَّ أَنْتَ ٱلْإِلَٰهُ ٱلْحَقُّ، ٱلَّذِي لَا يُسْتَحَقُّ سُجُودٌ وَلَا خُضُوعٌ وَلَا رَجَاءٌ إِلَّا لَكَ، فَٱجْعَلْنِي مِمَّنْ سَلَّمَ لَكَ قَلْبَهُ، وَأَخْلَصَ لَكَ حُبَّهُ، وَلَمْ يَتَّخِذْ إِلَٰهًا غَيْرَكَ وَلَا رَبًّا سِوَاكَ ."</p>
<p dir="rtl" class="p1">ما أعمق هذا الدعاء وما أصدقه من اعتراف يُوقِّع عليه القلب قبل اللسان… دعاءٌ لو نطق به القلب صدقًا، لانهدمت كل الأصنام الخفية في النفس، وارتفعت راية التوحيد في أعمق نقطة من الوجدان.</p>
<p dir="rtl" class="p1">دعوني أقدّم لكم الآن رسالة تأملية وجدانية مهيبة حول هذا الدعاء، تُلامس عمق اسم "<span class="s8"><b>ٱلْإِلَٰهُ</b></span>"، وتكشف أثره في بناء العبودية الصافية.</p>
<p dir="rtl" class="p1">"ٱللَّهُمَّ أَنْتَ ٱلْإِلَٰهُ ٱلْحَقُّ…" أي: يا من لا إله سواك بحق، ولا يستحق أن يُذل له الجبين إلَّا أنت، ولا يليق أن يُملأ به القلب إلا أنت… أنت الحق في زمنٍ امتلأ بالزيف، وأنت الإله في عالمٍ تهاوت فيه الآلهة الزائفة… وأنت المعبود ولو جحدك الناس، والمقصد ولو ضلّت القلوب.</p>
<p dir="rtl" class="p1">"ٱلْإِلَٰهُ ٱلْحَقُّ" يعني أن كل ما سواه باطل إنْ نُصّب معبودًا، وأنَّ كل ما التفتَ إليه القلب عنك… كان خيانة للتوحيد، ولو خُيّل له أنه خير.</p>
<p dir="rtl" class="p1">"ٱلَّذِي لَا يُسْتَحَقُّ سُجُودٌ وَلَا خُضُوعٌ وَلَا رَجَاءٌ إِلَّا لَكَ…"</p>
<p dir="rtl" class="p1">العبودية ليست فقط صلاة وسجود، العبودية هي أن يكون الله هو وحده الـمَرجِع، والمقصِد، والـمُعتمد، والمحبوب، والمهيب، والمقصود في كل شيء.</p>
<p dir="rtl" class="p1">لا تركع بقلبك لنجاحك، لا تخضع لسلطة خوفك، لا تضع رجاءك في منصب أو شفاعة أو إنجاز…</p>
<p dir="rtl" class="p1">فإن كنت تركع في صلاتك لله… ثم تركع خارجها لغيره: فأنت لم تعرف "<span class="s8"><b>ٱلْإِلَٰهُ</b></span>" بعد.</p>
<p dir="rtl" class="p1">" فَٱجْعَلْنِي مِمَّنْ سَلَّمَ لَكَ قَلْبَهُ…" لا أعظم من أن يكون قلبك مسلَّمًا لله… لا ينازع، لا يعترض، لا يخطط لنفسه بمعزل عن ربه، لا يحمل في زواياه هوىً خفيًّا… ولا بقايا حبّ لآلهة متوارية.</p>
<p dir="rtl" class="p1">القلب إذا لم يُسلَّم لله كاملاً… سيُقسم على غيره، وسيتشظى، وسيتعب.</p>
<p dir="rtl" class="p1">سلّم لله خوفك… حُبك… أملك… اختياراتك… مستقبلك… وقل: اللهم اجعل قلبي لك وحدك، لا لشيء سواك.</p>
<p dir="rtl" class="p1">"وَأَخْلَصَ لَكَ حُبَّهُ…" هنا سرّ الحياة كلها: الحبّ، أن تُحب الله بلا شروط، بلا انتظار عطاء، بلا تبادل مصالح.</p>
<p dir="rtl" class="p1">أن تُحبه لأنه الله… ولأنك عرفت أنه لا أحد يُشبهه، وأنك خلقت لتراه، لا لتلتفت لغيره.</p>
<p dir="rtl" class="p1">وما دام هناك شيء في القلب يُزاحم حُبك لله… فاعلم أنَّ "<span class="s8"><b>ٱلْإِلَٰهَ</b></span>" لم يملكك بعد.</p>
<p dir="rtl" class="p1">"وَلَمْ يَتَّخِذْ إِلَٰهًا غَيْرَكَ وَلَا رَبًّا سِوَاكَ…" ما أكثر الآلهة في هذا العصر… حب الذات، تعظيم الآراء، عبادة الجماهير، الخوف من المستقبل، العُجب، الرياء… كل هذه "آلهة صغيرة" إن سكنت القلب، نازعت الله مقامه.</p>
<p dir="rtl" class="p1">وهنا دعاء التخلّي الكامل: اللهم لا تجعل في قلبي شيئًا يُعبد غيرك، ولو لم أُسمِّه "إلهًا".</p>
<p dir="rtl" class="p1"><b>الجوهر العميق لهذا الدعاء:</b></p>
<p dir="rtl" class="p1">هذا دعاء التحرّر من كل عبودية باطلة، دعاء العبد الذي اكتشف أنه ما خُلق ليُقَسِّم قلبه على جهات الأرض، بل ليُسلمه كاملاً لله، الذي ما عبدته روحٌ صادقة… إلا ووجَدَت كل شيء.</p>
<p dir="rtl" class="p1"><b>دعاء خاشع مستلهم:</b></p>
<p dir="rtl" class="p1">" ٱللَّهُمَّ… اجعلني عبدًا لك وحدك، لا يريد إلا وجهك، ولا يرجو إلا كرمك، ولا يخاف إلا بُعدك، ولا يُحب إلا لأَجلك، طهّر قلبي من كل إلهٍ سواك، واخلع منّي كل صنمٍ يزاحمك، وارفعني بحقيقة "لَا إِلَٰهَ إِلَّا أَنْتَ"،<br>
واكتبني من المخلَصين… كما كتبت أحبّ عبادك ".</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p25"><b>أدعية تأملية باسم "</b><span class="s8"><b>ٱللَّهُ</b></span><b> – </b><span class="s8"><b>ٱلْإِلَٰهُ</b></span><b>"</b></p>
<p dir="rtl" class="p36">" ٱللَّهُمَّ… يَا مَنْ تَفَرَّدْتَ بِٱسْمِكَ "ٱللَّهُ"، ٱجْعَلْنِي مِمَّنْ يَسْتَغْنِي بِكَ عَنْ كُلِّ شَيْءٍ، وَيَفْتَقِرُ إِلَيْكَ فِي كُلِّ شَيْءٍ، وَيَهْتِفُ بِكَ فِي كُلِّ نَفَسٍ… لَا إِلَٰهَ إِلَّا أَنْتَ ".</p>
<p dir="rtl" class="p1">ما أصفى هذا الدعاء، وما أصدق هذه المناجاة… كأنها صيغة منقوشة على قلبٍ تدرّب طويلًا على معنى "<span class="s8"><b>ٱللَّهُ</b></span>" تعالى، حتى صار لا ينطق ولا يتنفس إلَّا به، دعاء فيه سِرّ التوحيد، وجوهر الغِنى، وصدق الفقر، ومقام الإخلاص.</p>
<p dir="rtl" class="p1">إليكم الآن رسالة وجدانية تأملية عميقة جدًا، تشرح هذا الدعاء سطرًا سطرًا، وتكشف أبعاده الروحية، في ضوء اسم "<span class="s8"><b>ٱللَّهُ</b></span>".</p>
<p dir="rtl" class="p1">"ٱللَّهُمَّ… يَا مَنْ تَفَرَّدْتَ بِٱسْمِكَ "ٱللَّهُ"… كل الأسماء تُشبه أسماء،<br>
إلَّا هذا الاسم:"<span class="s8"><b>ٱللَّهُ</b></span>.".. فهو الاسم الذي لا يُشارِكه فيه أحد، لا معنى، ولا مبنى، ولا كمال.</p>
<p dir="rtl" class="p1">اسم إذا نُطق، خاف القلب، وسكن، وتذكّر أنه عبد… أمام سيّد لا يُشبهه أحد.</p>
<p dir="rtl" class="p1">التفرد باسم "<span class="s8"><b>ٱللَّهُ</b></span>" تعالى يعني أنه لا يُقارن، ولا يُضاهى، ولا يُجاريه في كماله اسم أو صفة... فإذا تفرد هو باسمه… فلماذا يُشركه أحد في قلبك؟.</p>
<p dir="rtl" class="p1">"ٱجْعَلْنِي مِمَّنْ يَسْتَغْنِي بِكَ عَنْ كُلِّ شَيْءٍ…" ليس الغنى أن تملك… بل أن تشعر أن ما عند الناس لا يُغنيك، وأنَّ الله وحده هو الكفاية.</p>
<p dir="rtl" class="p1">أن تقول في قلبك:</p>
<p dir="rtl" class="p47">لا أحتاج حُبًّا يُزاحم حبك…</p>
<p dir="rtl" class="p47">ولا رزقًا أنشغل عنه بك…</p>
<p dir="rtl" class="p47">ولا رأيًا أتبع بهوى دون أمرك…</p>
<p dir="rtl" class="p1">الغنى الحقيقي هو أن يُصبح الله كافيًا… لا زائدًا.</p>
<p dir="rtl" class="p1">الغنى بالله يجعل المرء هادئًا، متزنًا، لا يتكفّف المديح، ولا يضرب بسيف الغضب حين يُخذل.</p>
<p dir="rtl" class="p1">"وَيَفْتَقِرُ إِلَيْكَ فِي كُلِّ شَيْءٍ…" لا يُناقض الغنى بالله أن تكون فقيرًا إليه… بل كلما ازددت غنًى به، ازددت فقرًا له.</p>
<p dir="rtl" class="p1">أن تفتقر في علمك، في صبرك، في رزقك، في نيتك، حتى في سجودك، أن تقول: يا رب… حتى عبادتي لا تصلح إلَّا بك.</p>
<p dir="rtl" class="p1">الفقر إلى الله هو أرقى مقامات العبودية… لأنَّه فقر لا يُذلّك… بل يُعزّك.<br>
فمن عرف فقره لله… استغنى عن الناس كلهم.</p>
<p dir="rtl" class="p1">"وَيَهْتِفُ بِكَ فِي كُلِّ نَفَسٍ… لَا إِلَٰهَ إِلَّا أَنْتَ" أن يصير اسم "<span class="s8"><b>ٱللَّهُ</b></span>" هو لغة الروح، ونبض الضمير، وترجمان المشاعر، وزاد الطريق، أن يصبح قلبك لا يستقر إلَّا إذا قالها: "<span class="s8"><b>لَا إِلَٰهَ إِلَّا أَنْتَ</b></span>" لا في السراء فقط، بل في الضيق، في المرض، في الضعف، في القرار، في الظن، في الموت…</p>
<p dir="rtl" class="p1">"كل نَفَسٍ" هنا لا يعني فقط الشهيق والزفير… بل كل لحظة تعيشها، كل شعور، كل خطوة، كل قرار… أن تهتف به في كل شيء… يعني أنك ما عُدتَ تطيق الحياة بدونه.</p>
<p dir="rtl" class="p1"><b>الرسالة الجوهرية:</b></p>
<p dir="rtl" class="p1">أن تعرف الله باسمه "<span class="s8"><b>ٱللَّهُ</b></span>"… يعني أن لا يبقى في داخلك فراغٌ يُملؤ بغيره.</p>
<p dir="rtl" class="p1">أن تستغني به… وتفتقر إليه… وتهتف باسمه دون كل اسم… فتصير عبدًا لا يُشتّت قلبه شيء، ولا يُطفئه فقد، ولا يُغريه غير، ولا يهدأ له بال… إلَّا إن سكن الله في قلبه، واطمأن.</p>
<p dir="rtl" class="p1"><b>دعاء ختامي مستلهم:</b></p>
<p dir="rtl" class="p1">" ٱللَّهُمَّ… اجعل اسمك الأعظم هو أول ما ينطق به لساني، وآخر ما يهمس به قلبي، اجعلني غنيًّا بك عن كل مَن سواك، فقيرًا إليك في كل ما فيّ،<br>
واجعل كل نَفَسٍ مني تسبيحًا لك، وكل سكونٍ مني سكنًا إليك،<br>
فأنت "ٱللَّهُ"… وهل يُطلب إلهٌ سواك؟ ".</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p36">" ٱللَّهُمَّ… اجْعَلِ ٱسْمَكَ "ٱللَّهُ" أَعْظَمَ فِي نَفْسِي مِنْ كُلِّ شَيْءٍ، وَاجْعَلْنِي إِذَا ذَكَرْتُكَ، خَشَعَتْ جَوَارِحِي، وَإِذَا نَظَرْتُ إِلَى ٱلدُّنْيَا، نَطَقَ قَلْبِي: لَا إِلَٰهَ إِلَّا ٱللَّهُ ".</p>
<p dir="rtl" class="p1">هذا الدعاء ليس مجرد ألفاظ، بل هو طلبٌ عظيمٌ من الله أن يكون "<span class="s8"><b>ٱللَّهُ</b></span>" تعالى أعظم من الدنيا في داخلك، وأقوى من رغباتك، وأصدق من مشاعرك، وأبقى من كل ما تفنى عليه الحياة.</p>
<p dir="rtl" class="p1">إنه دعاء من عرف أنَّ الجوارح لا تخشع إلَّا إذا عَظُم الله في النفس،<br>
وأن القلب لا ينجو من فتن الدنيا حتى ينطق بالتوحيد من تلقاء نفسه، لا من باب الحفظ… بل من باب الحضور.</p>
<p dir="rtl" class="p1">دعوني أقدّم لكم الآن رسالة تأملية وجدانية راقية ومهيبة، تليق بهذا الدعاء العظيم:</p>
<p dir="rtl" class="p1">"ٱللَّهُمَّ… اجْعَلِ ٱسْمَكَ "ٱللَّهُ" أَعْظَمَ فِي نَفْسِي مِنْ كُلِّ شَيْءٍ…" نحن لا نُولد بعظمة الله فينا… بل نولد بقلوبٍ تمتلئ رويدًا رويدًا بالعظمة المصنوعة: عظمة المال، عظمة الأشخاص، عظمة الإنجاز، عظمة النفس، عظمة الصورة… ثم نحتاج عمرًا كاملًا لنُعيد ترتيب المعاني… حتى يصير اسم "<span class="s8"><b>ٱللَّهُ</b></span>" تعالى أعظم من كل هذه الزينة، فيُلقى في القلب نورٌ، وهيبة، وسكينة، فننظر لكل شيء في الحياة على أنه زائل… إلَّا هو.</p>
<p dir="rtl" class="p1">أن يكون اسم "<span class="s8"><b>ٱللَّهُ</b></span>" هو الأعظم في النفس… يعني أنك لا تسجد إلَّا له، ولا تعطي قلبك إلَّا له، ولا ترتجف إلَّا منه، ولا تستغني إلَّا به.</p>
<p dir="rtl" class="p1">"وَاجْعَلْنِي إِذَا ذَكَرْتُكَ، خَشَعَتْ جَوَارِحِي…" الخشوع ليس تمرينًا عضليًا… الخشوع الحقيقي يبدأ حين تمتلئ النفس بعظمة من تذكر، فيخضع الجسد تلقائيًا.</p>
<p dir="rtl" class="p1">أن تذكر الله… فينحني ظهرك، وتلين ركبتاك، ويبرد لسانك، وتسكب عينك… حينها تعلم أنك لم تذكر اسمًا من الأسماء… بل نطقت "<span class="s8"><b>ٱللَّهُ</b></span>"… فاهتزّت روحك.</p>
<p dir="rtl" class="p1">الخشوع لا يُؤتى بالمحاولة، بل بامتلاء القلب بعظمة من يُذكر... فإذا خشعت النفس… خشعت الجوارح، ولو لم تُجبر.</p>
<p dir="rtl" class="p1">"وَإِذَا نَظَرْتُ إِلَى ٱلدُّنْيَا، نَطَقَ قَلْبِي: <span class="s8"><b>لَا إِلَٰهَ إِلَّا ٱللَّهُ</b></span>" آه… يا لجمال هذا المشهد! أن تنظر للدنيا كلها: زخرفها، مبانيها، أضواؤها، قصورها، حشودها… ثم يقول قلبك تلقائيًا: "<span class="s8"><b>لَا إِلَٰهَ إِلَّا ٱللَّهُ</b></span>" لا شيء يستحق أن يُعبد… لا شيء يستحق أن يُلاحق… لا شيء يُغني… لا شيء يبقى…</p>
<p dir="rtl" class="p1">هذه ليست كلمة تُقال… بل نبضة قلبٍ اختار الله إلهًا، واختار الآخرة وطنًا، ورفض أن يُفتن بزيفٍ لا يدوم.</p>
<p dir="rtl" class="p1"><b>الخلاصة الوجدانية:</b></p>
<p dir="rtl" class="p1">أن تعيش بهذا الدعاء… يعني أنك تحيا بسلامٍ داخلي، وهدوءٍ يعانق روحك، وعينك ترى الحياة من خلال نور الآخرة، وقلبك لا يسكنه إلَّا حب الله ورضاه... فتغدو الدنيا طريقًا… لا صنمًا، والنجاح وسيلة… لا غاية، والحياة فرصة لعبادة من إذا عظُم في النفس… صَغُر كل ما سواه.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p36">" يَا ٱللَّهُ… أَنْتَ ٱلَّذِي إِذَا تَعَلَّقَتْ بِهِ ٱلرُّوحُ نَجَتْ، وَإِذَا أَخْلَصَتْ لَهُ ٱلنِّيَّةُ رُفِعَتْ، وَإِذَا سَجَدَ لَهُ ٱلْقَلْبُ سَبَقَ ٱلْبَدَنُ… فَٱجْعَلْنِي لَكَ وَحْدَكَ، وَبِكَ وَحْدَكَ، وَلَا أُرِيدُ إِلَّا أَنْتَ ".</p>
<p dir="rtl" class="p1">هذا الدعاء ليس مجرد كلام… بل صرخة قلب عارف بالله، هارب من كل زيف، راغب في خلوة ليس فيها إلا "<span class="s8"><b>ٱللَّه</b></span>" وحده، دعاء من ذاق معنى أن التعلّق بغير الله عبء، وأنَّ النية إذا لم تكن له وحده… فهي عبث، وأن القلب إن لم يسجد أولًا… فلن تُجدي سجدة الجسد كثيرًا.</p>
<p dir="rtl" class="p1">اسمحوا لي أن أقدّم لكم الآن رسالة تأملية وجدانية عظيمة، تُفَكك هذا الدعاء بسكينة، وتكشف لبه التوحيدي، وجماله الرَّباني:</p>
<p dir="rtl" class="p1">"يَا ٱللَّهُ… أَنْتَ ٱلَّذِي إِذَا تَعَلَّقَتْ بِهِ ٱلرُّوحُ نَجَتْ"... نعم… كل تعلّق يُثقلك… إلَّا التعلّق بـ"<span class="s8"><b>ٱللَّه</b></span>" فإنه يحرّرك. </p>
<p dir="rtl" class="p1">كل حبّ يُدخلك دوّامة الخوف من الفقد… إلَّا حُب الله، فهو الحب الذي كلما تعلّقت به، سكنت، وأُمِّنت، ووُلدت من جديد.</p>
<p dir="rtl" class="p1">كم من روح تعلّقت ببشر، بضوء، بمكان، فانكسرَت… وكم من روح تعلّقت بالله… فنجَت، وإن خسرت كل شيء.</p>
<p dir="rtl" class="p1">"وَإِذَا أَخْلَصَتْ لَهُ ٱلنِّيَّةُ رُفِعَتْ"... النية هي جوهر كل عمل، لكنها لا تُرفَع إلَّا إذا كانت خالصة لوجه الله، لا مزروعة في حبّ مدح، ولا عيون الناس، ولا طموح الشهرة، ولا حتى في تحقيق الذات.</p>
<p dir="rtl" class="p1">كل نية تشارك فيها غير الله… تُثقلك، وكل نية صافية له وحده… ترفعك حتى لو لم يُصفّق لك أحد.</p>
<p dir="rtl" class="p1">"وَإِذَا سَجَدَ لَهُ ٱلْقَلْبُ سَبَقَ ٱلْبَدَنُ"… السجود الحقيقي لا يبدأ من الجبهة… بل من الداخل.</p>
<p dir="rtl" class="p1">أن يسجد قلبك، يعني أن:</p>
<p dir="rtl" class="p55">يُطأطئ كبرياءه،</p>
<p dir="rtl" class="p55">يُسلم اختياراته،</p>
<p dir="rtl" class="p55">يُلقي خوفه،</p>
<p dir="rtl" class="p55">يُنزل كل ما علاه… ليسكن في ظلّ "<span class="s8"><b>ٱللَّهِ</b></span>".</p>
<p dir="rtl" class="p1">وإذا سجد القلب… تبعه البدن، وسجد اللسان، وسجد الفكر، وسجدت الحياة كلها… ولو لم يركع جسدك بعد.</p>
<p dir="rtl" class="p1">"فَٱجْعَلْنِي لَكَ وَحْدَكَ، وَبِكَ وَحْدَكَ، وَلَا أُرِيدُ إِلَّا أَنْتَ"… أي: لا تجعلني مقسومًا بينك وبين غيرك، لا تجعل في قلبي بابًا مفتوحًا لسواك، لا تجعلني أُريدك… وفيّ رغبات أخرى تُزاحمك.</p>
<p dir="rtl" class="p1">علّمني.... </p>
<p dir="rtl" class="p55">أن أكون لك وحدك… لا في العبادات فقط، بل في الحياة كلّها.</p>
<p dir="rtl" class="p55">أن لا أقوم إلَّا بك، ولا أُشفى إلَّا بك، ولا أنجح إلَّا بك.</p>
<p dir="rtl" class="p55">وأن لا أُريد من الدنيا والآخرة… إلَّا أن أكون قريبًا منك.</p>
<p dir="rtl" class="p1"><b>خلاصة وجدانية:</b></p>
<p dir="rtl" class="p1">هذا الدعاء يُعيد هندسة القلب على قاعدة التوحيد النقي:</p>
<p dir="rtl" class="p55">لا يُريد شيئًا… إلَّا الله.</p>
<p dir="rtl" class="p55">ولا يسجد لأحد… إلَّا الله.</p>
<p dir="rtl" class="p55">ولا يتعلّق بروحٍ، أو هدف، أو ضوء… إلَّا إذا كانت طريقًا إليه.</p>
<p dir="rtl" class="p1">إنه دعاء الذين تعبوا من كل شيء… حتى استراحوا عند "<span class="s8"><b>ٱللَّه</b></span>".</p>
<p dir="rtl" class="p1">"يَا ٱللَّهُ… خُذ قلبي إليك أخذاً لا يُعيده إلى غيرك، واغرس في أعماقي حبك، حتّى لا أشتاق لشيءٍ إلا إذا كان منك، وسلّمني إليك تسليمًا كاملاً<br>
أُصلِّي، وأمشي، وأتكلم، وأعيش لأجلك وحدك، وبك وحدك، ولا أُريدُ سِواك".</p>
<p dir="rtl" class="p36">" ٱللَّهُمَّ… يَا إِلَٰهَ كُلّ مَنْ ضَلَّ فَوَجَدَكَ، وَتَاهَ فَعَادَ إِلَيْكَ، ٱجْعَلْنِي مِمَّنْ لَا يَتْرُكُكَ طُولَ ٱلطَّرِيقِ، وَلَا يَسْتَبْدِلُكَ بِمُتَعَارَفٍ فَانٍ، وَلَا يَسْتَبْدِلُ بِكَ سِوَاكَ، فَإِنَّكَ ٱللَّهُ، وَلَا إِلَٰهَ إِلَّا أَنْتَ ".</p>
<p dir="rtl" class="p1">كم في هذا الدعاء من صدق العائدين، وندم التائهين، وحكمة الذين عرفوا الطريق فلم يعودوا يرغبون في غيره… إنه دعاء من ذاق مرارة الضياع، ثم وجد في اسم "<span class="s8"><b>ٱللَّهُ</b></span> – <span class="s8"><b>ٱلْإِلَٰهُ</b></span>" كل ما كان يبحث عنه… فصار لا يرضى أن يُبَدِّله، ولا أن يبيع قربه، ولا أن يخطو خطوة تُبعِده عنه.</p>
<p dir="rtl" class="p1">اسمحوا لي أن أقدّم لكم الآن رسالة تأملية وجدانية عميقة حول هذا الدعاء،<br>
بأسلوب يمزج بين الصدق الروحي، وجمال العبارة، وعمق المعنى التوحيدي:</p>
<p dir="rtl" class="p1">"يَا إِلَٰهَ كُلّ مَنْ ضَلَّ فَوَجَدَكَ، وَتَاهَ فَعَادَ إِلَيْكَ…" هذا النداء لا يُنادي فيه العبد "إلهَ العالمين" فقط… بل "إلهَ الضَّالين الذين وجدوك بعد التيه"، و"إلهَ التائهين الذين رجعوا فقبلتهم"، و"إلهَ الذين ما كانوا يعرفونك كما ينبغي، فرفعتهم بمعرفتك"…</p>
<p dir="rtl" class="p1">هو نداء الفاهمين أن أعظم لحظة في الحياة… ليست حين وجدت شيئًا، بل حين وجدت "<span class="s8"><b>ٱلْإِلَٰهَ</b></span>" الذي كنت تُفتّش عنه طوال عمرك دون أن تدري.</p>
<p dir="rtl" class="p1">"ٱجْعَلْنِي مِمَّنْ لَا يَتْرُكُكَ طُولَ ٱلطَّرِيقِ"… الخذلان الحقيقي ليس أن تضلّ البداية… بل أن تبتعد عن الله تعالى في منتصف الطريق.</p>
<p dir="rtl" class="p1">كم من عبدٍ عرف الله… ثم نسيه وسط الزحام، والركض، والنجاح، والضغوط، والمغريات.</p>
<p dir="rtl" class="p1">"يا رب، إنني لا أخاف فقط من أن أضل في الظلمات… بل أخاف أكثر أن أضل وأنا في نورك، وأنا أكتب لك، وأنا أخدمك، وأنا أتلو اسمك بلساني، بينما قلبي بعيد عنك."</p>
<p dir="rtl" class="p1">"وَلَا يَسْتَبْدِلُكَ بِمُتَعَارَفٍ فَانٍ" هذه العبارة تعلمنا قيمة التوازن في حياتنا، فهي دعوة للتأمل في الأمور الدنيوية التي قد نتعلق بها ونظن أنها تعوضنا عن الرضا بالله... كثيرا ما ينساق الإنسان وراء المتاع الزائل، فيبحث عن الطمأنينة في المال، أو الشهرة، أو اللذائذ الزائلة، لكنه في النهاية يجد أن تلك الأشياء لا تمنحه الراحة الحقيقية التي تنبع من القرب من الله تعالى.</p>
<p dir="rtl" class="p1"><b>رسالة تربية:</b> لا شيء يعادل العلاقة الحقيقية بالله، ولا يمكن لأي شيء في هذه الدنيا أن يكون بديلاً عن رضا الله، عندما تظن أنك وجدت بديلاً عن الله، فأنت في الواقع تبحث في أماكن غير صحيحة، العبارة تعلمنا أن الإنسان لا يجب أن يفرط في طاعة الله أو يبتعد عنه من أجل متاع أو فكرة ظنها ستحقق له السعادة.</p>
<p dir="rtl" class="p1"><b>الرسالة الروحية:</b> إن الاستبدال بـ "المتعارَف الفاني" هو دعوة للرجوع إلى الروحانية الحقيقية التي تعتمد على الله وحده، علينا أن نتذكر دائمًا أن الزمن سيمضي والمكان سيتغير، ولكن العمل مع الله ورضاه هو المفصل الأهم في حياة المسلم. </p>
<p dir="rtl" class="p1">إذا كنت تشعر بالتقصير في علاقتك مع الله، فإن هذا الدعاء يُذكرنا بأن الطريق الوحيد للسلام الداخلي هو الاستمرار في البحث عن رضا الله وعدم الانشغال بما يلهينا عن هدفنا الأسمى.</p>
<p dir="rtl" class="p1"><b>التأمل العميق:</b> ماذا لو كانت الحياة بأسرها مجرد رحلة للبحث عن الله؟ وإذا كانت العلاقات وكل ما حولنا ما هي إلا وسائل توصلنا إلى حالة التعلق الحقيقي بالله، فكيف ننشغل بما هو زائل؟ هذا الدعاء يأخذنا إلى لحظة صفاء مع الله، لندرك أن السعي الحقيقي هو في أن لا نستبدل القرب من الله بشيء آخر، لأن الله وحده هو الذي يشبع الروح ويملأها بنور يقودها في الطريق الصحيح.</p>
<p dir="rtl" class="p1">إذاً، الرسالة الروحية والتربوية تكمن في أن إيماننا بالله لا يجب أن يتزعزع بوجود أغراءات الدنيا الزائلة، لا شيء يعوضنا عن الله سبحانه وتعالى، وكل ما في الحياة الدنيا ليس سوى وسيلة للترقي إلى القرب منه سبحانه.</p>
<p dir="rtl" class="p1">"وَلَا يَسْتَبْدِلُ بِكَ سِوَاكَ"… من ذا الذي يستبدل الله؟ إلا من جهل قدره… أو لم يعرفه أصلاً.</p>
<p dir="rtl" class="p1">كل من استبدل الله بشهوة، أو شخص، أو نجاح، أو فكرة…<br>
ظنّ أنه وجد بديلًا… لكنه سيفيق حتمًا على خيبة لا تُشبهها خيبة.</p>
<p dir="rtl" class="p1">هذا الدعاء من قلب عارف: يا رب، لا تُبقِ في قلبي شيئًا أظنه يُغنيني عنك… ولا تجعل في حياتي شخصًا أظنه يكفيني دونك… فأنت وحدك، إذا غبتَ… غاب كل شيء.</p>
<p dir="rtl" class="p1">"فَإِنَّكَ ٱللَّهُ، وَلَا إِلَٰهَ إِلَّا أَنْتَ" خاتمة مهيبة… تُذكّر بها نفسك بعد كل هذا التوجع: أنه لا إله إلَّا أنت، ولا مأمن، ولا محبوب، ولا معين… سواك.</p>
<p dir="rtl" class="p1">لا إله إلا أنت… أي: لا أحد يستحق أن يكون في قلبي قبلك.</p>
<p dir="rtl" class="p1">لا إله إلا أنت… أي: لا وجهة، لا راحة، لا مقام إلَّا بين يديك.</p>
<p dir="rtl" class="p1"><b>الرسالة الجوهرية:</b></p>
<p dir="rtl" class="p1">هذا الدعاء يُعيد تثبيت العهد بعد كل تقصير، هو نداء من قرر أن لا يعود طفلًا ضائعًا بعد أن وجد ملجأً لا يُخيّب رجاءه، هو اعتراف أن كل شيء بعد "<span class="s8"><b>ٱللَّه</b></span>" وهم… وكل شيء قبله ضياع… وكل شيء دونه فُقدان.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p77"><span class="s54"><b>ماذا لو كانت الحياة بأسرها… مجرد رحلة للبحث عن الله؟</b></span><span class="s9"><br>
<b>(</b></span><b> حين تكتشف أن كل ما عشته لم يكن صدفة، بل نداء خفي إلى وجهةٍ واحدة</b><span class="s9"><b> )...</b><b></b></span></p>
<p dir="rtl" class="p56">توقّفْ لحظة…</p>
<p dir="rtl" class="p56">تأمّل حياتك كلها كما لو أنك تراها من بعيد…<br>
طفولتك، خيباتك، خياناتك، دموعك، نشوتك، سقوطك، نهوضك…<br>
كل فصول حياتك التي مرّت كأنها فوضى، بلا خيطٍ ناظم، بلا معنى، بلا ترتيب.</p>
<p dir="rtl" class="p56">والآن… اسأل نفسك هذا السؤال:<br>
ماذا لو لم تكن الحياة كما تصوّرنا؟<br>
ماذا لو لم تكن عن الزواج والنجاح والسفر والحزن والمال والخسارة والفوز؟<br>
بل كانت كلها مجرّد رحلة واحدة طويلة… للبحث عن الله؟</p>
<p dir="rtl" class="p56">ألم تشعر يومًا أن كل ما يجري معك يهمس لك من أعماقك:<br>
"ارجع… فإنك بعيد."<br>
"اقترب… فإنك مُشتت."<br>
"اعرفني… فإن كل شيء حولك يذوب."</p>
<p dir="rtl" class="p56">ماذا لو كانت كل جراحك التي مزّقتك… لم تكن عقوبة، بل علامة؟<br>
علامة لتلتفت… أن الذي تبحث عنه في البشر لن تجده، لأن قلبك خُلق ليُحبّ الله، لا غيره.</p>
<p dir="rtl" class="p56">ماذا لو كان الفراغ الذي ينهشك رغم وفرة المال والرفقة… ليس مرضًا نفسيًّا، بل جوعًا روحيًّا؟<br>
جوعك إلى الله.</p>
<p dir="rtl" class="p56">ماذا لو كانت علاقاتك التي فشلت، وصراعاتك، ونجاحاتك، ومواقفك التي لم تفهمها…<br>
كلها كانت نقاط تنبيه في خارطة واحدة، تشير إلى موقع واحد:<br>
الله.</p>
<p dir="rtl" class="p56">ماذا لو كان كل شيء في الحياة – الحب، الفقد، النجاح، الفشل، المرض، الموت – <br>
لم يُخلَق لذاته، بل كوسيلة لتسأل في النهاية:<br>
أين الله من هذا؟<br>
ثم تبدأ الرحلة الحقيقية.</p>
<p dir="rtl" class="p56">وماذا إن كنت قد تأخّرت؟</p>
<p dir="rtl" class="p56">أبشرك…<br>
في طريق البحث عن الله، الزمن لا يحكمك،<br>
بل النية الصادقة هي مفتاح كل شيء.</p>
<p dir="rtl" class="p56">لو وجدتَه اليوم…<br>
فكل الذي ضاع منك قبل ذلك، لم يكن خسارة، بل تمهيدٌ للقائك معه.</p>
<p dir="rtl" class="p56">والله لا يُخيّب ساعيًا إليه،<br>
بل هو الذي جعل الشوق في قلبك،<br>
ثم بثّ نداءه في كل لحظة تمرّ…<br>
لتعلم أن الحياة كلها لم تكن عبثًا، بل كانت دعوة خفيّة للرجوع إليه.<br>
ليمنحك لذة الوصول بعد طول بحث.</p>
<p dir="rtl" class="p56">من قال إنك غريب؟</p>
<p dir="rtl" class="p56">قد تقول:<br>
أنا تائه، متعب، بعيد… لا أعرف حتى كيف أبدأ.</p>
<p dir="rtl" class="p56">لكن هل تعلم؟<br>
مجرد أنك الآن تقرأ هذا الكلام،<br>
يعني أن شيئًا في روحك بدأ يُفيق،<br>
أن قلبك لم يمت تمامًا… بل هو يبحث، ولو لم يُصرّح.</p>
<p dir="rtl" class="p56">وأنت الآن… لست وحدك.<br>
الله معك.<br>
حتى وإن لم ترَه… هو يرى سعيك.</p>
<p dir="rtl" class="p78"><span class="s1">قال تعالى: </span>﴿وَمَنۡ أَرَادَ ٱلۡأٓخِرَةَ وَسَعَىٰ لَهَا سَعۡيَهَا وَهُوَ مُؤۡمِنٞ فَأُوْلَٰٓئِكَ كَانَ سَعۡيُهُم مَّشۡكُورٗا﴾<span class="s13"> </span><span class="s14">الإسراء: ١٩</span><span class="s1">...</span></p>
<p dir="rtl" class="p56">كل خطوة بحث… يُشكرها الله.<br>
كل دمعة حيرة… تُحتسب عند الله.<br>
كل تنهيدة خوف… يسمعها الله.</p>
<p dir="rtl" class="p56">كيف تبحث عن الله؟</p>
<p dir="rtl" class="p56">لا تقل: أين هو؟ بل قل: كيف أفتح قلبي له؟</p>
<p dir="rtl" class="p56">لا تبدأ بالمعرفة العقلية، بل بالخلوة القلبية… اجلس، اسأل، ابكِ، وقل: "دلّني عليك يا رب."</p>
<p dir="rtl" class="p56">لا تنتظر آيةً خارقة… فكل ما حولك هو آية، لكنك كنت تنظر دون أن تبصر.</p>
<p dir="rtl" class="p56">لا تسأل عن الطريق الطويل… فكل من وصلوا، بدأوا بسجدة صدق واحدة.</p>
<p dir="rtl" class="p56">إن كنت قد ضيّعت حياتك في البحث عن الناس…<br>
فابدأ من الآن في البحث عن الله.<br>
لأنك إن وجدت الله… وجدت كل شيء.</p>
<p dir="rtl" class="p56">وإن لم تجده…<br>
فما جدوى كل شيء؟</p>
<p dir="rtl" class="p56">فيا من قرأت… لا تغلق الصفحة فقط،<br>
بل أغلق باب التشتت، وافتح باب الله.<br>
واهمس لنفسك:</p>
<p dir="rtl" class="p56">"قد أضعتُ عُمري أبحث عن شيء… والآن عرفت أنني كنت أبحث عن الله، منذ البداية."</p>
<p dir="rtl" class="p57"><br></p>
<p dir="rtl" class="p69"><b>الانحرافات العقدية والسلوكية الشائعة حول اسم "</b><span class="s8"><b>ٱللَّهُ</b></span><b> – </b><span class="s8"><b>ٱلْإِلَٰهُ</b></span><b>":</b></p>
<p dir="rtl" class="p1">من أعظم ما يجب بيانه للأمة اليوم هو: أن الانحراف عن اسم "<span class="s8"><b>ٱللَّهُ</b></span> – <span class="s8"><b>ٱلْإِلَٰهُ</b></span>" لا يكون فقط بجحوده… بل بكتمه في القلب، أو الشرك في مقامه، أو عبادة غيره دون أن يُشعَر بذلك، ولأنَّ هذا الاسم هو أصل الدين، وجوهر التوحيد، وأعظم كلمة في الوجود، فقد كثُرت الانحرافات حوله عقديًا وسلوكيًا، بعضها ظاهر، وبعضها أخفى من دبيب النمل.</p>
<p dir="rtl" class="p1">إليكم الآن عرضًا مفصلًا للانحرافات العقدية والسلوكية الشائعة حول اسم "<span class="s8"><b>ٱللَّهُ</b></span> – <span class="s8"><b>ٱلْإِلَٰهُ</b></span>"، مع التصحيح الشرعي والوجداني.</p>
<p dir="rtl" class="p25"><b>أولًا: الانحرافات العقدية حول اسم "</b><span class="s8"><b>ٱللَّهُ</b></span><b> – </b><span class="s8"><b>ٱلْإِلَٰهُ</b></span><b>"</b></p>

  <p dir="rtl" class="p16"><b>التوحيد بأن الله وحده المعبود بحق، لا يُصرف أي نوع من العبادة لغيره، قال تعالى: ﴿</b><span class="s23"><b> إِيَّاكَ نَعْبُدُ </b></span><b>﴾</b></p>
</td>
<td valign="middle" class="td202">
  <p dir="rtl" class="p17"><b>كمن يدعو غير الله، أو يذبح لغير الله، أو يعتقد أن غير الله يملك الضر أو النفع استقلالًا</b></p>
</td>
<td valign="middle" class="td461">
  <p dir="rtl" class="p17"><b>الشرك الأكبر</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td462">
  <p dir="rtl" class="p16"><b>قال النبي ﷺ: "أخوف ما أخاف على أمتي الشرك الأصغر: الرياء"، ويُصحح بالصدق والإخلاص</b></p>
</td>
<td valign="middle" class="td205">
  <p dir="rtl" class="p17"><b>كالرّياء، أو قول " لولا فلان لهلكنا " دون ذكر الله</b></p>
</td>
<td valign="middle" class="td463">
  <p dir="rtl" class="p17"><b>الشرك الأصغر</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td460">
  <p dir="rtl" class="p15"><span class="s19"><b>الصحيح أن الأسباب لا تعمل إلا بإذن الله، قال تعالى: ﴿</b></span><b>وَمَا رَمَيْتَ إِذْ رَمَيْتَ وَلَـٰكِنَّ ٱللَّهَ رَمَىٰ﴾</b><b></b></p>
</td>
<td valign="middle" class="td202">
  <p dir="rtl" class="p17"><b>الاعتقاد أن الأسباب تنفع بذاتها، كمن يعتقد أن الطبيب يشفي دون مشيئة الله</b></p>
</td>
<td valign="middle" class="td461">
  <p dir="rtl" class="p17"><b>الغلو في الأسباب</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td462">
  <p dir="rtl" class="p16"><b>الصحيح إثبات ما أثبته الله لنفسه من صفات الكمال، من غير تمثيل ولا تعطيل ولا تشبيه</b></p>
</td>
<td valign="middle" class="td205">
  <p dir="rtl" class="p17"><b>كمن ينكر صفات الله العليا بحجة التنزيه</b></p>
</td>
<td valign="middle" class="td463">
  <p dir="rtl" class="p17"><b>تعطيل صفات الإله</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td464">
  <p dir="rtl" class="p16"><b>يجب تطهير القلب من هذه الآلهة الخفية، بأن لا يُحب ولا يُخشى ولا يُرجى إلا الله وحده</b></p>
</td>
<td valign="middle" class="td202">
  <p dir="rtl" class="p17"><b>كمن يُحب أو يخاف أو يتوكل على غير الله بنفس شعور عبودي خالص</b></p>
</td>
<td valign="middle" class="td461">
  <p dir="rtl" class="p17"><b>الاعتقاد بوجود "آلهة متعددة" بشكل باطني</b></p>
</td>
</tr>
</tbody>
</table>
<p dir="rtl" class="p25"><b>ثانيًا: الانحرافات السلوكية حول اسم "</b><span class="s8"><b>ٱللَّهُ</b></span><b> – </b><span class="s8"><b>ٱلْإِلَٰهُ</b></span><b>"</b></p>
<table cellspacing="0" cellpadding="0" class="t1">
<tbody>
<tr>
<td valign="middle" class="td465">
  <p dir="rtl" class="p15"><b>التصحيح</b></p>
</td>
<td valign="middle" class="td466">
  <p dir="rtl" class="p15"><b>أمثلة عملية</b></p>
</td>
<td valign="middle" class="td467">
  <p dir="rtl" class="p15"><b>الانحراف</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td468">
  <p dir="rtl" class="p16"><b>العبودية الحقة تبدأ من التخلية: "لا إله"، ثم التحلية: "إلا الله"</b></p>
</td>
<td valign="middle" class="td469">
  <p dir="rtl" class="p17"><b>أن يقول: "أعبد الله"، بينما قلبه مليء بالخوف من الناس، أو الرجاء في المخلوق</b></p>
</td>
<td valign="middle" class="td470">
  <p dir="rtl" class="p17"><b>ادّعاء العبودية مع غياب التوحيد القلبي</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td471">
  <p dir="rtl" class="p16"><b>التصحيح أن الله يكون "الإله" في كل شيء: قبل العمل، بعده، أثناءه، وفي الغاية منه</b></p>
</td>
<td valign="middle" class="td472">
  <p dir="rtl" class="p17"><b>أن تكون طموحاته، قراراته، واختياراته مبنية على رغباته لا على مراد الله</b></p>
</td>
<td valign="middle" class="td473">
  <p dir="rtl" class="p17"><b>جعل الله ثانويًا في حياة العبد</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td468">
  <p dir="rtl" class="p15"><span class="s19"><b>قال تعالى: ﴿</b></span><b>أَفَرَءَيْتَ مَنِ ٱتَّخَذَ إِلَٰهَهُ هَوَاهُ</b><span class="s19"><b>﴾، والعلاج في كسر الهوى لله</b></span></p>
</td>
<td valign="middle" class="td469">
  <p dir="rtl" class="p17"><b>من يطيع هواه فيما يُبغضه الله، أو يبرر ذنبه بقوله: "هكذا أنا"، فقد اتخذ نفسه إلهًا</b></p>
</td>
<td valign="middle" class="td470">
  <p dir="rtl" class="p17"><b>عبادة الذات والهوى دون وعي</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td471">
  <p dir="rtl" class="p16"><b>قال النبي ﷺ: "لن يُدخل أحدكم الجنة عمله"، بل رحمة الله هي الأصل</b></p>
</td>
<td valign="middle" class="td472">
  <p dir="rtl" class="p17"><b>كمن يظن أنه ناجٍ لأنه يصلي ويصوم… دون افتقار لله</b></p>
</td>
<td valign="middle" class="td473">
  <p dir="rtl" class="p17"><b>الاغترار بالعمل والعبادة</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td474">
  <p dir="rtl" class="p16"><b>الصحيح أن "ٱللَّهُ" يُذكر باسم يملأ القلب مهابة وصدقًا، لا بلسان مُعتاد</b></p>
</td>
<td valign="middle" class="td469">
  <p dir="rtl" class="p17"><b>أن يلهج بالذكر دون خشوع أو استحضار عظمة الله</b></p>
</td>
<td valign="middle" class="td470">
  <p dir="rtl" class="p17"><b>ذِكر الله بلسان فارغ القلب</b></p>
</td>
</tr>
</tbody>
</table>
<p dir="rtl" class="p1"><b>الخلاصة الوجدانية:</b></p>
<p dir="rtl" class="p1">الانحراف عن اسم "<span class="s8"><b>ٱللَّهُ</b></span> – <span class="s8"><b>ٱلْإِلَٰهُ</b></span>" لا يكون فقط في العقيدة… بل في المقاصد، وفي السلوك، وفيمن يُعظم، وفيمن يُخاف، وفيمن يُتّبع، فربّ عبدٍ يقول "<span class="s8"><b>لَا إِلَٰهَ إِلَّا ٱللَّهُ</b></span>"، وقلبه ممتلئ بآلهة خفية، وربّ ساجدٍ… يسجد بجبهته لله، لكنه يسجد بقلبه لغيره.</p>
<p dir="rtl" class="p1"><b>كيف نصحّح ذلك؟</b></p>
<p dir="rtl" class="p36">تجديد التوحيد كل يوم: بتكرار "<span class="s8"><b>لَا إِلَٰهَ إِلَّا ٱللَّهُ"</b></span> بتدبّر، لا كعادة.</p>
<p dir="rtl" class="p36">التحقق بالعبودية الصادقة: أن تكون عبادتك له وحده… لا لنتائج، ولا لأعين، ولا لحسابات.</p>
<p dir="rtl" class="p36">تفريغ القلب من الشرك الخفي: بمراجعة: من أرجو؟ من أخاف؟ من أُرضي؟ من أُحب؟ وإن وُجد غير الله في أيٍّ منها… فذلك "إله" يجب خلعه.</p>
<p dir="rtl" class="p36">الحياء من الله: أن تقول: "<span class="s8"><b>ٱللَّهُ إِلَهِي</b></span>"، ثم تعيش كأنَّك لا تعرفه… فالتصحيح أن تُحسّ بجلال الله في نفسك، فتستحي أن تُقابله بقلب لاهٍ.</p>
<p dir="rtl" class="p19"><br></p>
<p dir="rtl" class="p24"><b>الخاتمة الوجدانية العميقة:</b></p>
<p dir="rtl" class="p1">يا من تقرأ هذه الكلمات… قف قليلًا، وأغمض قلبك قبل عينيك…<br>
وتخيّل أن الله يُناديك في وحدتك، ويقول لك:</p>
<p dir="rtl" class="p1">"أنا ٱللَّهُ… هل عرفتني حقًّا؟"</p>
<p dir="rtl" class="p1">"أنا ٱلْإِلَٰهُ… فهل عبدتني كما أستحق؟"</p>
<p dir="rtl" class="p1">إنك ما خُلقت لتجمع المال، ولا لتبحث عن الحب، ولا لتُرضي الناس، بل خُلقت لتُحب "<span class="s8"><b>ٱللَّه</b></span>" كما لم تُحب أحدًا، وتسجد له بقلبك كما لم تنحنِ لشيء، وتُقيم حياتك كلها على حقيقةٍ واحدة لا تزول: "<span class="s8"><b>لَا إِلَٰهَ إِلَّا ٱللَّهُ</b></span>"..</p>
<p dir="rtl" class="p1">كل شيء دون هذا الاسم… يَفنى.</p>
<p dir="rtl" class="p1">وكل شيء يُبنى على غيره… ينهار.</p>
<p dir="rtl" class="p1">وكل سعادة لا تبدأ من هذا الاسم… سعادة مزيفة.</p>
<p dir="rtl" class="p1">اسم "<span class="s8"><b>ٱللَّهُ</b></span>" ليس كلمة نُردّدها… بل بابٌ نطرق به على السماء، ومفتاحٌ نفتح به قلوبنا، وظلٌّ نستظلّ به من لهاث الحياة.</p>
<p dir="rtl" class="p1">واسم "<span class="s8"><b>ٱلْإِلَٰهُ</b></span>" ليس عنوانًا… بل تاجٌ على رأس قلبك، إن خلعته… تهت، وإن حفظته… عرفت من أنت، وماذا تُريد، وأين تذهب.</p>
<p dir="rtl" class="p1">وإذا أردت أن تعرف: هل عرَفت الله حقًا؟ فلا تنظُر إلى علمك… بل انظر إلى:</p>
<p dir="rtl" class="p48">إلى من تخاف حين تخاف؟</p>
<p dir="rtl" class="p48">إلى من تشتاق حين تنهار؟</p>
<p dir="rtl" class="p48">من الذي لا تنام حتى تذكُره؟</p>
<p dir="rtl" class="p48">من الذي لو اختفى من قلبك… لم تعد تعرف وجهتك؟</p>
<p dir="rtl" class="p1">فإن كان هو… فقد وجدت "ٱللَّهَ" وإن كان سواه… فما زلت على باب التوحيد تنتظر الدخول.</p>
<p dir="rtl" class="p1">آه… ما أقسى أن تعرف "<span class="s8"><b>ٱللَّه</b></span>" باللسان، وتنساه بالقلب.</p>
<p dir="rtl" class="p1">وما أوجع أن تقول: "<span class="s8"><b>لَا إِلَٰهَ إِلَّا ٱللَّه</b></span>" ثم تُحب غيره أكثر…</p>
<p dir="rtl" class="p1">وتخشى غيره أكثر…</p>
<p dir="rtl" class="p1">وتُطيع غيره أكثر…</p>
<p dir="rtl" class="p1">وتبكي على غيره أكثر…</p>
<p dir="rtl" class="p1">يا أيها القلب… ارجع إلى إلهك، إلى الله… فهو لم يتركك قط، بل كنتَ أنت من أَشَحْتَ بوجهك.</p>
<p dir="rtl" class="p1">ٱللَّهُمَّ… إنَّكَ <span class="s8"><b>ٱللَّهُ</b></span>، فاجعلني عبدًا لك لا يعرف سواك، وإنك <span class="s8"><b>ٱلْإِلَٰهُ</b></span>، فلا تجعل في قلبي رغبة إلا إليك، ولا سجدة إلا لك، ولا حبًّا أعظم من حبك، ولا رجاء أصدق من رجائي فيك، وإن ضعتُ… فردّني إليك، وإن نسيتُ… فذكّرني من أنت، فلا إله إلَّا أنت… ولا حياة إلَّا بك… ولا نور إلَّا من اسمك …ولا نجاة إلَّا فيك… يا ٱللَّه.</p>
<p dir="rtl" class="p19"><br></p>
<p dir="rtl" class="p24"><b>نصيحة مَهيبة من أعماق اسم "</b><span class="s8"><b>ٱللَّهُ </b></span><b>– </b><span class="s8"><b>ٱلْإِلَٰهُ</b></span><b>":</b></p>
<p dir="rtl" class="p1">لا تُخدع بكثرة الحركات، ولا بجمال الطرق، ولا بزينة الأسماء… فـ"<span class="s8"><b>ٱللَّهُ</b></span>" تعالى ليس فكرة تُؤمن بها فقط، بل هو الحياة كلها إن أخلصت، وهو الضياع كله إن جهلت.</p>
<p dir="rtl" class="p1">إن نسيت أي شيء في حياتك… فربما تتداركه، لكن إن نسيت "<span class="s8"><b>ٱللَّهَ</b></span>" – اسمًا، ومعنى، ومقصدًا، ومعبودًا – فقد نسيت سبب وجودك، ومصدر قوتك، ومأوى قلبك، وغاية حياتك.</p>
<p dir="rtl" class="p1">لا تُصلِّ لله… بينما تسجد لقلبك.</p>
<p dir="rtl" class="p1">لا تذكر اسمه… بينما تعتمد على نفسك.</p>
<p dir="rtl" class="p1">لا تقل "<span class="s8"><b>لَا إِلَٰهَ إِلَّا ٱللَّهُ</b></span>"… ثم تُقيم آلهة خفية في أعماقك: الخوف من الناس، رجاء القبول، التعلّق بالشكل، العبودية للصوت الأعلى، أو رأي الجمهور…</p>
<p dir="rtl" class="p1">"<span class="s8"><b>ٱللَّهُ</b></span>"… لا يرضى أن يُشاركه أحد في قلبك.</p>
<p dir="rtl" class="p1">و"<span class="s8"><b>ٱلْإِلَٰهُ</b></span>"… لا يقبل أن يكون في المرتبة الثانية.</p>
<p dir="rtl" class="p1">إن أردت أن ترى الفرق بين العارف بالله، والعارف بكل شيءٍ سواه…<br>
فانظر في "من إذا ذُكر اسم ٱللَّه، سكن قلبه"، ومن إذا ذُكر المال أو الحُلم أو الطموح… اضطرب قلبه، وارتبك يقينه.</p>
<p dir="rtl" class="p1"><b>وصية ختامية:</b></p>
<p dir="rtl" class="p1">اجعل الله هو أول من تُحب، وأعظم من تُطيع، وآخر من تُفكّر في فراقه…<br>
فإن عظُم في قلبك، صَغُر كل ما عداه، وإن ملأ اسم "<span class="s8"><b>ٱللَّه</b></span>" قلبك، فلا شيء ينقُصك بعدها أبدًا.</p>
<p dir="rtl" class="p19"><br></p>
<p dir="rtl" class="p24"><b>ماذا أتعلم من اسم الله "</b><span class="s8"><b>ٱللَّهُ</b></span><b> – </b><span class="s8"><b>ٱلْإِلَٰهُ</b></span><b>"؟</b></p>
<p dir="rtl" class="p36">أنني لست إلهًا… ولست مُخلِّصًا: من هذا الاسم أتعلّم أن دوري ليس أن أُسيطر على الناس، ولا أن أطلب خضوعهم لي، بل أن أُرشدهم إلى من هو الإله حقًا… دون أن أُزاحمه في قلوبهم.</p>
<p dir="rtl" class="p37">لا أريد أن يُحبني الناس أكثر من حبهم لله، ولا أن يخافوا مني أكثر من خشيتهم منه، ولا أن يتبعوني إن نسيتهم به.</p>
<p dir="rtl" class="p37">"<span class="s8"><b>ٱللَّهُ</b></span>" وحده من يُعبد، وأنا عبدٌ يشير إليه… لا يحجب الناس عنه.</p>
<p dir="rtl" class="p36">أن الناس لا يحتاجونني… بل يحتاجون الله: أساعدهم، وأنصحهم، وأواسيهم… لكنني لا أقدّم نفسي بديلًا عن الله، ولا ألصقهم بي حتى يصيروا عبيدًا لرضاي.</p>
<p dir="rtl" class="p37">أعلّمهم كيف يدعون الله دون وسيط، وكيف يُحبّونه دون شروط، وكيف يرجونه مباشرة، لأنَّ "<span class="s8"><b>ٱلْإِلَٰهُ</b></span>" لا يريد عبيدًا لعبيده… بل عبيدًا له وحده.</p>
<p dir="rtl" class="p36">أنني لا أنفع الناس حقًا… إلَّا إذا دَلَلْتُهم عليه: فأعظم نفع أُقدّمه للناس ليس أن أواسيهم مؤقتًا، بل أن أُعيد وصلهم بمن خلقهم، وفطرهم، ويعلم خفاياهم، ويغفر ضعفهم.</p>
<p dir="rtl" class="p37">من دلّ الناس على الله سبحانه وتعالى… فقد أنقذهم من أنفسهم، ومن علّقهم بنفسه… فقد قطع عنهم النور من أصله.</p>
<p dir="rtl" class="p1"><b>الجوهر العميق:</b></p>
<p dir="rtl" class="p1">إذا عرفت "<span class="s8"><b>ٱللَّهُ</b></span> – <span class="s8"><b>ٱلْإِلَٰهُ</b></span>" حقًا… فلن تسعَ لأن تكون محبوبًا، بل أن يكون الله محبوبًا بسببك، ولن تفرح بكثرة الأتباع… بل بكثرة العائدين إلى الله من خلالك، ولن تبحث عن أن يُقال لك: "أنقذتني"… بل أن تسمعهم يقولون:</p>
<p dir="rtl" class="p1">"دللتني على الإله… فعرفت من أكون."</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p14"><b>دعاء خاشع خاص بهذا المعنى:</b></p>
<p dir="rtl" class="p1">" ٱللَّهُمَّ… يَا مَنْ أَنْتَ ٱللَّهُ، وَلَا إِلَٰهَ إِلَّا أَنْتَ، ٱجْعَلْنِي سَبَبًا فِي أَنْ يَعْرِفَكَ ٱلنَّاسُ، وَلَا تَجْعَلْنِي حِجَابًا بَيْنَهُمْ وَبَيْنَكَ، وَإِذَا أَحَبُّونِي، فَاجْعَلْ حُبَّهُمْ طَرِيقًا إِلَيْكَ، لَا نِهَايَةً عِنْدِي. </p>
<p dir="rtl" class="p1">ٱللَّهُمَّ… طَهِّرْ نَصِيحَتِي مِنَ ٱلرِّيَاءِ، وَكَلَامِي مِنَ ٱلْغُرُورِ، وَنَفْعِي مِنَ ٱلتَّمَسُّكِ بِٱلنَّفْسِ، وَاجْعَلْنِي بَابًا يُفْتَحُ عَلَيْهِمْ بِكَ، لَا بِي، وَيُحِبُّونَكَ فِيهِ، لَا يُقِيمُونَنِي مَقَامَكَ ".</p>
<p dir="rtl" class="p1">هذا الدعاء ليس مجرّد مناجاة… بل هو ميثاق عبودية خالص، يكتبه القلب نيابة عن كل عبدٍ أراد أن يخدم دين الله، دون أن يسرق المجد من صاحبه.</p>
<p dir="rtl" class="p1">دعاء من ذاق حلاوة التأثير… لكنه خاف أن يُفتن به، ومن عرف أن محبة الناس كنز… لكنها قد تتحوّل إلى شرك ناعم إن لم تُربط بالله، وإليكم الرسالة التأملية العميقة والمهيبة لهذا الدعاء العظيم، كما يليق بجلال "<span class="s8"><b>ٱللَّه</b></span> – <span class="s8"><b>ٱلْإِلَٰهُ</b></span>":</p>
<p dir="rtl" class="p1">"ٱللَّهُمَّ… يَا مَنْ أَنْتَ ٱللَّهُ، وَلَا إِلَٰهَ إِلَّا أَنْتَ…" دعاء يبدأ بالتجريد التام: أنت وحدك الله، ولا أحد يستحق أن يُقصد، ويُخشى، ويُرجى، ويُعبد… إلا أنت"... ليس فيه تقديم للنفس، ولا إشارة للجهد، ولا ذكر للأثر…<br>
بل إخلاص البداية، وتنزيه الوجهة.</p>
<p dir="rtl" class="p1">من بدأ دعاءه باسم "<span class="s8"><b>ٱللَّه</b></span>"… بدأ من المصدر، من الأصل، من العظمة.</p>
<p dir="rtl" class="p1">"ٱجْعَلْنِي سَبَبًا فِي أَنْ يَعْرِفَكَ ٱلنَّاسُ…" يا رب، لا أطلب أن يُقال عني مؤثّر، ولا مبدع، ولا ملهم… بل أن أكون سببًا خفيًّا في أن تُعرف أنت، لا أن أُذكر أنا.</p>
<p dir="rtl" class="p47">أن لا يراني الناس… بل يرونك أنت..</p>
<p dir="rtl" class="p47">أن يسمعوا صوتي… فيشتاقوا لسماعك..</p>
<p dir="rtl" class="p47">أن يتأثروا بكلمتي… فتهزهم عظمتك، لا حروفي.</p>
<p dir="rtl" class="p1">هذا هو شرف الخدمة في مقام "<span class="s8"><b>ٱلْإِلَٰه</b></span>": أن تُعَرِّف الناس على من يستحق أن تعرفه القلوب لا الوجوه.</p>
<p dir="rtl" class="p1">"وَلَا تَجْعَلْنِي حِجَابًا بَيْنَهُمْ وَبَيْنَكَ…" أخطر دور قد تقع فيه وأنت تدل الناس على الله… أن تقف في المنتصف، وتنسى أن تتنحّى.</p>
<p dir="rtl" class="p1">أن يُحبّك الناس، فيتعلّقوا بك بدلًا من الله..</p>
<p dir="rtl" class="p1">أن يُبهروا بعلمك، فينسوا نور الحق..</p>
<p dir="rtl" class="p1">أن يُصدّقوك دائمًا، حتى وإن غبت عن الصدق.</p>
<p dir="rtl" class="p1">هذا الدعاء استغفار مبكّر: "يا رب… لا تسمح لي أن أُحبس في قلوب الناس، ولا أن يُغلَق الباب إليك بسبب حضوري المفرط بينهم."</p>
<p dir="rtl" class="p1">"وَإِذَا أَحَبُّونِي، فَاجْعَلْ حُبَّهُمْ طَرِيقًا إِلَيْكَ، لَا نِهَايَةً عِنْدِي.".. العارفون لا يهربون من محبة الناس… لكنهم يُسلِمونها لله، حتى لا تُصبح عِبئًا، ولا وثنًا، ولا سجنًا.</p>
<p dir="rtl" class="p1">أن تُحَب لله… نعمة، وأن تُحَب "كإله بديل عن الله"… فتنة.</p>
<p dir="rtl" class="p1">دعاؤك هنا هو: "اجعل محبتهم لي طريقًا إليك… لا حائطًا يمنعهم عنك."</p>
<p dir="rtl" class="p1">"ٱللَّهُمَّ… طَهِّرْ نَصِيحَتِي مِنَ ٱلرِّيَاءِ، وَكَلَامِي مِنَ ٱلْغُرُورِ، وَنَفْعِي مِنَ ٱلتَّمَسُّكِ بِٱلنَّفْسِ…" لا أحد يملك نفسه تمامًا… حتى العامل لله، قد يتلوّن، يتفاخر، يفرح بالمكانة، يُجرَح إن لم يُذكر…</p>
<p dir="rtl" class="p1">لذا هذا المقطع هو دعاء التنقية المستمرة، لكي لا تُلوث العبادة بنظرة إعجاب، ولا النصيحة بتثبيت ذات، ولا النفْع بحب التقدير.</p>
<p dir="rtl" class="p1">"يا رب… لا تجعلني أُعطي، ثم أحتجز الأجر لنفسي… بل اجعل كل ما يُرى مني، صدى لما أردتَ أنت أن يُقال."</p>
<p dir="rtl" class="p1">"وَاجْعَلْنِي بَابًا يُفْتَحُ عَلَيْهِمْ بِكَ، لَا بِي…" هذا الدعاء يُعبّر عن التجرّد الكامل من الذات، أن تكون وسيلةً لإيصال الناس إلى الله دون أن تَسعى إلى الظهور أو التفاخر، فتكون بابًا مفتوحًا، ولكن أنت لست المقصود.</p>
<p dir="rtl" class="p1">لا تزين نفسك ولا تفتخر، بل تظل مستعدًا لأن تُفتَح القلوب عبرك، ولكن الفضل كلّه لله، العمل لله وحده، لا من أجل المديح أو الاعتراف، بل لتكون وسيلة للإيمان ونورًا للقلوب.</p>
<p dir="rtl" class="p1">هذه العبارة تدل على التواضع الكامل، حيث يتخلى الشخص عن كل شكل من أشكال الشهرة أو الظهور الشخصي، فيسعى فقط لأن يكون طريقًا لله سبحانه وتعالى.</p>
<p dir="rtl" class="p1">الحديث عن باب الله يشير إلى أن الوصول إلى الله لا يأتي من خلال المظاهر أو الوسائل الظاهرة، بل من خلال إخلاص النية وفناء النفس في طلب رضا الله. فتُصبح مفتاحًا حقيقيًا عندما تتخلى عن كل شيء وتُكرّس نفسك لفتح قلوب الآخرين لله، لا يُفتح باب الله إلَّا بمن يخلع نفسه من كل شيء سوى الله، ليكون سَبيلاً للنور والرحمة.</p>
<p dir="rtl" class="p1"><b>الرسالة التربوية:</b> أنَّ العبودية لله هي تجرد من الذات، حيث لا يوجد في العمل من أجل الله أي مكان للتفاخر أو التسويق للذات، بل السَّعي الصادق لنيل رضا الله فقط، وتكون أنت مجرد وسيلة تُظهر الله وتُعلن عن نوره في حياتك.</p>
<p dir="rtl" class="p1">"وَيُحِبُّونَكَ فِيهِ، لَا يُقِيمُونَنِي مَقَامَكَ"... هذه العبارة تعكس التوحيد التام، الذي لا يَقبل أن يكون أي شيء أمام الله أو في مكانه، إنه نداء للتجرد الكامل عن الأنا والذات في سبيل العبودية الخالصة لله، الشخص في هذه العبارة يذكر أن محبة الناس له لا يجب أن تُلهيهم عن محبة الله. </p>
<p dir="rtl" class="p1">هم يحبونه، لكن لا يرفعون مكانه فوق مكانة الله، ولا يجعلون وجوده هو المقام الأول في قلوبهم، فحتى في الحب، يكون الله أولًا وأخيرًا.</p>
<p dir="rtl" class="p1"><b>الرسالة الروحية والتربوية:</b> العبارة دعوة للتواضع التام، أن نحب الله حبًا لا شريك فيه، وأن الإنسان لا يجوز له أن يطلب أن يُقابل بالله في المقام أو أن يُعظم ذاته أمام إلهه، بل يجب أن نكون مثل الوعاء الذي يملؤه الله، دون أن يُفكر في أن يكون المقام له، بل يُفني نفسه في خدمة الله.</p>
<p dir="rtl" class="p1"><b>الرسالة الجوهرية:</b></p>
<p dir="rtl" class="p1">هذا الدعاء ليس لمن يريد التأثير فقط، بل لمن يريد أن ينجح دون أن يسرق النور، ويُحَب دون أن يُعبد، ويَظهر دون أن يُزيح الله من القلوب... إنه دعاء العارفين بـ"<span class="s8"><b>ٱللَّه</b></span> – <span class="s8"><b>ٱلْإِلَٰه</b></span>".</p>
<p dir="rtl" class="p19"><br></p>
<p dir="rtl" class="p24"><b>المقاصد العقدية لاسم الله "</b><span class="s8"><b>ٱللَّهُ</b></span><b> – </b><span class="s8"><b>ٱلْإِلَٰهُ</b></span><b>":</b></p>
<p dir="rtl" class="p25"><b>أولًا: اسم "</b><span class="s8"><b>ٱللَّهُ</b></span><b>"… الاسم الجامع لكل الأسماء والصفات</b></p>
<p dir="rtl" class="p1">اسم "<span class="s8"><b>ٱللَّهُ</b></span>" هو أعظم الأسماء وأشرفها، وهو اسم يختص به الذات الإلهية في أعلى مراتب التقديس والعظمة، لا يمكن أن يُدرك هذا الاسم في حد ذاته إلَّا من خلال التأمل العميق في معانيه الجوهرية، لاسم "<span class="s8"><b>ٱللَّهُ</b></span>" في العقيدة الإسلامية مقاصد عقدية عظيمة تنطوي على الركائز الأساسية لفهم التوحيد، وعلاقة المؤمن بالله سبحانه وتعالى.</p>
<p dir="rtl" class="p36">توحيد الله في الذات والأسماء والصفات: اسم "<span class="s8"><b>ٱللَّهُ</b></span>" هو أسمى الأسماء، وهو دالٌّ على الذات الإلهية التي لا تشبهها شيء في الوجود، هذا الاسم يدل على توحيد الله في ذاته وأسمائه وصفاته، حيث أنَّ الله لا شريك له ولا مثيل له في أي جانب من جوانب الوجود ،يقول الله تعالى:"اللَّهُ لَا إِلٰهَ إِلَّا هُوَ"، هذا التوحيد في الذات والأسماء والصفات يعني أن الله سبحانه وتعالى هو المعبود الحق الذي لا يشارك في هذا المقام أحد.</p>
<p dir="rtl" class="p36">شمولية قدرة الله: اسم "<span class="s8"><b>ٱللَّهُ</b></span>" يعبر عن شمولية القدرة الإلهية، فكل شيء في الكون مُقدّر بإرادته، لا تخرج أي ذرة من الكون عن سُلطانه، ولا يحدث شيء إلَّا بإرادته، يقول الله تعالى: <span class="s15">﴿إِنَّمَآ أَمۡرُهُۥٓ إِذَآ أَرَادَ شَيۡـًٔا أَن يَقُولَ لَهُۥ كُن فَيَكُونُ﴾</span><span class="s13"> </span><span class="s12">يس: ٨٢</span>، إذًا، قدرة الله هي المتحكمة في كل شيء، ولا شيء خارج عن مشيئته.</p>
<p dir="rtl" class="p36">الله هو الخالق والـمُدبر: اسم "<span class="s8"><b>ٱللَّهُ</b></span>" يدل على أنَّ الله هو الخالق والـمُدبر لكل شيء في هذا الكون، فكل شيء تم خلقه بحسب تدبيره وحكمته، وكل شيء يمر عليه مشيئته و إرادته، الله هو الذي خلق السماوات والأرض وسيَّر الكون وفقاً لحكمة إلهية دقيقة لا تخطئ، يقول الله تعالى: <span class="s15">﴿ٱللَّهُ خَٰلِقُ كُلِّ شَيۡءٖۖ وَهُوَ عَلَىٰ كُلِّ شَيۡءٖ وَكِيلٞ﴾</span><span class="s13"> </span><span class="s12">الزمر: ٦٢</span>.</p>
<p dir="rtl" class="p36">الله هو المعبود وحده: اسم "<span class="s8"><b>ٱللَّهُ</b></span>" يتضمن أعلى درجات العبادة، وهو يشير إلى أنَّ الله وحده هو المستحق للعبادة، وأن جميع أنواع العبادة - من صلاة، ودعاء، وذبح، وصدقة، وغيرها - يجب أن تكون موجهة إلى الله فقط، العبادة في الإسلام هي إظهار التوحيد لله وإفراده بالعبادة، يقول الله تعالى: <span class="s15"> ﴿قُلۡ إِنَّ صَلَاتِي وَنُسُكِي وَمَحۡيَايَ وَمَمَاتِي لِلَّهِ رَبِّ ٱلۡعَٰلَمِينَ﴾</span><span class="s13"> </span><span class="s12">الأنعام: ١٦٢</span>.</p>
<p dir="rtl" class="p36">الله قريب من عباده: اسم "<span class="s8"><b>ٱللَّهُ</b></span>" يدل على أنَّ الله أقرب إلى العبد من حبل الوريد، هو قريب من عباده، يجيب دعاءهم، ويسمعهم، ويغفر لهم، يقول الله تعالى: <span class="s15">﴿وَإِذَا سَأَلَكَ عِبَادِي عَنِّي فَإِنِّي قَرِيبٌۖ أُجِيبُ دَعۡوَةَ ٱلدَّاعِ إِذَا دَعَانِۖ فَلۡيَسۡتَجِيبُواْ لِي وَلۡيُؤۡمِنُواْ بِي لَعَلَّهُمۡ يَرۡشُدُونَ﴾</span><span class="s13"> </span><span class="s12">البقرة: ١٨٦</span>، هذه القربى روحانية كبيرة في حياة المسلم، فهي تجعل المؤمن يشعر بأنَّ الله سبحانه وتعالى معه في كل لحظة، لا يحتاج للبحث عن مساعد أو شفيع.</p>
<p dir="rtl" class="p36">الله هو المالك والمتصرف في كل شيء: اسم "<span class="s8"><b>ٱللَّهُ</b></span>" يدل على أنَّ الله مالك الملك وأنه هو الذي يملك كل شيء في السماوات والأرض، لا يُستثنى شيء من ملكه، وكل شيء هو بتقديره، يقول الله تعالى:<span class="s15"> ﴿قُلِ ٱللَّهُمَّ مَٰلِكَ ٱلۡمُلۡكِ تُؤۡتِي ٱلۡمُلۡكَ مَن تَشَآءُ وَتَنزِعُ ٱلۡمُلۡكَ مِمَّن تَشَآءُ وَتُعِزُّ مَن تَشَآءُ وَتُذِلُّ مَن تَشَآءُۖ بِيَدِكَ ٱلۡخَيۡرُۖ إِنَّكَ عَلَىٰ كُلِّ شَيۡءٖ قَدِيرٞ﴾ ﴿قُلِ ٱللَّهُمَّ مَٰلِكَ ٱلۡمُلۡكِ تُؤۡتِي ٱلۡمُلۡكَ مَن تَشَآءُ وَتَنزِعُ ٱلۡمُلۡكَ مِمَّن تَشَآءُ وَتُعِزُّ مَن تَشَآءُ وَتُذِلُّ مَن تَشَآءُۖ بِيَدِكَ ٱلۡخَيۡرُۖ إِنَّكَ عَلَىٰ كُلِّ شَيۡءٖ قَدِيرٞ﴾</span><span class="s13"> </span><span class="s12">آل عمران: ٢٦</span>. </p>
<p dir="rtl" class="p36">الله هو الحق المطلق: اسم "<span class="s8"><b>ٱللَّهُ</b></span>" يعبر عن أن الله هو الحق المطلق الذي لا يُنازع، ولا يُغلب، ما وعد به الله لا يمكن أن يُخلف، وهو الذي يصحح كل الأمور، يقول الله تعالى:<span class="s15"> ﴿وَٱلَّذِينَ ءَامَنُواْ وَعَمِلُواْ ٱلصَّٰلِحَٰتِ سَنُدۡخِلُهُمۡ جَنَّٰتٖ تَجۡرِي مِن تَحۡتِهَا ٱلۡأَنۡهَٰرُ خَٰلِدِينَ فِيهَآ أَبَدٗاۖ وَعۡدَ ٱللَّهِ حَقّٗاۚ وَمَنۡ أَصۡدَقُ مِنَ ٱللَّهِ قِيلٗا﴾</span><span class="s13"> </span><span class="s12">النساء: ١٢٢</span>.</p>
<p dir="rtl" class="p36">لا شريك لله: اسم "<span class="s8"><b>ٱللَّهُ</b></span>" في عقيدة التوحيد يعني أنَّ الله لا شريك له في أي شيء، لا في ذاته، ولا في أسمائه، ولا في صفاته، ولا في عبادته، قوله تعالى:"لَا إِلٰهَ إِلَّا هُوَ" تؤكد توحيد الله في ربوبيته وألوهيته.</p>
<p dir="rtl" class="p1"><b>الخلاصة:</b></p>
<p dir="rtl" class="p1">ٱللَّهُ هو الاسم الأعظم الذي يشتمل على كل معاني الألوهية والقدرة والرحمة، ويدل على أنَّ الله واحد في ذاته وأسمائه وصفاته، وهو المالك المدبر الذي لا يُشارك في ملكه أحد، وهو الرَّحمن الرَّحيم الذي قريب من عباده يسمع دعاءهم ويستجيب لهم، توحيد الله في العبادة والطاعة هو أساس النجاة في الدنيا والآخرة، ولهذا فإن اسم "<span class="s8"><b>ٱللَّهُ</b></span> "هو أسمى الأسماء وأعظمها في قلب المؤمن.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p25"><b>ثانيًا: اسم "</b><span class="s8"><b>ٱلْإِلَٰهُ</b></span><b>"… جوهر العبادة وحقيقة التوحيد:</b></p>
<p dir="rtl" class="p1">اسم <b>"</b><span class="s8"><b>ٱلْإِلَٰهُ</b></span><b>"</b> هو اسم عظيم من أسماء الله الحسنى التي تمثل إحدى أبعاد الوحدانية والعبودية لله عز وجل، وهو يعبّر عن إرادة الله المطلقة، التي لا يشاركه فيها أحد، <span class="s8"><b>ٱلْإِلَٰهُ</b></span> ليس مجرد اسم، بل هو الجوهر الذي تندمج فيه الصفات الإلهية، ويستحق أن يُعبد ويُتوجه إليه كل قلب وعقل وروح، وفيما يلي المقاصد العقدية العميقة لاسم <span class="s8"><b>ٱلْإِلَٰهُ</b></span>:</p>
<p dir="rtl" class="p36">التوحيد المطلق في العبادة: <span class="s8"><b>ٱلْإِلَٰهُ</b></span> هو الذي يستحق العبادة وحده دون شريك، وهو مستقل في ذاته وأفعاله، وله الحق الكامل في أن يُعبد، عبادة الله وحده هي الأساس الذي يقوم عليه الدين، ولا يجوز أن يُشرك معه أحد في العبادة، هذا يُظهر التركيز التام على عبادة الله وحده، والتسليم الكامل لسلطانه في حياة المسلم، فالإله هو الذي يتفرد بكل الألوهية ويستحق العبادة بلا منازع.</p>
<p dir="rtl" class="p36">الله هو المعبود الوحيد في الوجود: <span class="s8"><b>ٱلْإِلَٰهُ</b></span> هو الذي يتوجه إليه قلب كل مؤمن في أوقات الشدّة والرغبة، لا معبود بحق سواه، التوجه إليه في العبادة هو الغاية القصوى للإنسان، كل ما في الكون يخضع لإرادته، لأنَّ إلهيته تشمل كل شيء في هذا الوجود، فهو الذي يحيط بكل شيء، لا مفر من حكمه ولا يمكن الهروب من سلطانه.</p>
<p dir="rtl" class="p36">الإلهية والعبودية تتكامل في الإسلام: <span class="s8"><b>ٱلْإِلَٰهُ</b></span> هو الذي يوجب على عباده أن يسلموا له خضوعًا تامًا وأن يطيعوا أوامره، وهذا يشمل العبادة في جميع جوانب الحياة، من الصلاة والصوم إلى التعامل مع الآخرين، في الإسلام، تكون العبودية لله هي أساس العلاقة بين الإنسان وإلهه، ويكون التسليم لله والتوجه إليه في جميع الأمور مفتاحًا للوصول إلى السعادة والراحة النفسية.</p>
<p dir="rtl" class="p36">الإله الواحد المتفرد في الخلق والتدبير: <span class="s8"><b>ٱلْإِلَٰهُ</b></span> هو الذي خلق كل شيء و يدير الكون بنظامه الدقيق، هو الذي يمنح الحياة ويُقدّر الموت، لا يوجد من يشارك الله في الخلق أو التدبير، وكل شيء في الكون يسير بتقديره وإرادته.</p>
<p dir="rtl" class="p36">الخضوع المطلق لله: <span class="s8"><b>ٱلْإِلَٰهُ</b></span> هو الذي لا يعارضه شيء، ولا أحد يمكن أن يُدير أمور الكون سواه، الخضوع لله ليس اختياريًا، بل هو شرط لتحقيق العدالة والسعادة في هذا العالم، يجب على الإنسان أن يدرك أن كل أموره متعلقة بحكم الله.</p>
<p dir="rtl" class="p36">الله هو مصدر الطُّمأنينة والراحة: اسم <span class="s8"><b>ٱلْإِلَٰهُ</b></span> هو مفتاح السكينة والراحة للقلوب، لا شيء في هذا الوجود يمكن أن يعوض الإنسان عن الراحة التي يحصل عليها من الاعتماد الكامل على الله، ٱلْإِلَٰهُ هو الملاذ الأخير الذي يلجأ إليه الإنسان في جميع الأوقات.</p>
<p dir="rtl" class="p36">الإله الذي لا تُحاط به العقول: <span class="s8"><b>ٱلْإِلَٰهُ</b></span> هو الذي لا تدركه العقول ولا تحده التصورات، مهما حاولنا فهمه أو تدبره، فإنَّ علمه يظل محيطًا بكل شيء، وأسرار ألوهيته تتجاوز حدود البشر، يقول الله تعالى:<span class="s15"> ﴿لَّا تُدۡرِكُهُ ٱلۡأَبۡصَٰرُ وَهُوَ يُدۡرِكُ ٱلۡأَبۡصَٰرَۖ وَهُوَ ٱللَّطِيفُ ٱلۡخَبِيرُ﴾</span><span class="s13"> </span><span class="s12">الأنعام: ١٠٣</span>.</p>
<p dir="rtl" class="p36">العبادة تتطلب التفرد لله: <span class="s8"><b>ٱلْإِلَٰهُ</b></span> هو الذي يستحق العبادة وحده دون شريك، لا شيء يمكن أن يُعبد إلَّا الله، ولا يمكن لأي أحد أن يشرك به في العبادة، لهذا، إفراد الله بالعبادة هو جوهر التوحيد في الإسلام، وأساس العقيدة الإسلامية.</p>
<p dir="rtl" class="p1"><b>الخلاصة:</b></p>
<p dir="rtl" class="p1"><span class="s8"><b>ٱلْإِلَٰهُ</b></span> هو الواحد الأحد، الذي لا شريك له في ذاته أو صفاته أو أفعاله، هو مُستحق العبادة دون غيره، وهو المالك والمدبر لكل شيء في الكون، إنَّ الإيمان بأنَّ <span class="s8"><b>ٱلْإِلَٰهُ</b></span> هو الذي يُدير كل شيء ويُقدّر المصير، يجعل المؤمن يتوجه إليه بكل ما في قلبه ويديه من توحيد وخضوع.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p25"><b>ثالثًا: المقاصد العليا التي تُبنى على معرفة "</b><span class="s8"><b>ٱللَّهُ</b></span><b> – </b><span class="s8"><b>ٱلْإِلَٰهُ</b></span><b>"</b></p>

<p dir="rtl" class="p1"><b>دعاء خاشع جامع:</b></p>
<p dir="rtl" class="p1">" اللَّهُمَّ… علّمني معنى اسمك "<span class="s8"><b>ٱللَّه</b></span>"، حتى لا أُعظّم غيرك، وعلّمني عمق اسمك "<span class="s8"><b>ٱلْإِلَٰه</b></span>"، حتى لا أعبد أحدًا سواك، واجعلني عبدًا لك في سري وظاهري،<br>
وطهّر قلبي من كل شريك… ظاهِرًا كان أو خفيًّا، فلا أرجو غيرك، ولا أركن إلَّا إليك، ولا أُسلم قلبي إلا لمن خلقه، لأنك أنت <span class="s8"><b>ٱللَّه</b></span>… <span class="s8"><b>وٱلْإِلَٰه</b></span>… ولا إله غيرك.</p>
