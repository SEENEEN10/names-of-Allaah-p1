<p dir="rtl" class="p80"><br></p>
<p dir="rtl" class="p24"><b>حين يتجلّى اسمُ اللهِ "</b><span class="s8"><b>ذُو ٱلْجَلَالِ وَٱلْإِكْرَامِ</b></span><b>" في قلبك...</b></p>
<p dir="rtl" class="p1"><span class="s7"><b>فإنك لا تبقى كما كنت...</b></span> كأنك تنسلّ من ضجيج الدنيا إلى ساحةٍ من نور، حضرةٍ لا يُدركها الوصف، تُطأطئ فيها كبرياءك، كما يُطأطأ الرأس خضوعًا لعظمة من لا يُشبهه شيء.</p>
<p dir="rtl" class="p1">تهتزّ الروح في محراب هذا الاسم كما تهتزّ الأغصان تحت أمطار النور، فأنت في حضرة الجليل، العظيم، الكريم، الذي لا يُدرك كُنهه عقل، ولا يُحاط بجلاله وصف.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p73"><b>حين يتجلّى هذا الاسم في فؤادك...</b></p>
<p dir="rtl" class="p1">لا تعود العبادة عادة، ولا الصلاة حركات، بل تجدك واقفًا بخشوع مَن يتلمّس عتبة المقام، يُنصت لنداء الغيب، ويخاطب من فاقت رحمته كل مأمول، وسمَت هيبته عن كل متخيّل.</p>
<p dir="rtl" class="p1">تركع… لا بجسدك فقط، بل بأمانيك، … ثم تسجد، وكأنك تعترف: "يا رب… لا مقام لي إلَّا بين يديك، ولا كرامة أعظم من أن أنتمي إليك."</p>
<p dir="rtl" class="p73"><b>وحين يتجلّى هذا الاسم في لسانك...</b></p>
<p dir="rtl" class="p1">لا يخرج منه إلَّا ما يُرضي، تستحي أن تنطق بما لا يليق بمن شهدتَ جلاله، فتغدو الكلمات ميزانًا، والسكوت عبادة، لأنَّ من عاين الجلال… لا يُفرّط في حُرمة القول.</p>
<p dir="rtl" class="p73"><b>وإذا أشرق هذا الاسم في قلبك...</b></p>
<p dir="rtl" class="p81">نُزِعت منه شوائب التفاخر، وتساقطت عنه أثقال الحسد، والرياء، والتعلّق بمديح الناس... فمن عرف كرم الله… استغنى عن إكرام الخلق، ومن ذاق فيض عطائه… زهد في زخارف الظهور.</p>
<p dir="rtl" class="p1">خفت، لكن دون هلع، ورجوت، لكن دون طمع أجوف، أحببت… دون أن تربط محبتك بمقابل، وخدمت… لا لجزاء، بل لأنك عرفت مقام من تخدمه.</p>
<p dir="rtl" class="p1">صار سلوكك دعوة، وصبرك آية، وصمتك تسبيحًا، ووجهك مرفأ رجاءٍ للحيارى، بابًا من نور… لا إلى ذاتك، بل إلى الله سبحانه وتعالى.</p>
<p dir="rtl" class="p1">فلا تسأل: ماذا يحدث حين يتجلّى هذا الاسم؟ بل اسأل: كيف مضت أيامي دون أن أعي من هو "<span class="s8"><b>ذُو ٱلْجَلَالِ وَٱلْإِكْرَامِ</b></span>"؟ وكيف جرؤ قلبي أن يغفل… عن عظمة من إليه مصيري وبه حياتي؟ وكيف طاب لي العيش… دون أن أَسكن إلى جلاله، وأطمع في إكرامه؟.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p44">( الرَّب )</p>
<p dir="rtl" class="p1">إذا أردت أن تُفتّش عن الكلمة التي تلامس خلايا روحك قبل أذنك…<br>
فلا تقل "خالق"، ولا تقل "رازق"، ولا حتى "غفور"… بل قل"<span class="s8"><b>ٱلرَّبّ</b></span>".</p>
<p dir="rtl" class="p1">لأن "<span class="s8"><b>ٱلرَّبّ</b></span>"… هو الاسم الذي لا يُناديه إلَّا من انكسر،<br>
"<span class="s8"><b>يارب</b></span>"... ولا يشتاق إليه إلا من تعثّر"<span class="s8"><b>يارب</b></span>"، ولا يفهمه إلَّا من جرّب أن يُربَّى في ظلمة... "<span class="s8"><b>يارب</b></span>"، ثم أُخرج إلى النور… لا بنفسه، بل بيدٍ خفيةٍ لا يراها… ويشعر بها... "<span class="s8"><b>يارب</b></span>".</p>
<p dir="rtl" class="p1"><span class="s8"><b>ٱلرَّبّ...</b></span> هو الذي لم ينتظر منك استحقاقًا حتى يُحبّك، ولا جاهزية حتى يُناديك، بل هو الذي أخذك طفلًا تائهًا، وربّاك خطوةً بخطوة، وجعلك تمشي، ثم تسقط، ثم ينظر إليك برحمة وهو يُعيدك… لا ليُوبّخك، بل ليُعيد ترتيبك.</p>
<p dir="rtl" class="p1">حين تقول:"<span class="s8"><b>ياربِّ</b></span>"... فأنت لا تنادي مالكًا فقط، بل تنادي مُربيًا، ناصحًا، مُعدًّا، مصححًا، راعيًا، مُخطّطًا لأدق تفاصيل عمرك.</p>
<p dir="rtl" class="p1">هو الذي يزرع النور في عينك… وأنت لا تزال في الغفلة، ويُصلح قلبك… وأنت تُحاربه، ويُربّي نيتك… وأنت لا تعرف ماذا تنوي!.</p>
<p dir="rtl" class="p1">"<span class="s8"><b>ٱلرَّبّ</b></span>" هو الاسم الذي لا تسمعه… بل تعيشه... تسمعه في صوت بكائك حين ضاقت عليك الحياة، وتراه في يد العافية وهي تعود بعد طول مرض، وتُبصره في خُلقك وقد صار أنقى مما كنت… دون أن تدري كيف.</p>
<p dir="rtl" class="p1">"<span class="s8"><b>ٱلرَّبّ</b></span>" هو من لا يُهذبك بعصا، بل يُربّيك برحمة... ولا يأخذك إلى النور بالعُنف، بل بالانكسار.</p>
<p dir="rtl" class="p1">هل تعلم متى تبدأ رحلة القلب مع اسم "<span class="s8"><b>ٱلرَّبّ</b></span>"؟ حين تكفّ عن سؤاله لماذا؟ وتبدأ تقول له:"<span class="s39">ربِّ، اكمل تربيتك فيّ، وإن لم أفهم بعد</span>."</p>
<p dir="rtl" class="p1">حين تفهم أن البلاء ليس نقمة، وأن تأخّر الفرج ليس تجاهلًا، وأن الخذلان من الناس… كان درسًا في أنَّ <span class="s8"><b>الرَّبّ</b></span> لا يُشبه أحدًا.</p>
<p dir="rtl" class="p1">يا من تبحث عن الأمان في صدر بشر… أما آن لقلبك أن يتربّى في نور قُربه؟ أن يسكن في رحاب لطفه؟ أن يستقر في ظل رحمته؟ أن يأنس بدفء عنايته؟...</p>
<p dir="rtl" class="p1">يا من ظننت أنَّ النجاة في قوةٍ منك… أما آااان لك أن تعترف أنَّ النجاة ليست فيك، بل فيمن يربّيك؟.</p>
<p dir="rtl" class="p1">يا الله… يا ربّ كل شيء… </p>
<p dir="rtl" class="p1">يا من ربيت يوسف عليه السلام في الجبّ،</p>
<p dir="rtl" class="p1">وموسى عليه السلام في بيت فرعون،</p>
<p dir="rtl" class="p1">ومحمّدًا صلى الله عليه وآله وسلم في شعبٍ مقطوع،</p>
<p dir="rtl" class="p1">ربِّ قلبي كما ربّيتهم… لا برغبتي، بل بحكمتك… ولا بقدرتي، بل بلُطفك الذي لا يُنسى أبدًا.</p>
<p dir="rtl" class="p1">إذا أردت أن تفهم كيف يحبك الله… فانظر كيف يُربّيك... وإذا أردت أن تعرف من أنت… فانظر ماذا صنع بك <span class="s8"><b>الرَّبُّ</b></span> لا الناس.</p>
<p dir="rtl" class="p61"><span class="s39">ورُبَّ سائلٍ يسأل</span>: كيف يرتقي العبد ليصل فعلًا إلى أن " <span class="s8">يتربى قلبه في نور القرب، ويسكن في رحاب اللطف، ويأنس بعناية الله </span>"؟ ما هي الخطوات العملية التربوية للوصول إلى هذا المقام؟ وإليك الجواب، بأسلوب تطبيقي وجداني واضح:</p>
<p dir="rtl" class="p14"><b>كيف تُربّي قلبك في نور قرب الله؟</b></p>
<p dir="rtl" class="p36">تخلَّ عن أوهام الأمان البشري: لا يمكن أن تسكن قلبك بالله… وأنت مملوء بأوهام الناس، قرّر أن لا تعتمد على بشر في سكينتك.</p>
<p dir="rtl" class="p36">اسأل نفسك بصدق: هل أنا أبحث عن السَّند في الله… أم في غيره؟ كلما شعرت برغبة التعلّق بغير الله، قل:"يا رب، كن لي كما ظننتُ بغيرك."</p>
<p dir="rtl" class="p36">افتح وقتًا يوميًا للخلوة بالله (ولو 10 دقائق فقط(: من لا يخلو بالله… لا يعرف القرب.</p>
<p dir="rtl" class="p36">اجلس وحدك يوميًا، بلا هاتف، بلا أحد.</p>
<p dir="rtl" class="p36">تحدّث مع الله بكلامك، بشكواك، بصدقك، حتى لو بصوتٍ خافت.</p>
<p dir="rtl" class="p36">اقرأ آية واحدة… ببطء… ثم قل:"يا رب، اجعلها لي، اجعلها عني، اجعلها فيّ."</p>
<p dir="rtl" class="p36">تدرّب على الوقوف بين يديه بحضور لا عادة: الصلاة ليست تمرينًا جسديًا… بل تمرين محبة، في كل ركعة عش وكأنك تقول: "يا رب، ما لي غيرك"، خذ دقيقة قبل الصلاة لتقول:"اللهم خذني إليك فيها… لا تجعلني أؤديها فقط"، لا تستعجل الخروج من السجود، اطِل البقاء، ولو مرة واحدة يوميًا، "يا رب، لا تجعلني أخرج من هذه الحياة… قبل أن أدخل في رحمتك حقًّا "...</p>
<p dir="rtl" class="p36">ابحث عن "لطائف الله" في تفاصيل يومك: اللطف الإلهي لا يُطرق بالأبواب، بل يُبصر بالبصيرة، حين تتأخر في شيء… أو تُمنع… قل:"ما اللطف الذي يُخفيه ربي؟" وحين يُيسّر لك أمرٌ دون جهد، فقل:"يا رب، هذا أنت، لا أنا."</p>
<p dir="rtl" class="p36">عوّد قلبك أن يسكن بدعاءٍ صادق عند التقلب: لا تكن ردود فعلك دائمًا بشرية، حين تنكسر… قل فورًا": اللهم اكفني، وكن لي وليًا "، حين تشتاق لأمانٍ بشري… قل":يا رب، أنت أمان قلبي، فلا تعلقه إلَّا بك"، حين تُخذل… لا تتكلّم عن من خذلك، بل ارفع عينيك إلى السماء وقل:" اللهم ثبّت قلبي بك حين يرحل الجميع."</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p36">جالس مَن يُذكّرك بالله لا بنفسك: القلب لا يُربّى في الازدحام… بل في الصفاء، قلّل مخالطة من يُشغلك بنفسك أو بجراحك أو بانتصاراتك، وازنها بجلسة مع أهل الذكر، أو محاضرة تُحيي فيك الشعور بالرجوع، أو مجلس قرآن تعود فيه عبدًا صغيرًا.</p>
<p dir="rtl" class="p1"><b>ملخّص وجداني:</b></p>
<p dir="rtl" class="p1">القرب من الله لا يُؤخذ بالكلمات… بل يُعاش بالأحوال، كل ما عليك: أن تصدق في طلبه، أن تخلو له، أن تسأله أن يُربّيك على عينه، أن يحبّك كما تحب أن تحبه…</p>
<p dir="rtl" class="p1">وكل يوم… سترى آيةً تطرق باب قلبك، وكل مرة تسجد فيها… ستشعر أنه أقرب إليك من وجعك… ومن نفسك.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p82"><b>حين يتجلّى اسم "</b><span class="s8"><b>ٱلرَّبّ</b></span><b>" في قلبك…</b><b></b></p>
<p dir="rtl" class="p1">لا تعود مجرد عبدٍ يصلّي ويصوم… بل تُصبح روحًا تُربّى، وقلبًا يُشكّل، وحياةً تسير برعاية رحمة لا تُوصف.</p>
<p dir="rtl" class="p1">"<span class="s8"><b>ٱلرَّبّ</b></span>"... ليس فقط خالقك… بل هو الذي يُكَبِّرُك بلا استحقاق، ويهديك بلا طلب، ويؤدّبك بلا قسوة، ويغمر قلبك بلطفه… بلا ضجيج،<br>
ويُعيد ترتيبك بهدوءٍ عجيب… كأن الرحمة تعمل فيك وأنت لا تدري.</p>
<p dir="rtl" class="p1">حين يتجلّى هذا الاسم في قلبك… تعلم أن كل ألمٍ أصابك لم يكن كسرًا… بل تربية، وكل تأخير لم يكن حرمانًا… بل تهيئة، وكل فقدٍ لم يكن قسوة… بل إعداد لما بعده.</p>
<p dir="rtl" class="p1">تدرك فجأة… أن الله سبحانه وتعالى لم يتركك يومًا، بل كان يربّيك في الخفاء، يزرع فيك الصبر دون أن تدري، ويُبدل ملامح قلبك من حيث لا تحتسب، ويربّيك كما تُربّى البذور في الظلمة… حتى إذا اكتمل وقتك، أخرجك نبتًا يُطاول السَّماء.</p>
<p dir="rtl" class="p1">"<span class="s8"><b>ٱلرَّبّ</b></span>"… هو الذي يعلم كيف يُوقظك من غفلتك دون أن يُحرجك، ويكسرك بقدر ما تحتاج، لا أكثر، ويُلهمك أنَّ الذلّ بين يديه… أشرف من ألف عزة بعيدًا عنه.</p>
<p dir="rtl" class="p1">حين يتجلّى هذا الاسم في قلبك… لا تعود تسأله فقط: "أعطني"<br>
بل تقول له:"<span class="s39">ربِّني… كما تُحب، ولو خالفتُ هواي</span>".</p>
<p dir="rtl" class="p1">تصبح تائبًا لا لأنه واجب… بل لأنه جميل، وتُصلّي لا لأنك تُجيد… بل لأنك تحتاج، وتُجاهد لا لتُثبت شيئًا… بل لأنك تثق في تربيته التي لا تُهينك.</p>
<p dir="rtl" class="p1">حين يتجلّى اسم "<span class="s8"><b>ٱلرَّبّ</b></span>" في قلبك… ترى في كل تفصيلٍ من حياتك درسًا إلهيًا خاصًا بك، كل لحظة… برنامج تربية، كل محنة… درس في الصبر، كل عثرة… تدريب على الرجوع، كل ضيق… امتحان في التوكل، وكل نعمة… اختبار في الشكر، وكأنَّك في مدرسة خاصة… منهجها من "<span class="s8"><b>ٱلرَّبّ</b></span>"، وتأديبها بإلهامٍ منه..</p>
<p dir="rtl" class="p1">فإذا قيل لك بعد ذلك: من أنت؟ فقل: أنا عبدٌ في طريق التربية، أمشي خلف اسمٍ واحد… يُربّيني كلّ يوم: "<span class="s8"><b>ٱلرَّبّ</b></span>" جلَّ جلاله وتقدست أسماؤه...</p>
<p dir="rtl" class="p19"><br></p>
<p dir="rtl" class="p19"><br></p>
<p dir="rtl" class="p24"><b>عناوين تأملية لاسم الله "</b><span class="s8"><b>الرَّبّ</b></span><b>" مع دلالتها</b></p>
<p dir="rtl" class="p36"><span class="s8"><b>الرَّب</b></span>… الذي يربّيك بلطفه ورحمته قبل أمره:</p>
<p dir="rtl" class="p37"><b>دلالة</b>: ليس فقط الآمر الناهي، بل المربّي الذي يصوغك باللطف والرحمة والتدبير الحكيم.</p>
<p dir="rtl" class="p36"><span class="s8"><b>الرَّبّ</b></span>… الذي لم ولن يتركك لحظة منذ وُجدت:</p>
<p dir="rtl" class="p37"><b>دلالة</b>: إشعار القلب بالرعاية المستمرة منذ الخلق وحتى اللحظة، حتى في الغفلة.</p>
<p dir="rtl" class="p36"><span class="s8"><b>الرَّبّ</b></span>… الذي يَسبر أغوارك… حين تَغيب عن ذاتك:</p>
<p dir="rtl" class="p37"> <b>دلالة</b>: يربّيك بما يلائم ضعفك وطبيعتك، لا بما تظنه أنت صوابًا.</p>
<p dir="rtl" class="p36"><span class="s8"><b>الرَّبّ</b></span>… الذي يأخذ بيدك حتى لو كنت تائهًا:</p>
<p dir="rtl" class="p37"> <b>دلالة</b>: تربية الرَّب تشمل من يعرفه ومن يبحث عنه… ومن ضل عنه.</p>
<p dir="rtl" class="p36"><span class="s8"><b>الرَّبّ</b></span>… لا يربّيك بالعقوبة فقط… بل بالعطايا أيضًا:</p>
<p dir="rtl" class="p37"><b>دلالة</b>: التأديب الإلهي لا يكون فقط بالمنع والابتلاء، بل أحيانًا بالبسط والعطاء أيضًا.</p>
<p dir="rtl" class="p36"><span class="s8"><b>الرَّبّ</b></span>… حين يُصلحك دون أن تَشعر:</p>
<p dir="rtl" class="p37"> <b>دلالة</b>: من معاني الربوبية الخفية: إصلاح القلوب في العمق بلا ضجيج ولا ضوء.</p>
<p dir="rtl" class="p36"><span class="s8"><b>الرَّبّ</b></span>… الذي يراك “مشروعًا كاملًا” رغم كسرك الآن:</p>
<p dir="rtl" class="p37"><b>دلالة</b>: نظرة الرَّبّ لك ليست لحظية، بل ممتدة عبر رحلتك كلها، بكل فصولها.</p>
<p dir="rtl" class="p36"><span class="s8"><b>الرَّبّ</b></span>… الذي يُعيد تشكيلك إذا انكسرت:</p>
<p dir="rtl" class="p37"><b>دلالة</b>: تربية الرَّبّ تشمل الترميم، والتقويم، وإعادة الإحياء الداخلي.</p>
<p dir="rtl" class="p36"><span class="s8"><b>الرَّبّ</b></span>… الذي لا يُسقطك حين تخطئ… بل يُعيدك لتنهض:</p>
<p dir="rtl" class="p37"><b>دلالة</b>: تربية محفوفة بالرَّحمة والفرص الجديدة، لا بالقسوة والإقصاء.</p>
<p dir="rtl" class="p36"><span class="s8"><b>الرَّبّ</b></span>… الذي ينظر إلى قلبك، لا إلى ماضيك:</p>
<p dir="rtl" class="p37"><b>دلالة</b>: تربية القلب لا تُقاس بالأداء السابق، بل بالنية الصادقة في العودة.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p1"><span class="s8"><b>ٱلرَّب</b></span>… الاسم الذي لم يتركك لحظة، حتى وأنت لم تكن تعرف اسمه...<span class="s8"><b> ٱلرَّبّ</b></span>… ليس فقط من خلقك، بل من ربّاك منذ اللحظة الأولى:</p>
<p dir="rtl" class="p36">ربّاك في رحم أمّك… حين لم يكن لك حول ولا قوة.</p>
<p dir="rtl" class="p36">ربّاك في ظلمات الجهل… بالهداية.</p>
<p dir="rtl" class="p36">ربّاك في وحشة الخطيئة… بالتوبة.</p>
<p dir="rtl" class="p36">ربّاك في فجور النفس… بالمنع.</p>
<p dir="rtl" class="p36">ربّاك في الألم… بالحكمة.</p>
<p dir="rtl" class="p36">ربّاك في التأخر… بالتوقيت الذي لا يخطئ.</p>
<p dir="rtl" class="p1">"<span class="s8"><b>ٱلرَّبّ</b></span>" هو الاسم الذي يُدبّر شؤونك كلها… دون أن تشعر، ودون أن تطلب، ودون أن تدرك لماذا يفعل ما يفعل… لكنه يفعل بحكمة حبّه لك.</p>
<p dir="rtl" class="p14"><b>المعنى التدبّري العميق:</b></p>
<p dir="rtl" class="p36">أن تعِ أنَّ الربوبية ليست فقط "تصرّفًا في الكون"، بل تربية دائمة لك… حتى تصل إليه.</p>
<p dir="rtl" class="p36">أن تدرك أنَّ الله لا يريد منك الكمال، بل يُربّيك بحكمةٍ.. حتى تنضج روحيًّا، وتتطهّر قلبيًّا.</p>
<p dir="rtl" class="p36">أن تعرف أنَّ "ربّك" هو من يرى قُبحك… ويُصلحك، يأخذك من ظلمة إلى نور، ومن معصية إلى أَوبة، ومن كبرياء إلى انكسار… دون أن يُحرجك أو يفضحك.</p>
<p dir="rtl" class="p1"><b>حين يستقر اسم "</b><span class="s8"><b>ٱلرَّبّ</b></span><b>" في قلبك:</b></p>
<p dir="rtl" class="p25">لا تيأس من نفسك… لأنَّ لك ربًّا لا يتركك لنفسك.</p>
<p dir="rtl" class="p25">ولا تغترّ بصلاحك… لأنَّك لا زلت في طريق التربية.</p>
<p dir="rtl" class="p25">ولا تستعجل النتائج… لأن التربية الرَّبّانية ليست عجلة، بل رحلةٌ طويلة فيها جبر، ومنع، وتأديب، وفتح.</p>
<p dir="rtl" class="p25">ولا تتصوّر أنَّ الحرمان عقوبة… بل قد يكون دواءً من ربٍّ يُحبك أكثر مما تحب نفسك.</p>
<p dir="rtl" class="p1"><b>من أسرار هذا الاسم:</b></p>
<p dir="rtl" class="p1">أن أعظم دعاء قاله أنبياء الله في الشدائد كان يبدأ بـ: "<span class="s2"><b>ربِّ</b></span>…"</p>
<p dir="rtl" class="p49"><b>" ربِّ إنِّي مسّني الضُّر وأنت أرحم الرَّاحمين ".</b></p>
<p dir="rtl" class="p49"><b>" ربِّ لا تذرني فردًا…"</b></p>
<p dir="rtl" class="p49"><b>" ربِّ قد آتيتني من الملك..."</b></p>
<p dir="rtl" class="p49"><b>" ربّنا ظلمنا أنفسنا..."</b></p>
<p dir="rtl" class="p49"><b>" ربّنا لا تؤاخذنا..."</b></p>
<p dir="rtl" class="p1">كأنَّ "يا ربّ" ليست مجرد نداء… بل إفصاحٌ عن الحاجة لمن لا يردّ السَّائلين، ولا يملّ من تربيتهم مهما تكررت عثراتهم.</p>
<p dir="rtl" class="p1"><b>خلاصة التدبّر:</b></p>
<p dir="rtl" class="p1">اسم <span class="s8"><b>ٱلرَّبّ</b></span> هو الاسم الذي لا تخجل أن تأتيه وأنت مكسور، ولا تخاف أن ترجع إليه وأنت مخطئ، ولا تظن أن تربيتك قد انتهت… لأنك إن لم تُربَّ… هلكت.</p>
<p dir="rtl" class="p1">إنه الاسم الذي يُغنيك عن فهم كل ما يحدث حولك… إن وثقت أنَّ لك ربًّا لا يُخطئ، وكلما ضاقت عليك الحياة… قل بيقين:</p>
<p dir="rtl" class="p70"><span class="s9"> "</span><b>يكفيني أنَّ لي ربًّا… لا يهمل، ولا يملّ من قلبي، وإن أبطأ عني، فما أبطأ إلَّا ليُتمّ تربيتي</b><span class="s9">." </span></p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p24"><b>تمهيد وجداني لاسم الله "</b><span class="s8"><b>الرَّبّ</b></span><b>":</b></p>
<p dir="rtl" class="p1">حين تسمع اسم الرَّبّ… فاعلم أنك أمام الاسم الذي يحمل أعظم مظاهر القرب، والرعاية، والقيادة الحكيمة في آنٍ واحد.</p>
<p dir="rtl" class="p1"><span class="s8"><b>ٱلرَّبّ</b></span>… هو الذي خَلَقَك، ثم لم يتركك... هو الذي نفخ فيك الروح، </p>
<p dir="rtl" class="p1">ثم لم يرفع عنايته عنك لحظة.</p>
<p dir="rtl" class="p1">وظلّ يرعاك بنظره الذي لا يغيب.</p>
<p dir="rtl" class="p1">وتكفّل بك بعينٍ لا تنام.</p>
<p dir="rtl" class="p1">ولم يُبعد لطفه عنك طرفة عين.</p>
<p dir="rtl" class="p1">وكان أقرب إليك من كلّ من حولك.</p>
<p dir="rtl" class="p1">هو الذي يُربيك… لا فقط في جسدك، بل في قلبك، وروحك، وهمّك، وطريقك. </p>
<p dir="rtl" class="p1">هو الذي يشرف على تفاصيلك… وإن لم تذكره.</p>
<p dir="rtl" class="p1">هو الذي يُمسك بزمام وجودك… حتى لو أنكر عقلك في لحظة التيه.</p>
<p dir="rtl" class="p1"><span class="s8"><b>ٱلرَّبّ</b></span>… ليس فقط الإله الذي نعبده، بل هو المربّي الذي يصوغك كما يحبّ، لا كما تريد. </p>
<p dir="rtl" class="p1">قد يُربيك بالرحمة واللطف… وقد يُربّيك بالألم.</p>
<p dir="rtl" class="p1">قد يُربّيك بالعطاء… وقد يُربّيك بالمنع.</p>
<p dir="rtl" class="p1">لكنه في كل ذلك… لا يخرج بك عن مرْحَمَةٍ ولا عن حكمة.</p>
<p dir="rtl" class="p1"><span class="s8"><b>ٱلرَّبّ</b></span>… هو الذي يعلم ما تصلح به، ولو جهلتَ أنت، ويأخذ بيدك إلى نُضجك، حتى إن قاومت، أو بكيت، أو اعترضت… فهو يرى ما بعد الدمع، ويسمع ما وراء الصَّمت، ويُدبّر لك من حيث لا تحتسب.</p>
<p dir="rtl" class="p1"><span class="s8"><b>ٱلرَّبّ</b></span>… هو من إن سجدتَ له، ربّاك برفق، وإن ابتعدت، ربّاك باللُّطف الذي يوقظك، وإن ضعفت، ربّاك بالستر، وإن ضللت، ربّاك بالرجوع.</p>
<p dir="rtl" class="p1">فلا تخف من ضعفك… ولا تستحي من أخطائك… ولا تيأس من عثراتك… <span class="s8"><b>فالرَّبّ</b></span> لا يُربّي ملائكة… بل يُربّي بشرًا يُخطئون، ويمهلهم بحكمة، حتى يُهذّبهم، ويُحبّهم، ويُصلحهم.</p>
<p dir="rtl" class="p1">وكل لحظة ألم، أو وجع، أو انتظار، أو تأخير… قد تكون رُكنًا من أركان تربيتك الرَّبّانية.</p>
<p dir="rtl" class="p1">فإذا قلتَ في دعائك: "<span class="s8"><b>يا ربّ</b></span>"... فأنت لا تنادي فقط الإله الخالق…<br>
بل تنادي أقرب من ربّاك… وأرحمُ بك من نفسك عليك… وأعلم بمن تكون.</p>
<p dir="rtl" class="p19"><br></p>
<p dir="rtl" class="p24"><b>المعنى اللغوي والشرعي الدقيق والصحيح لهذا الاسم العظيم:</b></p>
<p dir="rtl" class="p1"><b>المعنى اللغوي لاسم الله:</b> "<span class="s8"><b>ٱلرَّبّ</b></span>": في اللغة، "<span class="s8"><b>الرَّبّ</b></span> "مأخوذ من الجذر الثلاثي: (ر ب ب)، وهو أصلٌ يدل على: الملك، والسيادة، والتربية، والتدبير، والرعاية، والإصلاح شيئًا فشيئًا.</p>
<p dir="rtl" class="p1">ومن معاني الجذر:</p>
<p dir="rtl" class="p1"><b>رَبَّ الشيء</b>: ملكه وتصرّف فيه.</p>
<p dir="rtl" class="p1"><b>رَبَّ الولد</b> :غذّاه وعلّمه وربّاه، أي نقله من حال إلى حال حتى يكتمل.</p>
<p dir="rtl" class="p1"><b>رَبَّ الدار</b>: تولّى شؤونها ورعاها وأدارها.</p>
<p dir="rtl" class="p1">ومن ذلك قيل: "فلان ربُّ البيت" أي سيّده ومدبّره ومَن يُصلح شأنه.</p>
<p dir="rtl" class="p1"><b>فاسم الله "</b><span class="s8"><b>ٱلرَّبّ</b></span><b>" يشمل في أصل اللغة:</b></p>
<p dir="rtl" class="p1"><span class="s2"><b>المالك</b></span>: الذي يملك كل شيء مُلكًا مطلقًا.</p>
<p dir="rtl" class="p1"><span class="s2"><b>السيد</b></span>: الذي لا أعلى منه ولا يُنازع.</p>
<p dir="rtl" class="p1"><span class="s2"><b>المدبّر</b></span> :الذي يتصرف في خلقه كيف يشاء.</p>
<p dir="rtl" class="p1"><span class="s2"><b>المربّي</b></span> :الذي يُربّي عباده بنعمه، ويُصلحهم ويهديهم شيئًا فشيئًا.</p>
<p dir="rtl" class="p1"><span class="s2"><b>القيّم</b></span>: القائم على شؤون خلقه، لا يغيب عنهم طرفة عين.</p>
<p dir="rtl" class="p1"><b>لذلك قال أهل اللغة:</b></p>
<p dir="rtl" class="p1"> "الربّ في الأصل هو المالك السيد المصلح، ولا يُطلق (<span class="s8"><b>الربّ</b></span>) مُعرفًا بالألف واللام إلا على الله وحده، فلا يُقال: "<span class="s8"><b>ٱلرَّبّ</b></span>" مطلقًا لغيره، بل يُقال: ربُّ الدار، ربُّ المال، ربُّ القوم، أمَّا (<span class="s8"><b>ٱلرَّبّ</b></span>) فلا يكون إلا لله ."</p>
<p dir="rtl" class="p1"><b>المعنى الشرعي لاسم الله: "</b><span class="s8"><b>ٱلرَّبّ</b></span><b>":</b> الرَّبّ في الشرع هو الاسم الذي يدل على: تفرّد الله تعالى بالخلق، والملك، والتدبير، والرزق، والتربية، والرعاية، والهداية، والتمكين.</p>
<p dir="rtl" class="p1">وقد دلّ عليه قوله تعالى: ﴿<span class="s8">ٱلْـحَمْدُ لِلَّهِ رَبِّ ٱلْعَـٰلَمِينَ</span>﴾ الفاتحة: 2، أي: مالكهم، ومربّيهم، ومدبّر شؤونهم.</p>
<p dir="rtl" class="p1">وكل ما في الوجود من كائنات، إنما هي خاضعة لتربية الرَّب وهي على نوعين:</p>
<p dir="rtl" class="p36"><span class="s2"><b>تربية عامة</b></span>: لكل المخلوقات، وهي بالرّزق، والتدبير، والإمداد.</p>
<p dir="rtl" class="p36"><span class="s2"><b>تربية خاصة</b></span>: لأوليائه المؤمنين، وهي بتزكية القلوب، وهداية الأرواح، وتكميل السلوك.</p>
<p dir="rtl" class="p1">قال العلامة ابن القيم رحمه الله: "الرّبّ سبحانه هو الذي يربّي عباده بالنّعم، ويصلحهم بالمحن، ويقودهم برفقه إلى كمالهم الذي خُلقوا له."</p>
<p dir="rtl" class="p1"><b>ملخص المعنى الجامع لاسم الله </b><span class="s8"><b>الرَّبّ</b></span><b>:</b></p>
<p dir="rtl" class="p1"><span class="s8"><b>الرَّبّ</b></span> هو: الخالق المالك السيّد المدبّر، الذي يُربّي عباده بنعمه، ويقودهم بحكمته، ويصلحهم برحمته، حتى يُبلغهم ما خُلقوا له من الكمال والعبودية.</p>
<p dir="rtl" class="p1">والآن إليكم الفرق بين الاسمين في جدول مختصر أولًا، ثم شرح تفصيلي وجداني بعده:</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p24"><b>الفرق بين اسم "</b><span class="s8"><b>الله</b></span><b>" واسم "</b><span class="s8"><b>الرَّب</b></span><b>":</b></p>
