<p dir="rtl" class="p19"><br></p>
<p dir="rtl" class="p24"><b>نداء القلب في حضرة </b><span class="s8"><b>ٱلْمَلِكُ </b></span><b>و</b><span class="s8"><b>ٱلْمَلِيكُ</b><b></b></span></p>
<p dir="rtl" class="p1">يا قلبُ… كُفَّ عن الركض خلف الأبواب الموصدة، فمفتاحها ليس مع البشر… بل مع ٱلْمَلِكُ الذي لا يُردّ أمره.</p>
<p dir="rtl" class="p1">يا قلبُ… أنت لا تملك شيئًا من أمرك، لا قوتك، لا رزقك، لا وقتك…<br>
أنت عبدٌ… ومولاك هو ٱلْمَلِكُ، فلمَ تتعالى لحظةً، أو تتكبّر في خفاء النية،<br>
وأنت لا تملك حتى نبضك؟.</p>
<p dir="rtl" class="p1">يا قلبُ… خف من عظمة هذا الاسم، واسجد له بسجودٍ داخليٍّ، لا سجود الجباه فقط… سجود يقين، أنك لست سوى خُطى مرسومة في مُلكٍ لا حدود له، تسير بأمره، وتُحفظ بلطفه، وتُبتلى بحكمته، وتُرفع أو تُخسَف بسلطانه.</p>
<p dir="rtl" class="p1">يا قلبُ… إذا استبد بك الخوف من الغد… فتذكّر: أنَّ مليكك هو من يُدبّر هذا الغد لحظة بلحظة.</p>
<p dir="rtl" class="p1">كل ما ضاع… ضاع تحت عين "<span class="s8"><b>ٱلْمَلِيكُ</b></span>"، وكل ما سيأتي… لن يأتيك من أحد، بل من يدٍ تُدبّر وهي أرحم بك من نفسك.</p>
<p dir="rtl" class="p1">يا قلبُ… حين تسجد، فلا تُخاطب من بيده السماء فقط، بل من يتصرّف الآن في أعماقك، في ضعفك، في ألمك، في تفاصيلك الصغيرة التي لا يراها أحد.</p>
<p dir="rtl" class="p1">يا قلبُ… عِش عبدًا، يفرّ من ملوك الأرض… إلى ملك السماء، وعبدًا يرى في كل تقلب من حوله، أثرَ "مليكٍ مقتدرٍ"، لا عبثًا ولا مصادفة.</p>
<p dir="rtl" class="p1">كن صغيرًا أمام "<span class="s8"><b>ٱلْمَلِكُ</b></span>"، واطمئن كلما ناديت: يا مَلِيكَ قلبي… دبّرني، فقد عجزت.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p19"><br></p>
<p dir="rtl" class="p1">" ٱللَّهُمَّ يَا مَلِكُ ٱلسَّمَاوَاتِ وَٱلْأَرْضِ، يَا مَنْ لَا يُنَازِعُكَ فِي مُلْكِكَ أَحَدٌ، وَلَا يَعْتَرِضُ عَلَى حُكْمِكَ أَحَدٌ…</p>
<p dir="rtl" class="p1">ٱجْعَلْنِي عَبْدًا لَكَ فِي ٱلظَّاهِرِ وَٱلْبَاطِنِ، وَٱكْفِنِي ٱلْتَّعَلُّقَ بِمَنْ لَا يَمْلِكُونَ لِي ضَرًّا وَلَا نَفْعًا.</p>
<p dir="rtl" class="p1">يَا مَلِكُ… لَا تَكِلْنِي إِلَى نَفْسِي، فَإِنَّهَا تَتَجَرَّأُ عَلَى عَظَمَتِكَ، وَتَتَوَهَّمُ أَنَّ لَهَا أَمْرًا وَخِيَارًا.</p>
<p dir="rtl" class="p1">يَا مَلِيكُ… دَبِّرْنِي تَدْبِيرَ مَنْ فَقَدَ كُلَّ سَبَبٍ، وَٱعْتَمَدَ عَلَيْكَ فِي كُلِّ أَمْرٍ، وَٱمْلَأْ قَلْبِي طُمَأْنِينَةً بِأَنَّ ٱلْأَقْدَارَ تَجْرِي فِي كَفِّكَ، لَا فِي أَيْدِي ٱلْعِبَادِ.</p>
<p dir="rtl" class="p1">يَا مَلِيكَ ٱلْخَلْقِ… أَدْخِلْنِي فِي دَائِرَةِ ٱلْعِزِّ بِعُبُودِيَّتِكَ، وَأَخْرِجْنِي مِنْ ذُلِّ ٱلْتَّعَلُّقِ بِغَيْرِكَ، وَٱجْعَلْنِي رَاضِيًا بِقَضَائِكَ، مُسْتَسْلِمًا لِتَدْبِيرِكَ، قَانِعًا بِكُلِّ مَا تَقْسِمُهُ لِي.</p>
<p dir="rtl" class="p1">وَصَلِّ ٱللَّهُمَّ عَلَىٰ مَنْ كَانَ عَبْدًا خَالِصًا لَكَ، يَنْظُرُ إِلَىٰ ٱلْخَلْقِ بِرَحْمَتِكَ، وَيَنْظُرُ إِلَيْكَ بِٱلْخُشُوعِ وَٱلْوَلَاءِ، نَبِيِّنَا مُحَمَّدٍ وَعَلَىٰ آلِهِ وَصَحْبِهِ أَجْمَعِينَ.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p1"><b>الرسالة التأملية العميقة:</b></p>
<p dir="rtl" class="p1">في حياتك ستقف كثيرًا على مفترقات الطرق… ستتردد كثيرًا أمام الأبواب… ستُرهقك الحاجة… ويُغريك الطغيان… وسيهمس لك الشيطان: "افعل… فأنت حر." </p>
<p dir="rtl" class="p1">لكنّ اسم الله ٱلْمَلِكُ يأتي ليوقظك من هذا الغرور… ليهمس في قلبك:<br>
"لست حُرًّا كما تظن… أنت عبدٌ في ملك الله، وكل ما تملكه، مُعطًى لك لحظةً، مأخوذ منك متى شاء."</p>
<p dir="rtl" class="p1">وإذا أردت أن تسكن بعد القلق… وأن تطمئن بعد الحيرة… فقل لنفسك:<br>
"يا نفسي… إن مليكي هو من دبّر قلبي قبل أن أدرك قلبي… أفلا يدبّر أمري؟"</p>
<p dir="rtl" class="p1">إن اسم ٱلْمَلِكُ يُربّيك على الخشية، واسم ٱلْمَلِيكُ يُربّيك على التسليم، فاجعل قلبك بين الاثنين: خاشعًا مُطمئنًا… لا يُجادل الله في أمره، ولا يضطرب إذا أخفاه عنه.</p>
<p dir="rtl" class="p1">واعلم… أنك حين تسجد، فأنت لا تؤدي طقسًا تعبّديًا، بل تعلن ولاءك للمالك الوحيد، وتخلع ولاءك لكل شيء سواه.</p>
<p dir="rtl" class="p19"><br></p>
<p dir="rtl" class="p40"><b>مشهد من السيرة (تجسيد لاسم " </b><span class="s8"><b>ٱلْمَلِكُ</b></span> <b>"):</b></p>
<p dir="rtl" class="p1"><b>المشهد: بين يدي ٱلْمَلِكُ يوم غزوة بدر: </b>وارد في الصحيحين وغيرهما، بتفاصيل عظيمة.</p>
<p dir="rtl" class="p1">في ليلة بدر… العدد قليل، السلاح ناقص، والعدوّ أضعاف مضاعفة…<br>
فدخل النبي ﷺ إلى عريشه، ونظر إلى السَّماء، ثم رفع يديه يناجي ربه قائلًا:</p>
<p dir="rtl" class="p1"> "اللَّهُمَّ أَنْجِزْ لِي مَا وَعَدْتَنِي، اللَّهُمَّ آتِ مَا وَعَدْتَنِي، اللَّهُمَّ إِنْ تُهْلِكْ هَذِهِ الْعِصَابَةَ مِنْ أَهْلِ الْإِسْلَامِ، لَا تُعْبَدْ فِي الْأَرْضِ بَعْدَ الْيَوْمِ ." رواه مسلم.</p>
<p dir="rtl" class="p1">وظلّ يُكرّر الدعاء، حتى سقط رِداؤه من على كتفيه من شدّة التضرّع، فجاءه أبو بكر رضي الله عنه، يُسكّنه ويقول له: " يا نبيّ الله، كفاك مناشدتك ربك، فإنه مُنجزٌ لك ما وعدك ."</p>
<p dir="rtl" class="p1">وفي اللحظة التالية… يأتي المَلِكُ بأمره… ويأذن للمليكِ أن يُدبّر، فينزل جبريل عليه السلام، ويقول: "يا محمد، خذ قبضة من تراب، فارمِهم بها."</p>
<p dir="rtl" class="p1">فأخذ النبي ﷺ قبضة من التراب، فرماها، ثم قال: "شاهتِ الوجوه!"</p>
<p dir="rtl" class="p1">فما بقي مشرك إلَّا دخل التراب في عينيه، وبدأت هزيمتهم، ويُنزِل الله آية تؤرخ لحظة التصرّف الإلهي: <span class="s15">﴿فَلَمۡ تَقۡتُلُوهُمۡ وَلَٰكِنَّ ٱللَّهَ قَتَلَهُمۡۚ وَمَا رَمَيۡتَ إِذۡ رَمَيۡتَ وَلَٰكِنَّ ٱللَّهَ رَمَىٰ وَلِيُبۡلِيَ ٱلۡمُؤۡمِنِينَ مِنۡهُ بَلَآءً حَسَنًاۚ إِنَّ ٱللَّهَ سَمِيعٌ عَلِيمٞ﴾</span><span class="s13"> </span><span class="s12">الأنفال: ١٧</span>.</p>
<p dir="rtl" class="p1"><b>تأمل في هذا المشهد:</b></p>
<p dir="rtl" class="p1">اسم "<span class="s8"><b>ٱلْمَلِكُ</b></span>": يتجلّى في خضوع النَّبي ﷺ الكامل بين يدي الله، وهو يُناجيه في لحظة بدر قائلاً: "إن تُهلِك هذه العصابة، لا تُعبد في الأرض بعد اليوم"… كأنه يقول بقلب العبد الصادق: " يا ربّ، لا ملك لنا، ولا قيام لأمرنا… إلَّا إذا أقمتَ أنت سُلطانك، ونصرتَ دينك، ومددتَ لنا من مُلكك الذي لا يزول ."</p>
<p dir="rtl" class="p1">اسم " <span class="s8"><b>ٱلْمَلِيكُ</b></span>" في لحظة التدخّل الدقيق، حيث قبضة تراب تُمطر على جيشٍ كامل، وما هو التراب؟ وما قدرة النَّبي ﷺ في الظاهر؟ لكنها كانت تصرفًا مباشرًا من المليك المقتدر.</p>
<p dir="rtl" class="p1"><b>الدروس التربوية من المشهد:</b></p>
<table cellspacing="0" cellpadding="0" class="t1">
<tbody>
<tr>
<td valign="middle" class="td55">
  <p dir="rtl" class="p15"><b>الصلة بالاسم</b></p>
</td>
<td valign="middle" class="td56">
  <p dir="rtl" class="p15"><b>الدرس</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td57">
  <p dir="rtl" class="p16"><b>ٱلْمَلِكُ هو من يُمضي النصر، لا عددك ولا عتادك</b></p>
</td>
<td valign="middle" class="td58">
  <p dir="rtl" class="p17"><b>لا نصر إلَّا من عند الملك</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td59">
  <p dir="rtl" class="p16"><b>ٱلْمَلِيكُ يُدبّر بلُطفٍ وخفاء</b></p>
</td>
<td valign="middle" class="td60">
  <p dir="rtl" class="p17"><b>الله يتصرّف بما لا يخطر في بالك</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td57">
  <p dir="rtl" class="p16"><b>لم يطلب من الصحابة… بل من مالك المُلك</b></p>
</td>
<td valign="middle" class="td58">
  <p dir="rtl" class="p17"><b>الدعاء سلاح من يعرف من هو الملك</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td61">
  <p dir="rtl" class="p16"><b>جهّز، دعا، قاتل، ورمى… ثم قال الله: "ٱللَّهَ رَمَى"</b></p>
</td>
<td valign="middle" class="td60">
  <p dir="rtl" class="p17"><b>التوكل لا يعني السُّكون</b></p>
</td>
</tr>
</tbody>
</table>
<p dir="rtl" class="p1"><b>الرسالة:</b></p>
<p dir="rtl" class="p1">في بدر… تجلّى اسم ٱلْمَلِكُ في خضوع النبي ﷺ الكامل، وهو يُسلّم كل المعركة لله، وتجلّى اسم ٱلْمَلِيكُ في التصرّف الدقيق، المباشر، الذي لا يراه أحد… لكن أثره يقلب الموازين، ويُسقط جيوشًا.</p>
<p dir="rtl" class="p1">في بدر… لم ينتصر جيشٌ صغير، بل انتصر عبدٌ نادى الملك،<br>
فتحرّك المليك، فاستوت الأرضُ تحت أقدام السَّماء.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p24"><b>دعاء خاص باسم "</b><span class="s9"><b> </b></span><span class="s8"><b>ٱلْمَلِكُ</b></span><span class="s21"><b>"</b></span><b>:</b><b></b></p>
<p dir="rtl" class="p1"><b>أولًا: </b>أدعية تأملية (بصياغة شرعية صحيحة):</p>
<p dir="rtl" class="p36"><b>دعاء الخضوع لجلال الملك</b>: </p>
<p dir="rtl" class="p1">" ٱللَّهُمَّ يَا مَلِكُ ٱلسَّمَاوَاتِ وَٱلْأَرْضِ، يَا مَنْ لَا يُنَازِعُكَ فِي مُلْكِكَ أَحَدٌ… اجْعَلْنِي لَكَ عَبْدًا خَالِصًا، وَقَلْبِي مَسْكَنًا لِعَظَمَتِكَ، وَعَيْنِي خَاشِعَةً لِهَيْبَتِكَ، وَٱكْفِنِي يَا رَبِّ ذُلَّ ٱلْحَاجَةِ لِمَنْ لَا يَمْلِكُ شَيْئًا، وَٱجْعَلْ مُلْكِي فِي رِضَاكَ، وَعِزِّي فِي ٱلْخُضُوعِ لَكَ ".</p>
<p dir="rtl" class="p1">ما أصدق هذا الدعاء وما أرقاه! كلُّ كلمة فيه سجدة قلب… وكل جملة تعلن العبودية الكاملة للْمَلِكِ الذي لا يُنازع، وٱلْمَلِيكِ الذي يُدبّر، ويرفع، ويعزّ مَن خضع له، واسمحوا لي أن أقدّم لكم الرسالة التأملية العميقة والتربوية لهذا الدعاء، بما يليق بجلاله، في هذا الدعاء، لا تطلب مالًا… ولا فرجًا… ولا راحة… بل تطلب أعلى مقامات العبودية: أن تكون لله وحده، خالصًا، مملوكًا طائعًا، راضيًا بكل ما يملكه الله لك.</p>
<p dir="rtl" class="p1">تبدأ بالنداء: "ٱللَّهُمَّ يَا مَلِكُ ٱلسَّمَاوَاتِ وَٱلْأَرْضِ…" وكأنك تفتح باب الملك العظيم، لا لتطلب دنيا… بل لتطلب حقك في أن تكون عبدًا لا مزيفًا ولا مكسورًا من الداخل.</p>
<p dir="rtl" class="p1">ثم تقول: " يَا مَنْ لَا يُنَازِعُكَ فِي مُلْكِكَ أَحَدٌ…" أي: أنا لا أريد أن أعيش وكأن لي شيئًا، بل أخلع عن نفسي كلّ تملّك… لأكون خاضعًا تحت مُلكك طوعًا لا كرهًا، ثم تأتي بأمنيةٍ لا يُحقّقها إلَّا ملك: "ٱجْعَلْنِي لَكَ عَبْدًا خَالِصًا…" العبد الخالص… ليس مَن صلّى فقط، ولا من حفظ الأذكار… بل من انكسرت إرادته تحت حكم مولاه، ولم يعد يرجو إلَّا وجهه، ولا يحبّ إلَّا ما أحبّ، ولا يخاف إَّلا أن يُحرَم من قربه.</p>
<p dir="rtl" class="p1">ثم تقول: " وَقَلْبِي مَسْكَنًا لِعَظَمَتِكَ، وَعَيْنِي خَاشِعَةً لِهَيْبَتِكَ …" يا الله… ما أجمل هذا التصوير! تطلب أن تسكن عظمة الله في قلبك، لا أن تزور العظمة قلبك مرة ثم تخرج، تطلب أن تخشع عينك من هيبته لا من الخوف وحده… بل من الإدراك بأنَّك في حضرة مَلِكٍ لا يُشبهه أحد.</p>
<p dir="rtl" class="p1">ثم تأتي بصدق العبودية: "وَٱكْفِنِي يَا رَبِّ ذُلَّ ٱلْحَاجَةِ لِمَنْ لَا يَمْلِكُ شَيْئًا…" كأنك تقول: يا رب، لا تفضحني بطلب من لا يملك، ولا تذلّني بسؤال من لا يقدر، اجعلني عبدًا يطلب منك، لا من الناس، ويشتكي لك، لا للبشر، ويتعلّق برضاك، لا برضا من لا يملك مصيره أصلًا!..</p>
<p dir="rtl" class="p1">وتختم بأعظم عزٍّ يمكن أن يناله عبد: "وَٱجْعَلْ مُلْكِي فِي رِضَاكَ، وَعِزِّي فِي ٱلْخُضُوعِ لَكَ…" أي: لا أريد ملكًا يُبعدني عنك، ولا عزًّا يرفع رأسي عن سجودي، بل إن أعطيتني شيئًا… فاجعله سببًا لرضاك، وإن رفعتني… فبقدر ما أخضع لك، لا بما أُظهر للناس.</p>
<p dir="rtl" class="p1"><b>التربية الإيمانية من هذا الدعاء:</b></p>
<table cellspacing="0" cellpadding="0" class="t1">
<tbody>
<tr>
<td valign="middle" class="td62">
  <p dir="rtl" class="p15"><b>التربية</b></p>
</td>
<td valign="middle" class="td63">
  <p dir="rtl" class="p15"><b>المعنى</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td64">
  <p dir="rtl" class="p16"><b>أن لا ترى في نفسك حقًّا في شيء، بل كل شيء هو هبة من الملك.</b></p>
</td>
<td valign="middle" class="td65">
  <p dir="rtl" class="p17"><b>تعظيم الله</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td66">
  <p dir="rtl" class="p16"><b>أن تتمنى أن يملأك الله بعظمته، لا أن تُشغلك الدنيا.</b></p>
</td>
<td valign="middle" class="td67">
  <p dir="rtl" class="p17"><b>صدق العبودية</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td64">
  <p dir="rtl" class="p16"><b>أن تستحي أن تُذلّ نفسك عند من لا يملك، وأنت بين يدي من يملك الكل.</b></p>
</td>
<td valign="middle" class="td65">
  <p dir="rtl" class="p17"><b>قطع التعلّق بالخلق</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td68">
  <p dir="rtl" class="p16"><b>أن لا تطلب العزّ بين الناس، بل في الله وحده.</b></p>
</td>
<td valign="middle" class="td67">
  <p dir="rtl" class="p17"><b>علوّ الهمّة</b></p>
</td>
</tr>
</tbody>
</table>
<p dir="rtl" class="p36"><b>دعاء الثقة في تدبير المليك:</b></p>
<p dir="rtl" class="p1">" يَا مَلِيكَ ٱلْخَلْقِ… إِنِّي أَضَعُ قَلْبِي بَيْنَ يَدَيْكَ، وَأُمُورِي فِي تَصَرُّفِكَ، وَأَيَّامِي تَحْتَ قَدَرِكَ، فَكُنْ لِي مُدَبِّرًا كَمَا أَنْتَ لِلْكَوْنِ مَلِيكٌ، لَا أَرْجُو سِوَاكَ، وَلَا أَخْشَى غَيْرَ حُكْمِكَ، وَٱجْعَلْنِي مِمَّنْ سَجَدَ قَلْبُهُ قَبْلَ جَبِينِهِ ".</p>
<p dir="rtl" class="p1">يا الله… ما أبهى هذا الدعاء، وما أعمق معانيه… كلمات تنبع من قلبٍ ذاق حلاوة التسليم، وعرف من هو "<span class="s8"><b>ٱلْمَلِيكُ</b></span>"، فتخلى عن التدبير، وتعلّق بمن يُدبّر كل شيء بلُطفٍ وقدرة.</p>
<p dir="rtl" class="p1">وها أنا أضع بين أيديكم الرسالة التأملية العميقة والتربوية لهذا الدعاء، بأسلوب راقٍ يُناسب مقام الجلال:</p>
<p dir="rtl" class="p1"><b>الرسالة التأملية لهذا الدعاء الخاشع</b></p>
<p dir="rtl" class="p1">"يَا مَلِيكَ ٱلْخَلْقِ…" أي: يا من لا يخرج شيء من تدبيره، ولا تنحرف ذرةٌ في هذا الكون عن قَدَره، ولا يتحرك قلب، ولا يسكن خاطر… إلَّا بأمره، وعلمه، وسمعه، وبصره…</p>
<p dir="rtl" class="p1">ليس في هذا النداء استعانة فقط، بل إعلان ولاءٍ خالص، وانكسارٍ هادئ، وتسليمٍ عميق.</p>
<p dir="rtl" class="p1">"إِنِّي أَضَعُ قَلْبِي بَيْنَ يَدَيْكَ…" ما أعظم هذه العبارة… هي ليست مجرد استعارة، بل إلقاءٌ حقيقي لقلبٍ مُنهك في حضرة المليك، كأنك تقول: " لم أعد أحتمل التفكير، ولا التحليل، ولا التردّد… قلبي خائف… ضعيف… مشتت… فها أنا أضعه بين يديك، فاقلبه، وأصلحه، وثبّته، كما يصلح المليك جنوده، بلا تعب، ولا إذن.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p1">"وَأُمُورِي فِي تَصَرُّفِكَ، وَأَيَّامِي تَحْتَ قَدَرِكَ…" أي: لم أعد أفتّش عن خطة، ولا أركض وراء خيوطٍ كثيرة… أنا فقط أؤمن أن كلّ أموري تجري على سطرٍ كتبه المليك منذ الأزل، فسواء رأيتها تُرضيني أو تُبكيني… هي في النهاية مُلكك يا الله، وأنت لا تُسيء التدبير.</p>
<p dir="rtl" class="p1">"فَكُنْ لِي مُدَبِّرًا، كَمَا أَنْتَ لِلْكَوْنِ مَلِيكٌ…" أي: كما تدوّر الأفلاك بلا خلل، وتُجري السحاب بلا رجاء، وتفتح الأرزاق بلا إذن… فدبّر أمري كما دبّرت الكون، وارزقني من اليقين بقدر ما رزقتني من الهواء والماء…</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p1">"لَا أَرْجُو سِوَاكَ، وَلَا أَخْشَى غَيْرَ حُكْمِكَ…" هذه خلاصة التوحيد… أن لا يكون في قلبك رَجاء لأحد، ولا خوف من أحد، لأنك آمنت أنَّ الحكم لله تعالى وحده، لا للمخلوقين.</p>
<p dir="rtl" class="p1">"وَٱجْعَلْنِي مِمَّنْ سَجَدَ قَلْبُهُ قَبْلَ جَبِينِهِ…"آآآآه… هذه ليست جملة ختامية، بل صرخةُ المحبين، وتوقيعُ الصادقين على عهد العبودية… أن يكون القلب خاشعًا قبل الجسد، وأن يسجد السرّ قبل الجبهة، وأن تنحني الإرادة قبل الرقبة،<br>
وأن تكون عبدًا من الداخل، لا مُمثّلًا للعبودية في الظاهر.</p>
<p dir="rtl" class="p1"><b>الخلاصة التربوية:</b></p>
<table cellspacing="0" cellpadding="0" class="t1">
<tbody>
<tr>
<td valign="middle" class="td69">
  <p dir="rtl" class="p15"><b>الأثر</b></p>
</td>
<td valign="middle" class="td70">
  <p dir="rtl" class="p15"><b>المقام</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td71">
  <p dir="rtl" class="p16"><b>أن لا ترى في أحدٍ حكمًا إلا الله، ولا في غيره أملًا أو خوفًا</b></p>
</td>
<td valign="middle" class="td72">
  <p dir="rtl" class="p17"><b>التوحيد</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td73">
  <p dir="rtl" class="p16"><b>أن تضع قلبك وأمورك وأيامك في يد المليك بثقة، لا باضطراب</b></p>
</td>
<td valign="middle" class="td74">
  <p dir="rtl" class="p17"><b>الرضا</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td71">
  <p dir="rtl" class="p16"><b>أن تكون حقيقيًا في السجود… في القلب أولًا، ثم الجسد</b></p>
</td>
<td valign="middle" class="td72">
  <p dir="rtl" class="p17"><b>العبودية</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td75">
  <p dir="rtl" class="p16"><b>أن تتخلّى عن وهم السيطرة، وتكتفي بحضور المليك في التفاصيل</b></p>
</td>
<td valign="middle" class="td74">
  <p dir="rtl" class="p17"><b>التدبير</b></p>
</td>
</tr>
</tbody>
</table>
<p dir="rtl" class="p36"><b>دعاء التمجيد والانقياد:</b></p>
<p dir="rtl" class="p1">" يَا ٱللَّهُ… أَنْتَ ٱلْمَلِكُ ٱلْحَقُّ، لَا مَلِكَ غَيْرُكَ، وَلَا مُدَبِّرَ سِوَاكَ…<br>
أَنْتَ ٱلَّذِي قَهَرَ ٱلْجَبَابِرَةَ، وَأَذَلَّ ٱلْمُلُوكَ، وَرَفَعَ ٱلْخَاشِعِينَ، فَٱجْعَلْنِي يَا رَبِّ مِنْ عبادك ٱلرَّاضِين، وَٱكْتُبْنِي فِي سِجِلِّ عَبِيدِكَ ٱلْمُخْلِصِينَ، ٱلْخَاضِعِينَ لِحُكْمِكَ، ٱلرَّاضِينَ بِمُلْكِكَ ".</p>
<p dir="rtl" class="p1">ما أبهى هذا الدُّعاء... إنه ليس مجرد نداء، بل إقرارٌ بالتوحيد، وثناءٌ على الجلال، وطلبُ مقعدٍ في حضرة أوليائه الصادقين، وهنا أضع بين أيديكم الرسالة التأملية العميقة والتربوية لهذا الدعاء.</p>
<p dir="rtl" class="p1"><b>الرسالة التأملية لهذا الدُّعاء الجليل: </b><b></b></p>
<p dir="rtl" class="p1">" يَا ٱللَّهُ… أَنْتَ ٱلْمَلِكُ ٱلْحَقُّ…" هذا الدعاء… ليس سؤالًا عابرًا، بل هو بيعة قلبٍ كاملة مع الملك الحقّ، لا شريك له، ولا مُلك سواه.</p>
<p dir="rtl" class="p32">"يا الله… أنتَ الـمَلِكُ الحقّ، لا مَلِكَ سواك…" أي: لستُ فقط أُقرّ بملكك، بل أنفي عن قلبي تعظيم كل مُلكٍ دونك، فلا سلطان يُدهشني، ولا عرش يُغويني، ولا لقب يُغري فؤادي… وإن ناداني الخلق:"عبدًا"، فأنا أفتخر… لأني عبدٌ في حضرةٍ لا تُغلق أبوابها، ولا يُطرَدُ منها السَّجّاد، ولا يُهمّش فيها العُبّاد… بل يُكرَّم فيها الـمُحبّ، ويُقرب منها الـمُنطرح، ويُرفع فيها من أحسن الخضوع."</p>
<p dir="rtl" class="p1">ثم تقول: "وَلَا مُدَبِّرَ سِوَاكَ…" أي: إن بدا لي أنَّ الناس يُخطّطون، أو يتصرّفون، أو يتحكّمون… فأنا أعلم أنَّ ذلك مجرد "قناع"… فالـمُدبّر الحقيقي، هو المليك، وما الناس إلَّا أدواتٌ في يد الحاكم الأعلى، يُحرّكهم حيث يشاء، ومتى يشاء.</p>
<p dir="rtl" class="p1">ثم تُعلن ما رأيته من تجلّيات هذا الاسم في الواقع: "أَنْتَ ٱلَّذِي قَهَرَ ٱلْجَبَابِرَةَ، وَأَذَلَّ ٱلْمُلُوكَ، وَرَفَعَ ٱلْخَاشِعِينَ…"كأنَّك تقول: يا الله… أنا لا أُؤمن بك فقط لأني قرأت عنك… بل لأنني رأيت آثار ملكك في سقوط الطُّغاة، وانكسار الجبابرة، وزوال الجيوش، وتحوّل الموازين، ورأيتك ترفع من لم يكن يملك شيئًا… لأنهم خضعوا لك، لا لأنهم امتلكوا القوة.</p>
<p dir="rtl" class="p1">ثم يأتي أجمل رجاء: "فَٱجْعَلْنِي يَا رَبِّ مِنْ عبادك ٱلرَّاضِين…"أي: اجعلني من الذين يسكنون دائرة الرضا، لا لأن حالهم يُرضيهم… بل لأنهم رضوا بحكمك، رضوا بقسمتك، رضوا بتدبيرك.</p>
<p dir="rtl" class="p1">أن أعيش في عالَمٍ لا يتقلّب بانخفاض الراتب، ولا ينهار بفقدان الخلق…<br>
بل قلبٌ يسكن لأن الله هو الملك، ويبتسم لأنَّ حكمه عدلٌ مطلق.</p>
<p dir="rtl" class="p1">وتختم بيقين العبودية: " وَٱكْتُبْنِي فِي سِجِلِّ عَبِيدِكَ ٱلْمُخْلِصِينَ، ٱلْخَاضِعِينَ لِحُكْمِكَ، ٱلرَّاضِينَ بِمُلْكِكَ ."</p>
<p dir="rtl" class="p1">يا رب… لا أريد اسمًا يُنادى في الأرض… ولا جاهًا يُذكر بين الناس…<br>
بل أريد أن أكون "مكتوبًا في سجلك"... سجلّ خاص، لا يراه البشر، لكنه محفوظٌ في ملأ أعلى، سجلّ فيه عبادٌ لا ينازعون الله في شيء… إذا أمر، قالوا: سمعنا، إذا قضى، قالوا: رضينا، إذا منَع، قالوا: حُبًّا لا اعتراضًا.</p>
<p dir="rtl" class="p1"><b>الدرس التربوي:</b></p>
<table cellspacing="0" cellpadding="0" class="t1">
<tbody>
<tr>
<td valign="middle" class="td76">
  <p dir="rtl" class="p41"><b>الأثر</b></p>
</td>
<td valign="middle" class="td77">
  <p dir="rtl" class="p15"><b>الركن</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td78">
  <p dir="rtl" class="p16"><b>إعلان خضوع قلبي حقيقي، لا مُجرّد طاعة ظاهرية</b></p>
</td>
<td valign="middle" class="td79">
  <p dir="rtl" class="p17"><b>العبودية</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td80">
  <p dir="rtl" class="p16"><b>تصفية القلب من كل تعلّق بمن يظنّ أنه "يملك" أو "يُدبّر"</b></p>
</td>
<td valign="middle" class="td81">
  <p dir="rtl" class="p17"><b>التوحيد</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td78">
  <p dir="rtl" class="p16"><b>إدراك أن الحكم الإلهي لا يُرد، بل يُتلقى بالرضا والخضوع</b></p>
</td>
<td valign="middle" class="td79">
  <p dir="rtl" class="p17"><b>التسليم</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td82">
  <p dir="rtl" class="p16"><b>طلب الانضمام إلى صفّ خاص من عباده: أهل الإخلاص، لا المجاملة</b></p>
</td>
<td valign="middle" class="td81">
  <p dir="rtl" class="p17"><b>الرجاء</b></p>
</td>
</tr>
</tbody>
</table>
<p dir="rtl" class="p36"><b>دعاء الاستنجاد بالمليك في المِحن:</b></p>
<p dir="rtl" class="p1">" يَا مَلِيكَ ٱلنُّفُوسِ، يَا مَنْ لَا تَخْفَى عَلَيْهِ أَنَّاتُ ٱلصُّدُورِ… إِنْ تَاهَ طَرِيقِي، فَسُقْنِي إِلَيْكَ، وَإِنْ ضَعُفَتْ يَدِي، فَأَمْسِكْهَا بِلُطْفِكَ، وَإِنْ ضَاقَ ٱلصَّدْرُ، فَٱفْتَحْهُ بِٱسْمِكَ ٱلْمَلِيكِ ٱلْمُقْتَدِرِ.</p>
<p dir="rtl" class="p1">يا الله… هذا الدعاء قطعة من الرُّوح، ونداء من قلب يعرف طريقه إلى المليك، كلّ حرفٍ فيه أنين مُحب، واعتراف عبدٍ مُنهك، وحنين عبدٍ تائه يريد أن يُمسَك بلُطف لا بعقوبة، وسأقدّم لكم الآن الرسالة التأملية العميقة لهذا الدعاء..</p>
<p dir="rtl" class="p1"><b>الرسالة التأملية لهذا الدعاء الرفيع:</b></p>
<p dir="rtl" class="p1">"يَا مَلِيكَ ٱلنُّفُوسِ…" أنت لا تُنادي ملكًا من بعيد… بل تخاطب مَن يملِك نفَسك وأنت لا تدري… مَن يرى وجعك الذي لا تبوح به… مَن يعلم أنك تبتسم وأنت من الداخل تنكسر… مَن لا يحتاج لتشرح، ولا لتُبرّر، ولا لتُحسن التعبير… لأنه يرى ما فيك قبل أن يراه لسانك.</p>
<p dir="rtl" class="p1">"يَا مَنْ لَا تَخْفَى عَلَيْهِ أَنَّاتُ ٱلصُّدُورِ…" هو لا يسمع الكلمات فقط…<br>
بل يسمع التنهدات، والسكوت، والنظرات الحزينة، واللحظات التي تمنيتَ فيها أن تبكي ولم تستطع… الله يرى الدموع التي لم تنزل… ويسمع التنهيدات التي لم تخرج… لأنه هو المليك المقتدر، يَرى ما لا يُقال… ويعلم ما سُكِت عنه.</p>
<p dir="rtl" class="p1">"إِنْ تَاهَ طَرِيقِي، فَسُقْنِي إِلَيْكَ…" ما أصدق هذا الرجاء… أن لا تطلب أن تُصلح الطريق… بل أن تُساق إلى الله ولو كنت ضائعًا… أن تقول: "يا رب، لا أعرف من أين أبدأ، لكنني أريد أن أعود إليك… فخذ بيدي، واسحب قلبي، واجعلني أعود ولو حبْوًا، ولو بقلبي وحده…"</p>
<p dir="rtl" class="p1">"وَإِنْ ضَعُفَتْ يَدِي، فَأَمْسِكْهَا بِلُطْفِكَ…" كم مرة رفعتَ يديك لتدعو، ثم سقطتا من ضعف الرجاء؟ كم مرة أردت أن تُصلّي، فلم تستطع؟<br>
كم مرة حاولت أن تُصلح نفسك، لكنك سقطت في المنتصف؟..</p>
<p dir="rtl" class="p1">هنا يأتي نداء التوكل الجميل: " يا الله… لا أريد أن أمسك نفسي بنفسي، أمسكها أنت… بلُطفك، لا بقسوتي." </p>
<p dir="rtl" class="p1">"وَإِنْ ضَاقَ ٱلصَّدْرُ، فَٱفْتَحْهُ بِٱسْمِكَ ٱلْمَلِيكِ ٱلْمُقْتَدِرِ…" الناس تقول: اشغل نفسك… تنسَ همّك، لكن العارفين بالله يقولون: نادِ المليك، فهو يفتح ما لا يُفتح بغيره.</p>
<p dir="rtl" class="p1">إنه "ٱلْمَلِيكُ ٱلْمُقْتَدِرُ"… ليس فقط يعلم ما في صدرك، بل يملِك تغييره.<br>
هو القادر أن يُبدّل ضيقك بسعة، وخوفك بأمان، وشتاتك بسكينة.</p>
<p dir="rtl" class="p1"><b>التربية القلبية لهذا الدعاء:</b></p>
<table cellspacing="0" cellpadding="0" class="t1">
<tbody>
<tr>
<td valign="middle" class="td83">
  <p dir="rtl" class="p15"><b>الأثر في النفس</b></p>
</td>
<td valign="middle" class="td84">
  <p dir="rtl" class="p15"><b>المعنى</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td85">
  <p dir="rtl" class="p16"><b>أن تتيقّن أن الله يراك، يسمعك، حتى دون أن تتكلم.</b></p>
</td>
<td valign="middle" class="td86">
  <p dir="rtl" class="p17"><b>معرفة قرب الله</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td87">
  <p dir="rtl" class="p16"><b>أن لا تطلب إصلاح الطريق فقط، بل أن تُساق إليه ولو منكسِرًا.</b></p>
</td>
<td valign="middle" class="td88">
  <p dir="rtl" class="p17"><b>صدق التعلّق</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td85">
  <p dir="rtl" class="p16"><b>أن تسلّم ضعفك وتستعين بلطفه، لا بقوتك.</b></p>
</td>
<td valign="middle" class="td86">
  <p dir="rtl" class="p17"><b>التوكل الحقيقي</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td89">
  <p dir="rtl" class="p16"><b>أن تطلب فتح الصدر من المليك، لا من تغيّر الظروف.</b></p>
</td>
<td valign="middle" class="td90">
  <p dir="rtl" class="p17"><b>الرِّضا والسَّكينة</b></p>
</td>
</tr>
</tbody>
</table>
<p dir="rtl" class="p1">ولأنَّ اسم الله " <span class="s8"><b>ٱلْمَلِكُ وٱلْمَلِيكُ </b></span>" من أعظم الأسماء التي تُرسّخ التوحيد الحقيقي، وحين يُساء فهمها أو تُشوّه معانيها في القلوب والسلوك، يُفتح باب من الانحراف العقدي أو العملي دون أن يشعر الإنسان.</p>
<p dir="rtl" class="p1">فيما يلي أضع بين أيديكم رصدًا دقيقًا لأشهر الانحرافات العقدية والسلوكية المتعلقة بهذين الاسمين، ثم تصحيحًا علميًا وتربويًا واضحًا لكل منها....</p>
<p dir="rtl" class="p1"><br>
<br>
<br>
</p>
<p dir="rtl" class="p24"><b>أولًا: الانحرافات العقدية الشائعة حول "</b><span class="s8"><b>ٱلْمَلِكُ وٱلْمَلِيكُ</b></span><b>":</b></p>
<table cellspacing="0" cellpadding="0" class="t1">
<tbody>
<tr>
<td valign="middle" class="td91">
  <p dir="rtl" class="p15"><b>التصحيح العقدي</b></p>
</td>
<td valign="middle" class="td92">
  <p dir="rtl" class="p15"><b>الوصف</b></p>
</td>
<td valign="middle" class="td93">
  <p dir="rtl" class="p15"><b>الانحراف</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td94">
  <p dir="rtl" class="p16"><b>الله هو ٱلْمَلِكُ في الدنيا والآخرة، ﴿ قُلِ اللَّهُمَّ مَالِكَ الْمُلْكِ ﴾، وتصرف البشر لا يخرج عن قَدَره وسلطانه</b></p>
</td>
<td valign="middle" class="td95">
  <p dir="rtl" class="p17"><b>البعض يظن أنَّ الله "يملِك" في الآخرة فقط، أما الدنيا فتُدار من قِبل البشر أو الأسباب</b></p>
</td>
<td valign="middle" class="td96">
  <p dir="rtl" class="p17"><span class="s22"><b>❌</b></span><b> الظن بأنَّ لله مُلكًا فقط في الآخرة</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td97">
  <p dir="rtl" class="p16"><b>هذا تشبيهٌ وتجسيمٌ باطل، فالله ٱلْمَلِكُ لا يُشبه الملوك، وعرشه لا كعرش أحد، ﴿ </b><span class="s23"><b>لَيْسَ كَمِثْلِهِ شَيْءٌ</b></span><b>﴾</b></p>
</td>
<td valign="middle" class="td98">
  <p dir="rtl" class="p17"><b>فيقولون: "الله جالس على العرش مثل الملك"، أو يتخيلونه بثياب وعرش حسّي</b></p>
</td>
<td valign="middle" class="td99">
  <p dir="rtl" class="p17"><span class="s22"><b> ❌</b></span><b> تصور الملك كصورة بشرية</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td94">
  <p dir="rtl" class="p16"><b>الله هو ٱلْمَلِيكُ الذي يتصرف في كل شيء صغير وكبير، ﴿ </b><span class="s23"><b>وَاللَّهُ يَحْكُمُ لَا مُعَقِّبَ لِحُكْمِهِ</b></span><b> ﴾</b></p>
</td>
<td valign="middle" class="td95">
  <p dir="rtl" class="p17"><b>كما تقول بعض الفِرق أنَّ التفاصيل اليومية لا تعني الله</b></p>
</td>
<td valign="middle" class="td96">
  <p dir="rtl" class="p17"><span class="s22"><b>❌</b></span><b> القول: "الله ملكٌ، لكن لا يتدخل إلَّا في الكليات"</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td100">
  <p dir="rtl" class="p16"><b>الملك لله وحده، وأي اعتقاد بأن غير الله يملك الضر أو النفع شرك في الربوبية</b></p>
</td>
<td valign="middle" class="td98">
  <p dir="rtl" class="p17"><b>كالذين يعتقدون أن أولياء أو أئمة "يملكون النفع والضر" مع الله</b></p>
</td>
<td valign="middle" class="td99">
  <p dir="rtl" class="p17"><span class="s22"><b> ❌</b></span><b> الشرك في المُلك</b></p>
</td>
</tr>
</tbody>
</table>
<p dir="rtl" class="p1"><br>
</p>
<p dir="rtl" class="p24"><b>ثانيًا: الانحرافات السلوكية الناتجة عن ضعف الفهم لاسمه "</b><span class="s8"><b>ٱلْمَلِكُ</b></span><b> – </b><span class="s8"><b>ٱلْمَلِيكُ</b></span><b>":</b></p>
<table cellspacing="0" cellpadding="0" class="t1">
<tbody>
<tr>
<td valign="middle" class="td101">
  <p dir="rtl" class="p15"><b>التصحيح التربوي</b></p>
</td>
<td valign="middle" class="td102">
  <p dir="rtl" class="p15"><b>السلوك الظاهر</b></p>
</td>
<td valign="middle" class="td102">
  <p dir="rtl" class="p15"><b>الانحراف</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td103">
  <p dir="rtl" class="p16"><b>من أيقن أن الله هو المالك، استغنى عن سؤال الخلق، واستشعر غناه بعزّة العبودية</b></p>
</td>
<td valign="middle" class="td104">
  <p dir="rtl" class="p17"><b>سؤال الناس، التذلل لهم، انتظار العطاء منهم</b></p>
</td>
<td valign="middle" class="td104">
  <p dir="rtl" class="p17"><span class="s22"><b>❌</b></span><b> التعلق بالناس</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td105">
  <p dir="rtl" class="p16"><b>لو كنت عبدًا للْمَلِكُ… لا تخشى عبدًا، مهما بدا له سلطان، ﴿ إِنَّ ٱلْعِزَّةَ لِلَّهِ جَمِيعًا ﴾</b></p>
</td>
<td valign="middle" class="td106">
  <p dir="rtl" class="p17"><b>كأن يترك دينه أو الحق خوفًا من فلان لأنه "صاحب قرار"</b></p>
</td>
<td valign="middle" class="td106">
  <p dir="rtl" class="p17"><span class="s22"><b> ❌</b></span><b> الخوف المَرَضي من المخلوقين</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td103">
  <p dir="rtl" class="p16"><b>كل ما عندك مُلْكٌ مُعَارٌ من الله، وهو قادر أن يسلبه متى شاء</b></p>
</td>
<td valign="middle" class="td104">
  <p dir="rtl" class="p17"><b>يظن أن ما لديه من سلطان شخصي هو من ذاته، فيتكبر</b></p>
</td>
<td valign="middle" class="td104">
  <p dir="rtl" class="p17"><span class="s22"><b>❌</b></span><b> الغرور بالجاه والمال</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td105">
  <p dir="rtl" class="p16"><b>من عرف أنَّ الله مليك مقتدر، رضي بتدبيره، حتى لو لم يفهم حكمته</b></p>
</td>
<td valign="middle" class="td106">
  <p dir="rtl" class="p17"><b>التمرّد الداخلي على ما قدّره الله من أحداث أو أقدار</b></p>
</td>
<td valign="middle" class="td106">
  <p dir="rtl" class="p17"><span class="s22"><b>❌</b></span><b> رفض القضاء والقدر</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td107">
  <p dir="rtl" class="p16"><b>إذا دخلت على ملك الدنيا ترتجف، فكيف بمن تملِكُه كلّ الأكوان؟ فاجعل قلبك يسجد قبل جسدك</b></p>
</td>
<td valign="middle" class="td104">
  <p dir="rtl" class="p17"><b>صلاة بلا خشوع، دعاء بلا استحضار مناجاة الملك</b></p>
</td>
<td valign="middle" class="td104">
  <p dir="rtl" class="p17"><span class="s22"><b> ❌</b></span><b> ضعف السُّجود الحقيقي</b></p>
</td>
</tr>
</tbody>
</table>
<p dir="rtl" class="p1"><b>الخلاصة: كيف أُصلح هذه الانحرافات؟</b><b></b></p>
<p dir="rtl" class="p36">أعد بناء صورة الله في قلبك: أنَّ الملك الحقيقي لا يشبه الملوك، بل هو المالك لكل قلب، كل نفس، كل لحظة.</p>
<p dir="rtl" class="p36">حرّر قلبك من الخوف من الناس، ومن التعلق بهم: فالناس لا يملكون لأنفسهم شيئًا، فكيف يملكون لك؟.</p>
<p dir="rtl" class="p36">تعلّم أن السكون للقدر جزء من تعظيم الـمُلك الإلهي: فمن يسخط من القدر، فقد اعترض على الملك.</p>
<p dir="rtl" class="p36">اجعل اسم "ٱلْمَلِكُ" جزءًا من حياتك اليومية: في دعائك، سجودك، قراراتك… اسأل نفسك دائمًا: هل يليق أن أتصرّف هكذا وأنا في مُلك الله؟.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p24"><b>خاتمة وجدانية: حين تنحني القلوب في حضرة </b><span class="s8"><b>ٱلْمَلِكِ ٱلْمَلِيكِ</b><b></b></span></p>
<p dir="rtl" class="p1">إذا عرفتَ أنَّ الله هو <span class="s8"><b>ٱلْمَلِكُ</b></span>… فلن يبقى في قلبك ذلٌّ لأحد،<br>
ولن تنحني روحك لكرسيّ، ولا لمنصب، ولا لجاه، لأنك عبدٌ لملكٍ لا يموت… ملكٍ لا يُزاحمه أحد، ولا يُعجزه أحد، ولا يشاركه في حكمه أحد.</p>
<p dir="rtl" class="p1">وإذا ذقت طُمأنينة اسم <span class="s8"><b>ٱلْمَلِيكِ</b></span>… فستتوقّف عن تفسير الحياة بقلق،<br>
وتركض إلى ربّك بدل أن تركض في الحياة، لأنك تعلم أن المليك يرى، ويُقدّر، ويُدبّر… وأن أصغر تفصيلة في حزنك، وأعمق خفقة في قلبك…<br>
هي عنده، تحت حكمه، وتحت لطفه.</p>
<p dir="rtl" class="p1">نحن لا نحتاج أن نعرف كل الأسباب… يكفينا أن نُسلّم قلوبنا لــ "ٱلْمَلِيكِ ٱلْمُقْتَدِرِ".</p>
<p dir="rtl" class="p1">ولا نحتاج أن نقف طويلًا على باب كل صاحب جاه… يكفينا أن نعلم أن فوق كل سلطان… ملكًا لا يُردّ أمره... فيا من تاه قلبه بين الناس… ارجع إلى الملك.</p>
<p dir="rtl" class="p1">يا من ظنّ أنَّ الرزق بيد المدير، أو النجاح بيد الأستاذ، أو العزّ في المال…<br>
اعلم أن من تعلّق بشيء هلك، وأنك إن تعلّقت بالملك… كنت حرًّا من كل ما سواه... سَل نفسك: </p>
<p dir="rtl" class="p1">كم مرة صلّيت… ولم تحضر قلبك بين يدي "ٱلْمَلِكِ"؟</p>
<p dir="rtl" class="p1">كم مرة بكيت من ألم الناس… ولم ترفع رأسك إلى من يملك قلوبهم وأقدارهم؟</p>
<p dir="rtl" class="p1">كم مرة خطّطت، وخفت، وقلقت… وكأنَّك أنت "المالك"؟<br>
ثم سقطت، فذكّرك الله من جديد:" ٱللَّهُ ٱلْمَلِكُ ٱلْحَقُّ" .</p>
<p dir="rtl" class="p1">في زمنٍ تشوّهت فيه صورة السُّلطان، وتلطّخت الألقاب، وجفّت القلوب من المهابة… نحن لا نحتاج إلى ملكٍ يُعطي… بل إلى ملكٍ نخشاه، ونرجوه، ونسكن في حكمه… ٱللَّهُ هو ٱلْمَلِكُ الذي لا يُنتخب… ولا يُعزل… ولا يرضى إلَّا بقلبٍ خاضعٍ، وجبينٍ ساجدٍ، وعبدٍ لا يرى العزّة إلَّا في عبوديته.</p>
<p dir="rtl" class="p1"><b>ختام النداء:</b></p>
<p dir="rtl" class="p1">يا مَلِكُ… خذ قلبي كلّه، ولا تترك لي شيئًا منه، فأنا أُفسده بجهلي.</p>
<p dir="rtl" class="p1">يا مَلِيكُ… دبّر أمري، كما دبّرت شؤون الأكوان، وأنا أضعف من ذرة فيها.</p>
<p dir="rtl" class="p1">اجعلني ممن يسجد لك بقلبه… قبل أن يركع بجسده.</p>
<p dir="rtl" class="p1">واجعلني ممن يرى في العبودية لك… تحرّره من كل عبودية.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p24"><b>نصيحة مهيبة من قلب "</b><span class="s8"><b>ٱلْمَلِكِ ٱلْمَلِيكِ</b></span><b>":</b></p>
<p dir="rtl" class="p1">لا تُبالِ بصغرِ شأنك في عيون الناس… إذا كنتَ عظيمًا في سجودك بين يدي "<span class="s8"><b>ٱلْمَلِكِ</b></span>".</p>
<p dir="rtl" class="p1">الناس ينظرون إلى ما في يدك… لكن "<span class="s8"><b>ٱلْمَلِكُ</b></span>" ينظر إلى ما في قلبك.</p>
<p dir="rtl" class="p1">الناس يقيسونك بسلطانك، بمالك، بمكانتك… أما "<span class="s8"><b>ٱلْمَلِيكُ</b></span>" فيقيسك بمدى خضوعك له، ورضاك عنه، وتسليمك لحكمه.</p>
<p dir="rtl" class="p1">لا تركض وراء الملوك الأرضيين تطلب رضاهم… فهم أنفسهم لا يملكون لأنفسهم ضرًّا ولا نفعًا… بل خُذ مكانك في ساحة "<span class="s8"><b>ٱلْمَلِكُ الحقّ</b></span>"،<br>
واركع بجبهتك… فإن رفَعَك، لن يُسقطك أحد.</p>
<p dir="rtl" class="p1">وإذا ضاق بك الطريق… فلا تنسَ أن "<span class="s8"><b>ٱلْمَلِيكَ</b></span>" هو من يُدبّر المجهول، ويرى الآتي، ويُصلح الغيب قبل أن تراه.</p>
<p dir="rtl" class="p1"><b>تذكّر دومًا:</b></p>
<p dir="rtl" class="p1">العبودية لغير الله… ذلّ، حتى لو لبستَ التاج.</p>
<p dir="rtl" class="p1">والعبودية لله… عِزّ، حتى لو كنتَ مكسورًا في الأرض.</p>
<p dir="rtl" class="p1">فاختر: أن تكون عبدًا في قصر الله… أم حرًّا في قصر لا يملك لنفسه حتى النور؟.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p24"><b>ماذا أتعلم من اسم الله </b><span class="s8"><b>ٱلْمَلِكُ</b></span><b> وَ</b><span class="s8"><b>ٱلْمَلِيكُ</b></span><b>… كي أنفع الناس؟</b></p>
<p dir="rtl" class="p36">أنّ ما أملكه ليس لي، بل وديعةٌ من الملك: فإذا كنت أملك علمًا، وقتًا، كلمة طيبة، ابتسامة، مكانة، جاهًا… فليس لي، بل هي أمانة في ملكي من الملك الحقّ.</p>
<p dir="rtl" class="p1"><b>النتيجة التربوية</b>: أن لا أتردد في بذل ما أستطيع، ولا أمتنع بحجّة "أنا لا أقدر"، لأن الملك قادر أن يجعل من القليل نهرًا، ومن العبد الضعيف بركة للناس.</p>
<p dir="rtl" class="p36">أنَّ تدخُّل الله في قلبي هو ما يجعلني نافعًا: لست أنفع الناس بعقلي أو لُغتي أو سلطتي… بل بـ توفيقٍ يجريه المليك في قلبي، فلا أقول إلا ما ينفع، ولا أُفتح إلا حين يريد.</p>
<p dir="rtl" class="p1"><b>النتيجة التربوية</b>: أن أبدأ كل خدمة، كل نصيحة، كل مساعدة…<br>
بالتوجّه إلى "<span class="s8"><b>ٱلْمَلِيكِ ٱلْمُقْتَدِرِ</b></span>" أن يجعلني سببًا، لا نجمًا… بابًا، لا مركزًا.</p>
<p dir="rtl" class="p36">أن أعامل الناس كما يعاملنا الملك: لا أُعطي بعُجْب، ولا أمنع ببُخل، ولا أحتقر من سألني… بل أُعطي وأقول في قلبي: "يا رب، كما أنت ملَّكْتَني هذا… اجعلني عبدًا يُنفقه في رضاك."</p>
<p dir="rtl" class="p37"><b>النتيجة التربوية</b>: أن يكون عطائي بأخلاق الملوك لا بسلوك المتملّكين.</p>
<p dir="rtl" class="p36">أن لا أنتظر ردًّا من الناس، لأن الـمُلك ليس لهم: فإن لم يشكروني… فأنا أعمل عند الملك، لا عندهم، وإن جحدوا معروفًا… فالـمَلك يرى، ويكتب، ويكافئ.</p>
<p dir="rtl" class="p24"><b>الدعاء الخاص بهذا المقام:</b></p>
<p dir="rtl" class="p1">" ٱللَّهُمَّ يَا مَلِكُ ٱلْخَلْقِ وَمَلِيكَهُمْ، يَا مَنْ تُجْرِي فِي قُلُوبِ عِبَادِكَ مَا شِئْتَ، وَتَسُوقُهُمْ لِمَا أَرَدْتَ…</p>
<p dir="rtl" class="p1">ٱجْعَلْنِي يَا رَبِّ مِفْتَاحًا لِلْخَيْرِ، بَابًا لِلنَّفْعِ، وَسَبَبًا فِي رَفْعِ الضِّيقِ عَنْ عِبَادِكَ، بِرَضَاكَ، لَا بِذَاتِي.</p>
<p dir="rtl" class="p1">وَٱجْعَلْنِي أَبْذُلُ كَمَا يَبْذُلُ ٱلْمَلِكُ: لَا يَسْتَثْنِي، وَلَا يَمُنُّ، وَلَا يَطْلُبُ شُكْرًا.</p>
<p dir="rtl" class="p1">ٱللَّهُمَّ طَهِّرْ قَصْدِي، وَأَصْلِحْ عَمَلِي، وَسَخِّرْنِي لِمَا تُحِبُّ، وَاجْعَلْنِي بَابًا لِعَطَائِكَ فِي الْأَرْضِ.</p>
<p dir="rtl" class="p1">وَصَلِّ ٱللَّهُمَّ عَلَىٰ نَبِيِّكَ ٱلَّذِي كَانَ أَعْظَمَ خَلْقِكَ نَفْعًا، وَأَكْثَرَهُمْ خُضُوعًا لِمُلْكِكَ، وَعَلَىٰ آلِهِ وَصَحْبِهِ وَمَنْ تَبِعَهُ بِإِحْسَانٍ ".</p>
<p dir="rtl" class="p1">ياالله… ما أعظم هذا الدعاء! إنه دعاء الملوك الحقيقيين… ليس مَن يملكون الأرض، بل مَن تطهّرت قلوبهم من حب الظهور، وتعلّقت أرواحهم بمقام النفع لا التفاخر، وتوجّهوا إلى "<span class="s8"><b>ٱلْمَلِكُ وَٱلْمَلِيكُ</b></span>" لا ليُعطوا لأنفسهم… بل ليكونوا بابًا من أبواب عطائه لعباده.</p>
<p dir="rtl" class="p1">وهاكم الآن أحبتي في الله، الرسالة التأملية العميقة والتربوية لهذا الدعاء،<br>
كخاتمة روحية عظيمة:</p>
<p dir="rtl" class="p1">"ٱللَّهُمَّ يَا مَلِكُ ٱلْخَلْقِ وَمَلِيكَهُمْ…" هذا الدعاء ليس دعاء الجاه ولا العظمة،<br>
بل هو دعاء من عرف عظمة الـمُلْك، فأراد أن يكون خادمًا تحت راية الـمَلك… لا أن يكون شيئًا في ذاته.</p>
<p dir="rtl" class="p1">إنك حين تقول: "يَا مَلِكُ ٱلْخَلْقِ وَمَلِيكَهُمْ…" فأنت لا تفتتح الدعاء بمدحٍ أدبي… بل بإعلان أنك تتوجّه إلى المالك المطلق للقلوب، للأرزاق، للنيات، للأنفاس، للمواقف… وأنك لا تطلب تمكينًا، بل تسخيرًا، لا تطلب رفعةً لك، بل نفعًا لهم… بإذنه.</p>
<p dir="rtl" class="p1">وحين تقول: "ٱجْعَلْنِي مِفْتَاحًا لِلْخَيْرِ، بَابًا لِلنَّفْعِ…" فأنت تعترف أنك لا تملك الخير، لكنك ترجو أن يجعلك الله طريقًا لعبوره، وسَببًا لتخفيف الضيق، ولسانًا لقولٍ يهدي، ويدًا تواسي، وقلبًا يتّسع لعباده.</p>
<p dir="rtl" class="p1">ليس لأنك أهل لذلك… بل لأنك تطلب أن يُستخدم قلبك في خدمة مُلكه.</p>
<p dir="rtl" class="p1">"بِرِضَاكَ، لَا بِذَاتِي…" هذه الجملة تختصر التوحيد العملي كله، أن تتبرأ من نفسك حتى وأنت تفعل الخير، أن تقول: "إن وصل شيء لأحد على يدي، فهو من الله لا مني، ومَن شكرني، فليُحِلّ الشكر لله، فأنا عبدٌ أُرسلت لا أكثر."</p>
<p dir="rtl" class="p1">"ٱجْعَلْنِي أُبْذِلُ كَمَا يَبْذُلُ ٱلْمَلِكُ…" الله أكبر… ما أرقى هذا المعنى !أنت لا تطلب فقط أن تُعطي، بل أن تعطي دون أن تَمُنّ… أن تُكرم دون أن تُحرج… أن تُعطي الفقير ولا تُذلّه، وأن تُنقذ الخاطئ دون أن تُحقّره.</p>
<p dir="rtl" class="p1">فأنت تتعلّم من ٱلْمَلِكِ الذي يعطي العاصي دون أن يُعيّره، ويغفر للعائد دون أن يُذكّره بسقوطه.</p>
<p dir="rtl" class="p1">"وَسَخِّرْنِي لِمَا تُحِبُّ، وَاجْعَلْنِي بَابًا لِعَطَائِكَ فِي الْأَرْضِ…" أي: لا تجعلني أُعطي بعقلي، بل بوحيك، ولا أختار أنا ما أفعله… بل استخدمني حيث تريد، لا حيث أرتاح.</p>
<p dir="rtl" class="p1">"بابًا لعطائك"… أي: لا أكون أنا الهدف… بل أن تُمرّر خيرك من خلالي، وأنا أنزوي…</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p1">"وَصَلِّ عَلَىٰ نَبِيِّكَ… أَعْظَمَ خَلْقِكَ نَفْعًا…" في النهاية، تُعلن النموذج الأعلى: أن أعظم من نفع الخلق هو النبي ﷺ، لكنّه في قمّة هذا النفع… كان أكثر الناس خضوعًا لملك الله، وأشدّهم عبوديّة، وأبعدهم عن الأنا.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p1"><b>الخلاصة التربوية:</b></p>
<table cellspacing="0" cellpadding="0" class="t1">
<tbody>
<tr>
<td valign="middle" class="td108">
  <p dir="rtl" class="p15"><b>الأثر</b></p>
</td>
<td valign="middle" class="td109">
  <p dir="rtl" class="p15"><b>المحور</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td110">
  <p dir="rtl" class="p16"><b>تصفية قصد النفع ليكون لله، لا للذات أو السمعة</b></p>
</td>
<td valign="middle" class="td111">
  <p dir="rtl" class="p17"><b>النية</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td112">
  <p dir="rtl" class="p16"><b>بذل بلا مِنّة، عطاء بلا استعلاء، نصح بلا تجريح</b></p>
</td>
<td valign="middle" class="td113">
  <p dir="rtl" class="p17"><b>السلوك</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td110">
  <p dir="rtl" class="p16"><b>إدراك أن النفع الحقيقي لا يكون إلا بتسخير المليك، لا بجهدك</b></p>
</td>
<td valign="middle" class="td111">
  <p dir="rtl" class="p17"><b>التعلق بالله</b></p>
</td>
</tr>

<p dir="rtl" class="p24"><b>المقاصد العقدية العظيمة لاسم الله "</b><span class="s8"><b>ٱلْمَلِكُ</b></span><b> وَ</b><span class="s8"><b>ٱلْمَلِيكُ</b></span><b>"</b></p>
<p dir="rtl" class="p25">أولًا: أنَّ الله وحده هو صاحب الـمُلك المطلق التامّ <span class="s15">﴿تَبَٰرَكَ ٱلَّذِي بِيَدِهِ ٱلۡمُلۡكُ وَهُوَ عَلَىٰ كُلِّ شَيۡءٖ قَدِيرٌ﴾</span><span class="s13"> </span><span class="s12">الملك: ١</span>.</p>
<p dir="rtl" class="p1"><b>المعنى</b>: لا أحد يملك شيئًا على الحقيقة إلَّا الله، وملك كل أحدٍ غيره فهو عارية زائلة مؤقتة، لا يملك أحد مالًا، ولا عمرًا، ولا نفسًا، ولا روحًا، ولا أرضًا، إلَّا بإذنه.</p>
<p dir="rtl" class="p1"><b>المقصد العقدي</b>: تحقيق توحيد الربوبية بأكمله، ونفي الشرك في الملك، والتحرّر من التعلّق بكل من يظنّ الناس أنه "مالك".</p>
<p dir="rtl" class="p25">ثانيًا: أنَّ ملكه سبحانه شاملٌ للظَّاهر والباطن، وللحسِّ والمعنى: فهو ٱلْمَلِكُ للخلق والأجساد، وٱلْمَلِيكُ للقلوب والنوايا والأقدار الخفية.</p>
<p dir="rtl" class="p1"><b>المعنى</b>: ليس ملك الله كملك البشر (ملك شكلي أو جزئي أو رمزي)،<br>
بل هو يملِك وجودك، وسير حياتك، وقلقك، وطُمأنينتك، ودمعتك، وخوفك، وحبك، وموعد موتك.</p>
<p dir="rtl" class="p1"><b>المقصد العقدي:</b> أنَّ القلب لا يتعلّق بشيء من الأشياء، لأنه يعلم أن كل ما يجري في الحياة هو ملك مدبَّر بأمر مليك لا يُسأل عما يفعل.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p25">ثالثًا: أنَّ الله تعالى لا يُنازع في ملكه، ولا يُعقّب على حكمه: <span class="s15">﴿لَا يُسۡـَٔلُ عَمَّا يَفۡعَلُ وَهُمۡ يُسۡـَٔلُونَ﴾</span><span class="s13"> </span><span class="s12">الأنبياء: ٢٣</span>.</p>
<p dir="rtl" class="p1"><b>المعنى</b>: إذا حكم الله في أمر، فلا يجوز الاعتراض، ولا يحقّ للمخلوق المراجعة، لأنَّ الملك الحق مطلق الإرادة، كامل الحكمة، شامل القدرة.</p>
<p dir="rtl" class="p1"><b>المقصد العقدي</b>: تحقيق الرِّضا بالقضاء والقدر، والتسليم الكامل لمشيئة الله، بلا اعتراض داخلي ولا خارجي.</p>
<p dir="rtl" class="p43"><span class="s1">رابعًا: أنَّ الله تعالى يهب الملك لمن يشاء، وينزعه ممن يشاء: </span>﴿قُلِ ٱللَّهُمَّ مَٰلِكَ ٱلۡمُلۡكِ تُؤۡتِي ٱلۡمُلۡكَ مَن تَشَآءُ وَتَنزِعُ ٱلۡمُلۡكَ مِمَّن تَشَآءُ وَتُعِزُّ مَن تَشَآءُ وَتُذِلُّ مَن تَشَآءُۖ بِيَدِكَ ٱلۡخَيۡرُۖ إِنَّكَ عَلَىٰ كُلِّ شَيۡءٖ قَدِيرٞ﴾</span> ﴿قُلِ ٱللَّهُمَّ مَٰلِكَ ٱلۡمُلۡكِ تُؤۡتِي ٱلۡمُلۡكَ مَن تَشَآءُ وَتَنزِعُ ٱلۡمُلۡكَ مِمَّن تَشَآءُ وَتُعِزُّ مَن تَشَآءُ وَتُذِلُّ مَن تَشَآءُۖ بِيَدِكَ ٱلۡخَيۡرُۖ إِنَّكَ عَلَىٰ كُلِّ شَيۡءٖ قَدِيرٞ﴾<span class="s13"> </span><span class="s14">آل عمران: ٢٦</span><span class="s1">.</span></p>
<p dir="rtl" class="p1"><b>المعنى</b>: لا أحد يرتقي إلى مقام أو يترقّى في جاه أو يتحصّل على مُلك إلَّا بتقدير الله، ولا أحد يسقط من علوّ أو يُجرَّد من سُلطان إلا بأمر المليك، لا بحسابات البشر.</p>
<p dir="rtl" class="p1"><b>المقصد العقدي</b>: الإيمان بأنَّ التمكين لا يأتي بالحيلة فقط، ولا يُسلب بسبب الظلم فقط، بل كله بتقدير الملك المهيمن.</p>
<p dir="rtl" class="p25">خامسًا: أنَّ الله تعالى ملك يوم الدين… فلا سلطان لأحد عنده يوم الحساب: <span class="s15">﴿يَوۡمَ هُم بَٰرِزُونَۖ لَا يَخۡفَىٰ عَلَى ٱللَّهِ مِنۡهُمۡ شَيۡءٞۚ لِّمَنِ ٱلۡمُلۡكُ ٱلۡيَوۡمَۖ لِلَّهِ ٱلۡوَٰحِدِ ٱلۡقَهَّارِ﴾</span><span class="s13"> </span><span class="s12">غافر: ١٦</span></p>
<p dir="rtl" class="p1"><b>المعنى</b>: الذي كان يتسلّط هنا… سيسقط هناك، والذي كان ضعيفًا هنا… يُنصفه الملك العدل هناك، فلا قضاء فوق قضاء الله، ولا كفيل ولا واسطة يوم يقوم الناس لرب العالمين.</p>
<p dir="rtl" class="p1"><b>المقصد العقدي</b>: تحقيق الخشية من يوم الحساب، وتجريد القلب من الغرور الدنيوي، والاستعداد للوقوف بين يدي ملكٍ لا يُجامل.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p25">سادسًا: أنَّ من صفاته كملك… أنه يُعطي بلا سؤال، ويأخذ بلا استئذان:</p>
<p dir="rtl" class="p1"><b>المعنى</b>: الله يعطيك عمرك، رزقك، أهلك، جاهك، دون أن تسأله ذلك،<br>
ويأخذ منك حين يشاء، ولا تملك ردّ ذلك، ولا سؤال "لماذا؟".</p>
<p dir="rtl" class="p1"><b>المقصد العقدي</b>: ترسيخ شهود الفضل في كل عطية، وشهود الذلّ والخضوع في كل بلاء… فأنت عبد، لا مالك، ولا مستحق.</p>
<p dir="rtl" class="p25">سابعًا: أنَّ من أعظم آثار الإيمان بهذين الاسمين… كمال التوحيد، وكمال التوكل:</p>
<p dir="rtl" class="p1"><b>المعنى</b>: إذا كنتَ تؤمن أن الله هو الملك والمليك، فلا تتعلّق بأسباب، ولا تَذلّ لمخلوق، ولا تيأس من تأخير، بل تتوكّل، وتسعى، وتنتظر… من الملك، لا من الناس.</p>
<p dir="rtl" class="p1"><b>المقصد العقدي</b>: أن لا يتحقّق توحيد العبودية إلَّا إذا خضعت للملك، واطمأننت للمليك، ورضيت بحكمه، وسَعيت بأمره.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p1"><b>خلاصة المقاصد العقدية في جملة واحدة:</b></p>
<p dir="rtl" class="p1">إذا خضع قلبك لاسم "<span class="s8"><b>ٱلْمَلِكُ</b></span>"، واطمأنّ لاسم "<span class="s8"><b>ٱلْمَلِيكُ</b></span>"… فقد عرفت ربك حقًّا، وتوحّدت عبوديتك له، وانقطعت عن كل شيء سواه.</p>

<p dir="rtl" class="p44">( ٱلْعَزِيزُ – ٱلْجَبَّارُ )</p>
<p dir="rtl" class="p45"><b>ٱلْعَزِيزُ</b> …</p>
<p dir="rtl" class="p1">هو الذي لا يُغلب ولا يُقهر، الذي يعلو على كل شيء في الكون بعظمته وقوته، هو الذي لا يمكن لأي شيء أن يُنقص من هيبته أو يعترض طريقه..</p>
<p dir="rtl" class="p45"><b>ٱلْعَزِيزُ</b> …</p>
<p dir="rtl" class="p1">هو الذي يملك سلطانًا مطلقًا لا يُحدّ، ويُدير كل الأمور بحكمة وعظمة، هو الذي إذا أراد شيئًا فإنما يقول له كُن فيكون، لا يُعجزه شيء في الأرض ولا في السماء، وكل شيء في الوجود خاضع لعزته وقدرته.</p>
<p dir="rtl" class="p45"><b>ٱلْعَزِيزُ</b><span class="s9"> </span>…</p>
<p dir="rtl" class="p1">هو الذي يعلو بقدره، ويُسددك في كل خطوة تخطوها، هو الذي يُكرمك ويمنحك من عزته لتواجه كل ما يعترض طريقك، في لحظات الشدة تذكر أن الله هو العزيز الذي يحميك، ويجعلك تظل ثابتًا، مهما كانت التحديات كبيرة أو صعبة، هو الذي يُعطيك العزة الحقيقية عندما تشعر بالضَّعف، ويُعزز كرامتك ويُثبّتك في أوقات الألم والضَّعف.</p>
<p dir="rtl" class="p45"><b>ٱلْعَزِيزُ</b> …</p>
<p dir="rtl" class="p1">هو الذي يملك القوة التي لا يُحدّها شيء، وهو الذي يرفعك عن الضغوط والظروف الصعبة، ويجعلك تعيش في سلام داخلي، لأنك تعلم أن الله هو الذي يدبر لك كل الأمور برحمة، <span class="s27"><b>ولا شيء يمكن أن يُؤذيك دون علمه</b></span><b>،</b> في أوقات صعوبة الحياة تذكر أنَّ الله هو العزيز الذي يرفعك عن كل مكر أو غدر.</p>
<p dir="rtl" class="p45"><b>ٱلْعَزِيزُ</b><span class="s9"> </span>…<span class="s9"> </span></p>
<p dir="rtl" class="p1">هو الذي يُظهر لك في كل لحظة من حياتك كيف أنَّ الكرامة الحقيقية هي الاعتماد على الله، هو الذي يُعزّ من يشاء ويذلّ من يشاء، ويمنحك من عزته ما يُشعر قلبك بالراحة والاطمئنان، في كل مرة تواجه فيها تحديًا أو تحمّلًا، تذكر أنَّ الله هو العزيز الذي يُعينك ويمنحك القوة لتواجه كل شيء بقلب ثابت.</p>
<p dir="rtl" class="p45"><b>ٱلْعَزِيزُ</b> …</p>
<p dir="rtl" class="p1">إذا شعرت بالتحديات أو أنك في موقف صعب، تذكر أنَّ الله هو العزيز الذي لا يُغلب، وأنه قادر على حمايتك وإعطائك القوة... ثق في أن الله يمنحك العزة الحقيقية في أوقات الضيق، وأنه سيُسددك في كل خطوة، ويُعزك برعايته وحكمته، العزيز هو الذي لا يغلبه شيء، وأنت في رعايته وأمانه.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p45"><b>ٱلْجَبَّارُ...</b><span class="s28"> </span></p>
<p dir="rtl" class="p1">هو الذي يُقوّم ويُصلح كل شيء في هذا الكون، الذي لا يُمكن أن يظلم أحدًا، ولا يُسْتَحق الظلم في ملكه، هو الذي يَجبرك عندما تنكسر، ويُعيدك إلى قوتك في اللحظات التي تشعر فيها أنك فقدت كل شيء، هو الذي يملك القدرة على تصحيح الأمور، ويُعالج جراحك، سواء كانت جراحًا نفسية أو جسدية، ويُعيد لك الطاقة الداخلية ليعود قلبك إلى النبض بالحياة من جديد.</p>
<p dir="rtl" class="p45"><b>ٱلْجَبَّارُ...</b><span class="s28"> </span></p>
<p dir="rtl" class="p1">هو الذي يُعيد ترتيب ما فسد في حياتك، ويُرمّم ما تكسر، إنه الذي يضع الأمور في نصابها عندما تكون الحياة في فوضى، ويجعل كل شيء يرجع إلى وضعه الطبيعي، عندما تشعر أنك في حالة من الضَّياع، تذكر أن الجبار هو الذي يُعيدك إلى الطريق الصحيح، ويُعطِيك القوة لتستمر.</p>
<p dir="rtl" class="p45"><b>ٱلْجَبَّارُ...</b><span class="s28"> </span></p>
<p dir="rtl" class="p1">هو الذي يجبر قلبك عندما ينكسر، ويُلملم شتاتك بعد الفقد، هو الذي يجعل لك من الضعف قوة، ومن الخذلان أملًا جديدًا، في لحظات الألم، يكون الجبار هو الذي يفتح لك أبوابًا جديدة للراحة والسَّكينة، ويمنحك القوة لتخطي التحديات، هو الذي يُعيدك من جديد، ويجعلك تعود إلى نفسك أقوى من قبل.</p>
<p dir="rtl" class="p45"><b>ٱلْجَبَّارُ...</b><span class="s1"> </span></p>
<p dir="rtl" class="p1">هو الذي لا يُعجزه شيء، وهو الذي يمتلك القدرة على تغيير مجرى حياتك من لحظة إلى أخرى، بحكمته ورحمته، قد تكون في موقف صعب أو مأساوي، لكن الجبار هو الذي يرفعك ويجبرك في الوقت الذي لا تتوقعه، يُعطيك القوة للاقتراب من الله في لحظات الضعف، ويجعل منك شخصًا أكثر قوة وصلابة.</p>
<p dir="rtl" class="p45"><b>ٱلْجَبَّارُ...</b><span class="s28"> </span></p>
<p dir="rtl" class="p1">عندما تشعر أنك قد وصلت إلى نهاية الطريق، تذكر أن الله هو الجبار، الذي يُعيدك إلى مكانك الصحيح، ويمنحك القوة لتستمر في الحياة، ثق أنه سيُجبر قلبك ويُعيد لك الراحة والأمل من جديد، مهما كانت الصعاب.</p>
<p dir="rtl" class="p1">اسم الله "<span class="s8"><b>ٱلْجَبَّارُ</b></span>" يحمل معنيين عظيمين متكاملين، لا يُفهم الاسم فهمًا صحيحًا إلا بجمعهما معًا:</p>
<p dir="rtl" class="p36"><span class="s2"><b>الجَبْرُ بالرِّفْق والرحمة:</b></span> وهو المعنى الذي يُطمئن القلوب ويُحيي المكسورين: الجَبَّارُ هو الذي يجبر المنكسرين بلطفه، فيجبر القلوب بعد الحزن،<br>
ويجبر النفوس بعد الانكسار، ويجبر الضعفاء بالستر، ويجبر المصائب بالعوض، قال ابن القيم رحمه الله: " الجبّار من أسمائه الحسنى، هو الذي يجبر الضعيف، ويجبر كسر المنكسرين، ويغني الفقير، ويُيسر على المعسر" ، وهذا من جمال الله… فهو جبّار ليس فقط على الظالمين، بل أيضًا للمظلومين.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p36"><span class="s2"><b>الجَبْرُ بالقهر والعلو:</b></span> وهو المعنى الذي يُرهب الطغاة ويكسر الجبابرة من خلقه: <span class="s8"><b>الجَبَّارُ</b></span> هو الذي لا يُعلو عليه شيء، ويُجبر الخلق على أمره إذا شاء، ولا رادّ لحكمه، ولا معقّب لقضائه، ولا مهرب من سلطانه.</p>
<p dir="rtl" class="p37">قال الطبري: " <span class="s8"><b>الجبّارُ</b></span> الذي لا يُدرك، ولا يُرام أمره، وهو القاهر فوق عباده، العالي عليهم "، فهو جبار على من بغى، وجابر لمن انكسر إليه.</p>
<p dir="rtl" class="p1"><b>السِّرّ البديع:</b></p>
<p dir="rtl" class="p1">حين تقول:"يا جبّار"… فأنت تُنادي بعينٍ دامعة إن كنت مكسورًا، وتُعلن الانكسار له إن كنت متجبرًا… فـ "<span class="s8"><b>ٱلْجَبَّارُ</b></span>" جَبْره يحيي القلوب، ويَردع الظالمين، ويُقيم المائلين.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p24"><b>عناوين تأملية لاسم الله ٱلْعَزِيزُ:</b></p>
<p dir="rtl" class="p25">عِزَّتُه تحميك… فلا تُذِلَّ نفسك لأحد.</p>
<p dir="rtl" class="p31"> <b>دلالة</b>: من عرف عزة ربّه، استعفّ عن طلب العزّة من الناس.</p>
<p dir="rtl" class="p25">إذا قال ٱلْعَزِيزُ "كُن"... ذَلَّ كلُّ عزيز.</p>
<p dir="rtl" class="p31"> <b>دلالة</b>: لا سلطان فوق عزّته، ولا ملك يعلو أمره.</p>
<p dir="rtl" class="p25">كل من تعلّق بعزّة غير الله… أذلَّه الله.</p>
<p dir="rtl" class="p31"><b>دلالة</b>: العزّة الحقيقية في الخضوع للعزيز.</p>
<p dir="rtl" class="p25">عزَّ ربُّك في عليائه… وأنت تتقوّى به في ضعفك.</p>
<p dir="rtl" class="p31"><b>دلالة</b>: نستمد عزّتنا من عزه.</p>
<p dir="rtl" class="p25">ٱلْعَزِيزُ… الذي لا يُدنى جنابه، ويُؤمن جنابه.</p>
<p dir="rtl" class="p31"><b>دلالة</b>: يَمنع العداء، ويؤمّن أولياءه.</p>
<p dir="rtl" class="p24"><b>عناوين تأملية لاسم الله ٱلْجَبَّارُ:</b></p>
<p dir="rtl" class="p25">القلوب المكسورة… تعرف طريق الجبّار.</p>
<p dir="rtl" class="p31"><b>دلالة</b>: هو ملجأ المنكسرين، والملاذ في الضعف.</p>
<p dir="rtl" class="p25">ٱلْجَبَّارُ… يجبرك بلُطف، ويجبر خصمك بقهر.</p>
<p dir="rtl" class="p31"><b>دلالة</b>: اسم يتجلّى بالرَّحمة أو القوّة بحسب الحال.</p>
<p dir="rtl" class="p25">حين يعجز الطبيب… يبدأ جبر الجبّار.</p>
<p dir="rtl" class="p31"><b>دلالة</b>: جبره فوق الأسباب، فوق الخلق، فوق الطب.</p>
<p dir="rtl" class="p25">كل كسرٍ لا يجبره أحد… إلَّا الجبّار.</p>
<p dir="rtl" class="p31"><b>دلالة</b>: لا جابر للنفوس والقلوب إلَّا هو.</p>
<p dir="rtl" class="p25">ٱلْجَبَّارُ… لا يُقْهِر الضعيف، بل يقهر من قَهَرَ الضعفاء.</p>
<p dir="rtl" class="p31"><b>دلالة</b>: يبطش بالظَّالم، ويرفع المظلوم.</p>
<p dir="rtl" class="p31">"إذا جبَرَ الجبّار… خَضعت الأكوان، وسقطت التيجان".</p>
<p dir="rtl" class="p31">"الجبّار… حين لا يبقى للجبابرة ملجأ".</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p24"><b>عناوين مزدوجة تجمع بين الاسمين:</b></p>
<p dir="rtl" class="p25">عِزَّةُ العزيز… وجَبْرُ الجبّار.</p>
<p dir="rtl" class="p31"><b>دلالة</b>: توازن بين الهيبة والرَّحمة.</p>
<p dir="rtl" class="p25">إذا انكسر ظهرك… جاء العزيز بقوّته، والجبّار بجبره.</p>
<p dir="rtl" class="p31"><b>دلالة</b>: العون الرَّباني الكامل.</p>
<p dir="rtl" class="p25">ٱلْعَزِيزُ إذا نَصَرَ… وَٱلْجَبَّارُ إذا جَبَرَ… لم يبقَ من ألمك شيء.</p>
<p dir="rtl" class="p31"><b>دلالة</b>: نصر وعزاء إلهي لا يُضاهى.</p>
<p dir="rtl" class="p19"><br></p>
<p dir="rtl" class="p19"><br></p>
<p dir="rtl" class="p24"><b>التمهيد الوجداني لاسم الله </b><span class="s8"><b>ٱلْعَزِيزُ</b></span><b> – </b><span class="s8"><b>ٱلْجَبَّارُ</b><b></b></span></p>
<p dir="rtl" class="p1">حين تضيق بك الأرض بما رحُبت… حين تشعر أنَّ لا أحد يراك حقًّا، ولا أحد يسمع ما لا يُقال… حين تنهار في داخلك، بينما تُجيد التماسك في الخارج… تذكَّر أنَّ لك ربًّا عزيزًا لا يُغلب، وجبّارًا لا يُهزم، يرى موضع انكسارك فيك… حتى وإن غابت ملامحه عنك.</p>
<p dir="rtl" class="p1"><span class="s8"><b>ٱلْعَزِيزُ</b></span>… هو من لا يُنال جنابه، ولا تُدرك ذاته، ولا يُقهَر أمره، عزّته ليست كعزّة البشر… فهم يعتزّون بالتكبّر… وهو يعتزّ بالرَّحمة، ويتجلّى بالعفو.</p>
<p dir="rtl" class="p1">هم يعلون ليُذلّوا… وهو يعلو ليحمي، ليمنع عنك كيدًا لم تره، وخطرًا لم تعلمه.</p>
<p dir="rtl" class="p1">وإذا منحك من عزّته شيئًا… مشى الناس إليك بتوقير لا تدري كيف صُبّ في قلوبهم.</p>
<p dir="rtl" class="p1">أما <span class="s8"><b>ٱلْجَبَّارُ</b></span>… فهو الذي لا يجبر أحدٌ سواه، هو من إذا سقطتَ ولم تجد يدًا تمتدّ إليك… مدّ إليك جبرًا لا يُرى، فرفعك بلُطف لا يُنسى.</p>
<p dir="rtl" class="p1">هو من يجبُر القلب المكسور، والروح المتعبة، والضعف العالق في صدرك،<br>
لا بصدقة منّة، ولا بعوضٍ مستحق… بل بجلال كرمه، ورفعة رحمته.</p>
<p dir="rtl" class="p1"><span class="s8"><b>ٱلْجَبَّارُ</b></span>… ليس فقط قاهر الجبابرة، بل هو جابر المنكسرين، يُطبطب على قلبٍ حزين في جوف الليل، ويرفع مقام عبدٍ ضعيف، لأنه طرق بابه لا غير.</p>
<p dir="rtl" class="p1">وما أجمل أن يجتمع الاسمان… فإذا رأيت الظالم يتجبّر، فاعلم أن العزيزَ فوقه… وإذا رأيت نفسك قد انكسرت في العزّ… فأنت على موعد مع الجبّار… يجبرك بعزّة لا تُذِلّ، بل تُحيي.</p>
<p dir="rtl" class="p14"><b>خاطرة: حين لم أجد من يرفعني… رفعني الله</b></p>
<p dir="rtl" class="p1">لم يكن في حياتي شيء يدعو للفخر… سقطتُ كثيرًا، وتأذّيت أكثر…<br>
ولم أعد أعرف: أأنا ضعيف؟ أم الحياة أقسى من أن تُحتمل؟..</p>
<p dir="rtl" class="p1">حتى وقفتُ ذات ليل، لا معي أحد، ولا في صدري سوى شظايا قلب... فناديتُه… باسمه الذي لم أفهمه من قبل: يا <span class="s8"><b>جَبَّار</b></span>.</p>
<p dir="rtl" class="p1">كنتُ أظن أن الجبّار هو من يقهر الطغاة… لكنّي اكتشفت أن الجبّار هو أول من يسمع وجع المنكسرين.</p>
<p dir="rtl" class="p1">هو الذي لا تحتاج أن تشرح له ما كُسر فيك… يكفي أن تبكي فقط دون صوت… فيجبرك بلُطف لا يُشبه شيئًا.</p>
<p dir="rtl" class="p1">ثم علمتُ… أن من جبرني هكذا، هو العزيز… الذي يرفعك، لا لأنك تستحق، بل لأنه لا يحب أن يُهان عبدٌ احتمى به.</p>
<p dir="rtl" class="p1">يا رب… أنت عزيز لا تُقهر… وجبّار لا تُجارى… فاجعل عزّتي بك، وجبري منك، ولا تكلني يومًا إلى نفسي ولا إلى الناس.</p>
<p dir="rtl" class="p14"><b>تدبر وتأمل لاسم الله "</b><span class="s8"><b> ٱلْعَزِيزُ</b></span><b> ":</b></p>
<p dir="rtl" class="p46"><b>( ٱلْعَزِيزُ… الذي لا يُغلب، ولا يُقارب، ولا يُدانى ):</b></p>
<p dir="rtl" class="p1">"<span class="s8"><b>ٱلْعَزِيزُ</b></span>"… هو الذي لا يُقهَر في قدره، ولا يُردّ في أمره، ولا يُشارَك في سلطانه، هو العزيز في قوته، في هيبته، في علوّه، في قهره، في غناه، في رحمته أيضًا.</p>
<p dir="rtl" class="p1"><b>ثلاث دوائر يتجلّى فيها اسم "</b><span class="s8"><b>ٱلْعَزِيزُ</b></span><b>":</b></p>
<p dir="rtl" class="p36">عزّة القهر والامتناع: هو الذي يُعزّ من أطاعه، ويُذلّ من عصاه، لا يغلبه شيء، ولا يبلغه أحد، قال تعالى: ﴿ وَإِنَّ رَبَّكَ لَهُوَ ٱلْعَزِيزُ ٱلرَّحِيمُ ﴾ الشعراء: 9، يا لها من مهابة ورحمة… قوّة لا تُقهر، لكنها لا تُؤذي.</p>
<p dir="rtl" class="p36">عزّة الملك والاستغناء: لا يحتاج إلى أحد، ولا يُنقصه شيء، ولا يُطلب له عون، كل خلقه… في فقرٍ مطلق إليه، قال تعالى: ﴿ وَمَا رَبُّكَ بِغَافِلٍ عَمَّا تَعْمَلُونَ، وَرَبُّكَ ٱلْعَزِيزُ ٱلْغَفُورُ ﴾</p>
<p dir="rtl" class="p36">عزّة النُّصرة والتدبير: هو الذي إذا أراد أن يُعزّ عبدًا رفعه فوق الخلق… ولو حاربوه، ولو ظنوه مكسورًا، كما قال يوسف عليه السلام بعد أن أذلّه الناس، فجعل الله له عاقبة العزّ: ﴿ إِنَّهُۥ رَبِّى بِأَحْسَنَ مَثْوَىٰٓ إِنَّهُۥ لَا يُفْلِحُ ٱلظَّـٰلِمُونَ ﴾.</p>
<p dir="rtl" class="p1">حين تتدبر اسم "<span class="s8"><b>ٱلْعَزِيزُ</b></span>" تتعلّم ألَّا تتوكل على ضعيفٍ، ولا تتعلق بمغلوب، وتفهم أنَّ العزّة لا تُؤخذ من المناصب، ولا المال، ولا الجاه… بل من القرب من الله العزيز، وتوقن أن كل من تجرأ على عزيزٍ بحق… كان الله خصمه.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p1"> "يا عزيز… أعزّني بك، ولا تُذلّني بسواك، يا عزيز… اجعل عزّتي في طاعتك، لا في عصيانك، وفي قربي منك، لا في بُعدي عنك، وفي رضاك، لا في رضا الخلق عني، يا عزيز… اجعلني عبدًا عزيزًا بك وحدك ."</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p14"><b>تدبر وتأمل لاسم الله "</b><span class="s8"><b> ٱلْجَبَّارُ</b></span><b> ":</b></p>
<p dir="rtl" class="p46"><b>( ٱلْجَبَّارُ… إذا أراد جَبَر، وإذا شاء قَهَر ):</b><b></b></p>
<p dir="rtl" class="p1">اسمٌ تتزلزل له قلوب الجبابرة… وترتفع به أرواح المنكسرين.</p>
<p dir="rtl" class="p1">"<span class="s8"><b>ٱلْجَبَّارُ</b></span>" في لغة العرب يأتي من "الجبر"، وهو:</p>
<p dir="rtl" class="p47">إصلاح الشيء المنكسر.</p>
<p dir="rtl" class="p47">وإلزام الشيء على ما لا يريده.</p>
<p dir="rtl" class="p47">والعلوّ الذي لا يُطال.</p>
<p dir="rtl" class="p1">فهو اسم يحمل وجهين لا يفترقان:</p>
<p dir="rtl" class="p36">جبروت الرحمة: الجبّار الذي يجبر المكسورين: هو الذي إذا انكسرتَ بين يديه، جبَرك بلطفٍ لا يُوصف.</p>
<p dir="rtl" class="p47">يجبر قلب اليتيم حين لا أب له.</p>
<p dir="rtl" class="p47">ويجبر خاطر الأم حين تنام ودمعتها على خدّها.</p>
<p dir="rtl" class="p47">ويجبر دعاء الملهوف حين يهمس باسمه دون صوت.</p>
<p dir="rtl" class="p1">قال ابن القيم: " الجبّار من أسمائه الحسنى… هو الذي يجبر كسر المساكين، ويُغني الفقراء، ويُؤوي المنكوبين ."</p>
<p dir="rtl" class="p1">وإذا ناديت في سجودك: " يا جبّار، جَبْرَك الّذي لا يُذلّ" فأنت تُناجي عظمةً تُجبرك، لا تُهينك.</p>
<p dir="rtl" class="p36">هو الذي لا يعلو عليه شيء، ولا يُرَدُّ أمره، ولا يُفلت من حكمه أحد، قهر الجبابرة من قبل، وأسقط العروش، ومزّق الممالك، ودمّر من قالوا: "أنا ربكم الأعلى".</p>
<p dir="rtl" class="p1">قال الحسن البصري: " ما دخل قلبَ عبدٍ شيءٌ من الكِبْر، إلا أبعده الله عن الجبّار " فإن أردت أن تُرى بعين الجبّار… فانكسر، ولا تتجبّر.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p1"><b>تأمل معي: </b></p>
<p dir="rtl" class="p1">"<span class="s8"><b>الجبّار</b></span>" في حق الله ليس صفة ظلم كما يتوهم الناس… بل صفة كاملة في العدل والرَّحمة والحُكم والهيبة.</p>
<p dir="rtl" class="p1">هو جبّار إذا ظلمك الناس… فجَبَرك.</p>
<p dir="rtl" class="p1">وجبّار إذا ظلمت الناس… فقَهَرك.</p>
<p dir="rtl" class="p1">وجبّار إذا ظننت أن لا شيء يُصلحك… فأعاد بناءك.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p1"><b>دعاء قلبي باسم الجبّار:</b></p>
<p dir="rtl" class="p1">" يا جبّار السماوات والأرض… اجبر قلبي إذا انكسر، وقلبي اليوم منحنٍ… لا لأحدٍ، بل لك يا جبّار… لا تجعلني ممن تجبرهم بالقهر،<br>
بل اجعلني ممن ترفق بهم في الخفاء… وتُقيمهم بالجبر الرحيم." </p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p33"><b>حين يتجلّى اسم الله "</b><span class="s10"><b> ٱلْعَزِيزُ</b></span><b> " – "</b><span class="s10"><b> ٱلْجَبَّارُ</b></span><span class="s11"><b> </b></span><b>" في قلبك…</b></p>
<p dir="rtl" class="p1">حين يتجلّى في قلبك اسم "<span class="s8"><b> ٱلْعَزِيزُ</b></span>" تعرف أنك لا تُهزم لأنَّك قوي، بل لأن الله يُعزُّك، وأنَّ كرامتك لا تأتي من منصب، ولا هيبة وجه، بل من قربك من ربٍّ لا يُقهَر… فهو العزيز الذي لا يُغلَب، فإذا أكرمك… فلا أحد يُهينك، وإذا رفعك… فلا أحد يُسقطك.</p>
<p dir="rtl" class="p1">"<span class="s8"><b> ٱلْعَزِيزُ</b></span>" هو الذي إن احتميتَ به، لم يقدر عليك أحد، وإن استندتَ إليه، لم تقع، وإن استغنيتَ بعزته… لم تُذلّك الدنيا ولو اجتمعت.</p>
<p dir="rtl" class="p1">ثم إذا تجلّى في قلبك اسم "<span class="s8"><b> ٱلْجَبَّارُ</b></span><span class="s2"><b> </b></span>" فهو لا يعني البطش كما يتوهم البعض، بل يعني: من يجبر الكسر… ويُرمّم قلبك حين تنكسر، ويُقيمك إذا سقطت،<br>
ويعيدك إليك حين تُشتّت.</p>
<p dir="rtl" class="p1">"<span class="s8"><b> ٱلْجَبَّارُ</b></span><span class="s2"><b> </b></span>" ليس مُرعبًا لعبده، بل مُرعبٌ لمن ظلم عبده… هو الذي إن ظُلمت، جبرك، وإن خُذِلت، نَصرك، وإن أُهنت، رفعك.</p>
<p dir="rtl" class="p1">"<span class="s8"><b> ٱلْجَبَّارُ</b></span><span class="s2"><b> </b></span>"… يُنصفك ولو بعد حين، ويأخذ بحقّك ولو من فوق سبع سماوات، ولا يُمهل ظالمك إلا ليمتحنه… لا لينساك.</p>
<p dir="rtl" class="p1">حين يجتمع في قلبك العزيز والجبار… تسير في الحياة مطمئنًا غير متكبّر، قويًا دون ظلم، مرفوع الرأس دون صخب، لأنَّك لا تستمدّ عزّك من الناس…<br>
بل من وجه الله الذي لا يُهان مَن وجّه قلبه إليه.</p>
<p dir="rtl" class="p19"><br></p>
<p dir="rtl" class="p19"><br></p>
<p dir="rtl" class="p19"><br></p>
<p dir="rtl" class="p24"><b>المعنى اللغوي والشَّرعي:</b></p>
<p dir="rtl" class="p46"><span class="s9"><b>أولًا: </b></span><b>ٱلْعَزِيزُ</b><b></b></p>
<p dir="rtl" class="p1">المعنى اللغوي: مأخوذ من الجذر الثلاثي (ع ز ز)، وتدل على:</p>
<p dir="rtl" class="p1">الامتناع والقوة: من ذلك قولهم: أرض عَزَاز: أي صلبة لا تُنتج.</p>
<p dir="rtl" class="p1">الغَلَبة: يقال: عَزَّ فلانٌ على فلان: أي غلبه وقهره.</p>
<p dir="rtl" class="p1">الندرة: يقال: شيء عزيز: أي نادر لا يُنال بسهولة.</p>
<p dir="rtl" class="p1">فالعِزّة تدل على: المنَعة + القهر + الرفعة + الندرة.</p>
<p dir="rtl" class="p13"><b></b><br></p>
<p dir="rtl" class="p1"><b>عند نسبته إلى الله جل جلاله:</b></p>
<p dir="rtl" class="p1">اسم "<span class="s8"><b>ٱلْعَزِيز</b></span>" يدل على: الذي لا يُغلب: فهو غالبٌ على أمره، لا يُقهَر، ولا يُهزَم،<span class="s15"> ﴿مِن قَبۡلُ هُدٗى لِّلنَّاسِ وَأَنزَلَ ٱلۡفُرۡقَانَۗ إِنَّ ٱلَّذِينَ كَفَرُواْ بِـَٔايَٰتِ ٱللَّهِ لَهُمۡ عَذَابٞ شَدِيدٞۗ وَٱللَّهُ عَزِيزٞ ذُو ٱنتِقَامٍ﴾</span><span class="s13"> </span><span class="s12">آل عمران: ٤</span>، الذي لا يُنال جنابه: له الهيبة والرفعة التي لا تُدركها العقول ولا تنالها الأيدي.</p>
<p dir="rtl" class="p1">الذي يهب العزة لمن يشاء: <span class="s15">﴿قُلِ ٱللَّهُمَّ مَٰلِكَ ٱلۡمُلۡكِ تُؤۡتِي ٱلۡمُلۡكَ مَن تَشَآءُ وَتَنزِعُ ٱلۡمُلۡكَ مِمَّن تَشَآءُ وَتُعِزُّ مَن تَشَآءُ وَتُذِلُّ مَن تَشَآءُۖ بِيَدِكَ ٱلۡخَيۡرُۖ إِنَّكَ عَلَىٰ كُلِّ شَيۡءٖ قَدِيرٞ﴾</span><span class="s13"> </span><span class="s12">آل عمران: ٢٦</span>، الذي عزَّ عن المثيل والنظير: لا شبيه له في ذاته ولا في صفاته ولا في أفعاله.</p>
<p dir="rtl" class="p1">"<span class="s8"><b>ٱلْعَزِيز</b></span>" هو الإله الذي إن لجأت إليه أعزّك، وإن ابتعدت عنه أذلك… هو الذي لا يُذِل من احتمى به، ولا يُعزّ من أعرض عنه… فالعزّة منه، وبالقرب منه، ومعه… ومن ظنَّ أن العزة في غيره، فقد أذلّ نفسه دون أن يشعر.</p>
<p dir="rtl" class="p1">المعنى الشرعي: <span class="s8"><b>ٱلْعَزِيزُ</b></span> هو الذي: لا يُغلب في ملكه، ولا يُقهر في أمره، ولا يُنَال جنابه، ولا يُدرك كنهه.</p>
<p dir="rtl" class="p1">غالبٌ غير مغلوب، قويٌّ غير مستضعف، رفيعٌ لا يُطال، جمع الله له في القرآن العزة الحقيقية، فقال: <span class="s15">﴿يَقُولُونَ لَئِن رَّجَعۡنَآ إِلَى ٱلۡمَدِينَةِ لَيُخۡرِجَنَّ ٱلۡأَعَزُّ مِنۡهَا ٱلۡأَذَلَّۚ وَلِلَّهِ ٱلۡعِزَّةُ وَلِرَسُولِهِۦ وَلِلۡمُؤۡمِنِينَ وَلَٰكِنَّ ٱلۡمُنَٰفِقِينَ لَا يَعۡلَمُونَ﴾</span><span class="s13"> </span><span class="s12">المنافقون: ٨</span>.</p>
<p dir="rtl" class="p1"><b>ثلاث مراتب لعزّته:</b></p>
<p dir="rtl" class="p48">عزّة الامتناع: فلا أحد يستطيع أن يُدركه أو يُهينه.</p>
<p dir="rtl" class="p48">عزّة القهر: فهو يقهر كل من عاداه أو بغى عليه.</p>
<p dir="rtl" class="p48">عزّة القوة: فلا يُنازع ولا يُدافَع في قدرته وسلطانه.</p>
<p dir="rtl" class="p46"><span class="s9"><b>ثانيًا: </b></span><b>ٱلْجَبَّارُ</b><b></b></p>
<p dir="rtl" class="p1">المعنى اللغوي: أصل الكلمة: من "جَبَرَ"، والجذر (ج-ب-ر) في اللغة له معانٍ كثيرة، من أهمها:</p>
<p dir="rtl" class="p26">الإصلاح والإعادة :جَبَرَ العظم: أي أصلحه بعد كسره.</p>
<p dir="rtl" class="p26">الإكراه والقهر: جَبَرَ فلانًا: أي أكرهه على شيء.</p>
<p dir="rtl" class="p26">الرفعة والعلو: من ذلك تسمية النخل العالي: نَخْلَةٌ جَبَّارَة.</p>
<p dir="rtl" class="p1">فالجَبْر في اللغة يدل على: الترميم + الإكراه + العلو.</p>
<p dir="rtl" class="p1"><b>عند نسبته إلى الله تعالى:</b></p>
<p dir="rtl" class="p1">اسم "<span class="s8"><b>ٱلْجَبَّار</b></span>" يجمع بين معنيين عظيمين:</p>
<p dir="rtl" class="p24"><b>جبار القهر والعظمة: </b></p>
<p dir="rtl" class="p36">الذي يقهر الجبابرة، ويُذلّ المتكبرين.</p>
<p dir="rtl" class="p36">لا يقع شيء في الكون إلا بمشيئته، ولا يخرج شيء عن سلطانه.</p>
<p dir="rtl" class="p36">لا يقدر أحد على معارضته أو رد أمره.</p>
<p dir="rtl" class="p24"><b>جبار الرَّحمة والجبر:</b></p>
<p dir="rtl" class="p36">الذي يجبر كسر القلوب، ويُغيث الضعفاء، ويمسح جراح المنكسرين.</p>
<p dir="rtl" class="p36">يُعطي السائل، ويُعين الضعيف، ويحتوي الباكي.</p>
<p dir="rtl" class="p36">فهو "<span class="s8"><b>ٱلْجَبَّار</b></span>" الذي إذا أردت أن تخشاه خِفت، وإذا أردت أن تستند إليه طِبت.</p>
<p dir="rtl" class="p1">"<span class="s8"><b>ٱلْجَبَّارُ</b></span>" هو القاهر فوق عباده، والعاطف على عبيده، هو الذي لا يترك المنكسر مكسورًا، ولا يرضى بالظلم واقعًا، ولا يدع الجبارين دون أن يُكسرهم.<br>
هو الذي يجبرك حين لا يجبرك أحد، ويرفعك حين تظن أنك لن تقوم…</p>
<p dir="rtl" class="p1">فإذا رأيت ظالـمًا تكبر، فاعلم أنَّ الجبار يرقبه… وإذا شعرت بقلبك مكسورًا، فاعلم أن الجبار ينتظرك…</p>
<p dir="rtl" class="p1">المعنى الشرعي: <span class="s8"><b>ٱلْجَبَّارُ</b></span> هو الذي: </p>
<p dir="rtl" class="p36">يجبر المكسورين بلُطفه ورحمته، ويُصلح خلل القلوب والنفوس.</p>
<p dir="rtl" class="p36">ويقهر الجبابرة والظالمين بقوته وسلطانه.</p>
<p dir="rtl" class="p36">ويُجري إرادته رغم مشيئة العباد، لأنه العالي فوق الجميع.</p>
<p dir="rtl" class="p1"><b>وجه الجمال في هذا الاسم:</b></p>
<p dir="rtl" class="p1">أنه يجمع بين اللطف والهيبة:</p>
<p dir="rtl" class="p49"><b>جبر القلوب = لُطف ورحمة</b></p>
<p dir="rtl" class="p49"><b>جبر الطغاة = قهر وعدل</b></p>
<p dir="rtl" class="p1">قال ابن القيم: " الجبّار من أسماء الجمال، ومن أسماء الجلال، فهو جابر كسير، وقاهر جبّار ".</p>

<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p24"><b>ورود اسم الله " </b><span class="s8"><b>ٱلْعَزِيزُ</b></span><b> " في الكتاب والسُّنة</b></p>
<p dir="rtl" class="p1">ورد اسم الله "<span class="s8"><b>ٱلْعَزِيزُ</b></span>" في القرآن الكريم في نحو 92 موضعًا، وهو من أكثر الأسماء تكرارًا، ويأتي غالبًا مقترنًا بأسماء أخرى مثل: الحكيم، الغفور، العليم، الجبار، المتكبر.</p>
<p dir="rtl" class="p1"><b>نماذج من الآيات:</b></p>
<p dir="rtl" class="p36">سورة البقرة، آية 129:<span class="s15"> ﴿رَبَّنَا وَٱبۡعَثۡ فِيهِمۡ رَسُولٗا مِّنۡهُمۡ يَتۡلُواْ عَلَيۡهِمۡ ءَايَٰتِكَ وَيُعَلِّمُهُمُ ٱلۡكِتَٰبَ وَٱلۡحِكۡمَةَ وَيُزَكِّيهِمۡۖ إِنَّكَ أَنتَ ٱلۡعَزِيزُ ٱلۡحَكِيمُ﴾</span><span class="s13"> </span><span class="s12">البقرة: ١٢٩</span>، في دعاء إبراهيم عليه السلام، دلالة على القوة والحكمة في الإنزال والتعليم.</p>
<p dir="rtl" class="p36">سورة آل عمران، آية 6: <span class="s15">﴿هُوَ ٱلَّذِي يُصَوِّرُكُمۡ فِي ٱلۡأَرۡحَامِ كَيۡفَ يَشَآءُۚ لَآ إِلَٰهَ إِلَّا هُوَ ٱلۡعَزِيزُ ٱلۡحَكِيمُ﴾  ﴿هُوَ ٱلَّذِي يُصَوِّرُكُمۡ فِي ٱلۡأَرۡحَامِ كَيۡفَ يَشَآءُۚ لَآ إِلَٰهَ إِلَّا هُوَ ٱلۡعَزِيزُ ٱلۡحَكِيمُ﴾</span><span class="s13"> </span><span class="s12">آل عمران: ٦</span>، تأتي بعد وصف دقيق لقدرة الله في خلق الإنسان، لتؤكد عظمة القدرة.</p>
<p dir="rtl" class="p35"><span class="s1">سورة الزمر، آية 5:</span> ﴿خَلَقَ ٱلسَّمَٰوَٰتِ وَٱلۡأَرۡضَ بِٱلۡحَقِّۖ يُكَوِّرُ ٱلَّيۡلَ عَلَى ٱلنَّهَارِ وَيُكَوِّرُ ٱلنَّهَارَ عَلَى ٱلَّيۡلِۖ وَسَخَّرَ ٱلشَّمۡسَ وَٱلۡقَمَرَۖ كُلّٞ يَجۡرِي لِأَجَلٖ مُّسَمًّىۗ أَلَا هُوَ ٱلۡعَزِيزُ ٱلۡغَفَّٰرُ﴾<span class="s13"> </span><span class="s14">الزمر: ٥</span></p>
<p dir="rtl" class="p35"><span class="s1">سورة الحشر، آية 23:</span> ﴿هُوَ ٱللَّهُ ٱلَّذِي لَآ إِلَٰهَ إِلَّا هُوَ ٱلۡمَلِكُ ٱلۡقُدُّوسُ ٱلسَّلَٰمُ ٱلۡمُؤۡمِنُ ٱلۡمُهَيۡمِنُ ٱلۡعَزِيزُ ٱلۡجَبَّارُ ٱلۡمُتَكَبِّرُۚ سُبۡحَٰنَ ٱللَّهِ عَمَّا يُشۡرِكُونَ﴾<span class="s13"> </span><span class="s14">الحشر: ٢٣</span><span class="s1">، ضمن سرد الأسماء الحسنى الجامعة للجلال والجمال.</span></p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p24"><b>ورود اسم الله " </b><span class="s8"><b>ٱلْجَبَّارُ</b></span><b> " في الكتاب والسُّنة</b></p>
<p dir="rtl" class="p1">ورد اسم "<span class="s8"><b>ٱلْجَبَّارُ</b></span>" في القرآن الكريم مرة واحدة فقط صريحًا، ولكن ورد معناه ومقتضاه في آيات كثيرة.</p>
<p dir="rtl" class="p1"><b>الموضع الصريح:</b> سورة الحشر، آية 23</p>
<p dir="rtl" class="p50"><span class="s18">﴿هُوَ ٱللَّهُ ٱلَّذِي لَآ إِلَٰهَ إِلَّا هُوَ ٱلۡمَلِكُ ٱلۡقُدُّوسُ ٱلسَّلَٰمُ ٱلۡمُؤۡمِنُ ٱلۡمُهَيۡمِنُ ٱلۡعَزِيزُ ٱلۡجَبَّارُ ٱلۡمُتَكَبِّرُۚ سُبۡحَٰنَ ٱللَّهِ عَمَّا يُشۡرِكُونَ﴾</span><span class="s13"> </span><span class="s12">الحشر: ٢٣</span><span class="s9">، ووروده هنا مع "</span><span class="s7"><b>العزيز</b></span><span class="s9">" و"</span><span class="s7"><b>المتكبر</b></span><span class="s9">" يدل على الجمع بين جلال القهر وجمال الجبر.</span></p>
<p dir="rtl" class="p13"><b></b><br></p>
<p dir="rtl" class="p1"><b>مواضع المعنى:</b></p>
<p dir="rtl" class="p1">رغم أنه لم يرد إلَّا مرة واحدة اسمًا صريحًا، إلا أن صفته وردت في مواضع عديدة بصيغة الفعل أو المفهوم، مثل:</p>
<p dir="rtl" class="p51"><span class="s18">﴿فَأَمَّا ثَمُودُ فَأُهۡلِكُواْ بِٱلطَّاغِيَةِ وَأَمَّا عَادٞ فَأُهۡلِكُواْ بِرِيحٖ صَرۡصَرٍ عَاتِيَةٖ﴾</span><span class="s13"> </span><span class="s12">الحاقة: ٥ – ٦</span><span class="s9">، مظاهر من قهر الجبابرة والعتاة.</span></p>
<p dir="rtl" class="p36"><span class="s15">﴿إِنَّ رَبَّكَ لَبِٱلۡمِرۡصَادِ﴾</span><span class="s13"> </span><span class="s12">الفجر: ١٤</span>، فيه دلالة على جَبْر المظلومين، وقهر الظالمين.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p14"><b>ورودهما في السُّنة النبوية</b></p>
<p dir="rtl" class="p1"><span class="s8"><b>أوَّلاً</b></span>: ورد اسم الله "<span class="s8"><b>ٱلْعَزِيزُ</b></span>" في دعاء مأثور عن النبي ﷺ، ومن أجمل ما جاء في ذلك حديث عبد الله بن مسعود رضي الله عنه، أن رسول الله ﷺ قال:</p>
<p dir="rtl" class="p1"> "اللَّهُمَّ إِنِّي أَسْأَلُكَ الْعَفْوَ وَالْعَافِيَةَ فِي الدُّنْيَا وَالآخِرَةِ، اللَّهُمَّ إِنِّي أَسْأَلُكَ الْعَفْوَ وَالْعَافِيَةَ فِي دِينِي وَدُنْيَايَ، وَأَهْلِي وَمَالِي، اللَّهُمَّ اسْتُرْ عَوْرَاتِي، وَآمِنْ رَوْعَاتِي، وَاحْفَظْنِي مِنْ بَيْنِ يَدَيَّ، وَمِنْ خَلْفِي، وَعَنْ يَمِينِي، وَعَنْ شِمَالِي، وَمِنْ فَوْقِي، وَأَعُوذُ بِعَظَمَتِكَ أَنْ أُغْتَالَ مِنْ تَحْتِي" رواه أبو داود وصححه الألباني.</p>
<p dir="rtl" class="p1">ورغم أنَّ اسم "<span class="s8"><b>ٱلْعَزِيزُ</b></span>" لم يُذكر نصًّا في هذا الحديث، إلَّا أن معاني العزة الإلهية والحفظ والمنعة ظاهرة جدًا فيه، والدعاء يعبر بوضوح عن الاعتصام بعزة الله وقوته وهيبته، خاصة في قوله: "وأعوذ بعظمتك أن أُغتال من تحتي"</p>
<p dir="rtl" class="p1"><span class="s8"><b>ثانيًا</b></span>: ورد "<span class="s8"><b>ٱلْجَبَّار</b></span>" في حديث دعاء السجود، وهو من السنن الثابتة: كان النبي ﷺ يقول في سجوده: " سبوح قدوس، ربّ الملائكة والروح، ربّ الجبروت، والملكوت، والكبرياء، والعظمة " رواه النسائي، وأحمد، وصححه الألباني، وكلمة "<span class="s8"><b>الجبروت</b></span>" مشتقة من اسم "الجبار"، وهي دالة على صفة العظمة والقهر.</p>
<p dir="rtl" class="p1">وقد وردت هذه الأسماء أيضًا في أدعية السلف، منها: " اللَّهُمَّ إِنِّي أَسْأَلُكَ بِاسْمِكَ ٱلْعَزِيزِ ٱلْجَبَّارِ ٱلْمُتَكَبِّرِ، ٱلَّذِي لَا يُنَافِسُهُ أَحَدٌ فِي عِزِّكَ " دعاء مروي عن بعض الصَّحابة في آثار السلف.</p>
<p dir="rtl" class="p19"><br></p>
<p dir="rtl" class="p19"><br></p>
<p dir="rtl" class="p19"><br></p>
<p dir="rtl" class="p24"><b>أثر اسم الله </b><span class="s8"><b>ٱلْعَزِيزُ</b></span><b> – </b><span class="s8"><b>ٱلْجَبَّارُ</b></span><b> على سلوك العبد، وعلى نظرته لنفسه وللناس وللحياة:</b></p>
<p dir="rtl" class="p14"><b>أولًا: أثر اسم الله </b><span class="s8"><b>ٱلْعَزِيزُ</b></span><b> على سلوك العبد:</b></p>
<p dir="rtl" class="p36">الكرامة الداخلية والاستغناء عن الخلق: من عرف أن ربَّه عزيز لا يُغلب، وأنَّ العزة له وحده، نشأ في قلبه حياءٌ من التذلل لغير الله، لا يُذلّ نفسه لمال، ولا لمنصب، ولا لحب مخلوق، لأن عزته مستمدّة من عزيزٍ لا يذلّ، قال ابن القيم: " من طلب العِزَّة بغير الله أذلَّه الله، ومن تواضع لله رفعه الله. "</p>
<p dir="rtl" class="p36">الشجاعة والثبات عند المحن: لأنَّ العزيز لا يُقهَر، فإن من احتمى به لا يُقهر كذلك، العبد إذا علم أن ربّه هو العزيز، تجاوز الخوف من الناس، والخضوع للطُّغاة، لأنَّ وراءه ربًّا غالبًا لا يُغلب.</p>
<p dir="rtl" class="p37">الرسول ﷺ في الغار قال لأبي بكر: "ما ظنّك باثنين، الله ثالثهما؟"<br>
وكان العزيز معهما، فأين الخوف؟ فخُتمت الآية <span class="s30">﴿إِلَّا تَنصُرُوهُ فَقَدۡ نَصَرَهُ ٱللَّهُ إِذۡ أَخۡرَجَهُ ٱلَّذِينَ كَفَرُواْ ثَانِيَ ٱثۡنَيۡنِ إِذۡ هُمَا فِي ٱلۡغَارِ إِذۡ يَقُولُ لِصَٰحِبِهِۦ لَا تَحۡزَنۡ إِنَّ ٱللَّهَ مَعَنَاۖ فَأَنزَلَ ٱللَّهُ سَكِينَتَهُۥ عَلَيۡهِ وَأَيَّدَهُۥ بِجُنُودٖ لَّمۡ تَرَوۡهَا وَجَعَلَ كَلِمَةَ ٱلَّذِينَ كَفَرُواْ ٱلسُّفۡلَىٰۗ وَكَلِمَةُ ٱللَّهِ هِيَ ٱلۡعُلۡيَاۗ وَٱللَّهُ عَزِيزٌ حَكِيمٌ﴾</span><span class="s13"> </span><span class="s12">التوبة: ٤٠</span>.</p>
<p dir="rtl" class="p36">عزة الطَّاعة وذُلّ المعصية: يستحي أن يعصي الله، وهو يعلم أن معصية العزيز ذُلّ، وطاعته شرف وكرامة، لذلك يكون عزيزًا في نفسه: لا يبيع دينه لشهوة، ولا يُقايض صلاته بركعة كسولة، لأنه يعلم لمن يركع.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p14"><b>ثانيًا: أثر اسم الله </b><span class="s8"><b>ٱلْجَبَّارُ</b></span><b> على سلوك العبد:</b></p>
<p dir="rtl" class="p36">الانكسار الجميل أمام الله: الجبّار لا يحب المتجبرين، لكنه يجبر المنكسرين، من علم ذلك، أحسن الانكسار بين يدي ربه، وتحوّلت لحظات ضعفه إلى أبواب قوة وجبر.</p>
<p dir="rtl" class="p37">قال الإمام الحسن البصري: ما جَبَر اللهُ قلبًا أُهين بين يديه… إلَّا رفعه.</p>
<p dir="rtl" class="p36">الطمأنينة بعد الكسر: حين تُكسر نفسك، أو تُخذَل، أو تضيق بك الحياة،<br>
يهمس لك هذا الاسم: "لا بأس… الجبّار يعرف كل كسرك، وسيجبره وإن لم تدر كيف"، فتنهض… وتُكمل… لأنك لا تتعافى وحدك، بل يجبرك الجبّار.</p>
<p dir="rtl" class="p36">الدعاء بثقة، لا بيأس: الجبّار هو الذي يُجري أمره على الناس رغم مشيئتهم، فلا يستحيل عليه شيء، لذا، حين يدعو العبد، لا يستصعب حاجته، ولا يتحرّج من عِظَمها، بل يقول بثقة: " يا جبّار… أنت القادر على ما عجز عنه الطب، والناس، والواقع."</p>
<p dir="rtl" class="p14"><b>ثالثًا: نظرة العبد لنفسه بعد فهم الاسمين</b></p>
