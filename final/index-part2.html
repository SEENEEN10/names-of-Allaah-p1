<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>بأسمائه نحيا - الجزء الثاني - قارئ الكتاب</title>
  <meta name="description" content="قارئ كتاب بأسمائه نحيا (الجزء الثاني) - واجهة قراءة عربية متوافقة مع GitHub Pages">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&amp;family=Cairo:wght@400;600;700&amp;family=Tajawal:wght@400;500;700&amp;family=Noto+Naskh+Arabic:wght@400;600;700&amp;display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: "Uthmanic Hafs Local";
      src: url("assets/uthmanic-hafs.otf") format("opentype");
      font-display: swap;
    }

    :root {
      --bg-primary: #f8f4ef;
      --surface: #ffffff;
      --text-primary: #1c1007;
      --text-secondary: #6b5d4f;
      --accent: #8b3a12;
      --accent-soft: #d4a574;
      --border-color: #e8dfd6;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      --font-size: 18px;
      --line-height: 2;
      --font-family: "Amiri", serif;
      --panel-width: 320px;
      --header-height: 72px;
      --transition: 0.25s ease;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-family);
      font-size: var(--font-size);
      line-height: var(--line-height);
      overflow-x: hidden;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      transition: background var(--transition), color var(--transition);
    }

    body.panel-open {
      overflow: hidden;
    }

    body.theme-dark {
      --bg-primary: #111317;
      --surface: #1a1f27;
      --text-primary: #f0e5d8;
      --text-secondary: #baa58f;
      --accent: #e2a05f;
      --accent-soft: #be7f40;
      --border-color: #2d3440;
      --shadow: 0 14px 36px rgba(0, 0, 0, 0.35);
    }

    body.theme-sepia {
      --bg-primary: #f0e7d8;
      --surface: #fbf4e6;
      --text-primary: #3d2a18;
      --text-secondary: #6d553f;
      --accent: #915c2e;
      --accent-soft: #bb8a58;
      --border-color: #dfd0bc;
    }

    body.theme-sand {
      --bg-primary: #ede2bd;
      --surface: #fbf6df;
      --text-primary: #332b1f;
      --text-secondary: #6f5e45;
      --accent: #8a6d42;
      --accent-soft: #af8f60;
      --border-color: #d8c49a;
    }

    .progress-track {
      position: fixed;
      top: 0;
      right: 0;
      left: 0;
      height: 4px;
      background: transparent;
      z-index: 300;
    }

    .progress-fill {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--accent-soft), var(--accent));
      transition: width 0.12s linear;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 120;
      min-height: var(--header-height);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: calc(1rem + env(safe-area-inset-top)) calc(1.25rem + env(safe-area-inset-right)) 1rem calc(1.25rem + env(safe-area-inset-left));
      border-bottom: 1px solid var(--border-color);
      background: color-mix(in srgb, var(--bg-primary) 88%, white 12%);
      backdrop-filter: blur(8px);
      transition: transform 0.26s ease, background var(--transition), border-color var(--transition);
    }

    .topbar.is-hidden {
      transform: translateY(calc(-100% - 4px));
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }

    .brand-title {
      color: var(--accent);
      font-size: 1.35rem;
      font-weight: 700;
      line-height: 1.1;
    }

    .brand-subtitle {
      color: var(--text-secondary);
      font-family: "Cairo", sans-serif;
      font-size: 0.8rem;
    }

    .header-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
      justify-content: flex-end;
    }

    .btn {
      border: 1px solid var(--border-color);
      background: var(--surface);
      color: var(--text-primary);
      padding: 0.5rem 0.9rem;
      border-radius: 10px;
      font-size: 0.9rem;
      font-family: "Cairo", sans-serif;
      cursor: pointer;
      transition: all var(--transition);
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
      min-height: 44px;
      touch-action: manipulation;
    }

    .btn:hover {
      transform: translateY(-1px);
      border-color: var(--accent-soft);
    }

    .btn.primary {
      background: linear-gradient(135deg, var(--accent-soft), var(--accent));
      border-color: transparent;
      color: #fff;
    }

    .layout {
      max-width: 980px;
      margin: 0 auto;
      padding: 2rem 1rem calc(2.5rem + env(safe-area-inset-bottom));
    }

    .content-card {
      background: var(--surface);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 1.4rem;
      box-shadow: var(--shadow);
      min-height: 65vh;
      overflow-x: hidden;
    }

    .content-card section {
      max-width: 100%;
    }

    .content-card h1,
    .content-card h2,
    .content-card h3 {
      color: var(--accent);
      margin: 1.2rem 0 0.8rem;
      text-wrap: balance;
    }

    .content-card p,
    .content-card li,
    .content-card blockquote {
      margin-bottom: 1rem;
      text-align: justify;
      text-wrap: pretty;
    }

    .content-card ul,
    .content-card ol {
      margin: 0 1.4rem 1.2rem 0;
    }

    /* Normalize imported Word markup so the opening pages align like the rest */
    .content-card.full-book p,
    .content-card.full-book div,
    .content-card.full-book h1,
    .content-card.full-book h2,
    .content-card.full-book h3,
    .content-card.full-book h4,
    .content-card.full-book h5,
    .content-card.full-book h6,
    .content-card.full-book ul,
    .content-card.full-book ol {
      width: auto !important;
      max-width: 100% !important;
      margin-left: 0 !important;
      margin-right: 0 !important;
    }

    .content-card.full-book p {
      line-height: var(--line-height) !important;
    }

    .content-card.full-book img,
    .content-card.full-book table {
      max-width: 100% !important;
      height: auto !important;
    }

    .content-card.full-book table {
      display: block;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .content-card.full-book table td,
    .content-card.full-book table th {
      direction: rtl;
      unicode-bidi: plaintext;
    }

    .content-card.full-book p,
    .content-card.full-book li {
      text-indent: 0 !important;
      overflow-wrap: anywhere;
    }

    .content-card.full-book .quran-quote,
    .content-card.full-book .quran-quote * {
      font-family: "Uthmanic Hafs Local", "Noto Naskh Arabic", "Amiri", serif !important;
      font-feature-settings: "liga" 1, "calt" 1;
      letter-spacing: 0;
    }

    .content-card.full-book .quran-quote {
      line-height: 2.15 !important;
    }

    .content-card.full-book ul,
    .content-card.full-book ol {
      list-style-position: inside !important;
      padding-right: 1rem !important;
      margin-right: 0 !important;
      margin-left: 0 !important;
    }

    .content-card.full-book .MsoToc1,
    .content-card.full-book .MsoToc2 {
      width: auto !important;
      max-width: 100% !important;
      margin-right: 0 !important;
      margin-left: 0 !important;
      padding-right: 0.75rem !important;
      text-indent: 0 !important;
      white-space: normal !important;
      overflow-wrap: anywhere !important;
      tab-size: 0 !important;
    }

    .placeholder {
      padding: 2rem 1rem;
      text-align: center;
      color: var(--text-secondary);
    }

    .placeholder h2 {
      color: var(--accent);
      margin-bottom: 0.7rem;
    }

    .panel {
      position: fixed;
      top: 0;
      height: 100vh;
      height: 100dvh;
      width: var(--panel-width);
      background: var(--surface);
      border-left: 1px solid var(--border-color);
      box-shadow: var(--shadow);
      z-index: 210;
      padding: calc(1rem + env(safe-area-inset-top)) 1rem calc(1rem + env(safe-area-inset-bottom));
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      transition: transform var(--transition);
    }

    .panel h3 {
      color: var(--accent);
      margin: 0.5rem 0 1rem;
      font-size: 1.15rem;
    }

    .panel-right {
      right: 0;
      transform: translateX(100%);
    }

    .panel-left {
      left: 0;
      transform: translateX(-100%);
      border-left: 0;
      border-right: 1px solid var(--border-color);
    }

    .panel.active {
      transform: translateX(0);
    }

    .chapters-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
    }

    .chapter-link {
      display: block;
      padding: 0.7rem 0.75rem;
      border: 1px solid var(--border-color);
      border-radius: 10px;
      color: var(--text-primary);
      text-decoration: none;
      transition: all var(--transition);
      font-family: "Cairo", sans-serif;
      line-height: 1.4;
      min-height: 44px;
      touch-action: manipulation;
    }

    .chapter-link:hover,
    .chapter-link.active {
      border-color: var(--accent-soft);
      background: color-mix(in srgb, var(--bg-primary) 75%, var(--surface) 25%);
      color: var(--accent);
    }

    .setting-group {
      margin-bottom: 1.1rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border-color);
    }

    .setting-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-family: "Cairo", sans-serif;
      font-size: 0.9rem;
      color: var(--text-secondary);
    }

    .theme-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.5rem;
    }

    .swatch {
      border: 2px solid transparent;
      border-radius: 10px;
      padding: 0.55rem 0.4rem;
      text-align: center;
      font-family: "Cairo", sans-serif;
      font-size: 0.84rem;
      cursor: pointer;
      transition: var(--transition);
      user-select: none;
      min-height: 44px;
      touch-action: manipulation;
    }

    .swatch[data-theme="light"] { background: #f8f4ef; color: #1c1007; }
    .swatch[data-theme="dark"] { background: #1a1f27; color: #f0e5d8; }
    .swatch[data-theme="sepia"] { background: #f0e7d8; color: #3d2a18; }
    .swatch[data-theme="sand"] { background: #ede2bd; color: #332b1f; }

    .swatch.active {
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.6rem;
      margin-bottom: 0.5rem;
    }

    .small-btn {
      min-width: 36px;
      border: 1px solid var(--border-color);
      background: var(--surface);
      color: var(--text-primary);
      border-radius: 8px;
      padding: 0.35rem 0.45rem;
      cursor: pointer;
      font-size: 1rem;
      min-height: 44px;
      touch-action: manipulation;
    }

    .value {
      min-width: 52px;
      text-align: center;
      font-family: "Cairo", sans-serif;
      color: var(--text-secondary);
      font-size: 0.88rem;
    }

    select,
    input[type="range"] {
      width: 100%;
      touch-action: manipulation;
    }

    select {
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 0.5rem;
      background: var(--surface);
      color: var(--text-primary);
      font-family: "Cairo", sans-serif;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(2px);
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--transition);
    }

    .overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .status {
      position: fixed;
      bottom: 1rem;
      left: 1rem;
      background: color-mix(in srgb, var(--surface) 85%, var(--bg-primary) 15%);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 0.45rem 0.7rem;
      font-size: 0.75rem;
      font-family: "Cairo", sans-serif;
      color: var(--text-secondary);
      opacity: 0;
      transform: translateY(6px);
      transition: all var(--transition);
      z-index: 220;
    }

    .status.show {
      opacity: 1;
      transform: translateY(0);
    }

    .error {
      text-align: center;
      color: #a62f2f;
      background: #ffe9e9;
      border: 1px solid #e9b0b0;
      border-radius: 10px;
      padding: 1rem;
      margin-top: 1rem;
      line-height: 1.7;
    }

    .local-loader {
      margin-top: 1rem;
      display: grid;
      gap: 0.75rem;
    }

    .local-frame {
      width: 100%;
      min-height: 72vh;
      border: 1px solid var(--border-color);
      border-radius: 10px;
      background: var(--surface);
    }

    .local-links {
      font-family: "Cairo", sans-serif;
      font-size: 0.82rem;
      color: var(--text-secondary);
      text-align: right;
      line-height: 1.8;
      word-break: break-all;
    }

    @media (max-width: 820px) {
      .topbar {
        flex-direction: column;
        align-items: stretch;
      }

      .header-controls {
        justify-content: center;
        width: 100%;
      }

      .layout {
        padding: 1rem 0.75rem 1.4rem;
      }

      .content-card {
        padding: 1rem;
      }

      .panel {
        width: min(var(--panel-width), 88vw);
      }

      .btn {
        flex: 1 1 30%;
      }
    }

    @media (max-width: 560px) {
      .brand-title {
        font-size: 1.15rem;
      }

      .brand-subtitle {
        font-size: 0.74rem;
      }

      .header-controls {
        gap: 0.45rem;
      }

      .btn {
        font-size: 0.86rem;
        padding: 0.55rem 0.65rem;
      }

      .content-card {
        border-radius: 12px;
        padding: 0.9rem;
      }

      .panel {
        width: min(94vw, 360px);
      }
    }
  </style>
</head>
<body>
  <div class="progress-track" aria-hidden="true">
    <div id="progress-fill" class="progress-fill"></div>
  </div>

  <header class="topbar">
    <div class="brand">
      <h1 class="brand-title">بأسمائه نحيا</h1>
      <p class="brand-subtitle">قارئ الكتاب - الجزء الثاني</p>
    </div>

    <div class="header-controls">
      <button id="chapters-btn" class="btn" type="button">الفصول</button>
      <button id="settings-btn" class="btn" type="button">الإعدادات</button>
      <button id="continue-btn" class="btn primary" type="button">استمرار القراءة</button>
    </div>
  </header>

  <aside id="chapters-panel" class="panel panel-right" aria-label="قائمة الفصول">
    <h3>الفصول</h3>
    <ul id="chapters-list" class="chapters-list"></ul>
  </aside>

  <aside id="settings-panel" class="panel panel-left" aria-label="إعدادات القارئ">
    <h3>الإعدادات</h3>

    <div class="setting-group">
      <label>المظهر</label>
      <div class="theme-grid">
        <button class="swatch" data-theme="light" type="button">فاتح</button>
        <button class="swatch" data-theme="dark" type="button">غامق</button>
        <button class="swatch" data-theme="sepia" type="button">سيبيا</button>
        <button class="swatch" data-theme="sand" type="button">رملي</button>
      </div>
    </div>

    <div class="setting-group">
      <label for="font-select">الخط</label>
      <select id="font-select">
        <option value='"Amiri", serif'>Amiri (أميري)</option>
        <option value='"Cairo", sans-serif'>Cairo (قاهرة)</option>
        <option value='"Tajawal", sans-serif'>Tajawal (تجوال)</option>
        <option value='"Noto Naskh Arabic", serif'>Noto Naskh Arabic (نسخ)</option>
      </select>
    </div>

    <div class="setting-group">
      <label>حجم الخط</label>
      <div class="row">
        <button id="font-decrease" class="small-btn" type="button">-</button>
        <span id="font-size-display" class="value">18px</span>
        <button id="font-increase" class="small-btn" type="button">+</button>
      </div>
    </div>

    <div class="setting-group">
      <label for="line-height-slider">ارتفاع السطر</label>
      <div class="row">
        <input id="line-height-slider" type="range" min="1.5" max="3" step="0.1" value="2">
        <span id="line-height-display" class="value">2.0</span>
      </div>
    </div>

    <button id="reset-btn" class="btn" type="button" style="width:100%;">إعادة تعيين إعدادات الصفحة</button>
  </aside>

  <div id="overlay" class="overlay" aria-hidden="true"></div>

  <main class="layout">
    <article id="content" class="content-card">
      <div class="placeholder">
        <h2>مرحبًا بك في القارئ</h2>
        <p>يمكنك فتح أي فصل من قائمة الفصول، وسيتم حفظ آخر موضع قراءة تلقائيًا.</p>
      </div>
    </article>
  </main>

  <div id="autosave-indicator" class="status" role="status" aria-live="polite">تم حفظ موضع القراءة</div>

  <template id="chapter-template-chapter-1">
<section dir="rtl">
<h1>المقدمة</h1>

<h2>بسم الله الرحمن الرحيم</h2>

<p>كيف تبدأ الحديث عن من لا بداية له…؟</p>

<p>وكيف تصف من لا يُدرك كُنهه عقل، ولا يُحيط بجماله خيال…؟</p>

<p>وكيف تكتب عن الله… وأنت تعلم أنك مهما كتبت، فإن ما خفي أعظم، وما جَلَّ أوسع، وما تجلّى في القلوب أبلغ من كل حروفك؟.</p>

<p>لكنّ الله… هو الذي أمرنا أن ندعوه بأسمائه، وأخبرنا أن له الأسماء الحسنى، وأنها ليست زينة لغوية، ولا صفات نظرية، بل هي أبواب القرب، ومفاتيح الفهم، وجسور العبور إليه سبحانه.</p>

<p>ولأني – كغيري – تعبتُ كثيرًا من جفاف المعلومة، ومن الخطاب الذي يشرح أسماء الله كما تُشرح المصطلحات، كتبت هذا الكتاب…</p>

<p>كتبتُه للقلب… قبل العقل، وللخلوة… قبل الدرس، وللمناجاة… قبل الدراسة، ولكلّ من قال يومًا: "يا رب… أريد أن أعرفك، لا لأجادلك، بل لأحبك."</p>

<p>في كل مرةٍ يضيق فيها صدري، كنتُ أبحث عن اسمٍ من أسمائه… فإذا ضاقت الأرض، ناديتُه بـ الواسع، وإذا ضللت الطريق، ناديتُه بـ الهادي</p>

<p>وإذا أثقلني الذنب، لجأتُ إلى الغفور، الستّير، التواب، وإذا أحسست أنني وحدي… ذكّرني اسمه الوكيل، القريب، الحفيظ أنني لم أكن يومًا وحدي.</p>

<p>حين بدأت أكتب هذا الكتاب، لم أكن أكتب للناس… بل كنت أبحث عن الله! كنت أمدّ يدي في كل اسم… وكأنني أطرق بابًا من أبواب السماء، وكلما تعمّقت في اسمٍ، شعرت أنني أُولد من جديد…</p>

<p>هذا ليس كتابًا في العقيدة فقط، ولا في الفقه، ولا في التربية، ولا في الدعوة… هذا كتابُ الحياة مع الله… كيف تراه في كل موقف؟</p>

<p>كيف تحسّ قربه في كل لحظة؟.</p>

<p>كيف تتعامل معه باسمه، لا باسمك؟.</p>

<p>وكيف تكون عبدًا له… لا عبدًا لحاجتك فقط؟.</p>

<p>نعم… بأسمائه نحيا، لا نحيا فقط بالجسد، ولا بالتخطيط، ولا بالعلاقات…</p>

<p>بل نحيا حين نعرف من هو الله… ونعرفه كما وصف نفسه، لا كما تَصوّره الناس.</p>

<p>في هذا الكتاب… سنتعلّم فيه فقه الحب… ذلك الحب الذي يثبت عند ‏الشبهات، ويقوى عند الفتن، ولا تضعفه الشهوات إذا جاهد صاحبُه ‏نفسه… وسنتعلّم أن التقوى ليست خوفَ رعبٍ يباعد بين العبد وربه، بل ‏خوفَ تعظيمٍ يمتلئ بمحبةٍ ورجاء، وخشيةَ أن يُحجب القلب عن قربه، أو يُحرم ‏من رضاه‎.‎</p>

<p>ستجد بين الصفحات:</p>

<ul style="text-align: right; margin: 1.5rem 2rem;">
<li>تأمّلًا يعانق قلبك</li>
<li>وموقفًا من السيرة يثبتك</li>
<li>ودعاءً يُبكيك</li>
<li>وخاطرةً توقظك</li>
<li>وتصحيحًا لفكرةٍ مغلوطة ظننتها عن الله لسنين…</li>
</ul>

<p>هذا الكتاب… رسالة حُبٍّ لله، من عبدٍ لا يملك شيئًا، لكن وجد في أسماء ربه كل شيء.</p>

<p>فلنمضِ معًا… لا لنحفظ الأسماء، بل لندخلها… ونحيا بها، ونُصلّي بها، ونسجد بها، وندعو بها، ونموت عليها.</p>

<p>ولنفتح الآن الباب… باب المعرفة، باب الحب، باب العودة، باب الأنس… باب الأسماء الحسنى.</p>
</section>

  <template id="chapter-template-chapter-2">
<section dir="rtl">
<h1>منهجية العمل في هذا الكتاب</h1>

<p>هذا الكتاب ليس مجرد عرض لأسماء الله الحسنى، بل هو رحلة تربوية معرفية قلبية، تسير في ضوء الأسماء، لتربطك بالله… معرفةً، ومحبةً، وعبادةً، وسلوكًا، ومناجاةً.</p>

<p>ولأجل ذلك، اعتمدتُ في هذا الكتاب منهجًا دقيقًا متوازنًا، يجمع بين:</p>

<ul style="text-align: right; margin: 1.5rem 2rem;">
<li>التحقيق العلمي</li>
<li>والتأمل الوجداني</li>
<li>والأثر التربوي والسلوكي</li>
</ul>

<h2>أولًا: المعايير المعتمدة لاختيار الأسماء</h2>

<p><strong>الاقتصار على الأسماء الثابتة الصحيحة:</strong> بالاعتماد على ما ثبت في النصوص القرآنية والحديثية، دون التوسع في أسماء لم يرد لها أصل شرعي.</p>

<p><strong>إبراز الأسماء المفردة والمقترنة:</strong> وبيان دلالاتها المتفردة أو علاقتها بالأسماء الأخرى من حيث التوازن والكمال.</p>

<h2>ثانيًا: البناء المعتمد لكل اسم</h2>

<p>كل اسم إلهي في هذا الكتاب تمت معالجته بمنهج متكامل يتضمن العناصر الرئيسية التالية:</p>

<p><strong>1. العنوان التأملي:</strong> يقدم الاسم بأسلوب وجداني أدبي، يدخل من باب القلب، ويهيئ القارئ لمعناه، مثال: الودود… الذي يحبّك لا لأجل شيء، بل لأنه هو هكذا… ودود.</p>

<p><strong>2. المعنى اللغوي والشرعي:</strong></p>
<ul style="text-align: right; margin: 1rem 2rem;">
<li>تحليل دقيق لأصل الكلمة لغويًا</li>
<li>بيان المعنى الشرعي كما ورد في القرآن والسنة</li>
<li>أقوال السلف والعلماء</li>
</ul>

<p><strong>3. وروده في القرآن الكريم:</strong></p>
<ul style="text-align: right; margin: 1rem 2rem;">
<li>ذكر المواضع التي ورد فيها الاسم صريحًا أو معنىً</li>
<li>توظيف السياق القرآني في إبراز أبعاد الاسم</li>
</ul>

<p><strong>4. الفرق بينه وبين الأسماء المشابهة:</strong></p>
<ul style="text-align: right; margin: 1rem 2rem;">
<li>إبراز الفروق الدقيقة بين الأسماء التي قد يظن القارئ أنها مترادفة</li>
<li>بيان التكامل بينها</li>
</ul>

<p><strong>5. أثر الاسم في القلب والسلوك:</strong></p>
<ul style="text-align: right; margin: 1rem 2rem;">
<li>كيف يغيّر هذا الاسم حياتك؟</li>
<li>ما العلاقة بين معرفة هذا الاسم وبين الطمأنينة، الصبر، القوة، التوازن؟</li>
<li>ربط عملي مباشر بين الاسم وواقع المسلم</li>
</ul>

<p><strong>6. مشهد من السيرة يجسد الاسم:</strong> استخراج موقف من السيرة النبوية أو حياة الصحابة يوضح كيف تجلى هذا الاسم واقعيًا، مع التركيز على البُعد الإيماني والتربوي للموقف.</p>

<p><strong>7. دعاء خاص مستلهم من الاسم:</strong> صياغة دعاء وجداني عميق باسم الله، يمزج بين الرجاء والخضوع، والحاجة والاعتراف.</p>

<p><strong>8. تصحيح مفاهيم وانحرافات شائعة:</strong> معالجة الانحرافات العقدية أو النفسية المرتبطة بفهم الاسم، وبيان التوازن الصحيح في التعامل معه.</p>

<p><strong>9. نصيحة مهيبة من خلال الاسم:</strong> في كل اسم من أسماء الله الحسنى، تتجلّى دعوة خفية، ونداء مهيب إلى القلب، يُنبّهك إلى أمر خطير، أو يُرشدك إلى بابٍ من أبواب النجاة.</p>

<p><strong>10. كيف أكون مستحقًا لفضل هذا الاسم؟:</strong> يُبيّن الأعمال القلبية أو الجوارحية التي تجعل العبد في مقامٍ يؤهله لأن ينال من بركة الاسم، ويُصبح في دائرة رحمته.</p>

<p><strong>11. المقصد العقدي لهذا الاسم:</strong> يُقصد به الحقيقة الإيمانية المركزية التي يُرسّخها هذا الاسم في عقيدة المؤمن، والركيزة التوحيدية التي يُبنى عليها فهم العبد لربّه.</p>

<h2>ثالثًا: اللغة والأسلوب</h2>

<p><strong>الأسلوب:</strong> مزج بين اللغة الأدبية الراقية، والوضوح الشرعي، دون تعقيد فلسفي أو سطحية عاطفية.</p>

<p><strong>النبرة:</strong> وجدانية خاشعة، مؤنِسة، تخاطب القلب والعقل معًا.</p>

<p><strong>الاقتباسات:</strong> اختيار أقوال منتقاة بدقة من العلماء المحققين، بدون حشو.</p>

<h2>رابعًا: الأهداف المرجوّة من الكتاب</h2>

<ul style="text-align: right; margin: 1.5rem 2rem;">
<li>أن يحيا القارئ بأسماء الله لا أن يحفظها فقط</li>
<li>أن تنبعث من كل اسم طاقة إيمانية، وسلوك عملي</li>
<li>أن نعيد ترميم العلاقة مع الله من جديد… عبر أسمائه</li>
<li>أن نعلّم الناس فقه الحب لله، وفقه التقوى منه… لا بالخوف المجرّد، ولا بالمعلومة الباردة</li>
</ul>
</section>

  <template id="chapter-template-chapter-3">
<section dir="rtl">
<h1>لماذا نعرف الله بأسمائه؟</h1>

<p>لأن أعظم علمٍ على وجه الأرض هو العلم بالله، قال ابن القيم رحمه الله:</p>

<p style="text-align: center; font-style: italic; margin: 1.5rem 0; color: #6b5d4f;">
"أفضل ما اكتسبته القلوب، وتنافس فيه المتنافسون، هو معرفة الله بأسمائه وصفاته."
</p>

<p>فمن عرفه… أحبه، ومن أحبه… خافه، ورجاه، وتوكّل عليه، ولم يُعرض عنه طرفة عين.</p>

<p>وقد أمرنا الله مباشرة أن ندعوه بأسمائه: {وَلِلَّهِ ٱلْأَسْمَآءُ ٱلْحُسْنَىٰ فَٱدْعُوهُ بِهَا} الأعراف: 180.</p>

<p>فهذه الأسماء ليست للتنظير… بل للعمل، والدعاء، والعبادة، والمعرفة، والمناجاة.</p>

<p>والعبد لا يثبت في الفتن، ولا يصبر على البلاء، ولا يُقبل على الطاعة، إلا إذا عرف من هو ربه… إذا عرف أنه الرحيم… الغفور… القريب… النافع… الحفيظ… الودود.</p>

<p>وكلما زادت معرفتك بأسمائه، زاد حبك له، وكلما زاد حبك… زادت تقواك، وكلما زادت تقواك… كنت أصدق عبد، وأقرب قلب، وأثبت قدمًا على طريقه.</p>

<p>فبأسمائه… نُحيي القلوب بعد مواتها، ونبني علاقة صادقة معه، ونسير إليه، وهو ينتظرنا.</p>

<h2>تنويه هام في مقدمة هذا الجزء</h2>

<p>هذا الجزء من الكتاب خُصّص بالكامل للتأمل والتدبر في أسماء الله الحسنى التي يغلب عليها طابع الجمال والرَّحمة، وتم اختيارها بعناية لتكون مدخلًا رقيقًا ودافئًا إلى عالم الأسماء الإلهية.</p>

<p>وقد آثرتُ أن تكون هذه الأسماء وحدها محور هذا الجزء الأول، دون الانتقال إلى أسماء الجلال أو الكمال، حتى نعطي لكل مقام حقَّه من التذوق والتأمل، ونمنح القارئ فرصة التفاعل العميق مع هذه الرحمة الإلهية المتدفقة من كل اسم.</p>

<p>وفي الأجزاء القادمة، سنواصل المسير بإذن الله في رياض الأسماء الأخرى، حيث الجلال والكمال والقدرة والحكمة، في توازنٍ يليق بجمال هذا الدين وكمال هذا الرب العظيم.</p>

<h2>أهمية معرفة الله بأسمائه الحسنى (شرعيًا وتربويًا)</h2>

<h3>أولًا: من المنظور الشرعي</h3>

<p><strong>1. أعظم أبواب الإيمان بالله:</strong> الإيمان بالله هو أول أركان الإيمان، وأعظم ما يُعرف به الله: أسماؤه وصفاته، قال تعالى:{وَلِلَّهِ الأَسْمَاءُ الْحُسْنَىٰ فَادْعُوهُ بِهَا} الأعراف: 180، فجعل الأسماء وسيلة للدعاء، والعبادة، والاقتراب.</p>

<p><strong>2. النجاة متوقفة على معرفته بأسمائه:</strong> قال النبي ﷺ: "إن لله تسعةً وتسعين اسمًا، مَن أحصاها دخل الجنة"، رواه البخاري ومسلم، والإحصاء هنا ليس عدًّا فقط، بل فهمًا، وتدبرًا، وعملاً، ودعاءً.</p>

<p><strong>3. القرآن نفسه قائم على الأسماء:</strong> كل سورة من سور القرآن تبدأ باسم أو تنتهي به، وكل قصة من قصصه تُختم باسمٍ يناسب السياق، ليتعلّم العبد كيف يرى يد الله في كل مشهد، وكيف يُسقط اسمه على واقعه.</p>

<p><strong>4. العقيدة الصحيحة لا تُبنى بدونها:</strong> انحرافات الفرق الضَّالة كانت تبدأ دائمًا من الفهم الخاطئ لأسماء الله، إما بإثبات ما لم يثبت، أو بنفي ما أثبته الله لنفسه.</p>

<h3>ثانيًا: من المنظور التربوي والسلوكي</h3>

<p><strong>1. الطريق الحقيقي إلى محبة الله:</strong> قال ابن القيم: "الطريق إلى الله هو معرفة أسمائه وصفاته، فمن عرفه بها أحبه لا محالة" لأنك لا تحب من تجهله… وكلما عرفت أنه "الرحيم، الودود، الحليم، الستّير" وقعت المحبة في قلبك دون استئذان.</p>

<p><strong>2. تُغذّي الخشوع والأنس في العبادة:</strong> من قال "الله أكبر" وهو يعرف أن الله هو العليّ الكبير… خشع. ومن قال "استغفر الله" وهو يعرف أنه الغفور الرحيم التواب….. أقبل. الأسماء تَمنح للعبادة روحًا لا تمنحها الجوارح وحدها.</p>

<p><strong>3. تصنع التوازن النفسي والسلوكي:</strong> من عرف أن الله العليم الحكيم….. رضي بقضائه. ومن عرف أنه الرزاق القابض الباسط… لم يجزع عند الفقر. ومن عرف أنه الستّير… ستر الناس ولم يفضح. ومن عرف أنه الشَّكور… لم يستقلّ الطاعات.</p>

<p><strong>4. تبني العبودية الصادقة لله:</strong> كل اسم يفتح أمامك باب عبودية خاص:
<ul style="text-align: right; margin: 1rem 2rem;">
<li>"الغني": عبودية الزهد والتجرد</li>
<li>"القوي": عبودية الاستعانة</li>
<li>"الحكيم": عبودية التسليم</li>
<li>"الرَّحيم": عبودية الرجاء</li>
</ul>
</p>

<p><strong>5. تُحيي القلب وتُصلح العمل:</strong> القلب الذي يعرف "الشهيد" لا يخون، والقلب الذي يعرف "الرقيب" لا يغفل، والقلب الذي يعرف "الودود" لا ييأس، فمعرفة الأسماء ليست فقط لحظات إيمانية… بل منهج حياة.</p>

<h3>خلاصة الأمر</h3>

<p style="text-align: center; font-style: italic; margin: 1.5rem 0; color: #c9945d; font-size: 1.1rem;">
معرفة الله بأسمائه الحسنى هي أصل كل صلاح، ومنبع كل طمأنينة، وباب كل توبة، وبداية كل طريق يُوصل إلى رضا الله.
</p>

<h2>لماذا "بأسمائه نحيا"؟</h2>

<p>لأن الحياة لا تُحيا حقًا إلا بالله، ولا يُعرف الله حقًا إلا بأسمائه… وكلما تعرّف القلب على اسمٍ من أسمائه، انفتح له باب من النور، وكلما تدبّر العبد معاني أسمائه الحسنى، أحبه، وهابه، واقترب منه.</p>

<p>فهذا الكتاب لم يُكتب ليكون مجرد دراسة في العقيدة، ولا مادة نظرية في معاني الصفات، بل هو محاولة جادّة لأن نعيش بأسمائه… لا أن نحفظها فقط.</p>

<p>سميته "بأسمائه نحيا" لأنني رأيت – من أعماق التجربة واليقين – أن من يحيا بأسمائه… يحيا بقلبٍ ثابت، وروحٍ مطمئنة، وسلوكٍ مستقيم، لأنه لم يعد يعبد إلهًا بعيدًا، بل ربًا يعرفه… رحيمًا في رحمته، عدلًا في قهره، ستّارًا في عفوه، حكيمًا في منعه، كريمًا في عطائه.</p>

<p>ولأن الدين في جوهره حبٌّ لله، وخشيةٌ منه، جاء العنوان الفرعي: "فقه الحب والتقوى في الأسماء الحسنى" فالحبُّ هو جوهر العلاقة، والتقوى هي ثمرة هذا الحب… فكلما أحببته، راقبته، وخشيته، وأقبلت عليه، وابتعدت عما يُغضبه.</p>

<p>فهذا الكتاب دعوة لأن نُحيي أرواحنا بهذين الجناحين: حبٌ يُقرّب، وتقوى تُطهّر، وكل ذلك… من خلال التأمل العميق في أسمائه التي نعيش بها، ونسجد لها، ونلقاه عليها.</p>
</section>

  <template id="chapter-template-chapter-4">
<section dir="rtl">
<h1>لماذا هذا الكتاب؟</h1>

<p>كُتب هذا الكتاب بدافع حبٍ وخشية وأمل، حب للقرآن وأسماء الله، وخشية من أن يمرّ القارئ على هذه الأسماء دون أن يعيش بها، وأمل في أن يعود الناس إلى التأمل العميق، والتعايش الحقيقي مع أسماء الله لا مجرد الحفظ والدراسة النظرية.</p>

<h2>المشكلة التي واجهتنا</h2>

<p>لقد لاحظت – من خلال السنوات الماضية – أن معظم كتب الأسماء الحسنى تركز على الجانب العلمي والنظري فقط، فتقدم الاسم كمعلومة تُحفظ، وليس كباب حب وقرب من الله.</p>

<p>كنتُ أرى القارئ يحفظ الأسماء لكن قلبه لا يحيا بها، يعرف معاني الأسماء لكن لا يشعر بتأثيرها في حياته، يدرسها في الكتب لكن لا يدعو بها في الليل.</p>

<p>والحياة الحقيقية مع الله لا تُبنى على المعلومات وحدها، بل على الحب والمعرفة والعمل والمناجاة.</p>

<h2>رؤيتي للحل</h2>

<p>لذا جاء هذا الكتاب كمحاولة جادة لتقديم أسماء الله بطريقة مختلفة:</p>

<ul style="text-align: right; margin: 1.5rem 2rem;">
<li>تخاطب القلب قبل العقل</li>
<li>تجمع بين العلم والعمل</li>
<li>تربط بين التأمل والسلوك</li>
<li>تفتح باب الدعاء والمناجاة</li>
<li>تُغني الحياة، لا تُثقلها بالمعلومات</li>
</ul>

<h2>مقصد الكتاب الأساسي</h2>

<p>أن تحيا بأسماء الله، لا أن تحفظها فقط.</p>

<p>أن تعرف الله بها، لا أن تعرف الأسماء عن الله.</p>

<p>أن تشعر بقربه في كل لحظة من خلالها.</p>

<p>أن تدعوه بها، وتسجد لها، وتخافه من خلالها، وتحبه بها.</p>

<p>أن تغير هذه الأسماء حياتك، وتصبح منهج تعاملك مع الله والحياة.</p>

<h2>ماذا تتوقع من هذا الكتاب؟</h2>

<p>عندما تنهي قراءة فصل من هذا الكتاب، لا تتوقع أن تكون قد حفظت معنى الاسم فقط، بل تتوقع:</p>

<ul style="text-align: right; margin: 1.5rem 2rem;">
<li>أن يكون قلبك قد انقدح فيه نور من أسماء الله</li>
<li>أن تشعر برغبة في الدعاء به في خلوتك</li>
<li>أن تفهم كيف يؤثر هذا الاسم في حياتك العملية</li>

<p dir="rtl" class="p20"><b>المقدمة</b><b></b></p>
<p dir="rtl" class="p21"><b>بسم الله الرحمن الرحيم</b></p>
<p dir="rtl" class="p22"><br></p>
<p dir="rtl" class="p23"><span class="s8"><b>بأسمائه نحيا – فقه الحب والتقوى</b></span><span class="s9"><b> (</b></span><b>أسماء الجلال والهيبة والرَّبوبية</b><span class="s9"><b>)</b></span></p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p1">في الجزء الأول من هذا الكتاب… مشينا على بساط الودّ، وبكينا بين يدي الرَّحيم، واغتسلت قلوبنا في دفءِ الغفور، وسَكَنَ القلب حين نادى: "يا حليم"، واطمأنّ حين سمع: "يا ودود".</p>
<p dir="rtl" class="p1">لكن… من أراد أن يعرف الله حقًّا، فلا بد أن يعرفه في كماله كله: في اللُّطف الذي يأويك، وفي الجلال الذي يُخضعك… في الرحمة التي تمسح دموعك، وفي الهيبة التي تُسقِطك ساجدًا دون أن تشعر.</p>
<p dir="rtl" class="p1">هذا الجزء من الكتاب… ليس دعوة إلى البكاء، بل إلى الانكسار، وليس طريقًا إلى العاطفة فقط… بل إلى المهابة التي تُربِّي القلب وتُقوِّم الروح.</p>
<p dir="rtl" class="p1">هنا… لن تقرأ "يا رحيم" فقط… بل "يا جبّار" الذي يرفع المنكسرين ويكسر المستكبرين، ولن تهمس فقط "يا ودود"… بل ستخشع عند "يا قهّار" الذي لا ينجو من قهره أحد.</p>
<p dir="rtl" class="p1">هنا… ستفهم أنَّ السجود ليس فقط فعل محبّة، بل موقف خضوع، وأن التقوى ليست فقط تجنّب الذنوب، بل ارتجافة قلب حين يُذكَر الله، وأنَّ العبادة لا تكتمل حتى تُروّى من الجمال وتُربّى بالجلال.</p>
<p dir="rtl" class="p1">إنها الأسماء التي… لا تُداعب المشاعر بل تُصلحها، ولا تكتفي بجذب القلوب، بل تُهذّبها، وتُقيمها على صراط الخضوع، هي الأسماء التي تُنبت في داخلك: عبدًا يعرف من يُناجي، ويعلم لمن يسجد.</p>
<p dir="rtl" class="p1">هنا، لن نُكثر من الكلام… بل سنُكثر من الصمت، والخشوع، والتأمل… فإنك ستدخل مملكة الجلال، حيث كل حرفٍ يُنطق، هو عبادة… وكل وصفٍ يُقال، لا يليق به إلا أن يُختَم بـ: "سبحانك… ما عبدناك حق عبادتك".</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p24"><b>دعاء بأسماء الجلال والعظمة:</b></p>
<p dir="rtl" class="p1">ٱللَّهُمَّ يَا مَلِيكَ ٱلسَّمَاوَاتِ وَٱلْأَرْضِ، يَا مَلِكُ، يَا مَلِيكُ، يَا جَبَّارُ، يَا مُتَكَبِّرُ، يَا عَزِيزُ، يَا قَهَّارُ، يَا قَاهِرُ، يَا دَيَّانُ، يَا سَيِّدُ، يَا كَبِيرُ، يَا مُتَعَالِ، يَا أَعَزُّ، إِلَٰهُ ٱلْخَلْقِ كُلِّهِمْ، يَا ذَا ٱلْجَلَالِ وَٱلْإِكْرَامِ…</p>
<p dir="rtl" class="p1">رَبَّنا ٱغْمُرْ قَلْبَنَا بِهَيْبَتِكَ، وَٱرْفَعْ رُؤُوسَنَا بِتَقْوَاكَ، وَٱجْعَلْنَا نَخْشَاكَ كَأَنَّنَا نَرَاكَ، وَٱهْدِنَا لِمَقَامِ ٱلتَّسْبِيحِ وَٱلْخُشُوعِ وَٱلرَّهْبَةِ، وَٱجْعَلْنَا مِنْ عِبَادِكَ ٱلْمُهَابِينَ بِتَقْوَاكَ فِي ٱلْأَرْضِ، ٱلرُّحَمَاءِ بِأَمْرِكَ، ٱلْمُذْعِنِينَ لِحُكْمِكَ.</p>
<p dir="rtl" class="p1">ٱللَّهُمَّ عَلِّمْنَا كَيْفَ نَخْضَعُ لِعِزَّتِكَ، وَنَخْشَعُ لِكِبْرِيَائِكَ، وَنَسْتَسْلِمُ لِقَهْرِكَ، وَنَسْتَظِلُّ بِظِلِّ ٱسْمِكَ ٱلْعَظِيمِ "ٱللَّهُ".</p>
<p dir="rtl" class="p1">وَصَلِّ ٱللَّهُمَّ وَسَلِّمْ وَبَارِكْ عَلَىٰ نَبِيِّنَا مُحَمَّدٍ، وَعَلَىٰ آلِهِ وَصَحْبِهِ وَمَنْ ٱهْتَدَىٰ بِهَدْيِهِ، إِلَىٰ يَوْمِ ٱلدِّينِ.</p>
<p dir="rtl" class="p1">في هذا الدعاء… لا نُناجي الله على استحياء المحبّ فقط، بل نقف أمامه بوجَل العبد، وانكسار المربوب، وخشوع من أدرك أنه أمام مَلِكٍ لا يُنازَع، وربٍّ لا يُرَدُّ أمره.</p>
<p dir="rtl" class="p1">إنك حين ترفع يديك وتقول: "يا مَلِكُ… يا مَلِيكُ… يا جَبَّارُ… يا قَهَّارُ…" فأنت لا تستجدي عفوًا فقط، بل تعلن ولاءك الكامل، واستسلامك المطلق، وخلعك لكل سلطان سواه… كأنك تقول: "يا رب… أنت وحدك الحكم، وأنت وحدك السيد، وأنا عبدك الذي لا مأوى له إلَّا بابك، ولا راية له إلَّا تحت عزّك ."</p>
<p dir="rtl" class="p1"><b>هذه الأسماء تعلمك:</b></p>
<p dir="rtl" class="p25">أن لا تهاب ظالـمًا، لأنَّك عبد ٱلْقَهَّارِ.</p>
<p dir="rtl" class="p25">وأن لا تتكبر لحظة، لأنك تحت سُلطة ٱلْمُتَكَبِّرِ.</p>
<p dir="rtl" class="p25">وأن لا تستقوي بعلم أو مال أو جاه، لأنَّ كل عِزّة في الوجود تنحني لـ ٱلْعَزِيزِ.</p>
<p dir="rtl" class="p25">وأن لا تطلب الكمال في نفسك، بل تطلب الجبر من ٱلْجَبَّارِ.</p>
<p dir="rtl" class="p25">وأن لا تتعلّق بمُلك فانٍ، لأن الـمُلك لله وحده، ٱلْمَلِكُ ٱلْمَلِيكُ.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p1"><b>هذه الأسماء تُربّيك:</b></p>
<p dir="rtl" class="p26">على الخوف من الذنب لا من الناس، لأنَّ الحساب عند ٱلدَّيَّان، لا عند الناس.</p>
<p dir="rtl" class="p26">وعلى الحياء من الله، لأنَّك حين تراه ٱلسَّيِّد، تستحي أن تعصيه وهو سيدك المتفضل.</p>
<p dir="rtl" class="p26">وعلى العلو بالعُبودية لا بالغرور، لأنَّ العلو الحقيقي تحت ظل ٱلْمُتَعَالِ.</p>
<p dir="rtl" class="p26">وعلى أن العظمة لله وحده، فلا تُزاحمه فيها، ولو في لحظة تكبّر خفيّ داخل قلبك.</p>
<p dir="rtl" class="p1"><b>وفي النهاية…</b></p>
<p dir="rtl" class="p1">هذا الدعاء لا يجعلك ترتجف فقط من عظمة الله… بل يجعلك تتزكى بهيبةٍ تمنعك من المعصية، وتُربّيك على التواضع الحقيقي، والإخلاص المطلق، والتسليم العميق.</p>
<p dir="rtl" class="p1">هو دعاء من لا يرى في نفسه شيئًا… إلَّا عبودية لسلطانٍ جليلٍ، لم يُرَ، لكن آثار جلاله تهزّ القلوب، وتطأطئ الأرواح.</p>
<p dir="rtl" class="p14"><b>فلنبدأ الرحلة..... على بركة الله تعالى..</b></p>
<p dir="rtl" class="p27">( ٱلْمَلِكُ وَٱلْمَلِيكُ )</p>
<p dir="rtl" class="p14"><b>حين تناجيه بـ "يا </b><span class="s8"><b>مَلِكُ</b></span><b>"...</b></p>
<p dir="rtl" class="p1">فأنت تكلّمه وأنت مُنحنٍ من الداخل، تشعر أن الكون كله ملكه…<br>
أنك لا تملك من أمرك شيئًا، وأنَّ قيامك وجلوسك ونفسك وخطواتك… كلها من عطائه، وتحت أمره.</p>
<p dir="rtl" class="p1">تشعر أن كل ما تراه حولك: السماوات… النجوم… المجرات… الأرواح… الأرواح التي ماتت… والأرواح التي لم تُخلق بعد… كلها تحت سلطانه، وتحت عرشه، وتحت سُلطانه، فلا خروج لأحد من قبضته، ولا غروب عنه، ولا تمرّد عن أمره… ولو بذرّة.</p>
<p dir="rtl" class="p1"> "<span class="s8"><b>ٱلْمَلِكُ</b></span> " لا يُنازعه أحد… وإذا وهبك شيئًا، لا يستطيع العالم أن يمنعه.<br>
وإذا قبض عنك شيئًا، لا تقدر الأرض أن تعيده.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p14"><b>أمّا حين تناجيه بـ "يا </b><span class="s8"><b>مَلِيكُ</b></span><b>"...</b></p>
<p dir="rtl" class="p1">فأنت لا تنظر إلى حجم ملكه فقط… بل إلى قربه الكامل من ملكه، وتصرّفه المطلق فيه… فـ"<span class="s8"><b>ٱلْمَلِكُ</b></span>" يدل على الـمَلك والـمُلك:</p>
<p dir="rtl" class="p28"> "<span class="s8"><b>المَلك</b></span>" بفتح الميم: يدل على الصفة الذاتية، أي أن الله هو المالك بذاته، المتصرف بما يملك، الآمر الناهي، الذي لا يُسأل عما يفعل.<br>
فهو اسم يدل على السلطة العليا، والهيمنة المطلقة، والكمال في الحُكم والتدبير.</p>
<p dir="rtl" class="p28">" <span class="s8"><b>الـمُلك</b></span> " بضم الميم: يدل على الـمُلك الذي يملكه ويسيطر عليه، أي الكون كله وما فيه من مخلوقات، فهو يشير إلى نطاق السلطان والسيطرة، أي أنَّ الله هو المالك لكل شيء، وله التصرف الكامل في مملكته.</p>
<p dir="rtl" class="p1">إذًا، العبارة تعني: اسم الله "<span class="s8"><b>ٱلْمَلِكُ</b></span>" يجمع بين معنى أنه المتّصف بالملك (<span class="s8"><b>الـمَلك</b></span>)، وصاحب السُّلطان المطلق على كل ما يملك )<span class="s8"><b>الـمُلك</b></span> ).</p>
<p dir="rtl" class="p1">لكن "<span class="s8"><b>ٱلْمَلِيكُ</b></span>" هو الملك المتصرّف، القريب، الـمُهيمن على كل شيء بأمره..</p>
<p dir="rtl" class="p1"> "<span class="s8"><b>ٱلْمَلِيكُ</b></span> " هو الذي يملكك الآن، لا يملك مستقبلك فقط، هو من يجعل قلبك ينبض… وسرك يتحرك… ودموعك تنزل… لا بيدك، بل بأمره.</p>
<p dir="rtl" class="p1">هو من يتملّكك وأنت لا تدري… ويهديك وأنت لا تطلب… ويؤدبك وأنت لا تفهم… ويعطيك قبل أن تدعو.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p14"><b>الفرق الدقيق بين "</b><span class="s8"><b>ٱلْمَلِكُ</b></span><b>" و"</b><span class="s8"><b>ٱلْمَلِيكُ</b></span><b>":</b></p>

        <p dir="rtl" class="p15"><b>الفارق</b></p>
      </td>
      <td valign="middle" class="td9">
        <p dir="rtl" class="p15"><b>النبرة القلبية</b></p>
      </td>
      <td valign="middle" class="td10">
        <p dir="rtl" class="p15"><b>المعنى المركزي</b></p>
      </td>
      <td valign="middle" class="td11">
        <p dir="rtl" class="p15"><b>الاسم</b></p>
      </td>
    </tr>
    <tr>
      <td valign="middle" class="td12">
        <p dir="rtl" class="p16"><b>يُشعرك بعظمة مُلكه ووسعه وسُلطانه</b></p>
      </td>
      <td valign="middle" class="td13">
        <p dir="rtl" class="p17"><b>يملأ القلب مهابة</b></p>
      </td>
      <td valign="middle" class="td14">
        <p dir="rtl" class="p17"><b>صاحب الملك المطلق</b></p>
      </td>
      <td valign="middle" class="td15">
        <p dir="rtl" class="p29"><b>ٱلْمَلِكُ</b></p>
      </td>
    </tr>

<p dir="rtl" class="p30"><b>يوحي إليك بأنَّ شيئًا لا يفلت من قبضته، لأن كل شيء الآن بين يديه، يجري بأمره، وتحت رعايته، وبحكمة لا يغيب عنها شيء.</b><b></b></p>
<td valign="middle" class="td16">
  <p dir="rtl" class="p17"><b>يملأ القلب طمأنينة وخضوعًا</b></p>
</td>
<td valign="middle" class="td17">
  <p dir="rtl" class="p17"><b>المتصرّف في ملكه بإحاطة وقرب</b></p>
</td>
<td valign="middle" class="td18">
  <p dir="rtl" class="p29"><b>ٱلْمَلِيكُ</b></p>
</td>
</tr>
</tbody>
</table>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p14"><b>كيف تُربّى القلوب على اسمي "</b><span class="s8"><b>ٱلْمَلِكُ</b></span><b>" و"</b><span class="s8"><b>ٱلْمَلِيكُ</b></span><b>"؟</b></p>
<p dir="rtl" class="p1">ليست أسماء الله الحسنى مجرد أوصاف تُحفَظ… بل هي مفاتيح تُربّي القلب، وتُقيم صلته بربّه، وتُغيّر نظرته إلى الكون، والناس، والنفس.</p>
<p dir="rtl" class="p1">ومن أعظم تلك المفاتيح: اسما "<span class="s8"><b>ٱلْمَلِكُ</b></span>"و"<span class="s8"><b>ٱلْمَلِيكُ</b></span>" فإنهما لا يملآن القلب عظمة وخشية فقط، بل يُحرّرانه من التعلّق، ويزرعان فيه السَّكينة في زمن الفوضى، والثبات في لحظة الانهيار.</p>
<p dir="rtl" class="p26">حين يثقل عليك العجز… فتذكّر "<span class="s8"><b>ٱلْمَلِكُ</b></span>" لأنّ كلّ أبواب الحل مغلقة إلَّا بابه، وكلّ قفل لا يُفتح إلَّا بأمره، وكلّ أمر، مهما طال… لا يُقضى إلَّا إذا شاء هو، لا غيره.</p>
<p dir="rtl" class="p26"> وحين يُهاجمك الخوف… فاذكر "<span class="s8"><b>ٱلْمَلِيكُ</b></span>" لأنَّ قُربه وحده أمان، وإذا كان هو الملك الحقيقي، المسيطر على كل من فوقك ومن حولك…<br>
فمن يُخيفك بعده؟.</p>
<p dir="rtl" class="p26">وحين يخذلك من ظننتهم سندًا… فاجمع بين الاسمين "<span class="s8"><b>ٱلْمَلِكُ</b></span>"و"<span class="s8"><b>ٱلْمَلِيكُ</b></span>"<br>
فالناس لا يملكون لك نفعًا ولا دفعًا، لكن هو يملك القلوب، ويُصرّف الأقدار، ويُغيّر المآلات بلحظة، بلا إذنٍ من أحد.</p>
<p dir="rtl" class="p1">فإذا دخل هذان الاسمان إلى قلبك… خرج منه التعلّق بمن سواهما، وستعلم عندها، أنَّ الطُّمأنينة لا تأتي من التَّملّك… بل من الخضوع لمالك الملك.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p1">يا <span class="s8"><b>مَلِكُ</b></span>… أذلّني بين يديك، ولا تتركني أظن أن بيدي شيء، ويا <span class="s8"><b>مَلِيكُ</b></span>… تصرّف في قلبي كما يليق بعزّتك، أصلحني، واجبّرني، واغمرني بلطف مُلكك، فليس لي من دونك ملاذ.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p14"><b>التدبر والتأمل:</b></p>
<p dir="rtl" class="p1">اسم "<span class="s8"><b> ٱلْمَلِكُ </b></span>" يُعلّمك أنَّك مملوك، لا تملك نفسك… لا رزقك، ولا أجلك، ولا قلبك، ولا خطواتك.</p>
<p dir="rtl" class="p1">حين تعصي… فأنت تعصي "<span class="s8"><b>ٱلْمَلِكُ</b></span>"، لا صديقًا، ولا موظفًا، بل من بيده الأمر والنهي، والعقاب والعفو، والموت والحياة.</p>
<p dir="rtl" class="p1">حين تُرزق… فاعلم أن الذي أعطاك هو "<span class="s8"><b>ٱلْمَلِكُ</b></span>"، فلا تفرح بالرزق وتنسَ السيادة!..</p>
<p dir="rtl" class="p1">كل سلطان على الأرض، هو ظل باهت من ملك الله، لا قوة له إلَّا بإذنه، ولا بقاؤه إلا بإرادته.</p>
<p dir="rtl" class="p14"><b>الأثر التربوي:</b></p>
<p dir="rtl" class="p1">اسم "<span class="s8"><b>ٱلْمَلِكُ</b></span>" يُربّيك على الذُّلّ الاختياري لله… أنت بين يديه طائعًا لا مُكرَهًا.</p>
<p dir="rtl" class="p1">يعلّمك ألا تتعلّق بحاكم أو غني، لأن الملك الحقيقي ليس لهم.</p>
<p dir="rtl" class="p1">يدفعك للثقة بأن الله سيقضي لك، ولو سُدّت الأبواب، فهو "ٱلْمَلِكُ" الذي لا يمنعه أحد.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p14"><b>التدبر والتأمل:</b></p>
<p dir="rtl" class="p1">"<span class="s8"><b>ٱلْمَلِيكُ</b></span>" هو من يتصرف فيك الآن… في كل خفقة قلب، في كل فكرة تمر في ذهنك، في كل موقف تمرّ به.</p>
<p dir="rtl" class="p1">حين تخاف، أو تضيع، أو تتألم، أو تشعر بالخُذلان… فتذكّر: "<span class="s8"><b>ٱلْمَلِيكُ</b></span>" معك، يُدبّر أمرك دون أن تُدرك.</p>
<p dir="rtl" class="p1">لا شيء يخرج عن أمره، ولا أحد يقدر أن يُفلت من قبضته… لأنَّه مليكٌ مقتدر.</p>
<p dir="rtl" class="p14"><b>الأثر التربوي:</b></p>
<p dir="rtl" class="p1">هذا الاسم يُربّيك على الطُّمأنينة العميقة: مهما بدا أنَّ الأمور تفلت… فهناك مليكٌ يُحكم السيطرة على كل شيء.</p>
<p dir="rtl" class="p1">يُعلّمك الاستسلام الكامل… لا بالموت، بل بالثقة… "لن يُصيبني إلَّا ما كتبه المليك."</p>
<p dir="rtl" class="p14"><b>الفرق التدبري بين "</b><span class="s8"><b>ٱلْمَلِكُ</b></span><b>" و"</b><span class="s8"><b>ٱلْمَلِيكُ</b></span><b>":</b></p>

<p dir="rtl" class="p19"><br></p>
<p dir="rtl" class="p24"><b>عناوين تأملية لاسم </b><span class="s8"><b>ٱلْمَلِكُ</b></span><b>:</b></p>
<p dir="rtl" class="p25">تحت سلطانه كلّ شيء… حتى قلبك.</p>
<p dir="rtl" class="p31"><b>دلالة</b>: لا يخرج شيء عن سلطان الله، حتى مشاعرك وتقلباتك، فاعتصم به وحده.</p>
<p dir="rtl" class="p25">الـمَلِكُ الذي لا يُنافسه أحد.</p>
<p dir="rtl" class="p31"><b>دلالة</b>: كل ملوك الأرض يزولون، أما ملك الله فثابت، لا يُزاحم ولا يُهدَّد.</p>
<p dir="rtl" class="p25">إذا أمرك… فأمره نافذ ولا يعترض أحد.</p>
<p dir="rtl" class="p31"><b>دلالة</b>: أمر الله نافذ، لا حائل دونه، فثق أن ما قدّره لك لا يُوقفه بشر.</p>
<p dir="rtl" class="p25">ٱلْمَلِكُ… الذي لا يحتاج عرشًا ليَملك.</p>
<p dir="rtl" class="p31"> <b>دلالة</b>: مُلكه ليس كملك البشر، لا يحتاج جيوشًا ولا أعوانًا، فهو الملك بالحق.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p24"><b>عناوين تأملية لاسم </b><span class="s8"><b>ٱلْمَلِيكُ</b></span><b>:</b></p>
<p dir="rtl" class="p25">هو الذي يُدبّر… حتى وأنت لا تدري.</p>
<p dir="rtl" class="p31"><b>دلالة</b>: تصرّف الله لا يتوقّف، حتى في صمت اللحظات وغفلة القلوب.</p>
<p dir="rtl" class="p25">مليكك أقرب إليك من نفسك… فكيف تخاف؟</p>
<p dir="rtl" class="p31"><b>دلالة</b>: من كان مليكه هو الله، فلا سلطان لأحد عليه، لا في رزقه ولا في قدره.</p>
<p dir="rtl" class="p25">لا تسقط ورقة… إلَّا بأمر المليك.</p>
<p dir="rtl" class="p31"><b>دلالة</b>: لا تفاصيل ضائعة، ولا ألم مهمل… فكل شيء تحت علمه وأمره.</p>
<p dir="rtl" class="p25">بين يدي المليك… تطمئن الروح أن كل شيء محسوب.</p>
<p dir="rtl" class="p31"><b>دلالة</b>: مليكك لا يُسيّر الكون بعشوائية، بل بتقدير، ورحمة، ومآل حكيم.</p>
<p dir="rtl" class="p25">إذا قال "كن"… فلا قدرة لـمَن قال "لا".</p>
<p dir="rtl" class="p31"><b>دلالة</b>: الأمر بين الكاف والنُّون، لا يُوقفه ظلم ولا يؤجله طغيان.</p>
<p dir="rtl" class="p19"><br></p>
<p dir="rtl" class="p24"><b>التمهيد الوجداني لاسم الله </b><span class="s8"><b>ٱلْمَلِكُ</b></span><b> و </b><span class="s8"><b>ٱلْمَلِيكُ</b><b></b></span></p>
<p dir="rtl" class="p1">إذا أردت أن تبدأ رحلة الرجوع إلى الله… ابدأها من هنا: أن تُدرك أنك لا تملك شيئًا… لا قلبك، لا وقتك، لا قرارك، لا مصيرك.</p>
<p dir="rtl" class="p1">كل شيء من حولك… السماء التي فوقك، والأرض التي تحتك، والأنفاس التي تدور في صدرك، والطرق التي تمشيها، والناس الذين تعيش معهم…<br>
كلها، كلّها، تقع تحت ظلِّ هذا الاسم:"<span class="s8"><b>ٱلْمَلِكُ</b></span>".</p>
<p dir="rtl" class="p1">ليس ملكًا جزئيًّا… بل هو المالك الحق، الذي له الأمر كله، ظاهرًا وباطنًا، بدايةً ونهاية، لا يُنازع، ولا يُقهر، ولا يخرج شيء عن ملكه، ولو كان ذرة في جوف ظلام،</p>
<p dir="rtl" class="p1">وإذا عرفت أن الله هو "<span class="s8"><b>ٱلْمَلِكُ</b></span>"، فأنت لا تعود تنكسر من أجل أحد،<br>
ولا تركض خلف أحد، ولا تخاف من أحد…</p>
<p dir="rtl" class="p1">لأنَّ الـمُلك بيده هو، والرزق عنده هو، والحياة والموت، والقبول والرفض، والعِزّ والذلّ، كلها ليست في أيدي الخلق، بل في قبضة "<span class="s8"><b>ٱلْمَلِكِ</b></span>".</p>
<p dir="rtl" class="p1">لكن تأمّل الآن اسمًا أعمق من "<span class="s8"><b>ٱلْمَلِكُ</b></span>"… إنه "<span class="s8"><b>ٱلْمَلِيكُ</b></span>"…</p>
<p dir="rtl" class="p1">ليس فقط الذي يملك، بل الذي يتصرّف في ملكه لحظةً بلحظة، ونفسًا بنفس، وخفقةً بخفقة.</p>
<p dir="rtl" class="p1">اسم "<span class="s8"><b>ٱلْمَلِيكُ</b></span>" لا يُخبرك فقط من هو ربك، بل يُخبرك كيف يُدبّر شؤونك الآن، في هذه اللحظة، في سرك، في قدرك، في كل ما لا تراه.</p>
<p dir="rtl" class="p32">"<span class="s8"><b>ٱلْمَلِيكُ</b></span> "هو الذي يتولّى خفايا الأمور بدقّة خفيّة، فيُقدّر ويُمهّد ويُغيّر ويمنع ويعطي، دون أن يُستأذن أو يُراجَع، لأنَّه المالك المطلق لكل شيء.</p>
<p dir="rtl" class="p1">هو من جعل الدمع ينزل… والطريق يُفتح… والقلب يلين… والأقدار تسير في اتجاه لم تحسب له حسابًا… لأنه "<span class="s8"><b>ٱلْمَلِيكُ</b></span>"… الذي لا يُسأل عما يفعل، وهم يُسألون.</p>
<p dir="rtl" class="p1">فإذا وقفتَ بين يدي الله تعالى، فاذكره بهذين الاسمين العظيمين… وقل في سرّك:</p>
<p dir="rtl" class="p1">يا مَلِكُ، لا تُسلّطني على نفسي، فأنا أُهلكها، ويا مَلِيكُ، دبّر أمري، فقد عجزتُ عن كل شيء.</p>
<p dir="rtl" class="p1">اجعل قلبي خاضعًا لك، لا خاضعًا للدنيا، واكفني أن أركض خلف الأبواب… وأنا في حضرة من بيده مفاتيحها جميعًا.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p33"><b>حين يتجلّى اسم الله "</b><span class="s10"><b> ٱلْمَلِكُ</b></span><span class="s11"><b> </b></span><b>" – "</b><span class="s10"><b> ٱلْمَلِيكُ</b></span><b> " في قلبك…</b><span class="s10"><b> </b><b></b></span></p>
<p dir="rtl" class="p1">حين يتجلّى اسم "<span class="s8"><b> ٱلْمَلِكُ</b></span><span class="s2"><b> </b></span>" في قلبك… لا تعود تنظر إلى الدنيا كما كنت، تسقط من عينيك التيجان، وتذبل أمامك العروش، وتغدو الألقاب كلها سرابًا… فلا مالك حقيقي إلَّا من بيده كل شيء، ولا سلطان يدوم، إلَّا سلطان مَن لا يزول ملكه.</p>
<p dir="rtl" class="p1">تبدأ بفهمٍ آخر… أنك لا تملك نفسك، ولا تملك مَن تحب، ولا حتى لحظة من لحظاتك… كلّ شيء مُلكه، وكلّ أمرٍ بيده، وكلّ قلب تحت قبضته، وكلّ روحٍ مرهونة بأمره، وكلّ كونٍ يمشي على سنّته.</p>
<p dir="rtl" class="p1">وحين يتجلّى في قلبك اسم "<span class="s8"><b> ٱلْمَلِيكُ</b></span>"… تشعر أنك عبدٌ مُدبَّر، لا متروك، وأنك لا تحتاج واسطة، فهو المليك الذي يتولّى شأنك بنفسه، ويقضي أمورك بلطفه، فلا تحتاج إلى أن "تصرخ" كي يسمعك، يكفي أن تنكسر بصمت… وهو يدبّر.</p>
<p dir="rtl" class="p1">"<span class="s8"><b> ٱلْمَلِيكُ</b></span>"… ليس فقط مالك الملك، بل المتصرّف فيه بحكمة، الحاضر في تفاصيلك الصغيرة، الذي يُقيم الموازين في الخفاء، ويُعيد ترتيب الفوضى في قلبك من حيث لا تدري.</p>
<p dir="rtl" class="p1">حين يتجلّى هذا الاسم في قلبك… يسكن، ولو كنت وسط العاصفة، تطمئن، ولو ضاع كل شيء، لأنَّ <span class="s8"><b>ٱلْمَلِك </b></span>الحقيقي… لم يزل على العرش، ولم يتغيّر شيء.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p24"><b>المعنى اللغوي والشَّرعي:</b></p>
<p dir="rtl" class="p1"><span class="s7"><b>أولًا</b></span><b>: اسم الله – </b><span class="s8"><b>ٱلْمَلِكُ</b><b></b></span></p>
<p dir="rtl" class="p1"><b>المعنى اللغوي:</b> "<span class="s8"><b>ٱلْمَلِكُ</b></span>" مأخوذ من الجذر مَلَكَ، وهو أصلٌ في التصرّف والسُّلطان والامتلاك.</p>
<p dir="rtl" class="p1">تقول العرب: "مَلَكَ الشيءَ" أي امتلكه تصرّفًا وحُكمًا، و"الـمُلْكُ" هو السُّلطة الكاملة على الشيء ظاهِرًا وباطِنًا.</p>
<p dir="rtl" class="p1">و"الـمَلك" بالتحريك: هو السيد المتصرّف الآمرُ الناهي، الذي لا يُراجَع.</p>
<p dir="rtl" class="p1">فـ"<span class="s8"><b>ٱلْمَلِكُ</b></span>" في لسان العرب هو: من له السُّلطان المطلق في ذاته وصفاته وأوامره، لا يعلو عليه أحد، ولا يخرج شيء عن سلطانه.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p1"><b>المعنى الشرعي</b>: هو الله تعالى الذي له الملك التامّ المطلق، وله التصرف الكامل في عباده، لا يُنازَع في مُلكه، ولا يُعقّب على حكمه، يُطلق عليه "<span class="s8"><b>ٱلْمَلِكُ</b></span>" لأنه:</p>
<p dir="rtl" class="p25">يخلق ما يشاء مما يملك.</p>
<p dir="rtl" class="p25">يهب لمن يشاء مما يملك.</p>
<p dir="rtl" class="p25">يأخذ ما يشاء ممن يملك.</p>
<p dir="rtl" class="p25">لا أحد يملك عليه، ولا يشاركه أحد في ملكه.</p>
<p dir="rtl" class="p34"><span class="s1"><b>الدليل:</b> </span>﴿فَتَعَٰلَى ٱللَّهُ ٱلۡمَلِكُ ٱلۡحَقُّۗ وَلَا تَعۡجَلۡ بِٱلۡقُرۡءَانِ مِن قَبۡلِ أَن يُقۡضَىٰٓ إِلَيۡكَ وَحۡيُهُۥۖ وَقُل رَّبِّ زِدۡنِي عِلۡمٗا﴾<span class="s13"> </span><span class="s14">طه: ١١٤</span><span class="s1">.</span></p>
<p dir="rtl" class="p34"><span class="s1">وقوله تعالى: </span>﴿هُوَ ٱللَّهُ ٱلَّذِي لَآ إِلَٰهَ إِلَّا هُوَ ٱلۡمَلِكُ ٱلۡقُدُّوسُ ٱلسَّلَٰمُ ٱلۡمُؤۡمِنُ ٱلۡمُهَيۡمِنُ ٱلۡعَزِيزُ ٱلۡجَبَّارُ ٱلۡمُتَكَبِّرُۚ سُبۡحَٰنَ ٱللَّهِ عَمَّا يُشۡرِكُونَ﴾<span class="s13"> </span><span class="s14">الحشر: ٢٣</span><span class="s1"><b>.</b></span></p>
<p dir="rtl" class="p1"><span class="s7"><b>ثانيًا</b></span><b>: اسم الله – </b><span class="s8"><b>ٱلْمَلِيكُ</b><b></b></span></p>
<p dir="rtl" class="p1"><b>المعنى اللغوي:</b> "<span class="s8"><b>ٱلْمَلِيكُ</b></span>" أيضًا من الجذر مَلَكَ، لكنه بصيغة فعيل، وهي صيغة مبالغة، و"<span class="s8"><b>ٱلْمَلِيكُ</b></span>" بمعنى ذو الـمُلك التامِّ في ذاته، الـمُحكِمُ المتصرّف بكل دقة وشمول.</p>
<p dir="rtl" class="p1">وورد في اللسان: المَلِيكُ: هو الذي يَملِك الـمُلكَ ويُجريه بإرادته لحظة بلحظة.</p>
<p dir="rtl" class="p1"><b>المعنى الشرعي:</b> هو الله الذي يُجري ملكه بتقديرٍ دقيق مباشر،<br>
فلا يوجد أمر صغير أو كبير إلَّا بتصرّف مليكٍ مقتدر.</p>
<p dir="rtl" class="p1">اسم "<span class="s8"><b>ٱلْمَلِيكُ</b></span>" يدل على قُرب التصرّف وتمام الإحاطة والتدبير.</p>
<p dir="rtl" class="p34"><span class="s1"><b>الدليل</b>: </span>﴿فِي مَقۡعَدِ صِدۡقٍ عِندَ مَلِيكٖ مُّقۡتَدِرِۭ﴾<span class="s13"> </span><span class="s14">القمر: ٥٥</span></p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p14"><b>الفرق بين "</b><span class="s8"><b>ٱلْمَلِكُ</b></span><b>" و"</b><span class="s8"><b>ٱلْمَلِيكُ</b></span><b>" باختصار:</b></p>

<p dir="rtl" class="p1"><b>تنويه:</b></p>
<p dir="rtl" class="p1">"<span class="s8"><b>مَلِيكُ</b></span>" على وزن فعيل ظاهريًا، لكنها ليست مجرد "فعيل " قياسي، بل هي صيغة مبالغة من الملك، تدل على عظمة الـمُلك وكمال السيطرة، وتُستخدم أحيانًا كصيغة تصغير للتفخيم والتعظيم، كما هو في لسان العرب.</p>
<p dir="rtl" class="p1"><br>
</p>
<p dir="rtl" class="p24"><b>وروده في القرآن والسُّنة:</b></p>
<p dir="rtl" class="p25"><b>أولًا: اسم الله </b><span class="s8"><b>ٱلْمَلِكُ</b></span><b> في القرآن الكريم</b></p>
<p dir="rtl" class="p35"><span class="s1">قوله تعالى: </span>﴿فَتَعَٰلَى ٱللَّهُ ٱلۡمَلِكُ ٱلۡحَقُّۗ وَلَا تَعۡجَلۡ بِٱلۡقُرۡءَانِ مِن قَبۡلِ أَن يُقۡضَىٰٓ إِلَيۡكَ وَحۡيُهُۥۖ وَقُل رَّبِّ زِدۡنِي عِلۡمٗا﴾<span class="s13"> </span><span class="s14">طه: ١١٤</span><span class="s1">.</span></p>
<p dir="rtl" class="p1"><b>السياق</b>: في ختام آيات تتحدث عن الوحي والنبوة والحق، فيُختم بتعظيم الله بوصفه "<span class="s8"><b>ٱلْمَلِكُ ٱلْحَقُّ</b></span>" أي الذي له الـمُلك الحقيقي وحده، لا صوريّ ولا زائل.</p>
<p dir="rtl" class="p1"><b>الفائدة</b>: يُربّي القلب على أنَّ ما عداه زائل، وما عنده هو الباقي.</p>
<p dir="rtl" class="p35"><span class="s1">قوله تعالى: </span>﴿هُوَ ٱللَّهُ ٱلَّذِي لَآ إِلَٰهَ إِلَّا هُوَ ٱلۡمَلِكُ ٱلۡقُدُّوسُ ٱلسَّلَٰمُ ٱلۡمُؤۡمِنُ ٱلۡمُهَيۡمِنُ ٱلۡعَزِيزُ ٱلۡجَبَّارُ ٱلۡمُتَكَبِّرُۚ سُبۡحَٰنَ ٱللَّهِ عَمَّا يُشۡرِكُونَ﴾<span class="s13"> </span><span class="s14">الحشر: ٢٣</span><span class="s1">.</span></p>
<p dir="rtl" class="p1"><b>السياق</b>: ضمن أعظم آيات الأسماء الحسنى، وتأتي "<span class="s8"><b>ٱلْمَلِكُ</b></span>" في صدارة الأسماء، لإثبات سلطان الله المطلق على العالمين.</p>
<p dir="rtl" class="p1"><b>الفائدة</b>: كل اسم تالٍ ينبثق من "<span class="s8"><b>ٱلْمَلِكُ</b></span>"، فالـمُلك أصل الجلال والهيمنة والعزة.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p36">قوله تعالى: <span class="s15">﴿مَٰلِكِ يَوۡمِ ٱلدِّينِ﴾</span><span class="s13"> </span><span class="s12">الفاتحة: ٤</span>، ملاحظة: رغم أنَّ الآية فيها "<span class="s8"><b>مَالِكِ</b></span>" لا "<span class="s17"><b>مَلِكِ</b></span>"، فقد قرأ بعض القُرَّاء "<span class="s8"><b>مَلِكِ</b></span><b> يَوْمِ ٱلدِّينِ</b>"، وهي قراءة صحيحة متواترة.</p>
<p dir="rtl" class="p37"><b>الفائدة</b>: بيان أنَّ ملك الله يتجلى يوم القيامة، حيث لا يبقى لأحد من ملوك الأرض ملكٌ ولا سلطة.</p>
<p dir="rtl" class="p1"><br>
</p>
<p dir="rtl" class="p38"><span class="s1">قوله تعالى: </span><span class="s18">﴿قُلِ ٱللَّهُمَّ مَٰلِكَ ٱلۡمُلۡكِ تُؤۡتِي ٱلۡمُلۡكَ مَن تَشَآءُ وَتَنزِعُ ٱلۡمُلۡكَ مِمَّن تَشَآءُ وَتُعِزُّ مَن تَشَآءُ وَتُذِلُّ مَن تَشَآءُۖ بِيَدِكَ ٱلۡخَيۡرُۖ إِنَّكَ عَلَىٰ كُلِّ شَيۡءٖ قَدِيرٞ﴾ ﴿قُلِ ٱللَّهُمَّ مَٰلِكَ ٱلۡمُلۡكِ تُؤۡتِي ٱلۡمُلۡكَ مَن تَشَآءُ وَتَنزِعُ ٱلۡمُلۡكَ مِمَّن تَشَآءُ وَتُعِزُّ مَن تَشَآءُ وَتُذِلُّ مَن تَشَآءُۖ بِيَدِكَ ٱلۡخَيۡرُۖ إِنَّكَ عَلَىٰ كُلِّ شَيۡءٖ قَدِيرٞ﴾</span><span class="s13"> </span><span class="s14">آل عمران: ٢٦</span><span class="s1">.</span></p>
<p dir="rtl" class="p37"><b>السياق</b>: دعاء يعلن خضوع العبد لله الذي يهب الملك لمن يشاء، وينزعه ممن يشاء.</p>
<p dir="rtl" class="p37">صلة وثيقة باسم "ٱلْمَلِكُ"، وإن لم يُذكر الاسم بصيغته الصريحة.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p25"><b>ثانيًا: اسم الله </b><span class="s8"><b>ٱلْمَلِيكُ</b></span><b> في القرآن الكريم</b></p>
<p dir="rtl" class="p34"><span class="s1">قوله تعالى: </span>﴿فِي مَقۡعَدِ صِدۡقٍ عِندَ مَلِيكٖ مُّقۡتَدِرِۭ﴾<span class="s13"> </span><span class="s14">القمر: ٥٥</span><span class="s1">.</span></p>
<p dir="rtl" class="p1"><b>السياق</b>: في ختام وصف نعيم أهل الجنة، يُختم المشهد بلقائهم لِمَلِيكٍ مُّقْتَدِر، أي للملك المتصرّف، المُهيمن، القريب في تدبيره، العظيم في قدرته.</p>
<p dir="rtl" class="p1"><b>الفائدة</b>: اقتران "<span class="s8"><b>ٱلْمَلِيكُ</b></span>" بصفة "<b>مُّقْتَدِرٍ</b>" يُظهِر أن ملك الله ليس فقط سلطانًا، بل قدرة عملية في التصرّف والتقدير.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p25"><b>ثالثًا: اسم الله </b><span class="s8"><b>ٱلْمَلِكُ</b></span><b> في السنة النبوية</b></p>
<p dir="rtl" class="p36">ورد صريحًا في حديث صحيح: عن أنس بن مالك رضي الله عنه قال:<br>
كان رسولُ اللهِ ﷺ إذا أوى إلى فراشِه قال: " ٱللَّهُمَّ ربَّ السَّماواتِ السَّبعِ، وربَّ العرشِ العظيمِ، ربَّنا وربَّ كلِّ شيءٍ، فالقَ الحبِّ والنَّوى، ومُنزلَ التَّوراةِ والإنجيلِ والفرقانِ، أعوذُ بكَ من شرِّ كلِّ ذي شرٍّ أنتَ آخذٌ بناصيتِه، أنتَ الأوَّلُ فليسَ قبلَك شيءٌ، وأنتَ الآخرُ فليسَ بعدَك شيءٌ، وأنتَ الظَّاهرُ فليسَ فوقَك شيءٌ، وأنتَ الباطنُ فليسَ دونَك شيءٌ، ٱقضِ عنَّا الدَّينَ، وأغنِنا منَ الفقرِ" رواه مسلم (2713).</p>
<p dir="rtl" class="p1">وورد في رواية ابن خزيمة في دعاء قيام الليل:</p>
<p dir="rtl" class="p1">" أنتَ الملِكُ، لا إلهَ إلا أنت " صحيح ابن خزيمة(587) ، وصححه الألباني في "صحيح الترغيب"..</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p36"><b>حديث قيام الليل:</b> كان النبي ﷺ يقول في سجوده: " اللَّهُمَّ لَكَ سَجَدْتُ، وَبِكَ آمَنتُ، وَلَكَ أَسْلَمْتُ، سَجَدَ وَجْهِيَ لِلَّذِي خَلَقَهُ، وَصَوَّرَهُ، وَشَقَّ سَمْعَهُ وَبَصَرَهُ، تَبَارَكَ اللَّهُ أَحْسَنُ الْخَالِقِينَ" رواه مسلم.</p>
<p dir="rtl" class="p1">ورغم أنَّ "<span class="s8"><b>ٱلْمَلِكُ</b></span>" لم يرد فيه لفظًا، إلا أنَّ السجود والخضوع كله قائم على الإقرار بسُلطان الملك الأعلى.</p>
<p dir="rtl" class="p39"><b></b><br></p>
<p dir="rtl" class="p14"><b>ملحوظة تربوية:</b><b></b></p>
<p dir="rtl" class="p1">ورود "<span class="s8"><b>ٱلْمَلِكُ</b></span>" أكثر من "<span class="s8"><b>ٱلْمَلِيكُ</b></span>" في القرآن، لأنَّ الاسم الأول يُظهر جلال الله الكلّي على الكون.</p>
<p dir="rtl" class="p1">وورود "<span class="s8"><b>ٱلْمَلِيكُ</b></span>" في مشهد الجنة، يوحي بأنَّ القلوب التي عرفت قرب الله وسيطرته، تُطمئن بلقائه في الآخرة.</p>
<p dir="rtl" class="p19"><br></p>
<p dir="rtl" class="p19"><br></p>
<p dir="rtl" class="p24"><b>أوّلًا: الأثر السلوكي والتربوي لاسم</b><span class="s9"><b> </b></span><span class="s8"><b>ٱلْمَلِكُ</b><b></b></span></p>
<p dir="rtl" class="p26"><b>في سلوك العبد:</b></p>
<p dir="rtl" class="p36">الخضوع المطلق لله دون منازعة: من يتأمّل اسم "<span class="s8"><b>ٱلْمَلِكُ</b></span>" يعلم أنَّ الله يملك كل شيء، فلا يُجادله في أمره، ولا يردّ عليه حُكمه، ولا يسأل: لماذا؟ فيخضع إذا أمر، ويرضى إذا قضى، ويُسلم إذا قدّر.</p>
<p dir="rtl" class="p36">التحرر من التعلّق بالبشر: لأنَّه يدرك أن كل "ملك" على الأرض هو ملك مُستعار مؤقّت، لا يملك لنفسه ضرًّا ولا نفعًا، فلا يذلّ قلبه لطلب جاه أو رزق من أحد، بل يطلب من المالك الأعلى.</p>
<p dir="rtl" class="p36">العدل في التعامل مع الناس: لأنّض الملك الحق لا يظلم، فإذا أحبّ الله أن يُكرمه، علّمه أن لا يظلم أحدًا وهو لا يملك شيئًا أصلًا.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p26"><b>في همّة العبد:</b></p>
<p dir="rtl" class="p36">يعرف أنَّ المعركة ليست مع الناس، بل مع نفسه أمام الله الملك: فلا يُرهقه الصراع على المناصب أو إثبات الذات، لأن الـمُلْك كله عند الله، فهو يهب من يشاء.</p>
<p dir="rtl" class="p36">يرفع من همّته في العبادة: لأنك لا تقف بين يدي أيّ أحد… بل بين يدي الملك الذي بيده السماوات والأرض، فتخشع في صلاتك، ويزداد حضورك، ويتحوّل سجودك إلى إعلان ولاء لا مجرد طقس.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p26"><b>في نظرته لنفسه:</b></p>
<p dir="rtl" class="p36">يرى نفسه عبدًا فقيرًا لا يملك شيئًا… فيزول منه الغرور، ويزدهر فيه التواضع، ويثبت فيه الشعور بالحاجة إلى الله في كل شيء.</p>
<p dir="rtl" class="p36">يدرك أن كل ما لديه من نِعَم هو عطية من الملك، لا استحقاقًا،<br>
فيحمد الله ولا يتباهى.</p>
<p dir="rtl" class="p24"><b>ثانيًا: الأثر السلوكي التربوي لاسم </b><span class="s8"><b>ٱلْمَلِيكُ</b><b></b></span></p>
<p dir="rtl" class="p26"><b>في سلوك العبد:</b></p>
<p dir="rtl" class="p36">يتعلّم حُسن الظَّنِّ بالله في كل قضاء وقدر: لأنَّ "<span class="s8"><b>ٱلْمَلِيكُ</b></span>" هو الذي يُدبّر بتقديرٍ محكم، حتى ما لا نفهمه… فهو ضمن خطة مليكٍ مقتدر.</p>
<p dir="rtl" class="p36">يتخلّى عن شعور السَّيطرة والتحكم الـمَرَضي: لأنه يُدرك أنَّ التصرّف الحقيقي ليس بيده، بل بيد مليكٍ يُدير شؤون كل قلب وكل رزق وكل عمر.</p>
<p dir="rtl" class="p36">يلتزم الطاعة في التفاصيل الصغيرة: لأنه يعلم أنَّ الله تعالى يتصرّف في دقائق الأمور، فلا يستصغر ذنبًا، ولا يُهمِل عملًا، لأنَّ كل حركة تحت تدبير المليك.</p>
<p dir="rtl" class="p26"><b>في همّة العبد:</b></p>
<p dir="rtl" class="p36">يزداد صبره وثباته في المحن: لأنه يثق أن الـمُلك والتقدير الآن في يد مليكٍ لا يُخطئ، ولا يظلم، ولا يُغفل.</p>
<p dir="rtl" class="p36">يتحرّك في الحياة بثقة هادئة: لا يرتبك، ولا يتوتر… لأنه يعيش تحت أمر مليكٍ يراه ويُحسن إليه.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p26"><b>في نظرته لنفسه:</b></p>
<p dir="rtl" class="p36">يرى نفسه كائنًا صغيرًا جدًا تحت عناية عظيمة جدًا، فلا يحتقِر ذاته ولا يُعظّمها، بل يُسلّمها لله.</p>
<p dir="rtl" class="p36">يشعر أن كل تقلب في قلبه، كل نية، كل فكرة… يراها الله ويضبطها الله، فيُطهر نيته، ويُراقب خواطره، لأنَّه بين يدي مليكٍ لا تخفى عليه الخواطر.</p>
<p dir="rtl" class="p1"><b>خلاصة جامعة:</b></p>
