<p dir="rtl" class="p19"><br></p>
<p dir="rtl" class="p24"><b>الخاتمة الوجدانية: حين تُذلّك الدُّنيا… ويرفعك العزيز</b></p>
<p dir="rtl" class="p1">في عالمٍ تتكسّر فيه الأرواح كلّ يوم، وتخذلك فيه الأسماء التي ظننتها كبيرة…<br>
يبقى لك اسمٌ واحدٌ إن تعلّقت به، رُفِعتَ وإن سقط الناس كلّهم: <span class="s8"><b>ٱلْعَزِيزُ</b></span>… هو الذي إن احتميتَ بعزّته، لم تُذلّك شهوة، ولم تُرعبك لحظة انكسار، وإن رآك ذليلًا على بابه… أعزّك، ولو سخر منك أهل الأرض جميعًا.</p>
<p dir="rtl" class="p1"><span class="s8"><b>ٱلْعَزِيزُ</b></span>… لا تحتاج أن تصرخ إليه لتُسمعه، يكفي أن تهمس له بينك وبين قلبك: "ٱللَّهُمَّ أَعِزَّنِي بِكَ، فَإِنِّي بِغَيْرِكَ هَلَكَتُ."</p>
<p dir="rtl" class="p1">وحين تتكسّر في داخلك… ويبكي فيك شيء لا اسم له، حين لا يفهمك أحد، حين لا تقدر أن تشرح حتى لنفسك ما الذي انكسر، حين يُقال لك: "تماسك!" وأنت لا تملك ما تتمسك به… فاذكر اسمًا واحدًا، يهتزّ له قلبك:<br>
<span class="s8"><b>ٱلْجَبَّارُ</b></span>…</p>
<p dir="rtl" class="p1">هو الذي يرى وجعك وإن لم تشتكِ، ويجبر كَسْرَك ولو لم تقل شيئًا،<br>
ويرفعك بلطفٍ، لا تراه… إلَّا بعدما تُشفى.</p>
<p dir="rtl" class="p1"><span class="s8"><b>ٱلْجَبَّارُ</b></span>…لا يكسر عبده… بل يكسر ما كَسر قلب عبده، الجبّار لا يُبعدك… بل يقربك بطريقة الجبر، لا العقوبة.</p>
<p dir="rtl" class="p1">فإن كنتَ تريد الله عزيزًا لك… فكن عبدًا له، لا لغيره.</p>
<p dir="rtl" class="p1">وإن كنتَ تشتاق للجبر حقًا… فلا تطرقه بكبريائك، بل انكسر على عتبة بابه… وارفع كفيك، وقل:</p>
<p dir="rtl" class="p1">"ٱللَّهُمَّ يَا عَزِيزُ… اجعلني عزيزًا بك، لا بنفسي."</p>
<p dir="rtl" class="p1">"يَا جَبَّارُ… اجبرني جبرًا يليق بجلالك، وبلُطفك، وبحبّك لعبادك."</p>
<p dir="rtl" class="p1">فالعِزَّة من غير الله… ذُلّ، والجَبْر من غير الله… لا يُجبر.</p>
<p dir="rtl" class="p19"><br></p>
<p dir="rtl" class="p19"><br></p>
<p dir="rtl" class="p19"><br></p>
<p dir="rtl" class="p24"><b>نصيحة من قلب اسم الله </b><span class="s8"><b>ٱلْعَزِيزُ</b></span><b> – </b><span class="s8"><b>ٱلْجَبَّارُ</b></span><b>:</b></p>
<p dir="rtl" class="p1">إيّاك أن تطلب عزّتك من الناس… فإنهم إن أعطوكها اليوم، سلبوها غدًا،<br>
وإن رفعوك مرة، أسقطوك مرّتين. </p>
<p dir="rtl" class="p1">واعلم أنَّ العِزّة التي تأتيك من الله… لا يُسقطها نقد، ولا يُهينها خذلان، ولا يراها إلَّا من كان له قلب.</p>
<p dir="rtl" class="p1">وإيّاك أن تخجل من انكسارك… فربك ليس كسائر الملوك…<br>
الملوك يطردون الضعفاء… أما ٱلْجَبَّارُ، فيجبرهم أولًا، ثم يرفعهم.</p>
<p dir="rtl" class="p1">لا تخف من انحناء قلبك… فبعض الانحناءات أمام الله… هي التي تُقيمك في الحياة مرفوع الرأس.</p>
<p dir="rtl" class="p1">تعلّق باسم "<span class="s8"><b>ٱلْعَزِيزُ</b></span>"… فلا تُذِلّ نفسك لأحد، ما دمت واقفًا بين يديه.</p>
<p dir="rtl" class="p1">وإذا انكسر فيك شيء لا يُصلحه البشر… فاركع… واهمس للجبّار: "هنا الكسر يا رب، وأنت وحدك الجابر."</p>
<p class="p53"><br></p>
<p dir="rtl" class="p24"><b>ماذا أتعلم من اسم الله </b><span class="s8"><b>ٱلْعَزِيزُ</b></span><b> – </b><span class="s8"><b>ٱلْجَبَّارُ</b></span><b>، لأكون نافعًا لعباد الله؟</b></p>
<p dir="rtl" class="p1"><b>أولًا: من اسم الله </b><span class="s8"><b>ٱلْعَزِيزُ</b></span><b>… أتعلم أن:</b></p>
<p dir="rtl" class="p36">لا أطلب العِزّة من الناس، بل أكون سببًا في إعزازهم بالله.</p>
<p dir="rtl" class="p36">أن أرفع من شأن مَن حولي، لا بتضخيم ذواتهم، بل بتقوية صلتهم بالله.</p>
<p dir="rtl" class="p36">أن أُعزّ الفقير بالعلم، والعاصي بالرَّحمة، والمنكسر بالكلمة الطيبة.</p>
<p dir="rtl" class="p36">أجعل عِزّتي وسيلة لخدمة لا كبرياء: فإذا أعطاني الله وجاهة أو علمًا أو منصبًا… لم أتكبر به على الناس، بل أقول في كل موضع: العزّة لله، ومنه وحده أعطاني، فواجبي أن أُعطي من حولي.</p>
<p dir="rtl" class="p36">أستحي أن أُذلّ نفسي بمعصية، لأنَّ من ذلّ لله… لا يرضى الذلّ لغيره، فأكون قدوة في الطهارة والسمت والسلوك، ليشعر الناس أن المؤمن الحقيقي عزيز بالله، لا بخطاب ولا صراخ.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p1"><b>ثانيًا: من اسم الله </b><span class="s8"><b>ٱلْجَبَّارُ</b></span><b>… أتعلم أن:</b></p>
<p dir="rtl" class="p36">أجبر المنكسرين من حولي… بكلمة، بدعاء، بيد حانية: كل من كُسِر أمامي… أقول: يا رب، علّمني كيف أجبره بلُطف، كما تجبرني أنت كل يوم.</p>
<p dir="rtl" class="p36">أُدرك أنَّ القوة الحقيقية… هي أن أرفع غيري، لا أن أقهرهم: أن أستخدم سُلطتي في البيت، أو في الدعوة، أو في التعليم، كوسيلة للترميم، لا للهدم.</p>
<p dir="rtl" class="p36">أحذر أن أكون "جبّارًا على الناس"… فأنزع اسمه عن نفسي:</p>
<p dir="rtl" class="p54">من جبَر غيره برفق… جبره الله بلُطف.</p>
<p dir="rtl" class="p54">ومن جَبَر نفسه على الطاعة… جبر الله قلبه على السَّكينة.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p24"><b>دعاء خاص بهذا المعنى العظيم:</b></p>
<p dir="rtl" class="p1">" ٱللَّهُمَّ يَا عَزِيزُ… اجْعَلْنِي عَزِيزًا بِكَ، وَسَبَبًا فِي عِزَّةِ غَيْرِي، ٱللَّهُمَّ لَا تُعِزَّنِي بِالظُّهُورِ، بَلْ بِٱلصِّدْقِ وَٱلْخُفُوتِ، وَاجْعَلْنِي عَيْنًا تَرَى كَسْرَ ٱلضُّعَفَاءِ، وَيَدًا تَجْبُرُهُم.</p>
<p dir="rtl" class="p1">يَا جَبَّارُ… عَلِّمْنِي كَيْفَ أَجْبُرُ قُلُوبَ عِبَادِكَ، كَمَا تَجْبُرُنِي أَنْتَ فِي خَلَوَاتِي، وَسُجُودِي، وَلَحْظَاتِ ضَعْفِي، وَلَا تَجْعَلْنِي جَبَّارًا عَلَيْهِم، بَلْ جَابِرًا لَهُمْ، رَحِيمًا بِهِم، خَدِيمًا فِي سَبِيلِكَ.</p>
<p dir="rtl" class="p19"><br></p>
<p dir="rtl" class="p1">يا الله... ما أعمق هذا الدعاء وما أرهفه من نَفَس! فهو لا يطلب عزّةً للذات… بل عزّةً تُعطي، لا تأخذ… تُرفَع لتُعين… وتختفي لتُضيء.<br>
دعونا نتأمّله بروح خاشعة، في رسالة تأملية عميقة ومَهيبة، تُوقظ القلب وتُهذّب النفس:</p>
<p dir="rtl" class="p1"><b>الرسالة التأملية العميقة لهذا الدعاء:</b></p>
<p dir="rtl" class="p1"> "ٱللَّهُمَّ يَا عَزِيزُ… اجْعَلْنِي عَزِيزًا بِكَ، وَسَبَبًا فِي عِزَّةِ غَيْرِي"... هذا ليس دعاء من يطلب العزّة لنفسه وحدها… بل من ذاق طعم العزّة بالله، فأحبّ أن يُهديها لغيره، كأنَّ العبد يقول: يا رب، إن أعطيتني عزّة، فلا تجعلها حائطًا أتعالى به، بل سلّمًا أرفع به سواي.</p>
<p dir="rtl" class="p1">هنا نضجٌ إيماني نادر: أن تَطلب عزّة… لا لتعلو بها، بل لتجعلها ماءً تروِي به العطشى من الشعور بالنقص، والذُّل، والانكسار.</p>
<p dir="rtl" class="p1"> "ٱللَّهُمَّ لَا تُعِزَّنِي بِالظُّهُورِ، بَلْ بِٱلصِّدْقِ وَٱلْخُفُوتِ "... آهٍ على من ذاق فتنة الظهور!، كثيرون يظنون أنَّ العِزّة أن يُشار إليهم بالبنان… لكن العبد هنا يعلم أن الظهور بلا صدق… ريح لا تبني، وإن زأرت.</p>
<p dir="rtl" class="p1">وأنَّ الخفوت مع الله، أرفع من صيتٍ في الأرض لا يساوي عند الله جناح بعوضة، هذه الجملة تُربّي العبد على الخفاء النبيل… لا الظهور المريب.</p>
<p dir="rtl" class="p1">"وَاجْعَلْنِي عَيْنًا تَرَى كَسْرَ ٱلضُّعَفَاءِ، وَيَدًا تَجْبُرُهُم"... العين التي ترى الألم… ليس كل الناس يملكونها، بعضهم لا يرى إلَّا مَن فوقهم… لكن أولياء الله يرون من تحتهم، ومن حوله… ومن سقط بين الناس ولم يره أحد.</p>
<p dir="rtl" class="p1">واليد التي تجبر… ليست دائمًا غنية، أحيانًا الجبر كلمة، أو نظرة، أو احتواء، أو سكوتٌ في وقته، وكلما كنت عبدًا للعزيز… صِرتَ جابرًا لعباده، لأنك أخذت عن الله سبحانه وتعالى خُلق العزة والرَّحمة.</p>
<p dir="rtl" class="p1">"يَا جَبَّارُ… عَلِّمْنِي كَيْفَ أَجْبُرُ قُلُوبَ عِبَادِكَ" يا الله… ما أروع هذا النداء، ليس دعاءً أن يجبره الله فحسب، بل أن يعلمه كيف يُجبر الآخرين كما جبره هو.</p>
<p dir="rtl" class="p1">إنها درجة عالية من الأدب: أن تقول لله: اجعلني صورة من رحمتك، ونسخة صغيرة من لطفك، وسفيرًا لاسمك الجبّار بين عبادك المكسورين.</p>
<p dir="rtl" class="p1"> "كَمَا تَجْبُرُنِي أَنْتَ فِي خَلَوَاتِي، وَسُجُودِي، وَلَحْظَاتِ ضَعْفِي"... هذا اعتراف مَهيب… أن كل جبرٍ عشته، لم يكن من الناس… بل من الله وحده.</p>
<p dir="rtl" class="p1"> جبرٌ لا يُعلَن، بل يُعاش في الخلوة، ويُسكب في السجدة، ويُطبع في لحظة لا يراها أحد، من عرف جبر الله في سره… أحب أن ينقله في علنه.</p>
<p dir="rtl" class="p1"> "وَلَا تَجْعَلْنِي جَبَّارًا عَلَيْهِم، بَلْ جَابِرًا لَهُمْ، رَحِيمًا بِهِم، خَدِيمًا فِي سَبِيلِكَ."... دعاء يحمل أعظم تربية في اسم "ٱلْجَبَّار": أن تتبرّأ من أن تكون جبارًا متكبرًا، قاسيًا، عنيفًا، مسيطرًا… وأن تسأل الله أن يجعلك جابرًا، رحيمًا، خادِمًا، ساجدًا في الناس، واقفًا لله.</p>
<p dir="rtl" class="p1">هنا تتجلّى روح العبودية الكاملة: أن تُعزَّ بالله… وتُذلَّ لخلقه، فتكون نافعًا، لطيفًا، ستّارًا، راحمًا.</p>
<p dir="rtl" class="p1"><b>الرسالة الكبرى:</b></p>
<p dir="rtl" class="p1">إذا أردت أن تعيش باسم "<span class="s8"><b>ٱلْعَزِيزُ</b></span>"… فلا تَطلب أن تعلو، بل أن تَرفع، وإذا أردت أن تعيش باسم "<span class="s8"><b>ٱلْجَبَّارُ</b></span>"… فلا تكسر أحدًا، بل اجبر قلبًا، ولو بكلمة.</p>
<p dir="rtl" class="p29"><b>" فـ الله تعالى يُعِزّ من يعزّ عباده، ويجبر من يجبر خواطرهم "</b></p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p24"><b>المقاصد العقدية العظيمة لاسم الله </b><span class="s8"><b>ٱلْعَزِيزُ</b><b></b></span></p>
<p dir="rtl" class="p36">إثبات كمال القدرة والقهر لله وحده: اسم "<span class="s8"><b>ٱلْعَزِيزُ</b></span>" يدل على أنَّ الله غالبٌ لا يُغلَب، وقويٌّ لا يُقهَر، وأن كلّ عزيزٍ في خلقه عزّته مستعارة، مؤقّتة، زائلة، وهذا يُحقّق توحيد الربوبية، ويُثبت سلطان الله المطلق.</p>
<p dir="rtl" class="p36">أنَّ العزّة الحقيقية لا تُطلب إلَّا من الله تعالى: فلا يجوز للمؤمن أن يظن أن العزّة عند الناس أو في المال أو الجاه، بل عليه أن يُسلّم أن الله هو مالك العزّة، يؤتيها من يشاء،<span class="s15"> ﴿قُلِ ٱللَّهُمَّ مَٰلِكَ ٱلۡمُلۡكِ تُؤۡتِي ٱلۡمُلۡكَ مَن تَشَآءُ وَتَنزِعُ ٱلۡمُلۡكَ مِمَّن تَشَآءُ وَتُعِزُّ مَن تَشَآءُ وَتُذِلُّ مَن تَشَآءُۖ بِيَدِكَ ٱلۡخَيۡرُۖ إِنَّكَ عَلَىٰ كُلِّ شَيۡءٖ قَدِيرٞ﴾</span><span class="s13"> </span><span class="s12">آل عمران: ٢٦</span>، وهذا يُحقّق توحيد الإلهية، في طلب العزّة من الله دون سواه.</p>
<p dir="rtl" class="p36">أن عزة الله مقرونة بالحكمة والرحمة: خلافًا لما قد يتوهّمه البعض، فاسم "<span class="s8"><b>ٱلْعَزِيزُ</b></span>" لا يعني فقط البطش، بل عِزّة الله دائمًا مقرونة بالحِكْمَة أو الغُفْران في أكثر من موضع:</p>
<p dir="rtl" class="p55">ٱلْعَزِيزُ ٱلْحَكِيمُ</p>
<p dir="rtl" class="p55">ٱلْعَزِيزُ ٱلْغَفُورُ</p>
<p dir="rtl" class="p1">دلالة أنَّ قهره في موضعه، وعفوه في وقته، وعزّته محاطة بعدله.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p24"><b>المقاصد العقدية العظيمة لاسم الله </b><span class="s8"><b>ٱلْجَبَّارُ</b><b></b></span></p>
<p dir="rtl" class="p36">إثبات علوّ الله المطلق في ذاته، وصفاته، وقهره: "<span class="s8"><b>ٱلْجَبَّارُ</b></span>" في أصل اللغة هو العلو بالقوة، والارتفاع عن أن يُناله شيء، فهو سبحانه عالٍ في ذاته فوق عرشه، وعلوّه لا يبلغه إدراك، وهذا أصل من أصول العقيدة: علو الله على خلقه، وقيوميته عليهم.</p>
<p dir="rtl" class="p36">أنَّ الله هو الوحيد الذي يجبر الكسور الظاهرة والخفية: من معاني "<span class="s8"><b>ٱلْجَبَّارُ</b></span>": الذي يُرمم ما انكسر في عباده، ويعيد توازن ما اختلّ في نفوسهم، فلا طبيب، ولا مال، ولا أحد يستطيع جبر قلبٍ مكسور إلَّا هو.</p>
<p dir="rtl" class="p37">وهذا يُحقّق توحيد الأسماء والصفات: أنَّ الله يتفرّد بصفة "الجبر" الكامل، الظاهر والباطن، النفسي والقدري.</p>
<p dir="rtl" class="p36">أنَّ الله يجبر بقدرته من شَاءَ، ويقهر من طغى: الجبّار هو الذي يقهر الطغاة، ولا يُدافَع أمره، ولا ينجو من عقابه جبّارٌ في الأرض إلَّا أن يتوب.</p>
<p dir="rtl" class="p37">فـ "الجبّار" يُعطيك الأمل إن انكسرت، ويمنعك من الظلم إن قويت، لأنك تعرف أن فوقك جبّارًا لا يغفل.</p>
<p dir="rtl" class="p36">الجمع بين الجلال واللطف في "الجبر": من جمال العقيدة أن اسم "<span class="s8"><b>ٱلْجَبَّارُ</b></span>" ليس فقط للقهر، بل أيضًا للرحمة! فهو الذي:</p>
<p dir="rtl" class="p36">يجبر العبد على الطاعة بفضله.</p>
<p dir="rtl" class="p36">ويجبر خاطره إذا أحسن.</p>
<p dir="rtl" class="p36">ويجبر قلبه إذا انكسر.</p>
<p dir="rtl" class="p1">وهذا يُولّد في القلب خوفًا مهيبًا من عظمة الله، وحنينًا دافئًا إلى قربه.</p>
<p dir="rtl" class="p24"><b>المقصد الجامع بين الاسمين:</b></p>
<table cellspacing="0" cellpadding="0" class="t1">
<tbody>
<tr>
<td valign="middle" class="td143">
  <p dir="rtl" class="p15"><b>المقصد العقدي</b></p>
</td>
<td valign="middle" class="td144">
  <p dir="rtl" class="p15"><b>اسم الله</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td145">
  <p dir="rtl" class="p16"><b>إثبات المنعة والسلطان لله، ووجوب طلب العزّة منه وحده، وتعظيم قوته المقترنة بالحكمة</b></p>
</td>
<td valign="middle" class="td146">
  <p dir="rtl" class="p17"><b>ٱلْعَزِيزُ</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td147">
  <p dir="rtl" class="p16"><b>إثبات الجبر والعلو لله، وأنه وحده يجبر القلوب ويقهر الجبابرة، ويَجب اللجوء إليه في الانكسار والافتقار</b></p>
</td>
<td valign="middle" class="td148">
  <p dir="rtl" class="p17"><b>ٱلْجَبَّارُ</b></p>
</td>
</tr>
</tbody>
</table>
<p dir="rtl" class="p24"><b>الأثر الإيماني:</b></p>
<p dir="rtl" class="p1">من آمن بـ عزّة الله… لم يطلب العزّة من مخلوق.</p>
<p dir="rtl" class="p1">ومن آمن بـ جبروت الله… لم يَخَف من فقد، ولم يَظلم أحدًا، ولم ييأس من الكسر.</p>
<p dir="rtl" class="p56">اسم الله <span class="s8"><b>ٱلْجَبَّارُ</b></span> ليس فقط اسمًا من أسماء الجلال… بل هو اسمٌ يحمل بين الجبروت والرحمة، بين الهيبة واللُّطف، بين القهر والتجبير.</p>
<p dir="rtl" class="p1">ومن لم يعرف كيف يتجلّى "<span class="s8"><b>ٱلْجَبَّارُ</b></span>" في قلب المؤمن… ظنَّه اسمًا مخيفًا فقط،<br>
بينما هو في حقيقته باب من أبواب اللجوء، وملجأ للمنكسرين، وسندٌ للضعفاء.</p>
<p dir="rtl" class="p1">فدعوني أقدّم لكم الآن التجلّيات الوجدانية العميقة لاسم الله "ٱلْجَبَّارُ" في قلب المؤمن:</p>
<p dir="rtl" class="p56"><br>
<span class="s2"><b>التجلّي الأول: </b></span><span class="s8"><b>ملجأ المنكسرين</b></span><span class="s2"><b>:</b></span> في اللحظة التي تنكسر فيها ولا يستطيع أحد أن يجبرك، يتجلّى اسم <span class="s8"><b>ٱلْجَبَّارُ</b></span>… ليس ليُرغمك، بل ليجبر كسرك.</p>
<p dir="rtl" class="p1">قال بعض السلف: ٱلْجَبَّارُ هو الذي إذا انكسر قلب عبدٍ بين يديه… جبره برحمته، فـ"<span class="s8"><b>ٱلْجَبَّارُ</b></span>" هو الذي يُحنيك بلُطفه، ثم يرفعك بقُدرته، لا ليُعذّبك… بل ليُصلحك.</p>
<p dir="rtl" class="p57"><br></p>
<p dir="rtl" class="p25"><span class="s2"><b>التجلّي الثاني:</b></span><b> </b><span class="s8"><b>قاهرُ الظالمين ومُنصفُ المظلومين</b></span><b>:</b> حين يُظلَم المؤمن، ويُخذل، ويتكالب عليه الناس… ويتقوّى الباطل، وتُكسر العدالة… فإن قلبه لا يضعف، لأنه يعلم أن فوق كل جبّار من الخلق… "ٱلْجَبَّارُ" الحقيقي.</p>
<p dir="rtl" class="p58"><span class="s1">قال تعالى:</span> ﴿إِنَّ بَطۡشَ رَبِّكَ لَشَدِيدٌ إِنَّهُۥ هُوَ يُبۡدِئُ وَيُعِيدُ وَهُوَ ٱلۡغَفُورُ ٱلۡوَدُودُ ذُو ٱلۡعَرۡشِ ٱلۡمَجِيدُ﴾<span class="s13"> </span><span class="s14">البروج: ١٢ - ١٥</span><span class="s1">، لاحظ الجمع بين الجبروت والمغفرة والودّ…</span></p>
<p dir="rtl" class="p57"><br></p>
<p dir="rtl" class="p25"><span class="s2"><b>التجلّي الثالث: </b></span><span class="s8"><b>يجبرك حين لا تُحسن التعبير عن كسرك</b></span><span class="s2"><b>:</b></span> في لحظة العجز،<br>
حين لا تعرف كيف تصوغ ألمك، ولا كيف تعبّر عن وجعك، يتجلّى "<span class="s8"><b>ٱلْجَبَّارُ</b></span>" دون أن تتكلم، فيُصلح داخلك… كما يُصلح العظام المكسورة دون ضوضاء.</p>
<p dir="rtl" class="p31">هو الجابر الذي يرى ما لا تُبديه، ويُرمم ما لم تُفصح عنه، ويُصلحك في صمت… ثم يُعيدك أقوى مما كنت.</p>
<p dir="rtl" class="p57"><br></p>
<p dir="rtl" class="p25"><span class="s2"><b>التجلّي الرابع: </b></span><span class="s8"><b>يُعيد ترتيب قلبك حين تبعثره المصائب</b></span><span class="s2"><b>:</b></span> الحياة تكسرنا… أحداث مفاجئة، فقدان، صدمة، خذلان… وإذا بالقلب قد تبعثر، ولم يعد كما كان… لكن الله تعالى… إن تجلّى عليك باسمه "<span class="s8"><b>ٱلْجَبَّارُ</b></span>"،<br>
أعاد ترتيب قلبك، لا كما كان… بل كما يجب أن يكون، لا يجبرك لتعود كما كنت، بل لتعود نسخة أعمق، أنقى، أقرب إليه.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p25"><span class="s2"><b>التجلّي الخامس: </b></span><span class="s8"><b>الجبر بعد التوبة</b></span><span class="s2"><b>:</b></span> إذا رجعت إلى الله من ذنبٍ عظيم… وخجلت من نفسك… جاءك اسم "<span class="s8"><b>ٱلْجَبَّارُ</b></span>" لا ليُذكّرك بخطيئتك،<br>
بل ليقول لك: "جبرْتُك، وسترتُك، وغفرتُ لك… فابدأ من جديد."</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p1"><b>الخلاصة الوجدانية:</b></p>
<p dir="rtl" class="p1">"<span class="s8"><b>ٱلْجَبَّارُ</b></span>" في قلب المؤمن… ليس فقط الجبّار القويّ على أعدائه، بل هو الجبّار الذي لا يُضيّع من التجأ إليه، ولا يُهمِل من انكسر له، ولا يردّ من تذلّل على بابه.</p>
<p dir="rtl" class="p1">هو من يُصلح ما أفسدته الحياة، ويجبر ما مزقته الذنوب، ويُحيي ما أطفأته الأيام.</p>
<p dir="rtl" class="p42"><br>
<br>
<br>
<br>
<br>
</p>
<p dir="rtl" class="p59">والسؤال الآن: هل " <span class="s8">ٱلْأَعَزُّ</span> " من الأسماء الحسنى؟</p>
<p dir="rtl" class="p1"><b>الجواب المختصر:</b></p>
<p dir="rtl" class="p1">"<span class="s8"><b>ٱلْأَعَزُّ</b></span>" ليس من أسماء الله الحسنى المشهورة أو الـمُعتمدة، ولكنه صفةٌ من صفات الله العظيمة الثابتة بالنصوص، ولا يُشتقّ منه كاسمٍ مفرد "<span class="s8"><b>ٱلْأَعَزُّ</b></span>" إلَّا في سياق وصفٍ لا تسمية.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p24"><b>الأدلة والتفصيل:</b></p>
<p dir="rtl" class="p36"><b>ورود "</b><span class="s8"><b>ٱلْأَعَزُّ</b></span><b>" في القرآن الكريم:</b></p>
<p dir="rtl" class="p1">ورد اللفظ في آيات عدة، ولكن ليس كاسمٍ مستقل لله، بل كصفةٍ في سياق الجملة، مقترنًا غالبًا بالعزة أو الوصف.</p>
<p dir="rtl" class="p1">مثال:</p>
<p dir="rtl" class="p34">﴿يَقُولُونَ لَئِن رَّجَعۡنَآ إِلَى ٱلۡمَدِينَةِ لَيُخۡرِجَنَّ ٱلۡأَعَزُّ مِنۡهَا ٱلۡأَذَلَّۚ وَلِلَّهِ ٱلۡعِزَّةُ وَلِرَسُولِهِۦ وَلِلۡمُؤۡمِنِينَ وَلَٰكِنَّ ٱلۡمُنَٰفِقِينَ لَا يَعۡلَمُونَ﴾<span class="s13"> </span><span class="s14">المنافقون: ٨</span><span class="s1">، وقال المنافقون: </span>﴿يَقُولُونَ لَئِن رَّجَعۡنَآ إِلَى ٱلۡمَدِينَةِ لَيُخۡرِجَنَّ ٱلۡأَعَزُّ مِنۡهَا ٱلۡأَذَلَّۚ وَلِلَّهِ ٱلۡعِزَّةُ وَلِرَسُولِهِۦ وَلِلۡمُؤۡمِنِينَ وَلَٰكِنَّ ٱلۡمُنَٰفِقِينَ لَا يَعۡلَمُونَ﴾ ﴿يَقُولُونَ لَئِن رَّجَعۡنَآ إِلَى ٱلۡمَدِينَةِ لَيُخۡرِجَنَّ ٱلۡأَعَزُّ مِنۡهَا ٱلۡأَذَلَّۚ وَلِلَّهِ ٱلۡعِزَّةُ وَلِرَسُولِهِۦ وَلِلۡمُؤۡمِنِينَ وَلَٰكِنَّ ٱلۡمُنَٰفِقِينَ لَا يَعۡلَمُونَ﴾<span class="s13"> </span><span class="s14">المنافقون: ٨ </span><span class="s1">(نفس الآية).</span></p>
<p dir="rtl" class="p1"><b>وجه الشاهد:</b></p>
<p dir="rtl" class="p1">"<span class="s8"><b>ٱلْأَعَزُّ</b></span>" هنا على لسان المنافقين، وقد قصدوا بها أنفسهم استكبارًا، لا الله تعالى، بل الله نسَب العزّة لنفسه على وجه الحقيقة، لا باسم "<span class="s8"><b>ٱلْأَعَزُّ</b></span>"، بل بـ"<span class="s8"><b>ٱلْعَزِيزُ</b></span>".</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p36"><b>الاسم الذي ورد فعلاً هو "</b><span class="s8"><b>ٱلْعَزِيزُ</b></span><b>"، لا "</b><span class="s8"><b>ٱلْأَعَزُّ</b></span><b>":</b></p>
<p dir="rtl" class="p1">و"ٱلْعَزِيزُ" من الأسماء الحسنى الثابتة القطعية، وقد تكرّر كثيرًا في القرآن الكريم:</p>
<p dir="rtl" class="p1"><span class="s15">﴿هُوَ ٱللَّهُ ٱلۡخَٰلِقُ ٱلۡبَارِئُ ٱلۡمُصَوِّرُۖ لَهُ ٱلۡأَسۡمَآءُ ٱلۡحُسۡنَىٰۚ يُسَبِّحُ لَهُۥ مَا فِي ٱلسَّمَٰوَٰتِ وَٱلۡأَرۡضِۖ وَهُوَ ٱلۡعَزِيزُ ٱلۡحَكِيمُ﴾</span><span class="s13"> </span><span class="s12">في سورة الحشر: ٢٤</span> وغيرها... أما "<span class="s8"><b>ٱلْأَعَزُّ</b></span>" فهو صيغة أفعل تفضيل، وهي وصفٌ لا تُستخدم اسميًّا إلا في سياق المقارنة،<br>
وليست من صيغ الأسماء الحسنى المعتمدة عند أهل العلم.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p1"><b>تنبيه لغوي – عقدي:</b></p>
<p dir="rtl" class="p1">الأسماء الحسنى تُؤخذ توقيفًا، لا بالاجتهاد... حتى وإن كانت الكلمة صحيحة لغويًا، لا يجوز جعلها اسمًا لله إلا بدليل نصي.</p>
<p dir="rtl" class="p1">"ٱلْأَعَزُّ" لم يرد في كتابٍ أو سنةٍ كاسمٍ مفرد لله.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p1"><b>الخلاصة:</b></p>
<table cellspacing="0" cellpadding="0" class="t1">
<tbody>
<tr>
<td valign="middle" class="td149">
  <p dir="rtl" class="p15"><b>الحكم</b></p>
</td>
<td valign="middle" class="td150">
  <p dir="rtl" class="p15"><b>المسألة</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td151">
  <p dir="rtl" class="p16"><b>❌ لا، ليس من الأسماء الحسنى الثابتة</b></p>
</td>
<td valign="middle" class="td152">
  <p dir="rtl" class="p17"><b>هل "ٱلْأَعَزُّ" من الأسماء الحسنى؟</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td153">
  <p dir="rtl" class="p16"><b>✅ نعم، بل هي صفة من صفاته العظيمة</b></p>
</td>
<td valign="middle" class="td154">
  <p dir="rtl" class="p17"><b>هل يجوز وصف الله بالعزّة؟</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td151">
  <p dir="rtl" class="p16"><span class="s23"><b>ٱلْعَزِيزُ</b></span><b> هو الاسم الثابت في القرآن</b></p>
</td>
<td valign="middle" class="td152">
  <p dir="rtl" class="p17"><b>الاسم المعتمد في العزّة؟</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td155">
  <p dir="rtl" class="p16"><b>✅ نعم، على سبيل الصفة، لا الاسم</b></p>
</td>
<td valign="middle" class="td154">
  <p dir="rtl" class="p17"><b>هل يجوز دعاء الله بـ"يا أعزّ من كل شيء"؟</b></p>
</td>
</tr>
</tbody>
</table>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p46"><span class="s2"><b>الفرق بين "</b></span><b>ٱلْعَزِيز</b><span class="s2"><b>" و"</b></span><b>ٱلْأَعَزّ</b><span class="s2"><b>"</b></span></p>
<table cellspacing="0" cellpadding="0" class="t1">
<tbody>
<tr>
<td valign="middle" class="td156">
  <p dir="rtl" class="p15"><b>ٱلْأَعَزُّ</b></p>
</td>
<td valign="middle" class="td157">
  <p dir="rtl" class="p15"><b>ٱلْعَزِيزُ</b></p>
</td>
<td valign="middle" class="td158">
  <p dir="rtl" class="p15"><b>وجه المقارنة</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td159">
  <p dir="rtl" class="p16"><b>ورد كصفة في كلام الناس (كالمنافقين)، لا لله</b></p>
</td>
<td valign="middle" class="td160">
  <p dir="rtl" class="p17"><b>ورد اسمًا لله تعالى في مواضع كثيرة جدًّا</b></p>
</td>
<td valign="middle" class="td161">
  <p dir="rtl" class="p17"><b> ✅ الورود في القرآن</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td162">
  <p dir="rtl" class="p16"><b>ليس من الأسماء الحسنى</b></p>
</td>
<td valign="middle" class="td163">
  <p dir="rtl" class="p17"><b>من الأسماء الحسنى الثابتة توقيفًا</b></p>
</td>
<td valign="middle" class="td164">
  <p dir="rtl" class="p17"><b>✅ الاعتماد كاسم حسنى</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td159">
  <p dir="rtl" class="p16"><b>صيغة أفعل تفضيل من نفس الجذر</b></p>
</td>
<td valign="middle" class="td160">
  <p dir="rtl" class="p17"><b>من الجذر (ع ز ز) بمعنى القوّة والمنعة والشرف</b></p>
</td>
<td valign="middle" class="td161">
  <p dir="rtl" class="p17"><b> ✅ الاشتقاق اللغوي</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td162">
  <p dir="rtl" class="p16"><b>لا يُدعى به، لأنه لم يرد كاسم لله</b></p>
</td>
<td valign="middle" class="td163">
  <p dir="rtl" class="p17"><b>يُدعى به: "يا عزيز، يا من لا يُغلب"</b></p>
</td>
<td valign="middle" class="td164">
  <p dir="rtl" class="p17"><b> ✅ الاستعمال في الدعاء</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td159">
  <p dir="rtl" class="p16"><b>"أعزّ" من غيره: مقارنة تفضيل لا تليق بالله</b></p>
</td>
<td valign="middle" class="td160">
  <p dir="rtl" class="p17"><b>الذي له عزّة القهر والمنعة والامتناع</b></p>
</td>
<td valign="middle" class="td161">
  <p dir="rtl" class="p17"><b> ✅ المعنى الأساسي</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td162">
  <p dir="rtl" class="p16"><b>وصف نسبي قد يُفهم منه المقارنة، والله منزه عنها</b></p>
</td>
<td valign="middle" class="td163">
  <p dir="rtl" class="p17"><b>اسم كمال مطلق وثابت لله</b></p>
</td>
<td valign="middle" class="td164">
  <p dir="rtl" class="p17"><b>✅ الخصوص العقدي</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td165">
  <p dir="rtl" class="p16"><b>نعم يُستخدم: فلان أعزّ من فلان، أو الأعزّ بين الناس</b></p>
</td>
<td valign="middle" class="td160">
  <p dir="rtl" class="p17"><b>لا يجوز، إلا بقرينة: عبد العزيز – عزيز القوم</b></p>
</td>
<td valign="middle" class="td161">
  <p dir="rtl" class="p17"><b>✅ هل يُستخدم في حق المخلوق؟</b></p>
</td>
</tr>
</tbody>
</table>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p24"><b>الشرح العقدي واللغوي الدقيق:</b></p>
<p dir="rtl" class="p1">"<span class="s8"><b>ٱلْعَزِيزُ</b></span>:" من الأسماء الحسنى التوقيفية، ومعناه الكامل: الذي لا يُغلب، ولا يُقهَر، ولا يُدرك جنابه، وهو قويٌّ منيعٌ لا يطال مقامه أحد، ورد في القرآن الكريم مقرونًا مع أسماء الجلال والحكمة والرحمة كما مرَّ معنا.</p>
<p dir="rtl" class="p1">"<span class="s8"><b>ٱلْأَعَزُّ</b></span>": ليس من أسماء الله الحسنى، لأنه: لم يرد في القرآن أو السُّنة كاسم لله، هو صيغة تفضيل (أفعل(، تدل عادةً على المقارنة: "فلان أعزّ من فلان"، وهذا لا يُناسب مقام الله تعالى، لأنَّ الله تعالى لا يُقارن به أحد، ولا يُفضّل عليه شيء.</p>
<p dir="rtl" class="p1">مثال على استعمال خاطئ: قول البعض:</p>
<p dir="rtl" class="p1">"<span class="s17"><b> يا أعزّ من في الوجود </b></span>" هذا لا يليق بالله، لأنَّ الله تعالى ليس من ضمن الموجودات ليُفضَّل عليهم، بل هو خالقهم.</p>
<p dir="rtl" class="p1"><b>الخلاصة الجامعة:</b></p>
<table cellspacing="0" cellpadding="0" class="t1">
<tbody>
<tr>
<td valign="middle" class="td166">
  <p dir="rtl" class="p15"><b>الحكم</b></p>
</td>
<td valign="middle" class="td166">
  <p dir="rtl" class="p15"><b>الأمر</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td167">
  <p dir="rtl" class="p16"><b> ✅ نعم، اسم حسنى ثابت</b></p>
</td>
<td valign="middle" class="td168">
  <p dir="rtl" class="p17"><b>هل "ٱلْعَزِيزُ" اسم من أسماء الله؟</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td169">
  <p dir="rtl" class="p16"><b> ❌ لا، لم يرد اسميًّا، بل ورد وصفًا مرفوضًا في لسان المنافقين</b></p>
</td>
<td valign="middle" class="td170">
  <p dir="rtl" class="p17"><b>هل "ٱلْأَعَزُّ" اسم لله؟</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td167">
  <p dir="rtl" class="p16"><b> ❌ لا، لأنه يُوهم المقارنة والله منزه عنها</b></p>
</td>
<td valign="middle" class="td168">
  <p dir="rtl" class="p17"><b>هل يجوز دعاء الله بـ"يا أعزّ من كذا"؟</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td171">
  <p dir="rtl" class="p16"><b>أن تقول: يا عزيز، يا من لا يُغلب، يا من عزّ من اعتزّ بك.</b></p>
</td>
<td valign="middle" class="td170">
  <p dir="rtl" class="p17"><b>الأفضل في التعبير</b></p>
</td>
</tr>
</tbody>
</table>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p19"><br></p>
<p dir="rtl" class="p19"><br></p>
<p dir="rtl" class="p19"><br></p>
<p dir="rtl" class="p19"><br></p>
<p dir="rtl" class="p19"><br></p>
<p dir="rtl" class="p19"><br></p>
<p dir="rtl" class="p44">( ٱلْمُتَكَبِّرُ )</p>
<p dir="rtl" class="p45"><b>ٱلْمُتَكَبِّرُ</b><span class="s36"><b> </b></span><span class="s11"><b>…</b></span></p>
<p dir="rtl" class="p1">هو الذي يعلو على كل شيء، الذي لا يُحسن أحدٌ مقارنةً به، هو الذي لا ينازعه أحد في عظمته أو جلاله، وهو الذي يملك الكون بأسره ويُسيّر كل شيء كما يريد. </p>
<p dir="rtl" class="p1"><span class="s37"><b>ٱلْمُتَكَبِّرُ</b></span><span class="s38"><b> </b></span><span class="s8"><b>…</b></span>هو الذي يُعظِّم نفسه بعظمة مطلقة، حيث لا يُقارن بأحد، ولا يشبهه شيء في السماوات ولا في الأرض، هو الذي يسيّر الملكوت بحكمته، ويتصرف في مخلوقاته بقدرة لا يحدها شيء.</p>
<p dir="rtl" class="p1"><span class="s37"><b>ٱلْمُتَكَبِّرُ</b></span><span class="s38"><b> </b></span><span class="s8"><b>…</b></span>هو الذي لا يتكبر على خلقه من باب الظلم أو الطغيان، بل يتكبر بجلاله وعظمته، وهو كامل في ذاته، وكل شيء في الكون عظيم وجميل لأنه صادر من المتكبر، عندما تشعر أن كل شيء حولك صغير مقارنة بعظمتك، تذكر أن الله هو المتكبر، وأنه الذي يتعالى في قدرته، ويرتقي في حكمته، ولا شيء في هذا الكون يُزاحمه.</p>
<p dir="rtl" class="p1"><span class="s37"><b>ٱلْمُتَكَبِّرُ</b></span><span class="s38"><b> </b></span><span class="s8"><b>…</b></span>هو الذي يملك القدرة على أن يفرض هيبته على كل شيء، وأن يُظهر عظمته في كل قرار، هو الذي يجعل الخلق في موضعه الصحيح، ويُظهر عظمةً في كل شيء دون أن يتنازل عن حكمه، فهو الذي يُرفع شأنه ويُعظمه الناس لأنه الأعلى والأكبر في عظمته.</p>
<p dir="rtl" class="p1"><span class="s37"><b>ٱلْمُتَكَبِّرُ</b></span><span class="s38"><b> </b></span><span class="s8"><b>…</b></span>هو الذي يمتلك القوة الكاملة على كل شيء، وتستطيع أن تشعر بجلاله في كل ما حولك، بينما أنت في أضعف حالاتك.</p>
<p dir="rtl" class="p1"><span class="s37"><b>ٱلْمُتَكَبِّرُ</b></span><span class="s38"><b> </b></span><span class="s8"><b>…</b></span>إذا شعرت أنك في موقف ضيق أو ضعيف، تذكر أن الله هو المتكبر، الذي يتعالى في جلاله ويملك كل شيء في يده، لا تقلق من أحوال الدنيا، لأنَّ الله هو المتكبر الذي يعظم كل شيء ويُظهر حُكمه في الكون، ويجعل الأمور تتساقط كما يشاء بحكمته وعظمته.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p24"><b>عناوين تأملية لاسم الله </b><span class="s8"><b>ٱلْمُتَكَبِّرُ</b></span><b> مع دلالتها:</b></p>
<p dir="rtl" class="p36">المتكبّر… الذي لا يعلو عليه شيء ← <b>دلالة</b>: كبرياؤه حق، لأنه العليّ فوق كل مخلوق، لا يُدركه وهم ولا يبلغه عقل.</p>
<p dir="rtl" class="p36">المتكبّر… الذي لا يليق التكبر إلَّا له ← <b>دلالة</b>: الكبرياء صفة نقص في البشر، لكنها كمالٌ وجلال في حق الله وحده.</p>
<p dir="rtl" class="p36">المتكبّر… فلا يطغى عليك شيء ما دمتَ خاضعًا له ←<b> دلالة</b>: من تواضع للمُتَكَبِّر رفعه، ومن تكبّر على الناس أذلّه الله.</p>
<p dir="rtl" class="p36">المتكبّر… فلا يُدرَك، ولا يُنازَع، ولا يُغلب ←<b> دلالة</b>: له الكبرياء في السماء والأرض، وأي محاولة لمنازعته فيه مهلكة.</p>
<p dir="rtl" class="p36">المتكبّر… حين تتواضع لله، يلبسك من كبريائه سترًا لا يُرى ← <b>دلالة</b>: تواضعك لله يجعلك مُهابًا بعزّة منسوبة إليه لا إليك.</p>
<p dir="rtl" class="p36">المتكبّر… لا يُسأل عن فعله، وكل أحدٍ سواه يُسأل ←<b> دلالة</b>: استقلاله التام، وتمام تصرّفه في خلقه بلا معقّب عليه.</p>
<p dir="rtl" class="p36">المتكبّر… الذي يتعالى عن الظلم والنقص والجهل ←<b> دلالة</b>: كبرياؤه يعني تنزّهه عن كل ما لا يليق به سبحانه.</p>
<p dir="rtl" class="p36">المتكبّر… فتذكّر من أنت حين تتجرّأ على معصيته ← <b>دلالة</b>: اسم يزرع الهيبة والخشية، ويوقظ القلب الغافل عن مكانه الحقيقي أمام الله.</p>
<p dir="rtl" class="p36">المتكبّر… لا تُنازعه عظمته، بل كَبّره في قلبك كلما كبُر همّك ← <b>دلالة</b>: أكبر من مصيبتك، وأعلى من كل قلقك… فقط كبّره كما يليق به.</p>
<p dir="rtl" class="p19"><br></p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p24"><b>التمهيد الوجداني لاسم الله </b><span class="s8"><b>ٱلْمُتَكَبِّرُ</b></span><b>:</b></p>
<p dir="rtl" class="p1">حين تتأمّل في هذا الكون الواسع… وتصعد بنظرك في طبقات السماوات، وتنزل ببصيرتك إلى طبقات النفس… ثم تُدرك أن كل ما ترى… صغير.</p>
<p dir="rtl" class="p1">كل ما تتعلّق به… عاجز، وأنك – أنت – لا تملك حتى نبض قلبك، ولا رمشة عينك…</p>
<p dir="rtl" class="p1">عندها فقط، تبدأ رحلة الفهم لاسمٍ لا يليق بأحدٍ سواه… اسمٍ إن نطقته، انكمش كيانك خجلًا: "<span class="s8"><b>ٱلْمُتَكَبِّرُ</b></span>".</p>
<p dir="rtl" class="p1"><span class="s8"><b>ٱلْمُتَكَبِّرُ</b></span>… ليس كِبْرًا كما يظن الناس، بل تكبُّرٌ عن كل نقص، كل عيب، كل حدود، كل خلل، كل شبيه.</p>
<p dir="rtl" class="p1"> تكبّرٌ عن أن يُدركه عقل، أو يُحدّه زمان، أو يُشبهه مخلوق، هو المتكبّر عن الظلم، لأنَّ عدله مطلق… والمتكبّر عن الخطأ، لأن علمه كامل… والمتكبّر عن الفقر، لأن غناه ذاتي… والمتكبّر عن النقص، لأنَّ كماله أزليٌّ أبديّ.</p>
<p dir="rtl" class="p1">في هذا الاسم العظيم، تهتزّ أوهامنا: الذي يتكبّر من البشر… إنما ينتفخ بما ليس فيه. </p>
<p dir="rtl" class="p1">أما الله المتكبّر… فهو يتعالى بما لا يُدرَك جلاله، ولا يُبلَغ كماله، فمن عرف "<span class="s8"><b>ٱلْمُتَكَبِّرُ</b></span>" حقًا… تذلّل قلبه بين يديه، وترك التفاخر، والكِبْر، والعلو الباطل على الناس.</p>
<p dir="rtl" class="p1">"<span class="s8"><b>ٱلْمُتَكَبِّرُ</b></span>"… اسمٌ يُعيدك إلى حجمك الحقيقي، لا لتُحقّر نفسك، بل لتعرف مقامك، وتضع قلبك في موضعه اللائق: عبدٌ صغير… بين يدي ملكٍ عظيم.</p>
<p dir="rtl" class="p19"><br></p>
<p dir="rtl" class="p60"><b>حين يتجلّى اسم الله "</b><span class="s8"><b>المتكبّر</b></span><b> " في قلبك</b><span class="s9"><b>…</b></span></p>
<p dir="rtl" class="p61">حين يتجلّى في قلبك اسم "<span class="s8"><b> المتكبّر</b></span><span class="s2"><b> </b></span>"…تسقط عنك كل أوهام العظمة،<br>
وتنكمش في داخلك كل ظنون الكمال، وتدرك فجأة… أنك صغير، صغير جدًا، وأن كل تكبّر فيك… هو جهل، وكل تعالٍ… هو غفلة، وكل لحظة ظننت فيها أنك أعلى من غيرك… كانت بُعدًا عن هذا الاسم العظيم.</p>
<p dir="rtl" class="p61">"<span class="s8"><b> المتكبّر</b></span><span class="s2"><b> </b></span>" ليس من يرفض القرب… بل من يترفّع عن كل نقص وعيب، ويعلو بذاته عن الخلق، عن الحاجة، عن الزمن، عن الموت، عن الظُّلم، عن الفناء.</p>
<p dir="rtl" class="p61">حين يتجلّى في قلبك هذا الاسم… تفهم أنه لا يحق لأحدٍ أن يتكبّر، لأن الكِبْرَ لا يليق إلا بواحدٍ فقط: الله جلّ جلاله، هو وحده الذي له العظمة في ذاته، والكمال في صفاته، والعلو في ملكه.</p>
<p dir="rtl" class="p61">حينها… لا تعود تتفاخر بما عندك، بل تخجل أن تنسب لنفسك شيئًا<br>
في حضرة من يُمهل المتكبّر… ثم يكسره، ويرفع المتواضع… ثم يُعزّه.</p>
<p dir="rtl" class="p61">"<span class="s8"><b> المتكبّر</b></span><span class="s2"><b> </b></span>"…هو الذي لا يُنازع في عظمته، ولا يرضى لعبده أن يتكبّر على عبدٍ مثله… لأن من تكبّر في الأرض… ابتعد عن نور الله تعالى.</p>
<p dir="rtl" class="p61">يا رب، لا تجعل في قلبي ذرة كِبر، ولا في لساني كلمة تعالٍ، ولا في عيني نظرة استعلاء، فأنت <span class="s8"><b>المتكبّر</b></span>… وأنا عبدٌ أطلب التواضع بين يديك.</p>
<p dir="rtl" class="p62"><br></p>
<p dir="rtl" class="p14"><b>المعنى التدبري العميق لاسم الله "</b><span class="s8"><b> ٱلْمُتَكَبِّر</b></span><b>":</b></p>
<p dir="rtl" class="p1"><span class="s8"><b>ٱلْمُتَكَبِّرُ</b></span>… الذي لا يليق العلوّ إلَّا له، ولا تتمّ عبوديتك حتى تُسقط كل ما عداه... ليس "<span class="s8"><b>ٱلْمُتَكَبِّرُ</b></span>" هو العظيم فحسب، بل هو الذي يرتفع فوق كل وصفٍ لا يليق به، ويتنزّه عن كل ما لا ينبغي لجلاله، هو الذي يتكبّر عن الظلم، ويتكبّر عن النقص، ويتكبّر عن الحاجة، ويتكبّر عن الشريك، ويتكبّر عن أن تُقارَب ذاته أو تُدرَك صفاته.</p>
<p dir="rtl" class="p1">تدبّر هذا الاسم لا يُورثك خوفًا فقط… بل تطهيرًا.</p>
<p dir="rtl" class="p1">تدبّر اسم الله "<span class="s8"><b>ٱلْمُتَكَبِّرُ</b></span>" يعني: أن تُسقِط من قلبك كل شعور بالتعاظم على خلقه، وكل توهّم أنك تستطيع أن تسيطر أو تملك أو تتفوّق… لأن الكبرياء ليست زينة… بل أخصّ خصائص الألوهية.</p>
<p dir="rtl" class="p1">"<span class="s8"><b>ٱلْمُتَكَبِّرُ</b></span>" هو الاسم الذي يُسقط كل الأصنام الخفية…</p>
<p dir="rtl" class="p47">صنم النفس الذي يحب التفرّد..</p>
<p dir="rtl" class="p47">صنم الشهرة الذي يحب العلوّ..</p>
<p dir="rtl" class="p47">صنم المال، العلم، السلطة…</p>
<p dir="rtl" class="p1">فكل ما تتعالى به عن غيرك… فأنت به تسرق شيئًا من الكبرياء الذي لا يليق إلَّا بواحد… هو الله تعالى.</p>
<p dir="rtl" class="p1">وإذا تخلّق القلب بهذا الاسم:</p>
<p dir="rtl" class="p47">صار متواضعًا لله، لا يُزاحمه في كبريائه ولا ينافسه في تدبيره.</p>
<p dir="rtl" class="p47">وصار منكسرًا مع الخلق، يعلم أنَّ العُلوّ في الدنيا فتنة… وأنَّ الرِّفعة عند الله هي في التواضع.</p>
<p dir="rtl" class="p1"><b>خلاصة التدبّر:</b></p>
<p dir="rtl" class="p1">اسم <span class="s8"><b>ٱلْمُتَكَبِّرُ</b></span> ليس دعوةً إلى الهيبة فقط، بل إلى تنقية العبودية، هو الاسم الذي لا يتركك ملوّثًا بأي عجب أو كِبر أو تعالٍ، هو الجدار الإلهي الذي يمنعك أن تخرق قدسية "لا إله إلا الله".</p>
<p dir="rtl" class="p1">فإذا ناديتَ في صلاتك:"سبحان ربي الأعلى" فاعلم أنَّ علوّ الله لا يشبه شيء، وأن تحت عرشه لا يليق لأحدٍ أن يتكبّر.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p1"><br>
<br>
</p>
<p dir="rtl" class="p24"><b>المعنى اللغوي والشرعي لاسم الله </b><span class="s8"><b>ٱلْمُتَكَبِّرُ</b></span><b>:</b></p>
<p dir="rtl" class="p25"><b>المعنى اللغوي لاسم </b><span class="s8"><b>ٱلْمُتَكَبِّرُ</b></span><b>:</b></p>
<p dir="rtl" class="p1">الجذر اللغوي: اسم <span class="s8"><b>ٱلْمُتَكَبِّرُ</b></span> مأخوذ من مادة (ك ـ ب ـ ر)، والتي تدل على:</p>
<p dir="rtl" class="p47">العظمة والعلو</p>
<p dir="rtl" class="p47">الامتناع والرفعة</p>
<p dir="rtl" class="p47">السمو عن النقائص</p>
<p dir="rtl" class="p1">يقال: كبر الشيء: عَظُم.</p>
<p dir="rtl" class="p1">وتكبَّر: أظهر الكِبَر لنفسه، أو تعالى عمّن دونه.</p>
<p dir="rtl" class="p1">والكِبْر في البشر: مذموم، لأنه ادّعاء ما لا يملكون.</p>
<p dir="rtl" class="p1">لكن حين يكون الوصف لله، فإنه:</p>
<p dir="rtl" class="p63">حقٌّ خالص.</p>
<p dir="rtl" class="p63">كمالٌ لا نقص فيه.</p>
<p dir="rtl" class="p63">تعالٍ عن النقص، لا عن الخلق.</p>
<p dir="rtl" class="p25"><b>المعنى الشرعي لاسم </b><span class="s8"><b>ٱلْمُتَكَبِّرُ</b><b></b></span></p>
<p dir="rtl" class="p1"><span class="s8"><b>ٱلْمُتَكَبِّرُ</b></span> هو: الذي تفرّد بكمال العظمة والكبرياء، وتنزَّه عن صفات المخلوقين، وتعالى عن أن يشاركه أحدٌ في ربوبيته، أو أسمائه، أو أفعاله، فهو:</p>
<p dir="rtl" class="p28">الكبير في ذاته: لا يُدرَك كنهه.</p>
<p dir="rtl" class="p28">العظيم في صفاته: لا يعتريها خلل.</p>
<p dir="rtl" class="p28">الرفيع في أفعاله: لا يُسأل عما يفعل.</p>
<p dir="rtl" class="p28">المنزَّه عن كل نقص وعيب.</p>
<p dir="rtl" class="p1">قال الإمام الطبري: <span class="s8"><b>المتكبّر</b></span>: الذي لا يليق العُظم إلَّا له، ولا ينبغي الكبرياء إلَّا لعظمته، وقال الخطابي: هو الذي يرى كل شيء دونه، ولا يرى فوقه أحدًا.</p>
<p dir="rtl" class="p46"><span class="s2"><b>الفرق بين "</b></span><b>ٱلْكَبِير</b><span class="s2"><b>" و"</b></span><b>ٱلْمُتَكَبِّرُ</b><span class="s2"><b>":</b></span></p>
<table cellspacing="0" cellpadding="0" class="t1">
<tbody>
<tr>
<td valign="middle" class="td172">
  <p dir="rtl" class="p15"><b>المعنى</b></p>
</td>
<td valign="middle" class="td173">
  <p dir="rtl" class="p15"><b>الاسم</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td174">
  <p dir="rtl" class="p16"><b>يدل على ذات الله العظيمة في قدرها، وكمالها الذي لا يُحدّ.</b></p>
</td>
<td valign="middle" class="td175">
  <p dir="rtl" class="p17"><b>ٱلْكَبِير</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td176">
  <p dir="rtl" class="p16"><b>يدل على تصرف الله الكامل بتعاليه عن كل نقص، وتنزّهه عن مشابهة الخلق، وعدم قبول أن يُنازعه أحد في كماله.</b></p>
</td>
<td valign="middle" class="td177">
  <p dir="rtl" class="p17"><b>ٱلْمُتَكَبِّرُ</b></p>
</td>
</tr>
</tbody>
</table>
<p dir="rtl" class="p1"><b>ملاحظة هامة:</b></p>
<p dir="rtl" class="p1"><span class="s39">الكِبْر في حق المخلوق</span>: مذموم ومحرّم، لأنه يدل على تجبر وتعدٍ وتطاول.</p>
<p dir="rtl" class="p1"><span class="s39">أما في حق الله</span>: فهو كمالٌ وجلالٌ وجبروتٌ محمود، لأنه لا أحد أعظم منه، ولا أحد يستحق الكبرياء سواه.</p>
<p dir="rtl" class="p1">سُبحان مَن لا يُشبِهُهُ شيء، وله الأسماء الحسنى كلّها متناسقة في الجلال والجمال... وإليكم الآن مقارنة دقيقة بين اسم الله "<span class="s8"><b>ٱلْمُتَكَبِّرُ</b></span>" وبعض الأسماء الحسنى القريبة منه في المعنى أو المقام، لنُبيِّن الفروق اللطيفة بين هذه الأسماء، ونُظهر تميّز كل اسم في دلالته، مع أنّها جميعًا تدور في فلك العظمة والعلو والجلال.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p1"><b>المقارنة بين </b><span class="s8"><b>ٱلْمُتَكَبِّرُ</b></span><b> وبعض الأسماء القريبة منه:</b></p>
<table cellspacing="0" cellpadding="0" class="t1">
<tbody>
<tr>
<td valign="middle" class="td178">
  <p dir="rtl" class="p15"><b>الفرق الدقيق</b></p>
</td>
<td valign="middle" class="td179">
  <p dir="rtl" class="p15"><b>أوجه التشابه مع "ٱلْمُتَكَبِّرُ"</b></p>
</td>
<td valign="middle" class="td180">
  <p dir="rtl" class="p15"><b>المعنى المركزي</b></p>
</td>
<td valign="middle" class="td181">
  <p dir="rtl" class="p15"><b>اسم الله</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td182">
  <p dir="rtl" class="p16"><b>"ٱلْمُتَكَبِّرُ" يتضمّن التنزّه عن المماثلة والمنازعة ورفض المشاركة، أما "ٱلْكَبِير" فيركّز على سعة الشأن وعلو المرتبة.</b></p>
</td>
<td valign="middle" class="td183">
  <p dir="rtl" class="p17"><b>كلاهما يدل على العظمة والعلو والجلال</b></p>
</td>
<td valign="middle" class="td184">
  <p dir="rtl" class="p17"><b>العظمة الذاتية المطلقة</b></p>
</td>
<td valign="middle" class="td185">
  <p dir="rtl" class="p17"><b>ٱلْكَبِير</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td186">
  <p dir="rtl" class="p16"><b>"ٱلْمُتَكَبِّرُ" يُشير إلى علو الذات وتنزّهها، بينما "ٱلْجَبَّار" يُركّز على علو الفعل وتأثيره في الخلق قهرًا ورحمة.</b></p>
</td>
<td valign="middle" class="td187">
  <p dir="rtl" class="p17"><b>كلاهما يدل على علو الشأن وقهر الظالمين</b></p>
</td>
<td valign="middle" class="td188">
  <p dir="rtl" class="p17"><b>العلو بالقهر والجبر والإصلاح</b></p>
</td>
<td valign="middle" class="td189">
  <p dir="rtl" class="p17"><b>ٱلْجَبَّار</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td182">
  <p dir="rtl" class="p16"><b>"ٱلْمُتَكَبِّرُ" يُنزه الله عن الشبيه والند، بينما "ٱلْعَزِيز" يُظهر امتناعه عن أن يُغلب أو يُقهَر.</b></p>
</td>
<td valign="middle" class="td183">
  <p dir="rtl" class="p17"><b>كلاهما فيه علو وقوّة وسلطان</b></p>
</td>
<td valign="middle" class="td184">
  <p dir="rtl" class="p17"><b>القوّة والمنعة التي لا تُغلب</b></p>
</td>
<td valign="middle" class="td185">
  <p dir="rtl" class="p17"><b>ٱلْعَزِيز</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td186">
  <p dir="rtl" class="p16"><b>"ٱلْمُتَكَبِّرُ" يدل على التنزّه عن مشابهة الملوك والبشر، بينما "ٱلْمَلِك" يُظهر التحكم والتدبير والملكوت.</b></p>
</td>
<td valign="middle" class="td187">
  <p dir="rtl" class="p17"><b>كلاهما يشير إلى السيادة المطلقة</b></p>
</td>
<td valign="middle" class="td188">
  <p dir="rtl" class="p17"><b>السيطرة المطلقة والتصرف الكامل</b></p>
</td>
<td valign="middle" class="td189">
  <p dir="rtl" class="p17"><b>ٱلْمَلِك</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td190">
  <p dir="rtl" class="p16"><b>"ٱلْمُتَكَبِّرُ" يتضمّن تنزّه الله عن منازعة الخلق له في الكبرياء والعظمة، و"ٱلْقُدُّوس" يتضمّن طهارته عن النقائص والعيوب في ذاته وصفاته وأفعاله.</b></p>
</td>
<td valign="middle" class="td183">
  <p dir="rtl" class="p17"><b>كلاهما من أسماء التنزيه والتعظيم</b></p>
</td>
<td valign="middle" class="td184">
  <p dir="rtl" class="p17"><b>التنزّه عن كل نقص وعيب</b></p>
</td>
<td valign="middle" class="td185">
  <p dir="rtl" class="p17"><b>ٱلْقُدُّوس</b></p>
</td>
</tr>
</tbody>
</table>
<p dir="rtl" class="p1"><b>خلاصة المقارنة:</b></p>
<table cellspacing="0" cellpadding="0" class="t1">
<tbody>
<tr>
<td valign="middle" class="td191">
  <p dir="rtl" class="p15"><b>ٱلْمُتَكَبِّرُ</b></p>
</td>
<td valign="middle" class="td192">
  <p dir="rtl" class="p15"><b>وجه المقارنة</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td193">
  <p dir="rtl" class="p16"><b>تنزّه الله عن أن يُنازعه أحدٌ في صفاته، أو يُشبهه أحدٌ في كماله</b></p>
</td>
<td valign="middle" class="td194">
  <p dir="rtl" class="p17"><b>يختص بـ</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td195">
  <p dir="rtl" class="p16"><b>عظمةُ استحقاقٍ مطلقٍ للكبرياء والرفعة والتفرّد</b></p>
</td>
<td valign="middle" class="td196">
  <p dir="rtl" class="p17"><b>نوع العظمة</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td193">
  <p dir="rtl" class="p16"><b>تعظيمٌ، وخشيةٌ، وتواضعٌ، وكسرٌ للغرور الإنساني</b></p>
</td>
<td valign="middle" class="td194">
  <p dir="rtl" class="p17"><b>أثره في القلب</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td197">
  <p dir="rtl" class="p16"><b>أن لا يتكبّر العبد، لأنَّ الكبرياء ثوبٌ لا يليق إلَّا بالله</b></p>
</td>
<td valign="middle" class="td196">
  <p dir="rtl" class="p17"><b>النهي المستنبط منه</b></p>
</td>
</tr>
</tbody>
</table>
<p dir="rtl" class="p1">حديث قدسي عظيم يوضّح هذا المعنى: قال الله تعالى: " الكبرياء ردائي، والعظمة إزاري، فمن نازعني واحدًا منهما، قذفته في النار " رواه مسلم.</p>
<p dir="rtl" class="p19"><br></p>
<p dir="rtl" class="p24"><b>ورود اسم الله "</b><span class="s8"><b>ٱلْمُتَكَبِّرُ</b></span><b>" في القرآن الكريم والسُّنة النبوية </b></p>
<p dir="rtl" class="p25"><b>أولًا: في القرآن الكريم:</b></p>
<p dir="rtl" class="p50"><span class="s9">ورد اسم ٱلْمُتَكَبِّرُ مرة واحدة صريحًا، في سياق أسماء الجلال، وذلك في:</span><span class="s18"> ﴿هُوَ ٱللَّهُ ٱلَّذِي لَآ إِلَٰهَ إِلَّا هُوَ ٱلۡمَلِكُ ٱلۡقُدُّوسُ ٱلسَّلَٰمُ ٱلۡمُؤۡمِنُ ٱلۡمُهَيۡمِنُ ٱلۡعَزِيزُ ٱلۡجَبَّارُ ٱلۡمُتَكَبِّرُۚ سُبۡحَٰنَ ٱللَّهِ عَمَّا يُشۡرِكُونَ﴾</span><span class="s13"> </span><span class="s12">الحشر: ٢٣ </span></p>
<p dir="rtl" class="p1"><b>السياق والدلالة:</b></p>
<p dir="rtl" class="p1">جاءت هذه الآية في سياق بيان الأسماء الجلالية التي تنزّه الله فيها عن الشركاء والندِّ والنقائص.</p>
<p dir="rtl" class="p1">واقتران "<span class="s8"><b>ٱلْمُتَكَبِّرُ</b></span>" بـ "<span class="s8"><b>ٱلْجَبَّار</b></span>، <span class="s8"><b>ٱلْعَزِيز</b></span>، <span class="s8"><b>ٱلْمَلِك</b></span> " يدل على عظمة الذات الإلهية وتنزّهها عن كل تشابهٍ مع الخلق.</p>
<p dir="rtl" class="p25"><b>ثانيًا: في السُّنة النبوية الشريفة:</b></p>
<p dir="rtl" class="p1">ورد المعنى تصريحًا بنص الاسم، وإن لم يُذكر ضمن الأسماء المعدودة دومًا، في الحديث القدسي الصحيح:</p>
<p dir="rtl" class="p1">قال الله تعالى: " العظمةُ إزاري، والكبرياءُ ردائي، فمَن نازَعَني واحدًا منهما، قذفتُه في النّار " رواه مسلم (حديث رقم: 2620)</p>
<p dir="rtl" class="p1"><b>الدلالة العقدية:</b></p>
<p dir="rtl" class="p25">الكبرياء لا يليق إلَّا بالله، ولا يجوز لمخلوق أن يدّعيه.</p>
<p dir="rtl" class="p25">معنى الاسم هنا مأخوذ صفةً لله، وإن لم يُذكر على صيغة "<span class="s8"><b>ٱلْمُتَكَبِّرُ</b></span>".</p>
<p dir="rtl" class="p25">الكبرياء هنا يُراد بها العلو الذاتي، والمنزلة المطلقة، والرفعة التي لا يُشارك فيها أحد.</p>
<p dir="rtl" class="p1"><b>ما ورد من معناه في آثار السَّلف:</b></p>
<p dir="rtl" class="p1">قال الإمام الطبري في تفسيره: <span class="s8"><b>ٱلْمُتَكَبِّرُ</b></span>: الذي تَكَبَّر عن ظلم عباده، وعن أن يكون له شريك، وعن أن يُشبهه شيءٌ من خلقه.</p>
<p dir="rtl" class="p1">وقال الإمام القرطبي: هو الذي يرى كلّ شيء دونه، ولا يرى فوقه أحدًا، ولا مثلَه أحدٌ، ولا ندَّ له أحد.</p>
<table cellspacing="0" cellpadding="0" class="t1">
<tbody>
<tr>
<td valign="middle" class="td198">
  <p dir="rtl" class="p15"><b>الدلالة</b></p>
</td>
<td valign="middle" class="td199">
  <p dir="rtl" class="p15"><b>النص</b></p>
</td>
<td valign="middle" class="td200">
  <p dir="rtl" class="p16"><b>المصدر</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td201">
  <p dir="rtl" class="p16"><b>إثبات الاسم ضمن سياق أسماء الجلال، والتنزيه عن كل شرك</b></p>
</td>
<td valign="middle" class="td202">
  <p dir="rtl" class="p17"><b>الحشر: 23</b></p>
</td>
<td valign="middle" class="td203">
  <p dir="rtl" class="p17"><b>القرآن الكريم</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td204">
  <p dir="rtl" class="p16"><b>الكبرياء لا يليق إلا بالله، ومن نازعه فيه هلك</b></p>
</td>
<td valign="middle" class="td205">
  <p dir="rtl" class="p17"><b>مسلم: "الكبرياء ردائي…"</b></p>
</td>
<td valign="middle" class="td206">
  <p dir="rtl" class="p17"><b>الحديث القدسي</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td207">
  <p dir="rtl" class="p16"><b>المتكبّر هو المتنزّه عن الشبهاء والأنداد، المتفرّد بالعلو والكمال</b></p>
</td>
<td valign="middle" class="td202">
  <p dir="rtl" class="p17"><b>الطبري والقرطبي وغيرهم</b></p>
</td>
<td valign="middle" class="td203">
  <p dir="rtl" class="p17"><b>آثار السلف</b></p>
</td>
</tr>
</tbody>
</table>
<p dir="rtl" class="p24"><b>أثر اسم الله </b><span class="s8"><b>ٱلْمُتَكَبِّرُ</b></span><b> في سلوك العبد وهمّته ونظرته لنفسه</b></p>
<p dir="rtl" class="p25"><b>أولًا: في نظرته إلى الله:</b> يُعلّمه التعظيم والخشية والتجرّد: من يتأمّل في "<span class="s8"><b>ٱلْمُتَكَبِّرُ</b></span>" حقًا، يذوب شعوره بالندية أو الاعتراض على الله.</p>
<p dir="rtl" class="p1">كلّما أراد أن يسأل:"لماذا فعل الله كذا؟" تذكّر أن الله المتكبّر لا يُسأل عما يفعل، وهو الكامل في حكمته وكبريائه، فيُثمر ذلك خشية حقيقية، وتعظيمًا لله في القلب، يمنع الغفلة والتطاول.</p>
<p dir="rtl" class="p25"><b>ثانيًا: في نظرته إلى نفسه:</b> </p>
<p dir="rtl" class="p36">يُهذّب في قلبه الغرور والكِبْر<b>:</b> حين يعلم العبد أنَّ الكبرياء لا يليق إلَّا بالله،<br>
يستحي أن يترفّع على الناس، أو أن يرى نفسه فوقهم، مهما علت مكانته، فيُثمر الاسم تواضعًا صادقًا لا رياء فيه، لأنَّك عرفت من هو المتكبّر بحق.</p>
<p dir="rtl" class="p36">يُصلح مقاييس العظمة في داخله: في زمنٍ يعظّم الناس المظاهر، المال، المنصب… من يعرف "<span class="s8"><b>ٱلْمُتَكَبِّرُ</b></span>" لا ينبهر إلَّا بعظمة الله، ولا يُفتن ببريق الخلق، فينتج عن ذلك: ثباتٌ في النفس، واطمئنان، وعزّة لا تُبتذل.</p>
<p dir="rtl" class="p25"><b>ثالثًا: في سلوكه مع الناس:</b> يُغرس فيه التواضع مع الخَلق لأنَّ الكبرياء لله وحده، من يتمثل فيه هذا الاسم… يستحي أن يتكبّر على من دونه، أو أن يرى نفسه فوق أحد، فيُعامل الضُّعفاء بلُطف، ويُخفض الجناح للفقراء، ولا يُذلّ أحدًا بعلمه أو سلطانه، قال أحد العارفين: "كل من تكبّر في الأرض… نازع الله صفةً لا تليق إلَّا به، فأذلّه الله ليُذكّره بحجمه الحقيقي."</p>
<p dir="rtl" class="p25"><b>رابعًا: في همّته الدَّاخلية ومقاييسه:</b></p>
<p dir="rtl" class="p36">يربّيه على ألَّا يغترّ بنفسه مهما عَلا: فلو بلغ أعلى مراتب النجاح أو العلم أو العبادة… يظلّ يقول في قلبه:"ٱلْمُتَكَبِّرُ هو الله… وأنا عبد فقير لا أساوي شيئًا إلَّا برضاه."</p>
<p dir="rtl" class="p36">يجعله يطمئن إذا رآه الناس صغيرًا: لأنه يعلم أن المتكبّر هو من يرفع من يشاء لا بحسب نظرة الناس، بل بحسب القرب إليه.</p>
<p dir="rtl" class="p1"><b>خلاصة تربوية وعقدية:</b></p>
<table cellspacing="0" cellpadding="0" class="t1">
<tbody>
<tr>
<td valign="middle" class="td208">
  <p dir="rtl" class="p15"><b>التفصيل</b></p>
</td>
<td valign="middle" class="td116">
  <p dir="rtl" class="p15"><b>الأثر</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td209">
  <p dir="rtl" class="p16"><b>يُنقّي القلب من الاعتراض والنِّدِّية، ويملأه خشوعًا وهيبة</b></p>
</td>
<td valign="middle" class="td120">
  <p dir="rtl" class="p17"><b>تعظيم لله</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td210">
  <p dir="rtl" class="p16"><b>يُسقط الغرور من القلب، ويعلّم العبد قدره</b></p>
</td>
<td valign="middle" class="td124">
  <p dir="rtl" class="p17"><b>تهذيب النفس</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td209">
  <p dir="rtl" class="p16"><b>يُثمر تواضعًا حقيقيًا، ورحمةً للناس، ونفورًا من الكبر</b></p>
</td>
<td valign="middle" class="td120">
  <p dir="rtl" class="p17"><b>سلوك مع الناس</b></p>
</td>
</tr>
<tr>
<td valign="middle" class="td211">
  <p dir="rtl" class="p16"><b>يُطهّر النية، ويجعل الهمّة مرفوعة لله لا للناس</b></p>
</td>
<td valign="middle" class="td124">
  <p dir="rtl" class="p17"><b>توازن في الطموح</b></p>
</td>
</tr>
</tbody>
</table>
<p dir="rtl" class="p1"><b>دعاء مستنبط من الأثر:</b></p>
<p dir="rtl" class="p1">" ٱللَّهُمَّ يَا مُتَكَبِّرُ… عَلِّمْنِي أَنْ أَتَصَاغَرَ فِي نَفْسِي، وَأَتَعَظَّمَ فِي طَاعَتِكَ،<br>
وَلَا تَجْعَلْنِي مِمَّنْ يَتَكَبَّرُ عَلَى عِبَادِكَ، فَيَذِلَّهُ كِبْرُهُ، وَيَهْلِكُ بِجَهْلِهِ، وَاجْعَلْنِي مِمَّنْ رَفَعْتَهُمْ بِٱلتَّوَاضُعِ، وَأَسْكَنْتَهُمْ فِي رِضَاكَ، وَحَمَيْتَهُمْ بِعَظَمَتِكَ ".</p>
<p dir="rtl" class="p1">هذا الدعاء يحمل في طياته رسالة تأملية وتربوية وروحية عميقة، تتناول التواضع والطاعة كطريق إلى رفعة النفس والرضا الإلهي، دعوني أشرح ذلك بالتفصيل:</p>
<p dir="rtl" class="p1"><b>الرسالة التأملية:</b></p>
<p dir="rtl" class="p1">هذا الدعاء يدعو إلى التأمل في الفرق بين الكبرياء والتواضع، يتساءل الإنسان من خلاله: كيف يمكن للإنسان أن يتجاوز غروره ويُسلم قلبه لله، حتى في أوقات النجاح أو العظمة التي قد تجعله يشعر بالفوقية؟.</p>
<p dir="rtl" class="p1">في بداية الدعاء، يُطلب من الله تعالى أن يعلمنا أن نتواضع في أنفسنا، أي أن لا نسمح لعظمة الدنيا أو لمكانتنا أن تضللنا فنظن أننا فوق الآخرين.</p>
<p dir="rtl" class="p1">ثم يُحث المسلم على التحلي بعظمة الطاعة، حيث يتم تعظيم الله من خلال العبادة والطاعة له، وليس من خلال التفوق على الناس أو الاعتقاد بالذات.</p>
<p dir="rtl" class="p1"><b>الرسالة التربوية:</b></p>
<p dir="rtl" class="p1">الدعاء يعكس التربية الرُّوحية التي تدعو إلى الاعتراف بالنقص البشري أمام عظمة الله، لا يوجد مكان للغرور أو التكبر عندما يدرك الإنسان أن كل شيء في هذا الكون بيد الله:</p>
<p dir="rtl" class="p1">"وَلَا تَجْعَلْنِي مِمَّنْ يَتَكَبَّرُ عَلَى عِبَادِكَ": الدعاء هنا يعرض تحذيرًا تربويًا من أن التكبر على خلق الله، سواء كان بالمال أو العلم أو الجاه، سيؤدي إلى الذل والهلاك، فالتكبر على الناس ليس فقط يؤدي إلى البعد عن الله، بل يسبب في تدمير الروح وخراب النفس.</p>
<p dir="rtl" class="p1">إنَّ التواضع الحقيقي يأتي عندما لا تكون المكانة أو الكبرياء هي معيار العظمة، بل تكون الطاعة والتسليم لله.</p>
<p dir="rtl" class="p1"><b>الرسالة الروحية:</b></p>
<p dir="rtl" class="p1">الجزء الروحي من الدعاء يعكس الاتصال العميق بالله، ويشجع على التحلي بالصفات التي تُقرّب العبد من الله، مثل التواضع والاعتراف بضعف الإنسان أمام خالقه:</p>
<p dir="rtl" class="p1">"وَاجْعَلْنِي مِمَّنْ رَفَعْتَهُمْ بِٱلتَّوَاضُعِ" : التواضع هنا ليس ضعفًا أو تراجُعًا، بل هو رفع للرُّوح، لأنه يجعل العبد مستحقًا لرضا الله سبحانه وتعالى، التواضع يرتقي بالرُّوح ويجعلها أكثر قربًا من الله.</p>
<p dir="rtl" class="p1"> "وَأَسْكَنْتَهُمْ فِي رِضَاكَ :" التواضع لا ينحصر في التصرفات الظاهرة فقط، بل هو حالة قلبية تملأ الإنسان بسكون داخلي يعكس رضا الله تعالى ويجلب له الطمأنينة الروحية.</p>
<p dir="rtl" class="p1"><b>الختام:</b></p>
<p dir="rtl" class="p1">الدعاء يعكس مفهومًا عميقًا جدًا في الإسلام، وهو أنَّ العظمة لا تأتي من خلال التفاخر أو التكبر، بل من خلال الطاعة لله والتواضع أمامه، هذا الدعاء يُذَكِّرنا بأنَّ أكبر عظمة هي الاعتراف بأنَّ الله هو المتكبر الحقيقي، ومن يتكبر ويظن نفسه متفوقًا على الآخرين يتعرض للذل والهلاك، أما من يتواضع في طاعته لله فإنَّه يرفع نفسه عند الله ويُعطيه مكانة عالية في رضاه.</p>
<p dir="rtl" class="p1">هذا الدعاء يعتبر من أعظم الأدوات لتزكية النفس وتهذيب القلب ليعيش الإنسان حياته وفق القيم الدينية العظيمة في التواضع والطاعة، مما يقوده إلى السعادة الرُّوحية والنجاح الحقيقي في الدنيا والآخرة.</p>
<p dir="rtl" class="p19"><br></p>
<p dir="rtl" class="p24"><b>مشهدً من السيرة النبوية الشريفة يُجسد اسم الله </b><span class="s8"><b>ٱلْمُتَكَبِّرُ</b></span><b>:</b></p>
<p dir="rtl" class="p1"><b>المشهد: هلاك فرعون المتكبر… ونجاة موسى المتوكل</b></p>
<p dir="rtl" class="p1">ورغم أنَّ القصة ليست في عهد النبي ﷺ، إلَّا أن النبي عليه الصلاة والسلام استحضرها بنفسه في مقام يُجسد عظمة اسم <span class="s8"><b>ٱلْمُتَكَبِّرُ</b></span>، فقال:</p>
<p dir="rtl" class="p1">عن عبد الله بن مسعود رضي الله عنه قال: قال رسول الله ﷺ: "إنَّ اللَّهَ يُمْلِي لِلظَّالِمِ، حتَّى إذَا أخَذَهُ لَمْ يُفْلِتْهُ"، ثم قرأ:<span class="s15"> ﴿وَكَذَٰلِكَ أَخۡذُ رَبِّكَ إِذَآ أَخَذَ ٱلۡقُرَىٰ وَهِيَ ظَٰلِمَةٌۚ إِنَّ أَخۡذَهُۥٓ أَلِيمٞ شَدِيدٌ﴾</span><span class="s13"> </span><span class="s12">هود: ١٠٢</span>، رواه البخاري ومسلم، وكان هذا الحديث يُروى عقيب تذكّر النبي ﷺ لهلاك فرعون الذي قال:<span class="s15"> ﴿فَقَالَ أَنَا۠ رَبُّكُمُ ٱلۡأَعۡلَىٰ﴾</span><span class="s13"> </span><span class="s12">النازعات: ٢٤</span>، فردّ الله عليه بكبريائه الحق، وقال:<span class="s15"> ﴿فَأَخَذَهُ ٱللَّهُ نَكَالَ ٱلۡأٓخِرَةِ وَٱلۡأُولَىٰٓ إِنَّ فِي ذَٰلِكَ لَعِبۡرَةٗ لِّمَن يَخۡشَىٰٓ﴾</span><span class="s13"> </span><span class="s12">النازعات: ٢٥ - ٢٦</span></p>
<p dir="rtl" class="p1"><b>كيف يجسد هذا اسم الله </b><span class="s8"><b>ٱلْمُتَكَبِّرُ</b></span><b>؟</b></p>
<p dir="rtl" class="p36">لأنَّ الله وحده هو الذي يتعالى عن أن يُناظَره مخلوق، أو أن يُنازع كبرياءه أحد.</p>
<p dir="rtl" class="p36">المتكبر الحقيقي ليس الظالم المتسلّط… بل هو الله، الذي يرفع خلقه بلطف، ويذلّ من تكبّر على عباده عدلًا.</p>
<p dir="rtl" class="p36">هذا المشهد يُظهر كيف أن كل كبرياء في الأرض ينهار تحت سطوة المتكبّر الحق، إذا شاء.</p>
<p dir="rtl" class="p1">وبهذا المعنى، قال النبي ﷺ: " العِزُّ إِزارُهُ، وَالكِبْرِياءُ رِداؤُهُ، فمَن يُنازِعْنِي واحِدًا منهُما عذَّبتُهُ" حديث قدسي – رواه مسلم.</p>
<p dir="rtl" class="p19"><br></p>
<p dir="rtl" class="p19"><br></p>
<p dir="rtl" class="p19"><br></p>
<p dir="rtl" class="p24"><b>أدعية تأملية باسم </b><span class="s8"><b>ٱلْمُتَكَبِّرُ</b></span><b>:</b></p>
<p dir="rtl" class="p1">" ٱللَّهُمَّ يَا مُتَكَبِّرُ عَنْ كُلِّ نَقْصٍ، وَمُنَزَّهٌ عَنْ كُلِّ عَيْبٍ، اجْعِلْنِي مِمَّنْ يُعَظِّمُكَ حَقَّ التَّعْظِيمِ، وَيَخْشَاكَ حَقَّ الْخَشْيَةِ، وَيُذِلُّ نَفْسَهُ بَيْنَ يَدَيْكَ حَقَّ الذُّلِّ.</p>
<p dir="rtl" class="p1">ٱللَّهُمَّ يَا مَنْ تَكَبَّرْتَ عَنْ ظُلْمِ الْعِبَادِ، وَتَعَالَيْتَ عَنْ النَّقْصِ وَالْحَاجَةِ، اجْعَلْنِي عَبْدًا خَاضِعًا لِعِزِّكَ، رَاضِيًا بِحُكْمِكَ، مُتَأَدِّبًا فِي حُضُورِكَ.</p>
<p dir="rtl" class="p1">يَا مُتَكَبِّرُ... لَا أَجِدُ مَلْجَأً مِنْك إِلَّا إِلَيْكَ، فَاكْسِرْ كِبْرَ نَفْسِي، وَارْفَعْنِي بِذُلِّي إِلَيْكَ، وَجَمِّلْ قَلْبِي بِهَيْبَةِ تَعْظِيمِكَ.</p>
<p dir="rtl" class="p1">ٱللَّهُمَّ اجْعَلْنِي مِمَّنْ يَخْضَعُ لِعَظَمَتِكَ، وَيُقَدِّسُك سُبْحَانَكَ، وَلَا يَرْفَعُ نَفْسَهُ فِي مَقَامٍ أَنْتَ فِيهِ أَعْلَى وَأَكْبَرُ.</p>
<p dir="rtl" class="p1">ٱللَّهُمَّ طَهِّرْنِي مِنْ كِبْرِ الْخَفَاءِ، وَزَيِّنِّي بِتَوَاضُعِ الْأَنْبِيَاءِ، وَاجْعَلْ عَيْنِي لَا تَرَى لِنَفْسِهَا قَدْرًا أَمَامَ جَلَالِكَ ."</p>
<p dir="rtl" class="p1">هذا الدعاء يحمل رسالة تأملية وتربوية وروحية عميقة جدًا، ويُظهر الاحتياج الكامل لله في التغلب على الكبرياء والتمسك بـ التواضع الحقيقي الذي يعزز العلاقة مع الله سبحانه وتعالى. دعني أشرح لك المعاني الدقيقة التي يحملها هذا الدعاء:</p>
<p dir="rtl" class="p1"><b>الرسالة التأملية:</b></p>
<p dir="rtl" class="p36">التكبير عن كل نقص: في بداية الدعاء، يتم الإقرار بأن الله هو المتكبر عن كل نقص، أي أن الله تعالى لا يشوبه أي عيب أو نقص، وبالتالي، يكون الإنسان في حاجة دائمة للاعتراف بعجزه أمام عظمة الله، هذه التذكرة توجهنا للتفكير في أنفسنا في ضوء عظمة الله التي لا يرقى إليها أحد.</p>
<p dir="rtl" class="p36">التواضع في حضرة الله: الدعاء يحث على الخضوع لله في كل لحظة من لحظات حياتنا، والتأكيد على الذل لله، الذي يتضمن الاعتراف بضعفنا والاستسلام الكامل لله في كل شيء، هذا الخضوع هو مفتاح للطهارة الداخلية، ويعتبر نقيضًا للكبرياء الذي يعمي عن رؤية الحقيقة.</p>
<p dir="rtl" class="p1"><b>الرسالة التربوية:</b></p>
<p dir="rtl" class="p36">التربية على العظمة الحقيقية: عندما يُطلب من الله أن يجعلك من الذين يُعظمون الله ويخشونه حقًا، فإنَّ الدعاء يعكس التربية الروحية التي تهدف إلى توجيه القلب والعقل نحو تعظيم الله من خلال الخشوع في العبادة والذل لله، فالتربية هنا ليست فقط على سلوكيات خارجية، بل على تغيير جوهري في القلب.</p>
<p dir="rtl" class="p36">تحطيم الكبرياء الداخلي: الدعاء يعترف بأنَّ الكبرياء ليس فقط في التفاخر أمام الناس، بل يمكن أن يكون أيضًا في القلب الخفي، لذلك، التربية الروحية تبدأ بتصفية القلب من الكبرياء الداخلي، وهو ما يتم في الدعاء بالتوجه إلى الله "اكسر كبر نفسي".</p>
<p dir="rtl" class="p36">التعلم من الأنبياء: الدعاء يطلب من الله أن يزين قلب العبد بـ تواضع الأنبياء، مما يعني أننا نتعلم التواضع من أعظم قدوة بشرية، وهم الأنبياء الذين تجسدوا في حياتهم العبودية التامة لله.</p>
<p dir="rtl" class="p1"><b>الرسالة الروحية:</b></p>
<p dir="rtl" class="p36">الذُّلُّ لله ورفع النفس: الدعاء يطلب من الله أن يرفعنا بذلنا لله، وهو من أسمى أنواع العبادة، حيث الذل لله ليس إهانة بل هو تقدير واحترام لله تعالى، وهذا من أعظم مظاهر الإيمان، لأنَّ الذل لله هو الذي يمنحنا الكرامة عند الله، بينما التكبر يؤدي إلى الذل في الدنيا وفي الآخرة.</p>
<p dir="rtl" class="p36">الخشوع والتقديس لله: الدعاء يوجه العبد إلى التقديس الكامل لله وإلى الخضوع له في كل حال، مع التذكير بعدم رفع النفس أمام عظمة الله، ففي حضور الله، يجب أن لا تكون لدينا أي فكرة عن العظمة الشخصية، بل أن ننظر إلى أنفسنا في ضوء جلال الله وعظمته.</p>
<p dir="rtl" class="p36">التطهر من الكبرياء الخفي: الدعاء يطلب أن يُطهر الإنسان من كبرياء الخفاء، أي الكبرياء الذي قد يشعر به الإنسان في داخله دون أن يظهر على السطح، هذا النوع من الكبرياء أشد خطرًا لأنَّه يظل خفيًا، ويصعب على الإنسان ملاحظته أو التخلص منه بسهولة.</p>
<p dir="rtl" class="p1"><b>الختام:</b></p>
<p dir="rtl" class="p1">الدعاء في هذه الصيغة العميقة يعبّر عن تسليم كامل لله، ويُظهر التربية الروحية على الذل لله والتواضع الحقيقي، مع الاعتراف بضعف الإنسان أمام عظمة الله، إنه دعاء يعيدنا إلى حقيقتنا كعبيد لله، وأن العظمة الحقيقية هي في الخضوع لله والاعتراف بعجزنا عن كماله.</p>
<p dir="rtl" class="p1">هذا الدعاء يُعلمنا أنَّ الكبرياء ليس فقط في التفاخر، بل هو نقص داخلي في قلب من لا يعظم الله، ويُظهر لنا كيف أن التواضع هو الطريق إلى عظمة حقيقية عند الله.</p>
<p dir="rtl" class="p1"><b>دعاء بأسلوب السَّلف ومُستلهم من معانيهم:</b></p>
<p dir="rtl" class="p1">" ٱللَّهُمَّ كَمَا أَنْتَ ٱلْمُتَكَبِّرُ عَنْ كُلِّ سُوءٍ، فَاجْعَلْنِي مِمَّنْ يَرَى كُلَّ كَمَالٍ فِيكَ، وَكُلَّ نَقْصٍ فِي نَفْسِهِ.</p>
<p dir="rtl" class="p1">ٱللَّهُمَّ اجْعَلْنِي أَعْرِفُ قَدْرِي، وَأَعْرِفُ قَدْرَكَ، فَلَا أَتَجَاوَزُ فِي حُدُودِي، وَلَا أَغْفَلُ عَنْ جَلَالِ عُلُوِّكَ ".</p>
<p dir="rtl" class="p1">هذا الدعاء يحمل في طياته معاني عميقة وروحية تركز على التواضع والاعتراف بعظمة الله، دعوني أشرح الرسالة التأملية والتربوية والروحية التي يحملها:</p>
<p dir="rtl" class="p1"><b>الرسالة التأملية:</b></p>
<p dir="rtl" class="p36">إدراك الكمال في الله والضعف في النفس: في الجزء الأول من الدعاء، يتوجه العبد إلى الله طالبًا أن يرى كل كمال في الله، ويشعر بالنقص في نفسه، هذه الفكرة تدعو للتأمل في الفرق بين كمال الله ونقص الإنسان، فالله هو المتكبر عن كل سوء، في حين أن الإنسان، مهما بلغ من القوة أو المعرفة، فإنه ناقص ويحتاج إلى الله في كل لحظة من حياته.</p>
<p dir="rtl" class="p36">التأمل في مكانتنا أمام الله: هذا الجزء من الدعاء يدعو إلى التفكر في كيف يجب أن ننظر لأنفسنا مقارنة بعظمة الله، فكلما تواضع الإنسان واعترافه بنقصه، كلما كان أقرب إلى الله، وكما أنَّ الله متكبر عن أي نقص أو عيب، نحن في حاجة إلى أن نتواضع أمامه، ونتعرف على قدرنا الحقيقي أمامه.</p>
<p dir="rtl" class="p1"><b>الرسالة التربوية:</b></p>
<p dir="rtl" class="p36">معرفة حدود النفس: الدعاء يُعلمنا أن نعرف قدرنا، وأن نظل ضمن حدودنا، فالكبرياء والغرور ينشآن من تجاوز حدودنا، بينما التواضع يأتي من معرفة حدودنا، فكلما أدرك الإنسان ضعفه وعجزه، كلما زادت حساسيته في طاعة الله وتجنب الكبرياء، أن نعرف قدرنا يعني أن نتواضع في التعامل مع الآخرين، وفي كل تعاملاتنا مع الحياة.</p>
<p dir="rtl" class="p36">التحلي بالوعي الذاتي: الدعاء يعزز مفهوم الوعي الذاتي، حيث يطلب من الله أن يُعلمنا قدرنا وقدر الله، وهذه هي دعوة إلى التربية على التواضع: أن نكون دائمًا مدركين لأنفسنا، ولعظمتنا كعبيد لله، وأن نحترم حدود الله في كل تصرفاتنا.</p>
<p dir="rtl" class="p1"><b>الرسالة الروحية:</b></p>
<p dir="rtl" class="p36">الإيمان بعظمة الله: في هذا الدعاء، يُطلب من الله أن يُعطينا القدرة على رؤية كماله في كل شيء، إذا علمنا أن الله مستحقٌ للتمجيد والعظمة في كل أمر، فإن ذلك سيساعدنا على التقرب إليه والتخلي عن كل تصور خاطئ عن أنفسنا، إذًا، نحن في حاجة إلى أن نضع أنفسنا في مكاننا الحقيقي: عبيدٌ لله، نُعظم الله ونؤمن بأن كل الكمال له وحده.</p>
<p dir="rtl" class="p36">الانقياد لأوامر الله في ظل علوه: في الجزء الأخير من الدعاء، يُطلب أن نعرف جلال علو الله وألَّا نتجاوز في حدودنا، فالتسليم لله في غاية الخشية من عظمته يعني أن نظل في حالة من الخضوع، وأن لا نغفل عن مكانة الله العظيمة في حياتنا.</p>
<p dir="rtl" class="p1"><b>الختام:</b></p>
<p dir="rtl" class="p1">الرسالة الروحية هنا تعلمنا أنَّ العبد المتواضع هو الذي يدرك عظمة الله في كل لحظة من حياته، كلما شعر الإنسان بعظمة الله، تراجع عن كبريائه واعترافه بنقصه، التربية الروحية في هذا الدعاء تدعو إلى الوعي الكامل بعظمة الله والمحافظة على حدودنا كعبيد لله، التواضع هو الطريق إلى القرب من الله والارتقاء الروحي.</p>
<p dir="rtl" class="p1">اللهم اجعلنا من الذين يعرفون قدرهم وقدرك، ويظلّون في ذلِّ الطاعة لك، ويشعرون بكمالك وعظمتك في كل أمر من أمور حياتهم.</p>
<p dir="rtl" class="p13"><br></p>
<p dir="rtl" class="p24"><b>أولًا :الانحرافات العقدية حول اسم الله </b><span class="s8"><b>ٱلْمُتَكَبِّرُ</b><b></b></span></p>
<p dir="rtl" class="p36">اعتقاد أن "التكبر" صفة نقص: يظن بعض الناس أن التكبر صفة مذمومة مطلقًا، فيتعجّب: كيف نصف الله بها؟</p>
<p dir="rtl" class="p1"><b>التصحيح</b>: </p>
<p dir="rtl" class="p26">التكبر في حق البشر: نقص وذمّ، لأنه ادّعاء ما ليس لهم.</p>
<p dir="rtl" class="p26">أما في حق الله تعالى :فهو كمال وجلال، لأنه لا أحد أعظم منه، ولا يليق الكبرياء إلا له.</p>
<p dir="rtl" class="p1">قال النبي ﷺ في الحديث القدسي: " الكِبرياءُ ردائي، والعظمةُ إزاري، فمن نازعني واحدًا منهما، قذفتُه في النار " رواه مسلم.</p>
<p dir="rtl" class="p36">تشبيه تكبّر الله بتكبّر البشر: يظن بعض الناس أن "المتكبّر" يعني أنه متجبّر ظالم أو متعالٍ بجفاء!.</p>
<p dir="rtl" class="p1"><b>التصحيح</b>: تكبّر الله هو تنزّهه عن كل نقص، وتعاليه عن الشبيه والندّ، لا يتضمّن ظلمًا ولا قهرًا لغير حقّ، بل هو كمالٌ في العلو والجلال والسيادة المطلقة.</p>
<p dir="rtl" class="p29"><b>" المتكبّر = المتفرّد بعظمةٍ لا يضاهيه فيها أحد " </b></p>
<p dir="rtl" class="p36">نفي صفة الكبرياء عن الله بتأويل أو تعطيل: بعض أهل الكلام يؤوّلون هذا الاسم بأنه "المتعالي عن صفات الخلق فقط"، وينفون عنه علو الذات أو الكبرياء الحقيقي.</p>
<p dir="rtl" class="p1"><b>التصحيح</b>: أهل السُّنّة يثبتون الاسم كما ورد، على وجه الكمال، بلا تشبيه ولا تعطيل، ويقولون: الكبرياء حقّ لله، يليق بجلاله، وهو أحقّ به من كل مخلوق.</p>
<p dir="rtl" class="p24"><b>ثانيًا: الانحرافات السلوكية حول اسم الله </b><span class="s8"><b>ٱلْمُتَكَبِّرُ</b><b></b></span></p>
<p dir="rtl" class="p36">ادّعاء الكبرياء في السلوك: كمن يتعالى على الناس، أو يحتقرهم، أو يرى نفسه أفضل منهم، فيُشابه صفة لا تليق إلا بالله.</p>
<p dir="rtl" class="p1"><b>التصحيح</b>: من عرف أنَّ الكبرياء ثوبٌ لا يلبسه إلَّا الله، تواضع،<br>
وخاف أن ينافس ربّه في وصفٍ لا يُنازَع عليه.</p>
<p dir="rtl" class="p1">قال النبي ﷺ: " لا يدخل الجنة مَن كان في قلبه مثقالُ ذرةٍ من كِبْر " رواه مسلم.</p>
<p dir="rtl" class="p36">الاعتداء على الناس باسم العظمة أو السلطة أو الدين: بعض الناس، خصوصًا من يملك سلطة أو علماً، يظن أن له الحق أن يُذلّ أو يُحقّر أو يتحكّم في الناس.</p>
<p dir="rtl" class="p1"><b>التصحيح</b>: من تعرّف على اسم ٱلْمُتَكَبِّرُ حقًّا، علم أنَّ الله وحده له الكبرياء،<br>
وأن العبد الحقير مهما بلغ… لا يحق له الترفع على عباد الله.</p>
<p dir="rtl" class="p29"><b>" كبرياء المؤمن: في تواضعه لله… ورحمته بخلق الله "</b></p>
<p dir="rtl" class="p36">الغرور الديني المقنّع: من يرى نفسه "أقرب إلى الله" من غيره، أو "أطهر" من العصاة، فيتكبر باسم الدين.</p>
<p dir="rtl" class="p1"><b>التصحيح</b>: من صدق مع الله… خاف من أن يكون من المتكبّرين وهو لا يشعر.</p>
<p dir="rtl" class="p1">التواضع لا يعني ترك الدين، بل يعني ألَّا ترى نفسك أكبر من غيرك، ولو كنت على حق.</p>
<p dir="rtl" class="p13"><br></p>
